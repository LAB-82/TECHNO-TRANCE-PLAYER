<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RMF SEKTOR EDITION</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap');

        :root {
            --sektor-bg: #1d2127;
            --sektor-panel: #262b32;
            --sektor-green: #29ff29; /* Sektor Neon Green */
            --sektor-text: #8b919a;
            --sektor-border: #14171b;
            --sektor-blue: #3d7eff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            height: 100vh; background: #0f1114; 
            font-family: 'Rajdhani', sans-serif;
            color: var(--sektor-text);
            display: flex; flex-direction: column;
            padding: 10px; overflow: hidden;
        }

        /* HEADER - INITIAL LOGO AREA */
        header { 
            height: 50px; background: #171a1f;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; border: 1px solid var(--sektor-border);
            border-radius: 4px 4px 0 0;
        }
        .logo { font-size: 20px; font-weight: 700; color: #fff; letter-spacing: 5px; }
        .logo span { color: var(--sektor-green); text-shadow: 0 0 10px var(--sektor-green); }
        .browser-tab { background: #2a2f37; padding: 5px 20px; border-radius: 3px; font-size: 12px; border: 1px solid #111; color: var(--sektor-green); }

        /* MAIN AREA */
        .app-content { 
            display: flex; flex: 1; gap: 8px; padding: 10px; 
            background: var(--sektor-bg); border: 1px solid var(--sektor-border);
            border-top: none;
        }

        /* LEWA STRONA - LISTA STACJI (OSC / BROWSER) */
        .left-side { 
            flex: 1.4; display: flex; flex-direction: column;
            background: var(--sektor-panel); border-radius: 4px; padding: 15px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.3);
        }
        .panel-label { font-size: 11px; font-weight: 700; color: #fff; text-transform: uppercase; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        .panel-label::before { content: ''; width: 4px; height: 12px; background: var(--sektor-green); }

        .grid { 
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; 
        }

        .tile {
            background: #1d2126; border: 1px solid #111; border-radius: 2px;
            height: 60px; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            cursor: pointer; position: relative; transition: 0.2s;
        }
        .tile:hover { background: #2a2f37; }
        
        .tile .st-id { font-size: 9px; color: #555; position: absolute; top: 5px; left: 5px; }
        .tile .st-name { font-size: 13px; font-weight: 600; color: var(--sektor-text); }

        .tile.active { 
            background: #2a2f37; border-color: var(--sektor-green);
        }
        .tile.active .st-name { color: #fff; }
        .tile.active::after {
            content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 2px;
            background: var(--sektor-green); box-shadow: 0 0 10px var(--sektor-green);
        }

        /* PRAWA STRONA - MASTER & CONTROLS */
        .right-side { 
            flex: 0.6; display: flex; flex-direction: column; gap: 15px;
            background: var(--sektor-panel); padding: 20px; border-radius: 4px;
        }

        /* WYŚWIETLACZ FALI (WAVEFORM) */
        .wave-display {
            background: #111; height: 130px; border-radius: 3px;
            border: 1px solid #333; position: relative; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        .wave-display canvas { position: absolute; width: 100%; height: 100%; opacity: 0.4; }
        .wave-info { z-index: 1; text-align: center; }
        .wave-info h2 { font-size: 22px; color: var(--sektor-green); text-shadow: 0 0 15px var(--sektor-green); }
        .wave-info p { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 2px; }

        /* TRANSPORT BUTTONS */
        .transport { display: flex; justify-content: center; gap: 15px; margin: 10px 0; }
        .sk-btn {
            width: 45px; height: 45px; background: linear-gradient(to bottom, #3a414a, #1d2126);
            border: 1px solid #111; border-radius: 4px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.4);
        }
        .sk-btn svg { width: 18px; fill: #aaa; }
        .sk-btn:active { transform: translateY(2px); box-shadow: none; }
        .sk-btn.play-btn { width: 60px; height: 60px; border-color: var(--sektor-blue); }
        .sk-btn.play-btn svg { fill: var(--sektor-blue); width: 24px; filter: drop-shadow(0 0 5px var(--sektor-blue)); }

        /* GŁOŚNOŚĆ (MASTER KNOB) */
        .master-zone { display: flex; flex-direction: column; align-items: center; margin-top: auto; }
        .knob-wrapper {
            width: 100px; height: 100px; background: #171a1f; border-radius: 50%;
            border: 3px solid #111; position: relative; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .knob-cap {
            width: 75px; height: 75px; background: radial-gradient(circle, #444, #222);
            border-radius: 50%; border: 1px solid #111; transform: rotate(-120deg);
            position: relative;
        }
        .knob-indicator {
            position: absolute; top: 10px; left: 50%; width: 4px; height: 4px;
            background: var(--sektor-green); border-radius: 50%; margin-left: -2px;
            box-shadow: 0 0 10px var(--sektor-green);
        }

        input[type="range"] { 
            width: 100%; margin-top: 20px; appearance: none; background: #111; height: 4px; 
            border-radius: 2px; accent-color: var(--sektor-green);
        }

        @media (max-width: 900px) {
            .app-content { flex-direction: column; overflow-y: auto; }
            .grid { grid-template-columns: repeat(2, 1fr); }
            .right-side { flex: none; width: 100%; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">INITIAL <span>SEKTOR</span></div>
    <div class="browser-tab" id="st-meta">FACTORY PRESET: RMF_FM</div>
    <div style="font-size: 11px; color: #555;" id="clock">00:00:00</div>
</header>

<div class="app-content">
    <!-- LEWA STRONA: LISTA STACJI -->
    <main class="left-side">
        <div class="panel-label">Wavetable Browser / Stations</div>
        <div class="grid" id="station-grid">
            <!-- Wstrzyknięte przez JS -->
        </div>
    </main>

    <!-- PRAWA STRONA: MASTER KONTROLA -->
    <aside class="right-side">
        <div class="panel-label">Engine Monitor</div>
        <div class="wave-display">
            <!-- Dekoracyjne paski fali -->
            <div style="position:absolute; width:100%; height:1px; background:var(--sektor-green); opacity:0.2;"></div>
            <div class="wave-info">
                <p>Output Signal</p>
                <h2 id="st-name">STANDBY</h2>
            </div>
        </div>

        <div class="transport">
            <div class="sk-btn" onclick="skip(-1)"><svg viewBox="0 0 24 24"><path d="M6,18V6H8V18H6M9.5,12L18,6V18L9.5,12Z"/></svg></div>
            <div class="sk-btn play-btn" onclick="toggle()">
                <svg viewBox="0 0 24 24"><path id="p-ico" d="M8,5.14V19.14L19,12.14L8,5.14Z"/></svg>
            </div>
            <div class="sk-btn" onclick="skip(1)"><svg viewBox="0 0 24 24"><path d="M16,18H18V6H16M6,18L14.5,12L6,6V18Z"/></svg></div>
        </div>

        <div class="master-zone">
            <div class="knob-wrapper">
                <div class="knob-cap" id="knob">
                    <div class="knob-indicator"></div>
                </div>
            </div>
            <input type="range" min="0" max="100" value="70" oninput="setV(this.value)">
            <div style="font-size: 10px; margin-top: 10px; text-transform: uppercase;">Master Volume</div>
        </div>
    </aside>
</div>

<audio id="player"></audio>

<script>
    const STATIONS = [
        { n: 'RMF FM', s: 'WT-01', u: 'rmf_fm' },
        { n: 'RMF MAXXX', s: 'WT-02', u: 'RMFMAXXX48' },
        { n: 'RMF 80s', s: 'WT-03', u: 'rmf_80s' },
        { n: 'RMF 90s', s: 'WT-04', u: 'rmf_90s' },
        { n: 'RMF 2000', s: 'WT-05', u: 'rmf_2000' },
        { n: 'RMF CHILL', s: 'WT-06', u: 'rmf_chillout' },
        { n: 'RMF CLASSIC', s: 'WT-07', u: 'rmf_classic' },
        { n: 'RMF DANCE', s: 'WT-08', u: 'rmf_dance' },
        { n: 'RMF GOLD', s: 'WT-09', u: 'rmf_gold' }
    ];

    const player = document.getElementById('player'), ico = document.getElementById('p-ico'), grid = document.getElementById('station-grid');
    let current = -1;

    // Generowanie stacji
    STATIONS.forEach((s, i) => {
        const div = document.createElement('div');
        div.className = 'tile';
        div.innerHTML = `<div class="st-id">${s.s}</div><div class="st-name">${s.n}</div>`;
        div.onclick = () => play(i);
        grid.appendChild(div);
    });

    function play(i) {
        current = i;
        document.querySelectorAll('.tile').forEach((t, idx) => t.classList.toggle('active', idx === i));
        document.getElementById('st-name').textContent = STATIONS[i].n;
        document.getElementById('st-meta').textContent = "PRESET: " + STATIONS[i].n.replace(' ', '_');
        
        const streamBase = "https://rs201-krk.rmfstream.pl/";
        player.src = (STATIONS[i].n === 'RMF MAXXX') ? 'https://rs7-krk2-cyfronet.rmfstream.pl/RMFMAXXX48' : streamBase + STATIONS[i].u;
        
        player.play();
        ico.setAttribute('d', 'M14,19H18V5H14M6,19H10V5H6V19Z');
    }

    function toggle() {
        if(current === -1) { play(0); return; }
        if(player.paused) { player.play(); ico.setAttribute('d', 'M14,19H18V5H14M6,19H10V5H6V19Z'); }
        else { player.pause(); ico.setAttribute('d', 'M8,5.14V19.14L19,12.14L8,5.14Z'); }
    }

    function skip(d) { let n = current + d; if(n >= 0 && n < STATIONS.length) play(n); }
    
    function setV(v) { 
        player.volume = v / 100; 
        const deg = (v * 2.4) - 120; // Obrót od -120 do 120 stopni
        document.getElementById('knob').style.transform = `rotate(${deg}deg)`;
    }

    function clock() {
        const now = new Date();
        document.getElementById('clock').textContent = now.toTimeString().split(' ')[0];
    }
    setInterval(clock, 1000); clock();
    setV(70);
</script>
</body>
</html>
