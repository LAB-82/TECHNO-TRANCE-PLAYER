<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RMF FM SEKTOR - LA XLIMIT STYLE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&display=swap');
        
        :root {
            --bg-dark: #1a1429;
            --panel-deep: #251d3a;
            --accent-pink: #ff2d7d;
            --accent-blue: #00d4ff;
            --text-gray: #a0a0b8;
            --border-ui: #3d345c;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            height: 100vh; background: #0f0b1a; 
            font-family: 'Rajdhani', sans-serif;
            display: flex; align-items: center; justify-content: center;
        }

        /* Główny kontener VST */
        .vst-container {
            width: 1000px; height: 500px;
            background: var(--bg-dark);
            border: 2px solid #000;
            display: flex; flex-direction: column;
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            border-radius: 4px;
            padding: 10px;
        }

        /* Górny pasek z logotypami */
        .vst-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 5px 15px; height: 40px;
        }
        .vst-title { color: #fff; font-weight: 700; font-size: 20px; letter-spacing: 1px; }
        .vst-title span { color: var(--text-gray); font-weight: 400; margin-right: 10px; font-style: italic; }

        /* Panel nawigacji stacji */
        .patch-nav {
            background: #000; border: 1px solid var(--border-ui);
            height: 35px; width: 400px; margin: 0 auto 10px;
            display: flex; align-items: center; justify-content: space-between;
            border-radius: 2px;
        }
        .nav-btn { background: transparent; border: none; color: var(--text-gray); padding: 0 15px; cursor: pointer; font-weight: bold; }
        .nav-btn:hover { color: #fff; }
        #patch-name { color: var(--accent-blue); font-weight: 600; letter-spacing: 1px; font-size: 14px; text-transform: uppercase; }

        /* Główny obszar roboczy */
        .vst-main { display: flex; flex: 1; gap: 10px; }

        /* Lewa sekcja: Lista stacji (zamiast pokręteł) */
        .vst-left {
            flex: 1.5; background: var(--panel-deep);
            border: 1px solid var(--border-ui);
            padding: 10px; display: grid;
            grid-template-columns: repeat(4, 1fr); gap: 5px;
        }

        .tile {
            background: #1e1730; border: 1px solid #332a4d;
            border-radius: 2px; color: var(--text-gray);
            font-size: 11px; font-weight: 600;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.2s; text-align: center;
            text-transform: uppercase;
        }
        .tile:hover { background: #2d2347; color: #fff; }
        .tile.active { 
            border-color: var(--accent-pink); 
            background: var(--accent-pink); color: #fff;
            box-shadow: 0 0 10px rgba(255, 45, 125, 0.4);
        }

        /* Prawa sekcja: Master & Visuals */
        .vst-right {
            flex: 1; background: var(--panel-deep);
            border: 1px solid var(--border-ui);
            display: flex; flex-direction: column; padding: 15px;
        }

        /* Duże pokrętło DRIVE / VOLUME */
        .drive-section {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative;
        }
        .knob-ring {
            width: 140px; height: 140px; border-radius: 50%;
            background: conic-gradient(var(--accent-pink) 0%, #1a1429 0%);
            display: flex; align-items: center; justify-content: center;
            position: relative; box-shadow: inset 0 0 20px #000;
        }
        .knob-ring::before {
            content: ""; position: absolute; inset: 8px; background: #1a1429; border-radius: 50%; border: 2px solid #000;
        }
        .knob-label { position: absolute; z-index: 5; text-align: center; }
        .knob-label div:first-child { color: var(--accent-pink); font-size: 10px; font-weight: 700; margin-bottom: -5px; }
        .knob-label div:last-child { color: #fff; font-size: 24px; font-weight: 700; }

        /* Wskaźniki poziomu (VU Meters) ze zdjęcia */
        .vu-meters {
            height: 100px; display: flex; gap: 15px; justify-content: center; padding: 10px;
        }
        .meter-track { width: 12px; height: 100%; background: #000; position: relative; border: 1px solid #332a4d; }
        .meter-fill { 
            position: absolute; bottom: 0; width: 100%; height: 50%;
            background: linear-gradient(to top, var(--accent-blue) 0%, #fff 100%);
            box-shadow: 0 0 10px var(--accent-blue);
            transition: height 0.1s ease;
        }

        /* Dolny panel przycisków */
        .vst-footer {
            height: 60px; display: flex; gap: 10px; margin-top: 10px;
        }
        .footer-btn {
            flex: 1; background: #2d2347; border: 1px solid var(--border-ui);
            color: var(--text-gray); font-size: 11px; font-weight: 700;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; text-transform: uppercase; border-radius: 2px;
        }
        .footer-btn.active-btn { background: var(--accent-pink); color: #fff; border-color: #ff5e9c; }
        .footer-btn svg { width: 20px; fill: currentColor; margin-right: 8px; }

        /* Suwak głośności w stylu LA */
        .fader-container { width: 100%; padding: 10px 0; }
        .v-slider { width: 100%; appearance: none; background: #000; height: 4px; border-radius: 2px; outline: none; }
        .v-slider::-webkit-slider-thumb {
            appearance: none; width: 30px; height: 12px; background: #4d407a;
            border: 1px solid #7c6bb3; cursor: pointer; border-radius: 1px;
        }
    </style>
</head>
<body>

<div class="vst-container">
    <div class="vst-header">
        <div class="vst-title"><span>TBProAudio</span> LA XLIMIT IV</div>
        <div style="color: var(--accent-pink); font-size: 12px; font-weight: 700;">RMF RADIO ENGINE</div>
    </div>

    <div class="patch-nav">
        <button class="nav-btn" onclick="skip(-1)">◀</button>
        <div id="patch-name">SELECT STATION</div>
        <button class="nav-btn" onclick="skip(1)">▶</button>
    </div>

    <div class="vst-main">
        <div class="vst-left" id="grid"></div>
        
        <div class="vst-right">
            <div class="drive-section">
                <div class="knob-ring" id="v-knob">
                    <div class="knob-label">
                        <div>VOLUME</div>
                        <div id="vol-display">50</div>
                    </div>
                </div>
            </div>

            <div class="vu-meters">
                <div class="meter-track"><div class="meter-fill" id="m1"></div></div>
                <div class="meter-track"><div class="meter-fill" id="m2"></div></div>
                <div class="meter-track" style="opacity:0.3"><div class="meter-fill" style="background:var(--accent-pink)"></div></div>
                <div class="meter-track"><div class="meter-fill" id="m3"></div></div>
                <div class="meter-track"><div class="meter-fill" id="m4"></div></div>
            </div>

            <div class="fader-container">
                <input type="range" class="v-slider" id="v-slider" min="0" max="100" value="50" oninput="setV(this.value)">
            </div>
        </div>
    </div>

    <div class="vst-footer">
        <div class="footer-btn active-btn" onclick="toggle()">
            <svg id="svg-ico" viewBox="0 0 24 24"><path d="M8,5.14V19.14L19,12.14L8,5.14Z"/></svg>
            <span id="play-text">POWER ON</span>
        </div>
        <div class="footer-btn">TRUE PEAK</div>
        <div class="footer-btn" style="color: var(--accent-blue);">OVERSAMPLING 8X</div>
        <div class="footer-btn" onclick="resetVol()">RESET GAIN</div>
    </div>
</div>

<audio id="player"></audio>

<script>
    const STATIONS = [
        { n: 'RMF FM', u: 'rmf_fm' }, { n: 'RMF MAXXX', u: 'RMFMAXXX48' },
        { n: 'RMF 80s', u: 'rmf_80s' }, { n: 'RMF 90s', u: 'rmf_90s' },
        { n: 'RMF 2000', u: 'rmf_2000' }, { n: 'RMF CHILLOUT', u: 'rmf_chillout' },
        { n: 'RMF CLASSIC', u: 'rmf_classic' }, { n: 'RMF DANCE', u: 'rmf_dance' },
        { n: 'RMF GOLD', u: 'rmf_gold' }, { n: 'RMF PARTY', u: 'rmf_party' },
        { n: 'RMF ROCK', u: 'rmf_rock' }, { n: 'RMF LOVE', u: 'rmf_love' },
        { n: 'RMF POLSKI ROCK', u: 'rmf_polski_rock' }, { n: 'RMF JAZZ', u: 'rmf_smooth_jazz' },
        { n: 'RMF HIP HOP', u: 'rmf_hip_hop' }, { n: 'RMF GROOVE', u: 'rmf_groove' }
    ];

    const player = document.getElementById('player'), 
          svgIco = document.getElementById('svg-ico'),
          grid = document.getElementById('grid'),
          vKnob = document.getElementById('v-knob'),
          vSlider = document.getElementById('v-slider'),
          volDisplay = document.getElementById('vol-display');

    let current = -1;

    STATIONS.forEach((s, i) => {
        const div = document.createElement('div');
        div.className = 'tile';
        div.textContent = s.n;
        div.onclick = () => play(i);
        grid.appendChild(div);
    });

    function play(i) {
        current = i;
        document.querySelectorAll('.tile').forEach((t, idx) => t.classList.toggle('active', idx === i));
        document.getElementById('patch-name').textContent = STATIONS[i].n;
        const streamBase = "https://rs201-krk.rmfstream.pl/";
        player.src = (STATIONS[i].n === 'RMF MAXXX') ? 'https://rs7-krk2-cyfronet.rmfstream.pl/RMFMAXXX48' : streamBase + STATIONS[i].u;
        player.play();
        updateIcon(true);
        animateMeters();
    }

    function toggle() {
        if(current === -1) { play(0); return; }
        if(player.src && !player.paused) {
            player.pause(); 
            updateIcon(false);
        } else { 
            player.play();
            updateIcon(true);
        }
    }

    function updateIcon(isPlaying) {
        svgIco.innerHTML = isPlaying ? '<path d="M6,6H18V18H6V6Z"/>' : '<path d="M8,5.14V19.14L19,12.14L8,5.14Z"/>';
        document.getElementById('play-text').textContent = isPlaying ? "STOP ENGINE" : "START ENGINE";
    }

    function skip(d) {
        let n = (current + d + STATIONS.length) % STATIONS.length;
        play(n);
    }

    function setV(v) {
        player.volume = v / 100;
        volDisplay.textContent = v;
        const fill = v; 
        vKnob.style.background = `conic-gradient(var(--accent-pink) ${fill}%, #1a1429 0%)`;
    }

    function resetVol() { vSlider.value = 50; setV(50); }

    // Prosta animacja VU-meterów dla efektu wizualnego
    function animateMeters() {
        if(player.paused) return;
        const m1 = document.getElementById('m1');
        const m2 = document.getElementById('m2');
        const m3 = document.getElementById('m3');
        const m4 = document.getElementById('m4');
        
        setInterval(() => {
            if(!player.paused) {
                m1.style.height = (Math.random() * 60 + 20) + "%";
                m2.style.height = (Math.random() * 60 + 20) + "%";
                m3.style.height = (Math.random() * 60 + 20) + "%";
                m4.style.height = (Math.random() * 60 + 20) + "%";
            }
        }, 150);
    }

    setV(50);
</script>

</body>
</html>
