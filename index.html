<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TB-303 PRO TERMINAL - RMF FM EDITION</title>
    <link href="https://fonts.cdnfonts.com/css/ds-digital" rel="stylesheet">
    <style>
        :root {
            --metal-bg: linear-gradient(145deg, #e0e0e0, #a0a0a0);
            --display-bg: #0a0a0a;
            --led-off: #400000;
            --led-on: #ff0000;
            --btn-grad: linear-gradient(180deg, #f0f0f0 0%, #b0b0b0 100%);
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1a1a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }

        /* Obudowa główna */
        .frame {
            width: 480px;
            background: #c0c0c0;
            background-image: 
                repeating-linear-gradient(90deg, transparent, transparent 1px, rgba(255,255,255,0.1) 1px, transparent 2px),
                linear-gradient(135deg, #d8d8d8 0%, #909090 100%);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), inset 0 2px 2px rgba(255,255,255,0.5);
            border: 1px solid #888;
            position: relative;
        }

        /* Logo i Teksty */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }

        .brand-logo {
            font-weight: 900;
            color: #222;
            line-height: 1;
        }

        .brand-logo .tb-icon {
            border: 2px solid #222;
            padding: 2px 5px;
            font-size: 24px;
            border-radius: 4px;
            margin-right: 5px;
        }

        .brand-model {
            font-size: 24px;
            letter-spacing: -1px;
        }

        /* Wyświetlacz LCD */
        .display-area {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }

        .lcd-clock {
            width: 140px;
            background: var(--display-bg);
            border: 3px solid #444;
            padding: 10px;
            color: #2b1111; /* Wyłączony */
            font-family: 'DS-Digital', sans-serif;
            font-size: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 2px 10px rgba(0,0,0,1);
        }

        .lcd-info {
            flex-grow: 1;
            background: var(--display-bg);
            border: 3px solid #444;
            padding: 8px 12px;
            color: #2b1111; /* Wyłączony */
            font-family: 'DS-Digital', sans-serif;
            text-transform: uppercase;
            box-shadow: inset 0 2px 10px rgba(0,0,0,1);
        }

        .frame.powered .lcd-clock,
        .frame.powered .lcd-info {
            color: #33ff33; /* Zielony neon */
            text-shadow: 0 0 5px rgba(51, 255, 51, 0.5);
        }

        /* Grid Przycisków i Wizualizatora */
        .interface-grid {
            display: grid;
            grid-template-columns: 180px 1fr;
            gap: 20px;
        }

        /* Przycisk Lewa Kolumna */
        .button-matrix {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .btn-rect {
            height: 45px;
            background: var(--btn-grad);
            border: 1px solid #999;
            border-radius: 3px;
            box-shadow: 0 3px 0 #777, 0 4px 6px rgba(0,0,0,0.3);
            cursor: pointer;
            font-weight: bold;
            font-size: 11px;
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.1s;
        }

        .btn-rect:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #777;
        }

        .btn-rect.active {
            background: #e0ffe0;
            border-color: #33ff33;
            color: #000;
        }

        /* Wizualizator Step Sequencer */
        .sequencer-box {
            background: #111;
            border: 3px solid #333;
            padding: 10px;
            border-radius: 4px;
            height: 100px;
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 4px;
        }

        .step-led {
            background: #222;
            border-radius: 2px;
        }

        .frame.powered .step-led.on {
            background: #ff4400;
            box-shadow: 0 0 8px #ff4400;
        }

        /* Panel Dolny: Pokrętła i Suwak */
        .bottom-controls {
            margin-top: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;
        }

        .knob-container {
            text-align: center;
        }

        .knob {
            width: 60px;
            height: 60px;
            background: radial-gradient(circle, #eee 0%, #999 100%);
            border-radius: 50%;
            border: 2px solid #666;
            margin-bottom: 5px;
            position: relative;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
        }

        .knob::after {
            content: '';
            position: absolute;
            top: 5px;
            left: 50%;
            width: 4px;
            height: 15px;
            background: #333;
            transform: translateX(-50%);
        }

        .led-indicator {
            width: 8px;
            height: 8px;
            background: var(--led-off);
            border-radius: 50%;
            margin: 5px auto;
            transition: 0.3s;
        }

        .frame.powered .led-indicator.active {
            background: var(--led-on);
            box-shadow: 0 0 8px var(--led-on);
        }

        /* Suwak głośności */
        .slider-track {
            width: 150px;
            height: 25px;
            background: #000;
            border-radius: 4px;
            position: relative;
            overflow: hidden;
            border: 2px solid #444;
        }

        .slider-handle {
            height: 100%;
            background: #ddd;
            width: 20px;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            border: 1px solid #666;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.5);
        }

        .vol-fill {
            height: 100%;
            width: 50%;
            background: rgba(51, 255, 51, 0.2);
            transition: width 0.1s;
        }

        /* Stopka */
        .footer {
            margin-top: 20px;
            text-align: center;
            font-size: 10px;
            color: #444;
            border-top: 1px solid #aaa;
            padding-top: 10px;
        }

        .footer a { color: inherit; text-decoration: none; font-weight: bold; }

        /* Ikony SVG w przyciskach */
        .btn-rect svg { width: 14px; height: 14px; margin-right: 5px; fill: currentColor; }

    </style>
</head>

<body oncontextmenu="return false;">
    <div class="frame">
        <div class="header">
            <div class="brand-logo">
                <span class="tb-icon">TB</span>
                <span class="brand-model">TB-303 <br><small style="font-size: 10px;">PRO TERMINAL</small></span>
            </div>
            <div style="text-align: right; font-size: 10px; color: #333; font-weight: bold;">
                BANK: A1 / PATTERN: 08
            </div>
        </div>

        <div class="display-area">
            <div class="lcd-clock" id="clock">00:00:00</div>
            <div class="lcd-info" id="display">
                <div id="station-name">MUZYCZNE RADIO</div>
                <div style="display: flex; justify-content: space-between; margin-top: 5px; font-size: 14px;">
                    <span id="date">01:01:2026</span>
                    <span id="vol-percent">VOL: 50%</span>
                </div>
            </div>
        </div>

        <div class="interface-grid">
            <div class="button-matrix" id="controls">
                <button id="pwr" class="btn-rect">POWER</button>
                <button id="play" class="btn-rect">PLAY</button>
                <button id="rec" class="btn-rect">REC</button>
                <button id="stop" class="btn-rect">STOP</button>
                <button id="mute" class="btn-rect">MUTE</button>
                <button class="btn-rect" onclick="location.reload()">RESET</button>
                <button class="btn-rect">RMF FM</button>
                <button class="btn-rect">RADIO ZET</button>
            </div>

            <div class="sequencer-box" id="visualizer">
                </div>
        </div>

        <div class="bottom-controls">
            <div class="knob-container">
                <div class="led-indicator" id="led-pwr"></div>
                <button id="vDown" class="btn-rect" style="width: 50px;">- VOL</button>
            </div>

            <div class="knob-container">
                <div class="led-indicator active"></div>
                <div class="knob"></div>
                <div style="font-size: 9px; font-weight: bold;">PAN L/R</div>
            </div>

            <div class="knob-container">
                <div class="led-indicator" id="led-rec"></div>
                <button id="vUp" class="btn-rect" style="width: 50px;">+ VOL</button>
            </div>
        </div>

        <div class="footer">
            RUN / STOP TERMINAL L.A.B. AUDIO <br>
            <a href="https://www.muzyczneradio.pl" target="_blank">WWW.MUZYCZNERADIO.PL</a>
        </div>
    </div>

    <audio id="stream" crossorigin="anonymous" src="https://stream.rcs.revma.com/gzwc1xcq042vv"></audio>

    <script>
        const audio = document.getElementById('stream');
        const pwrBtn = document.getElementById('pwr');
        const playBtn = document.getElementById('play');
        const recBtn = document.getElementById('rec');
        const stopBtn = document.getElementById('stop');
        const muteBtn = document.getElementById('mute');
        const clockEl = document.getElementById('clock');
        const dateEl = document.getElementById('date');
        const volPercent = document.getElementById('vol-percent');
        const ledPwr = document.getElementById('led-pwr');
        const ledRec = document.getElementById('led-rec');

        // Wizualizator - generowanie kratek
        const viz = document.getElementById('visualizer');
        for(let i=0; i<32; i++) {
            const dot = document.createElement('div');
            dot.className = 'step-led';
            viz.appendChild(dot);
        }

        let audioCtx, analyser, source, isPwr = false;
        let mediaRecorder, chunks = [];

        function updateDateTime() {
            const now = new Date();
            clockEl.textContent = now.toTimeString().split(' ')[0];
            const day = String(now.getDate()).padStart(2, '0');
            const mo = String(now.getMonth() + 1).padStart(2, '0');
            dateEl.textContent = `${day}:${mo}:${now.getFullYear()}`;
        }
        setInterval(updateDateTime, 1000);
        updateDateTime();

        function updateVol() { 
            const vol = Math.round(audio.volume * 100);
            volPercent.textContent = `VOL: ${vol}%`;
        }

        pwrBtn.onclick = function() {
            isPwr = !isPwr;
            document.querySelector('.frame').classList.toggle('powered');
            this.classList.toggle('active');
            ledPwr.classList.toggle('active');
            if (!isPwr) {
                if(mediaRecorder && mediaRecorder.state === 'recording') stopRecording();
                audio.pause();
                playBtn.classList.remove('active');
                recBtn.classList.remove('active');
                ledRec.classList.remove('active');
            }
        };

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                source = audioCtx.createMediaElementSource(audio);
                source.connect(analyser);
                source.connect(audioCtx.destination);
                animateViz();
            }
        }

        function animateViz() {
            if(!isPwr) {
                document.querySelectorAll('.step-led').forEach(s => s.classList.remove('on'));
            } else {
                const data = new Uint8Array(analyser.frequencyBinCount);
                analyser.getByteFrequencyData(data);
                const leds = document.querySelectorAll('.step-led');
                leds.forEach((led, i) => {
                    if (data[i*4] > 100) led.classList.add('on');
                    else led.classList.remove('on');
                });
            }
            requestAnimationFrame(animateViz);
        }

        playBtn.onclick = function() {
            if (!isPwr) return;
            initAudio();
            audio.play();
            this.classList.add('active');
        };

        recBtn.onclick = function() {
            if (!isPwr) return;
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                stopRecording();
            } else {
                startRecording();
            }
        };

        function startRecording() {
            initAudio();
            const dest = audioCtx.createMediaStreamDestination();
            source.connect(dest);
            mediaRecorder = new MediaRecorder(dest.stream);
            chunks = [];
            mediaRecorder.ondataavailable = e => chunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'audio/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = 'nagranie.webm'; a.click();
            };
            mediaRecorder.start();
            recBtn.classList.add('active');
            ledRec.classList.add('active');
        }

        function stopRecording() {
            if(mediaRecorder) mediaRecorder.stop();
            recBtn.classList.remove('active');
            ledRec.classList.remove('active');
        }

        stopBtn.onclick = function() {
            if (!isPwr) return;
            if(mediaRecorder && mediaRecorder.state === 'recording') stopRecording();
            audio.pause(); 
            audio.currentTime = 0;
            playBtn.classList.remove('active');
        };

        muteBtn.onclick = function() {
            if (!isPwr) return;
            audio.muted = !audio.muted;
            this.classList.toggle('active', audio.muted);
        };

        document.getElementById('vUp').onclick = function() { if(isPwr) { audio.volume = Math.min(1, audio.volume + 0.1); updateVol(); }};
        document.getElementById('vDown').onclick = function() { if(isPwr) { audio.volume = Math.max(0, audio.volume - 0.1); updateVol(); }};

        window.addEventListener('load', () => {
            audio.volume = 0.5;
            updateVol();
        });
    </script>
</body>
</html>
