<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RMF TB-303 COMPUTER CONTROLLED</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap');

        :root {
            --silver-bg: linear-gradient(180deg, #e0e0e0 0%, #b0b0b0 45%, #888 50%, #b0b0b0 55%, #d0d0d0 100%);
            --button-bg: linear-gradient(145deg, #ffffff, #d1d1d1);
            --led-red: #ff0000;
            --led-off: #440000;
            --yellow-accent: #fce300;
            --text-black: #1a1a1a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            height: 100vh; width: 100vw; 
            background: #121212; 
            display: flex; flex-direction: column; padding: 1.5vh;
            font-family: 'Share Tech Mono', monospace;
            color: var(--text-black);
            overflow: hidden;
        }

        /* OBUDOWA URZĄDZENIA */
        .chassis {
            flex: 1;
            background: var(--silver-bg);
            border: 4px solid #444;
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), inset 0 2px 5px rgba(255,255,255,0.8);
            display: flex; flex-direction: column;
            padding: 20px;
            position: relative;
        }

        header { 
            display: flex; justify-content: space-between; align-items: flex-end;
            border-bottom: 2px solid #555; padding-bottom: 10px; margin-bottom: 20px;
        }
        .brand { font-family: 'Orbitron'; font-weight: 700; font-size: 28px; letter-spacing: -1px; }
        .model-name { text-align: right; line-height: 1; }
        .model-name h1 { font-size: 32px; font-weight: 400; }
        .model-name p { font-size: 12px; font-weight: bold; text-transform: uppercase; }

        .main-engine { display: flex; flex: 1; gap: 20px; min-height: 0; }

        /* GRID STACJI - UKŁAD ZACHOWANY */
        .grid { 
            flex: 1.6; display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            grid-template-rows: repeat(3, 1fr); 
            gap: 12px; 
            background: rgba(0,0,0,0.05); padding: 15px; border-radius: 8px;
            border: 1px solid rgba(0,0,0,0.2);
        }

        /* PRZYCISK TB-303 */
        .tile {
            background: var(--button-bg);
            border: 1px solid #777;
            border-radius: 4px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; position: relative;
            box-shadow: 2px 4px 6px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.9);
            transition: 0.1s;
        }

        .tile::before { /* Dioda LED */
            content: ""; position: absolute; top: 6px; width: 6px; height: 6px;
            background: var(--led-off); border-radius: 50%; border: 1px solid rgba(0,0,0,0.5);
        }

        .tile:active { transform: translateY(2px); box-shadow: 1px 1px 2px rgba(0,0,0,0.4); }

        .tile.active { background: #eee; border-color: #444; }
        .tile.active::before { background: var(--led-red); box-shadow: 0 0 8px var(--led-red); }

        .tile .t-top { font-weight: bold; font-size: 16px; margin-top: 10px; color: #333; }
        .tile .t-bottom { font-size: 10px; font-weight: bold; color: #555; text-transform: uppercase; }

        /* PANEL KONTROLNY (SIDEBAR) */
        .sidebar { 
            flex: 0.4; display: flex; flex-direction: column; gap: 20px;
            background: #222; border-radius: 8px; padding: 20px;
            color: var(--yellow-accent); border: 3px solid #444;
            box-shadow: inset 0 0 20px #000;
        }

        .display-vst {
            background: #000; flex: 1; border-radius: 4px; border: 2px solid #444;
            padding: 15px; display: flex; flex-direction: column; justify-content: center;
            font-family: 'Share Tech Mono'; position: relative;
        }
        .display-vst::after {
            content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 110, 0.03));
            background-size: 100% 2px, 3px 100%; pointer-events: none;
        }

        .knob-container { display: flex; justify-content: space-around; margin-top: 10px; }
        .knob {
            width: 50px; height: 50px; background: radial-gradient(circle, #ddd 0%, #888 100%);
            border-radius: 50%; border: 2px solid #333; position: relative;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }
        .knob::after {
            content: ""; position: absolute; top: 5px; left: 50%; width: 3px; height: 12px;
            background: #333; transform: translateX(-50%);
        }

        .vol-slider { width: 100%; }
        input[type="range"] {
            -webkit-appearance: none; width: 100%; background: #000; height: 30px; border: 1px solid #444;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 40px; height: 26px; background: #ddd; border-radius: 2px;
            cursor: pointer; border: 1px solid #666; box-shadow: inset 0 0 5px #fff;
        }

        .status-led { display: inline-block; width: 10px; height: 10px; border-radius: 50%; background: var(--led-off); margin-right: 5px; }
        .playing .status-led { background: var(--led-red); box-shadow: 0 0 10px var(--led-red); }

    </style>
</head>
<body>

<div class="chassis">
    <header>
        <div class="brand">@RMF Roland</div>
        <div class="model-name">
            <h1>TB-303</h1>
            <p>Computer Controlled</p>
        </div>
    </header>

    <div class="main-engine">
        <div class="grid" id="station-grid"></div>

        <aside class="sidebar">
            <div class="display-vst" id="vst-screen">
                <div style="font-size: 12px; opacity: 0.6;">PATTERN MODE</div>
                <div id="playing-now" style="font-size: 20px; margin: 10px 0;">IDLE...</div>
                <div id="timer" style="font-size: 24px; color: #fff;">00:00</div>
            </div>

            <div class="knob-container">
                <div class="knob" onclick="adj(-5)"></div>
                <div class="knob" onclick="adj(5)"></div>
            </div>

            <div class="vol-control">
                <p style="font-size: 10px; margin-bottom: 5px; text-align: center;">VOLUME</p>
                <input type="range" id="v-range" min="0" max="100" value="50" oninput="setV(this.value)">
            </div>

            <div style="display: flex; justify-content: center; gap: 10px;">
                <button onclick="toggle()" style="background: #444; color: #fff; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer;">RUN/STOP</button>
            </div>
        </aside>
    </div>
</div>

<audio id="player"></audio>

<script>
    const STATIONS = [
        { n: 'RMF FM', s: '1', u: 'rmf_fm' },
        { n: 'RMF MAXXX', s: '2', u: 'RMFMAXXX48' },
        { n: 'RMF 80s', s: '3', u: 'rmf_80s' },
        { n: 'RMF 90s', s: '4', u: 'rmf_90s' },
        { n: 'RMF 2000', s: '5', u: 'rmf_2000' },
        { n: 'RMF CHILLOUT', s: '6', u: 'rmf_chillout' },
        { n: 'RMF CLASSIC', s: '7', u: 'rmf_classic' },
        { n: 'RMF DANCE', s: '8', u: 'rmf_dance' },
        { n: 'RMF GOLD', s: '9', u: 'rmf_gold' },
        { n: 'RMF LATINO', s: '10', u: 'rmf_latino' },
        { n: 'RMF LOVE', s: '11', u: 'rmf_love' },
        { n: 'RMF PARTY', s: '12', u: 'rmf_party' },
        { n: 'RMF POLSKI ROCK', s: '13', u: 'rmf_polski_rock' },
        { n: 'RMF ROCK', s: '14', u: 'rmf_rock' },
        { n: 'RMF SMOOTH JAZZ', s: '15', u: 'rmf_smooth_jazz' }
    ];

    const player = document.getElementById('player'), grid = document.getElementById('station-grid'), vRange = document.getElementById('v-range');
    let current = -1;

    function clock() {
        const d = new Date();
        document.getElementById('timer').textContent = d.getHours().toString().padStart(2,'0') + ":" + d.getMinutes().toString().padStart(2,'0');
    }
    setInterval(clock, 1000); clock();

    STATIONS.forEach((s, i) => {
        const t = document.createElement('div');
        t.className = 'tile';
        t.innerHTML = `
            <div class="t-top">${s.s}</div>
            <div class="t-bottom">${s.n.split(' ')[1] || 'FM'}</div>
        `;
        t.onclick = () => play(i);
        grid.appendChild(t);
    });

    function play(i) {
        current = i;
        document.querySelectorAll('.tile').forEach((t, idx) => t.classList.toggle('active', idx === i));
        document.getElementById('vst-screen').classList.add('playing');
        document.getElementById('playing-now').textContent = STATIONS[i].n;
        const streamBase = "https://rs201-krk.rmfstream.pl/";
        player.src = (STATIONS[i].n === 'RMF MAXXX') ? 'https://rs7-krk2-cyfronet.rmfstream.pl/RMFMAXXX48' : streamBase + STATIONS[i].u;
        player.play();
    }

    function toggle() {
        if(player.paused) { player.play(); document.getElementById('vst-screen').classList.add('playing'); }
        else { player.pause(); document.getElementById('vst-screen').classList.remove('playing'); }
    }

    function setV(v) { player.volume = v / 100; }
    function adj(d) { vRange.value = parseInt(vRange.value) + d; setV(vRange.value); }
</script>
</body>
</html>
