<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>GEHIRN TREIBER - VITAL TRON</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;600&display=swap');

        :root {
            --neon-cyan: #00f2ff;
            --neon-mag: #bc00ff;
            --panel-bg: #0d1117;
        }

        body {
            background-color: #05070a;
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            overflow: hidden;
        }

        .vital-container {
            width: 950px;
            height: 550px;
            background: var(--panel-bg);
            border: 1px solid #1e2633;
            display: grid;
            grid-template-columns: 250px 1fr 200px;
            padding: 10px;
            gap: 10px;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        /* LEWA KOLUMNA - OSCILLATORS */
        .osc-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .header-label {
            font-family: 'Orbitron';
            font-size: 10px;
            color: var(--neon-cyan);
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .station-card {
            background: #000;
            border-left: 3px solid #1e2633;
            padding: 12px;
            cursor: pointer;
            transition: 0.2s;
        }

        .station-card:hover { background: #161b22; }
        .station-card.active {
            border-left-color: var(--neon-cyan);
            background: rgba(0, 242, 255, 0.05);
        }

        .station-card .num { font-size: 9px; color: #555; font-family: 'Orbitron'; }
        .station-card .name { font-weight: 600; font-size: 14px; display: block; }

        /* ŚRODEK - VISUALIZER AREA */
        .center-display {
            background: #000;
            border: 1px solid #1e2633;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .glitch-text {
            font-family: 'Orbitron';
            font-size: 24px;
            color: var(--neon-mag);
            text-shadow: 0 0 10px var(--neon-mag);
        }

        /* PRAWY PANEL - MASTER */
        .master-section {
            background: #090c10;
            border: 1px solid #1e2633;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }

        .v-slider-container {
            height: 250px;
            width: 40px;
            background: #000;
            border-radius: 20px;
            position: relative;
            display: flex;
            justify-content: center;
        }

        input[type="range"].vertical {
            writing-mode: bt-lr; /* IE */
            appearance: slider-vertical;
            width: 8px;
            height: 220px;
            padding: 0 15px;
        }

        .vital-btn {
            width: 100%;
            background: #1a222d;
            border: 1px solid #333;
            color: #fff;
            padding: 10px;
            font-family: 'Orbitron';
            font-size: 10px;
            cursor: pointer;
        }

        .vital-btn:active { background: var(--neon-mag); }

    </style>
</head>
<body>

<div class="vital-container">
    <!-- Kolumna 1 -->
    <div class="osc-section">
        <div class="header-label">OSCILLATORS / BANKS</div>
        <div id="bank"></div>
    </div>

    <!-- Kolumna 2 -->
    <div class="center-display">
        <div style="font-size: 10px; color: var(--neon-cyan); margin-bottom: 20px;">SIGNAL SPECTRUM</div>
        <div class="glitch-text" id="now-playing">INITIALIZING...</div>
        <div style="margin-top: 50px; width: 80%; height: 2px; background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent);"></div>
    </div>

    <!-- Kolumna 3 -->
    <div class="master-section">
        <div class="header-label">MASTER VOL</div>
        <div class="v-slider-container">
            <input type="range" class="vertical" min="0" max="1" step="0.01" value="0.7" oninput="setVol(this.value)">
        </div>
        <button class="vital-btn" onclick="player.pause()">KILL SIGNAL</button>
    </div>
</div>

<audio id="player"></audio>

<script>
    const player = document.getElementById('player');
    const display = document.getElementById('now-playing');
    
    const STATIONS = [
        { n: 'TECH 88', u: 'https://stream.laut.fm/tech88' },
        { n: 'HR 3 CLUB', u: 'https://stream.laut.fm/hr3_clubnight' },
        { n: '1000 TECHNO', u: 'https://stream.laut.fm/1000techno' },
        { n: 'GEHIRN TREIBER', u: 'https://stream.laut.fm/gehirn-treiber-beat-radio' },
        { n: 'RETRO ELEC', u: 'https://stream.laut.fm/retroelectronicmusic' },
        { n: 'CHRIS BURN', u: 'https://stream.laut.fm/chris_burn' }
    ];

    const bank = document.getElementById('bank');

    STATIONS.forEach((s, i) => {
        const div = document.createElement('div');
        div.className = 'station-card';
        div.innerHTML = `<span class="num">0${i+1}</span><span class="name">${s.n}</span>`;
        div.onclick = () => {
            document.querySelectorAll('.station-card').forEach(c => c.classList.remove('active'));
            div.classList.add('active');
            display.innerText = s.n;
            player.src = s.u;
            player.play();
        };
        bank.appendChild(div);
    });

    function setVol(v) { player.volume = v; }
</script>

</body>
</html>
