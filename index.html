<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TECHNO-TRANCE-PLAYER</title>
    <link href="https://fonts.cdnfonts.com/css/ds-digital" rel="stylesheet">
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            font-family: Arial, sans-serif;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }

        /* OBUDOWA - Zmieniony tylko kształt zewnętrzny na retro-bryłę */
        .radio-frame {
            width: 900px;
            height: 540px;
            background: #111;
            border-radius: 150px / 100px; /* Zaokrąglenie jak na foto */
            border: 3px solid #222;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 80px #000, 0 40px 100px rgba(0,0,0,0.9);
            padding: 20px;
            box-sizing: border-box;
        }

        .radio-frame.powered { border-color: #e60012; }

        /* TWOJE ORYGINALNE ELEMENTY - NIE ZMIENIANE */
        .title-led {
            font-family: 'DS-Digital', monospace;
            font-size: 45px;
            color: #1a0000;
            letter-spacing: 8px;
            margin-bottom: 20px;
            transition: 0.3s;
        }
        .powered .title-led { color: #e60012; text-shadow: 0 0 15px #e60012; }

        .display-box {
            width: 320px;
            height: 140px;
            background: #000;
            border: 4px solid #2a2a2a;
            position: relative;
            overflow: hidden;
        }
        canvas { width: 100%; height: 100%; display: block; }

        .controls-panel {
            background: #181818;
            padding: 10px;
            border: 2px solid #222;
            border-radius: 4px;
            display: flex;
            gap: 10px;
            margin-top: 15px;
            box-shadow: 0 4px 10px #000;
        }

        button {
            width: 55px;
            height: 40px;
            background: #222;
            border: 1px solid #333;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        button svg { width: 20px; fill: #444; }
        .powered button:active { background: #333; }
        .powered button.active svg { fill: #e60012; filter: drop-shadow(0 0 5px #e60012); }

        /* Głośniki w pozycjach ze zdjęcia */
        .speaker {
            width: 230px;
            height: 230px;
            border-radius: 50%;
            background: radial-gradient(circle, #1a1a1a, #050505);
            border: 8px solid #181818;
            position: absolute;
            bottom: 60px;
            box-shadow: inset 0 0 40px #000;
        }
        .speaker.left { left: 50px; }
        .speaker.right { right: 50px; }
        
        .lab-badge {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 1px solid #222;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: #222;
            margin-top: 30px;
        }
        .powered .lab-badge { color: #e60012; border-color: #e60012; }

        .web-link {
            font-size: 10px;
            color: #1a0000;
            margin-top: 50px;
            letter-spacing: 2px;
        }
        .powered .web-link { color: #400; }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="radio-frame" id="mainFrame">
    <div class="title-led">MUZYCZNE RADIO</div>
    
    <div class="speaker left"></div>

    <div class="display-box">
        <canvas id="viz"></canvas>
    </div>

    <div class="controls-panel">
        <button id="pwr"><svg viewBox="0 0 24 24"><path d="M13,3h-2v10h2V3z M17.8,4.5l-1.4,1.4C18.3,7.4,19,9.6,19,12c0,3.9-3.1,7-7,7s-7-3.1-7-7c0-2.4,0.7-4.6,2.6-6.1L6.2,4.5 C3.6,6.4,2,9.5,2,13c0,5.5,4.5,10,10,10s10-4.5,10-10C22,9.5,20.4,6.4,17.8,4.5z"/></svg></button>
        <button id="play"><svg viewBox="0 0 24 24"><path d="M8,5.14V19.14L19,12.14L8,5.14Z"/></svg></button>
        <button id="stop"><svg viewBox="0 0 24 24"><path d="M6,6H18V18H6V6Z"/></svg></button>
        <button id="vDn"><svg viewBox="0 0 24 24"><path d="M19,13H5V11H19V13Z"/></svg></button>
        <button id="vUp"><svg viewBox="0 0 24 24"><path d="M19,13H13V19H11V13H5V11H11V5H13V11H19V13Z"/></svg></button>
    </div>

    <div class="lab-badge">L.A.B.</div>
    <div class="web-link">WWW.MUZYCZNERADIO.PL</div>

    <div class="speaker right"></div>
</div>

<audio id="stream" crossorigin="anonymous" src="https://stream.rcs.revma.com/gzwc1xcq042vv"></audio>

<script>
    const audio = document.getElementById('stream');
    const canvas = document.getElementById('viz');
    const ctx = canvas.getContext('2d');
    const mainFrame = document.getElementById('mainFrame');
    const pwrBtn = document.getElementById('pwr');

    let audioCtx, analyser, source, dataArray, isOn = false;

    pwrBtn.onclick = () => {
        isOn = !isOn;
        mainFrame.classList.toggle('powered');
        pwrBtn.classList.toggle('active');
        if(!isOn) { audio.pause(); render(null); }
    };

    document.getElementById('play').onclick = function() {
        if(!isOn) return;
        if(!audioCtx) {
            audioCtx = new(window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            source = audioCtx.createMediaElementSource(audio);
            source.connect(analyser);
            analyser.fftSize = 64;
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            source.connect(audioCtx.destination);
        }
        audio.play();
        this.classList.add('active');
        loop();
    };

    document.getElementById('stop').onclick = () => {
        audio.pause(); audio.currentTime = 0;
        document.getElementById('play').classList.remove('active');
    };

    document.getElementById('vUp').onclick = () => { audio.volume = Math.min(1, audio.volume + 0.1); };
    document.getElementById('vDn').onclick = () => { audio.volume = Math.max(0, audio.volume - 0.1); };

    function render(data) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const bars = 32;
        const w = canvas.width / bars;
        for (let i = 0; i < bars; i++) {
            const h = data ? (data[i] / 255) * canvas.height : 0;
            ctx.fillStyle = isOn ? '#e60012' : '#1a0000';
            // Twoja stylistyka "segmentowa"
            for(let j=0; j<10; j++) {
                if(j < (h/10)) {
                    ctx.fillRect(i*w + 1, canvas.height - (j*14) - 12, w-2, 10);
                }
            }
        }
    }

    function loop() {
        if(!isOn || audio.paused) return;
        requestAnimationFrame(loop);
        analyser.getByteFrequencyData(dataArray);
        render(dataArray);
    }

    window.onload = () => {
        canvas.width = canvas.clientWidth;
        canvas.height = canvas.clientHeight;
        render(null);
    };
</script>

</body>
</html>
