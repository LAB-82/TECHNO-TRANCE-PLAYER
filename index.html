<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RMF TB-303 PRO TERMINAL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&family=Roboto+Condensed:wght@700&display=swap');

        :root {
            --metal-shine: linear-gradient(180deg, #e8e8e8 0%, #b0b0b0 45%, #7a7a7a 50%, #a0a0a0 55%, #dcdcdc 100%);
            --led-red: #ff0000;
            --led-bg: #400000;
            --lcd-green: #a4f000;
            --tile-metal: #c2c2c2; 
            /* Nowa tekstura dla prawego panelu - jasne szczotkowane aluminium */
            --panel-bg: linear-gradient(135deg, #a8a8a8 0%, #d1d1d1 50%, #a8a8a8 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; cursor: default !important; }
        
        body { 
            height: 100vh; width: 100vw; background: #0a0a0a; 
            display: flex; justify-content: center; align-items: center;
            font-family: 'Roboto Condensed', sans-serif; overflow: hidden;
        }

        .vst-chassis {
            width: 98vw; height: 96vh; background: var(--metal-shine);
            background-image: url('https://www.transparenttextures.com/patterns/brushed-alum.png');
            border: 5px solid #222; border-radius: 8px;
            box-shadow: 0 40px 100px rgba(0,0,0,1);
            padding: 25px; display: flex; flex-direction: column; position: relative;
        }

        header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 20px; border-bottom: 2px solid rgba(0,0,0,0.3); padding-bottom: 15px; }
        .logo h1 { font-family: 'Orbitron'; font-size: 36px; color: #1a1a1a; letter-spacing: -2px; margin: 0; }
        .logo span { font-size: 11px; letter-spacing: 4px; color: #1a1a1a; font-weight: bold; }

        #clock { font-family: 'Share Tech Mono'; font-size: 32px; color: #ffffff; text-shadow: 0 0 15px var(--lcd-green); }

        .main-workspace { display: flex; flex: 1; gap: 20px; min-height: 0; }

        .grid-stations { 
            flex: 1.4; display: grid; grid-template-columns: repeat(5, 1fr); grid-template-rows: repeat(3, 1fr); gap: 15px; 
            background: rgba(0,0,0,0.1); padding: 20px; border: 1px solid rgba(0,0,0,0.2); border-radius: 10px;
        }

        .bt-303 {
            background: var(--tile-metal); 
            border: 1px solid #999;
            border-bottom: 4px solid #666;
            border-radius: 3px;
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px;
            position: relative; transition: 0.05s;
        }
        .bt-303::before { content: ""; position: absolute; top: 8px; width: 6px; height: 6px; background: var(--led-bg); border-radius: 50%; border: 1px solid #000; }
        .bt-303.active .st-label { color: #000; font-weight: 900; }
        .bt-303.active::before { background: var(--led-red); box-shadow: 0 0 8px var(--led-red); }
        .bt-303 .st-label { font-weight: 800; font-size: 12px; color: #333; text-transform: uppercase; pointer-events: none; margin-top: 10px; }
        .bt-303:active { transform: translateY(2px); border-bottom-width: 2px; }

        /* POPRAWIONY PANEL STEROWANIA */
        .pro-panel { 
            flex: 0.6; display: flex; flex-direction: column; gap: 15px; 
            background: var(--panel-bg);
            background-image: url('https://www.transparenttextures.com/patterns/brushed-alum.png');
            padding: 20px; border: 2px solid #666; border-radius: 10px; 
            box-shadow: inset 0 0 10px rgba(255,255,255,0.5), 5px 5px 15px rgba(0,0,0,0.3);
        }

        .lcd-display { background: #000; height: 110px; border: 5px solid #444; padding: 10px; font-family: 'Share Tech Mono'; display: flex; flex-direction: column; justify-content: space-between; }
        .lcd-label { color: var(--lcd-green); font-size: 10px; font-weight: bold; }
        #st-name { font-size: 28px; color: #ffffff; text-shadow: 0 0 10px var(--lcd-green); font-weight: bold; }
        .lcd-sub { color: var(--lcd-green); display: flex; justify-content: space-between; font-size: 11px; }

        .step-sequencer { background: #111; border: 3px solid #333; padding: 10px; display: flex; flex-direction: column; gap: 4px; border-radius: 4px; }
        .step-row { display: flex; gap: 2px; height: 18px; }
        .step { flex: 1; background: #222; border: 1px solid #000; }
        .step.on { background: #ff4400; box-shadow: 0 0 8px #ff4400; }

        .analog-controls { display: flex; flex-direction: column; align-items: center; gap: 15px; }
        
        .pan-section { text-align: center; }
        .pan-leds { display: flex; gap: 8px; justify-content: center; margin-bottom: 8px; }
        .pan-led { width: 8px; height: 8px; background: var(--led-bg); border-radius: 50%; border: 1px solid #111; }
        .pan-led.active { background: var(--led-red); box-shadow: 0 0 8px var(--led-red); }
        
        /* Pokrętło jak na zdjęciu */
        .knob-volume { 
            width: 70px; height: 70px; border-radius: 50%; 
            background: linear-gradient(145deg, #ffffff, #bcbcbc);
            border: 2px solid #888; position: relative; 
            box-shadow: 3px 5px 10px rgba(0,0,0,0.4);
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .knob-volume::before { 
            content: ""; position: absolute; top: 4px; left: 50%; 
            width: 4px; height: 15px; background: #111; 
            transform: translateX(-50%); border-radius: 2px; 
        }

        .volume-row { display: flex; align-items: center; gap: 10px; width: 100%; justify-content: center; }

        /* Przyciski UP/DOWN/RUN białe jak na foto */
        .sq-btn { 
            width: 45px; height: 45px; background: #fff; border: 2px solid #000; 
            border-radius: 2px; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            box-shadow: 2px 2px 0px #666;
        }
        .sq-btn .dot { width: 4px; height: 4px; background: #400; border-radius: 50%; margin-bottom: 4px; }
        .sq-btn span { font-size: 8px; font-weight: 900; color: #000; }

        .fader-track { background: #000; height: 35px; flex: 1; border: 1px solid #444; display: flex; align-items: center; padding: 0 2px; }
        input[type="range"] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type="range"]::-webkit-slider-thumb { 
            -webkit-appearance: none; width: 20px; height: 30px; 
            background: #eee; border: 2px solid #333; cursor: pointer;
        }

        .btn-run-stop { 
            width: 110px; height: 45px; background: #eee; border: 2px solid #000; 
            border-radius: 4px; display: flex; align-items: center; justify-content: center; 
            font-weight: 900; font-size: 13px; color: #000; text-transform: uppercase;
            box-shadow: 3px 3px 0px #666;
        }
        .btn-run-stop:active, .sq-btn:active { transform: translate(1px, 1px); box-shadow: 1px 1px 0px #666; }
    </style>
</head>
<body>

<div class="vst-chassis">
    <header>
        <div class="logo">
            <h1>RMF TB-303</h1>
            <span>COMPUTER CONTROLLED // ACID ENGINE</span>
        </div>
        <div id="clock">00:00:00</div>
    </header>

    <div class="main-workspace">
        <div class="grid-stations" id="grid"></div>
        <aside class="pro-panel">
            <div class="lcd-display">
                <div class="lcd-label">BANK: A1 / PATTERN: 08</div>
                <div id="st-name">STATION IDLE</div>
                <div class="lcd-sub"><span>BITRATE: 128KBPS</span><span id="v-val">VOL: 50%</span></div>
            </div>
            <div class="step-sequencer"><div class="step-row" id="r1"></div><div class="step-row" id="r2"></div><div class="step-row" id="r3"></div></div>
            <div class="analog-controls">
                <div class="pan-section">
                    <div class="pan-leds"><div class="pan-led" id="l-led"></div><div class="pan-led active" id="c-led"></div><div class="pan-led" id="r-led"></div></div>
                    <div class="knob-volume" id="pan-knob"></div>
                    <div style="font-size: 9px; font-weight: bold; margin-top: 5px; color: #111;">PAN L/R</div>
                </div>
                <div class="volume-row">
                    <div class="sq-btn" id="vol-down-btn"><div class="dot"></div><span>DOWN</span></div>
                    <div class="fader-track"><input type="range" id="v-range" min="0" max="100" value="50"></div>
                    <div class="sq-btn" id="vol-up-btn"><div class="dot"></div><span>UP</span></div>
                </div>
                <div class="btn-run-stop" id="run-stop-btn">RUN / STOP</div>
            </div>
        </aside>
    </div>
</div>

<audio id="player" crossorigin="anonymous"></audio>

<script>
    const STATIONS = [
        { n: 'RMF FM', u: 'rmf_fm' }, { n: 'RMF MAXXX', u: 'RMFMAXXX48' }, { n: 'RMF 80s', u: 'rmf_80s' },
        { n: 'RMF 90s', u: 'rmf_90s' }, { n: 'RMF 2000', u: 'rmf_2000' }, { n: 'RMF CHILL', u: 'rmf_chillout' },
        { n: 'RMF CLASSIC', u: 'rmf_classic' }, { n: 'RMF DANCE', u: 'rmf_dance' }, { n: 'RMF GOLD', u: 'rmf_gold' },
        { n: 'RMF LATIN', u: 'rmf_latino' }, { n: 'RMF LOVE', u: 'rmf_love' }, { n: 'RMF PARTY', u: 'rmf_party' },
        { n: 'RMF ROCK', u: 'rmf_polski_rock' }, { n: 'RMF ROCK+', u: 'rmf_rock' }, { n: 'RMF JAZZ', u: 'rmf_smooth_jazz' }
    ];

    const grid = document.getElementById('grid');
    const player = document.getElementById('player');
    const stName = document.getElementById('st-name');
    const vRange = document.getElementById('v-range');
    const panKnob = document.getElementById('pan-knob');

    let audioCtx, source, panner;
    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            source = audioCtx.createMediaElementSource(player);
            panner = audioCtx.createStereoPanner();
            source.connect(panner).connect(audioCtx.destination);
        }
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    STATIONS.forEach((s, i) => {
        const b = document.createElement('div');
        b.className = 'bt-303';
        b.innerHTML = `<div class="st-label">${s.n}</div>`;
        b.addEventListener('click', () => play(i));
        grid.appendChild(b);
    });

    [1, 2, 3].forEach(r => {
        const row = document.getElementById('r'+r);
        for(let i=0; i<16; i++) {
            const s = document.createElement('div');
            s.className = 'step';
            if(Math.random() > 0.8) s.classList.add('on');
            row.appendChild(s);
        }
    });

    function play(i) {
        initAudio();
        document.querySelectorAll('.bt-303').forEach((b, idx) => b.classList.toggle('active', idx === i));
        stName.textContent = STATIONS[i].n;
        player.src = STATIONS[i].n === 'RMF MAXXX' ? 'https://rs7-krk2-cyfronet.rmfstream.pl/RMFMAXXX48' : "https://rs201-krk.rmfstream.pl/" + STATIONS[i].u;
        player.play();
    }

    function stopRadio() { player.pause(); player.src = ""; stName.textContent = "STATION STOPPED"; document.querySelectorAll('.bt-303').forEach(b => b.classList.remove('active')); }
    function setV(v) { player.volume = v/100; document.getElementById('v-val').textContent = `VOL: ${v}%`; }
    function adj(d) { let newVal = Math.min(100, Math.max(0, parseInt(vRange.value) + d)); vRange.value = newVal; setV(newVal); }

    document.getElementById('vol-down-btn').addEventListener('click', () => adj(-5));
    document.getElementById('vol-up-btn').addEventListener('click', () => adj(5));
    document.getElementById('run-stop-btn').addEventListener('click', stopRadio);
    vRange.addEventListener('input', (e) => setV(e.target.value));

    let panPos = 0; 
    panKnob.addEventListener('click', () => {
        initAudio();
        panPos = panPos === 1 ? -1 : panPos + 1;
        panner.pan.setValueAtTime(panPos, audioCtx.currentTime);
        panKnob.style.transform = `rotate(${panPos * 45}deg)`;
        document.getElementById('l-led').classList.toggle('active', panPos === -1);
        document.getElementById('c-led').classList.toggle('active', panPos === 0);
        document.getElementById('r-led').classList.toggle('active', panPos === 1);
    });

    setInterval(() => {
        const d = new Date();
        document.getElementById('clock').textContent = d.toTimeString().split(' ')[0];
        document.querySelectorAll('.step').forEach(s => { if(Math.random()>0.95) s.classList.toggle('on'); });
    }, 1000);
</script>
</body>
</html>
