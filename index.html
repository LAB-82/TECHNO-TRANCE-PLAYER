<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>GEHIRN TREIBER - TRON SYNTH HUD</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap');

        :root {
            --cyan: #00f2ff;
            --magenta: #ff00e5;
            --bg-black: #0b0e14;
            --panel-bg: #151a24;
            --panel-border: #2a3441;
            --slot-bg: #05070a;
            --neon-glow: 0 0 15px rgba(0, 242, 255, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html { 
            width: 100vw; 
            height: 100vh; 
            overflow: hidden; 
            background-color: #080a0f;
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
        }

        .synth-container {
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: 320px 1fr 340px;
            gap: 12px;
            padding: 12px;
            background: linear-gradient(180deg, #10141d 0%, #080a0f 100%);
        }

        /* LEWY PANEL */
        .osc-sidebar { display: flex; flex-direction: column; gap: 8px; height: 100%; }
        
        .track-info-box {
            border: 2px solid var(--panel-border);
            border-left: 4px solid var(--magenta);
            padding: 15px;
            background: var(--panel-bg);
            margin-bottom: 5px;
            min-height: 85px;
            box-shadow: var(--neon-glow);
        }

        .category-header {
            font-family: 'Orbitron';
            font-size: 11px;
            color: #55667a;
            margin: 10px 0 5px 0;
            letter-spacing: 2px;
            border-bottom: 1px solid var(--panel-border);
            padding-bottom: 3px;
        }

        #station-list {
            flex-grow: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding-right: 5px;
        }
        #station-list::-webkit-scrollbar { width: 4px; }
        #station-list::-webkit-scrollbar-thumb { background: var(--panel-border); border-radius: 10px; }

        .osc-module {
            border: 1px solid var(--panel-border);
            padding: 6px;
            background: var(--panel-bg);
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .osc-module:hover { border-color: #4a5a71; background: #1c232e; }
        .osc-module.active { border-color: var(--cyan); background: #1c232e; box-shadow: inset 0 0 10px rgba(0, 242, 255, 0.1); }

        .osc-header { font-size: 9px; color: var(--cyan); letter-spacing: 1px; font-family: 'Orbitron'; margin-bottom: 4px; opacity: 0.8; }
        .station-slot {
            background: var(--slot-bg);
            height: 38px;
            display: flex;
            align-items: center;
            padding-left: 12px;
            font-family: 'Orbitron';
            font-size: 10px;
            border: 1px solid #1a202a;
            color: #cbd5e1;
        }
        .osc-module.active .station-slot { color: #fff; border-color: rgba(0, 242, 255, 0.3); }

        /* ŚRODEK */
        .main-display {
            border: 2px solid var(--panel-border);
            position: relative;
            background: #05070a;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.5);
        }
        #eq-canvas { width: 100%; height: 100%; display: block; }

        /* PRAWY PANEL */
        .control-sidebar { display: flex; flex-direction: column; gap: 12px; }
        .module-box { border: 2px solid var(--panel-border); padding: 20px; background: var(--panel-bg); }
        .envelope-view { 
            height: 180px; width: 100%; 
            background: #05070a; 
            border: 1px solid var(--panel-border);
            position: relative;
        }

        .playback-frame { border: 2px solid var(--panel-border); padding: 20px; background: var(--panel-bg); }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .synth-btn {
            background: #1c232e; border: 1px solid var(--panel-border); color: #fff;
            padding: 12px; font-family: 'Orbitron'; font-size: 10px; cursor: pointer;
            transition: all 0.3s;
        }
        .synth-btn:hover { border-color: var(--cyan); box-shadow: 0 0 10px rgba(0, 242, 255, 0.2); }
        .btn-stop:hover { border-color: var(--magenta); box-shadow: 0 0 10px rgba(255, 0, 229, 0.2); }

        .vol-slider { -webkit-appearance: none; width: 100%; height: 4px; background: #05070a; outline: none; border-radius: 2px; }
        .vol-slider::-webkit-slider-thumb { 
            -webkit-appearance: none; width: 14px; height: 14px; 
            background: var(--cyan); border-radius: 2px; cursor: pointer; 
            box-shadow: 0 0 8px var(--cyan);
        }
    </style>
</head>
<body>

<div class="synth-container">
    <div class="osc-sidebar">
        <div class="track-info-box">
            <div class="osc-header" style="color: var(--magenta);">CURRENT SIGNAL</div>
            <div id="track-title" style="font-size: 13px; font-family: 'Orbitron'; color: #fff; text-shadow: 0 0 8px var(--magenta); line-height: 1.4;">READY TO BOOT...</div>
        </div>
        <div id="station-list">
            <div class="category-header">CORE // TECHNO</div>
            <!-- Dynamic Techno stations -->
            <div id="techno-group"></div>
            <div class="category-header">NODE // HOUSE</div>
            <!-- Dynamic House stations -->
            <div id="house-group"></div>
        </div>
    </div>

    <main class="main-display">
        <canvas id="eq-canvas"></canvas>
    </main>

    <aside class="control-sidebar">
        <div class="module-box">
            <div class="osc-header">ENVELOPE 1 [AMP]</div>
            <div class="envelope-view">
                <svg width="100%" height="100%" viewBox="0 0 100 100" preserveAspectRatio="none">
                    <path d="M0,100 L20,20 L40,50 L80,50 L100,100" fill="none" stroke="var(--cyan)" stroke-width="2" />
                </svg>
            </div>
        </div>

        <div class="playback-frame">
            <div class="osc-header" style="margin-bottom:10px">TRANSPORT CONTROL</div>
            <div class="btn-grid">
                <button class="synth-btn" id="playBtn">START</button>
                <button class="synth-btn btn-stop" id="stopBtn">KILL</button>
            </div>
            <div style="font-size: 10px; margin-bottom: 8px; color: var(--cyan); letter-spacing: 1px;">MASTER GAIN</div>
            <input type="range" class="vol-slider" min="0" max="100" value="70" id="volRange">
        </div>
    </aside>
</div>

<audio id="audio-engine" crossorigin="anonymous"></audio>

<script>
    const STATIONS = {
        techno: [
            { slug: 'tech88', n: 'TECH 88' },
            { slug: 'hr3_clubnight', n: 'HR 3 CLUBNIGHT' },
            { slug: '1000techno', n: '1000 TECHNO' },
            { slug: 'best-of-techno', n: 'BEST OF TECHNO' },
            { slug: 'chris_burn', n: 'CHRIS BURN' },
            { slug: 'retroelectronicmusic', n: 'RETRO ELECTRONIC' },
            { slug: 'gehirn-treiber-beat-radio', n: 'GEHIRN TREIBER' }
        ],
        house: [
            { slug: 'deep-house-sounds', n: 'DEEP HOUSE SOUNDS' },
            { slug: 'housebomb-fn', n: 'HOUSEBOMB FN' },
            { slug: 'symbiotic-beats', n: 'SYMBIOTIC BEATS' },
            { slug: 'house', n: 'HOUSE' },
            { slug: 'faf-records-979', n: 'FAF RECORDS 979' },
            { slug: 'tornadofm', n: 'TORNADO FM' }
        ]
    };

    const audio = document.getElementById('audio-engine');
    const trackTitle = document.getElementById('track-title');
    const canvas = document.getElementById('eq-canvas');
    const ctx = canvas.getContext('2d');
    
    let audioCtx, analyser, source, dataArray;
    let currentSlug = "";

    async function updateMetadata() {
        if (!currentSlug) return;
        try {
            const response = await fetch(`https://api.laut.fm/station/${currentSlug}/current_song`);
            const data = await response.json();
            if (data && data.artist && data.title) {
                trackTitle.textContent = `${data.artist.name.toUpperCase()} - ${data.title.toUpperCase()}`;
            }
        } catch (e) { trackTitle.textContent = "SIGNAL LOST..."; }
    }

    setInterval(updateMetadata, 20000);

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            source = audioCtx.createMediaElementSource(audio);
            source.connect(analyser);
            analyser.connect(audioCtx.destination);
            analyser.fftSize = 512;
            dataArray = new Uint8Array(analyser.frequencyBinCount);
        }
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function createStationList() {
        Object.keys(STATIONS).forEach(cat => {
            const group = document.getElementById(`${cat}-group`);
            STATIONS[cat].forEach((s, index) => {
                const mod = document.createElement('div');
                mod.className = 'osc-module';
                mod.innerHTML = `<div class="osc-header">${cat.toUpperCase()} 0${index+1}</div><div class="station-slot">${s.n}</div>`;
                mod.onclick = () => {
                    initAudio();
                    document.querySelectorAll('.osc-module').forEach(m => m.classList.remove('active'));
                    mod.classList.add('active');
                    currentSlug = s.slug;
                    audio.src = `https://stream.laut.fm/${s.slug}`;
                    audio.play();
                    updateMetadata();
                };
                group.appendChild(mod);
            });
        });
    }

    createStationList();

    document.getElementById('playBtn').onclick = () => { if(audio.src) { initAudio(); audio.play(); }};
    document.getElementById('stopBtn').onclick = () => audio.pause();
    document.getElementById('volRange').oninput = (e) => audio.volume = e.target.value / 100;

    function resize() {
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
    }
    window.onresize = resize;
    resize();

    function draw() {
        requestAnimationFrame(draw);
        ctx.fillStyle = '#05070a';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        if (analyser) analyser.getByteFrequencyData(dataArray);

        const layers = 6;
        for (let l = 0; l < layers; l++) {
            ctx.beginPath();
            ctx.lineWidth = l === 0 ? 3 : 1;
            ctx.strokeStyle = l % 2 === 0 ? `rgba(0, 242, 255, ${0.6 - l*0.1})` : `rgba(255, 0, 229, ${0.3 - l*0.05})`;
            
            for (let i = 0; i < canvas.width; i += 5) {
                const index = Math.floor((i / canvas.width) * (dataArray ? dataArray.length / 2.5 : 1));
                const val = dataArray ? (dataArray[index] / 255) * canvas.height * 0.45 : 0;
                const offset = l * 10;
                const y = (canvas.height / 2) + Math.sin(i * 0.015 + Date.now()*0.0015 + offset) * (val + 2);
                
                if (i === 0) ctx.moveTo(i, y);
                else ctx.lineTo(i, y);
            }
            ctx.stroke();
        }
    }
    draw();
</script>
</body>
</html>
