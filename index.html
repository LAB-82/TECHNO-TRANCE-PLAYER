<!DOCTYPE html><html lang="pl"><head>    <meta charset="UTF-8">    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">    <title>RMF COMMAND CENTER</title>    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat+Alternates:wght@400;600;700&display=swap');
        
        :root {            
            --yellow: #fce300;            
            --yellow-neon: #fffb00;            
            --bg: #020408; /* Bardzo ciemny granat/czerń z obrazka */
            --tile: rgba(10, 15, 25, 0.9);            
            --border: #1a2a44; /* Techniczny błękitny kontur */
            --blue-wave: #00ccff; 
            --panel-shadow: 0 0 20px rgba(252, 227, 0, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }                
        html, body {             
            height: 100vh; width: 100vw;             
            background: var(--bg); color: #fff;             
            font-family: 'Montserrat Alternates', sans-serif;            
            overflow: hidden;         
        }

        /* Efekt pokoju operacyjnego - lekkie gradienty na krawędziach */
        body { 
            display: flex; flex-direction: column; padding: 2vh; 
            background-image: 
                radial-gradient(circle at 50% -20%, #1a2a44 0%, transparent 50%),
                linear-gradient(180deg, #020408 0%, #050a15 100%);
            border: 4px solid #0a1425;
        }

        header {             
            height: 50px; display: flex; justify-content: space-between; align-items: center;            
            border-bottom: 3px solid var(--yellow); margin-bottom: 2vh; flex-shrink: 0;
            box-shadow: 0 5px 15px rgba(252, 227, 0, 0.2);
            padding: 0 15px;
            background: rgba(0,0,0,0.4);
        }        
        .header-info { font-size: 24px; font-weight: 700; color: var(--yellow); text-transform: uppercase; letter-spacing: 2px; }        
        .clock { color: var(--yellow); font-size: 24px; font-weight: 700; font-variant-numeric: tabular-nums; }

        .app-content { display: flex; flex: 1; gap: 3vw; min-height: 0; }
        
        .grid {             
            flex: 1.4; display: grid;             
            grid-template-columns: repeat(5, 1fr);             
            grid-template-rows: repeat(3, 1fr);             
            gap: 12px;         
        }

        /* TILE - STYL MODULARNEGO PANELU Z image_15e5a2.jpg */
        .tile {            
            background: var(--tile); 
            border: 1px solid var(--border); 
            border-left: 4px solid var(--border); /* Akcent boczny typowy dla HUD */
            border-radius: 2px;            
            display: flex; flex-direction: column; align-items: center; justify-content: center;            
            cursor: pointer; position: relative; overflow: visible;
            transition: all 0.2s ease;
        }

        .tile .t-top { font-size: 20px; font-weight: 700; color: var(--yellow); line-height: 1; z-index: 2; opacity: 0.8; }        
        .tile .t-bottom { font-size: 13px; font-weight: 600; color: #4e6a8e; margin-top: 4px; text-align: center; z-index: 2; text-transform: uppercase; }

        /* AKTYWNY PANEL - ROZŚWIETLENIE CENTER-COMMAND */
        .tile.active {             
            border-color: var(--yellow-neon);
            border-left-color: var(--yellow-neon);
            background: rgba(252, 227, 0, 0.08);
            box-shadow: 0 0 25px rgba(252, 227, 0, 0.3), inset 0 0 10px rgba(252, 227, 0, 0.1);
            transform: scale(1.02);
        }        
        .tile.active .t-top, .tile.active .t-bottom { color: var(--yellow-neon); opacity: 1; text-shadow: 0 0 8px var(--yellow); }

        /* FALE BŁĘKITNE - ZACHOWANA LOGIKA I KOLOR */
        .waves {            
            position: absolute; width: 100%; height: 100%;            
            display: flex; align-items: center; justify-content: center;            
            pointer-events: none; opacity: 0; z-index: 1;        
        }        
        .tile.active .waves { opacity: 1; }        
        .wave {            
            position: absolute; border: 1px solid var(--blue-wave); border-radius: 50%;            
            width: 10px; height: 10px; opacity: 0;            
            box-shadow: 0 0 15px var(--blue-wave);            
            animation: ripple 3s infinite linear;        
        }        
        .wave:nth-child(2) { animation-delay: 1s; }        
        .wave:nth-child(3) { animation-delay: 2s; }

        @keyframes ripple {            
            0% { width: 0; height: 0; opacity: 0.9; }            
            100% { width: 300%; height: 300%; opacity: 0; }        
        }

        .sidebar {             
            flex: 0.6; display: flex; flex-direction: column;             
            align-items: center; justify-content: center; gap: 4vh;            
            border: 1px solid var(--border); 
            background: rgba(5, 10, 20, 0.8);
            padding: 20px;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.5);
        }

        /* LOGO DISPLAY - STYL MONITORA Z OBRAZKA */
        .logo-display {            
            width: 100%; max-width: 320px; aspect-ratio: 16/10;            
            border: 2px solid var(--border); 
            border-top: 4px solid var(--yellow);
            display: flex; flex-direction: column; align-items: center; justify-content: center;            
            background: #000;            
            position: relative;
            box-shadow: var(--panel-shadow);
        }        
        .logo-display h2 { font-size: 40px; color: var(--yellow); text-shadow: 0 0 15px var(--yellow); }        
        .logo-display p { font-size: 11px; color: #4e6a8e; font-weight: 700; text-transform: uppercase; letter-spacing: 3px; }

        .controls { display: flex; align-items: center; gap: 3vw; }        
        .c-svg {             
            width: 35px; height: 35px; fill: var(--yellow); cursor: pointer;             
            filter: drop-shadow(0 0 5px var(--yellow)); 
        }        
        .c-play { width: 75px; height: 75px; filter: drop-shadow(0 0 15px var(--yellow)); }

        .vol-box { display: flex; align-items: center; gap: 15px; width: 100%; }        
        .vol-btn { 
            width: 40px; height: 40px; border: 1px solid var(--border); 
            background: var(--tile); color: var(--yellow); cursor: pointer; 
            font-size: 18px; font-weight: bold;
        }        
        .vol-bar { 
            flex: 1; height: 40px; border: 1px solid var(--border); 
            background: #000; display: flex; align-items: center; padding: 0 10px;
        }                
        input[type="range"] { flex: 1; appearance: none; background: #1a2a44; height: 4px; outline: none; }        
        input[type="range"]::-webkit-slider-thumb {             
            appearance: none; width: 12px; height: 24px;             
            background: var(--yellow); border-radius: 0;             
            cursor: pointer; box-shadow: 0 0 10px var(--yellow);
        }        
        input[type="range"].at-mid::-webkit-slider-thumb {            
            background: #fff; box-shadow: 0 0 20px #fff;
        }

        @media (max-width: 600px) {            
            .app-content { flex-direction: column; }            
            .grid { grid-template-columns: repeat(3, 1fr); height: 45vh; flex: none; }            
            .sidebar { width: 100%; padding: 10px; gap: 20px; }        
        }
    </style></head><body>

<header>    
    <div class="header-info" id="playing-now">GRA: RMF FM</div>    
    <div class="clock" id="timer">00:00</div>
</header>

<div class="app-content">    
    <div class="grid" id="station-grid"></div>
    <aside class="sidebar">        
        <div class="logo-display">            
            <h2>RMF FM</h2>            
            <p>Najlepsza muzyka</p>        
        </div>
        <div class="controls">            
            <svg class="c-svg" viewBox="0 0 24 24" onclick="skip(-1)"><path d="M6,18V6H8V18H6M9.5,12L18,6V18L9.5,12Z"/></svg>            
            <svg class="c-svg c-play" viewBox="0 0 24 24" onclick="toggle()"><path id="p-ico" d="M8,5.14V19.14L19,12.14L8,5.14Z"/></svg>            
            <svg class="c-svg" viewBox="0 0 24 24" onclick="skip(1)"><path d="M16,18H18V6H16M6,18L14.5,12L6,6V18Z"/></svg>        
        </div>
        <div class="vol-box">            
            <button class="vol-btn" onclick="adj(-5)">-</button>            
            <div class="vol-bar">                
                <input type="range" id="v-range" class="at-mid" min="0" max="100" value="50" oninput="setV(this.value)">            
            </div>            
            <button class="vol-btn" onclick="adj(5)">+</button>        
        </div>    
    </aside>
</div>

<audio id="player"></audio>

<script>    
    const STATIONS = [        
        { n: 'RMF FM', s: 'RMF FM', u: 'rmf_fm' },        
        { n: 'RMF MAXXX', s: 'Maxxx', u: 'RMFMAXXX48' },        
        { n: 'RMF 80s', s: '80s', u: 'rmf_80s' },        
        { n: 'RMF 90s', s: '90s', u: 'rmf_90s' },        
        { n: 'RMF 2000', s: '2000', u: 'rmf_2000' },        
        { n: 'RMF CHILLOUT', s: 'Chillout', u: 'rmf_chillout' },        
        { n: 'RMF CLASSIC', s: 'Classic', u: 'rmf_classic' },        
        { n: 'RMF DANCE', s: 'Dance', u: 'rmf_dance' },        
        { n: 'RMF GOLD', s: 'Gold', u: 'rmf_gold' },        
        { n: 'RMF LATINO', s: 'Latino', u: 'rmf_latino' },        
        { n: 'RMF LOVE', s: 'Love', u: 'rmf_love' },        
        { n: 'RMF PARTY', s: 'Party', u: 'rmf_party' },        
        { n: 'RMF POLSKI ROCK', s: 'Polski Rock', u: 'rmf_polski_rock' },        
        { n: 'RMF ROCK', s: 'Rock', u: 'rmf_rock' },        
        { n: 'RMF SMOOTH JAZZ', s: 'Smooth Jazz', u: 'rmf_smooth_jazz' }    
    ];

    const player = document.getElementById('player'), ico = document.getElementById('p-ico'), grid = document.getElementById('station-grid'), vRange = document.getElementById('v-range');    
    let current = -1;

    function clock() {        
        const d = new Date();        
        document.getElementById('timer').textContent = d.getHours().toString().padStart(2,'0') + ":" + d.getMinutes().toString().padStart(2,'0');    
    }    
    setInterval(clock, 1000); clock();

    STATIONS.forEach((s, i) => {        
        const t = document.createElement('div');        
        t.className = 'tile';        
        t.innerHTML = `            
            <div class="waves"><div class="wave"></div><div class="wave"></div><div class="wave"></div></div>            
            <div class="t-top">RMF FM</div>            
            <div class="t-bottom">${s.s}</div>        `;        
        t.onclick = () => play(i);        
        grid.appendChild(t);    
    });

    function play(i) {        
        current = i;        
        document.querySelectorAll('.tile').forEach((t, idx) => t.classList.toggle('active', idx === i));        
        document.getElementById('playing-now').textContent = "GRA: " + STATIONS[i].n;        
        const streamBase = "https://rs201-krk.rmfstream.pl/";        
        player.src = (STATIONS[i].n === 'RMF MAXXX') ? 'https://rs7-krk2-cyfronet.rmfstream.pl/RMFMAXXX48' : streamBase + STATIONS[i].u;        
        player.play();        
        ico.setAttribute('d', 'M14,19H18V5H14M6,19H10V5H6V19Z');    
    }

    function toggle() {        
        if(player.paused) { player.play(); ico.setAttribute('d', 'M14,19H18V5H14M6,19H10V5H6V19Z'); }        
        else { player.pause(); ico.setAttribute('d', 'M8,5.14V19.14L19,12.14L8,5.14Z'); }    
    }

    function skip(d) { let n = current + d; if(n >= 0 && n < STATIONS.length) play(n); }        
    function setV(v) {         
        player.volume = v / 100;        
        if(parseInt(v) === 50) vRange.classList.add('at-mid');        
        else vRange.classList.remove('at-mid');    
    }        
    function adj(d) { vRange.value = parseInt(vRange.value) + d; setV(vRange.value); }</script></body></html>
