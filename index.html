<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RMF V4LVE TERMINAL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap');

        :root {
            --bg-gradient: linear-gradient(135deg, #f39c12, #e74c3c, #9b59b6, #3498db);
            --glass-bg: rgba(255, 255, 255, 0.15);
            --panel-white: #f0f2f5;
            --text-dark: #4a4a4a;
            --accent-pink: #ff4d6d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            height: 100vh; width: 100vw; 
            background: var(--bg-gradient);
            font-family: 'Montserrat', sans-serif;
            display: flex; flex-direction: column;
            padding: 1.5vh; overflow: hidden; 
        }

        /* HEADER - STYL V4LVE */
        header { 
            height: 60px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(255, 255, 255, 0.8); border-radius: 30px;
            margin-bottom: 2vh; padding: 0 25px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        .header-info { font-weight: 800; font-size: 18px; color: #e67e22; letter-spacing: 1px; }
        .preset-bar { 
            background: #fff; padding: 8px 40px; border-radius: 20px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05); font-size: 13px; font-weight: 600;
        }

        .app-content { display: flex; flex: 1; gap: 20px; min-height: 0; }

        /* GRID - ORYGINALNY UKŁAD 5x3 W STYLU SZKLANYM */
        .grid { 
            flex: 1.4; display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            grid-template-rows: repeat(3, 1fr); 
            gap: 12px; 
        }

        .tile {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 15px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.3s ease;
        }

        .tile:hover { background: rgba(255, 255, 255, 0.25); transform: translateY(-2px); }

        .tile .t-top { font-size: 10px; font-weight: 800; color: rgba(255,255,255,0.7); text-transform: uppercase; }
        .tile .t-bottom { font-size: 15px; font-weight: 700; color: #fff; margin-top: 4px; text-shadow: 0 2px 4px rgba(0,0,0,0.2); }

        /* AKTYWNA STACJA - PODŚWIETLENIE Z V4LVE */
        .tile.active {
            background: rgba(255, 255, 255, 0.4);
            border: 2px solid #fff;
            box-shadow: 0 0 20px rgba(255,255,255,0.4);
        }

        /* SIDEBAR - BIAŁY PANEL Z GAŁKAMI */
        .sidebar { 
            flex: 0.7; background: var(--panel-white); border-radius: 25px;
            display: flex; flex-direction: column; 
            align-items: center; justify-content: space-around;
            padding: 30px; box-shadow: 0 15px 45px rgba(0,0,0,0.15);
            position: relative;
        }

        /* GAŁKA (KNOB) - STYL V4LVE */
        .knob-container { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        
        .knob-outer {
            width: 100px; height: 100px;
            background: #fff; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.08), inset 0 -2px 5px rgba(0,0,0,0.05);
            position: relative; cursor: ns-resize;
        }
        
        /* Kolorowy pierścień wokół gałki */
        .knob-outer::after {
            content: ''; position: absolute; inset: 5px;
            border-radius: 50%; border: 3px solid #eee;
        }
        
        .knob-inner {
            width: 70px; height: 70px; background: #f8f9fa; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 3px 3px 10px rgba(0,0,0,0.1);
            font-weight: 700; color: var(--text-dark);
        }

        .knob-dot {
            position: absolute; top: 12px; width: 6px; height: 6px;
            background: var(--accent-pink); border-radius: 50%;
            box-shadow: 0 0 5px var(--accent-pink);
        }

        .label { font-size: 11px; font-weight: 800; color: #a0a0a0; text-transform: uppercase; letter-spacing: 1px; }

        /* PRZYCISKI STEROWANIA */
        .controls { display: flex; gap: 20px; align-items: center; }
        .btn-ctrl {
            width: 55px; height: 55px; background: #fff; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05); cursor: pointer; transition: 0.2s;
        }
        .btn-ctrl:active { transform: scale(0.9); }
        .btn-ctrl svg { width: 20px; height: 20px; fill: #bbb; }
        .btn-ctrl.play { width: 70px; height: 70px; background: #fff; border: 2px solid #eee; }
        .btn-ctrl.play svg { width: 30px; height: 30px; fill: var(--accent-pink); }

        @media (max-width: 600px) {
            .app-content { flex-direction: column; overflow-y: auto; }
            .grid { grid-template-columns: repeat(3, 1fr); height: auto; flex: none; }
            .sidebar { flex: none; width: 100%; height: auto; padding: 20px; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-info">⚡ V4LVE</div>
    <div class="preset-bar" id="playing-now">Factory > Default*</div>
    <div style="font-weight: 800; color: #bbb;" id="timer">00:00</div>
</header>

<div class="app-content">
    <div class="grid" id="station-grid"></div>

    <aside class="sidebar">
        <div class="knob-container">
            <div class="knob-outer" id="knob" onmousedown="startRotate(event)" ontouchstart="startRotate(event)">
                <div class="knob-dot" id="knob-pointer"></div>
                <div class="knob-inner" id="vol-txt">50%</div>
            </div>
            <div class="label">Output Gain</div>
        </div>

        <div class="controls">
            <div class="btn-ctrl" onclick="skip(-1)">
                <svg viewBox="0 0 24 24"><path d="M6,18V6H8V18H6M9.5,12L18,6V18L9.5,12Z"/></svg>
            </div>
            <div class="btn-ctrl play" onclick="toggle()">
                <svg viewBox="0 0 24 24"><path id="p-ico" d="M8,5.14V19.14L19,12.14L8,5.14Z"/></svg>
            </div>
            <div class="btn-ctrl" onclick="skip(1)">
                <svg viewBox="0 0 24 24"><path d="M16,18H18V6H16M6,18L14.5,12L6,6V18Z"/></svg>
            </div>
        </div>

        <div style="text-align: center;">
            <div class="label">Sonic Digital</div>
            <div style="font-size: 9px; color: #ccc; margin-top: 5px;">RMF TERMINAL EMULATION</div>
        </div>
    </aside>
</div>

<audio id="player"></audio>

<script>
    const STATIONS = [
        { n: 'RMF FM', s: 'RMF FM', u: 'rmf_fm' },
        { n: 'RMF MAXXX', s: 'Maxxx', u: 'RMFMAXXX48' },
        { n: 'RMF 80s', s: '80s', u: 'rmf_80s' },
        { n: 'RMF 90s', s: '90s', u: 'rmf_90s' },
        { n: 'RMF 2000', s: '2000', u: 'rmf_2000' },
        { n: 'RMF CHILLOUT', s: 'Chillout', u: 'rmf_chillout' },
        { n: 'RMF CLASSIC', s: 'Classic', u: 'rmf_classic' },
        { n: 'RMF DANCE', s: 'Dance', u: 'rmf_dance' },
        { n: 'RMF GOLD', s: 'Gold', u: 'rmf_gold' },
        { n: 'RMF LATINO', s: 'Latino', u: 'rmf_latino' },
        { n: 'RMF LOVE', s: 'Love', u: 'rmf_love' },
        { n: 'RMF PARTY', s: 'Party', u: 'rmf_party' },
        { n: 'RMF POLSKI ROCK', s: 'P-Rock', u: 'rmf_polski_rock' },
        { n: 'RMF ROCK', s: 'Rock', u: 'rmf_rock' },
        { n: 'RMF SMOOTH JAZZ', s: 'Smooth', u: 'rmf_smooth_jazz' }
    ];

    const player = document.getElementById('player'), ico = document.getElementById('p-ico'), grid = document.getElementById('station-grid');
    let current = -1;
    let volume = 50;

    function clock() {
        const d = new Date();
        document.getElementById('timer').textContent = d.getHours().toString().padStart(2,'0') + ":" + d.getMinutes().toString().padStart(2,'0');
    }
    setInterval(clock, 1000); clock();

    STATIONS.forEach((s, i) => {
        const t = document.createElement('div');
        t.className = 'tile';
        t.innerHTML = `<div class="t-top">Band 0${i+1}</div><div class="t-bottom">${s.s}</div>`;
        t.onclick = () => play(i);
        grid.appendChild(t);
    });

    function play(i) {
        current = i;
        document.querySelectorAll('.tile').forEach((t, idx) => t.classList.toggle('active', idx === i));
        document.getElementById('playing-now').textContent = `Station > ${STATIONS[i].n}*`;
        const streamBase = "https://rs201-krk.rmfstream.pl/";
        player.src = (STATIONS[i].n === 'RMF MAXXX') ? 'https://rs7-krk2-cyfronet.rmfstream.pl/RMFMAXXX48' : streamBase + STATIONS[i].u;
        player.play();
        ico.setAttribute('d', 'M14,19H18V5H14M6,19H10V5H6V19Z');
    }

    function toggle() {
        if(player.paused) { player.play(); ico.setAttribute('d', 'M14,19H18V5H14M6,19H10V5H6V19Z'); }
        else { player.pause(); ico.setAttribute('d', 'M8,5.14V19.14L19,12.14L8,5.14Z'); }
    }

    function skip(d) { let n = current + d; if(n >= 0 && n < STATIONS.length) play(n); }

    // OBSŁUGA GAŁKI GŁOŚNOŚCI (Knob)
    let isDragging = false;
    let startY = 0;

    function startRotate(e) {
        isDragging = true;
        startY = e.clientY || e.touches[0].clientY;
        document.addEventListener('mousemove', onRotate);
        document.addEventListener('mouseup', stopRotate);
        document.addEventListener('touchmove', onRotate);
        document.addEventListener('touchend', stopRotate);
    }

    function onRotate(e) {
        if (!isDragging) return;
        const currentY = e.clientY || e.touches[0].clientY;
        const diff = startY - currentY;
        volume = Math.min(Math.max(volume + diff * 0.5, 0), 100);
        startY = currentY;
        updateKnob();
    }

    function stopRotate() { isDragging = false; }

    function updateKnob() {
        const rotation = (volume * 2.8) - 140; // Skalowanie obrotu kropki
        document.getElementById('knob-pointer').style.transform = `rotate(${rotation}deg) translateY(-35px)`;
        document.getElementById('vol-txt').textContent = Math.round(volume) + "%";
        player.volume = volume / 100;
    }
    
    updateKnob(); // Inicjalizacja
</script>
</body>
</html>
