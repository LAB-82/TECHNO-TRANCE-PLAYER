<!DOCTYPE html><html lang="pl"><head>    <meta charset="UTF-8">    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">    <title>RMF CYBER MAINFRAME</title>    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat+Alternates:wght@400;600;700&display=swap');
        
        :root {            
            --yellow: #fce300;            
            --yellow-neon: #fffb00;            
            --bg: #010810; 
            --tile: rgba(0, 20, 40, 0.7);            
            --border: #004a7c; 
            --accent-red: #ff1a1a; 
            --blue-wave: #00f2ff; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }                
        html, body {             
            height: 100vh; width: 100vw;             
            background: var(--bg); color: #fff;             
            font-family: 'Montserrat Alternates', sans-serif;            
            overflow: hidden;         
        }

        body { 
            display: flex; flex-direction: column; padding: 2vh; 
            background-image: 
                linear-gradient(rgba(0, 74, 124, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 74, 124, 0.1) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        header {             
            height: 50px; display: flex; justify-content: space-between; align-items: center;            
            border: 1px solid var(--border); border-left: 5px solid var(--yellow);
            margin-bottom: 2vh; flex-shrink: 0;
            padding: 0 15px; background: rgba(0, 0, 0, 0.8);
        }        
        .header-info { font-size: 22px; font-weight: 700; color: var(--yellow); text-transform: uppercase; }        
        .clock { color: var(--blue-wave); font-size: 24px; font-weight: 700; }

        .app-content { display: flex; flex: 1; gap: 2vw; min-height: 0; }
        .grid {             
            flex: 1.4; display: grid;             
            grid-template-columns: repeat(5, 1fr);             
            grid-template-rows: repeat(3, 1fr);             
            gap: 10px;         
        }

        .tile {            
            background: var(--tile); 
            border: 1px solid var(--border); 
            display: flex; flex-direction: column; align-items: center; justify-content: center;            
            cursor: pointer; position: relative; overflow: visible;
            transition: 0.15s;
        }

        .tile .t-top { font-size: 18px; font-weight: 700; color: var(--yellow); z-index: 2; }        
        .tile .t-bottom { font-size: 11px; font-weight: 600; color: var(--blue-wave); margin-top: 5px; text-align: center; z-index: 2; }

        .tile.active {             
            border: 1px solid var(--yellow-neon);
            background: rgba(252, 227, 0, 0.1);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.4);
        }        

        .waves {            
            position: absolute; width: 100%; height: 100%;            
            display: flex; align-items: center; justify-content: center;            
            pointer-events: none; opacity: 0; z-index: 1;        
        }        
        .tile.active .waves { opacity: 1; }        
        .wave {            
            position: absolute; border: 2px solid var(--blue-wave); border-radius: 50%; /* POWRÓT DO OKRĘGU */
            width: 10px; height: 10px; opacity: 0;            
            animation: ripple 2.5s infinite linear;        
        }        
        .wave:nth-child(2) { animation-delay: 0.8s; }        
        .wave:nth-child(3) { animation-delay: 1.6s; }

        @keyframes ripple {            
            0% { width: 0; height: 0; opacity: 1; }            
            100% { width: 250%; height: 250%; opacity: 0; }        
        }

        .sidebar {             
            flex: 0.6; display: flex; flex-direction: column;             
            align-items: center; justify-content: center; gap: 3vh;            
            border: 1px solid var(--border); background: rgba(0, 10, 20, 0.9); padding: 20px;
        }

        .logo-display {            
            width: 100%; max-width: 300px; aspect-ratio: 1/1;            
            border: 1px solid var(--blue-wave);
            display: flex; flex-direction: column; align-items: center; justify-content: center;            
            background: radial-gradient(circle, #002244 0%, #000 100%);            
        }        
        .logo-display h2 { font-size: 36px; color: var(--yellow); }        
        .logo-display p { font-size: 10px; color: var(--blue-wave); letter-spacing: 4px; }

        .controls { display: flex; align-items: center; gap: 2vw; }        
        .c-svg { width: 35px; height: 35px; fill: var(--blue-wave); cursor: pointer; }        
        .c-play { width: 70px; height: 70px; fill: var(--yellow); }

        .vol-box { display: flex; align-items: center; gap: 10px; width: 100%; }        
        .vol-btn { width: 35px; height: 35px; border: 1px solid var(--blue-wave); background: none; color: var(--blue-wave); cursor: pointer; }        
        .vol-bar { flex: 1; height: 30px; border: 1px solid var(--border); background: #000; display: flex; align-items: center; padding: 0 5px; }                
        input[type="range"] { flex: 1; appearance: none; background: #002244; height: 8px; }        
        input[type="range"]::-webkit-slider-thumb { appearance: none; width: 15px; height: 15px; background: var(--yellow); cursor: pointer; }

        @media (max-width: 600px) {            
            .grid { grid-template-columns: repeat(3, 1fr); height: 45vh; flex: none; }            
            .sidebar { width: 100%; }
        }
    </style></head><body>

<header>    
    <div class="header-info" id="playing-now">GRA: RMF FM</div>    
    <div class="clock" id="timer">00:00</div>
</header>

<div class="app-content">    
    <div class="grid" id="station-grid"></div>
    <aside class="sidebar">        
        <div class="logo-display">            
            <h2>RMF FM</h2>            
            <p>MAINFRAME ACTIVE</p>        
        </div>
        <div class="controls">            
            <svg class="c-svg" viewBox="0 0 24 24" onclick="skip(-1)"><path d="M6,18V6H8V18H6M9.5,12L18,6V18L9.5,12Z"/></svg>            
            <svg class="c-svg c-play" viewBox="0 0 24 24" onclick="toggle()"><path id="p-ico" d="M8,5.14V19.14L19,12.14L8,5.14Z"/></svg>            
            <svg class="c-svg" viewBox="0 0 24 24" onclick="skip(1)"><path d="M16,18H18V6H16M6,18L14.5,12L6,6V18Z"/></svg>        
        </div>
        <div class="vol-box">            
            <button class="vol-btn" onclick="adj(-5)">-</button>            
            <div class="vol-bar">                
                <input type="range" id="v-range" class="at-mid" min="0" max="100" value="50" oninput="setV(this.value)">            
            </div>            
            <button class="vol-btn" onclick="adj(5)">+</button>        
        </div>    
    </aside>
</div>

<audio id="player"></audio>

<script>    
    const STATIONS = [        
        { n: 'RMF FM', s: 'RMF FM', u: 'rmf_fm' },        
        { n: 'RMF MAXXX', s: 'Maxxx', u: 'RMFMAXXX48' },        
        { n: 'RMF 80s', s: '80s', u: 'rmf_80s' },        
        { n: 'RMF 90s', s: '90s', u: 'rmf_90s' },        
        { n: 'RMF 2000', s: '2000', u: 'rmf_2000' },        
        { n: 'RMF CHILLOUT', s: 'Chillout', u: 'rmf_chillout' },        
        { n: 'RMF CLASSIC', s: 'Classic', u: 'rmf_classic' },        
        { n: 'RMF DANCE', s: 'Dance', u: 'rmf_dance' },        
        { n: 'RMF GOLD', s: 'Gold', u: 'rmf_gold' },        
        { n: 'RMF LATINO', s: 'Latino', u: 'rmf_latino' },        
        { n: 'RMF LOVE', s: 'Love', u: 'rmf_love' },        
        { n: 'RMF PARTY', s: 'Party', u: 'rmf_party' },        
        { n: 'RMF POLSKI ROCK', s: 'Polski Rock', u: 'rmf_polski_rock' },        
        { n: 'RMF ROCK', s: 'Rock', u: 'rmf_rock' },        
        { n: 'RMF SMOOTH JAZZ', s: 'Smooth Jazz', u: 'rmf_smooth_jazz' }    
    ];

    const player = document.getElementById('player'), ico = document.getElementById('p-ico'), grid = document.getElementById('station-grid'), vRange = document.getElementById('v-range');    
    let current = -1;

    function clock() {        
        const d = new Date();        
        document.getElementById('timer').textContent = d.getHours().toString().padStart(2,'0') + ":" + d.getMinutes().toString().padStart(2,'0');    
    }    
    setInterval(clock, 1000); clock();

    STATIONS.forEach((s, i) => {        
        const t = document.createElement('div');        
        t.className = 'tile';        
        t.innerHTML = `            
            <div class="waves"><div class="wave"></div><div class="wave"></div><div class="wave"></div></div>            
            <div class="t-top">RMF FM</div>            
            <div class="t-bottom">${s.s}</div>        `;        
        t.onclick = () => play(i);        
        grid.appendChild(t);    
    });

    function play(i) {        
        current = i;        
        document.querySelectorAll('.tile').forEach((t, idx) => t.classList.toggle('active', idx === i));        
        document.getElementById('playing-now').textContent = "GRA: " + STATIONS[i].n;        
        const streamBase = "https://rs201-krk.rmfstream.pl/";        
        player.src = (STATIONS[i].n === 'RMF MAXXX') ? 'https://rs7-krk2-cyfronet.rmfstream.pl/RMFMAXXX48' : streamBase + STATIONS[i].u;        
        player.play();        
        ico.setAttribute('d', 'M14,19H18V5H14M6,19H10V5H6V19Z');    
    }

    function toggle() {        
        if(player.paused) { player.play(); ico.setAttribute('d', 'M14,19H18V5H14M6,19H10V5H6V19Z'); }        
        else { player.pause(); ico.setAttribute('d', 'M8,5.14V19.14L19,12.14L8,5.14Z'); }    
    }

    function skip(d) { let n = current + d; if(n >= 0 && n < STATIONS.length) play(n); }        
    function setV(v) {         
        player.volume = v / 100;        
        if(parseInt(v) === 50) vRange.classList.add('at-mid');        
        else vRange.classList.remove('at-mid');    
    }        
    function adj(d) { vRange.value = parseInt(vRange.value) + d; setV(vRange.value); }</script></body></html>
