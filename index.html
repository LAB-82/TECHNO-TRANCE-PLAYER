<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TECHNO-TRANCE-PLAYER - Original Controls</title>
    <link href="https://fonts.cdnfonts.com/css/ds-digital" rel="stylesheet">
    <style>
        /* Stylistyka tła i body z Twojego projektu */
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            font-family: Arial, sans-serif;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }

        /* Obudowa radia dopasowana do zdjęcia, ale bez ingerencji w przyciski */
        .radio-frame {
            width: 900px;
            height: 500px;
            background: #111;
            border-radius: 140px / 90px; /* Kształt ze zdjęcia */
            border: 2px solid #222;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 50px #000, 0 30px 60px rgba(0,0,0,0.8);
        }

        .radio-frame.powered { border-color: #e60012; }

        /* TWOJE ORYGINALNE PRZYCISKI - NIETKNIĘTE */
        button {
            width: 50px; height: 50px;
            border-radius: 50%;
            background: #0a0a0a;
            border: 2px solid #333;
            cursor: pointer;
            transition: 0.3s;
            margin: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        button svg { width: 24px; height: 24px; fill: #333; }

        .powered button { border-color: #444; }
        .powered button.active { 
            border-color: #e60012; 
            box-shadow: 0 0 15px #e60012; 
        }
        .powered button.active svg { fill: #e60012; }

        /* TWOJE POKRĘTŁA / PRZYCISKI VOL */
        .vol-btn {
            width: 70px; height: 70px;
            background: radial-gradient(circle, #1a1a1a, #000);
        }

        /* TWOJA SEKCJA DISPLAY */
        .display-container {
            width: 280px;
            height: 160px;
            background: #000;
            border: 2px solid #333;
            margin-bottom: 20px;
            position: relative;
        }
        canvas { width: 100%; height: 100%; }

        /* Głośniki w układzie ze zdjęcia */
        .speaker {
            width: 220px; height: 220px;
            border-radius: 50%;
            background: radial-gradient(circle, #151515, #050505);
            border: 5px solid #1a1a1a;
            position: absolute;
            top: 120px;
        }
        .speaker.left { left: 40px; }
        .speaker.right { right: 40px; }

        .center-interface {
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .controls-row { display: flex; gap: 10px; }
        
        .title {
            font-family: 'DS-Digital', monospace;
            font-size: 24px;
            color: #200;
            margin-bottom: 15px;
        }
        .powered .title { color: #e60012; text-shadow: 0 0 10px #e60012; }

        .lab-text { color: #222; font-weight: bold; margin-top: 10px; }
        .powered .lab-text { color: #e60012; }
    </style>
</head>
<body>

<div class="radio-frame" id="mainFrame">
    <div class="speaker left"></div>

    <div class="center-interface">
        <div class="title">MUZYCZNE RADIO</div>
        
        <!-- TWÓJ WYŚWIETLACZ -->
        <div class="display-container">
            <canvas id="visualizer"></canvas>
        </div>

        <!-- TWOJE PRZYCISKI STEROWANIA -->
        <div class="controls-row">
            <button id="pwr"><svg viewBox="0 0 24 24"><path d="M13,3h-2v10h2V3z M17.8,4.5l-1.4,1.4C18.3,7.4,19,9.6,19,12c0,3.9-3.1,7-7,7s-7-3.1-7-7c0-2.4,0.7-4.6,2.6-6.1L6.2,4.5 C3.6,6.4,2,9.5,2,13c0,5.5,4.5,10,10,10s10-4.5,10-10C22,9.5,20.4,6.4,17.8,4.5z"/></svg></button>
            <button id="play"><svg viewBox="0 0 24 24"><path d="M8,5.14V19.14L19,12.14L8,5.14Z"/></svg></button>
            <button id="stop"><svg viewBox="0 0 24 24"><path d="M6,6H18V18H6V6Z"/></svg></button>
        </div>

        <!-- TWOJE PRZYCISKI GŁOŚNOŚCI -->
        <div class="controls-row" style="margin-top: 20px;">
            <button id="vDn" class="vol-btn"><svg viewBox="0 0 24 24"><path d="M19,13H5V11H19V13Z"/></svg></button>
            <div class="lab-text">L.A.B.</div>
            <button id="vUp" class="vol-btn"><svg viewBox="0 0 24 24"><path d="M19,13H13V19H11V13H5V11H11V5H13V11H19V13Z"/></svg></button>
        </div>
    </div>

    <div class="speaker right"></div>
</div>

<audio id="stream" crossorigin="anonymous" src="https://stream.rcs.revma.com/gzwc1xcq042vv"></audio>

<script>
    const audio = document.getElementById('stream');
    const canvas = document.getElementById('visualizer');
    const ctx = canvas.getContext('2d');
    const pwrBtn = document.getElementById('pwr');
    const mainFrame = document.getElementById('mainFrame');

    let audioCtx, analyser, source, dataArray, isOn = false;

    pwrBtn.onclick = () => {
        isOn = !isOn;
        mainFrame.classList.toggle('powered');
        pwrBtn.classList.toggle('active');
        if(!isOn) { audio.pause(); draw(null); }
    };

    document.getElementById('play').onclick = function() {
        if(!isOn) return;
        if(!audioCtx) {
            audioCtx = new(window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            source = audioCtx.createMediaElementSource(audio);
            source.connect(analyser);
            analyser.fftSize = 64;
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            source.connect(audioCtx.destination);
        }
        audio.play();
        this.classList.add('active');
        loop();
    };

    document.getElementById('stop').onclick = () => {
        audio.pause(); audio.currentTime = 0;
        document.getElementById('play').classList.remove('active');
    };

    document.getElementById('vUp').onclick = () => { audio.volume = Math.min(1, audio.volume + 0.1); };
    document.getElementById('vDn').onclick = () => { audio.volume = Math.max(0, audio.volume - 0.1); };

    function draw(data) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const bars = 20;
        const step = canvas.width / bars;
        for (let i = 0; i < bars; i++) {
            const h = data ? (data[i] / 255) * canvas.height : 0;
            ctx.fillStyle = isOn ? '#e60012' : '#111';
            ctx.fillRect(i * step, canvas.height - h, step - 2, h);
        }
    }

    function loop() {
        if(!isOn || audio.paused) return;
        requestAnimationFrame(loop);
        analyser.getByteFrequencyData(dataArray);
        draw(dataArray);
    }

    window.onload = () => {
        canvas.width = canvas.clientWidth;
        canvas.height = canvas.clientHeight;
        draw(null);
    };
</script>

</body>
</html>
