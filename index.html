<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Muzyczne Radio PRO ULTRA v2 - MSI Dragon Edition</title>
    <link href="https://fonts.cdnfonts.com/css/ds-digital" rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/digital-numbers" rel="stylesheet">
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            font-family: Arial, sans-serif;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }

        .frame {
            width: 100%;
            max-width: 850px;
            border-radius: 4px;
            padding: 12px;
            background: #0a0a0a;
            background-image: repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.01) 0px, rgba(255, 255, 255, 0.01) 1px, transparent 1px, transparent 3px),
                linear-gradient(180deg, #151515 0%, #050505 100%);
            box-shadow: 0 10px 50px rgba(0, 0, 0, 1);
            position: relative;
            border: 1px solid #1a1a1a;
            box-sizing: border-box;
        }

        .frame.powered {
            background: linear-gradient(90deg, #e60012 0%, #e60012 4px, transparent 4px, transparent calc(100% - 4px), #e60012 calc(100% - 4px)),
                repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.01) 0px, rgba(255, 255, 255, 0.01) 1px, transparent 1px, transparent 3px),
                linear-gradient(180deg, #1a1a1a 0%, #050505 100%);
            box-shadow: 0 0 40px rgba(230, 0, 18, 0.2), 0 8px 30px rgba(0, 0, 0, 0.9);
        }

        .title {
            text-align: center;
            font-size: clamp(24px, 5vw, 42px);
            font-weight: bold !important;
            letter-spacing: 12px;
            color: #1a0000;
            font-family: 'DS-Digital', monospace !important;
            margin: 10px auto 25px auto;
            display: block;
            width: fit-content;
            transition: 0.3s;
        }

        .frame.powered .title {
            color: #e60012 !important;
            text-shadow: 0 0 15px rgba(230, 0, 18, 0.8);
        }

        .display-frame {
            background: #050505;
            border: 2px solid #222;
            border-radius: 2px;
            margin: 0 auto;
            box-sizing: border-box;
            height: 130px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Digital Numbers', sans-serif;
            color: #0a0000;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
            text-transform: uppercase;
            transition: color 0.3s;
        }

        .frame.powered .display-frame {
            color: #e60012;
            text-shadow: 0 0 12px rgba(230, 0, 18, 0.7);
            border-color: #333;
        }

        .display-line { text-align: center; line-height: 1.1; }
        .station-name { font-size: 18px; letter-spacing: 3px; margin-bottom: 8px; }
        .time-display { font-size: 36px; margin-bottom: 5px; }
        .date-display { font-size: 14px; letter-spacing: 2px; opacity: 0.8; }

        .main-content {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 30px;
        }

        .controls-main {
            display: flex; gap: 8px; padding: 12px;
            background: rgba(0,0,0,0.3);
            border-radius: 4px;
            border: 1px solid #111;
            margin-bottom: 20px;
        }

        .btn-rect, .btn-v {
            border: 1px solid #222; background: #0c0c0c; color: #333;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.2s;
        }

        .btn-rect { width: 65px; height: 42px; border-radius: 2px; }
        .btn-v { width: 45px; height: 42px; border-radius: 2px; }
        
        .vol-group { display: flex; position: relative; gap: 2px; }
        /* Czerwona linia pod głośnością ze zdjęcia */
        .vol-indicator {
            position: absolute; bottom: -4px; left: 0; width: 0%; height: 2px;
            background: #e60012; transition: width 0.2s; box-shadow: 0 0 5px #e60012;
        }

        .frame.powered .btn-rect, .frame.powered .btn-v { color: #666; }
        .frame.powered .active { 
            color: #e60012 !important; border-color: #e60012 !important; 
            box-shadow: 0 0 10px rgba(230, 0, 18, 0.5); 
        }

        .lab-logo { 
            margin: 15px 0; width: 55px; height: 55px; border-radius: 50%; 
            border: 1px solid #1a1a1a; display: flex; align-items: center; 
            justify-content: center; color: #1a0000; font-size: 10px; 
            font-weight: bold; transition: 0.3s;
        }
        .frame.powered .lab-logo { color: #e60012; border-color: #e60012; box-shadow: 0 0 10px rgba(230, 0, 18, 0.3); }

        .link-container a { 
            color: #1a0000; text-decoration: none; font-family: 'Digital Numbers'; 
            font-size: 11px; letter-spacing: 2px; transition: 0.3s;
        }
        .frame.powered .link-container a { color: #e60012; opacity: 0.7; }

        @media(max-width:700px) {
            .display-frame { width: 90% !important; }
            .controls-main { scale: 0.9; }
        }
    </style>
</head>

<body>
    <div class="frame">
        <div class="title" id="main-title">L.A.B.AUDIO</div>
        
        <div class="display-frame" id="display">
            <div class="display-line station-name">Muzyczne Radio</div>
            <div class="display-line time-display" id="clock">00:00:00</div>
            <div class="display-line date-display" id="date">00:00:0000</div>
        </div>

        <div class="main-content">
            <div class="controls-main">
                <button id="pwr" class="btn-rect"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M13,3h-2v10h2V3z M17.8,4.5l-1.4,1.4C18.3,7.4,19,9.6,19,12c0,3.9-3.1,7-7,7s-7-3.1-7-7c0-2.4,0.7-4.6,2.6-6.1L6.2,4.5 C3.6,6.4,2,9.5,2,13c0,5.5,4.5,10,10,10s10-4.5,10-10C22,9.5,20.4,6.4,17.8,4.5z"/></svg></button>
                <button id="play" class="btn-rect"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M8,5.14V19.14L19,12.14L8,5.14Z"/></svg></button>
                <button id="rec" class="btn-rect"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="8"/></svg></button>
                <button id="stop" class="btn-rect"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6,6H18V18H6V6Z"/></svg></button>
                <button id="mute" class="btn-rect"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M3,9V15H7L12,20V4L7,9H3M16.5,12C16.5,10.23 15.48,8.71 14,8V16C15.48,15.29 16.5,13.77 16.5,12Z"/></svg></button>
                
                <div class="vol-group">
                    <button id="vDown" class="btn-v"><b>-</b></button>
                    <button id="vUp" class="btn-v"><b>+</b></button>
                    <div id="vLine" class="vol-indicator"></div>
                </div>
            </div>

            <div class="lab-logo">L.A.B.</div>
            <div class="link-container"><a href="#">WWW.MUZYCZNERADIO.PL</a></div>
        </div>
    </div>

    <audio id="stream" src="https://stream.rcs.revma.com/gzwc1xcq042vv"></audio>

    <script>
        const audio = document.getElementById('stream');
        const pwrBtn = document.getElementById('pwr');
        const vLine = document.getElementById('vLine');
        const display = document.getElementById('display');
        const mainTitle = document.getElementById('main-title');
        let isPwr = false;

        function syncLayout() {
            if(window.innerWidth > 700) {
                display.style.width = (mainTitle.offsetWidth - 20) + "px";
            }
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toTimeString().split(' ')[0];
            const d = String(now.getDate()).padStart(2,'0');
            const m = String(now.getMonth()+1).padStart(2,'0');
            document.getElementById('date').textContent = `${d}:${m}:${now.getFullYear()}`;
        }

        pwrBtn.onclick = () => {
            isPwr = !isPwr;
            document.querySelector('.frame').classList.toggle('powered', isPwr);
            pwrBtn.classList.toggle('active', isPwr);
            if(!isPwr) { audio.pause(); vLine.style.width = "0%"; }
            else { updateVolLine(); }
        };

        function updateVolLine() {
            if(isPwr) vLine.style.width = (audio.volume * 100) + "%";
        }

        document.getElementById('play').onclick = () => { if(isPwr) audio.play(); };
        document.getElementById('stop').onclick = () => { if(isPwr) { audio.pause(); audio.currentTime = 0; } };
        document.getElementById('vUp').onclick = () => { audio.volume = Math.min(1, audio.volume + 0.1); updateVolLine(); };
        document.getElementById('vDown').onclick = () => { audio.volume = Math.max(0, audio.volume - 0.1); updateVolLine(); };

        setInterval(updateClock, 1000);
        updateClock();
        window.onresize = syncLayout;
        window.onload = syncLayout;
        audio.volume = 0.5;
    </script>
</body>
</html>
