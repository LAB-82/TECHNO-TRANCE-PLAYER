<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TECHNO MINI PL - DI.FM STYLE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap');

        :root {
            --neon-blue: #00f2ff;
            --neon-yellow: #fce300;
            --bg-black: #050505;
            --tile-bg: #0a0a0a;
            --border-dim: #1a1a1a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #000;
            color: white;
            font-family: 'Montserrat', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 2.5vh;
            overflow: hidden;
        }

        /* NAGŁÓWEK */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2vh;
        }

        .header-title {
            color: var(--neon-blue);
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* UKŁAD GŁÓWNY */
        .app-main {
            display: flex;
            flex: 1;
            gap: 25px;
            min-height: 0;
        }

        /* GRID KAFELKÓW */
        .grid-section {
            flex: 1.5;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 12px;
        }

        .tile {
            background: var(--tile-bg);
            border: 1.5px solid var(--border-dim);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            cursor: pointer;
            position: relative;
            transition: all 0.2s ease;
        }

        .tile span {
            color: var(--neon-blue);
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            padding: 5px;
            z-index: 5;
        }

        /* EFEKT AKTYWNOŚCI ZE ZDJĘCIA (BŁĘKITNA POŚWIATA) */
        .tile.active {
            border: 2px solid var(--neon-blue);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.5);
        }

        .tile.active::after {
            content: '';
            position: absolute;
            top: -10px; left: -10px; right: -10px; bottom: -10px;
            background: radial-gradient(circle, rgba(0, 242, 255, 0.3) 0%, transparent 70%);
            z-index: 1;
            animation: glow-pulse 2s infinite ease-in-out;
        }

        @keyframes glow-pulse {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.1); }
        }

        /* PANEL BOCZNY (ŻÓŁTY WYŚWIETLACZ) */
        .side-panel {
            flex: 0.7;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
        }

        .display-box {
            width: 100%;
            aspect-ratio: 1/1;
            background: black;
            border: 6px solid var(--neon-yellow);
            border-radius: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 40px rgba(252, 227, 0, 0.3);
            text-align: center;
        }

        .display-box h2 {
            color: var(--neon-yellow);
            font-size: 44px;
            font-weight: 900;
            line-height: 0.9;
            text-shadow: 0 0 15px var(--neon-yellow);
        }

        /* NAWIGACJA DOLNA */
        .nav-controls {
            display: flex;
            align-items: center;
            gap: 40px;
        }

        .nav-btn {
            cursor: pointer;
            fill: none;
            stroke: var(--neon-blue);
            stroke-width: 2;
            width: 32px;
            height: 32px;
        }

        .btn-main {
            fill: var(--neon-blue);
            width: 60px;
            height: 60px;
            filter: drop-shadow(0 0 10px var(--neon-blue));
        }

        @media (max-width: 800px) {
            .app-main { flex-direction: column; overflow-y: auto; }
            .grid-section { grid-template-columns: repeat(3, 1fr); min-height: 400px; }
            .display-box { aspect-ratio: 16/9; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-title" id="top-status">TECHNO MINI PL / WYBIERZ STACJĘ</div>
    <div class="header-title" id="clock">00:00</div>
</header>

<div class="app-main">
    <div class="grid-section" id="grid"></div>

    <aside class="side-panel">
        <div class="display-box">
            <h2 id="disp-main">TECHNO</h2>
            <h2 id="disp-sub">MINI</h2>
        </div>

        <div class="nav-controls">
            <svg class="nav-btn" viewBox="0 0 24 24" onclick="skip(-1)"><path d="M19 20L9 12L19 4V20Z M5 19V5"/></svg>
            <svg class="nav-btn btn-main" viewBox="0 0 24 24" onclick="toggle()"><path id="play-svg" d="M8 5v14l11-7z"/></svg>
            <svg class="nav-btn" viewBox="0 0 24 24" onclick="skip(1)"><path d="M5 4L15 12L5 20V4Z M19 5V19"/></svg>
        </div>
    </aside>
</div>

<audio id="audio"></audio>

<script>
    const STATIONS = [
        // TECHNO
        { n: "Techno", l: "TECHNO", u: "https://hirschmilch.de:7000/techno.mp3" },
        { n: "Detroit Techno", l: "DETROIT", u: "https://ice1.somafm.com/missioncontrol-128-mp3" },
        { n: "Minimal Techno", l: "MINIMAL", u: "https://hirschmilch.de:7000/minimal.mp3" },
        { n: "Hard Techno", l: "HARD", u: "https://stream.laut.fm/hard-techno" },
        { n: "Dark Techno", l: "DARK", u: "https://stream.laut.fm/darktechno" },
        { n: "Underground Techno", l: "UNDERGR", u: "https://ice1.somafm.com/deepspaceone-128-mp3" },
        // TRANCE
        { n: "Trance", l: "TRANCE", u: "https://hirschmilch.de:7000/trance.mp3" },
        { n: "Vocal Trance", l: "VOCAL", u: "https://p-vocaltrance.radioca.st/stream" },
        { n: "Uplifting Trance", l: "UPLIFT", u: "http://stream.uplifting-trance.com/;stream.mp3" },
        { n: "Epic Trance", l: "EPIC", u: "http://tx.clast.pro/8240/stream" },
        { n: "Progressive Trance", l: "PROG", u: "https://hirschmilch.de:7000/prog-house.mp3" },
        { n: "Psy Trance", l: "PSY", u: "https://hirschmilch.de:7000/psytrance.mp3" }
    ];

    const grid = document.getElementById('grid');
    const audio = document.getElementById('audio');
    const playSvg = document.getElementById('play-svg');
    const dispMain = document.getElementById('disp-main');
    const topStatus = document.getElementById('top-status');
    let currentIdx = -1;

    // Render kafelków
    STATIONS.forEach((s, i) => {
        const t = document.createElement('div');
        t.className = 'tile';
        t.innerHTML = `<span>${s.n}</span>`;
        t.onclick = () => play(i);
        grid.appendChild(t);
    });

    function play(i) {
        currentIdx = i;
        const s = STATIONS[i];
        
        audio.src = s.u;
        audio.play().catch(() => console.log("User interaction required"));
        
        // UI
        document.querySelectorAll('.tile').forEach((t, idx) => t.classList.toggle('active', idx === i));
        dispMain.innerHTML = s.l + "<br>MINI";
        topStatus.innerText = "GRA: " + s.n.toUpperCase();
        playSvg.setAttribute('d', 'M6 19h4V5H6v14zm8-14v14h4V5h-4z'); // Pause
    }

    function toggle() {
        if (currentIdx === -1) { play(0); return; }
        if (audio.paused) {
            audio.play();
            playSvg.setAttribute('d', 'M6 19h4V5H6v14zm8-14v14h4V5h-4z');
        } else {
            audio.pause();
            playSvg.setAttribute('d', 'M8 5v14l11-7z');
        }
    }

    function skip(dir) {
        let n = currentIdx + dir;
        if (n < 0) n = STATIONS.length - 1;
        if (n >= STATIONS.length) n = 0;
        play(n);
    }

    function clock() {
        const now = new Date();
        document.getElementById('clock').innerText = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
    }
    setInterval(clock, 1000); clock();
</script>

</body>
</html>
