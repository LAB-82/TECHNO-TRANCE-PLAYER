<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RMF TERMINAL - HYPER-REAL REALISM</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Montserrat+Alternates:wght@400;600;700&display=swap');

        :root {
            --yellow: #fce300;
            --yellow-neon: #fffb00;
            --bg: #121214;
            --tile: linear-gradient(145deg, #23272e, #1a1d22);
            --border: #000;
            --blue-wave: #00ccff;
            /* Nowe kolory dla wierszy */
            --row1: #ff007f; /* Magenta */
            --row2: #00e5ff; /* Cyan */
            --row3: #a2ff00; /* Lime */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body { 
            height: 100vh; width: 100vw; 
            background: radial-gradient(circle at center, #222 0%, #000 100%);
            color: #fff; 
            font-family: 'Montserrat Alternates', sans-serif;
            overflow: hidden; 
        }

        body { 
            display: flex; flex-direction: column; padding: 2vh; 
            background-image: url('https://www.transparenttextures.com/patterns/brushed-alum.png');
        }

        header { 
            height: 60px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 3px solid #1a1a1a; margin-bottom: 2vh; flex-shrink: 0;
            background: rgba(0,0,0,0.4); padding: 0 20px; border-radius: 10px;
        }
        .header-info { font-family: 'Orbitron'; font-size: 20px; font-weight: 700; color: var(--yellow); text-transform: uppercase; letter-spacing: 2px; }
        .clock { color: var(--yellow); font-size: 24px; font-weight: 700; text-shadow: 0 0 10px rgba(252, 227, 0, 0.5); }

        .app-content { display: flex; flex: 1; gap: 3vw; min-height: 0; }

        /* GRID - WŁÓKNO WĘGLOWE W TLE */
        .grid { 
            flex: 1.4; display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            grid-template-rows: repeat(3, 1fr); 
            gap: 15px; 
            background: #0a0a0a; padding: 20px; border-radius: 15px;
            box-shadow: inset 0 0 30px #000, 0 5px 15px rgba(0,0,0,0.5);
            border: 2px solid #222;
        }

        /* FOTOREALISTYCZNY PRZYCISK */
        .tile {
            background: var(--tile); border: 2px solid #111; border-radius: 12px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; position: relative; overflow: visible;
            box-shadow: 6px 6px 12px #000, inset 1px 1px 2px rgba(255,255,255,0.1);
            transition: all 0.1s ease;
        }

        .tile:active { transform: translateY(3px); box-shadow: 2px 2px 5px #000; }

        /* KOLORY DLA WIERSZY - ZGODNIE Z PROŚBĄ O OBFITOŚĆ BARW */
        .tile:nth-child(-n+5) { border-bottom: 4px solid var(--row1); }
        .tile:nth-child(n+6):nth-child(-n+10) { border-bottom: 4px solid var(--row2); }
        .tile:nth-child(n+11) { border-bottom: 4px solid var(--row3); }

        .tile .t-top { font-size: 22px; font-weight: 700; color: #fff; line-height: 1; z-index: 2; text-shadow: 2px 2px 4px #000; }
        .tile .t-bottom { font-size: 14px; font-weight: 600; color: rgba(255,255,255,0.6); margin-top: 4px; text-align: center; z-index: 2; }

        .tile.active { 
            background: #1a1c22;
            box-shadow: 0 0 25px rgba(255, 251, 0, 0.4), inset 0 0 10px #000;
            border: 2px solid var(--yellow-neon);
        }
        .tile.active .t-top { color: var(--yellow-neon); }

        /* SIDEBAR - CHROM I SZKŁO */
        .sidebar { 
            flex: 0.6; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; gap: 4vh;
            border-left: 2px solid #222; padding-left: 3vw;
            background: linear-gradient(to right, rgba(0,0,0,0.2), transparent);
        }

        .logo-display {
            width: 100%; max-width: 320px; aspect-ratio: 16/10;
            border: 4px solid #333; border-radius: 20px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #111 0%, #000 100%);
            box-shadow: 0 20px 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(252, 227, 0, 0.1);
            position: relative;
        }
        .logo-display::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 50%;
            background: linear-gradient(to bottom, rgba(255,255,255,0.05), transparent);
            border-radius: 20px 20px 0 0;
        }
        .logo-display h2 { font-family: 'Orbitron'; font-size: 46px; color: var(--yellow); text-shadow: 0 0 20px var(--yellow); }

        .controls { display: flex; align-items: center; gap: 3vw; }
        .c-svg { 
            width: 45px; height: 45px; fill: #555; cursor: pointer; 
            filter: drop-shadow(2px 2px 2px #000); transition: 0.2s;
        }
        .c-svg:hover { fill: var(--yellow); scale: 1.1; }
        .c-play { width: 80px; height: 80px; fill: var(--yellow); filter: drop-shadow(0 0 15px var(--yellow)); }

        .vol-box { 
            display: flex; align-items: center; gap: 15px; width: 320px; 
            background: #000; padding: 15px; border-radius: 12px; border: 1px solid #222;
        }
        .vol-btn { 
            width: 40px; height: 40px; border: none; border-radius: 8px; 
            background: linear-gradient(145deg, #333, #111); color: var(--yellow); 
            cursor: pointer; font-weight: bold; box-shadow: 2px 2px 5px #000;
        }
        
        input[type="range"]::-webkit-slider-runnable-track { background: #333; height: 6px; border-radius: 3px; box-shadow: inset 0 1px 3px #000; }
        input[type="range"]::-webkit-slider-thumb { 
            appearance: none; width: 24px; height: 24px; 
            background: radial-gradient(circle, #fce300, #b8a600); 
            border-radius: 50%; margin-top: -9px; border: 2px solid #111;
            box-shadow: 0 2px 5px #000;
        }

        /* ANIMACJA FAL - ULEPSZONA */
        .waves { position: absolute; width: 100%; height: 100%; overflow: hidden; border-radius: 10px; }
        .wave { border: 2px solid var(--blue-wave); box-shadow: 0 0 20px var(--blue-wave); }

        @keyframes ripple {
            0% { width: 0; height: 0; opacity: 1; }
            100% { width: 400%; height: 400%; opacity: 0; }
        }

    </style>
</head>
<body>

<header>
    <div class="header-info" id="playing-now">GRA: RMF FM</div>
    <div class="clock" id="timer">00:00</div>
</header>

<div class="app-content">
    <div class="grid" id="station-grid"></div>

    <aside class="sidebar">
        <div class="logo-display">
            <h2>RMF FM</h2>
            <p style="letter-spacing: 3px;">LIVE TERMINAL</p>
        </div>

        <div class="controls">
            <svg class="c-svg" viewBox="0 0 24 24" onclick="skip(-1)"><path d="M6,18V6H8V18H6M9.5,12L18,6V18L9.5,12Z"/></svg>
            <svg class="c-svg c-play" viewBox="0 0 24 24" onclick="toggle()"><path id="p-ico" d="M8,5.14V19.14L19,12.14L8,5.14Z"/></svg>
            <svg class="c-svg" viewBox="0 0 24 24" onclick="skip(1)"><path d="M16,18H18V6H16M6,18L14.5,12L6,6V18Z"/></svg>
        </div>

        <div class="vol-box">
            <button class="vol-btn" onclick="adj(-5)">-</button>
            <div class="vol-bar" style="flex:1; display:flex; align-items:center;">
                <input type="range" id="v-range" class="at-mid" min="0" max="100" value="50" oninput="setV(this.value)">
            </div>
            <button class="vol-btn" onclick="adj(5)">+</button>
        </div>
    </aside>
</div>

<audio id="player"></audio>

<script>
    // Logika pozostaje identyczna z Twoim oryginałem
    const STATIONS = [
        { n: 'RMF FM', s: 'RMF FM', u: 'rmf_fm' },
        { n: 'RMF MAXXX', s: 'Maxxx', u: 'RMFMAXXX48' },
        { n: 'RMF 80s', s: '80s', u: 'rmf_80s' },
        { n: 'RMF 90s', s: '90s', u: 'rmf_90s' },
        { n: 'RMF 2000', s: '2000', u: 'rmf_2000' },
        { n: 'RMF CHILLOUT', s: 'Chillout', u: 'rmf_chillout' },
        { n: 'RMF CLASSIC', s: 'Classic', u: 'rmf_classic' },
        { n: 'RMF DANCE', s: 'Dance', u: 'rmf_dance' },
        { n: 'RMF GOLD', s: 'Gold', u: 'rmf_gold' },
        { n: 'RMF LATINO', s: 'Latino', u: 'rmf_latino' },
        { n: 'RMF LOVE', s: 'Love', u: 'rmf_love' },
        { n: 'RMF PARTY', s: 'Party', u: 'rmf_party' },
        { n: 'RMF POLSKI ROCK', s: 'Polski Rock', u: 'rmf_polski_rock' },
        { n: 'RMF ROCK', s: 'Rock', u: 'rmf_rock' },
        { n: 'RMF SMOOTH JAZZ', s: 'Smooth Jazz', u: 'rmf_smooth_jazz' }
    ];

    const player = document.getElementById('player'), ico = document.getElementById('p-ico'), grid = document.getElementById('station-grid'), vRange = document.getElementById('v-range');
    let current = -1;

    function clock() {
        const d = new Date();
        document.getElementById('timer').textContent = d.getHours().toString().padStart(2,'0') + ":" + d.getMinutes().toString().padStart(2,'0');
    }
    setInterval(clock, 1000); clock();

    STATIONS.forEach((s, i) => {
        const t = document.createElement('div');
        t.className = 'tile';
        t.innerHTML = `
            <div class="waves"><div class="wave"></div><div class="wave"></div><div class="wave"></div></div>
            <div class="t-top">RMF</div>
            <div class="t-bottom">${s.s}</div>
        `;
        t.onclick = () => play(i);
        grid.appendChild(t);
    });

    function play(i) {
        current = i;
        document.querySelectorAll('.tile').forEach((t, idx) => t.classList.toggle('active', idx === i));
        document.getElementById('playing-now').textContent = "GRA: " + STATIONS[i].n;
        const streamBase = "https://rs201-krk.rmfstream.pl/";
        player.src = (STATIONS[i].n === 'RMF MAXXX') ? 'https://rs7-krk2-cyfronet.rmfstream.pl/RMFMAXXX48' : streamBase + STATIONS[i].u;
        player.play();
        ico.setAttribute('d', 'M14,19H18V5H14M6,19H10V5H6V19Z');
    }

    function toggle() {
        if(player.paused) { player.play(); ico.setAttribute('d', 'M14,19H18V5H14M6,19H10V5H6V19Z'); }
        else { player.pause(); ico.setAttribute('d', 'M8,5.14V19.14L19,12.14L8,5.14Z'); }
    }

    function skip(d) { let n = current + d; if(n >= 0 && n < STATIONS.length) play(n); }
    
    function setV(v) { 
        player.volume = v / 100;
        if(parseInt(v) === 50) vRange.classList.add('at-mid');
        else vRange.classList.remove('at-mid');
    }
    
    function adj(d) { vRange.value = parseInt(vRange.value) + d; setV(vRange.value); }
</script>
</body>
</html>
