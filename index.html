<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEHIRN TREIBER - TACTICAL HUD</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        :root {
            --hud-green: #00ff66;
            --hud-dim: #003311;
            --hud-bg: #020502;
            --hud-border: rgba(0, 255, 102, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--hud-bg);
            color: var(--hud-green);
            font-family: 'Share Tech Mono', monospace;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            /* Efekt siatki celowniczej */
            background-image: 
                radial-gradient(circle, var(--hud-dim) 1px, transparent 1px),
                linear-gradient(var(--hud-border) 1px, transparent 1px),
                linear-gradient(90deg, var(--hud-border) 1px, transparent 1px);
            background-size: 100px 100px, 20px 20px, 20px 20px;
        }

        /* Główna Rama HUD */
        .hud-frame {
            width: 95vw;
            height: 90vh;
            border: 2px solid var(--hud-green);
            position: relative;
            display: flex;
            padding: 20px;
            gap: 20px;
            box-shadow: inset 0 0 50px rgba(0, 255, 102, 0.1);
        }

        /* Ozdobne narożniki celownika */
        .hud-frame::before {
            content: ""; position: absolute; top: -10px; left: -10px;
            width: 40px; height: 40px; border-top: 5px solid var(--hud-green); border-left: 5px solid var(--hud-green);
        }
        .hud-frame::after {
            content: ""; position: absolute; bottom: -10px; right: -10px;
            width: 40px; height: 40px; border-bottom: 5px solid var(--hud-green); border-right: 5px solid var(--hud-green);
        }

        /* Lewa sekcja - GRID stacji */
        .grid {
            flex: 2;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 15px;
        }

        /* Kafelki w stylu przycisków kokpitu */
        .hud-tile {
            background: rgba(0, 51, 17, 0.2);
            border: 1px solid var(--hud-green);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 10px;
            position: relative;
            cursor: pointer;
            transition: all 0.2s;
        }

        .hud-tile:hover {
            background: var(--hud-dim);
            box-shadow: 0 0 15px var(--hud-green);
        }

        .hud-tile.active {
            background: var(--hud-green);
            color: var(--hud-bg);
        }

        .tile-id { font-size: 10px; margin-bottom: 5px; }
        .tile-name { font-size: 16px; font-weight: bold; text-transform: uppercase; }

        /* Prawy Panel - Control Box */
        .sidebar {
            flex: 1;
            border-left: 2px solid var(--hud-green);
            padding-left: 20px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .display-unit {
            border: 1px solid var(--hud-green);
            padding: 15px;
            background: rgba(0, 255, 102, 0.05);
        }

        .label { font-size: 12px; letter-spacing: 2px; margin-bottom: 10px; display: block;}

        /* Przyciski Sterowania */
        .ctrl-group { display: flex; gap: 10px; flex-wrap: wrap; }
        .hud-btn {
            background: transparent;
            border: 1px solid var(--hud-green);
            color: var(--hud-green);
            padding: 10px 15px;
            font-family: inherit;
            cursor: pointer;
            flex: 1;
            text-transform: uppercase;
        }
        .hud-btn:hover { background: var(--hud-green); color: var(--hud-bg); }

        /* Volume Slider */
        .vol-section { margin-top: auto; }
        .vol-controls { display: flex; align-items: center; gap: 10px; }
        input[type="range"] {
            flex: 1;
            appearance: none;
            background: var(--hud-dim);
            height: 2px;
        }
        input[type="range"]::-webkit-slider-thumb {
            appearance: none;
            width: 12px;
            height: 24px;
            background: var(--hud-green);
            cursor: pointer;
        }

        .scanner-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: rgba(0, 255, 102, 0.2);
            top: 0;
            animation: scan 4s linear infinite;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }
    </style>
</head>
<body>

<div class="hud-frame">
    <div class="scanner-line"></div>

    <!-- Grid Stacji (Modele danych) -->
    <div class="grid" id="hud-grid"></div>

    <!-- Panel Taktyczny -->
    <aside class="sidebar">
        <div class="display-unit">
            <span class="label">> TRACKING_TARGET</span>
            <h2 id="target-id" style="font-size: 24px;">NO_SIGNAL</h2>
            <div id="freq" style="font-size: 11px; margin-top: 10px; color: #008833;">FREQ: --.--- MHz</div>
        </div>

        <div class="ctrl-group">
            <span class="label" style="width: 100%;">TRANSPORT_ENGAGE</span>
            <button class="hud-btn" onclick="play()">ENGAGE</button>
            <button class="hud-btn" onclick="stop()">ABORT</button>
            <button class="hud-btn" id="mute-btn" onclick="toggleMute()">SILENCE</button>
        </div>

        <div class="vol-section">
            <span class="label">AMPLITUDE_MODULATION</span>
            <div class="vol-controls">
                <button class="hud-btn" style="flex: 0;" onclick="adjVol(-5)">-</button>
                <input type="range" id="vol-slider" min="0" max="100" value="70" oninput="updateVol(this.value)">
                <button class="hud-btn" style="flex: 0;" onclick="adjVol(5)">+</button>
            </div>
        </div>

        <div style="font-size: 10px; opacity: 0.5; margin-top: auto;">
            GEHIRN_TREIBER // HUD_INTERFACE_OS_v5.1<br>
            COORDS: 52.23N / 21.01E
        </div>
    </aside>
</div>

<audio id="audio-engine"></audio>

<script>
    const STATIONS = [
        { n: 'TECH 88', u: 'https://stream.laut.fm/tech88' },
        { n: 'HR 3 CLUB', u: 'https://stream.laut.fm/hr3_clubnight' },
        { n: '1000 TECHNO', u: 'https://stream.laut.fm/1000techno' },
        { n: 'BEST TECHNO', u: 'https://stream.laut.fm/best-of-techno' },
        { n: 'CHRIS BURN', u: 'https://stream.laut.fm/chris_burn' },
        { n: 'RETRO ELEC', u: 'https://stream.laut.fm/retroelectronicmusic' },
        { n: 'GEHIRN TRBR', u: 'https://stream.laut.fm/gehirn-treiber-beat-radio' },
        { n: 'AUX_01', u: '' },
        { n: 'AUX_02', u: '' }
    ];

    const grid = document.getElementById('hud-grid');
    const audio = document.getElementById('audio-engine');
    const targetDisplay = document.getElementById('target-id');
    const volSlider = document.getElementById('vol-slider');
    let currentIdx = -1;

    // Generowanie kafelków HUD
    STATIONS.forEach((s, i) => {
        const tile = document.createElement('div');
        tile.className = 'hud-tile';
        tile.innerHTML = `
            <div class="tile-id">ID: 0x0${i.toString(16)}</div>
            <div class="tile-name">${s.n}</div>
        `;
        tile.onclick = () => selectTarget(i);
        grid.appendChild(tile);
    });

    function selectTarget(i) {
        if (!STATIONS[i].u) return;
        currentIdx = i;
        document.querySelectorAll('.hud-tile').forEach((t, idx) => t.classList.toggle('active', idx === i));
        targetDisplay.textContent = STATIONS[i].n;
        document.getElementById('freq').textContent = `FREQ: ${(88 + Math.random() * 20).toFixed(3)} MHz`;
        
        audio.src = STATIONS[i].u;
        audio.play();
    }

    function play() { if(currentIdx !== -1) audio.play(); }
    function stop() { audio.pause(); }
    
    function toggleMute() {
        audio.muted = !audio.muted;
        document.getElementById('mute-btn').style.background = audio.muted ? 'var(--hud-green)' : 'transparent';
        document.getElementById('mute-btn').style.color = audio.muted ? 'var(--hud-bg)' : 'var(--hud-green)';
    }

    function updateVol(v) { audio.volume = v / 100; }
    
    function adjVol(delta) {
        let newVal = parseInt(volSlider.value) + delta;
        newVal = Math.max(0, Math.min(100, newVal));
        volSlider.value = newVal;
        updateVol(newVal);
    }

    audio.volume = 0.7;
</script>
</body>
</html>
