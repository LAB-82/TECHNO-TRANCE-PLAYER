<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DI.FM TERMINAL - OFFICIAL PLAYER</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap');
        
        :root {
            --neon-blue: #00f2ff;
            --neon-yellow: #fce300;
            --bg: #000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg); color: white;
            font-family: 'Montserrat', sans-serif;
            height: 100vh; display: flex; flex-direction: column; padding: 2vh; overflow: hidden;
        }

        header {
            display: flex; justify-content: space-between; border-bottom: 1px solid #1a1a1a;
            padding-bottom: 10px; margin-bottom: 2vh;
        }
        .h-text { color: var(--neon-blue); font-size: 14px; letter-spacing: 2px; text-transform: uppercase; }

        .app-container { display: flex; flex: 1; gap: 20px; min-height: 0; }

        /* GRID KAFELKÓW */
        .grid {
            flex: 1.2; display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 12px;
        }
        .tile {
            background: #0a0a0a; border: 1.5px solid #1a1a1a; border-radius: 12px;
            display: flex; align-items: center; justify-content: center; text-align: center;
            cursor: pointer; position: relative; transition: 0.2s; padding: 8px;
        }
        .tile span { color: var(--neon-blue); font-size: 11px; font-weight: 700; text-transform: uppercase; z-index: 5; }
        .tile.active { border-color: var(--neon-blue); box-shadow: 0 0 20px rgba(0, 242, 255, 0.5); }

        /* PANEL BOCZNY Z ORYGINALNYM PLAYEREM */
        .sidebar { flex: 0.8; display: flex; flex-direction: column; align-items: center; gap: 20px; }
        
        .display-frame {
            width: 100%; aspect-ratio: 1/1;
            border: 6px solid var(--neon-yellow); border-radius: 25px;
            box-shadow: 0 0 40px rgba(252, 227, 0, 0.3);
            background: #000; overflow: hidden; position: relative;
        }

        /* Osadzenie oficjalnego widżetu di.fm */
        iframe {
            width: 100%; height: 100%; border: none;
            background: #000;
        }

        .status-box {
            text-align: center; color: var(--neon-yellow);
            text-transform: uppercase; font-size: 12px; letter-spacing: 1px;
        }

        @media (max-width: 800px) { .app-container { flex-direction: column; overflow-y: auto; } }
    </style>
</head>
<body>

<header>
    <div class="h-text" id="status">DI.FM / WYBIERZ STACJĘ</div>
    <div class="h-text" id="clock">00:00</div>
</header>

<div class="app-container">
    <div class="grid" id="grid"></div>

    <aside class="sidebar">
        <div class="display-frame" id="player-container">
            <iframe id="di-frame" src="about:blank"></iframe>
        </div>
        <div class="status-box">
            <p>Kliknij Play wewnątrz ramki,</p>
            <p>aby uruchomić darmowy stream.</p>
        </div>
    </aside>
</div>

<script>
    // AUDYT NAZW I LINKÓW EMBED (Zgodnie z di.fm)
    const STATIONS = [
        // TECHNO
        { n: "Techno", id: "techno" },
        { n: "Detroit Techno", id: "detroittechno" },
        { n: "Minimal Techno", id: "minimaltechno" },
        { n: "Hard Techno", id: "hardtechno" },
        { n: "Dark Techno", id: "darktechno" },
        { n: "Underground Techno", id: "undergroundtechno" },
        // TRANCE
        { n: "Trance", id: "trance" },
        { n: "Vocal Trance", id: "vocaltrance" },
        { n: "Uplifting Trance", id: "upliftingtrance" },
        { n: "Epic Trance", id: "epictrance" },
        { n: "Progressive Trance", id: "progressive" },
        { n: "Psy Trance", id: "psytrance" }
    ];

    const grid = document.getElementById('grid');
    const iframe = document.getElementById('di-frame');
    const statusText = document.getElementById('status');

    STATIONS.forEach((s, i) => {
        const t = document.createElement('div');
        t.className = 'tile';
        t.innerHTML = `<span>${s.n}</span>`;
        t.onclick = () => loadStation(i);
        grid.appendChild(t);
    });

    function loadStation(i) {
        const s = STATIONS[i];
        
        // Ładowanie oficjalnego odtwarzacza DI.FM dla danej stacji
        // Używamy formatu player, który di.fm pozwala osadzać
        iframe.src = `https://www.di.fm/player/${s.id}`;
        
        // UI
        document.querySelectorAll('.tile').forEach((t, idx) => t.classList.toggle('active', idx === i));
        statusText.innerText = "STACJA: " + s.n.toUpperCase();
    }

    // Zegar
    function updateClock() {
        const n = new Date();
        document.getElementById('clock').innerText = n.getHours().toString().padStart(2,'0')+":"+n.getMinutes().toString().padStart(2,'0');
    }
    setInterval(updateClock, 1000); updateClock();

    // Załaduj pierwszą stację na start
    loadStation(0);
</script>
</body>
</html>
