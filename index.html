<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>TECHNO_PCB_AUDIT_FIX_V11</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@300;600&display=swap');
        :root {
            --laminat: #010a05; --miedz: #1a3a2a; --neon: #00f2ff; --gold: #b8a033;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--laminat); color: var(--neon); font-family: 'JetBrains Mono', monospace; overflow: hidden; height: 100vh; }

        /* TŁO PCB */
        #pcb-svg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        .interface { display: flex; width: 100%; height: 100vh; position: relative; z-index: 10; }
        .board { flex: 2; position: relative; }

        /* UKŁAD SCALONY - TWOJA ZAMROŻONA ESTETYKA + PINY */
        .ic-chip {
            position: absolute; width: 160px; height: 85px;
            background: #111; border: 1px solid #222; border-radius: 2px;
            cursor: pointer; z-index: 20; transition: 0.3s;
            box-shadow: 5px 5px 20px rgba(0,0,0,0.7);
        }
        
        /* PINY (NÓŻKI) - GĘSTOŚĆ JAK NA ZDJĘCIU */
        .ic-chip::before {
            content: ''; position: absolute; top: -10px; left: 10px; right: 10px; bottom: -10px;
            background: repeating-linear-gradient(90deg, #555 0px, #888 2px, #555 4px, transparent 4px, transparent 10px);
            z-index: -1;
        }

        .ic-chip.active { border-color: var(--neon); box-shadow: 0 0 25px var(--neon); }

        .chip-label { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; pointer-events: none; }
        .chip-id { font-family: 'Orbitron'; font-size: 11px; color: var(--gold); }

        /* ŚCIEŻKI I PRZEPŁYW */
        .trace { fill: none; stroke: var(--miedz); stroke-width: 2; opacity: 0.3; }
        .trace-active { stroke: var(--neon); opacity: 1; filter: drop-shadow(0 0 5px var(--neon)); }
        
        .flow-dot {
            fill: #fff; filter: drop-shadow(0 0 8px var(--neon));
        }

        /* PANEL KONTROLNY */
        .sidebar { flex: 0.7; background: rgba(0,0,0,0.9); border-left: 2px solid #111; display: flex; flex-direction: column; }
        .terminal { flex: 1; padding: 20px; font-size: 11px; color: #39ff14; overflow-y: auto; background: #000; margin: 10px; border: 1px solid #1a1a1a; }
        .controls { padding: 20px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; }
        .btn { background: #080808; border: 1px solid #333; color: var(--neon); padding: 15px; cursor: pointer; font-family: 'Orbitron'; font-size: 10px; }
        .btn:hover { background: var(--neon); color: #000; }
    </style>
</head>
<body>

<svg id="pcb-svg">
    <!-- Tu generujemy ścieżki i animowane punkty -->
    <circle id="pulse-dot" r="4" class="flow-dot" style="visibility: hidden;">
        <animateMotion id="pulse-anim" dur="1.5s" repeatCount="indefinite" begin="indefinite" />
    </circle>
</svg>

<div class="interface">
    <div class="board" id="main-board"></div>
    <aside class="sidebar">
        <div style="padding:20px; font-weight:bold; border-bottom:1px solid #222;">PCB_AUDIT_V11</div>
        <div class="terminal" id="out">> SYSTEM READY...<br>> CLICK ANY CHIP TO START</div>
        <div class="controls">
            <button class="btn" onclick="skip(-1)">PREV</button>
            <button class="btn" onclick="toggle()">SYNC</button>
            <button class="btn" onclick="skip(1)">NEXT</button>
        </div>
    </aside>
</div>

<audio id="core-audio" crossorigin="anonymous"></audio>

<script>
    const STATIONS = [
        { n: 'TECH 88', u: 'https://laut.fm/tech88', x: 10, y: 15 },
        { n: 'HR3 CLUB', u: 'https://laut.fm/hr3_clubnight', x: 45, y: 10 },
        { n: '1000 TECHNO', u: 'https://laut.fm/1000techno', x: 15, y: 40 },
        { n: 'GEHIRN', u: 'https://laut.fm/gehirn-treiber-beat-radio', x: 50, y: 45 },
        { n: 'B.O. TECHNO', u: 'https://laut.fm/best-of-techno', x: 12, y: 75 },
        { n: 'CHRIS BURN', u: 'https://laut.fm/chris_burn', x: 55, y: 80 }
    ];

    const board = document.getElementById('main-board');
    const out = document.getElementById('out');
    const audio = document.getElementById('core-audio');
    const svg = document.getElementById('pcb-svg');
    let currentIdx = -1;

    function init() {
        STATIONS.forEach((s, i) => {
            const chip = document.createElement('div');
            chip.className = 'ic-chip';
            chip.style.left = s.x + '%'; chip.style.top = s.y + '%';
            chip.id = 'chip-' + i;
            chip.innerHTML = `<div class="chip-label"><span class="chip-id">${s.n}</span></div>`;
            chip.onclick = () => mount(i);
            board.appendChild(chip);
        });
    }

    function mount(i) {
        currentIdx = i;
        document.querySelectorAll('.ic-chip').forEach((c, idx) => c.classList.toggle('active', idx === i));
        
        // 1. Czyścimy stare ścieżki i tworzymy nową
        const panelX = window.innerWidth * 0.75;
        const chipEl = document.getElementById('chip-' + i);
        const r = chipEl.getBoundingClientRect();
        const startX = r.left + r.width;
        const startY = r.top + r.height / 2;
        const targetY = (window.innerHeight / STATIONS.length) * i + 100;

        const pathD = `M ${startX} ${startY} L ${startX + 50} ${startY} L ${startX + 100} ${targetY} L ${panelX} ${targetY}`;
        
        // Aktualizacja ścieżki wizualnej
        let trace = document.getElementById('active-trace-path');
        if(!trace) {
            trace = document.createElementNS("http://www.w3.org/2000/svg", "path");
            trace.id = 'active-trace-path';
            svg.appendChild(trace);
        }
        trace.setAttribute('d', pathD);
        trace.setAttribute('class', 'trace trace-active');

        // 2. Animacja "przepływu prądu" (Światełko)
        const pulse = document.getElementById('pulse-dot');
        const anim = document.getElementById('pulse-anim');
        pulse.style.visibility = 'visible';
        anim.setAttribute('path', pathD);
        anim.beginElement();

        // 3. Audio Engine Fix
        out.innerHTML += `<br>> CONNECTING: ${STATIONS[i].n}...`;
        audio.pause();
        audio.src = STATIONS[i].u;
        audio.load();
        
        const playPromise = audio.play();
        if (playPromise !== undefined) {
            playPromise.then(() => {
                out.innerHTML += `<br>> SYNC_LOCKED.`;
            }).catch(error => {
                out.innerHTML += `<br><span style="color:red">> ERROR: CLICK SYNC TO UNMUTE</span>`;
            });
        }
    }

    function toggle() { audio.paused ? audio.play() : audio.pause(); }
    function skip(dir) { 
        let n = currentIdx + dir;
        if(n >= 0 && n < STATIONS.length) mount(n);
    }

    window.onload = init;
</script>
</body>
</html>
