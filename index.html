<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RMF TB-303 PRO TERMINAL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&family=Roboto+Condensed:wght@700&display=swap');

        :root {
            --metal-base: #c0c0c0;
            --metal-shine: linear-gradient(180deg, #e8e8e8 0%, #b0b0b0 45%, #7a7a7a 50%, #a0a0a0 55%, #dcdcdc 100%);
            --led-red: #ff3333;
            --led-bg: #400000;
            --lcd-green: #a4f000;
            --acid-bg: #1a1a1c;
            --btn-metal: linear-gradient(145deg, #d1d1d1, #a1a1a1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; cursor: default; }
        
        body { 
            height: 100vh; width: 100vw; 
            background: #0a0a0a; 
            display: flex; justify-content: center; align-items: center;
            font-family: 'Roboto Condensed', sans-serif;
            overflow: hidden;
        }

        .vst-chassis {
            width: 98vw; height: 96vh;
            background: var(--metal-shine);
            background-image: url('https://www.transparenttextures.com/patterns/brushed-alum.png');
            border: 5px solid #222;
            border-radius: 8px;
            box-shadow: 0 40px 100px rgba(0,0,0,1), inset 0 2px 4px rgba(255,255,255,0.7);
            padding: 25px;
            display: flex; flex-direction: column;
            position: relative;
        }

        header { 
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; border-bottom: 2px solid rgba(0,0,0,0.3); padding-bottom: 15px;
        }
        .logo h1 { font-family: 'Orbitron'; font-size: 36px; color: #1a1a1a; letter-spacing: -2px; line-height: 1; }
        .logo span { font-size: 11px; letter-spacing: 4px; color: #444; font-weight: bold; }

        #clock {
            font-family: 'Share Tech Mono';
            font-size: 32px;
            color: var(--lcd-green);
            text-shadow: 0 0 15px var(--lcd-green);
            line-height: 1;
        }

        .main-workspace { display: flex; flex: 1; gap: 20px; min-height: 0; }

        .grid-stations { 
            flex: 1.4; display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            grid-template-rows: repeat(3, 1fr); 
            gap: 15px; 
            background: rgba(0,0,0,0.15); padding: 20px; border-radius: 10px;
            box-shadow: inset 2px 2px 10px rgba(0,0,0,0.4);
            border: 1px solid rgba(0,0,0,0.2);
        }

        .bt-303 {
            background: var(--btn-metal);
            border: 1px solid #777;
            border-radius: 4px;
            display: flex; align-items: center; justify-content: center;
            padding: 10px;
            cursor: pointer; position: relative;
            box-shadow: 0 4px 0 #555, 0 6px 10px rgba(0,0,0,0.4);
            transition: 0.05s;
            text-align: center;
        }

        .bt-303::before { 
            content: ""; position: absolute; top: 6px; width: 6px; height: 6px;
            background: var(--led-bg); border-radius: 50%; border: 1px solid #000;
        }

        .bt-303:active { transform: translateY(2px); box-shadow: 0 2px 0 #333; }
        .bt-303:active *, .bt-303 * { cursor: pointer; }
        
        .bt-303.active { 
            background: var(--btn-metal); 
            border-color: var(--lcd-green);
        }
        .bt-303.active::before { background: var(--led-red); box-shadow: 0 0 8px var(--led-red); }

        .bt-303 .st-label { 
            font-weight: 800; font-size: 14px; color: #222; 
            text-transform: uppercase; pointer-events: none;
        }
        .bt-303.active .st-label { 
            color: var(--lcd-green); 
            text-shadow: 0 0 10px var(--lcd-green);
        }

        /* PRAWY PANEL - WEDŁUG ZDJĘCIA */
        .pro-panel { 
            flex: 0.6; display: flex; flex-direction: column; 
            background: var(--metal-shine);
            background-image: url('https://www.transparenttextures.com/patterns/brushed-alum.png');
            border-radius: 8px; padding: 20px;
            border: 1px solid #888; box-shadow: 10px 10px 30px rgba(0,0,0,0.5);
            gap: 15px;
        }

        .lcd-display {
            background: #0a0c0a; height: 100px; border-radius: 4px; border: 3px solid #333;
            padding: 10px; font-family: 'Share Tech Mono', monospace; color: var(--lcd-green);
            box-shadow: inset 0 0 15px #000; display: flex; flex-direction: column; justify-content: space-between;
        }

        .step-sequencer {
            background: #111; border-radius: 4px; border: 1px solid #333;
            padding: 8px; display: flex; flex-direction: column; gap: 4px;
        }
        .step-row { display: flex; gap: 2px; height: 18px; }
        .step { flex: 1; background: #222; border-radius: 1px; }
        .step.on { background: #ff4400; box-shadow: 0 0 8px rgba(255,68,0,0.8); }

        .analog-controls {
            display: flex; flex-direction: column; align-items: center; gap: 10px;
        }

        .pan-section { text-align: center; }
        .pan-leds { display: flex; gap: 5px; justify-content: center; margin-bottom: 5px; }
        .pan-led { width: 8px; height: 8px; background: var(--led-red); border-radius: 50%; box-shadow: 0 0 5px var(--led-red); border: 1px solid #000; }

        .knob-volume {
            width: 75px; height: 75px; border-radius: 50%;
            background: radial-gradient(circle, #eee 0%, #aaa 100%);
            border: 2px solid #666; position: relative; margin: 0 auto;
            box-shadow: 0 6px 12px rgba(0,0,0,0.4);
            cursor: crosshair; transition: transform 0.2s;
        }
        .knob-volume::before {
            content: ""; position: absolute; top: 4px; left: 50%; width: 4px; height: 18px;
            background: #222; transform: translateX(-50%); border-radius: 2px;
        }

        .volume-row {
            display: flex; align-items: center; gap: 10px; width: 100%; justify-content: center;
        }

        .sq-btn {
            width: 45px; height: 45px; background: #fff; border: 1px solid #ccc;
            box-shadow: 0 4px 0 #999; cursor: pointer; display: flex; flex-direction: column;
            align-items: center; justify-content: center; border-radius: 2px;
        }
        .sq-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #999; }
        .sq-btn .dot { width: 4px; height: 4px; background: #400; border-radius: 50%; margin-bottom: 4px; }
        .sq-btn span { font-size: 8px; font-weight: bold; color: #000; }

        .fader-track { 
            background: #000; height: 40px; flex: 1; border-radius: 2px; border: 1px solid #444;
            display: flex; align-items: center; padding: 0 5px;
        }
        input[type="range"] { -webkit-appearance: none; width: 100%; background: transparent; cursor: pointer; }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 22px; height: 34px; background: #ccc;
            border: 1px solid #333; border-radius: 2px; box-shadow: inset 0 0 5px #fff;
        }

        .btn-run-stop {
            width: 110px; height: 55px;
            background: #e0e0e0; border: 1px solid #999;
            border-radius: 4px; cursor: pointer;
            box-shadow: 0 5px 0 #aaa, 0 8px 15px rgba(0,0,0,0.3);
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 13px; color: #111; text-transform: uppercase;
        }
        .btn-run-stop:active { transform: translateY(3px); box-shadow: 0 2px 0 #aaa; }

    </style>
</head>
<body>

<div class="vst-chassis">
    <header>
        <div class="logo">
            <h1>RMF TB-303</h1>
            <span>COMPUTER CONTROLLED // ACID ENGINE</span>
        </div>
        <div id="clock">00:00:00</div>
    </header>

    <div class="main-workspace">
        <div class="grid-stations" id="grid"></div>

        <aside class="pro-panel">
            <div class="lcd-display">
                <div style="font-size: 10px; opacity: 0.6; font-weight: bold;">BANK: A1 / PATTERN: 08</div>
                <div id="st-name" style="font-size: 24px; color: #fff; text-shadow: 0 0 12px var(--lcd-green); font-weight: bold;">STATION IDLE</div>
                <div style="display: flex; justify-content: space-between; font-size: 11px; font-weight: bold;">
                    <span>BITRATE: 128KBPS</span>
                    <span id="v-val">VOL: 50%</span>
                </div>
            </div>

            <div class="step-sequencer">
                <div class="step-row" id="r1"></div>
                <div class="step-row" id="r2"></div>
                <div class="step-row" id="r3"></div>
            </div>

            <div class="analog-controls">
                <div class="pan-section">
                    <div class="pan-leds"><div class="pan-led"></div><div class="pan-led"></div><div class="pan-led"></div></div>
                    <div class="knob-volume" id="pan-knob"></div>
                    <div style="font-size: 9px; font-weight: bold; margin-top: 5px; color: #222;">PAN L/R</div>
                </div>

                <div class="volume-row">
                    <div class="sq-btn" onclick="adj(-5)">
                        <div class="dot"></div>
                        <span>DOWN</span>
                    </div>
                    <div class="fader-track">
                        <input type="range" id="v-range" min="0" max="100" value="50" oninput="setV(this.value)">
                    </div>
                    <div class="sq-btn" onclick="adj(5)">
                        <div class="dot"></div>
                        <span>UP</span>
                    </div>
                </div>

                <div class="btn-run-stop" onclick="stopRadio()">
                    RUN / STOP
                </div>
            </div>
        </aside>
    </div>
</div>

<audio id="player"></audio>

<script>
    const STATIONS = [
        { n: 'RMF FM', u: 'rmf_fm' },
        { n: 'RMF MAXXX', u: 'RMFMAXXX48' },
        { n: 'RMF 80s', u: 'rmf_80s' },
        { n: 'RMF 90s', u: 'rmf_90s' },
        { n: 'RMF 2000', u: 'rmf_2000' },
        { n: 'RMF CHILL', u: 'rmf_chillout' },
        { n: 'RMF CLASSIC', u: 'rmf_classic' },
        { n: 'RMF DANCE', u: 'rmf_dance' },
        { n: 'RMF GOLD', u: 'rmf_gold' },
        { n: 'RMF LATIN', u: 'rmf_latino' },
        { n: 'RMF LOVE', u: 'rmf_love' },
        { n: 'RMF PARTY', u: 'rmf_party' },
        { n: 'RMF ROCK', u: 'rmf_polski_rock' },
        { n: 'RMF ROCK+', u: 'rmf_rock' },
        { n: 'RMF JAZZ', u: 'rmf_smooth_jazz' }
    ];

    const grid = document.getElementById('grid');
    const player = document.getElementById('player');
    const stName = document.getElementById('st-name');

    STATIONS.forEach((s, i) => {
        const b = document.createElement('div');
        b.className = 'bt-303';
        b.innerHTML = `<div class="st-label">${s.n}</div>`;
        b.onclick = () => play(i);
        grid.appendChild(b);
    });

    [1, 2, 3].forEach(r => {
        const row = document.getElementById('r'+r);
        for(let i=0; i<16; i++) {
            const s = document.createElement('div');
            s.className = 'step';
            if(Math.random() > 0.8) s.classList.add('on');
            row.appendChild(s);
        }
    });

    function play(i) {
        document.querySelectorAll('.bt-303').forEach((b, idx) => b.classList.toggle('active', idx === i));
        stName.textContent = STATIONS[i].n;
        player.src = STATIONS[i].n === 'RMF MAXXX' ? 'https://rs7-krk2-cyfronet.rmfstream.pl/RMFMAXXX48' : "https://rs201-krk.rmfstream.pl/" + STATIONS[i].u;
        player.play();
    }

    function stopRadio() { 
        player.pause(); 
        player.src = ""; 
        stName.textContent = "STATION STOPPED";
        document.querySelectorAll('.bt-303').forEach(b => b.classList.remove('active'));
    }

    function setV(v) { 
        player.volume = v/100; 
        document.getElementById('v-val').textContent = `VOL: ${v}%`; 
    }

    function adj(d) { 
        const r = document.getElementById('v-range'); 
        let newVal = parseInt(r.value) + d;
        if(newVal > 100) newVal = 100;
        if(newVal < 0) newVal = 0;
        r.value = newVal; 
        setV(newVal); 
    }

    let panPos = 0;
    document.getElementById('pan-knob').onclick = function() {
        panPos = (panPos + 45);
        if(panPos > 135) panPos = -135;
        this.style.transform = `rotate(${panPos}deg)`;
    };

    setInterval(() => {
        const d = new Date();
        document.getElementById('clock').textContent = d.toTimeString().split(' ')[0];
        document.querySelectorAll('.step').forEach(s => { if(Math.random()>0.95) s.classList.toggle('on'); });
    }, 1000);
</script>
</body>
</html>
