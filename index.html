<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RMF TERMINAL - NEON REALISM MIX</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Montserrat+Alternates:wght@400;600;700&display=swap');

        :root {
            --yellow: #fce300;
            --pink-neon: #ff007f;
            --cyan-neon: #00e5ff;
            --purple-neon: #a020f0;
            --bg-dark: #0a0a0c;
            --tile-bg: #1a1a1e;
            --panel-bg: rgba(25, 25, 30, 0.85);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body { 
            height: 100vh; width: 100vw; 
            background: var(--bg-dark); 
            color: #fff; 
            font-family: 'Montserrat Alternates', sans-serif;
            overflow: hidden; 
        }

        body { 
            display: flex; flex-direction: column; padding: 2vh; 
            background-image: 
                radial-gradient(circle at top left, rgba(160, 32, 240, 0.15) 0%, transparent 40%),
                radial-gradient(circle at bottom right, rgba(0, 229, 255, 0.1) 0%, transparent 40%);
        }

        header { 
            height: 50px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #222; margin-bottom: 2vh; flex-shrink: 0;
            padding: 0 15px; background: rgba(0,0,0,0.3); border-radius: 8px;
        }
        .header-info { font-family: 'Orbitron'; font-size: 18px; color: #aaa; letter-spacing: 1px; }
        .clock { color: #fff; font-size: 22px; font-weight: 700; font-family: 'Orbitron'; }

        .app-content { display: flex; flex: 1; gap: 2vw; min-height: 0; }

        /* GRID - TWOJA LOGIKA UKŁADU */
        .grid { 
            flex: 1.5; display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            grid-template-rows: repeat(3, 1fr); 
            gap: 12px; 
            background: #111114; padding: 15px; border-radius: 12px;
            box-shadow: inset 0 0 40px #000;
            border: 1px solid #1f1f23;
        }

        /* HYBRYDOWY KAFELEK */
        .tile {
            background: var(--tile-bg);
            border-radius: 8px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; position: relative;
            transition: all 0.2s cubic-bezier(0.2, 1, 0.3, 1);
            border: 1px solid #25252a;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }

        .tile:active { transform: scale(0.96); filter: brightness(1.5); }

        /* KOLORYSTYKA MIX: REALIZM + NEON */
        .tile:nth-child(-n+5) { border-bottom: 2px solid var(--pink-neon); }
        .tile:nth-child(n+6):nth-child(-n+10) { border-bottom: 2px solid var(--purple-neon); }
        .tile:nth-child(n+11) { border-bottom: 2px solid var(--cyan-neon); }

        .tile .t-top { font-size: 22px; font-weight: 700; color: #fff; text-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        .tile .t-bottom { font-size: 11px; font-weight: 600; color: #666; margin-top: 4px; text-transform: uppercase; letter-spacing: 1px; }

        .tile.active { 
            background: #25252b;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
            border: 1px solid #fff;
        }
        .tile.active .t-top { color: var(--yellow); }
        .tile.active .t-bottom { color: #fff; }

        /* SIDEBAR - MODERNISED REALISM */
        .sidebar { 
            flex: 0.5; display: flex; flex-direction: column; 
            align-items: center; justify-content: space-between; padding: 20px 0;
            background: var(--panel-bg); border-radius: 16px;
            backdrop-filter: blur(10px); border: 1px solid #2a2a30;
        }

        .logo-display { text-align: center; }
        .logo-display h2 { font-family: 'Orbitron'; font-size: 40px; background: linear-gradient(to bottom, #fff, #666); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .logo-display p { font-size: 10px; letter-spacing: 5px; color: var(--cyan-neon); font-weight: bold; }

        .controls { display: flex; align-items: center; gap: 20px; }
        .c-svg { width: 35px; height: 35px; fill: #777; cursor: pointer; transition: 0.3s; }
        .c-svg:hover { fill: #fff; }
        .c-play { width: 70px; height: 70px; fill: #fff; filter: drop-shadow(0 0 10px rgba(255,255,255,0.4)); }

        .vol-box { 
            width: 80%; background: rgba(0,0,0,0.4); padding: 15px; border-radius: 12px;
            display: flex; flex-direction: column; gap: 10px; align-items: center;
        }
        
        input[type="range"] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type="range"]::-webkit-slider-runnable-track { background: #333; height: 4px; border-radius: 2px; }
        input[type="range"]::-webkit-slider-thumb { 
            appearance: none; width: 16px; height: 16px; background: #fff; 
            border-radius: 50%; margin-top: -6px; box-shadow: 0 0 10px var(--cyan-neon);
        }

        /* WAVE ANIMATION - SUBTLE DARK VERSION */
        .waves { position: absolute; width: 100%; height: 100%; overflow: hidden; opacity: 0.2; }
        .wave { border: 1px solid #fff; }

        @keyframes ripple {
            0% { width: 0; height: 0; opacity: 0.5; }
            100% { width: 250%; height: 250%; opacity: 0; }
        }

    </style>
</head>
<body>

<header>
    <div class="header-info" id="playing-now">RMF // VST-ENGINE</div>
    <div class="clock" id="timer">00:00</div>
</header>

<div class="app-content">
    <div class="grid" id="station-grid"></div>

    <aside class="sidebar">
        <div class="logo-display">
            <h2>RMF</h2>
            <p>SUB.FACTORY</p>
        </div>

        <div class="controls">
            <svg class="c-svg" viewBox="0 0 24 24" onclick="skip(-1)"><path d="M6,18V6H8V18H6M9.5,12L18,6V18L9.5,12Z"/></svg>
            <svg class="c-svg c-play" viewBox="0 0 24 24" onclick="toggle()"><path id="p-ico" d="M8,5.14V19.14L19,12.14L8,5.14Z"/></svg>
            <svg class="c-svg" viewBox="0 0 24 24" onclick="skip(1)"><path d="M16,18H18V6H16M6,18L14.5,12L6,6V18Z"/></svg>
        </div>

        <div class="vol-box">
            <input type="range" id="v-range" min="0" max="100" value="50" oninput="setV(this.value)">
            <span style="font-size: 10px; color: #555; font-family: 'Orbitron';">MASTER VOLUME</span>
        </div>
    </aside>
</div>

<audio id="player"></audio>

<script>
    const STATIONS = [
        { n: 'RMF FM', s: 'RMF FM', u: 'rmf_fm' },
        { n: 'RMF MAXXX', s: 'Maxxx', u: 'RMFMAXXX48' },
        { n: 'RMF 80s', s: '80s', u: 'rmf_80s' },
        { n: 'RMF 90s', s: '90s', u: 'rmf_90s' },
        { n: 'RMF 2000', s: '2000', u: 'rmf_2000' },
        { n: 'RMF CHILLOUT', s: 'Chillout', u: 'rmf_chillout' },
        { n: 'RMF CLASSIC', s: 'Classic', u: 'rmf_classic' },
        { n: 'RMF DANCE', s: 'Dance', u: 'rmf_dance' },
        { n: 'RMF GOLD', s: 'Gold', u: 'rmf_gold' },
        { n: 'RMF LATINO', s: 'Latino', u: 'rmf_latino' },
        { n: 'RMF LOVE', s: 'Love', u: 'rmf_love' },
        { n: 'RMF PARTY', s: 'Party', u: 'rmf_party' },
        { n: 'RMF POLSKI ROCK', s: 'Polski Rock', u: 'rmf_polski_rock' },
        { n: 'RMF ROCK', s: 'Rock', u: 'rmf_rock' },
        { n: 'RMF SMOOTH JAZZ', s: 'Smooth Jazz', u: 'rmf_smooth_jazz' }
    ];

    const player = document.getElementById('player'), ico = document.getElementById('p-ico'), grid = document.getElementById('station-grid'), vRange = document.getElementById('v-range');
    let current = -1;

    function clock() {
        const d = new Date();
        document.getElementById('timer').textContent = d.getHours().toString().padStart(2,'0') + ":" + d.getMinutes().toString().padStart(2,'0');
    }
    setInterval(clock, 1000); clock();

    STATIONS.forEach((s, i) => {
        const t = document.createElement('div');
        t.className = 'tile';
        t.innerHTML = `
            <div class="waves"><div class="wave"></div><div class="wave"></div></div>
            <div class="t-top">RMF</div>
            <div class="t-bottom">${s.s}</div>
        `;
        t.onclick = () => play(i);
        grid.appendChild(t);
    });

    function play(i) {
        current = i;
        document.querySelectorAll('.tile').forEach((t, idx) => t.classList.toggle('active', idx === i));
        document.getElementById('playing-now').textContent = "SOURCE: " + STATIONS[i].n;
        const streamBase = "https://rs201-krk.rmfstream.pl/";
        player.src = (STATIONS[i].n === 'RMF MAXXX') ? 'https://rs7-krk2-cyfronet.rmfstream.pl/RMFMAXXX48' : streamBase + STATIONS[i].u;
        player.play();
        ico.setAttribute('d', 'M14,19H18V5H14M6,19H10V5H6V19Z');
    }

    function toggle() {
        if(player.paused) { player.play(); ico.setAttribute('d', 'M14,19H18V5H14M6,19H10V5H6V19Z'); }
        else { player.pause(); ico.setAttribute('d', 'M8,5.14V19.14L19,12.14L8,5.14Z'); }
    }

    function skip(d) { let n = current + d; if(n >= 0 && n < STATIONS.length) play(n); }
    function setV(v) { player.volume = v / 100; }
</script>
</body>
</html>
