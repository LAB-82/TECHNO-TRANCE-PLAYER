<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>GEHIRN TREIBER - HYBRID HUD</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;600&display=swap');

        :root {
            --cyan: #00f2ff;
            --magenta: #ff00e5;
            --blue: #0044ff;
            --bg-dark: #02050a;
            --glass: rgba(0, 242, 255, 0.03);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 50% 50%, #0a192e 0%, var(--bg-dark) 100%),
                linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
        }

        /* Rama Główna (Styl RMF FM Layout) */
        .hybrid-interface {
            width: 95vw;
            height: 85vh;
            display: flex;
            gap: 40px;
            padding: 40px;
            background: rgba(5, 10, 20, 0.6);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 242, 255, 0.2);
            border-radius: 40px;
            box-shadow: 0 0 60px rgba(0, 0, 0, 0.8), inset 0 0 30px rgba(0, 242, 255, 0.05);
        }

        /* GRID KAFELKÓW - Kapsuły z image_a240c4.jpg */
        .grid {
            flex: 2;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
        }

        .capsule-tile {
            background: var(--glass);
            border: 2px solid rgba(0, 242, 255, 0.2);
            border-radius: 50px; /* Styl "Pill" */
            position: relative;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
        }

        /* Neonowa linia wewnątrz kapsuły */
        .capsule-tile::before {
            content: '';
            position: absolute;
            top: 0; width: 4px; height: 100%;
            background: linear-gradient(to bottom, transparent, var(--cyan), transparent);
            left: 10px;
            opacity: 0.3;
        }

        .capsule-tile:hover, .capsule-tile.active {
            border-color: var(--cyan);
            background: rgba(0, 242, 255, 0.1);
            filter: drop-shadow(0 0 15px var(--cyan));
            transform: translateY(-5px);
        }

        .capsule-tile.active {
            border-color: var(--magenta);
            filter: drop-shadow(0 0 20px var(--magenta));
        }

        .capsule-tile .name { 
            font-family: 'Orbitron', sans-serif;
            font-weight: 700; 
            font-size: 16px; 
            letter-spacing: 2px;
            color: #fff;
        }

        /* PANEL KONTROLNY (SIDEBAR) */
        .sidebar {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 35px;
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            padding-left: 40px;
        }

        /* Wyświetlacz kołowy z image_a3f3d6.png */
        .ring-display {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 2px solid rgba(0, 242, 255, 0.1);
            background: radial-gradient(circle, rgba(0, 242, 255, 0.05) 0%, transparent 70%);
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
        }

        .ring-display h2 { 
            font-family: 'Orbitron', sans-serif; 
            font-size: 38px; 
            text-shadow: 0 0 20px var(--cyan); 
        }

        /* PRZYCISKI - Mix VST i Neonu */
        .btn-group { display: flex; gap: 15px; }
        .cyber-btn {
            flex: 1;
            background: #000;
            border: 2px solid var(--cyan);
            border-radius: 30px;
            color: var(--cyan);
            padding: 15px;
            font-family: 'Orbitron', sans-serif;
            font-size: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .cyber-btn:hover {
            background: var(--cyan);
            color: #000;
            box-shadow: 0 0 25px var(--cyan);
        }

        .btn-stop { border-color: var(--magenta); color: var(--magenta); }
        .btn-stop:hover { background: var(--magenta); box-shadow: 0 0 25px var(--magenta); }

        /* SUWAK "GLOW-TUBE" */
        .vol-module {
            background: rgba(0, 0, 0, 0.4);
            padding: 20px;
            border-radius: 25px;
            border: 1px solid rgba(0, 242, 255, 0.1);
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            background: #111;
            height: 8px;
            border-radius: 10px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            background: #fff;
            border: 3px solid var(--cyan);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--cyan);
            cursor: pointer;
        }

        .status-tag {
            font-family: 'Orbitron', sans-serif;
            font-size: 10px;
            color: var(--magenta);
            text-align: center;
            letter-spacing: 3px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    </style>
</head>
<body>

<div class="hybrid-interface">
    <!-- Grid Stacji (Kapsuły) -->
    <div class="grid" id="main-grid"></div>

    <!-- Panel Sterowania -->
    <aside class="sidebar">
        <div class="ring-display">
            <span style="font-size: 10px; opacity: 0.5; letter-spacing: 2px;">OUTPUT LEVEL</span>
            <h2 id="signal-val">88%</h2>
            <div style="position: absolute; width: 110%; height: 110%; border: 1px dashed var(--magenta); border-radius: 50%; opacity: 0.2; animation: rotate 15s linear infinite;"></div>
        </div>

        <div style="text-align: center;">
            <p style="font-size: 12px; color: var(--cyan); opacity: 0.7;">ACTIVE NODE:</p>
            <h1 id="active-station" style="font-family: 'Orbitron', sans-serif; font-size: 24px; margin-top: 5px;">READY</h1>
        </div>

        <div class="btn-group">
            <button class="cyber-btn" onclick="audio.play()">Engage</button>
            <button class="cyber-btn btn-stop" onclick="audio.pause()">Abort</button>
        </div>

        <div class="vol-module">
            <div style="display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 10px; color: var(--cyan);">
                <span>AMPLITUDE</span>
                <span id="vol-txt">70%</span>
            </div>
            <input type="range" id="vol-slider" min="0" max="100" value="70" oninput="updateVol(this.value)">
        </div>

        <div class="status-tag">SYSTEM_ENCRYPTED_UPLINK</div>
    </aside>
</div>

<audio id="audio-engine"></audio>

<script>
    const STATIONS = [
        { n: 'TECHNO CORE', u: 'https://stream.laut.fm/tech88' },
        { n: 'NEON DRIVE', u: 'https://stream.laut.fm/hr3_clubnight' },
        { n: 'CYBER PULSE', u: 'https://stream.laut.fm/1000techno' },
        { n: 'DATA STREAM', u: 'https://stream.laut.fm/best-of-techno' },
        { n: 'VOID LINK', u: 'https://stream.laut.fm/chris_burn' },
        { n: 'SYNTH NODE', u: 'https://stream.laut.fm/retroelectronicmusic' },
        { n: 'GEHIRN TRB', u: 'https://stream.laut.fm/gehirn-treiber-beat-radio' },
        { n: 'USER_08', u: '' },
        { n: 'USER_09', u: '' }
    ];

    const grid = document.getElementById('main-grid');
    const audio = document.getElementById('audio-engine');
    const display = document.getElementById('active-station');
    const volSlider = document.getElementById('vol-slider');

    STATIONS.forEach((s, i) => {
        const t = document.createElement('div');
        t.className = 'capsule-tile';
        t.innerHTML = `
            <span style="font-size: 10px; opacity: 0.4; position: absolute; top: 20px;">BANK_0${i}</span>
            <div class="name">${s.n}</div>
        `;
        t.onclick = () => {
            if(!s.u) return;
            document.querySelectorAll('.capsule-tile').forEach(x => x.classList.remove('active'));
            t.classList.add('active');
            display.textContent = s.n;
            document.getElementById('signal-val').textContent = Math.floor(Math.random()*20 + 80) + "%";
            audio.src = s.u;
            audio.play();
        };
        grid.appendChild(t);
    });

    function updateVol(v) {
        audio.volume = v / 100;
        document.getElementById('vol-txt').textContent = v + "%";
    }

    window.onload = () => { audio.volume = 0.7; };
</script>

<style>
    @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
</style>
</body>
</html>
