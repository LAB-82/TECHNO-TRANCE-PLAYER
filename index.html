<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL_PROTO_X_2199</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@300;500&display=swap');

        :root {
            --pcb-deep: #020408;
            --trace-cyan: #00f2ff;
            --trace-dim: #0a1b2b;
            --accent: #ff0055;
            --hacker-green: #39ff14;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--pcb-deep); color: var(--trace-cyan); 
            font-family: 'JetBrains Mono', monospace; overflow: hidden; height: 100vh;
        }

        /* BACKGROUND PCB LAYERS */
        #pcb-master-svg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0; pointer-events: none; opacity: 0.8;
        }

        .main-frame { display: flex; height: 100vh; position: relative; z-index: 1; }

        /* BREADBOARD AREA */
        .chipset-area { flex: 1.8; position: relative; overflow: hidden; }

        /* DEKORACJE TECHNICZNE */
        .tech-label {
            position: absolute; font-size: 8px; color: #1a3a4a; pointer-events: none;
            text-transform: uppercase; letter-spacing: 1px;
        }

        .chip {
            position: absolute; background: #050a0f; border: 1px solid #1a3a4a;
            padding: 8px; min-width: 100px; cursor: pointer; z-index: 10;
            box-shadow: inset 0 0 10px rgba(0,0,0,1), 4px 4px 0px #000;
            transition: 0.3s;
        }

        .chip:hover { border-color: var(--trace-cyan); box-shadow: 0 0 15px rgba(0, 242, 255, 0.3); }
        .chip.active { border-color: #fff; background: #0a1a2a; box-shadow: 0 0 20px var(--trace-cyan); }
        
        .chip-n { font-family: 'Orbitron'; font-size: 10px; color: #fff; display: block; }
        .chip-u { font-size: 7px; color: #3a5a7a; overflow: hidden; white-space: nowrap; }

        /* PANEL PO PRAWEJ - HACKER MODULE */
        .hacker-panel { 
            flex: 0.7; background: rgba(5, 10, 15, 0.95); 
            border-left: 2px solid #111; display: flex; flex-direction: column;
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
        }

        .hud-top {
            padding: 15px; border-bottom: 2px solid var(--accent);
            background: linear-gradient(to right, #100, #000);
            display: flex; justify-content: space-between; font-size: 12px;
        }

        .vfd-screen {
            margin: 15px; padding: 15px; background: #000; border: 1px solid #1a1a1a;
            height: 180px; position: relative; overflow: hidden;
        }

        .vfd-screen::after { /* Scanline effect */
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, transparent 0, rgba(0, 242, 255, 0.05) 1px, transparent 2px);
            pointer-events: none;
        }

        .matrix-btn-grid { 
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 15px; 
        }

        .hacker-btn {
            background: #0a0a0a; border: 1px solid #222; color: var(--trace-cyan);
            padding: 12px; cursor: pointer; font-family: 'Orbitron'; font-size: 11px;
            text-shadow: 0 0 5px var(--trace-cyan); transition: 0.2s;
        }

        .hacker-btn:hover { background: var(--trace-cyan); color: #000; }
        .hacker-btn:active { transform: scale(0.95); }

        .fader-box { padding: 20px; flex: 1; display: flex; flex-direction: column; gap: 10px; }
        
        input[type=range] {
            -webkit-appearance: none; width: 100%; background: #111; height: 4px; border: 1px solid #222;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 30px; width: 15px; background: var(--accent); border: 1px solid #fff; cursor: pointer;
        }

        /* ANIMACJE */
        @keyframes scan { from { transform: translateY(-100%); } to { transform: translateY(100%); } }
    </style>
</head>
<body>

<svg id="pcb-master-svg"></svg>

<div class="main-frame">
    <div class="chipset-area" id="board">
        <!-- Generowane przez JS -->
    </div>

    <aside class="hacker-panel">
        <div class="hud-top">
            <span style="color:var(--accent)">[ SYSTEM_CORE_X ]</span>
            <span id="clock">00:00:00</span>
        </div>

        <div class="vfd-screen">
            <div id="log-console" style="font-size: 11px; color: var(--hacker-green);">
                > INITIALIZING BOOT_SEQUENCE...<br>
                > LOADING DRIVERS... OK<br>
                > SCANNING DATA_NODES... OK<br>
                > READY TO SYNC.
            </div>
            <div style="position:absolute; bottom:5px; right:5px; font-size:9px; color:#333;">ENCRYPTED_LINK_v2</div>
        </div>

        <div class="matrix-btn-grid">
            <button class="hacker-btn" onclick="skip(-1)">[<<]</button>
            <button class="hacker-btn" onclick="toggle()" style="border-color:var(--accent)">PLAY</button>
            <button class="hacker-btn" onclick="skip(1)">[>>]</button>
        </div>

        <div class="fader-box">
            <label style="font-size:10px; color:#555;">MASTER_VOLUME_GAIN</label>
            <input type="range" min="0" max="1" step="0.01" value="0.5" oninput="setV(this.value)">
            <div id="signal-meter" style="height:5px; background:#111; margin-top:20px; position:relative;">
                <div id="bar" style="width:50%; height:100%; background:var(--trace-cyan); box-shadow: 0 0 10px var(--trace-cyan);"></div>
            </div>
        </div>
    </aside>
</div>

<audio id="player"></audio>

<script>
    const STATIONS = [
        { n: 'TECH 88', u: 'https://laut.fm/tech88', x: 10, y: 15 },
        { n: 'HR3 CLUB', u: 'https://laut.fm/hr3_clubnight', x: 45, y: 12 },
        { n: '1000 TECHNO', u: 'https://laut.fm/1000techno', x: 15, y: 40 },
        { n: 'GEHIRN TREIBER', u: 'https://laut.fm/gehirn-treiber-beat-radio', x: 42, y: 48 },
        { n: 'BEST OF TECHNO', u: 'https://laut.fm/best-of-techno', x: 12, y: 75 },
        { n: 'CHRIS BURN', u: 'https://laut.fm/chris_burn', x: 55, y: 80 },
        { n: 'DEEP HOUSE', u: 'https://laut.fm/deep-house-sounds', x: 30, y: 5 },
        { n: 'HOUSEBOMB', u: 'https://laut.fm/housebomb-fn', x: 75, y: 72 },
        { n: 'SYMBIOTIC', u: 'https://laut.fm/symbiotic-beats', x: 78, y: 35 }
    ];

    const board = document.getElementById('board');
    const svg = document.getElementById('pcb-master-svg');
    const player = document.getElementById('player');
    const consoleLog = document.getElementById('log-console');
    let currentIdx = -1;

    function init() {
        // Dodaj etykiety techniczne w tle
        for(let i=0; i<15; i++) {
            const l = document.createElement('div');
            l.className = 'tech-label';
            l.style.left = Math.random()*80+'%'; l.style.top = Math.random()*90+'%';
            l.textContent = `REF_${Math.random().toString(16).slice(2,8)}`;
            board.appendChild(l);
        }

        STATIONS.forEach((s, i) => {
            const chip = document.createElement('div');
            chip.className = 'chip';
            chip.style.left = s.x + '%'; chip.style.top = s.y + '%';
            chip.innerHTML = `<span class="chip-n">${s.n}</span><span class="chip-u">${s.u}</span>`;
            chip.onclick = () => mount(i);
            chip.id = `chip-${i}`;
            board.appendChild(chip);
        });

        drawConnections();
        setInterval(() => {
            document.getElementById('clock').textContent = new Date().toLocaleTimeString();
        }, 1000);
    }

    function drawConnections() {
        svg.innerHTML = '';
        const w = window.innerWidth;
        const h = window.innerHeight;
        const panelX = w * 0.72;

        // 1. GŁÓWNA MAGISTRALA (Dla każdej stacji)
        STATIONS.forEach((s, i) => {
            const el = document.getElementById(`chip-${i}`);
            const r = el.getBoundingClientRect();
            const x = r.left + r.width;
            const y = r.top + r.height/2;

            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            const d = `M ${x} ${y} L ${x + 50} ${y} L ${x + 50} ${y + (i*15 - 60)} L ${panelX} ${y + (i*15 - 60)}`;
            path.setAttribute("d", d);
            path.setAttribute("stroke", "#0a1b2b");
            path.setAttribute("fill", "none");
            path.setAttribute("stroke-width", "1");
            path.id = `path-${i}`;
            svg.appendChild(path);
        });

        // 2. MIKRO-POŁĄCZENIA MIĘDZY UKŁADAMI (Gęstość)
        for(let j=0; j<25; j++) {
            const s1 = STATIONS[Math.floor(Math.random()*STATIONS.length)];
            const s2 = STATIONS[Math.floor(Math.random()*STATIONS.length)];
            const r1 = document.getElementById(`chip-${STATIONS.indexOf(s1)}`).getBoundingClientRect();
            const r2 = document.getElementById(`chip-${STATIONS.indexOf(s2)}`).getBoundingClientRect();
            
            const p = document.createElementNS("http://www.w3.org/2000/svg", "path");
            const d = `M ${r1.left} ${r1.top} L ${r1.left} ${r2.top} L ${r2.left} ${r2.top}`;
            p.setAttribute("d", d);
            p.setAttribute("stroke", "#05101a");
            p.setAttribute("fill", "none");
            p.setAttribute("stroke-dasharray", "2,4");
            svg.appendChild(p);
        }
    }

    function mount(i) {
        currentIdx = i;
        document.querySelectorAll('.chip').forEach((c, idx) => c.classList.toggle('active', idx === i));
        document.querySelectorAll('path').forEach(p => p.setAttribute('stroke', '#0a1b2b'));
        
        const activePath = document.getElementById(`path-${i}`);
        if(activePath) {
            activePath.setAttribute('stroke', 'var(--trace-cyan)');
            activePath.setAttribute('stroke-width', '2');
        }

        consoleLog.innerHTML = `> MOUNTING: ${STATIONS[i].n}<br>> ADDR: ${STATIONS[i].u}<br>> STATUS: LINK_ESTABLISHED<br>> BITRATE: 192KBPS<br>> BUFFERING...`;
        
        player.src = STATIONS[i].u;
        player.play().catch(e => consoleLog.innerHTML += `<br>> ERROR: USER_GESTURE_REQ`);
        
        document.getElementById('bar').style.width = Math.random()*100+'%';
    }

    function toggle() {
        if(currentIdx === -1) mount(3);
        else player.paused ? player.play() : player.pause();
    }

    function skip(dir) {
        let n = currentIdx + dir;
        if(n >= 0 && n < STATIONS.length) mount(n);
    }

    function setV(v) { 
        player.volume = v; 
        document.getElementById('bar').style.width = (v*100)+'%';
    }

    window.onresize = drawConnections;
    init();
</script>
</body>
</html>
