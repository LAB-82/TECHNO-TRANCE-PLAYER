<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>GEHIRN TREIBER - VST COMMAND</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap');
        :root { --blue: #00d4ff; --bg: #0d0d0d; }
        body { background: #000; color: #fff; font-family: 'Rajdhani', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        
        .vst-container { background: #1a1a1a; padding: 20px; border: 3px solid #333; display: flex; gap: 20px; box-shadow: 0 0 50px rgba(0,0,0,0.9); }
        
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .vst-btn { 
            background: linear-gradient(180deg, #333, #222); 
            border: 1px solid #111; padding: 15px; width: 120px; 
            text-align: center; cursor: pointer; position: relative;
        }
        .vst-btn.active { border-color: var(--blue); box-shadow: 0 0 10px var(--blue); }
        .vst-btn .led { position: absolute; top: 5px; right: 5px; width: 6px; height: 6px; background: #400; border-radius: 50%; }
        .vst-btn.active .led { background: #f00; box-shadow: 0 0 5px #f00; }
        .vst-btn span { font-family: 'Orbitron'; font-size: 10px; display: block; color: #ddd; }

        .sidebar { background: #222; padding: 20px; border: 1px solid #333; width: 280px; display: flex; flex-direction: column; gap: 15px; }
        .lcd { background: #001a1f; border: 2px solid #000; padding: 15px; color: var(--blue); font-family: 'Orbitron'; text-shadow: 0 0 5px var(--blue); }
        .lcd h2 { font-size: 16px; margin: 5px 0; }
        
        .vol-range { width: 100%; accent-color: var(--blue); }
        .ctrl-btn { background: #333; border: 1px solid #444; color: #fff; padding: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="vst-container">
    <div class="grid" id="station-grid"></div>

    <aside class="sidebar">
        <div class="lcd">
            <span style="font-size: 9px; opacity: 0.7;">OSCILLATOR UNIT</span>
            <h2 id="display">READY</h2>
            <div style="font-size: 9px;">STATUS: ONLINE</div>
        </div>

        <div style="display: flex; gap: 5px;">
            <button class="ctrl-btn" onclick="playAudio()" style="flex:1; color: #0f0;">PLAY</button>
            <button class="ctrl-btn" onclick="pauseAudio()" style="flex:1; color: #f00;">STOP</button>
        </div>

        <input type="range" class="vol-range" min="0" max="1" step="0.01" value="0.7" oninput="setVol(this.value)">
    </aside>
</div>

<audio id="player"></audio>

<script>
    const player = document.getElementById('player');
    const display = document.getElementById('display');
    
    const STATIONS = [
        { n: 'TECH 88', u: 'https://stream.laut.fm/tech88' },
        { n: 'HR 3 CLUB', u: 'https://stream.laut.fm/hr3_clubnight' },
        { n: '1000 TECHNO', u: 'https://stream.laut.fm/1000techno' },
        { n: 'BEST OF', u: 'https://stream.laut.fm/best-of-techno' },
        { n: 'CHRIS BURN', u: 'https://stream.laut.fm/chris_burn' },
        { n: 'RETRO ELEC', u: 'https://stream.laut.fm/retroelectronicmusic' },
        { n: 'GEHIRN', u: 'https://stream.laut.fm/gehirn-treiber-beat-radio' }
    ];

    const grid = document.getElementById('station-grid');

    STATIONS.forEach((s, i) => {
        const btn = document.createElement('div');
        btn.className = 'vst-btn';
        btn.innerHTML = `<div class="led"></div><span>PRG ${i+1}</span><div style="font-size:11px; font-weight:bold;">${s.n}</div>`;
        btn.onclick = () => {
            document.querySelectorAll('.vst-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            display.innerText = s.n;
            player.src = s.u;
            player.play();
        };
        grid.appendChild(btn);
    });

    function playAudio() { player.play(); }
    function pauseAudio() { player.pause(); }
    function setVol(v) { player.volume = v; }
</script>

</body>
</html>
