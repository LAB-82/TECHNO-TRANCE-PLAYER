<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>GEHIRN TREIBER - VIRTUAL SYNTH INTERFACE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;500;700&display=swap');

        :root {
            --neon-blue: #00d9ff;
            --deep-blue: #0a192e;
            --panel-bg: #050a0f;
            --accent-magenta: #ff00e5;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }

        body {
            background: #010405;
            color: white;
            font-family: 'Rajdhani', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .synth-shell {
            width: 98vw;
            height: 92vh;
            background: var(--panel-bg);
            border: 1px solid #1a2a3a;
            display: grid;
            grid-template-columns: 280px 1fr 350px;
            gap: 2px;
            padding: 10px;
            box-shadow: 0 0 50px rgba(0,0,0,1);
        }

        /* SEKACJA OSCYLATORÓW (STACJE) */
        .osc-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .osc-unit {
            background: rgba(255,255,255,0.02);
            border: 1px solid #1a2a3a;
            padding: 15px;
            border-radius: 4px;
            position: relative;
            cursor: pointer;
            transition: 0.2s;
        }

        .osc-unit:hover, .osc-unit.active {
            border-color: var(--neon-blue);
            background: rgba(0, 217, 255, 0.05);
            box-shadow: inset 0 0 15px rgba(0, 217, 255, 0.1);
        }

        .osc-unit.active { border-color: var(--accent-magenta); }

        .osc-header { font-size: 10px; color: var(--neon-blue); letter-spacing: 2px; margin-bottom: 8px; }
        .osc-wave-preview {
            width: 100%;
            height: 40px;
            background: #000;
            border: 1px solid #111;
            position: relative;
            overflow: hidden;
        }

        /* WIZUALIZACJA CENTRUM */
        .main-display {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 0 10px;
        }

        .visualizer-big {
            flex: 1;
            background: #02080c;
            border: 1px solid #1a2a3a;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .wave-line {
            width: 100%;
            height: 2px;
            background: var(--neon-blue);
            box-shadow: 0 0 20px var(--neon-blue);
            filter: blur(0.5px);
        }

        /* PANEL MODULACJI (PRAWY) */
        .mod-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .envelope-box {
            height: 200px;
            background: rgba(0,0,0,0.3);
            border: 1px solid #1a2a3a;
            padding: 10px;
        }

        .knob-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            padding: 10px;
        }

        .knob-wrap { text-align: center; }
        .knob {
            width: 45px; height: 45px;
            border-radius: 50%;
            border: 3px solid #1a2a3a;
            border-top-color: var(--neon-blue);
            margin: 0 auto 5px;
            box-shadow: 0 0 10px rgba(0, 217, 255, 0.2);
            transition: 0.3s;
        }

        /* PRZYCISKI STEROWANIA */
        .transport-bar {
            grid-column: 1 / 4;
            height: 60px;
            background: #080f15;
            border: 1px solid #1a2a3a;
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 20px;
        }

        .btn-synth {
            background: transparent;
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            padding: 8px 25px;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn-synth:hover { background: var(--neon-blue); color: #000; box-shadow: 0 0 20px var(--neon-blue); }

        .slider-custom {
            flex: 1;
            height: 4px;
            -webkit-appearance: none;
            background: #111;
            border-radius: 2px;
        }

        .slider-custom::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 15px; height: 15px;
            background: var(--neon-blue);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--neon-blue);
        }

    </style>
</head>
<body>

<div class="synth-shell">
    <!-- LEWA: OSCYLATORY (STACJE) -->
    <div class="osc-section" id="osc-container"></div>

    <!-- ŚRODEK: WIZUALIZACJA GŁÓWNA -->
    <div class="main-display">
        <div class="osc-header" style="text-align: center;">MASTER OUTPUT VISUALIZER</div>
        <div class="visualizer-big">
            <canvas id="main-canvas"></canvas>
            <h2 id="current-title" style="position: absolute; bottom: 20px; letter-spacing: 5px; opacity: 0.5;">GEHIRN TREIBER</h2>
        </div>
        <div class="transport-bar">
            <button class="btn-synth" onclick="audio.play()">PLAY</button>
            <button class="btn-synth" style="border-color: var(--accent-magenta); color: var(--accent-magenta);" onclick="audio.pause()">STOP</button>
            <span style="font-size: 10px; opacity: 0.4;">VOLUME</span>
            <input type="range" class="slider-custom" min="0" max="100" value="70" oninput="updateVol(this.value)">
        </div>
    </div>

    <!-- PRAWA: MODULACJA I FILTRY -->
    <div class="mod-section">
        <div class="osc-header">ENVELOPE 1 (AMP)</div>
        <div class="envelope-box">
            <svg width="100%" height="100%" viewBox="0 0 100 100" preserveAspectRatio="none">
                <path d="M0,100 L20,20 L40,50 L80,50 L100,100" fill="none" stroke="var(--neon-blue)" stroke-width="2" />
            </svg>
        </div>
        
        <div class="osc-header">MACRO CONTROLS</div>
        <div class="knob-grid">
            <div class="knob-wrap"><div class="knob"></div><span style="font-size: 9px;">DRIVE</span></div>
            <div class="knob-wrap"><div class="knob" style="border-top-color: var(--accent-magenta);"></div><span style="font-size: 9px;">FILTER</span></div>
            <div class="knob-wrap"><div class="knob"></div><span style="font-size: 9px;">REVERB</span></div>
        </div>

        <div style="margin-top: auto; padding: 20px; border-top: 1px solid #1a2a3a; font-size: 11px; opacity: 0.5;">
            NODE_LINK: STABLE<br>
            BITRATE: 320kbps<br>
            CORE: GEHIRN_v4.2
        </div>
    </div>
</div>

<audio id="synth-audio"></audio>

<script>
    const STATIONS = [
        { n: 'NEON WAVE', u: 'https://stream.laut.fm/tech88', wave: 'saw' },
        { n: 'CYBER CORE', u: 'https://stream.laut.fm/hr3_clubnight', wave: 'square' },
        { n: 'DATA PULSE', u: 'https://stream.laut.fm/1000techno', wave: 'sine' },
        { n: 'VOID SIGNAL', u: 'https://stream.laut.fm/best-of-techno', wave: 'noise' },
        { n: 'SYNTH NODE', u: 'https://stream.laut.fm/chris_burn', wave: 'saw' },
        { n: 'GEHIRN TRB', u: 'https://stream.laut.fm/gehirn-treiber-beat-radio', wave: 'pulse' }
    ];

    const container = document.getElementById('osc-container');
    const audio = document.getElementById('synth-audio');
    const canvas = document.getElementById('main-canvas');
    const ctx = canvas.getContext('2d');

    // Inicjalizacja oscylatorów
    STATIONS.forEach((s, i) => {
        const unit = document.createElement('div');
        unit.className = 'osc-unit';
        unit.innerHTML = `
            <div class="osc-header">OSC 0${i+1} // ${s.n}</div>
            <div class="osc-wave-preview">
                <canvas id="osc-wave-${i}" width="250" height="40"></canvas>
            </div>
        `;
        unit.onclick = () => {
            document.querySelectorAll('.osc-unit').forEach(u => u.classList.remove('active'));
            unit.classList.add('active');
            document.getElementById('current-title').textContent = s.n;
            audio.src = s.u;
            audio.play();
        };
        container.appendChild(unit);
        drawStaticWave(`osc-wave-${i}`, s.wave);
    });

    function drawStaticWave(id, type) {
        const c = document.getElementById(id);
        const ct = c.getContext('2d');
        ct.strokeStyle = '#00d9ff';
        ct.beginPath();
        ct.moveTo(0, 20);
        for(let x=0; x<250; x++) {
            let y = 20;
            if(type === 'saw') y = 20 + (x % 50 - 25);
            if(type === 'square') y = 20 + (Math.sin(x/10) > 0 ? 15 : -15);
            ct.lineTo(x, y);
        }
        ct.stroke();
    }

    // Prosta animacja głównego oscyloskopu
    canvas.width = 600; canvas.height = 200;
    function animate() {
        ctx.fillStyle = 'rgba(2, 8, 12, 0.2)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = '#00d9ff';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(0, 100);
        for(let x=0; x<canvas.width; x++) {
            let amp = audio.paused ? 2 : 40;
            let y = 100 + Math.sin(x * 0.05 + Date.now() * 0.01) * amp;
            ctx.lineTo(x, y);
        }
        ctx.stroke();
        requestAnimationFrame(animate);
    }
    animate();

    function updateVol(v) { audio.volume = v / 100; }
</script>

</body>
</html>
