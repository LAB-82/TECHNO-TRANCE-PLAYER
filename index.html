<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RMF DUNE 3 EDITION</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Saira:wght@400;500;600;700&family=Orbitron:wght@400;700&display=swap');
        
        :root {
            --dune-bg: #2b2b2b;
            --dune-panel: #3a3a3a;
            --dune-border: #1a1a1a;
            --dune-accent: #ff453a; 
            --dune-screen: #e6e6e6;
            --wood: #5d3a24;
            --text-gray: #aaa;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            height: 100vh; background: #121212; 
            font-family: 'Saira', sans-serif;
            display: flex; align-items: center; justify-content: center;
        }

        /* Główna obudowa - Zachowany rozmiar i proporcje */
        .synth-chassis {
            width: 1100px; height: 550px;
            background: var(--dune-bg);
            border-left: 15px solid var(--wood);
            border-right: 15px solid var(--wood);
            border-top: 2px solid #444;
            border-bottom: 8px solid #1a1a1a;
            border-radius: 4px; padding: 15px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            display: flex; flex-direction: column;
        }

        /* Układ rzędów z oryginalnego kodu */
        .top-row { display: flex; gap: 15px; flex: 1.2; margin-bottom: 15px; }
        .bottom-row { display: flex; gap: 15px; flex: 0.8; }

        .section-box {
            background: var(--dune-panel);
            border-radius: 3px; border: 1px solid var(--dune-border);
            padding: 15px; position: relative;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
        }

        .section-label {
            position: absolute; top: 5px; left: 10px;
            font-size: 10px; font-weight: 700; color: var(--text-gray);
            text-transform: uppercase; letter-spacing: 1px;
        }

        /* Kolumna funkcyjna (lewa) */
        .func-column { display: flex; flex-direction: column; gap: 8px; width: 80px; justify-content: center; }
        .func-btn {
            height: 30px; background: #222; border: 1px solid #000;
            border-radius: 2px; color: #888; font-size: 9px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-weight: 700; text-transform: uppercase;
            transition: 0.2s;
        }
        .func-btn:hover { color: #fff; background: #2a2a2a; }
        .func-btn.active-led { border-color: var(--dune-accent); color: var(--dune-accent); }

        /* Siatka stacji (środek) */
        .patch-grid {
            flex: 2; display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 8px; padding-top: 15px;
        }
        .patch-btn {
            background: #222; border: 1px solid #111;
            border-radius: 2px; color: #777; font-size: 11px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-weight: 600; transition: 0.2s;
        }
        .patch-btn.active {
            background: #2d2d2d; color: var(--dune-accent);
            border-color: var(--dune-accent);
            box-shadow: 0 0 10px rgba(255, 69, 58, 0.2);
        }

        /* Sekcja Master (prawa) */
        .master-section { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        .knob-outer {
            width: 90px; height: 90px; background: #1a1a1a;
            border-radius: 50%; border: 3px solid #000;
            position: relative; cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }
        .knob-indicator {
            position: absolute; top: 8px; left: 50%; width: 3px; height: 12px;
            background: var(--dune-accent); transform: translateX(-50%);
            border-radius: 2px;
        }

        /* Dolny biały wyświetlacz (Dune Screen) */
        .main-status {
            flex: 2; background: var(--dune-screen); border: 3px solid var(--dune-border);
            display: flex; flex-direction: column; justify-content: center;
            padding: 0 25px; border-radius: 3px; color: #333;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.1);
        }
        .status-line { color: #888; font-size: 10px; font-weight: 700; text-transform: uppercase; margin-bottom: 5px; }
        .status-big { 
            color: #000; font-size: 26px; font-weight: 700; 
            letter-spacing: -0.5px; border-bottom: 1px solid #ccc;
        }

        .brand-area {
            flex: 1; display: flex; flex-direction: column; align-items: flex-end; justify-content: center;
        }
        .brand-area h1 { color: #fff; font-size: 24px; letter-spacing: 3px; font-weight: 600; }
        .brand-area h1 span { color: var(--dune-accent); }

        /* Suwak - ukryty technicznie, ale steruje głośnością */
        input[type="range"] {
            width: 100%; margin-top: 15px; accent-color: var(--dune-accent);
        }

    </style>
</head>
<body>

<div class="synth-chassis">
    <!-- GÓRNY RZĄD: Oryginalny układ 3-kolumnowy -->
    <div class="top-row">
        <div class="section-box func-column">
            <div class="section-label">System</div>
            <div class="func-btn" onclick="toggle()">Play</div>
            <div class="func-btn">Menu</div>
            <div class="func-btn">Multi</div>
            <div class="func-btn active-led">Solo</div>
        </div>

        <div class="section-box" style="flex: 2.5;">
            <div class="section-label">Differential Oscillator / Station Select</div>
            <div class="patch-grid" id="grid"></div>
        </div>

        <div class="section-box master-section">
            <div class="section-label">Master Volume</div>
            <div class="knob-outer" id="v-knob" onclick="resetVol()">
                <div class="knob-indicator" id="v-ptr"></div>
            </div>
            <input type="range" id="v-slider" min="0" max="100" value="50" oninput="setV(this.value)">
            <div style="color: var(--text-gray); font-size: 10px; margin-top: 5px; font-weight: 700;">VALUE: <span id="vol-val" style="color: #fff;">50</span>%</div>
        </div>
    </div>

    <!-- DOLNY RZĄD -->
    <div class="bottom-row">
        <div class="section-box" style="flex: 0.4; display: flex; align-items: center; justify-content: center;">
            <div class="section-label">Bank</div>
            <div style="font-family: 'Orbitron', sans-serif; font-size: 24px; color: var(--dune-accent); text-shadow: 0 0 10px rgba(255,69,58,0.3);" id="bank-num">A</div>
        </div>

        <div class="section-box main-status">
            <div class="status-line">PATCH DESCRIPTION // ACTIVE STREAM</div>
            <div class="status-big" id="patch-name">001: RMF FM INITIAL</div>
        </div>

        <div class="brand-area">
            <h1>SYNAPSE <span>DUNE 3</span></h1>
            <div style="color: #666; font-size: 9px; font-weight: 700; letter-spacing: 1px;">RADIO STREAMING SYNTHESIZER</div>
        </div>
    </div>
</div>

<audio id="player"></audio>

<script>
    const STATIONS = [
        { n: 'RMF FM', u: 'rmf_fm' }, { n: 'RMF MAXXX', u: 'RMFMAXXX48' },
        { n: 'RMF 80s', u: 'rmf_80s' }, { n: 'RMF 90s', u: 'rmf_90s' },
        { n: 'RMF 2000', u: 'rmf_2000' }, { n: 'RMF CHILLOUT', u: 'rmf_chillout' },
        { n: 'RMF CLASSIC', u: 'rmf_classic' }, { n: 'RMF DANCE', u: 'rmf_dance' },
        { n: 'RMF GOLD', u: 'rmf_gold' }, { n: 'RMF PARTY', u: 'rmf_party' },
        { n: 'RMF ROCK', u: 'rmf_rock' }, { n: 'RMF LOVE', u: 'rmf_love' },
        { n: 'RMF POLSKI ROCK', u: 'rmf_polski_rock' }, { n: 'RMF JAZZ', u: 'rmf_smooth_jazz' },
        { n: 'RMF HIP HOP', u: 'rmf_hip_hop' }, { n: 'RMF GROOVE', u: 'rmf_groove' }
    ];

    const player = document.getElementById('player'), 
          grid = document.getElementById('grid'),
          vPtr = document.getElementById('v-ptr'),
          vSlider = document.getElementById('v-slider'),
          volVal = document.getElementById('vol-val'),
          patchName = document.getElementById('patch-name'),
          bankNum = document.getElementById('bank-num');

    let current = -1;

    STATIONS.forEach((s, i) => {
        const btn = document.createElement('div');
        btn.className = 'patch-btn';
        btn.textContent = (i + 1).toString().padStart(3, '0');
        btn.onclick = () => play(i);
        grid.appendChild(btn);
    });

    function play(i) {
        current = i;
        document.querySelectorAll('.patch-btn').forEach((b, idx) => b.classList.toggle('active', idx === i));
        patchName.textContent = (i + 1).toString().padStart(3, '0') + ": " + STATIONS[i].n.toUpperCase();
        bankNum.textContent = String.fromCharCode(65 + Math.floor(i/4)); // Dynamiczne banki A, B, C...
        
        const streamBase = "https://rs201-krk.rmfstream.pl/";
        player.src = (STATIONS[i].n === 'RMF MAXXX') ? 'https://rs7-krk2-cyfronet.rmfstream.pl/RMFMAXXX48' : streamBase + STATIONS[i].u;
        player.play();
    }

    function toggle() {
        if(current === -1) { play(0); return; }
        if(!player.paused) player.pause(); else player.play();
    }

    function setV(v) {
        player.volume = v / 100;
        volVal.textContent = v;
        // Obrót od -150 do +150 stopni
        const rot = (v * 3) - 150;
        vPtr.parentElement.style.transform = `rotate(${rot}deg)`;
    }

    function resetVol() { vSlider.value = 50; setV(50); }

    setV(50);
</script>

</body>
</html>
