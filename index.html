<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RMF TERMINAL - PCB CIRCUIT EDITION</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Megrim&family=Montserrat+Alternates:wght@400;600;700&display=swap');

        :root {
            --yellow: #fce300;
            --yellow-neon: #fffb00;
            --bg: #000;
            --tile: #0a0a0a;
            --border: #222;
            --blue-wave: #00ccff;
            --circuit-line: #333; /* Kolor ścieżek obwodu */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { 
            height: 100vh; width: 100vw; 
            background: var(--bg); color: #fff; 
            font-family: 'Montserrat Alternates', sans-serif;
            overflow: hidden; 
        }

        /* Tło w stylu PCB */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(var(--circuit-line) 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.1;
            z-index: -1;
        }

        body { display: flex; flex-direction: column; padding: 2vh; }

        header { 
            height: 50px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border); margin-bottom: 2vh; flex-shrink: 0;
        }
        .header-info { font-size: 24px; font-weight: 700; color: var(--yellow); text-transform: uppercase; }
        .clock { color: var(--yellow); font-size: 24px; font-weight: 700; }

        .app-content { display: flex; flex: 1; gap: 3vw; min-height: 0; }

        .grid { 
            flex: 1.4; display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            grid-auto-rows: 1fr;
            gap: 20px; 
            overflow-y: auto;
            padding: 10px;
        }

        .grid::-webkit-scrollbar { width: 4px; }
        .grid::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        /* KAFELKI JAKO UKŁADY SCALONE */
        .tile {
            background: var(--tile); 
            border: 1px solid var(--border); 
            border-radius: 4px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; position: relative; min-height: 85px;
            transition: all 0.3s;
        }

        /* Nóżki układu scalonego (prawa i lewa strona) */
        .tile::before, .tile::after {
            content: "";
            position: absolute;
            width: 8px; height: 60%;
            border-top: 2px solid var(--circuit-line);
            border-bottom: 2px solid var(--circuit-line);
            top: 20%;
        }
        .tile::before { left: -9px; border-left: 2px solid var(--circuit-line); }
        .tile::after { right: -9px; border-right: 2px solid var(--circuit-line); }

        .tile .t-top { font-size: 13px; font-weight: 700; color: var(--yellow); z-index: 2; text-align: center; text-transform: uppercase; }
        .tile .t-bottom { font-size: 9px; font-weight: 600; color: var(--yellow); margin-top: 4px; z-index: 2; opacity: 0.6; }

        .tile.active { 
            border-color: var(--yellow-neon); 
            background: #151510;
            box-shadow: 0 0 20px rgba(255, 251, 0, 0.15);
        }
        .tile.active::before, .tile.active::after { border-color: var(--yellow-neon); }

        /* BOCZNY PANEL */
        .sidebar { 
            flex: 0.6; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; gap: 4vh;
            border-left: 1px solid var(--border); padding-left: 3vw;
            position: relative;
        }

        .logo-display {
            width: 100%; max-width: 300px; aspect-ratio: 16/10;
            border: 2px solid var(--yellow); 
            position: relative;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #050505;
            padding: 20px;
        }

        /* Ścieżki odchodzące od wyświetlacza (jak na obrazku PCB) */
        .logo-display::before {
            content: ""; position: absolute; top: -20px; width: 2px; height: 20px; background: var(--yellow);
            box-shadow: -40px 0 var(--yellow), 40px 0 var(--yellow);
        }

        .logo-display h2 { 
            font-family: 'Megrim', cursive; 
            font-size: 48px; 
            color: var(--yellow); 
            text-shadow: 0 0 10px var(--yellow); 
        }
        
        /* PRZYCISKI STEROWANIA Z "PUNKTAMI LUTOWNICZYMI" */
        .controls { display: flex; align-items: center; gap: 40px; position: relative; }
        
        .c-svg { 
            width: 35px; height: 35px; fill: var(--yellow); cursor: pointer; 
            position: relative;
        }
        
        .c-play { 
            width: 75px; height: 75px; 
            padding: 10px;
            border: 2px solid var(--yellow);
            border-radius: 50%;
        }

        /* Wolumator */
        .vol-box { display: flex; align-items: center; gap: 15px; width: 300px; }
        .vol-btn { 
            width: 35px; height: 35px; border: 1px solid var(--yellow); 
            background: none; color: var(--yellow); cursor: pointer; 
            border-radius: 2px;
        }
        .vol-bar { 
            flex: 1; height: 20px; border-bottom: 2px solid var(--circuit-line); 
            display: flex; align-items: center; position: relative;
        }
        
        input[type="range"] { width: 100%; appearance: none; background: transparent; }
        input[type="range"]::-webkit-slider-runnable-track { background: var(--circuit-line); height: 2px; }
        input[type="range"]::-webkit-slider-thumb { 
            appearance: none; width: 14px; height: 14px; 
            background: var(--yellow); border-radius: 0; 
            margin-top: -6px;
        }

        /* RESPONSYWNOŚĆ */
        @media (max-width: 600px) {
            .grid { grid-template-columns: repeat(3, 1fr); height: 55vh; }
            .sidebar { border-left: none; border-top: 1px solid var(--border); padding: 20px 0; }
            .logo-display h2 { font-size: 32px; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-info" id="playing-now">PCB TERMINAL v1.0</div>
    <div class="clock" id="timer">00:00</div>
</header>

<div class="app-content">
    <div class="grid" id="station-grid"></div>

    <aside class="sidebar">
        <div class="logo-display">
            <h2 id="display-name">TECHNO</h2>
            <p id="display-cat" style="font-size: 10px; color: var(--yellow); opacity: 0.7;">CIRCUIT READY</p>
        </div>

        <div class="controls">
            <svg class="c-svg" viewBox="0 0 24 24" onclick="skip(-1)"><path d="M6,18V6H8V18H6M9.5,12L18,6V18L9.5,12Z"/></svg>
            <svg class="c-svg c-play" viewBox="0 0 24 24" onclick="toggle()"><path id="p-ico" d="M8,5.14V19.14L19,12.14L8,5.14Z"/></svg>
            <svg class="c-svg" viewBox="0 0 24 24" onclick="skip(1)"><path d="M16,18H18V6H16M6,18L14.5,12L6,6V18Z"/></svg>
        </div>

        <div class="vol-box">
            <button class="vol-btn" onclick="adj(-5)">-</button>
            <div class="vol-bar">
                <input type="range" id="v-range" min="0" max="100" value="50" oninput="setV(this.value)">
            </div>
            <button class="vol-btn" onclick="adj(5)">+</button>
        </div>
    </aside>
</div>

<audio id="player"></audio>

<script>
    const STATIONS = [
        { n: 'TECH 88', c: 'TECHNO', u: 'https://laut.fm/tech88' },
        { n: 'HR 3 CLUBNIGHT', c: 'TECHNO', u: 'https://laut.fm/hr3_clubnight' },
        { n: '1000 TECHNO', c: 'TECHNO', u: 'https://laut.fm/1000techno' },
        { n: 'BEST OF TECHNO', c: 'TECHNO', u: 'https://laut.fm/best-of-techno' },
        { n: 'CHRIS BURN', c: 'TECHNO', u: 'https://laut.fm/chris_burn' },
        { n: 'RETROELECTRONIC', c: 'TECHNO', u: 'https://laut.fm/retroelectronicmusic' },
        { n: 'DRUMANDBASS FM', c: 'D&B', u: 'https://laut.fm/drumandbass_fm' },
        { n: 'FMBASE', c: 'D&B', u: 'https://laut.fm/fmbase' },
        { n: 'DNBZONE', c: 'D&B', u: 'https://laut.fm/dnbzone' },
        { n: 'DNB BASE', c: 'D&B', u: 'https://laut.fm/dnb-base' },
        { n: 'A5RECORDINGS', c: 'D&B', u: 'https://laut.fm/a5recordings' },
        { n: 'DJMO', c: 'D&B', u: 'https://laut.fm/djmo' },
        { n: 'DEEP HOUSE', c: 'HOUSE', u: 'https://laut.fm/deep-house-sounds' },
        { n: 'HOUSEBOMB FN', c: 'HOUSE', u: 'https://laut.fm/housebomb-fn' },
        { n: 'SYMBIOTIC BEATS', c: 'HOUSE', u: 'https://laut.fm/symbiotic-beats' },
        { n: 'TRANCEMOTION', c: 'TRANCE', u: 'https://laut.fm/trancemotionfm' },
        { n: 'YOURTRANCE', c: 'TRANCE', u: 'https://laut.fm/yourtranceradio' },
        { n: 'GOA FM', c: 'GOA', u: 'https://laut.fm/goafm' },
        { n: 'PSYCORE', c: 'PSY', u: 'https://laut.fm/psycore' },
        { n: 'GEHIRN TREIBER', c: 'BEAT', u: 'https://laut.fm/gehirn-treiber-beat-radio' }
    ];

    const player = document.getElementById('player'), 
          ico = document.getElementById('p-ico'), 
          grid = document.getElementById('station-grid'),
          dispName = document.getElementById('display-name');

    let current = -1;

    function clock() {
        const d = new Date();
        document.getElementById('timer').textContent = d.getHours().toString().padStart(2,'0') + ":" + d.getMinutes().toString().padStart(2,'0');
    }
    setInterval(clock, 1000); clock();

    STATIONS.forEach((s, i) => {
        const t = document.createElement('div');
        t.className = 'tile';
        t.innerHTML = `<div class="t-top">${s.n}</div><div class="t-bottom">${s.c}</div>`;
        t.onclick = () => play(i);
        grid.appendChild(t);
    });

    function play(i) {
        current = i;
        document.querySelectorAll('.tile').forEach((t, idx) => t.classList.toggle('active', idx === i));
        dispName.textContent = STATIONS[i].n;
        player.src = STATIONS[i].u;
        player.play();
        ico.setAttribute('d', 'M14,19H18V5H14M6,19H10V5H6V19Z');
    }

    function toggle() {
        if(current === -1) play(0);
        else if(player.paused) { player.play(); ico.setAttribute('d', 'M14,19H18V5H14M6,19H10V5H6V19Z'); }
        else { player.pause(); ico.setAttribute('d', 'M8,5.14V19.14L19,12.14L8,5.14Z'); }
    }

    function skip(d) {
        let n = current + d;
        if(n >= 0 && n < STATIONS.length) play(n);
    }

    function setV(v) { player.volume = v / 100; }
    function adj(d) { 
        const r = document.getElementById('v-range');
        r.value = parseInt(r.value) + d;
        setV(r.value);
    }
</script>
</body>
</html>
