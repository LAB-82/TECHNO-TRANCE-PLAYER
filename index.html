<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>L.A.B. RADIO - LENCO EDITION</title>
    <link href="https://fonts.cdnfonts.com/css/ds-digital" rel="stylesheet">
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        /* Obudowa Lenco - Drewno + Srebrny Panel */
        .lenco-case {
            width: 880px;
            height: 500px;
            background: #b58950;
            background-image: repeating-linear-gradient(rgba(0,0,0,0.05) 0px, rgba(0,0,0,0.05) 2px, transparent 2px, transparent 4px);
            border-radius: 40px;
            padding: 25px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.9), inset 0 0 30px rgba(0,0,0,0.3);
            position: relative;
            box-sizing: border-box;
        }

        .silver-front {
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #cfcfcf 0%, #9e9e9e 100%);
            border-radius: 20px;
            border: 1px solid #777;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            box-shadow: inset 0 2px 5px #fff;
        }

        /* Branding - L.A.B. Radio */
        #main-title {
            font-family: 'DS-Digital', monospace;
            font-size: 50px;
            color: #444;
            letter-spacing: 6px;
            margin-top: 30px;
            margin-bottom: 10px;
            transition: 0.3s;
        }
        .powered #main-title { color: #e60012; text-shadow: 0 0 20px #e60012; }

        /* Głośniki po bokach */
        .speaker {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            background: #222;
            background-image: radial-gradient(#111 1px, transparent 1px);
            background-size: 4px 4px;
            border: 6px solid #888;
            position: absolute;
            top: 110px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }
        .speaker.left { left: 40px; }
        .speaker.right { right: 40px; }

        /* Wyświetlacz */
        .display-frame {
            width: 260px;
            height: 130px;
            background: #000;
            border: 4px solid #555;
            margin-bottom: 20px;
            z-index: 5;
        }
        canvas { width: 100%; height: 100%; }

        /* Przyciski Stacji (NAD sterowaniem) */
        .stations-row {
            display: flex;
            gap: 4px;
            margin-bottom: 8px;
            z-index: 10;
        }
        .btn-station {
            width: 45px;
            height: 15px;
            background: #333;
            border: 1px solid #111;
            border-radius: 2px;
            cursor: pointer;
        }

        /* Twoje oryginalne przyciski sterowania */
        .controls-row {
            display: flex;
            gap: 6px;
            z-index: 10;
        }
        .btn-orig {
            width: 55px;
            height: 38px;
            background: linear-gradient(180deg, #444 0%, #222 100%);
            border: 1px solid #000;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-orig svg { width: 18px; fill: #666; }
        .powered .btn-orig:active { background: #555; }
        .powered .btn-orig.active svg { fill: #e60012; filter: drop-shadow(0 0 5px #e60012); }

        /* Pasek głośności i L.A.B. Circle */
        .bottom-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 15px;
            z-index: 10;
        }
        .vol-bar {
            width: 120px;
            height: 5px;
            background: #333;
            border-radius: 2px;
            margin-bottom: 10px;
            overflow: hidden;
        }
        .vol-fill { width: 50%; height: 100%; background: #e60012; opacity: 0; }
        .powered .vol-fill { opacity: 1; box-shadow: 0 0 8px #e60012; }

        .lab-circle {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: 2px solid #666;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8px;
            color: #666;
            font-weight: bold;
        }
        .powered .lab-circle { color: #e60012; border-color: #e60012; }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="lenco-case" id="unit">
    <div class="silver-front">
        <div id="main-title">L.A.B. RADIO</div>
        
        <div class="speaker left"></div>
        <div class="speaker right"></div>

        <div class="display-frame">
            <canvas id="viz"></canvas>
        </div>

        <!-- Przyciski stacji - NOWOŚĆ -->
        <div class="stations-row">
            <div class="btn-station"></div>
            <div class="btn-station"></div>
            <div class="btn-station"></div>
            <div class="btn-station"></div>
            <div class="btn-station"></div>
            <div class="btn-station"></div>
        </div>

        <!-- Oryginalne sterowanie -->
        <div class="controls-row">
            <button id="pwr" class="btn-orig"><svg viewBox="0 0 24 24"><path d="M13,3h-2v10h2V3z M17.8,4.5l-1.4,1.4C18.3,7.4,19,9.6,19,12c0,3.9-3.1,7-7,7s-7-3.1-7-7c0-2.4,0.7-4.6,2.6-6.1L6.2,4.5 C3.6,6.4,2,9.5,2,13c0,5.5,4.5,10,10,10s10-4.5,10-10C22,9.5,20.4,6.4,17.8,4.5z"/></svg></button>
            <button id="play" class="btn-orig"><svg viewBox="0 0 24 24"><path d="M8,5.14V19.14L19,12.14L8,5.14Z"/></svg></button>
            <button id="stop" class="btn-orig"><svg viewBox="0 0 24 24"><path d="M6,6H18V18H6V6Z"/></svg></button>
            <button id="mute" class="btn-orig"><svg viewBox="0 0 24 24"><path d="M3,9V15H7L12,20V4L7,9H3M16.5,12C16.5,10.23 15.48,8.71 14,8V16C15.48,15.29 16.5,13.77 16.5,12M14,3.23V5.29C16.89,6.15 19,8.83 19,12C19,15.17 16.89,17.85 14,18.71V20.77C18.01,19.86 21,16.28 21,12C21,7.72 18.01,4.14 14,3.23Z"/></svg></button>
            <button id="vDn" class="btn-orig"><svg viewBox="0 0 24 24"><path d="M19,13H5V11H19V13Z"/></svg></button>
            <button id="vUp" class="btn-orig"><svg viewBox="0 0 24 24"><path d="M19,13H13V19H11V13H5V11H11V5H13V11H19V13Z"/></svg></button>
        </div>

        <div class="bottom-section">
            <div class="vol-bar"><div id="vBar" class="vol-fill"></div></div>
            <div class="lab-circle">L.A.B.</div>
        </div>
    </div>
</div>

<audio id="stream" crossorigin="anonymous" src="https://stream.rcs.revma.com/gzwc1xcq042vv"></audio>

<script>
    const audio = document.getElementById('stream');
    const canvas = document.getElementById('viz');
    const ctx = canvas.getContext('2d');
    const unit = document.getElementById('unit');
    const pwrBtn = document.getElementById('pwr');
    const vBar = document.getElementById('vBar');

    let audioCtx, analyser, source, dataArray, isOn = false;

    pwrBtn.onclick = () => {
        isOn = !isOn;
        unit.classList.toggle('powered');
        pwrBtn.classList.toggle('active');
        if(!isOn) { audio.pause(); updateViz(null); }
    };

    document.getElementById('play').onclick = function() {
        if(!isOn) return;
        if(!audioCtx) {
            audioCtx = new(window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            source = audioCtx.createMediaElementSource(audio);
            source.connect(analyser);
            analyser.fftSize = 64;
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            source.connect(audioCtx.destination);
        }
        audio.play();
        this.classList.add('active');
        loop();
    };

    document.getElementById('stop').onclick = () => {
        audio.pause(); audio.currentTime = 0;
        document.getElementById('play').classList.remove('active');
    };

    document.getElementById('vUp').onclick = () => { 
        audio.volume = Math.min(1, audio.volume + 0.1); 
        vBar.style.width = (audio.volume * 100) + '%';
    };
    document.getElementById('vDn').onclick = () => { 
        audio.volume = Math.max(0, audio.volume - 0.1); 
        vBar.style.width = (audio.volume * 100) + '%';
    };

    function updateViz(data) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const bars = 32;
        const w = canvas.width / bars;
        for (let i = 0; i < bars; i++) {
            const h = data ? (data[i] / 255) * canvas.height : 0;
            ctx.fillStyle = isOn ? '#e60012' : '#333';
            for(let j=0; j<10; j++) {
                if(j < (h/10)) {
                    ctx.fillRect(i*w + 1, canvas.height - (j*14) - 12, w-2, 10);
                }
            }
        }
    }

    function loop() {
        if(!isOn || audio.paused) return;
        requestAnimationFrame(loop);
        analyser.getByteFrequencyData(dataArray);
        updateViz(dataArray);
    }

    window.onload = () => {
        canvas.width = canvas.clientWidth;
        canvas.height = canvas.clientHeight;
        vBar.style.width = (audio.volume * 100) + '%';
        updateViz(null);
    };
</script>
</body>
</html>
