<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RMF POLYGON 2 EDITION</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=JetBrains+Mono:wght@300;500&display=swap');
        
        :root {
            --poly-bg: #0a0a0c;
            --poly-panel: #141417;
            --poly-border: #252529;
            --neon-purple: #bc26ff;
            --neon-blue: #00f2ff;
            --neon-green: #39ff14;
            --text-dim: #666670;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            height: 100vh; background: #050505; 
            font-family: 'JetBrains Mono', monospace;
            display: flex; align-items: center; justify-content: center;
            color: #fff;
        }

        /* Główny interfejs Polygon 2 */
        .vst-container {
            width: 1100px; height: 550px;
            background: var(--poly-bg);
            border: 1px solid var(--poly-border);
            padding: 20px;
            display: flex; flex-direction: column;
            box-shadow: 0 0 40px rgba(0,0,0,1);
            position: relative;
            overflow: hidden;
        }

        /* Dekoracyjne linie w tle (Glitch Style) */
        .vst-container::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px),
                        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 20px 20px; pointer-events: none;
        }

        .top-row { display: flex; gap: 20px; flex: 1.2; margin-bottom: 20px; z-index: 1; }
        .bottom-row { display: flex; gap: 20px; flex: 0.8; z-index: 1; }

        .module {
            background: var(--poly-panel);
            border: 1px solid var(--poly-border);
            padding: 15px; position: relative;
        }

        .mod-header {
            font-family: 'Syncopate', sans-serif;
            font-size: 9px; font-weight: 700; color: var(--text-dim);
            text-transform: uppercase; letter-spacing: 2px;
            margin-bottom: 15px; display: flex; justify-content: space-between;
        }

        /* Kolumna funkcyjna - Przyciski Glitch */
        .sidebar { width: 90px; display: flex; flex-direction: column; gap: 10px; }
        .g-btn {
            height: 32px; background: #1c1c21; border: 1px solid #333;
            color: #888; font-size: 8px; font-weight: 700;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.1s; text-transform: uppercase;
        }
        .g-btn:hover { background: #25252b; color: var(--neon-blue); }
        .g-btn.active { border-color: var(--neon-purple); color: var(--neon-purple); box-shadow: inset 0 0 5px rgba(188, 38, 255, 0.2); }

        /* Matryca stacji (Polygon Grids) */
        .station-grid {
            flex: 2; display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        .node {
            background: #0f0f12; border: 1px solid #1f1f24;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s; position: relative;
        }
        .node::after { content: ""; position: absolute; width: 4px; height: 4px; background: #333; top: 5px; right: 5px; }
        .node:hover { border-color: #444; }
        .node.selected { border-color: var(--neon-blue); }
        .node.selected::after { background: var(--neon-blue); box-shadow: 0 0 8px var(--neon-blue); }
        .node-id { font-size: 10px; color: #555; }

        /* Master Section - Neon Knob */
        .master-ctrl { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .ring-container {
            width: 100px; height: 100px; position: relative;
            display: flex; align-items: center; justify-content: center;
        }
        .outer-ring {
            position: absolute; inset: 0; border: 2px solid #1f1f24; border-radius: 50%;
        }
        .neon-knob {
            width: 70px; height: 70px; background: #000; border: 2px solid #222;
            border-radius: 50%; position: relative; cursor: pointer;
        }
        .neon-indicator {
            position: absolute; top: 5px; left: 50%; width: 2px; height: 15px;
            background: var(--neon-blue); transform-origin: center 30px;
        }

        /* Dolny panel - Waveform / Display */
        .data-screen {
            flex: 2.5; display: flex; flex-direction: column; justify-content: center;
        }
        .viz-box {
            height: 60px; border-left: 2px solid var(--neon-purple);
            margin-bottom: 10px; position: relative; overflow: hidden;
            background: rgba(188, 38, 255, 0.03);
        }
        .status-title { font-family: 'Syncopate', sans-serif; font-size: 18px; color: #fff; margin-bottom: 5px; }
        .status-sub { color: var(--neon-purple); font-size: 10px; letter-spacing: 2px; }

        .logo-box {
            flex: 1; display: flex; flex-direction: column; align-items: flex-end; justify-content: center;
            opacity: 0.8;
        }
        .logo-box h1 { font-family: 'Syncopate', sans-serif; font-size: 22px; letter-spacing: -1px; }
        .logo-box span { color: var(--neon-blue); }

        input[type="range"] {
            width: 100%; margin-top: 15px; appearance: none; background: #1c1c21; height: 2px;
        }
        input[type="range"]::-webkit-slider-thumb {
            appearance: none; width: 12px; height: 12px; background: var(--neon-blue); border-radius: 50%; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="vst-container">
    <div class="top-row">
        <div class="module sidebar">
            <div class="mod-header">CORE</div>
            <div class="g-btn" onclick="toggle()">PLAY/STOP</div>
            <div class="g-btn active">HYBRID</div>
            <div class="g-btn">GLITCH</div>
            <div class="g-btn">SHIFT</div>
        </div>

        <div class="module station-grid" id="grid">
            <!-- Wygenerowane węzły stacji -->
        </div>

        <div class="module master-ctrl">
            <div class="mod-header">OUTPUT</div>
            <div class="ring-container">
                <div class="outer-ring"></div>
                <div class="neon-knob" id="v-knob" onclick="resetVol()">
                    <div class="neon-indicator" id="v-ptr"></div>
                </div>
            </div>
            <input type="range" id="v-slider" min="0" max="100" value="50" oninput="setV(this.value)">
            <div style="font-size: 9px; margin-top: 10px; color: var(--text-dim);">GAIN // <span id="vol-val" style="color: var(--neon-blue);">50</span></div>
        </div>
    </div>

    <div class="bottom-row">
        <div class="module" style="flex: 0.5; display: flex; align-items: center; justify-content: center;">
            <div class="mod-header" style="position: absolute; top: 5px;">BANK</div>
            <div id="bank-id" style="font-size: 32px; font-weight: 300; color: var(--neon-green);">01</div>
        </div>

        <div class="module data-screen">
            <div class="viz-box" id="viz"></div>
            <div class="status-sub">SAMPLER SOURCE // STREAM ACTIVE</div>
            <div class="status-title" id="patch-name">READY_PLAYER_ONE</div>
        </div>

        <div class="logo-box">
            <h1>POLY<span>GON</span></h1>
            <div style="font-size: 8px; letter-spacing: 4px; color: var(--text-dim);">HYBRID SAMPLER // RMF FM</div>
        </div>
    </div>
</div>

<audio id="player"></audio>

<script>
    const STATIONS = [
        { n: 'RMF FM', u: 'rmf_fm' }, { n: 'RMF MAXXX', u: 'RMFMAXXX48' },
        { n: 'RMF 80s', u: 'rmf_80s' }, { n: 'RMF 90s', u: 'rmf_90s' },
        { n: 'RMF 2000', u: 'rmf_2000' }, { n: 'RMF CHILLOUT', u: 'rmf_chillout' },
        { n: 'RMF CLASSIC', u: 'rmf_classic' }, { n: 'RMF DANCE', u: 'rmf_dance' },
        { n: 'RMF GOLD', u: 'rmf_gold' }, { n: 'RMF PARTY', u: 'rmf_party' },
        { n: 'RMF ROCK', u: 'rmf_rock' }, { n: 'RMF LOVE', u: 'rmf_love' },
        { n: 'RMF POLSKI ROCK', u: 'rmf_polski_rock' }, { n: 'RMF JAZZ', u: 'rmf_smooth_jazz' },
        { n: 'RMF HIP HOP', u: 'rmf_hip_hop' }, { n: 'RMF GROOVE', u: 'rmf_groove' }
    ];

    const player = document.getElementById('player'), 
          grid = document.getElementById('grid'),
          vPtr = document.getElementById('v-ptr'),
          vSlider = document.getElementById('v-slider'),
          volVal = document.getElementById('vol-val'),
          patchName = document.getElementById('patch-name'),
          bankId = document.getElementById('bank-id'),
          viz = document.getElementById('viz');

    let current = -1;

    STATIONS.forEach((s, i) => {
        const node = document.createElement('div');
        node.className = 'node';
        node.innerHTML = `<div class="node-id">${(i + 1).toString().padStart(2, '0')}</div>`;
        node.onclick = () => play(i);
        grid.appendChild(node);
    });

    function play(i) {
        current = i;
        document.querySelectorAll('.node').forEach((n, idx) => n.classList.toggle('selected', idx === i));
        patchName.textContent = STATIONS[i].n.replace(/\s+/g, '_').toUpperCase();
        bankId.textContent = (i + 1).toString().padStart(2, '0');
        
        const streamBase = "https://rs201-krk.rmfstream.pl/";
        player.src = (STATIONS[i].n === 'RMF MAXXX') ? 'https://rs7-krk2-cyfronet.rmfstream.pl/RMFMAXXX48' : streamBase + STATIONS[i].u;
        player.play();
    }

    function toggle() {
        if(current === -1) { play(0); return; }
        if(!player.paused) player.pause(); else player.play();
    }

    function setV(v) {
        player.volume = v / 100;
        volVal.textContent = v;
        const rot = (v * 3) - 150;
        vPtr.style.transform = `translateX(-50%) rotate(${rot}deg)`;
    }

    function resetVol() { vSlider.value = 50; setV(50); }

    // Prosta animacja "glitch" dla wizualizacji
    setInterval(() => {
        if(!player.paused) {
            viz.innerHTML = '';
            for(let i=0; i<30; i++) {
                const bar = document.createElement('div');
                const h = Math.random() * 60;
                bar.style.cssText = `position:absolute; left:${i*3.4}%; bottom:0; width:2px; height:${h}px; background:var(--neon-purple); opacity:${Math.random()}`;
                viz.appendChild(bar);
            }
        }
    }, 100);

    setV(50);
</script>

</body>
</html>
