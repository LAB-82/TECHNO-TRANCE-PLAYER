<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muzyczne Radio - Perfect Retro Style</title>
    <link href="https://fonts.cdnfonts.com/css/ds-digital" rel="stylesheet">
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #d1d1d1;
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }

        /* Drewniana ramka - ciemny orzech jak na zdjęciu image_57d9db.jpg */
        .case-outer {
            padding: 15px;
            background: #5d4037; 
            background-image: 
                repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(0,0,0,0.1) 41px, transparent 42px),
                linear-gradient(135deg, #6d4c41 0%, #3e2723 100%);
            border-radius: 40px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.5), inset 0 0 15px rgba(0,0,0,0.3);
            position: relative;
            /* Precyzyjne ścięcie rogów */
            clip-path: polygon(6% 0%, 94% 0%, 100% 10%, 100% 90%, 94% 100%, 6% 100%, 0% 90%, 0% 10%);
        }

        /* Panel przedni - czysta biel */
        .radio-front {
            width: 820px;
            height: 480px;
            background: #ffffff;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid #e0e0e0;
            clip-path: polygon(6% 0%, 94% 0%, 100% 10%, 100% 90%, 94% 100%, 6% 100%, 0% 90%, 0% 10%);
        }

        .main-title {
            margin-top: 35px;
            font-size: 26px;
            color: #222;
            letter-spacing: 3px;
            font-weight: 800;
            text-transform: uppercase;
        }

        /* Wyświetlacz LCD */
        .lcd-display {
            width: 300px;
            height: 160px;
            background: #080808;
            border: 5px solid #1a1a1a;
            border-radius: 12px;
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'DS-Digital', monospace;
            color: #1a1a1a;
            transition: color 0.4s, box-shadow 0.4s;
            z-index: 2;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.9);
        }

        .powered .lcd-display { 
            color: #00ff41; 
            text-shadow: 0 0 12px rgba(0,255,65,0.6);
            box-shadow: inset 0 0 30px rgba(0,255,65,0.1), 0 0 10px rgba(0,0,0,0.5);
        }

        .lcd-station { font-size: 24px; margin-bottom: 8px; height: 26px; letter-spacing: 1px; }
        .lcd-time { font-size: 42px; font-weight: bold; }
        .lcd-date { font-size: 16px; margin-top: 8px; opacity: 0.8; }

        /* Głośniki mesh z chromowaną ramką */
        .speaker-mesh {
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, #222 1.2px, transparent 1.8px);
            background-size: 5px 5px;
            background-color: #111;
            border-radius: 50%;
            position: absolute;
            top: 110px;
            /* Efekt lustrzanego chromu */
            border: 7px solid #e0e0e0;
            outline: 1px solid #999;
            box-shadow: 
                0 10px 20px rgba(0,0,0,0.3), 
                inset 0 0 25px #000,
                0 0 0 2px #fff;
        }
        .spk-l { left: 45px; }
        .spk-r { right: 45px; }

        .controls-area {
            position: absolute;
            bottom: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        /* Czarny panel sterowania */
        .btn-rack {
            display: flex;
            gap: 10px;
            padding: 15px 25px;
            border-radius: 12px;
            background: linear-gradient(180deg, #2c2c2c 0%, #111111 100%);
            border: 1px solid #444;
            box-shadow: 0 8px 16px rgba(0,0,0,0.4), inset 0 1px 1px rgba(255,255,255,0.1);
        }

        .btn-pro {
            width: 58px;
            height: 42px;
            border-radius: 6px;
            border: 1px solid #333;
            background: #1a1a1a;
            color: #666;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-pro svg { width: 22px; height: 22px; fill: currentColor; }

        /* Dolne przyciski wyboru stacji */
        .station-rack {
            display: flex;
            gap: 12px;
        }

        .btn-station-pro {
            width: 70px;
            height: 24px;
            background: linear-gradient(180deg, #f5f5f5 0%, #cccccc 100%);
            border: 1px solid #aaa;
            border-radius: 5px;
            font-family: sans-serif;
            font-size: 11px;
            font-weight: 800;
            color: #444;
            cursor: pointer;
            box-shadow: 0 3px 5px rgba(0,0,0,0.15);
            text-transform: uppercase;
        }

        /* Interakcja */
        .powered .btn-pro { color: #999; }
        .powered .btn-pro.active, .powered .btn-pro:active {
            color: #00ff41 !important;
            background: #252525;
            border-color: #00ff41 !important;
            box-shadow: 0 0 12px rgba(0,255,65,0.3);
        }

        .vol-wrapper { display: flex; flex-direction: column; gap: 6px; width: 110px; }
        .vol-bar { width: 100%; height: 5px; background: #000; border-radius: 3px; overflow: hidden; }
        .vol-fill { height: 100%; width: 50%; background: #00ff41; opacity: 0; transition: width 0.15s; }
        .powered .vol-fill { opacity: 1; box-shadow: 0 0 10px #00ff41; }

    </style>
</head>
<body>

<div class="case-outer">
    <div class="radio-front" id="mainPanel">
        <div class="main-title">MUZYCZNE RADIO</div>
        
        <div class="lcd-display">
            <div id="lcdStation" class="lcd-station"></div>
            <div id="lcdTime" class="lcd-time">00:00:00</div>
            <div id="lcdDate" class="lcd-date">01.05.2026</div>
        </div>

        <div class="speaker-mesh spk-l"></div>
        <div class="speaker-mesh spk-r"></div>

        <div class="controls-area">
            <div class="btn-rack">
                <button id="pwr" class="btn-pro"><svg viewBox="0 0 24 24"><path d="M13,3h-2v10h2V3z M17.8,4.5l-1.4,1.4C18.3,7.4,19,9.6,19,12c0,3.9-3.1,7-7,7s-7-3.1-7-7c0-2.4,0.7-4.6,2.6-6.1L6.2,4.5 C3.6,6.4,2,9.5,2,13c0,5.5,4.5,10,10,10s10-4.5,10-10C22,9.5,20.4,6.4,17.8,4.5z"/></svg></button>
                <button id="play" class="btn-pro"><svg viewBox="0 0 24 24"><path d="M8,5.14V19.14L19,12.14L8,5.14Z"/></svg></button>
                <button id="stop" class="btn-pro"><svg viewBox="0 0 24 24"><path d="M6,6H18V18H6V6Z"/></svg></button>
                <button id="mute" class="btn-pro"><svg viewBox="0 0 24 24"><path id="mute-icon" d="M3,9v6h4l5,5V4L7,9H3zm13.5,3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73,2.5-2.25,2.5-4.02zM14,3.23v2.06c2.89.86,5,3.54,5,6.71s-2.11,5.85-5,6.71v2.06c4.01-.91,7-4.49,7-8.77s-2.99-7.86-7-8.77z"/></svg></button>
                
                <div class="vol-wrapper">
                    <div style="display:flex; gap:5px; height:26px;">
                        <button id="vDown" class="btn-pro" style="width:100%; height:100%"><svg viewBox="0 0 24 24"><path d="M19,13H5V11H19V13Z"/></svg></button>
                        <button id="vUp" class="btn-pro" style="width:100%; height:100%"><svg viewBox="0 0 24 24"><path d="M19,13H13V19H11V13H5V11H11V5H13V11H19V13Z"/></svg></button>
                    </div>
                    <div class="vol-bar"><div id="vFill" class="vol-fill"></div></div>
                </div>
            </div>

            <div class="station-rack">
                <button class="btn-station-pro" onclick="changeSt(1)">Prog 1</button>
                <button class="btn-station-pro" onclick="changeSt(2)">Prog 2</button>
                <button class="btn-station-pro" onclick="changeSt(3)">Prog 3</button>
                <button class="btn-station-pro" onclick="changeSt(4)">Prog 4</button>
                <button class="btn-station-pro" onclick="changeSt(5)">Prog 5</button>
                <button class="btn-station-pro" onclick="changeSt(6)">Prog 6</button>
            </div>
        </div>
    </div>
</div>

<audio id="stream" crossorigin="anonymous" src="https://stream.rcs.revma.com/gzwc1xcq042vv"></audio>

<script>
    const audio = document.getElementById('stream');
    const panel = document.getElementById('mainPanel');
    const muteIcon = document.getElementById('mute-icon');
    const vFill = document.getElementById('vFill');
    const lcdStation = document.getElementById('lcdStation');
    const lcdTime = document.getElementById('lcdTime');

    const MUTE_OFF = "M3,9v6h4l5,5V4L7,9H3zm13.5,3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73,2.5-2.25,2.5-4.02zM14,3.23v2.06c2.89.86,5,3.54,5,6.71s-2.11,5.85-5,6.71v2.06c4.01-.91,7-4.49,7-8.77s-2.99-7.86-7-8.77z";
    const MUTE_ON = "M16.5,12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45,2.45c.03-.2.05-.41.05-.63zm2.5,0c0,.94-.2,1.82-.54,2.64l1.51,1.51C20.63,14.91,21,13.5,21,12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86,5,3.54,5,6.71zM4.27,3L3,4.27,7.73,9H3v6h4l5,5v-6.73l4.25,4.25c-.67.52-1.42.93-2.25,1.18v2.06c1.38-.31,2.63-.95,3.69-1.81L19.73,21 21,19.73l-9-9L4.27,3zM12,4L9.91,6.09,12,8.18V4z";

    let isPwr = false;

    function clock() {
        const d = new Date();
        lcdTime.textContent = d.toLocaleTimeString('pl-PL', { hour12: false });
        document.getElementById('lcdDate').textContent = d.toLocaleDateString('pl-PL');
    }
    setInterval(clock, 1000); clock();

    const flash = el => {
        el.classList.add('active');
        setTimeout(() => { 
            if(!(el.id === 'play' && !audio.paused) && !(el.id === 'mute' && audio.muted)) el.classList.remove('active'); 
        }, 300);
    };

    document.getElementById('pwr').onclick = function() {
        isPwr = !isPwr;
        panel.classList.toggle('powered');
        this.classList.toggle('active', isPwr);
        if(!isPwr) {
            audio.pause();
            document.getElementById('play').classList.remove('active');
            lcdStation.textContent = "";
        } else {
            lcdStation.textContent = "READY TO PLAY";
        }
    };

    document.getElementById('play').onclick = function() {
        if(!isPwr) return;
        audio.play().catch(() => { lcdStation.textContent = "STREAM ERROR"; });
        this.classList.add('active');
        lcdStation.textContent = "NOW PLAYING";
    };

    document.getElementById('stop').onclick = function() {
        if(!isPwr) return;
        audio.pause();
        audio.currentTime = 0;
        document.getElementById('play').classList.remove('active');
        lcdStation.textContent = "STOPPED";
        flash(this);
    };

    document.getElementById('mute').onclick = function() {
        if(!isPwr) return;
        audio.muted = !audio.muted;
        this.classList.toggle('active', audio.muted);
        muteIcon.setAttribute('d', audio.muted ? MUTE_ON : MUTE_OFF);
    };

    function updateVol() { vFill.style.width = (audio.volume * 100) + "%"; }

    document.getElementById('vUp').onclick = function() {
        if(!isPwr) return;
        audio.volume = Math.min(1, audio.volume + 0.1);
        updateVol(); flash(this);
    };

    document.getElementById('vDown').onclick = function() {
        if(!isPwr) return;
        audio.volume = Math.max(0, audio.volume - 0.1);
        updateVol(); flash(this);
    };

    function changeSt(n) {
        if(!isPwr) return;
        lcdStation.textContent = "PROGRAM " + n;
        flash(event.currentTarget);
    }

    audio.volume = 0.5;
    updateVol();
</script>
</body>
</html>
