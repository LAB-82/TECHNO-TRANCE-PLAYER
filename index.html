<!DOCTYPE html><html lang="pl"><head>    <meta charset="UTF-8">    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">    <title>RMF NEON AUDIT FINAL</title>    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;600;700&display=swap');
        
        :root {            
            --yellow: #fce300;            
            --blue-wave: #00ccff;            
            --bg: #05080a;
            --glow-y: 0 0 15px rgba(252, 227, 0, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }                
        body { 
            height: 100vh; width: 100vw; background: var(--bg); color: #fff; 
            font-family: 'Rajdhani', sans-serif; overflow: hidden; padding: 3vh;
            background-image: radial-gradient(circle at 50% 50%, #001a2e 0%, #000 100%);
        }

        /* EFEKT CRT/SCANLINES Z GRAFIKI */
        body::before {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            z-index: 10; background-size: 100% 3px, 3px 100%; pointer-events: none;
        }

        header {             
            height: 60px; display: flex; justify-content: space-between; align-items: center;            
            border-bottom: 2px solid var(--yellow); margin-bottom: 3vh;
            box-shadow: 0 0 20px rgba(252, 227, 0, 0.2);
        }        
        .header-info { font-family: 'Orbitron', sans-serif; font-size: 22px; color: var(--yellow); text-shadow: var(--glow-y); letter-spacing: 2px; }        
        .clock { font-family: 'Orbitron', sans-serif; color: var(--blue-wave); font-size: 24px; text-shadow: 0 0 10px var(--blue-wave); }

        .app-content { display: flex; flex: 1; gap: 3vw; height: calc(100vh - 140px); position: relative; z-index: 5; }

        /* GRID 5x3 */
        .grid {             
            flex: 1.5; display: grid;             
            grid-template-columns: repeat(5, 1fr);             
            grid-template-rows: repeat(3, 1fr);             
            gap: 15px;         
        }

        /* KAFELEK - SZKLANY HUD (Inspiracja image_a24026.jpg) */
        .tile {            
            background: rgba(252, 227, 0, 0.03); 
            border: 1px solid rgba(252, 227, 0, 0.15);
            border-radius: 12px;
            position: relative; cursor: pointer; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            backdrop-filter: blur(5px);
        }

        .tile .t-top { font-size: 18px; font-weight: 700; color: #fff; z-index: 2; letter-spacing: 1px; }        
        .tile .t-bottom { font-size: 11px; font-weight: 700; color: var(--yellow); text-transform: uppercase; z-index: 2; opacity: 0.7; margin-top: 5px;}

        /* ACTIVE - MAKSYMALNY GLOW */
        .tile.active { 
            background: rgba(252, 227, 0, 0.12); 
            border-color: var(--yellow);
            box-shadow: 0 0 30px rgba(252, 227, 0, 0.3), inset 0 0 20px rgba(252, 227, 0, 0.2);
            transform: scale(1.02);
        }
        .tile.active .t-top { color: var(--yellow); text-shadow: 0 0 10px var(--yellow); }

        /* TWOJA LOGIKA FAL - WIZUALNIE DOPRACOWANA */
        .waves { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; opacity: 0; }        
        .tile.active .waves { opacity: 1; }        
        .wave { 
            position: absolute; border: 2px solid var(--blue-wave); border-radius: 50%; 
            animation: ripple 3s infinite ease-out; opacity: 0; 
            filter: blur(2px);
        }        
        .wave:nth-child(2) { animation-delay: 1s; }        
        .wave:nth-child(3) { animation-delay: 2s; }
        @keyframes ripple { 
            0% { width: 0%; height: 0%; opacity: 1; transform: scale(0); } 
            100% { width: 300%; height: 300%; opacity: 0; transform: scale(1); } 
        }

        .sidebar {             
            flex: 0.5; display: flex; flex-direction: column;             
            align-items: center; justify-content: space-between;
            background: rgba(0, 5, 10, 0.8); border-radius: 24px; padding: 30px;
            border: 1px solid rgba(252, 227, 0, 0.1);
            box-shadow: inset 0 0 30px rgba(0, 210, 255, 0.05);
        }

        /* LOGO - OKRĄGŁY ANALIZATOR Z GRAFIKI */
        .logo-display {            
            width: 100%; aspect-ratio: 1; border-radius: 50%;
            border: 2px solid var(--yellow);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: radial-gradient(circle, rgba(252, 227, 0, 0.15) 0%, transparent 80%);
            box-shadow: 0 0 40px rgba(252, 227, 0, 0.2), inset 0 0 20px rgba(252, 227, 0, 0.1);
            position: relative;
        }
        .logo-display h2 { font-family: 'Orbitron', sans-serif; font-size: 34px; color: #fff; text-shadow: 0 0 20px var(--yellow); }
        .logo-display p { font-size: 11px; color: var(--blue-wave); letter-spacing: 5px; font-weight: 700; margin-top: 10px; }

        .controls { display: flex; gap: 25px; align-items: center; }        
        .c-svg { width: 45px; height: 45px; fill: var(--yellow); cursor: pointer; filter: drop-shadow(0 0 8px var(--yellow)); transition: 0.2s; }
        .c-svg:hover { filter: drop-shadow(0 0 15px var(--yellow)); transform: translateY(-2px); }
        .c-play { width: 80px; height: 80px; }

        /* VOLUME - CAPSULE SLIDER */
        .vol-box { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        input[type="range"] { 
            width: 100%; appearance: none; background: #000; height: 14px; border-radius: 7px; 
            border: 1px solid rgba(252, 227, 0, 0.2); overflow: hidden; box-shadow: inset 0 0 5px #000;
        }
        input[type="range"]::-webkit-slider-thumb {
            appearance: none; width: 1px; height: 14px; background: var(--yellow);
            box-shadow: -500px 0 0 500px var(--yellow); cursor: pointer;
        }
        input[type="range"].at-mid::-webkit-slider-thumb { 
            background: var(--blue-wave); box-shadow: -500px 0 0 500px var(--blue-wave); 
        }

        @media (max-width: 900px) {
            .grid { grid-template-columns: repeat(3, 1fr); }
            .sidebar { display: none; }
        }
    </style></head><body>

<header>    <div class="header-info" id="playing-now">GRA: RMF FM</div>    <div class="clock" id="timer">00:00</div></header>

<div class="app-content">    <div class="grid" id="station-grid"></div>
    <aside class="sidebar">        <div class="logo-display">            <h2 id="logo-text">RMF</h2>            <p>Najlepsza muzyka</p>        </div>
        <div class="controls">            <svg class="c-svg" viewBox="0 0 24 24" onclick="skip(-1)"><path d="M6,18V6H8V18H6M9.5,12L18,6V18L9.5,12Z"/></svg>            <svg class="c-svg c-play" viewBox="0 0 24 24" onclick="toggle()"><path id="p-ico" d="M8,5.14V19.14L19,12.14L8,5.14Z"/></svg>            <svg class="c-svg" viewBox="0 0 24 24" onclick="skip(1)"><path d="M16,18H18V6H16M6,18L14.5,12L6,6V18Z"/></svg>        </div>
        <div class="vol-box">            <input type="range" id="v-range" class="at-mid" min="0" max="100" value="50" oninput="setV(this.value)">        </div>    </aside></div>

<audio id="player"></audio>

<script>    
    const STATIONS = [        
        { n: 'RMF FM', s: 'RMF FM', u: 'rmf_fm' },        
        { n: 'RMF MAXXX', s: 'Maxxx', u: 'RMFMAXXX48' },        
        { n: 'RMF 80s', s: '80s', u: 'rmf_80s' },        
        { n: 'RMF 90s', s: '90s', u: 'rmf_90s' },        
        { n: 'RMF 2000', s: '2000', u: 'rmf_2000' },        
        { n: 'RMF CHILLOUT', s: 'Chillout', u: 'rmf_chillout' },        
        { n: 'RMF CLASSIC', s: 'Classic', u: 'rmf_classic' },        
        { n: 'RMF DANCE', s: 'Dance', u: 'rmf_dance' },        
        { n: 'RMF GOLD', s: 'Gold', u: 'rmf_gold' },        
        { n: 'RMF LATINO', s: 'Latino', u: 'rmf_latino' },        
        { n: 'RMF LOVE', s: 'Love', u: 'rmf_love' },        
        { n: 'RMF PARTY', s: 'Party', u: 'rmf_party' },        
        { n: 'RMF POLSKI ROCK', s: 'Polski Rock', u: 'rmf_polski_rock' },        
        { n: 'RMF ROCK', s: 'Rock', u: 'rmf_rock' },        
        { n: 'RMF SMOOTH JAZZ', s: 'Smooth Jazz', u: 'rmf_smooth_jazz' }    
    ];

    const player = document.getElementById('player'), ico = document.getElementById('p-ico'), grid = document.getElementById('station-grid'), vRange = document.getElementById('v-range');    
    let current = -1;

    function clock() {        
        const d = new Date();        
        document.getElementById('timer').textContent = d.getHours().toString().padStart(2,'0') + ":" + d.getMinutes().toString().padStart(2,'0');    
    }    
    setInterval(clock, 1000); clock();

    STATIONS.forEach((s, i) => {        
        const t = document.createElement('div');        
        t.className = 'tile';        
        t.innerHTML = `            
            <div class="waves"><div class="wave"></div><div class="wave"></div><div class="wave"></div></div>            
            <div class="t-top">RMF FM</div>            
            <div class="t-bottom">${s.s}</div>        `;        
        t.onclick = () => play(i);        
        grid.appendChild(t);    
    });

    function play(i) {        
        current = i;        
        document.querySelectorAll('.tile').forEach((t, idx) => t.classList.toggle('active', idx === i));        
        document.getElementById('playing-now').textContent = "GRA: " + STATIONS[i].n;
        document.getElementById('logo-text').textContent = STATIONS[i].s.split(' ')[0];        
        const streamBase = "https://rs201-krk.rmfstream.pl/";        
        player.src = (STATIONS[i].n === 'RMF MAXXX') ? 'https://rs7-krk2-cyfronet.rmfstream.pl/RMFMAXXX48' : streamBase + STATIONS[i].u;        
        player.play();        
        ico.setAttribute('d', 'M14,19H18V5H14M6,19H10V5H6V19Z');    
    }

    function toggle() {        
        if(player.paused) { player.play(); ico.setAttribute('d', 'M14,19H18V5H14M6,19H10V5H6V19Z'); }        
        else { player.pause(); ico.setAttribute('d', 'M8,5.14V19.14L19,12.14L8,5.14Z'); }    
    }

    function skip(d) { let n = current + d; if(n >= 0 && n < STATIONS.length) play(n); }        
    
    function setV(v) {         
        player.volume = v / 100;        
        if(parseInt(v) === 50) vRange.classList.add('at-mid');        
        else vRange.classList.remove('at-mid');    
    }
</script></body></html>
