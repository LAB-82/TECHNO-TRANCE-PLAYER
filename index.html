<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEHIRN TREIBER - INDUSTRIAL TERMINAL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        :root {
            --amber: #ff9d00;
            --amber-dim: #663d00;
            --bg: #000;
            --tile-bg: #0a0a0a;
            --trace: #222;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--amber);
            font-family: 'Share+Tech+Mono', monospace;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding: 20px;
        }

        /* Tło PCB */
        #pcb-canvas {
            position: fixed;
            top: 0; left: 0;
            z-index: 0;
            pointer-events: none;
        }

        /* HEADER */
        header {
            height: 60px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            border-bottom: 2px solid var(--amber);
            margin-bottom: 3vh;
            padding-bottom: 10px;
            z-index: 10;
        }

        .header-title { font-size: 32px; font-weight: bold; letter-spacing: 2px; }
        .header-info { text-align: right; font-size: 14px; }

        /* MAIN CONTENT - UKŁAD RMF FM */
        .app-content {
            display: flex;
            flex: 1;
            gap: 40px;
            z-index: 5;
            min-height: 0;
        }

        /* GRID (LEWA STRONA) */
        .grid {
            flex: 1.5;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 30px;
            padding: 10px;
        }

        /* KAFELEK / UKŁAD SCALONY - STYL Z OBRAZKA */
        .tile {
            background: var(--tile-bg);
            border: 1px solid var(--amber-dim);
            position: relative;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        /* NAROŻNIKI (BRACKETS) - STYL IDENTYCZNY JAK W LINKU */
        .tile::before, .tile::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        /* Nóżki układu (piny) */
        .pins-left, .pins-right {
            position: absolute;
            width: 10px;
            height: 80%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .pins-left { left: -10px; }
        .pins-right { right: -10px; }
        
        .pin {
            width: 8px;
            height: 3px;
            background: #444;
        }

        /* Dekoracyjne narożniki */
        .corner {
            position: absolute;
            width: 10px;
            height: 10px;
            border: 2px solid var(--amber);
        }
        .tl { top: -1px; left: -1px; border-right: 0; border-bottom: 0; }
        .tr { top: -1px; right: -1px; border-left: 0; border-bottom: 0; }
        .bl { bottom: -1px; left: -1px; border-right: 0; border-top: 0; }
        .br { bottom: -1px; right: -1px; border-left: 0; border-top: 0; }

        .tile:hover {
            background: #111;
            border-color: var(--amber);
            box-shadow: inset 0 0 15px var(--amber-dim);
        }

        .tile.active {
            background: var(--amber-dim);
            border-color: var(--amber);
        }

        .tile .t-id { font-size: 10px; opacity: 0.5; margin-bottom: 5px; }
        .tile .t-name { font-size: 14px; font-weight: bold; text-align: center; padding: 0 10px; }

        /* SIDEBAR (PRAWA STRONA) */
        .sidebar {
            flex: 0.7;
            display: flex;
            flex-direction: column;
            gap: 20px;
            border-left: 1px solid var(--amber-dim);
            padding-left: 40px;
        }

        .display-unit {
            border: 1px solid var(--amber);
            padding: 20px;
            background: rgba(255, 157, 0, 0.05);
            text-align: center;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .btn {
            background: none;
            border: 1px solid var(--amber);
            color: var(--amber);
            padding: 10px 20px;
            font-family: inherit;
            cursor: pointer;
            text-transform: uppercase;
        }
        .btn:hover { background: var(--amber); color: black; }

        .vol-box {
            margin-top: auto;
            padding-bottom: 20px;
        }
        input[type="range"] {
            width: 100%;
            accent-color: var(--amber);
            background: var(--amber-dim);
            height: 4px;
            appearance: none;
        }

        @media (max-width: 900px) {
            .app-content { flex-direction: column; overflow-y: auto; }
            .grid { grid-template-columns: repeat(2, 1fr); height: auto; }
            .sidebar { border-left: none; padding-left: 0; }
        }
    </style>
</head>
<body>

<canvas id="pcb-canvas"></canvas>

<header>
    <div class="header-title">GEHIRN TREIBER</div>
    <div class="header-info">
        SYSTEM: ACTIVE<br>
        <span id="clock">00:00:00</span>
    </div>
</header>

<div class="app-content">
    <!-- GRID Z UKŁADAMI -->
    <div class="grid" id="station-grid"></div>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="display-unit">
            <p style="font-size: 10px; opacity: 0.6;">CURRENT FREQUENCY</p>
            <h2 id="now-playing" style="font-size: 30px; margin: 10px 0;">-- STANDBY --</h2>
            <div id="visualizer" style="height: 40px; display: flex; align-items: flex-end; gap: 2px; justify-content: center;">
                <!-- Wizualizacja -->
            </div>
        </div>

        <div class="controls">
            <button class="btn" onclick="toggle()">STOP / START</button>
        </div>

        <div class="vol-box">
            <p style="margin-bottom: 10px; font-size: 12px;">AMPLITUDE CONTROL</p>
            <input type="range" min="0" max="100" value="50" oninput="setVol(this.value)">
        </div>
    </aside>
</div>

<audio id="player"></audio>

<script>
    const STATIONS = [
        { n: 'TECH 88', u: 'https://stream.laut.fm/tech88' },
        { n: 'HR 3 CLUBNIGHT', u: 'https://stream.laut.fm/hr3_clubnight' },
        { n: '1000 TECHNO', u: 'https://stream.laut.fm/1000techno' },
        { n: 'BEST OF TECHNO', u: 'https://stream.laut.fm/best-of-techno' },
        { n: 'CHRIS BURN', u: 'https://stream.laut.fm/chris_burn' },
        { n: 'RETRO ELECTRONIC', u: 'https://stream.laut.fm/retroelectronicmusic' },
        { n: 'GEHIRN TREIBER', u: 'https://stream.laut.fm/gehirn-treiber-beat-radio' }
    ];

    const grid = document.getElementById('station-grid');
    const player = document.getElementById('player');
    const canvas = document.getElementById('pcb-canvas');
    const ctx = canvas.getContext('2d');

    // Inicjalizacja kafelków
    STATIONS.forEach((s, i) => {
        const t = document.createElement('div');
        t.className = 'tile';
        t.innerHTML = `
            <div class="pins-left">${'<div class="pin"></div>'.repeat(6)}</div>
            <div class="pins-right">${'<div class="pin"></div>'.repeat(6)}</div>
            <div class="corner tl"></div><div class="corner tr"></div>
            <div class="corner bl"></div><div class="corner br"></div>
            <div class="t-id">MODULE GT-${i+100}</div>
            <div class="t-name">${s.n}</div>
        `;
        t.onclick = () => play(i);
        grid.appendChild(t);
    });

    function play(i) {
        document.querySelectorAll('.tile').forEach((t, idx) => t.classList.toggle('active', idx === i));
        document.getElementById('now-playing').textContent = STATIONS[i].n;
        player.src = STATIONS[i].u;
        player.play();
        drawPCB();
    }

    function toggle() {
        if(player.paused) player.play(); else player.pause();
    }

    function setVol(v) { player.volume = v / 100; }

    // Rysowanie połączeń PCB
    function drawPCB() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = '#222';
        ctx.lineWidth = 2;

        const tiles = document.querySelectorAll('.tile');
        tiles.forEach((tile, i) => {
            if (i < tiles.length - 1) {
                const r1 = tile.getBoundingClientRect();
                const r2 = tiles[i+1].getBoundingClientRect();
                ctx.beginPath();
                ctx.moveTo(r1.left + r1.width/2, r1.top + r1.height/2);
                ctx.lineTo(r1.left + r1.width/2, r2.top + r2.height/2);
                ctx.lineTo(r2.left + r2.width/2, r2.top + r2.height/2);
                ctx.stroke();
            }
        });
    }

    // Zegar
    setInterval(() => {
        document.getElementById('clock').textContent = new Date().toTimeString().split(' ')[0];
    }, 1000);

    // Wizualizacja (uproszczona)
    const viz = document.getElementById('visualizer');
    for(let i=0; i<20; i++) {
        const bar = document.createElement('div');
        bar.style.width = '4px';
        bar.style.background = 'var(--amber)';
        viz.appendChild(bar);
    }

    function updateViz() {
        const bars = viz.children;
        for(let b of bars) {
            b.style.height = (player.paused ? 2 : Math.random() * 40) + 'px';
        }
        requestAnimationFrame(updateViz);
    }
    updateViz();

    window.onresize = drawPCB;
    setTimeout(drawPCB, 500);

</script>
</body>
</html>
