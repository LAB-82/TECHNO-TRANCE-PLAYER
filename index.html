<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>L.A.B. AUDIO TB-303 Edition</title>
    <link href="https://fonts.cdnfonts.com/css/ds-digital" rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/digital-numbers" rel="stylesheet">
    <style>
        :root {
            /* Poziome szczotkowanie Pro Terminal */
            --brushed: linear-gradient(0deg, rgba(0,0,0,0.05) 1px, transparent 1px), #b4b4b4;
            --btn-plastic: linear-gradient(180deg, #e1e0d3 0%, #cfcdc0 100%);
            --led-off: #330000;
            --led-on: #ff0000;
        }

        body {
            margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center;
            background: #121212; font-family: Arial, sans-serif; overflow: hidden;
        }

        /* GŁÓWNA OBUDOWA */
        .frame {
            width: 95%; max-width: 850px;
            background: var(--brushed); background-size: 100% 2px;
            border: 2px solid #666; border-radius: 4px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.9), inset 0 1px 2px #fff;
            padding: 30px; position: relative; box-sizing: border-box;
        }

        /* Śruby */
        .frame::before, .frame::after {
            content: ""; position: absolute; width: 12px; height: 12px;
            background: radial-gradient(circle, #999, #444); border-radius: 50%;
            top: 10px; box-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }
        .frame::before { left: 10px; } .frame::after { right: 10px; }

        .top-section {
            display: flex; justify-content: space-between; align-items: flex-end;
            border-bottom: 2px solid #888; padding-bottom: 10px; margin-bottom: 20px;
        }

        .title { font-size: 38px; font-weight: 900; color: #111; margin: 0; letter-spacing: -2px; }
        .model-name { font-family: 'DS-Digital', sans-serif; font-size: 45px; color: #222; text-align: right; line-height: 0.8; }
        .model-sub { font-size: 10px; font-weight: bold; text-align: right; letter-spacing: 1px; color: #333; }

        /* WYŚWIETLACZ */
        .display-frame {
            background: #080a08; border: 3px solid #444; border-radius: 4px;
            padding: 15px; width: 320px; height: 100px; margin: 0 auto 25px auto;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            box-shadow: inset 0 0 20px #000; color: #1a1d1a; transition: 0.3s;
        }
        .frame.powered .display-frame { color: #a4f000; text-shadow: 0 0 10px rgba(164, 240, 0, 0.6); }
        .time-display { font-family: 'Digital Numbers', sans-serif; font-size: 32px; margin: 5px 0; }

        /* PANEL KONTROLNY */
        .main-content {
            background: var(--brushed); background-size: 100% 2px;
            border: 1px solid #888; padding: 25px; border-radius: 3px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
            display: flex; flex-direction: column; align-items: center;
        }

        .controls-main { display: flex; gap: 15px; align-items: center; }

        /* PRZYCISKI - STYL Z 1 ZDJĘCIA (PLASTIK + LED) */
        .btn-rect, .btn-v {
            width: 65px; height: 50px;
            background: var(--btn-plastic);
            border: 2px solid #222; border-radius: 3px;
            position: relative; cursor: pointer;
            box-shadow: 0 4px 0 #777, 0 8px 15px rgba(0,0,0,0.4);
            display: flex; align-items: center; justify-content: center; transition: 0.05s;
        }
        .btn-rect::before {
            content: ""; position: absolute; top: 6px; width: 10px; height: 6px;
            background: var(--led-off); border-radius: 1px; border: 1px solid #000;
        }
        .btn-rect.active::before, .btn-v.active::before {
            background: var(--led-on); box-shadow: 0 0 8px var(--led-on);
        }
        .btn-rect:active, .btn-v:active { transform: translateY(2px); box-shadow: 0 2px 0 #777; }
        .btn-rect svg, .btn-v svg { width: 24px; fill: #222; margin-top: 10px; }

        /* SUWAK - STYL Z 2 ZDJĘCIA (ROWEK + METALOWY UCHWYT) */
        .vol-wrapper { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-left: 15px; }
        .vol-bar {
            width: 130px; height: 18px; background: #0a0a0a;
            border: 1px solid #444; border-radius: 2px;
            position: relative; box-shadow: inset 0 2px 5px #000;
        }
        .vol-fill {
            height: 100%; width: 50%; background: #e60000;
            box-shadow: 0 0 10px rgba(230,0,0,0.5); position: relative;
        }
        /* Metalowy chwytak suwaka */
        .vol-fill::after {
            content: ""; position: absolute; right: -8px; top: -6px;
            width: 16px; height: 30px;
            background: linear-gradient(90deg, #bbb, #eee 50%, #888 51%, #bbb);
            border: 1px solid #333; border-radius: 2px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
        }

        .btn-v { width: 45px; height: 40px; }
        .btn-v::before { display: none; }
        .btn-v svg { margin-top: 0; }

        .lab-logo { margin-top: 20px; font-weight: bold; font-size: 11px; color: #444; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div class="frame">
        <div class="top-section">
            <div class="brand-area">
                <h1 class="title">Roland</h1>
                <span style="font-size: 9px; font-weight: bold; color: #444;">L.A.B. AUDIO INTERFACE</span>
            </div>
            <div class="model-area">
                <div class="model-name">TB-303</div>
                <div class="model-sub">Computer Controlled</div>
            </div>
        </div>

        <div class="display-frame" id="display">
            <div style="font-size: 18px;">MUZYCZNE RADIO</div>
            <div class="time-display" id="clock">00:00:00</div>
            <div id="date" style="font-size: 14px;">06:05:2026</div>
        </div>

        <div class="main-content">
            <div class="controls-main">
                <button id="pwr" class="btn-rect"><svg viewBox="0 0 24 24"><path d="M13,3h-2v10h2V3z M17.8,4.5l-1.4,1.4C18.3,7.4,19,9.6,19,12c0,3.9-3.1,7-7,7s-7-3.1-7-7c0-2.4,0.7-4.6,2.6-6.1L6.2,4.5 C3.6,6.4,2,9.5,2,13c0,5.5,4.5,10,10,10s10-4.5,10-10C22,9.5,20.4,6.4,17.8,4.5z"/></svg></button>
                <button id="play" class="btn-rect"><svg viewBox="0 0 24 24"><path d="M8,5.14V19.14L19,12.14L8,5.14Z"/></svg></button>
                <button id="rec" class="btn-rect"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/></svg></button>
                <button id="stop" class="btn-rect"><svg viewBox="0 0 24 24"><path d="M6,6H18V18H6V6Z"/></svg></button>
                <button id="mute" class="btn-rect"><svg viewBox="0 0 24 24"><path id="mute-path" d="M3,9V15H7L12,20V4L7,9H3M16.5,12C16.5,10.23 15.48,8.71 14,8V16C15.48,15.29 16.5,13.77 16.5,12M14,3.23V5.29C16.89,6.15 19,8.83 19,12C19,15.17 16.89,17.85 14,18.71V20.77C18.01,19.86 21,16.28 21,12C21,7.72 18.01,4.14 14,3.23Z"/></svg></button>
                
                <div class="vol-wrapper">
                    <div style="display:flex; gap:5px;">
                        <button id="vDown" class="btn-v"><svg viewBox="0 0 24 24"><path d="M19,13H5V11H19V13Z"/></svg></button>
                        <button id="vUp" class="btn-v"><svg viewBox="0 0 24 24"><path d="M19,13H13V19H11V13H5V11H11V5H13V11H19V13Z"/></svg></button>
                    </div>
                    <div class="vol-bar"><div id="vFill" class="vol-fill"></div></div>
                </div>
            </div>
            <div class="lab-logo">L.A.B. AUDIO TB-303</div>
        </div>
    </div>

    <audio id="stream" crossorigin="anonymous" src="https://stream.rcs.revma.com/gzwc1xcq042vv"></audio>

    <script>
        /* Twoja nienaruszona logika JS */
        const audio = document.getElementById('stream');
        const pwrBtn = document.getElementById('pwr');
        const playBtn = document.getElementById('play');
        const recBtn = document.getElementById('rec');
        const stopBtn = document.getElementById('stop');
        const muteBtn = document.getElementById('mute');
        const vFill = document.getElementById('vFill');
        const clockEl = document.getElementById('clock');
        let isPwr = false;

        function updateDateTime() {
            const now = new Date();
            clockEl.textContent = now.toTimeString().split(' ')[0];
        }
        setInterval(updateDateTime, 1000);

        pwrBtn.onclick = () => {
            isPwr = !isPwr;
            document.querySelector('.frame').classList.toggle('powered');
            pwrBtn.classList.toggle('active');
            if(!isPwr) { audio.pause(); playBtn.classList.remove('active'); }
        };

        playBtn.onclick = () => { if(isPwr) { audio.play(); playBtn.classList.add('active'); } };
        stopBtn.onclick = () => { if(isPwr) { audio.pause(); audio.currentTime=0; playBtn.classList.remove('active'); } };
        
        document.getElementById('vUp').onclick = () => { if(isPwr && audio.volume < 1) { audio.volume += 0.1; vFill.style.width = (audio.volume*100)+'%'; } };
        document.getElementById('vDown').onclick = () => { if(isPwr && audio.volume > 0) { audio.volume -= 0.1; vFill.style.width = (audio.volume*100)+'%'; } };
    </script>
</body>
</html>
