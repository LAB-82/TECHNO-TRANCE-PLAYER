<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CYBER-PCB PROTOTYPE v2.0</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        :root {
            --pcb-base: #020502;
            --trace-dim: #1a331a;
            --trace-hot: #00ff41;
            --accent: #ff003c;
            --display-bg: #050a05;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--pcb-base); color: var(--trace-hot); 
            font-family: 'Share Tech Mono', monospace; overflow: hidden; 
            height: 100vh; width: 100vw;
        }

        /* TŁO PŁYTY DRUKOWANEJ */
        #pcb-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0; pointer-events: none; opacity: 0.6;
        }

        .terminal-container { display: flex; height: 100vh; position: relative; z-index: 1; }

        /* AREA KOMPONENTÓW */
        .breadboard { 
            flex: 1.5; position: relative; overflow: hidden; 
            background-image: radial-gradient(circle, #111 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* MODUŁY / CHIPY */
        .module {
            position: absolute; background: #0a0a0a; border: 1px solid #333;
            padding: 5px; min-width: 90px; height: 45px; z-index: 10;
            box-shadow: 4px 4px 0px #000; cursor: pointer;
            display: flex; flex-direction: column; justify-content: center;
        }

        .module::before { /* Piny boczne */
            content: ''; position: absolute; left: -6px; top: 10%; bottom: 10%; width: 6px;
            background: repeating-linear-gradient(to bottom, #555 0, #555 3px, transparent 3px, transparent 6px);
        }

        .module.cpu { width: 130px; height: 90px; border: 2px solid var(--trace-hot); background: #000; }
        .module.active { border-color: #fff; box-shadow: 0 0 15px var(--trace-hot); }
        .module label { font-size: 9px; color: #555; text-transform: uppercase; cursor: pointer; }
        .module .val { font-size: 11px; color: var(--trace-hot); }

        /* PANEL HAKERA / STEROWANIE */
        .right-panel { 
            flex: 0.6; background: #0a0a0a; border-left: 4px solid #1a1a1a;
            display: flex; flex-direction: column; padding: 0; position: relative;
        }

        .module-header {
            background: #1a1a1a; padding: 10px; font-size: 14px; color: #fff;
            border-bottom: 2px solid var(--accent); display: flex; justify-content: space-between;
        }

        .vfd-display {
            background: var(--display-bg); margin: 15px; padding: 15px;
            border: 1px solid #1a331a; box-shadow: inset 0 0 10px #000;
            height: 140px; position: relative;
        }

        .vfd-text { font-size: 12px; color: var(--trace-hot); text-shadow: 0 0 5px var(--trace-hot); line-height: 1.4; }

        .fader-rack { padding: 20px; flex: 1; display: flex; flex-direction: column; gap: 30px; }
        
        /* Stylizowane suwaki */
        .fader-gate { position: relative; height: 40px; background: #050505; border: 1px solid #222; }
        .fader-gate input[type=range] {
            width: 100%; -webkit-appearance: none; background: transparent;
            position: absolute; top: 0; z-index: 5; height: 100%;
        }
        .fader-gate input::-webkit-slider-thumb {
            -webkit-appearance: none; width: 40px; height: 38px; 
            background: #222; border: 2px solid var(--accent); cursor: ns-resize;
        }

        .btn-matrix { 
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; padding: 15px; 
            border-top: 1px solid #222;
        }
        .square-btn {
            aspect-ratio: 1; background: #111; border: 1px solid #333;
            color: var(--trace-hot); font-family: inherit; cursor: pointer;
        }
        .square-btn:active { background: var(--accent); color: #fff; }

        @media (max-width: 900px) {
            .terminal-container { flex-direction: column; }
            .right-panel { border-left: none; border-top: 4px solid #1a1a1a; }
        }
    </style>
</head>
<body>

<svg id="pcb-layer"></svg>

<div class="terminal-container">
    <div class="breadboard" id="main-board"></div>

    <aside class="right-panel">
        <div class="module-header">
            <span>CORE_CONTROLLER v2.0</span>
            <span style="color:var(--accent)">ONLINE</span>
        </div>

        <div class="vfd-display">
            <div class="vfd-text" id="console-log">INIT SYSTEM...<br>READY_</div>
            <div id="stat-bar" style="position:absolute; bottom:5px; right:10px; font-size:10px; color:#333;">TX/RX [||||||||]</div>
        </div>

        <div class="fader-rack">
            <div style="font-size:10px; color:#444;">MASTER_GAIN</div>
            <div class="fader-gate">
                <input type="range" min="0" max="1" step="0.01" value="0.5" oninput="setV(this.value)">
            </div>
            <div style="font-size:10px; color:#444;">DATA_BUS_LOAD</div>
            <div style="height:4px; background:#111; position:relative;">
                <div id="load-bar" style="width:45%; height:100%; background:var(--trace-hot);"></div>
            </div>
        </div>

        <div class="btn-matrix">
            <button class="square-btn" onclick="skip(-1)">PREV</button>
            <button class="square-btn" style="border-color:var(--accent)" onclick="toggle()">PLAY</button>
            <button class="square-btn" onclick="skip(1)">NEXT</button>
        </div>
    </aside>
</div>

<audio id="audio-engine"></audio>

<script>
    const CHIPS = [
        { n: 'T-88', u: 'https://laut.fm/tech88', x: 10, y: 15 },
        { n: 'HR3-C', u: 'https://laut.fm/hr3_clubnight', x: 45, y: 10 },
        { n: '1K-T', u: 'https://laut.fm/1000techno', x: 15, y: 40 },
        { n: 'GEHIRN_TREIBER', u: 'https://laut.fm/gehirn-treiber-beat-radio', core: true, x: 40, y: 50 },
        { n: 'B-TECH', u: 'https://laut.fm/best-of-techno', x: 12, y: 75 },
        { n: 'BURN', u: 'https://laut.fm/chris_burn', x: 55, y: 80 },
        { n: 'DEEP', u: 'https://laut.fm/deep-house-sounds', x: 30, y: 5 },
        { n: 'BOMB', u: 'https://laut.fm/housebomb-fn', x: 75, y: 70 },
        { n: 'SYMB', u: 'https://laut.fm/symbiotic-beats', x: 78, y: 30 }
    ];

    const board = document.getElementById('main-board');
    const svg = document.getElementById('pcb-layer');
    const engine = document.getElementById('audio-engine');
    const log = document.getElementById('console-log');
    let activeID = -1;

    function buildHardware() {
        CHIPS.forEach((c, i) => {
            const m = document.createElement('div');
            m.className = `module ${c.core ? 'cpu' : ''}`;
            m.style.left = c.x + '%';
            m.style.top = c.y + '%';
            m.id = `mod-${i}`;
            m.innerHTML = `<label>${c.core ? 'Master_CPU' : 'Node_'+i}</label><div class="val">${c.n}</div>`;
            m.onclick = () => mountStream(i);
            board.appendChild(m);
        });
        setTimeout(routeTraces, 100);
    }

    function routeTraces() {
        svg.innerHTML = '';
        const w = window.innerWidth;
        const h = window.innerHeight;
        const panelX = w * 0.7; // Start panelu

        CHIPS.forEach((c, i) => {
            const el = document.getElementById(`mod-${i}`);
            const r = el.getBoundingClientRect();
            const startX = r.left + r.width;
            const startY = r.top + r.height/2;

            // RYSOWANIE MAGISTRALI (KĄTY PROSTE)
            const midX = startX + (panelX - startX) * 0.5;
            
            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            // Ścieżka typu S (Manhattan routing)
            const d = `M ${startX} ${startY} L ${midX} ${startY} L ${midX} ${startY + (i*10 - 45)} L ${panelX} ${startY + (i*10 - 45)}`;
            
            path.setAttribute("d", d);
            path.setAttribute("stroke", "var(--trace-dim)");
            path.setAttribute("stroke-width", "1.5");
            path.setAttribute("fill", "none");
            svg.appendChild(path);

            // Punkty lutownicze (Vias)
            drawVia(startX, startY);
        });
    }

    function drawVia(x, y) {
        const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        c.setAttribute("cx", x); c.setAttribute("cy", y); c.setAttribute("r", "3");
        c.setAttribute("fill", "#333");
        svg.appendChild(c);
    }

    function mountStream(i) {
        activeID = i;
        document.querySelectorAll('.module').forEach((m, idx) => m.classList.toggle('active', idx === i));
        
        log.innerHTML = `MOUNTING_NODE: ${CHIPS[i].n}<br>ADDR: ${CHIPS[i].u}<br>STATUS: STREAMING...`;
        
        engine.src = CHIPS[i].u;
        engine.load();
        engine.play().catch(() => { log.innerHTML += "<br>!! USER_ACTION_REQUIRED !!"; });
        
        document.getElementById('load-bar').style.width = Math.random() * 100 + '%';
    }

    function toggle() {
        if(activeID === -1) mountStream(3);
        else engine.paused ? engine.play() : engine.pause();
    }

    function skip(dir) {
        let n = activeID + dir;
        if(n >= 0 && n < CHIPS.length) mountStream(n);
    }

    function setV(v) { engine.volume = v; }

    window.onresize = routeTraces;
    buildHardware();
</script>
</body>
</html>
