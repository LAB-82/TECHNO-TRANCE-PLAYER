<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>CYCLOP RMF - HYPER-REALISM</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap');

        :root {
            --panel-bg: #1e1e1e;
            --metal-shine: linear-gradient(145deg, #2a2a2a, #151515);
            --neon-magenta: #ff00ff;
            --neon-cyan: #00ffff;
            --neon-lime: #32ff00;
            --neon-orange: #ffaa00;
            --screen-glass: rgba(0, 20, 0, 0.9);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }

        body {
            background: #050505;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Share Tech Mono', monospace;
            overflow: hidden;
        }

        /* GŁÓWNA OBUDOWA */
        #cyclop-rack {
            width: 95vw;
            height: 90vh;
            background: var(--panel-bg);
            border: 6px solid #111;
            border-radius: 12px;
            box-shadow: 0 50px 100px rgba(0,0,0,0.9), inset 0 2px 5px rgba(255,255,255,0.1);
            display: grid;
            grid-template-rows: 60px 1fr 180px;
            padding: 10px;
            gap: 10px;
            position: relative;
        }

        /* HEADER - C4CLOP STYLE */
        header {
            background: #111;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            border-radius: 5px;
            border-bottom: 2px solid #333;
        }

        .logo { font-family: 'Orbitron'; color: #fff; font-weight: 700; font-size: 24px; letter-spacing: 5px; }
        .logo span { color: var(--neon-magenta); }

        /* GŁÓWNY PANEL ROBOCZY */
        .main-engine {
            display: grid;
            grid-template-columns: 250px 1fr 250px;
            gap: 15px;
        }

        /* SEKACJA BOCZNA - POKRĘTŁA */
        .side-module {
            background: var(--metal-shine);
            border: 2px solid #111;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            align-items: center;
            padding: 15px;
        }

        .big-knob {
            width: 100px; height: 100px;
            background: radial-gradient(circle, #444 0%, #111 70%);
            border-radius: 50%;
            border: 4px solid #222;
            position: relative;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .knob-marker {
            position: absolute; width: 6px; height: 30px; 
            background: var(--neon-cyan); top: 10px; left: 47px;
            border-radius: 3px; box-shadow: 0 0 15px var(--neon-cyan);
            transform-origin: 3px 40px;
        }

        /* CENTRALNY WYŚWIETLACZ MULTI-KOLOR */
        .center-screen {
            background: var(--screen-glass);
            border: 8px solid #222;
            border-radius: 10px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .analyser {
            flex: 1;
            display: flex;
            align-items: flex-end;
            gap: 2px;
            padding: 20px;
            background: repeating-linear-gradient(0deg, rgba(0,255,0,0.05) 0px, transparent 2px);
        }

        .bar {
            flex: 1;
            background: linear-gradient(to top, var(--neon-magenta), var(--neon-cyan), var(--neon-lime));
            height: 50%;
            transition: height 0.1s ease;
            box-shadow: 0 0 10px rgba(0,255,255,0.2);
        }

        /* DOLNE PAD-Y (STACJE) */
        .station-bay {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 10px;
        }

        .pad {
            background: #252525;
            border: 2px solid #000;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: 0.2s;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.1);
        }

        .pad::after {
            content: ""; position: absolute; bottom: 5px; width: 80%; height: 4px;
            background: #444; border-radius: 2px;
        }

        .pad.active {
            background: #333;
            border-color: var(--neon-lime);
            box-shadow: 0 0 20px rgba(50, 255, 0, 0.2);
        }

        .pad.active::after { background: var(--neon-lime); box-shadow: 0 0 10px var(--neon-lime); }
        .pad .name { font-size: 11px; color: #aaa; text-transform: uppercase; font-weight: bold; }
        .pad.active .name { color: #fff; }

        /* TEKSTURY I ELEMENTY DEKORACYJNE */
        .screw {
            width: 12px; height: 12px; background: #333; border-radius: 50%;
            position: absolute; box-shadow: inset 1px 1px 2px #000;
        }
        .top-l { top: 5px; left: 5px; } .top-r { top: 5px; right: 5px; }
        .bot-l { bottom: 5px; left: 5px; } .bot-r { bottom: 5px; right: 5px; }

    </style>
</head>
<body>

<div id="cyclop-rack">
    <div class="screw top-l"></div><div class="screw top-r"></div>
    <div class="screw bot-l"></div><div class="screw bot-r"></div>

    <header>
        <div class="logo">C<span>4</span>CLOP RMF</div>
        <div id="patch-name" style="color: var(--neon-cyan); letter-spacing: 2px;">STATION: READY</div>
        <div style="color: #666; font-size: 12px;">CPU: 12% | RAM: 1.2GB</div>
    </header>

    <div class="main-engine">
        <div class="side-module">
            <div style="font-size: 10px; color: var(--neon-magenta);">WOBBLE AMT</div>
            <div class="big-knob" id="knob1"><div class="knob-marker"></div></div>
            <div style="font-size: 10px; color: var(--neon-cyan);">DISTORTION</div>
            <div class="big-knob" id="knob2"><div class="knob-marker"></div></div>
        </div>

        <div class="center-screen">
            <div style="padding: 10px; background: #222; font-size: 10px; display: flex; justify-content: space-between;">
                <span>OSCILLOSCOPE v2.0</span>
                <span id="hz-val">44.1 kHz</span>
            </div>
            <div class="analyser" id="bars-container">
                <!-- Słupki generowane przez JS -->
            </div>
            <div style="height: 40px; background: #111; display: flex; align-items: center; padding: 0 20px; gap: 20px;">
                <div style="width: 100%; height: 4px; background: #333; position: relative;">
                    <div style="position: absolute; left: 30%; width: 20px; height: 12px; background: var(--neon-lime); top: -4px;"></div>
                </div>
            </div>
        </div>

        <div class="side-module">
            <div style="font-size: 10px; color: var(--neon-lime);">RESONANCE</div>
            <div class="big-knob" id="knob3"><div class="knob-marker"></div></div>
            <div style="font-size: 10px; color: var(--neon-orange);">MASTER VOL</div>
            <div class="big-knob" id="knob4"><div class="knob-marker"></div></div>
        </div>
    </div>

    <div class="station-bay" id="station-grid"></div>
</div>

<audio id="core-audio"></audio>

<script>
    const STATIONS = [
        { n: 'RMF FM', u: 'rmf_fm' }, { n: 'MAXXX', u: 'RMFMAXXX48' }, { n: '80s', u: 'rmf_80s' },
        { n: '90s', u: 'rmf_90s' }, { n: '2000', u: 'rmf_2000' }, { n: 'ROCK', u: 'rmf_rock' },
        { n: 'DANCE', u: 'rmf_dance' }, { n: 'CLASSIC', u: 'rmf_classic' }
    ];

    const audio = document.getElementById('core-audio');
    const grid = document.getElementById('station-grid');
    const barsContainer = document.getElementById('bars-container');

    // Tworzenie słupków analizatora
    for(let i=0; i<40; i++) {
        const bar = document.createElement('div');
        bar.className = 'bar';
        barsContainer.appendChild(bar);
    }

    // Tworzenie Padów
    STATIONS.forEach((st, i) => {
        const p = document.createElement('div');
        p.className = 'pad';
        p.innerHTML = `<span style="font-size:8px; color:#555;">0${i+1}</span><span class="name">${st.n}</span>`;
        p.onclick = () => {
            document.querySelectorAll('.pad').forEach(x => x.classList.remove('active'));
            p.classList.add('active');
            document.getElementById('patch-name').textContent = "PATCH: " + st.n;
            
            const url = st.n === 'MAXXX' ? 'https://rs7-krk2-cyfronet.rmfstream.pl/RMFMAXXX48' : 'https://rs201-krk.rmfstream.pl/' + st.u;
            audio.src = url;
            audio.play();

            // Losowe ustawienie pokręteł przy zmianie
            document.querySelectorAll('.knob-marker').forEach(m => {
                m.style.transform = `rotate(${Math.random() * 260 - 130}deg)`;
            });
        };
        grid.appendChild(p);
    });

    // Animacja widma
    function animateBars() {
        const bars = document.querySelectorAll('.bar');
        bars.forEach(b => {
            let h = audio.paused ? Math.random() * 5 : Math.random() * 90 + 10;
            b.style.height = h + '%';
            // Zmiana odcienia w zależności od wysokości
            b.style.filter = `hue-rotate(${h}deg) brightness(${h/50})`;
        });
        requestAnimationFrame(animateBars);
    }
    animateBars();

</script>
</body>
</html>
