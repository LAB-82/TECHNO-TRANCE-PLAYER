<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RMF SUBLAB XL - FULL COLOR</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&family=Lexend:wght@400;900&display=swap');

        :root {
            --xl-bg: #090a0f;
            --xl-panel-grad: linear-gradient(180deg, #1e1f2a 0%, #111218 100%);
            --xl-purple-grad: linear-gradient(90deg, #8e44ad 0%, #3498db 100%);
            --xl-accent-yellow: #f5c518;
            --xl-accent-green: #a2ff00;
            --xl-accent-pink: #ff007a;
            --xl-border: rgba(255, 255, 255, 0.1);
            --blue-wave: #a2ff00;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body { 
            height: 100vh; width: 100vw; 
            background: var(--xl-bg); color: #fff; 
            font-family: 'Outfit', sans-serif;
            overflow: hidden; 
        }

        body { 
            display: flex; flex-direction: column; padding: 10px;
            background-image: radial-gradient(circle at 20% 30%, #1b1329 0%, #090a0f 70%);
        }

        /* GÓRNY PASEK - Intensywne kolory */
        header { 
            height: 60px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(30, 31, 42, 0.7); padding: 0 25px; margin-bottom: 12px; flex-shrink: 0;
            border-radius: 12px; border: 1px solid var(--xl-border);
            backdrop-filter: blur(15px);
        }
        .xl-logo-container { display: flex; align-items: center; gap: 10px; }
        .xl-logo { 
            width: 35px; height: 35px; background: var(--xl-accent-yellow); color: #000;
            border-radius: 8px; display: flex; align-items: center; justify-content: center;
            font-family: 'Lexend', sans-serif; font-weight: 900; font-size: 20px;
        }
        .header-info { 
            font-family: 'Lexend', sans-serif; font-size: 15px; font-weight: 400;
            background: rgba(0,0,0,0.3); padding: 8px 25px; border-radius: 50px;
            border-left: 3px solid var(--xl-accent-pink); color: #ddd;
        }
        .clock { color: var(--xl-accent-yellow); font-family: monospace; font-size: 18px; letter-spacing: 1px; }

        .app-content { display: flex; flex: 1; gap: 15px; min-height: 0; }

        /* SIATKA 5x3 - ORYGINALNY SZKIELET */
        .grid { 
            flex: 1.4; display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            grid-template-rows: repeat(3, 1fr); 
            gap: 12px; 
        }

        .tile {
            background: var(--xl-panel-grad); border: 1px solid var(--xl-border);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; position: relative; overflow: hidden;
            border-radius: 14px; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .tile::after {
            content: ""; position: absolute; bottom: 0; left: 0; width: 100%; height: 3px;
            background: rgba(255,255,255,0.05);
        }

        .tile .t-top { font-size: 9px; font-weight: 800; color: #6e7282; text-transform: uppercase; z-index: 2; margin-bottom: 4px; letter-spacing: 1px; }
        .tile .t-bottom { font-size: 15px; font-weight: 600; color: #fff; text-align: center; z-index: 2; }

        /* AKTYWNA STACJA - SubLab Neon */
        .tile.active { 
            border-color: var(--xl-accent-green);
            background: linear-gradient(145deg, #1a2521, #111218);
            transform: scale(1.02);
            box-shadow: 0 10px 30px rgba(162, 255, 0, 0.15), inset 0 0 15px rgba(162, 255, 0, 0.05);
        }
        .tile.active .t-bottom { color: var(--xl-accent-green); text-shadow: 0 0 10px rgba(162, 255, 0, 0.5); }
        .tile.active .t-top { color: #fff; }
        .tile.active::after { background: var(--xl-accent-green); box-shadow: 0 0 10px var(--xl-accent-green); }

        /* FALE - Intensywne Gradientowe */
        .waves {
            position: absolute; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            pointer-events: none; opacity: 0; z-index: 1;
        }
        .tile.active .waves { opacity: 0.8; }
        .wave {
            position: absolute; border: 2px solid var(--xl-accent-purple); border-radius: 50%;
            width: 10px; height: 10px; opacity: 0;
            animation: ripple 4s infinite ease-out;
        }
        .wave:nth-child(2) { border-color: var(--xl-accent-green); animation-delay: 1.3s; }
        .wave:nth-child(3) { border-color: var(--xl-accent-pink); animation-delay: 2.6s; }

        @keyframes ripple {
            0% { width: 0; height: 0; opacity: 1; transform: scale(1); }
            100% { width: 400%; height: 400%; opacity: 0; transform: scale(1.5); }
        }

        /* SIDEBAR - Panel sterowania */
        .sidebar { 
            flex: 0.6; display: flex; flex-direction: column; 
            align-items: center; justify-content: space-between; padding: 25px;
            background: var(--xl-panel-grad); border: 1px solid var(--xl-border);
            border-radius: 20px; position: relative; overflow: hidden;
        }

        /* Dekoracyjny Analizator Widma w tle */
        .visualizer {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 100px;
            display: flex; align-items: flex-end; gap: 2px; padding: 0 10px; opacity: 0.2; pointer-events: none;
        }
        .v-bar { flex: 1; background: var(--xl-accent-purple); height: 20%; animation: v-flow 1.5s infinite ease-in-out; }
        @keyframes v-flow { 0%, 100% { height: 20%; } 50% { height: 80%; } }

        .logo-display {
            width: 100%; padding: 30px 10px; border-radius: 15px;
            background: rgba(0,0,0,0.4); text-align: center;
            border-bottom: 4px solid var(--xl-accent-pink);
        }
        .logo-display h2 { font-family: 'Lexend', sans-serif; font-size: 42px; color: #fff; line-height: 0.9; }
        .logo-display span { color: var(--xl-accent-green); font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 4px; }

        .controls { display: flex; align-items: center; gap: 2.5vw; z-index: 2; }
        .c-svg { width: 38px; height: 38px; fill: #666; cursor: pointer; transition: 0.3s; }
        .c-svg:hover { fill: var(--xl-accent-green); transform: scale(1.1); }
        .c-play { 
            width: 75px; height: 75px; fill: #000; background: var(--xl-accent-green); 
            padding: 20px; border-radius: 50%; box-shadow: 0 0 30px rgba(162, 255, 0, 0.4);
        }

        /* VOLUME SLIDER */
        .vol-box { width: 100%; z-index: 2; }
        .vol-label { font-size: 11px; font-weight: 800; color: #999; text-transform: uppercase; margin-bottom: 15px; display: flex; justify-content: space-between; }
        .vol-label span:last-child { color: var(--xl-accent-yellow); }
        
        .vol-bar { 
            height: 50px; background: rgba(0,0,0,0.5); border-radius: 10px; 
            display: flex; align-items: center; padding: 0 20px; border: 1px solid rgba(255,255,255,0.05);
        }
        
        input[type="range"] { 
            flex: 1; appearance: none; background: #333; height: 6px; border-radius: 3px;
        }
        input[type="range"]::-webkit-slider-thumb { 
            appearance: none; width: 20px; height: 20px; 
            background: #fff; border: 4px solid var(--xl-accent-pink); border-radius: 50%; cursor: pointer;
            box-shadow: 0 0 10px rgba(255, 0, 122, 0.5);
        }

        @media (max-width: 600px) {
            .app-content { flex-direction: column; }
            .grid { grid-template-columns: repeat(3, 1fr); height: 50vh; }
            .sidebar { width: 100%; height: auto; }
        }
    </style>
</head>
<body>

<header>
    <div class="xl-logo-container">
        <div class="xl-logo">R</div>
        <div style="font-weight: 800; font-size: 20px; letter-spacing: -1px;">SubLab<span style="color: var(--xl-accent-pink)">XL</span></div>
    </div>
    <div class="header-info" id="playing-now">ENGINE: RMF FM // READY</div>
    <div class="clock" id="timer">00:00</div>
</header>

<div class="app-content">
    <div class="grid" id="station-grid"></div>

    <aside class="sidebar">
        <!-- Visualizer Bars -->
        <div class="visualizer">
            <div class="v-bar" style="animation-delay: 0.1s"></div>
            <div class="v-bar" style="animation-delay: 0.3s"></div>
            <div class="v-bar" style="animation-delay: 0.2s"></div>
            <div class="v-bar" style="animation-delay: 0.5s"></div>
            <div class="v-bar" style="animation-delay: 0.4s"></div>
        </div>

        <div class="logo-display">
            <h2>SubLab</h2>
            <span>X-SUB™ DIGITAL RADIO</span>
        </div>

        <div class="controls">
            <svg class="c-svg" viewBox="0 0 24 24" onclick="skip(-1)"><path d="M6,18V6H8V18H6M9.5,12L18,6V18L9.5,12Z"/></svg>
            <svg class="c-svg c-play" viewBox="0 0 24 24" onclick="toggle()"><path id="p-ico" d="M8,5.14V19.14L19,12.14L8,5.14Z"/></svg>
            <svg class="c-svg" viewBox="0 0 24 24" onclick="skip(1)"><path d="M16,18H18V6H16M6,18L14.5,12L6,6V18Z"/></svg>
        </div>

        <div class="vol-box">
            <div class="vol-label"><span>Master Signal</span><span id="v-val">50%</span></div>
            <div class="vol-bar">
                <input type="range" id="v-range" min="0" max="100" value="50" oninput="setV(this.value)">
            </div>
        </div>
    </aside>
</div>

<audio id="player"></audio>

<script>
    const STATIONS = [
        { n: 'RMF FM', s: 'RMF FM', u: 'rmf_fm' },
        { n: 'RMF MAXXX', s: 'Maxxx', u: 'RMFMAXXX48' },
        { n: 'RMF 80s', s: '80s', u: 'rmf_80s' },
        { n: 'RMF 90s', s: '90s', u: 'rmf_90s' },
        { n: 'RMF 2000', s: '2000', u: 'rmf_2000' },
        { n: 'RMF CHILLOUT', s: 'Chillout', u: 'rmf_chillout' },
        { n: 'RMF CLASSIC', s: 'Classic', u: 'rmf_classic' },
        { n: 'RMF DANCE', s: 'Dance', u: 'rmf_dance' },
        { n: 'RMF GOLD', s: 'Gold', u: 'rmf_gold' },
        { n: 'RMF LATINO', s: 'Latino', u: 'rmf_latino' },
        { n: 'RMF LOVE', s: 'Love', u: 'rmf_love' },
        { n: 'RMF PARTY', s: 'Party', u: 'rmf_party' },
        { n: 'RMF POLSKI ROCK', s: 'Polski Rock', u: 'rmf_polski_rock' },
        { n: 'RMF ROCK', s: 'Rock', u: 'rmf_rock' },
        { n: 'RMF SMOOTH JAZZ', s: 'Smooth Jazz', u: 'rmf_smooth_jazz' }
    ];

    const player = document.getElementById('player'), ico = document.getElementById('p-ico'), grid = document.getElementById('station-grid'), vRange = document.getElementById('v-range'), vVal = document.getElementById('v-val');
    let current = -1;

    function clock() {
        const d = new Date();
        document.getElementById('timer').textContent = d.getHours().toString().padStart(2,'0') + ":" + d.getMinutes().toString().padStart(2,'0');
    }
    setInterval(clock, 1000); clock();

    STATIONS.forEach((s, i) => {
        const t = document.createElement('div');
        t.className = 'tile';
        t.innerHTML = `
            <div class="waves"><div class="wave"></div><div class="wave"></div><div class="wave"></div></div>
            <div class="t-top">OSC SOURCE ${(i + 1).toString().padStart(2, '0')}</div>
            <div class="t-bottom">${s.s.toUpperCase()}</div>
        `;
        t.onclick = () => play(i);
        grid.appendChild(t);
    });

    function play(i) {
        current = i;
        document.querySelectorAll('.tile').forEach((t, idx) => t.classList.toggle('active', idx === i));
        document.getElementById('playing-now').textContent = "PATCH: " + STATIONS[i].n;
        const streamBase = "https://rs201-krk.rmfstream.pl/";
        player.src = (STATIONS[i].n === 'RMF MAXXX') ? 'https://rs7-krk2-cyfronet.rmfstream.pl/RMFMAXXX48' : streamBase + STATIONS[i].u;
        player.play();
        ico.setAttribute('d', 'M14,19H18V5H14M6,19H10V5H6V19Z');
    }

    function toggle() {
        if(player.paused) { player.play(); ico.setAttribute('d', 'M14,19H18V5H14M6,19H10V5H6V19Z'); }
        else { player.pause(); ico.setAttribute('d', 'M8,5.14V19.14L19,12.14L8,5.14Z'); }
    }

    function skip(d) { let n = current + d; if(n >= 0 && n < STATIONS.length) play(n); }
    function setV(v) { player.volume = v / 100; vVal.textContent = v + "%"; }
</script>
</body>
</html>
