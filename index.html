<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RMF PLUTO TERMINAL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap');

        :root {
            --pluto-white: #e6e9ef;
            --pluto-glow: #00f2ff;
            --pluto-shadow: #c5cad5;
            --pluto-light: #ffffff;
            --text-grey: #6a768a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        
        body { 
            height: 100vh; width: 100vw; 
            background: #0a0a0c; 
            font-family: 'Outfit', sans-serif;
            display: flex; flex-direction: column;
            padding: 15px; overflow: hidden; 
            color: var(--text-grey);
        }

        /* PANEL GŁÓWNY (BIAŁY SATYNOWY) */
        .main-container {
            flex: 1; display: flex; gap: 20px;
            background: var(--pluto-white);
            border-radius: 20px; padding: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 1px solid var(--pluto-light);
        }

        /* NAGŁÓWEK W STYLU PLUTO */
        header { 
            width: 100%; height: 50px; display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; border-bottom: 1px solid var(--pluto-shadow);
        }
        .logo-text { font-weight: 600; font-size: 24px; letter-spacing: 4px; color: #333; }
        .logo-text span { font-weight: 300; font-size: 14px; display: block; letter-spacing: 1px; color: var(--text-grey); }

        /* GRID 5x3 - ORYGINALNY UKŁAD */
        .grid { 
            flex: 1.4; display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            grid-template-rows: repeat(3, 1fr); 
            gap: 12px; 
        }

        .tile {
            background: var(--pluto-white);
            border-radius: 12px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; position: relative;
            box-shadow: 6px 6px 12px var(--pluto-shadow), -4px -4px 10px var(--pluto-light);
            transition: all 0.2s ease;
            border: 1px solid rgba(255,255,255,0.5);
        }

        .tile:active {
            box-shadow: inset 4px 4px 8px var(--pluto-shadow), inset -4px -4px 8px var(--pluto-light);
            transform: scale(0.98);
        }

        .tile .t-top { font-size: 9px; font-weight: 600; color: #99a; text-transform: uppercase; }
        .tile .t-bottom { font-size: 14px; font-weight: 600; color: #445; margin-top: 4px; }

        /* AKTYWNY KAFELEK - CYBER NEON */
        .tile.active {
            border: 1px solid var(--pluto-glow);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
        }
        .tile.active .t-bottom { color: #000; }
        .tile.active::after {
            content: ''; position: absolute; bottom: 8px; width: 4px; height: 4px;
            background: var(--pluto-glow); border-radius: 50%; box-shadow: 0 0 8px var(--pluto-glow);
        }

        /* SIDEBAR - KONTROLER PLUTO */
        .sidebar { 
            flex: 0.8; display: flex; flex-direction: column; 
            align-items: center; justify-content: space-between;
            padding: 10px; border-left: 1px solid var(--pluto-shadow);
        }

        /* DUŻE POKRĘTŁO (KNOB) Z OBRAZU */
        .master-knob-area { position: relative; width: 180px; height: 180px; }
        
        .knob-glow-ring {
            position: absolute; inset: 0; border-radius: 50%;
            border: 2px solid rgba(0, 242, 255, 0.1);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.15);
        }

        .knob-main {
            position: absolute; inset: 15px;
            background: var(--pluto-white); border-radius: 50%;
            box-shadow: 10px 10px 20px var(--pluto-shadow), -10px -10px 20px var(--pluto-light);
            cursor: ns-resize; display: flex; align-items: center; justify-content: center;
        }

        .knob-indicator {
            position: absolute; top: 10px; width: 4px; height: 15px;
            background: var(--pluto-glow); border-radius: 2px;
            box-shadow: 0 0 10px var(--pluto-glow);
            transform-origin: 2px 75px;
        }

        .vol-display { font-size: 28px; font-weight: 300; color: #334; }

        /* PRZYCISKI - KWADRATOWE KAFELKI STERUJĄCE */
        .pluto-buttons { display: flex; gap: 15px; margin-top: 20px; }
        
        .btn-pluto {
            width: 60px; height: 60px;
            background: var(--pluto-white); border-radius: 12px;
            box-shadow: 5px 5px 10px var(--pluto-shadow), -3px -3px 8px var(--pluto-light);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; border: 1px solid rgba(255,255,255,0.4);
        }

        .btn-pluto svg { width: 24px; height: 24px; fill: var(--text-grey); transition: 0.3s; }
        .btn-pluto:hover svg { fill: var(--pluto-glow); filter: drop-shadow(0 0 5px var(--pluto-glow)); }
        .btn-pluto:active { box-shadow: inset 3px 3px 6px var(--pluto-shadow); }

        @media (max-width: 800px) {
            .main-container { flex-direction: column; overflow-y: auto; }
            .grid { grid-template-columns: repeat(3, 1fr); height: auto; }
            .sidebar { border-left: none; border-top: 1px solid var(--pluto-shadow); padding-top: 30px; }
        }
    </style>
</head>
<body>

<div class="main-container">
    <div style="flex: 1.4; display: flex; flex-direction: column;">
        <header>
            <div class="logo-text">PLUTO <span>MULTI FX TERMINAL</span></div>
            <div style="font-weight: 600; color: #333;" id="timer">00:00</div>
        </header>

        <div class="grid" id="station-grid"></div>
    </div>

    <aside class="sidebar">
        <div style="text-align: center;">
            <p style="font-size: 10px; font-weight: 800; letter-spacing: 2px; margin-bottom: 20px;">OUTPUT LEVEL</p>
            <div class="master-knob-area">
                <div class="knob-glow-ring"></div>
                <div class="knob-main" id="knob" onmousedown="startRotate(event)" ontouchstart="startRotate(event)">
                    <div class="knob-indicator" id="knob-pointer"></div>
                    <div class="vol-display" id="vol-txt">50</div>
                </div>
            </div>
        </div>

        <div class="pluto-buttons">
            <div class="btn-pluto" onclick="skip(-1)">
                <svg viewBox="0 0 24 24"><path d="M6,18V6H8V18H6M9.5,12L18,6V18L9.5,12Z"/></svg>
            </div>
            <div class="btn-pluto" onclick="toggle()" style="width: 80px;">
                <svg viewBox="0 0 24 24"><path id="p-ico" d="M8,5.14V19.14L19,12.14L8,5.14Z"/></svg>
            </div>
            <div class="btn-pluto" onclick="skip(1)">
                <svg viewBox="0 0 24 24"><path d="M16,18H18V6H16M6,18L14.5,12L6,6V18Z"/></svg>
            </div>
        </div>

        <div style="text-align: center; font-size: 10px; opacity: 0.5;">
            RMF FM • DIGITAL EMULATION • V1.0
        </div>
    </aside>
</div>

<audio id="player"></audio>

<script>
    const STATIONS = [
        { n: 'RMF FM', s: 'RMF FM', u: 'rmf_fm' },
        { n: 'RMF MAXXX', s: 'Maxxx', u: 'RMFMAXXX48' },
        { n: 'RMF 80s', s: '80s', u: 'rmf_80s' },
        { n: 'RMF 90s', s: '90s', u: 'rmf_90s' },
        { n: 'RMF 2000', s: '2000', u: 'rmf_2000' },
        { n: 'RMF CHILLOUT', s: 'Chillout', u: 'rmf_chillout' },
        { n: 'RMF CLASSIC', s: 'Classic', u: 'rmf_classic' },
        { n: 'RMF DANCE', s: 'Dance', u: 'rmf_dance' },
        { n: 'RMF GOLD', s: 'Gold', u: 'rmf_gold' },
        { n: 'RMF LATINO', s: 'Latino', u: 'rmf_latino' },
        { n: 'RMF LOVE', s: 'Love', u: 'rmf_love' },
        { n: 'RMF PARTY', s: 'Party', u: 'rmf_party' },
        { n: 'RMF POLSKI ROCK', s: 'P-Rock', u: 'rmf_polski_rock' },
        { n: 'RMF ROCK', s: 'Rock', u: 'rmf_rock' },
        { n: 'RMF SMOOTH JAZZ', s: 'Smooth', u: 'rmf_smooth_jazz' }
    ];

    const player = document.getElementById('player'), ico = document.getElementById('p-ico'), grid = document.getElementById('station-grid');
    let current = -1;
    let volume = 50;

    function clock() {
        const d = new Date();
        document.getElementById('timer').textContent = d.getHours().toString().padStart(2,'0') + ":" + d.getMinutes().toString().padStart(2,'0');
    }
    setInterval(clock, 1000); clock();

    STATIONS.forEach((s, i) => {
        const t = document.createElement('div');
        t.className = 'tile';
        t.innerHTML = `<div class="t-top">FX ST ${i+1}</div><div class="t-bottom">${s.s}</div>`;
        t.onclick = () => play(i);
        grid.appendChild(t);
    });

    function play(i) {
        current = i;
        document.querySelectorAll('.tile').forEach((t, idx) => t.classList.toggle('active', idx === i));
        const streamBase = "https://rs201-krk.rmfstream.pl/";
        player.src = (STATIONS[i].n === 'RMF MAXXX') ? 'https://rs7-krk2-cyfronet.rmfstream.pl/RMFMAXXX48' : streamBase + STATIONS[i].u;
        player.play();
        ico.setAttribute('d', 'M14,19H18V5H14M6,19H10V5H6V19Z');
    }

    function toggle() {
        if(player.paused) { player.play(); ico.setAttribute('d', 'M14,19H18V5H14M6,19H10V5H6V19Z'); }
        else { player.pause(); ico.setAttribute('d', 'M8,5.14V19.14L19,12.14L8,5.14Z'); }
    }

    function skip(d) { let n = current + d; if(n >= 0 && n < STATIONS.length) play(n); }

    // KNOB LOGIC
    let isDragging = false;
    let startY = 0;

    function startRotate(e) {
        isDragging = true;
        startY = e.clientY || e.touches[0].clientY;
        document.addEventListener('mousemove', onRotate);
        document.addEventListener('mouseup', stopRotate);
        document.addEventListener('touchmove', onRotate);
        document.addEventListener('touchend', stopRotate);
    }

    function onRotate(e) {
        if (!isDragging) return;
        const currentY = e.clientY || e.touches[0].clientY;
        const diff = startY - currentY;
        volume = Math.min(Math.max(volume + diff * 0.5, 0), 100);
        startY = currentY;
        updateKnob();
    }

    function stopRotate() { isDragging = false; }

    function updateKnob() {
        const rotation = (volume * 2.4) - 120;
        document.getElementById('knob-pointer').style.transform = `rotate(${rotation}deg)`;
        document.getElementById('vol-txt').textContent = Math.round(volume);
        player.volume = volume / 100;
    }
    
    updateKnob();
</script>
</body>
</html>
