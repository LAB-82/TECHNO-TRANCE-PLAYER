<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHOSCYON 2 RMF EDITION</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;700&display=swap');

        :root {
            --ph-bg: #d8d8d8;
            --ph-panel-border: #9b9b9b;
            --ph-orange: #f39200;
            --ph-display-bg: #2a2a2a;
            --ph-display-text: #00ffcc;
            --ph-text: #333;
            --ph-shadow: inset 1px 1px 2px #fff, inset -1px -1px 2px #000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            height: 100vh; background: #1a1a1a; 
            font-family: 'Chakra Petch', sans-serif;
            display: flex; align-items: center; justify-content: center;
        }

        /* GŁÓWNA OBUDOWA */
        .phoscyon-case {
            width: 900px; height: 550px;
            background: var(--ph-bg);
            border-radius: 4px; border: 2px solid #555;
            padding: 10px; display: flex; flex-direction: column;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        /* GÓRNY PANEL (SCENE / SYNTHESIS) */
        header {
            display: flex; height: 100px; border-bottom: 2px solid var(--ph-panel-border);
            padding-bottom: 10px; margin-bottom: 10px;
        }
        .header-section { flex: 1; padding: 5px; border-right: 1px solid var(--ph-panel-border); }
        .section-label { font-size: 10px; font-weight: 700; text-transform: uppercase; color: #666; margin-bottom: 5px; text-align: center; border-bottom: 1px solid #bbb; }
        
        .lcd-small {
            background: #bbb; height: 35px; border-radius: 2px;
            border: 1px solid #888; display: flex; align-items: center; padding: 0 10px;
            font-size: 13px; font-weight: 700; color: #222;
        }

        /* ŚRODKOWY PANEL (CONTROLS) */
        .controls-row {
            display: flex; gap: 10px; flex: 1;
        }
        .side-panel { width: 220px; border: 1px solid var(--ph-panel-border); padding: 10px; display: flex; flex-direction: column; justify-content: space-between; }
        
        /* KLAWIATURA I KROKI (STACJE) */
        .sequencer-area {
            flex: 1; display: flex; flex-direction: column; gap: 10px;
        }

        /* GRID STACJI JAKO KLAWISZE */
        .station-keys {
            display: grid; grid-template-columns: repeat(8, 1fr); gap: 5px;
        }
        .step-btn {
            height: 40px; background: #eee; border: 1px solid #999; border-radius: 2px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 9px; cursor: pointer; position: relative; box-shadow: var(--ph-shadow);
        }
        .step-btn .led { width: 6px; height: 6px; background: #444; border-radius: 50%; margin-bottom: 4px; }
        .step-btn.active { background: #fff; }
        .step-btn.active .led { background: #ff4400; box-shadow: 0 0 5px #ff4400; }

        .keyboard {
            display: flex; gap: 2px; margin-top: auto; padding: 10px 0;
        }
        .key-white { height: 80px; flex: 1; background: #fdfdfd; border: 1px solid #888; border-radius: 0 0 3px 3px; cursor: pointer; box-shadow: 0 2px 2px rgba(0,0,0,0.2); }
        .key-white.active { background: var(--ph-orange); }

        /* PANEL BOCZNY (TRANSPORT & VOLUME) */
        .master-lcd {
            background: var(--ph-display-bg); color: var(--ph-display-text);
            height: 80px; padding: 10px; border-radius: 4px; border: 3px solid #444;
            display: flex; flex-direction: column; justify-content: center; text-align: center;
        }
        .master-lcd span { font-size: 10px; color: #888; text-transform: uppercase; }
        .master-lcd h2 { font-size: 18px; letter-spacing: 1px; }

        .btn-orange {
            background: var(--ph-orange); color: white; border: none; padding: 10px;
            border-radius: 3px; font-weight: 700; cursor: pointer; text-transform: uppercase;
            box-shadow: 0 3px 0 #b36b00; margin-top: 10px;
        }
        .btn-orange:active { transform: translateY(2px); box-shadow: 0 1px 0 #b36b00; }

        .vol-knob {
            width: 80px; height: 80px; background: #333; border-radius: 50%;
            margin: 20px auto; border: 5px solid #444; position: relative;
        }
        .knob-marker {
            position: absolute; top: 10px; left: 50%; width: 4px; height: 15px;
            background: var(--ph-orange); margin-left: -2px; transform-origin: bottom center;
        }

        input[type="range"] { width: 100%; accent-color: var(--ph-orange); }

    </style>
</head>
<body>

<div class="phoscyon-case">
    <header>
        <div class="header-section">
            <div class="section-label">Scene / Preset</div>
            <div class="lcd-small" id="cur-preset">RMF_COLLECTION_01</div>
        </div>
        <div class="header-section" style="border:none; flex: 1.5; display: flex; align-items: center; justify-content: flex-end;">
            <div style="text-align: right;">
                <h1 style="font-size: 24px; color: #444; font-weight: 900;">PHOSCYON <span style="color: var(--ph-orange);">2</span></h1>
                <p style="font-size: 10px; letter-spacing: 3px; color: #666;">ACID LINE RECEIVER</p>
            </div>
        </div>
    </header>

    <div class="controls-row">
        <div class="sequencer-area">
            <div class="section-label">Step Sequencer (Stations)</div>
            <div class="station-keys" id="grid"></div>
            
            <div class="section-label" style="margin-top: 20px;">Manual Trigger</div>
            <div class="keyboard" id="keyboard"></div>
        </div>

        <aside class="side-panel">
            <div class="master-lcd">
                <span>Output Signal</span>
                <h2 id="st-display">WAITING...</h2>
            </div>

            <div style="text-align: center;">
                <div class="vol-knob"><div class="knob-marker" id="knob"></div></div>
                <input type="range" min="0" max="100" value="70" oninput="setV(this.value)">
                <div class="section-label" style="border:none; margin-top:5px;">Master Volume</div>
            </div>

            <button class="btn-orange" onclick="toggle()" id="play-btn">Start / Stop</button>
            <div style="display: flex; gap: 5px;">
                <button class="btn-orange" style="flex:1; background: #666; box-shadow: 0 3px 0 #444;" onclick="skip(-1)">Prev</button>
                <button class="btn-orange" style="flex:1; background: #666; box-shadow: 0 3px 0 #444;" onclick="skip(1)">Next</button>
            </div>
        </aside>
    </div>
</div>

<audio id="player"></audio>

<script>
    const STATIONS = [
        { n: 'RMF FM', s: 'FM', u: 'rmf_fm' },
        { n: 'RMF MAXXX', s: 'MAX', u: 'RMFMAXXX48' },
        { n: 'RMF 80s', s: '80S', u: 'rmf_80s' },
        { n: 'RMF 90s', s: '90S', u: 'rmf_90s' },
        { n: 'RMF 2000', s: '00S', u: 'rmf_2000' },
        { n: 'RMF CHILL', s: 'CHL', u: 'rmf_chillout' },
        { n: 'RMF CLASSIC', s: 'CLA', u: 'rmf_classic' },
        { n: 'RMF DANCE', s: 'DNC', u: 'rmf_dance' }
    ];

    const player = document.getElementById('player'), grid = document.getElementById('grid'), kbd = document.getElementById('keyboard');
    let current = -1;

    // Renderowanie przycisków kroków (Step Buttons)
    STATIONS.forEach((s, i) => {
        const btn = document.createElement('div');
        btn.className = 'step-btn';
        btn.innerHTML = `<div class="led"></div>${i+1}`;
        btn.onclick = () => play(i);
        grid.appendChild(btn);

        const key = document.createElement('div');
        key.className = 'key-white';
        key.onclick = () => play(i);
        kbd.appendChild(key);
    });

    function play(i) {
        current = i;
        document.querySelectorAll('.step-btn').forEach((b, idx) => b.classList.toggle('active', idx === i));
        document.querySelectorAll('.key-white').forEach((k, idx) => k.classList.toggle('active', idx === i));
        
        document.getElementById('st-display').textContent = STATIONS[i].n;
        document.getElementById('cur-preset').textContent = "PRST: " + STATIONS[i].u.toUpperCase();
        
        const streamBase = "https://rs201-krk.rmfstream.pl/";
        player.src = (STATIONS[i].n === 'RMF MAXXX') ? 'https://rs7-krk2-cyfronet.rmfstream.pl/RMFMAXXX48' : streamBase + STATIONS[i].u;
        player.play();
        document.getElementById('play-btn').textContent = "Stop Engine";
    }

    function toggle() {
        if(player.paused) { player.play(); document.getElementById('play-btn').textContent = "Stop Engine"; }
        else { player.pause(); document.getElementById('play-btn').textContent = "Start Engine"; }
    }

    function skip(d) { let n = current + d; if(n >= 0 && n < STATIONS.length) play(n); }
    
    function setV(v) { 
        player.volume = v / 100; 
        document.getElementById('knob').style.transform = `rotate(${(v * 2.4) - 120}deg)`;
    }

    setV(70);
</script>
</body>
</html>
