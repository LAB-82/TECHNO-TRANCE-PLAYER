<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INDUSTRIAL_PCB_MASTER_V4</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@300;500&display=swap');

        :root {
            --pcb-green: #020a05;
            --copper: #b87333;
            --trace-cyan: #00f2ff;
            --trace-dim: #1a3a4a;
            --accent: #ff0055;
            --ic-body: #121212;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--pcb-green); color: var(--trace-cyan); 
            font-family: 'JetBrains Mono', monospace; overflow: hidden; height: 100vh;
        }

        #pcb-svg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0; pointer-events: none;
        }

        .main-frame { display: flex; height: 100vh; position: relative; z-index: 1; }

        .chipset-area { 
            flex: 1.8; position: relative; overflow: hidden; 
            background-image: 
                radial-gradient(var(--trace-dim) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* UKŁAD SCALONY (IC) - REALISTYCZNY DESIGN */
        .chip {
            position: absolute; background: var(--ic-body);
            width: 135px; height: 75px; /* Powiększone +25% */
            border-radius: 2px; cursor: pointer; z-index: 10;
            box-shadow: 5px 10px 20px rgba(0,0,0,0.8);
            border: 1px solid #333;
            display: flex; flex-direction: column; justify-content: center; padding: 10px;
        }

        /* Nóżki układu (Pins) */
        .chip::before, .chip::after {
            content: ''; position: absolute; left: -8px; right: -8px;
            height: 50px; top: 12.5px;
            background: repeating-linear-gradient(0deg, #888 0, #888 4px, transparent 4px, transparent 8px);
            z-index: -1;
        }

        /* Wycięcie / Klucz polaryzacji */
        .chip-notch {
            position: absolute; left: 0; top: 50%; transform: translateY(-50%);
            width: 8px; height: 16px; background: var(--pcb-green);
            border-radius: 0 8px 8px 0; border: 1px solid #333;
        }

        .chip.active {
            border-color: var(--trace-cyan);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.4);
        }

        .chip-n { font-family: 'Orbitron'; font-size: 11px; color: #eee; display: block; text-align: center; }
        .chip-u { font-size: 7px; color: #555; text-align: center; margin-top: 5px; }

        /* PANEL HUD */
        .hacker-panel { 
            flex: 0.7; background: rgba(5, 5, 5, 0.95); 
            border-left: 2px solid #222; display: flex; flex-direction: column;
        }

        .hud-header { padding: 20px; border-bottom: 2px solid var(--accent); font-family: 'Orbitron'; }
        .vfd { margin: 15px; padding: 15px; background: #000; border: 1px solid #1a1a1a; flex: 1; overflow-y: auto; }
        .controls { padding: 15px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .btn { background: #000; border: 1px solid var(--trace-dim); color: var(--trace-cyan); padding: 15px; cursor: pointer; font-family: 'Orbitron'; }
        .btn:hover { background: var(--trace-cyan); color: #000; }
        
        .volume-box { padding: 20px; }
        input[type=range] { -webkit-appearance: none; width: 100%; height: 4px; background: #222; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 30px; background: var(--accent); cursor: pointer; }
    </style>
</head>
<body>

<svg id="pcb-svg"></svg>

<div class="main-frame">
    <div class="chipset-area" id="board"></div>

    <aside class="hacker-panel">
        <div class="hud-header">STATUS: SYSTEM_V4</div>
        <div class="vfd" id="console">> READY...</div>
        <div class="controls">
            <button class="btn" onclick="skip(-1)">PREV</button>
            <button class="btn" onclick="toggle()">PLAY</button>
            <button class="btn" onclick="skip(1)">NEXT</button>
        </div>
        <div class="volume-box">
            <input type="range" min="0" max="1" step="0.01" value="0.5" oninput="setV(this.value)">
        </div>
    </aside>
</div>

<audio id="player" crossorigin="anonymous"></audio>

<script>
    const STATIONS = [
        { n: 'TECH 88', u: 'https://laut.fm/tech88', x: 10, y: 15 },
        { n: 'HR3 CLUB', u: 'https://laut.fm/hr3_clubnight', x: 45, y: 12 },
        { n: '1000 TECHNO', u: 'https://laut.fm/1000techno', x: 15, y: 40 },
        { n: 'GEHIRN TREIBER', u: 'https://laut.fm/gehirn-treiber-beat-radio', x: 42, y: 48 },
        { n: 'BEST OF TECHNO', u: 'https://laut.fm/best-of-techno', x: 12, y: 75 },
        { n: 'CHRIS BURN', u: 'https://laut.fm/chris_burn', x: 55, y: 80 },
        { n: 'DEEP HOUSE', u: 'https://laut.fm/deep-house-sounds', x: 30, y: 5 },
        { n: 'HOUSEBOMB', u: 'https://laut.fm/housebomb-fn', x: 75, y: 72 },
        { n: 'SYMBIOTIC', u: 'https://laut.fm/symbiotic-beats', x: 78, y: 35 }
    ];

    const svg = document.getElementById('pcb-svg');
    const board = document.getElementById('board');
    const player = document.getElementById('player');
    const cons = document.getElementById('console');
    let current = -1;

    function init() {
        // 1. ZAGĘSZCZANIE POWIERZCHNI (Background Traces)
        for(let i=0; i<150; i++) {
            const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            circle.setAttribute("cx", Math.random()*100+"%");
            circle.setAttribute("cy", Math.random()*100+"%");
            circle.setAttribute("r", Math.random()*1.5);
            circle.setAttribute("fill", "#0a1f10");
            svg.appendChild(circle);
        }

        STATIONS.forEach((s, i) => {
            const div = document.createElement('div');
            div.className = 'chip';
            div.style.left = s.x + '%'; div.style.top = s.y + '%';
            div.id = `ic-${i}`;
            div.innerHTML = `<div class="chip-notch"></div><span class="chip-n">${s.n}</span><span class="chip-u">LOGIC_GATE_${i}</span>`;
            div.onclick = () => mount(i);
            board.appendChild(div);
        });

        drawPaths();
    }

    function drawPaths() {
        svg.querySelectorAll('path').forEach(p => p.remove());
        const panelX = window.innerWidth * 0.72;

        STATIONS.forEach((s, i) => {
            const el = document.getElementById(`ic-${i}`);
            const r = el.getBoundingClientRect();
            const x = r.left + r.width;
            const y = r.top + r.height/2;

            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            const d = `M ${x} ${y} L ${x + 20} ${y} L ${x + 20} ${y + (i*20-100)} L ${panelX} ${y + (i*20-100)}`;
            path.setAttribute("d", d);
            path.setAttribute("stroke", "#133124");
            path.setAttribute("fill", "none");
            path.setAttribute("stroke-width", "2");
            path.id = `tr-${i}`;
            svg.appendChild(path);
        });
    }

    function mount(i) {
        current = i;
        document.querySelectorAll('.chip').forEach((c, idx) => c.classList.toggle('active', idx === i));
        document.querySelectorAll('path').forEach(p => p.setAttribute('stroke', '#133124'));
        
        const active = document.getElementById(`tr-${i}`);
        if(active) { active.setAttribute('stroke', 'var(--trace-cyan)'); active.setAttribute('stroke-width', '3'); }

        cons.innerHTML = `> MOUNTING NODE: ${STATIONS[i].n}<br>> ADDR: ${STATIONS[i].u}<br>> STATUS: CONNECTED`;
        
        player.pause();
        player.src = STATIONS[i].u;
        player.load();
        player.play().catch(e => cons.innerHTML += "<br>> ERROR: USER_ACTION_REQUIRED");
    }

    function toggle() { if(current === -1) mount(0); else player.paused ? player.play() : player.pause(); }
    function skip(dir) { let n = current + dir; if(n >= 0 && n < STATIONS.length) mount(n); }
    function setV(v) { player.volume = v; }

    window.onresize = drawPaths;
    init();
</script>
</body>
</html>
