<!DOCTYPE html><html lang="pl"><head>    <meta charset="UTF-8">    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">    <title>RMF NEON WORKSPACE</title>    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat+Alternates:wght@400;600;700&display=swap');
        
        :root {            
            --rmf-yellow: #fce300;            
            --neon-glow: #fffb00;            
            --bg-deep: #0b021a; /* Kolor z image_95e75c.jpg */
            --neon-cyan: #00ffff;
            --neon-magenta: #ff00ff;
            --glass: rgba(20, 10, 40, 0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }                
        html, body {             
            height: 100vh; width: 100vw;             
            background: var(--bg-deep); color: #fff;             
            font-family: 'Montserrat Alternates', sans-serif;            
            overflow: hidden;         
        }

        /* Tło z efektem poświaty */
        body { 
            display: flex; flex-direction: column; padding: 2vh; 
            background-image: 
                radial-gradient(circle at 50% 50%, #1a0b3a 0%, #0b021a 100%);
            position: relative;
        }

        /* Dekoracyjna "ramka monitora" jak w image_95e75c.jpg */
        body::after {
            content: ""; position: absolute; inset: 10px;
            border: 2px solid rgba(255, 0, 255, 0.1);
            pointer-events: none; border-radius: 15px;
        }

        header {             
            height: 60px; display: flex; justify-content: space-between; align-items: center;            
            background: var(--glass);
            border: 2px solid var(--neon-cyan);
            box-shadow: 0 0 15px var(--neon-cyan);
            margin-bottom: 2vh; flex-shrink: 0;
            padding: 0 25px; border-radius: 10px;
        }        
        .header-info { 
            font-size: 22px; font-weight: 700; color: var(--rmf-yellow); 
            text-shadow: 0 0 10px var(--rmf-yellow);
            text-transform: uppercase;
        }        
        .clock { color: var(--neon-magenta); font-size: 24px; font-weight: 700; text-shadow: 0 0 10px var(--neon-magenta); }

        .app-content { display: flex; flex: 1; gap: 20px; min-height: 0; }
        
        .grid {             
            flex: 1.4; display: grid;             
            grid-template-columns: repeat(5, 1fr);             
            grid-template-rows: repeat(3, 1fr);             
            gap: 12px;         
        }

        /* TILE - STYL NEONOWYCH OKIEN */
        .tile {            
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--neon-cyan);
            border-radius: 6px;            
            display: flex; flex-direction: column; align-items: center; justify-content: center;            
            cursor: pointer; transition: 0.3s;
            position: relative;
        }

        .tile .t-top { font-size: 16px; font-weight: 700; color: #fff; z-index: 2; }        
        .tile .t-bottom { font-size: 11px; color: var(--neon-cyan); margin-top: 5px; font-weight: 600; z-index: 2; }

        /* AKTYWNA STACJA - MAGENTA GLOW */
        .tile.active {             
            border-color: var(--neon-magenta);
            box-shadow: 0 0 20px var(--neon-magenta), inset 0 0 10px var(--neon-magenta);
            background: rgba(255, 0, 255, 0.1);
        }        
        .tile.active .t-top { color: var(--rmf-yellow); text-shadow: 0 0 5px var(--rmf-yellow); }

        /* Sidebar jako boczny panel sterowania */
        .sidebar {             
            flex: 0.6; display: flex; flex-direction: column;             
            align-items: center; justify-content: space-around; 
            padding: 30px; border-radius: 12px;
            background: var(--glass);
            border: 2px solid var(--neon-magenta);
            box-shadow: 0 0 20px var(--neon-magenta);
        }

        .logo-display {            
            width: 100%; aspect-ratio: 1/1;            
            border: 3px solid var(--rmf-yellow);
            border-radius: 50%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;            
            background: #000;
            box-shadow: 0 0 30px var(--rmf-yellow);
        }        
        .logo-display h2 { font-size: 48px; color: var(--rmf-yellow); text-shadow: 0 0 15px var(--rmf-yellow); }        

        .controls { display: flex; align-items: center; gap: 20px; }        
        .c-svg { width: 40px; height: 40px; fill: var(--neon-cyan); cursor: pointer; filter: drop-shadow(0 0 5px var(--neon-cyan)); }        
        .c-play { width: 80px; height: 80px; fill: var(--rmf-yellow); filter: drop-shadow(0 0 10px var(--rmf-yellow)); }

        .vol-box { display: flex; align-items: center; gap: 15px; width: 100%; }        
        .vol-bar { 
            flex: 1; height: 15px; background: #222; border-radius: 10px;
            border: 1px solid var(--neon-cyan); overflow: hidden; position: relative;
        }                
        input[type="range"] { width: 100%; appearance: none; background: transparent; cursor: pointer; }        
        input[type="range"]::-webkit-slider-thumb { 
            appearance: none; width: 20px; height: 20px; background: var(--rmf-yellow); box-shadow: 0 0 10px var(--rmf-yellow);
        }

        /* OKRĄGŁE FALE - TYM RAZEM JAKO SUBTELNY DODATEK */
        .waves { position: absolute; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; }
        .tile.active .waves { opacity: 1; }
        .wave { position: absolute; border: 1px solid var(--rmf-yellow); border-radius: 50%; animation: ripple 2s infinite linear; }
        @keyframes ripple { 0% { width: 0; height: 0; opacity: 1; } 100% { width: 200%; height: 200%; opacity: 0; } }

        @media (max-width: 600px) {            
            .grid { grid-template-columns: repeat(3, 1fr); flex: none; height: 50vh; }            
            .sidebar { width: 100%; }        
        }
    </style></head><body>

<header>    
    <div class="header-info" id="playing-now">GRA: RMF FM</div>    
    <div class="clock" id="timer">00:00</div>
</header>

<div class="app-content">    
    <div class="grid" id="station-grid"></div>
    <aside class="sidebar">        
        <div class="logo-display">            
            <h2>RMF</h2>            
            <p style="color:var(--neon-cyan); letter-spacing: 5px;">NEON</p>        
        </div>
        <div class="controls">            
            <svg class="c-svg" viewBox="0 0 24 24" onclick="skip(-1)"><path d="M6,18V6H8V18H6M9.5,12L18,6V18L9.5,12Z"/></svg>            
            <svg class="c-svg c-play" viewBox="0 0 24 24" onclick="toggle()"><path id="p-ico" d="M8,5.14V19.14L19,12.14L8,5.14Z"/></svg>            
            <svg class="c-svg" viewBox="0 0 24 24" onclick="skip(1)"><path d="M16,18H18V6H16M6,18L14.5,12L6,6V18Z"/></svg>        
        </div>
        <div class="vol-box">            
            <div class="vol-bar">                
                <input type="range" id="v-range" min="0" max="100" value="50" oninput="setV(this.value)">            
            </div>            
        </div>    
    </aside>
</div>

<audio id="player"></audio>

<script>    
    const STATIONS = [        
        { n: 'RMF FM', s: 'RMF FM', u: 'rmf_fm' },        
        { n: 'RMF MAXXX', s: 'Maxxx', u: 'RMFMAXXX48' },        
        { n: 'RMF 80s', s: '80s', u: 'rmf_80s' },        
        { n: 'RMF 90s', s: '90s', u: 'rmf_90s' },        
        { n: 'RMF 2000', s: '2000', u: 'rmf_2000' },        
        { n: 'RMF CHILLOUT', s: 'Chillout', u: 'rmf_chillout' },        
        { n: 'RMF CLASSIC', s: 'Classic', u: 'rmf_classic' },        
        { n: 'RMF DANCE', s: 'Dance', u: 'rmf_dance' },        
        { n: 'RMF GOLD', s: 'Gold', u: 'rmf_gold' },        
        { n: 'RMF LATINO', s: 'Latino', u: 'rmf_latino' },        
        { n: 'RMF LOVE', s: 'Love', u: 'rmf_love' },        
        { n: 'RMF PARTY', s: 'Party', u: 'rmf_party' },        
        { n: 'RMF POLSKI ROCK', s: 'Polski Rock', u: 'rmf_polski_rock' },        
        { n: 'RMF ROCK', s: 'Rock', u: 'rmf_rock' },        
        { n: 'RMF SMOOTH JAZZ', s: 'Smooth Jazz', u: 'rmf_smooth_jazz' }    
    ];

    const player = document.getElementById('player'), ico = document.getElementById('p-ico'), grid = document.getElementById('station-grid'), vRange = document.getElementById('v-range');    
    let current = -1;

    function clock() {        
        const d = new Date();        
        document.getElementById('timer').textContent = d.getHours().toString().padStart(2,'0') + ":" + d.getMinutes().toString().padStart(2,'0');    
    }    
    setInterval(clock, 1000); clock();

    STATIONS.forEach((s, i) => {        
        const t = document.createElement('div');        
        t.className = 'tile';        
        t.innerHTML = `            
            <div class="waves"><div class="wave"></div></div>            
            <div class="t-top">RMF</div>            
            <div class="t-bottom">${s.s}</div>        `;        
        t.onclick = () => play(i);        
        grid.appendChild(t);    
    });

    function play(i) {        
        current = i;        
        document.querySelectorAll('.tile').forEach((t, idx) => t.classList.toggle('active', idx === i));        
        document.getElementById('playing-now').textContent = "GRA: " + STATIONS[i].n;        
        const streamBase = "https://rs201-krk.rmfstream.pl/";        
        player.src = (STATIONS[i].n === 'RMF MAXXX') ? 'https://rs7-krk2-cyfronet.rmfstream.pl/RMFMAXXX48' : streamBase + STATIONS[i].u;        
        player.play();        
        ico.setAttribute('d', 'M14,19H18V5H14M6,19H10V5H6V19Z');    
    }

    function toggle() {        
        if(player.paused) { player.play(); ico.setAttribute('d', 'M14,19H18V5H14M6,19H10V5H6V19Z'); }        
        else { player.pause(); ico.setAttribute('d', 'M8,5.14V19.14L19,12.14L8,5.14Z'); }    
    }

    function skip(d) { let n = current + d; if(n >= 0 && n < STATIONS.length) play(n); }        
    function setV(v) { player.volume = v / 100; }        
</script></body></html>
