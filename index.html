<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Techno Trance Player - Professional Edition</title>
    <style>
        /* Import czcionki dla profesjonalnego wyglądu LCD */
        @import url('https://fonts.cdnfonts.com/css/ds-digital');

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #111;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        /* 1. Bardziej drewniana obudowa */
        .case-outer {
            padding: 20px;
            background: #5d4037; 
            background-image: 
                url('https://www.transparenttextures.com/patterns/wood-pattern.png'),
                linear-gradient(135deg, #6d4c41 0%, #2b1d1a 100%);
            border-radius: 45px;
            box-shadow: 0 50px 100px rgba(0,0,0,0.9), inset 0 0 40px rgba(0,0,0,0.6);
            position: relative;
            clip-path: polygon(6% 0%, 94% 0%, 100% 10%, 100% 90%, 94% 100%, 6% 100%, 0% 90%, 0% 10%);
        }

        .radio-front {
            width: 820px;
            height: 480px;
            background: #fcfcfc;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid #ddd;
            clip-path: polygon(6% 0%, 94% 0%, 100% 10%, 100% 90%, 94% 100%, 6% 100%, 0% 90%, 0% 10%);
        }

        /* 2. Napis nad LCD z poświatą */
        .branding {
            margin-top: 35px;
            font-size: 26px;
            font-weight: 900;
            color: #333;
            letter-spacing: 5px;
            text-transform: uppercase;
            transition: 0.5s;
        }

        .powered .branding {
            color: #000;
            text-shadow: 0 0 15px rgba(0, 195, 255, 0.6), 0 0 2px #00c3ff;
        }

        /* 3. Wyświetlacz LCD - Mniejszy o 25%, Stabilna czcionka */
        .lcd-display {
            width: 225px;
            height: 130px;
            background: #050505;
            border: 6px solid #1a1a1a;
            border-radius: 4px;
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #1a1a1a; /* Wyłączony */
            font-family: 'DS-Digital', 'Courier New', monospace;
            font-variant-numeric: tabular-nums;
            transition: 0.4s;
            box-shadow: inset 0 0 25px #000;
        }

        .powered .lcd-display { 
            color: #00ff41; 
            text-shadow: 0 0 10px rgba(0,255,65,0.8);
        }

        .lcd-time { font-size: 42px; font-weight: bold; letter-spacing: 1px; }
        .lcd-station { font-size: 16px; margin-bottom: 4px; height: 18px; }
        .lcd-date { font-size: 14px; opacity: 0.5; margin-top: 4px; }

        /* Głośniki */
        .speaker {
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, #222 1.2px, transparent 1.8px), #111;
            background-size: 5px 5px;
            border-radius: 50%;
            position: absolute;
            top: 100px;
            border: 8px solid #eee;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2), inset 0 0 30px #000;
        }
        .spk-l { left: 40px; }
        .spk-r { right: 40px; }

        /* 4. Ramka przycisków w kolorze obudowy */
        .btn-rack {
            position: absolute;
            bottom: 60px;
            display: flex;
            gap: 12px;
            padding: 15px 25px;
            background: #5d4037; 
            border-radius: 15px;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5), 0 5px 15px rgba(0,0,0,0.3);
            align-items: center;
        }

        /* 5. Miękkie przyciski "Soft-touch" */
        .btn-pro {
            width: 60px;
            height: 45px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(145deg, #333, #1a1a1a);
            color: #666;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 4px 4px 8px #2b1d1a, -1px -1px 2px rgba(255,255,255,0.05);
            transition: 0.1s;
        }

        .btn-pro:active {
            transform: scale(0.95);
            box-shadow: inset 2px 2px 5px #000;
        }

        .btn-pro.active { color: #00ff41; text-shadow: 0 0 8px #00ff41; }
        .btn-pro svg { width: 24px; height: 24px; fill: currentColor; }

        /* Głośność */
        .vol-unit { display: flex; flex-direction: column; gap: 8px; width: 120px; }
        .vol-controls { display: flex; gap: 5px; height: 30px; }
        .vol-bar { width: 100%; height: 6px; background: #000; border-radius: 3px; overflow: hidden; }
        .vol-fill { height: 100%; width: 50%; background: #00ff41; opacity: 0; transition: width 0.3s; }
        .powered .vol-fill { opacity: 1; box-shadow: 0 0 10px #00ff41; }

    </style>
</head>
<body>

<div class="case-outer">
    <div class="radio-front" id="mainPanel">
        <div class="branding">MUZYCZNE RADIO</div>
        
        <div class="lcd-display">
            <div id="lcdStation" class="lcd-station"></div>
            <div id="lcdTime" class="lcd-time">00:00:00</div>
            <div id="lcdDate" class="lcd-date">04.05.2026</div>
        </div>

        <div class="speaker spk-l"></div>
        <div class="speaker spk-r"></div>

        <div class="btn-rack">
            <button id="pwr" class="btn-pro"><svg viewBox="0 0 24 24"><path d="M13,3h-2v10h2V3z M17.8,4.5l-1.4,1.4C18.3,7.4,19,9.6,19,12c0,3.9-3.1,7-7,7s-7-3.1-7-7c0-2.4,0.7-4.6,2.6-6.1L6.2,4.5 C3.6,6.4,2,9.5,2,13c0,5.5,4.5,10,10,10s10-4.5,10-10C22,9.5,20.4,6.4,17.8,4.5z"/></svg></button>
            <button id="play" class="btn-pro"><svg viewBox="0 0 24 24"><path d="M8,5V19L19,12L8,5Z"/></svg></button>
            <button id="stop" class="btn-pro"><svg viewBox="0 0 24 24"><path d="M6,6H18V18H6V6Z"/></svg></button>
            <button id="mute" class="btn-pro"><svg viewBox="0 0 24 24"><path id="mute-icon" d="M3,9v6h4l5,5V4L7,9H3zm13.5,3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73,2.5-2.25,2.5-4.02z"/></svg></button>
            
            <div class="vol-unit">
                <div class="vol-controls">
                    <button id="vDown" class="btn-pro" style="width:100%"><svg viewBox="0 0 24 24"><path d="M19,13H5V11H19V13Z"/></svg></button>
                    <button id="vUp" class="btn-pro" style="width:100%"><svg viewBox="0 0 24 24"><path d="M19,13H13V19H11V13H5V11H11V5H13V11H19V13Z"/></svg></button>
                </div>
                <div class="vol-bar"><div id="vFill" class="vol-fill"></div></div>
            </div>
        </div>
    </div>
</div>

<audio id="stream" crossorigin="anonymous" src="https://stream.rcs.revma.com/gzwc1xcq042vv"></audio>

<script>
    const audio = document.getElementById('stream');
    const panel = document.getElementById('mainPanel');
    const muteIcon = document.getElementById('mute-icon');
    const vFill = document.getElementById('vFill');
    const lcdStation = document.getElementById('lcdStation');
    const lcdTime = document.getElementById('lcdTime');

    const M_OFF = "M3,9v6h4l5,5V4L7,9H3zm13.5,3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73,2.5-2.25,2.5-4.02z";
    const M_ON = "M4.27,3L3,4.27,7.73,9H3v6h4l5,5v-6.73l4.25,4.25c-.67.52-1.42.93-2.25,1.18v2.06c1.38-.31,2.63-.95,3.69-1.81L19.73,21 21,19.73l-9-9L4.27,3z";

    let isPwr = false;

    function clock() {
        const d = new Date();
        lcdTime.textContent = d.toLocaleTimeString('pl-PL', { hour12: false });
        document.getElementById('lcdDate').textContent = d.toLocaleDateString('pl-PL');
    }
    setInterval(clock, 1000); clock();

    function updateVolUI() { vFill.style.width = (audio.volume * 100) + "%"; }

    document.getElementById('pwr').onclick = function() {
        isPwr = !isPwr;
        panel.classList.toggle('powered');
        this.classList.toggle('active', isPwr);
        if(!isPwr) {
            audio.pause();
            document.getElementById('play').classList.remove('active');
            lcdStation.textContent = "";
        } else {
            lcdStation.textContent = "SYSTEM READY";
        }
    };

    document.getElementById('play').onclick = function() {
        if(!isPwr) return;
        audio.play();
        this.classList.add('active');
        lcdStation.textContent = "LIVE STREAMING";
    };

    // FIX STOP: Resetuje głośność do 50%
    document.getElementById('stop').onclick = function() {
        if(!isPwr) return;
        audio.pause();
        audio.currentTime = 0;
        audio.volume = 0.5;
        updateVolUI();
        document.getElementById('play').classList.remove('active');
        lcdStation.textContent = "STOP / VOL RESET";
    };

    // FIX MUTE: Działa poprawnie
    document.getElementById('mute').onclick = function() {
        if(!isPwr) return;
        audio.muted = !audio.muted;
        this.classList.toggle('active', audio.muted);
        muteIcon.setAttribute('d', audio.muted ? M_ON : M_OFF);
    };

    document.getElementById('vUp').onclick = function() {
        if(!isPwr) return;
        audio.volume = Math.min(1, audio.volume + 0.1);
        updateVolUI();
    };

    document.getElementById('vDown').onclick = function() {
        if(!isPwr) return;
        audio.volume = Math.max(0, audio.volume - 0.1);
        updateVolUI();
    };

    audio.volume = 0.5;
    updateVolUI();
</script>
</body>
</html>
