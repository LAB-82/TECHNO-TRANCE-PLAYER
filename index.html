<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RMF TB-303 PRO TERMINAL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&family=Roboto+Condensed:wght@700&display=swap');

        :root {
            --metal-shine: linear-gradient(180deg, #e8e8e8 0%, #b0b0b0 45%, #7a7a7a 50%, #a0a0a0 55%, #dcdcdc 100%);
            --led-red: #ff0000;
            --led-bg: #400000;
            --lcd-green: #a4f000;
            
            /* NOWE ZMIENNE OPARTE O MATERIAŁ REFERENCEYJNY */
            /* Kolor i tekstura panelu głównego z Twojego zdjęcia */
            --panel-texture: url('https://www.transparenttextures.com/patterns/brushed-alum.png');
            --right-panel-bg: linear-gradient(180deg, #5c5f60 0%, #a6aaac 45%, #7e8284 50%, #b8bcbe 55%, #eceeef 100%);

            /* Kolor i tekstura kafelka RB-300 */
            --rb300-tile-bg: linear-gradient(180deg, #444a4e 0%, #7e868a 45%, #606669 50%, #888d90 55%, #aaaaac 100%);
            --rb300-led-active: #ff4500; /* Intensywny pomarańcz-czerwony z foto */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; cursor: default !important; }
        
        body { 
            height: 100vh; width: 100vw; background: #0a0a0a; 
            display: flex; justify-content: center; align-items: center;
            font-family: 'Roboto Condensed', sans-serif; overflow: hidden;
        }

        .vst-chassis {
            width: 98vw; height: 96vh; background: var(--metal-shine);
            background-image: var(--panel-texture);
            border: 5px solid #222; border-radius: 8px;
            box-shadow: 0 40px 100px rgba(0,0,0,1);
            padding: 25px; display: flex; flex-direction: column; position: relative;
        }

        header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 20px; border-bottom: 2px solid rgba(0,0,0,0.3); padding-bottom: 15px; }
        .logo h1 { font-family: 'Orbitron'; font-size: 36px; color: #1a1a1a; letter-spacing: -2px; margin: 0; }
        .logo span { font-size: 11px; letter-spacing: 4px; color: #1a1a1a; font-weight: bold; }

        #clock { font-family: 'Share Tech Mono'; font-size: 32px; color: #ffffff; text-shadow: 0 0 15px var(--lcd-green); }

        .main-workspace { display: flex; flex: 1; gap: 20px; min-height: 0; }

        .grid-stations { 
            flex: 1.4; display: grid; grid-template-columns: repeat(5, 1fr); grid-template-rows: repeat(3, 1fr); gap: 15px; 
            background: rgba(0,0,0,0.1); padding: 20px; border: 1px solid rgba(0,0,0,0.2);
            border-radius: 5px;
        }

        /* NOWE KAFELKI STACJI W STYLU RB-300 */
        .bt-303 {
            background: var(--rb300-tile-bg);
            background-image: var(--panel-texture);
            border: 1px solid #111; 
            border-bottom: 5px solid #000;
            border-radius: 4px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px;
            position: relative; transition: 0.05s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
        /* Czerwona kropka LED na górze kafelka */
        .bt-303::before { content: ""; position: absolute; top: 6px; width: 6px; height: 6px; background: #600; border-radius: 50%; border: 1px solid #000; }
        .bt-303.active .st-label { color: var(--rb300-led-active); text-shadow: 0 0 12px var(--rb300-led-active); }
        .bt-303.active::before { background: var(--led-red); box-shadow: 0 0 8px var(--led-red); }
        .bt-303 .st-label { font-weight: 800; font-size: 14px; color: #aaa; text-transform: uppercase; pointer-events: none; margin-top: 10px; }
        .bt-303:active { transform: translateY(2px); border-bottom-width: 2px; }

        /* PRAWY PANEL STEROWANIA - JASNE METALICZNE TŁO Z TWOJEGO ZDJĘCIA */
        .pro-panel { 
            flex: 0.6; display: flex; flex-direction: column; gap: 15px; 
            /* Zmiana tła na jasne metaliczne */
            background-color: var(--panel-bg-color);
            background-image: var(--panel-texture);
            padding: 20px; border: 3px solid #666; border-radius: 10px; 
            box-shadow: inset 0 0 20px rgba(0,0,0,0.1), 3px 3px 10px rgba(0,0,0,0.2);
        }

        .lcd-display { background: #0a0c0a; height: 110px; border: 4px solid #222; padding: 10px; font-family: 'Share Tech Mono'; display: flex; flex-direction: column; justify-content: space-between; box-shadow: inset 0 0 15px #000; }
        .lcd-label { color: var(--lcd-green); font-size: 10px; opacity: 0.8; }
        #st-name { font-size: 26px; color: #ffffff; text-shadow: 0 0 12px var(--lcd-green); font-weight: bold; }
        .lcd-sub { color: var(--lcd-green); display: flex; justify-content: space-between; font-size: 11px; }

        .step-sequencer { background: rgba(0,0,0,0.8); border: 2px solid #222; padding: 10px; display: flex; flex-direction: column; gap: 4px; border-radius: 4px; }
        .step-row { display: flex; gap: 2px; height: 20px; }
        .step { flex: 1; background: #333; }
        .step.on { background: #ff4400; box-shadow: 0 0 8px #ff4400; }

        .analog-controls { display: flex; flex-direction: column; align-items: center; gap: 15px; margin-top: 10px; }
        
        .pan-section { text-align: center; }
        .pan-leds { display: flex; gap: 8px; justify-content: center; margin-bottom: 5px; }
        .pan-led { width: 10px; height: 10px; background: var(--led-bg); border-radius: 50%; border: 1px solid #111; }
        .pan-led.active { background: var(--led-red); box-shadow: 0 0 8px var(--led-red); }
        
        /* NOWE POKRĘTŁO PAN L/R - CIEMNE, METALOWE (jak na zdjęciu) */
        .knob-volume { 
            width: 80px; height: 80px; border-radius: 50%; 
            background: radial-gradient(circle, #888 0%, #222 100%);
            border: 2px solid #111; position: relative; 
            box-shadow: 0 5px 10px rgba(0,0,0,0.6); 
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin: 0 auto;
        }
        /* Kreska pozycjonująca na pokrętle */
        .knob-volume::before { content: ""; position: absolute; top: 5px; left: 50%; width: 5px; height: 20px; background: #eee; transform: translateX(-50%); border-radius: 2px; }

        .volume-row { display: flex; align-items: center; gap: 15px; width: 100%; justify-content: center; }

        /* NOWE PRZYCISKI EDIT - CIEMNE (jak na zdjęciu) */
        .sq-btn { 
            width: 55px; height: 50px; 
            /* Ciemny metal z Twojego zdjęcia */
            background: var(--knob-metal);
            border: 1px solid #111; 
            border-bottom: 3px solid #000; 
            border-radius: 3px; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.1), 2px 2px 4px rgba(0,0,0,0.4);
            position: relative;
        }
        /* Dioda nad przyciskami EDIT */
        .sq-btn::after { content: ""; position: absolute; top: -10px; width: 6px; height: 6px; background: var(--led-bg); border-radius: 50%; border: 1px solid #000; }
        .sq-btn.active::after { background: var(--led-red); box-shadow: 0 0 6px var(--led-red); }

        .sq-btn span { font-size: 10px; font-weight: 900; color: #fff; text-transform: uppercase; }

        .fader-track { background: #000; height: 45px; flex: 1; border: 2px solid #222; display: flex; align-items: center; padding: 0 5px; }
        input[type="range"] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 25px; height: 38px; background: #eee; border: 1px solid #333; box-shadow: inset 0 0 8px #fff; }

        /* PRZYCISK RUN / STOP - PRZYWRÓCONY CIEMNY, METALOWY */
        .btn-run-stop { 
            width: 130px; height: 60px; 
            /* Ciemny metal z Twojego zdjęcia */
            background: var(--knob-metal); 
            border: 1px solid #111; 
            border-bottom: 4px solid #000; 
            border-radius: 4px; display: flex; align-items: center; justify-content: center; 
            font-weight: 900; font-size: 15px; color: #fff; text-transform: uppercase;
            box-shadow: 0 3px 6px rgba(0,0,0,0.5);
            margin-top: 15px;
        }
        .btn-run-stop:active, .sq-btn:active { transform: translateY(3px); border-bottom-width: 1px; }
    </style>
</head>
<body>

<div class="vst-chassis">
    <header>
        <div class="logo">
            <h1>RMF TB-303</h1>
            <span>COMPUTER CONTROLLED // ACID ENGINE</span>
        </div>
        <div id="clock">00:00:00</div>
    </header>

    <div class="main-workspace">
        <div class="grid-stations" id="grid"></div>
        <aside class="pro-panel">
            <div class="lcd-display">
                <div class="lcd-label">BANK: A1 / PATTERN: 08</div>
                <div id="st-name">STATION IDLE</div>
                <div class="lcd-sub"><span>BITRATE: 128KBPS</span><span id="v-val">VOL: 50%</span></div>
            </div>
            <div class="step-sequencer"><div class="step-row" id="r1"></div><div class="step-row" id="r2"></div><div class="step-row" id="r3"></div></div>
            <div class="analog-controls">
                <div class="pan-section">
                    <div class="pan-leds"><div class="pan-led" id="l-led"></div><div class="pan-led active" id="c-led"></div><div class="pan-led" id="r-led"></div></div>
                    <div class="knob-volume" id="pan-knob"></div>
                    <div style="font-size: 10px; font-weight: bold; margin-top: 8px; color: #111;">PAN L/R</div>
                </div>
                <div class="volume-row">
                    <div class="sq-btn active" id="vol-down-btn"><span>EDIT</span></div>
                    <div class="fader-track"><input type="range" id="v-range" min="0" max="100" value="50"></div>
                    <div class="sq-btn" id="vol-up-btn"><span>EDIT</span></div>
                </div>
                <div class="btn-run-stop" id="run-stop-btn">RUN / STOP</div>
            </div>
        </aside>
    </div>
</div>

<audio id="player" crossorigin="anonymous"></audio>

<script>
    // Konfiguracja stacji RMF (przywrócona z Twojego pierwotnego kodu)
    const STATIONS = [
        { n: 'RMF FM', u: 'rmf_fm' }, { n: 'RMF MAXXX', u: 'RMFMAXXX48' }, { n: 'RMF 80s', u: 'rmf_80s' },
        { n: 'RMF 90s', u: 'rmf_90s' }, { n: 'RMF 2000', u: 'rmf_2000' }, { n: 'RMF CHILL', u: 'rmf_chillout' },
        { n: 'RMF CLASSIC', u: 'rmf_classic' }, { n: 'RMF DANCE', u: 'rmf_dance' }, { n: 'RMF GOLD', u: 'rmf_gold' },
        { n: 'RMF LATIN', u: 'rmf_latino' }, { n: 'RMF LOVE', u: 'rmf_love' }, { n: 'RMF PARTY', u: 'rmf_party' },
        { n: 'RMF ROCK', u: 'rmf_polski_rock' }, { n: 'RMF ROCK+', u: 'rmf_rock' }, { n: 'RMF JAZZ', u: 'rmf_smooth_jazz' }
    ];

    const grid = document.getElementById('grid');
    const player = document.getElementById('player');
    const stName = document.getElementById('st-name');
    const vRange = document.getElementById('v-range');
    const panKnob = document.getElementById('pan-knob');
    const runStopBtn = document.getElementById('run-stop-btn');

    let audioCtx, source, panner;
    let isPlaying = false;

    // Inicjalizacja Audio API
    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            source = audioCtx.createMediaElementSource(player);
            panner = audioCtx.createStereoPanner();
            source.connect(panner).connect(audioCtx.destination);
        }
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    // Generowanie kafelków stacji w siatce (przywrócone)
    STATIONS.forEach((s, i) => {
        const b = document.createElement('div');
        b.className = 'bt-303';
        b.innerHTML = `<div class="st-label">${s.n}</div>`;
        b.addEventListener('click', () => play(i));
        grid.appendChild(b);
    });

    // Sekwencer
    [1, 2, 3].forEach(r => {
        const row = document.getElementById('r'+r);
        for(let i=0; i<16; i++) {
            const s = document.createElement('div');
            s.className = 'step';
            if(Math.random() > 0.8) s.classList.add('on');
            row.appendChild(s);
        }
    });

    // Funkcja odtwarzania
    function play(i) {
        initAudio();
        document.querySelectorAll('.bt-303').forEach((b, idx) => b.classList.toggle('active', idx === i));
        stName.textContent = STATIONS[i].n;
        player.src = STATIONS[i].n === 'RMF MAXXX' ? 'https://rs7-krk2-cyfronet.rmfstream.pl/RMFMAXXX48' : "https://rs201-krk.rmfstream.pl/" + STATIONS[i].u;
        player.play();
        isPlaying = true;
        runStopBtn.classList.add('running');
    }

    // Funkcje kontrolne
    function stopRadio() { 
        player.pause(); 
        player.src = ""; 
        stName.textContent = "STATION BEZCZYNNA"; 
        document.querySelectorAll('.bt-303').forEach(b => b.classList.remove('active')); 
        isPlaying = false;
        runStopBtn.classList.remove('running');
    }
    
    function setV(v) { player.volume = v/100; document.getElementById('v-val').textContent = `VOL: ${v}%`; }
    function adj(d) { let newVal = Math.min(100, Math.max(0, parseInt(vRange.value) + d)); vRange.value = newVal; setV(newVal); }

    document.getElementById('vol-down-btn').addEventListener('click', () => adj(-5));
    document.getElementById('vol-up-btn').addEventListener('click', () => adj(5));
    runStopBtn.addEventListener('click', stopRadio);
    vRange.addEventListener('input', (e) => setV(e.target.value));

    // Kontrola panoramy
    let panPos = 0; 
    panKnob.addEventListener('click', () => {
        initAudio();
        panPos = panPos === 1 ? -1 : panPos + 1;
        panner.pan.setValueAtTime(panPos, audioCtx.currentTime);
        panKnob.style.transform = `rotate(${panPos * 45}deg)`;
        document.getElementById('l-led').classList.toggle('active', panPos === -1);
        document.getElementById('c-led').classList.toggle('active', panPos === 0);
        document.getElementById('r-led').classList.toggle('active', panPos === 1);
    });

    // Zegar i sekwencer
    setInterval(() => {
        const d = new Date();
        document.getElementById('clock').textContent = d.toTimeString().split(' ')[0];
        document.querySelectorAll('.step').forEach(s => { if(Math.random()>0.95) s.classList.toggle('on'); });
    }, 1000);
</script>
</body>
</html>
