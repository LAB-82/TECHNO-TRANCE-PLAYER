<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TECHNO MINI PLAYER</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');

        :root {
            --neon-blue: #00f2ff;
            --neon-yellow: #fce300;
            --bg-color: #020202;
            --tile-bg: rgba(10, 10, 10, 0.9);
            --border-color: #1a1a1a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 50%, #0a1114 0%, #020202 100%);
            color: white;
            font-family: 'Montserrat', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow: hidden;
        }

        /* NAGŁÓWEK */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
        }

        .header-text {
            color: var(--neon-blue);
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* GŁÓWNY UKŁAD */
        .main-container {
            display: flex;
            flex: 1;
            gap: 30px;
            min-height: 0;
        }

        /* KAFELKI - LEWA STRONA */
        .grid-container {
            flex: 2;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 15px;
        }

        .tile {
            background: var(--tile-bg);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            cursor: pointer;
            position: relative;
            transition: all 0.3s ease;
            padding: 10px;
        }

        .tile span {
            color: var(--neon-blue);
            font-weight: 700;
            font-size: 13px;
            text-transform: uppercase;
            z-index: 2;
        }

        /* EFEKT AKTYWNEJ STACJI (ZE ZDJĘCIA) */
        .tile.active {
            border-color: var(--neon-blue);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.4);
        }

        .tile.active::before {
            content: '';
            position: absolute;
            width: 110%;
            height: 110%;
            background: radial-gradient(circle, rgba(0,242,255,0.2) 0%, transparent 70%);
            animation: pulse 2s infinite;
            z-index: 1;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 0.4; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        /* PANEL BOCZNY - PRAWA STRONA */
        .sidebar {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 20px 0;
        }

        .display-box {
            width: 100%;
            aspect-ratio: 1/1;
            border: 5px solid var(--neon-yellow);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 30px rgba(252, 227, 0, 0.2);
            background: black;
        }

        .display-box h1 {
            color: var(--neon-yellow);
            font-size: 42px;
            font-weight: 900;
            text-transform: uppercase;
            text-shadow: 0 0 15px var(--neon-yellow);
            line-height: 1;
            text-align: center;
        }

        /* DOLNE PRZYCISKI NAWIGACJI */
        .nav-controls {
            display: flex;
            gap: 40px;
            margin-top: 20px;
        }

        .nav-btn {
            fill: none;
            stroke: var(--neon-blue);
            stroke-width: 2;
            width: 30px;
            height: 30px;
            cursor: pointer;
            opacity: 0.7;
        }

        .nav-btn:hover { opacity: 1; }

        .play-btn {
            width: 60px;
            height: 60px;
            fill: var(--neon-blue);
            filter: drop-shadow(0 0 10px var(--neon-blue));
        }

        /* RESPONSYWNOŚĆ */
        @media (max-width: 900px) {
            .grid-container { grid-template-columns: repeat(3, 1fr); }
            .main-container { flex-direction: column; overflow-y: auto; }
            .display-box { aspect-ratio: 16/9; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-text" id="status-bar">TECHNO MINI PL / WYBIERZ STACJĘ</div>
    <div class="header-text" id="clock">00:00</div>
</header>

<div class="main-container">
    <div class="grid-container" id="grid">
        </div>

    <aside class="sidebar">
        <div class="display-box" id="display">
            <h1 id="main-label">TECHNO</h1>
            <h1 id="sub-label">MINI</h1>
        </div>

        <div class="nav-controls">
            <svg class="nav-btn" viewBox="0 0 24 24" onclick="changeStation(-1)"><path d="M19 20L9 12L19 4V20Z M5 19V5"/></svg>
            <svg class="nav-btn play-btn" viewBox="0 0 24 24" onclick="togglePlay()"><path id="play-icon" d="M8 5v14l11-7z"/></svg>
            <svg class="nav-btn" viewBox="0 0 24 24" onclick="changeStation(1)"><path d="M5 4L15 12L5 20V4Z M19 5V19"/></svg>
        </div>
    </aside>
</div>

<audio id="audio-player"></audio>

<script>
    const stations = [
        { name: "Techno", url: "https://hirschmilch.de:7000/techno.mp3", label: "TECHNO" },
        { name: "Detroit Techno", url: "https://ice1.somafm.com/missioncontrol-128-mp3", label: "DETROIT" },
        { name: "Minimal Techno", url: "https://hirschmilch.de:7000/minimal.mp3", label: "MINIMAL" },
        { name: "Hard Techno", url: "http://stream.laut.fm/hard-techno", label: "HARD" },
        { name: "Dark Techno", url: "http://stream.laut.fm/darktechno", label: "DARK" },
        { name: "Techno House", url: "https://hirschmilch.de:7000/house.mp3", label: "T-HOUSE" },
        { name: "Trance", url: "https://hirschmilch.de:7000/trance.mp3", label: "TRANCE" },
        { name: "Vocal Trance", url: "http://p-vocaltrance.radioca.st/stream", label: "VOCAL" },
        { name: "Uplifting Trance", url: "http://stream.uplifting-trance.com/;stream.mp3", label: "UPLIFT" },
        { name: "Epic Trance", url: "http://tx.clast.pro/8240/stream", label: "EPIC" },
        { name: "Progressive Trance", url: "https://hirschmilch.de:7000/prog-house.mp3", label: "PROG" },
        { name: "Psy Trance", url: "https://hirschmilch.de:7000/psytrance.mp3", label: "PSY" }
    ];

    const grid = document.getElementById('grid');
    const player = document.getElementById('audio-player');
    const playIcon = document.getElementById('play-icon');
    const mainLabel = document.getElementById('main-label');
    const statusBar = document.getElementById('status-bar');
    
    let currentIndex = -1;

    // Generowanie kafelków
    stations.forEach((s, i) => {
        const div = document.createElement('div');
        div.className = 'tile';
        div.innerHTML = `<span>${s.name}</span>`;
        div.onclick = () => playStation(i);
        grid.appendChild(div);
    });

    function playStation(index) {
        if (currentIndex === index && !player.paused) {
            player.pause();
            updateUI();
            return;
        }

        currentIndex = index;
        const s = stations[index];
        
        player.src = s.url;
        player.play().catch(e => console.log("Autoplay blocked or link broken"));
        
        mainLabel.innerHTML = s.label + "<br>MINI";
        statusBar.innerText = "GRA: " + s.name.toUpperCase();
        
        updateUI();
    }

    function updateUI() {
        const tiles = document.querySelectorAll('.tile');
        tiles.forEach((t, i) => {
            t.classList.toggle('active', i === currentIndex);
        });

        if (player.paused) {
            playIcon.setAttribute('d', 'M8 5v14l11-7z'); // Ikona Play
        } else {
            playIcon.setAttribute('d', 'M6 19h4V5H6v14zm8-14v14h4V5h-4z'); // Ikona Pause
        }
    }

    function togglePlay() {
        if (currentIndex === -1) playStation(0);
        else if (player.paused) player.play();
        else player.pause();
        updateUI();
    }

    function changeStation(dir) {
        let newIndex = currentIndex + dir;
        if (newIndex < 0) newIndex = stations.length - 1;
        if (newIndex >= stations.length) newIndex = 0;
        playStation(newIndex);
    }

    // Zegar
    function updateClock() {
        const now = new Date();
        document.getElementById('clock').innerText = 
            now.getHours().toString().padStart(2, '0') + ":" + 
            now.getMinutes().toString().padStart(2, '0');
    }
    setInterval(updateClock, 1000);
    updateClock();
</script>

</body>
</html>
