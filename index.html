<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Muzyczne Radio - TB-303 Edition</title>
    <style>
        body {
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        /* OBUDOWA - EFEKT SZCZOTKOWANEGO METALU */
        .frame {
            background: #c0c0c0;
            background-image: linear-gradient(
                rgba(255,255,255,0.3) 1px, 
                transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.05) 1px, transparent 1px);
            background-size: 100% 2px, 3px 100%;
            border-radius: 4px;
            padding: 30px;
            width: 550px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9), inset 0 2px 2px white;
            border: 1px solid #777;
            position: relative;
        }

        /* NAGŁÓWKI */
        .header-logos {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            color: #333;
        }

        .roland-logo {
            font-size: 28px;
            font-weight: 900;
            letter-spacing: -1px;
        }

        .tb-text {
            font-weight: bold;
            font-size: 18px;
            border: 2px solid #333;
            padding: 2px 6px;
        }

        /* WYŚWIETLACZ KASECIKA / SYNTEZATORA */
        .display-frame {
            background: #121512;
            padding: 15px;
            border-radius: 3px;
            border: 4px solid #444;
            box-shadow: inset 0 5px 15px rgba(0,0,0,1);
            margin-bottom: 25px;
            height: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center;
            transition: all 0.3s;
        }

        .display-middle {
            font-family: 'Courier New', monospace;
            font-size: 40px;
            color: #222; /* Wyłączony */
            text-shadow: 0 0 0px transparent;
        }

        .frame.powered .display-middle {
            color: #00ff44;
            text-shadow: 0 0 10px rgba(0,255,0,0.6);
        }

        .display-top, .display-bottom {
            font-size: 10px;
            color: #333;
            display: flex;
            justify-content: space-between;
            font-weight: bold;
        }

        /* PRZYCISKI - STYL TB-303 */
        .top-row {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            background: rgba(0,0,0,0.05);
            padding: 15px;
            border-radius: 4px;
        }

        .btn-rect {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            position: relative;
        }

        /* DIODA LED NAD PRZYCISKIEM */
        .btn-rect::before {
            content: '';
            width: 8px;
            height: 8px;
            background: #400;
            border-radius: 50%;
            border: 1px solid #000;
        }

        .btn-rect.active::before {
            background: #ff0000;
            box-shadow: 0 0 8px #ff0000;
        }

        /* KLUCZOWY ELEMENT: WYGLĄD PLASTIKOWEGO KLAWISZA */
        .btn-rect svg, .btn-rect span {
            display: none; /* Ukrywamy stare ikony jeśli chcesz czysty styl */
        }

        .btn-rect::after {
            content: attr(id); /* Wyświetla ID jako etykietę */
            display: block;
            width: 100%;
            height: 45px;
            background: linear-gradient(180deg, #e0ddd0 0%, #c2bfb0 100%);
            border-radius: 2px;
            border: 1px solid #888;
            box-shadow: 0 4px 0 #666, 0 6px 10px rgba(0,0,0,0.4);
            color: #444;
            font-size: 10px;
            font-weight: bold;
            line-height: 45px;
            text-transform: uppercase;
        }

        .btn-rect:active::after {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #666, 0 3px 5px rgba(0,0,0,0.4);
        }

        /* SUWAK GŁOŚNOŚCI (SLIDER) */
        .vol-wrapper {
            margin-top: 30px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .vol-bar {
            flex-grow: 1;
            height: 12px;
            background: #000;
            border-radius: 10px;
            position: relative;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.8);
        }

        .vol-fill {
            width: 20px;
            height: 34px;
            background: linear-gradient(90deg, #999, #eee, #999);
            position: absolute;
            top: -11px;
            border-radius: 2px;
            border: 1px solid #333;
            cursor: pointer;
            box-shadow: 2px 5px 10px rgba(0,0,0,0.5);
        }

        .btn-v {
            background: #333;
            color: white;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
        }

    </style>
</head>
<body>

    <div class="frame">
        <div class="header-logos">
            <div>
                <div class="roland-logo">Roland</div>
                <div style="font-size: 9px; font-weight: bold;">COMPUTER CONTROLLED</div>
            </div>
            <div class="tb-text">TB-303</div>
        </div>

        <div class="display-frame">
            <div class="display-top">
                <span>MUZYCZNE RADIO</span>
                <span id="date">06:05:2026</span>
            </div>
            <div class="display-middle" id="clock">00:00:00</div>
            <div class="display-bottom">
                <span id="vol-percent">VOL: 50%</span>
                <span>MODE: RADIO</span>
            </div>
        </div>

        <div class="top-row">
            <button id="pwr" class="btn-rect"></button>
            <button id="play" class="btn-rect"></button>
            <button id="rec" class="btn-rect"></button>
            <button id="stop" class="btn-rect"></button>
            <button id="mute" class="btn-rect"></button>
        </div>

        <div class="vol-wrapper">
            <button id="vDown" class="btn-v">-</button>
            <div class="vol-bar">
                <div id="vFill" class="vol-fill" style="left: 50%;"></div>
            </div>
            <button id="vUp" class="btn-v">+</button>
        </div>
    </div>

    <audio id="stream" src="https://stream.rcs.revma.com/gzwc1xcq042vv"></audio>

    <script>
        // Ta sama logika co wcześniej, tylko podpięta pod nowe klasy
        const audio = document.getElementById('stream');
        const pwrBtn = document.getElementById('pwr');
        const vFill = document.getElementById('vFill');
        const clockEl = document.getElementById('clock');
        let isPwr = false;

        function updateClock() {
            const now = new Date();
            clockEl.textContent = now.toTimeString().split(' ')[0];
        }
        setInterval(updateClock, 1000);

        pwrBtn.onclick = () => {
            isPwr = !isPwr;
            document.querySelector('.frame').classList.toggle('powered');
            pwrBtn.classList.toggle('active');
            if(!isPwr) audio.pause();
        };

        // Reszta przycisków działa analogicznie
        document.getElementById('play').onclick = () => { if(isPwr) { audio.play(); document.getElementById('play').classList.add('active'); } };
        document.getElementById('stop').onclick = () => { audio.pause(); document.getElementById('play').classList.remove('active'); };
        
        document.getElementById('vUp').onclick = () => { 
            audio.volume = Math.min(1, audio.volume + 0.1);
            vFill.style.left = (audio.volume * 100) + '%';
        };
        document.getElementById('vDown').onclick = () => { 
            audio.volume = Math.max(0, audio.volume - 0.1);
            vFill.style.left = (audio.volume * 100) + '%';
        };
    </script>
</body>
</html>
