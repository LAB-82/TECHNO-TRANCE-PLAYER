<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>L.A.B. AUDIO - TB-303 PRO TERMINAL</title>
    <link href="https://fonts.cdnfonts.com/css/ds-digital" rel="stylesheet">
    <style>
        :root {
            --metal: #b4b4b4;
            --metal-shine: linear-gradient(135deg, #e0e0e0 0%, #999 50%, #888 51%, #bbb 100%);
            --lcd-bg: #0a0c0a;
            --led-red: #ff0000;
            --led-green: #a4f000;
            --brushed: url('https://www.transparenttextures.com/patterns/brushed-alum.png');
        }

        body {
            margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center;
            background: #121212; font-family: Arial, sans-serif; overflow: hidden;
        }

        /* OBUDOWA TERMINALA */
        .terminal-chassis {
            width: 800px; height: 900px;
            background: var(--metal-shine); background-image: var(--brushed);
            border: 2px solid #555; border-radius: 10px;
            padding: 30px; box-shadow: 0 50px 100px rgba(0,0,0,0.7), inset 0 2px 2px white;
            display: grid; grid-template-columns: 1fr 1.5fr; gap: 20px;
            position: relative; border-bottom: 5px solid #333;
        }

        /* ŚRUBY */
        .screw {
            position: absolute; width: 16px; height: 16px;
            background: radial-gradient(circle, #888, #444); border-radius: 50%;
            box-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        /* LEWA STRONA - PRZYCISKI STACJI */
        .side-panel { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: repeat(8, 1fr); gap: 12px; }

        .btn-station {
            background: linear-gradient(180deg, #eee 0%, #bbb 100%);
            border: 2px solid #333; border-radius: 4px; height: 80px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-weight: bold; font-size: 14px; color: #222; cursor: pointer;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3); position: relative;
        }

        .btn-station::before {
            content: ""; position: absolute; top: 6px; left: 6px;
            width: 6px; height: 6px; background: #300; border-radius: 50%;
        }

        .btn-station.active { background: #f0f0f0; border-color: #000; color: var(--led-green); text-shadow: 0 0 5px var(--led-green); }
        .btn-station.active::before { background: var(--led-red); box-shadow: 0 0 5px var(--led-red); }

        /* PRAWA STRONA - LCD I VISUALIZER */
        .main-panel { display: flex; flex-direction: column; gap: 20px; }

        .header-info { padding-left: 10px; border-bottom: 2px solid #666; padding-bottom: 10px; }
        .header-info h1 { margin: 0; font-size: 28px; letter-spacing: -1px; }
        .header-info span { font-size: 10px; font-weight: bold; letter-spacing: 2px; color: #444; }

        /* LCD DISPLAY */
        .lcd-area {
            background: var(--lcd-bg); border: 4px solid #444; border-radius: 4px;
            padding: 15px; color: var(--led-green); font-family: 'DS-Digital', sans-serif;
            display: flex; flex-direction: column; justify-content: space-between;
            height: 140px; box-shadow: inset 0 0 20px #000;
        }

        .lcd-top { display: flex; justify-content: space-between; font-size: 14px; opacity: 0.8; }
        #st-name { font-size: 38px; letter-spacing: 2px; }
        .lcd-bottom { display: flex; justify-content: space-between; font-size: 16px; }

        /* ZEGAR */
        .clock-display {
            background: #1a1a1a; border: 2px solid #444; color: var(--led-green);
            font-family: 'DS-Digital'; font-size: 40px; padding: 5px 15px;
            width: fit-content; border-radius: 4px; box-shadow: inset 0 0 10px #000;
            margin-bottom: 10px;
        }

        /* WIZUALIZATOR (SEQUENCER STYLE) */
        .visualizer-box {
            background: #111; border: 2px solid #000; border-radius: 4px;
            height: 250px; padding: 10px; display: grid;
            grid-template-columns: repeat(16, 1fr); grid-template-rows: repeat(4, 1fr); gap: 4px;
        }

        .vis-cell { background: #222; border-radius: 2px; transition: 0.1s; }
        .vis-cell.on { background: #ff4400; box-shadow: 0 0 10px #ff4400; }

        /* DOLNE KONTROLKI */
        .bottom-controls {
            display: flex; flex-direction: column; align-items: center; gap: 30px;
            margin-top: 20px;
        }

        .run-stop-area { text-align: center; }
        .btn-run {
            width: 120px; height: 100px; background: linear-gradient(180deg, #eee, #bbb);
            border: 3px solid #000; border-radius: 6px; cursor: pointer;
            font-weight: bold; font-size: 16px; box-shadow: 0 5px 0 #444;
        }

        .vol-bar {
            width: 200px; height: 12px; background: #000; border: 2px solid #555;
            border-radius: 6px; overflow: hidden;
        }
        .vol-fill { height: 100%; width: 50%; background: var(--led-red); box-shadow: 0 0 10px var(--led-red); }

    </style>
</head>
<body>

<div class="terminal-chassis">
    <div class="screw" style="top:10px; left:10px;"></div>
    <div class="screw" style="top:10px; right:10px;"></div>
    <div class="screw" style="bottom:10px; left:10px;"></div>
    <div class="screw" style="bottom:10px; right:10px;"></div>

    <div class="side-panel" id="station-grid">
        </div>

    <div class="main-panel">
        <div class="header-info">
            <h1>L.A.B. AUDIO</h1>
            <span>TB-303 PRO TERMINAL // ACID ENGINE</span>
        </div>

        <div class="clock-display" id="clock">00:00:00</div>

        <div class="lcd-area" id="display">
            <div class="lcd-top">
                <span>BANK: A1 / PATTERN: 08</span>
                <span id="v-val">VOL: 50%</span>
            </div>
            <div id="st-name">OFFLINE</div>
            <div class="lcd-bottom">
                <span>BITRATE: 128KBPS</span>
                <span>PRO MODE</span>
            </div>
        </div>

        <div class="visualizer-box" id="visualizer">
            </div>

        <div class="bottom-controls">
            <div class="vol-bar"><div id="vFill" class="vol-fill"></div></div>
            <div class="run-stop-area">
                <div style="background:var(--led-red); width:8px; height:8px; border-radius:50%; margin:0 auto 10px; opacity:0.3;" id="run-led"></div>
                <button class="btn-run" id="run-btn">RUN / STOP</button>
            </div>
        </div>
    </div>
</div>

<audio id="stream" crossorigin="anonymous"></audio>

<script>
    const audio = document.getElementById('stream');
    const stations = [
        {n:'RMF FM', u:'rmf_fm'}, {n:'RMF MAXXX', u:'RMFMAXXX48'},
        {n:'RMF 80s', u:'rmf_80s'}, {n:'RMF 90s', u:'rmf_90s'},
        {n:'RMF 2000', u:'rmf_2000'}, {n:'RMF CHILL', u:'rmf_chillout'},
        {n:'RMF LOVE', u:'rmf_love'}, {n:'RMF ROCK', u:'rmf_polski_rock'}
    ];

    const grid = document.getElementById('station-grid');
    stations.forEach((s, i) => {
        const b = document.createElement('div');
        b.className = 'btn-station';
        b.innerHTML = `<span>${s.n}</span>`;
        b.onclick = () => play(i);
        grid.appendChild(b);
    });

    const vis = document.getElementById('visualizer');
    for(let i=0; i<64; i++) {
        const c = document.createElement('div');
        c.className = 'vis-cell';
        vis.appendChild(c);
    }

    function play(i) {
        document.querySelectorAll('.btn-station').forEach((b, idx) => b.classList.toggle('active', idx === i));
        document.getElementById('st-name').textContent = stations[i].n;
        document.getElementById('run-led').style.opacity = "1";
        audio.src = "https://rs201-krk.rmfstream.pl/" + stations[i].u;
        audio.play();
    }

    document.getElementById('run-btn').onclick = () => {
        audio.pause();
        document.getElementById('st-name').textContent = "STOPPED";
        document.getElementById('run-led').style.opacity = "0.3";
        document.querySelectorAll('.btn-station').forEach(b => b.classList.remove('active'));
    };

    setInterval(() => {
        document.getElementById('clock').textContent = new Date().toTimeString().split(' ')[0];
        // Prosta animacja wizualizatora
        document.querySelectorAll('.vis-cell').forEach(c => {
            c.classList.toggle('on', Math.random() > 0.85);
        });
    }, 150);

    audio.volume = 0.5;
</script>
</body>
</html>
