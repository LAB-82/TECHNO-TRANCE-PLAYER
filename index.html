<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RMF TERMINAL - HYPER-REAL COSMETICS</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Montserrat+Alternates:wght@400;600;700&display=swap');

        :root {
            --yellow: #fce300;
            --yellow-neon: #fffb00;
            --bg: #0d0d0f;
            --tile-base: linear-gradient(145deg, #2a2e35, #14161a);
            --border: #000;
            --blue-wave: #00eaff;
            /* Paleta barw dla wierszy */
            --row-1: #ff007f; /* Cyber Pink */
            --row-2: #00ccff; /* Electric Blue */
            --row-3: #39ff14; /* Neon Lime */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body { 
            height: 100vh; width: 100vw; 
            background: var(--bg); color: #fff; 
            font-family: 'Montserrat Alternates', sans-serif;
            overflow: hidden; 
        }

        body { 
            display: flex; flex-direction: column; padding: 2vh; 
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(40, 44, 52, 0.3) 0%, #000 100%),
                url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
        }

        header { 
            height: 60px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid #222; margin-bottom: 2vh; flex-shrink: 0;
            background: rgba(0,0,0,0.5); padding: 0 20px; border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .header-info { font-family: 'Orbitron'; font-size: 22px; font-weight: 700; color: var(--yellow); letter-spacing: 2px; }
        .clock { color: var(--yellow); font-size: 26px; font-weight: 700; text-shadow: 0 0 10px var(--yellow); }

        .app-content { display: flex; flex: 1; gap: 3vw; min-height: 0; }

        /* GRID - NIEZMIENIONY UKŁAD */
        .grid { 
            flex: 1.4; display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            grid-template-rows: repeat(3, 1fr); 
            gap: 15px; 
        }

        /* FOTOREALISTYCZNY KAFELEK */
        .tile {
            background: var(--tile-base); 
            border: 2px solid #111; 
            border-radius: 14px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; position: relative; overflow: visible;
            box-shadow: 8px 8px 16px #000, inset 1px 1px 2px rgba(255,255,255,0.05);
            transition: all 0.1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .tile:hover { filter: brightness(1.2); }
        .tile:active { transform: translateY(4px) scale(0.98); box-shadow: 2px 2px 5px #000; }

        /* KOLOROWE AKCENTY DLA WIERSZY */
        .tile:nth-child(-n+5) { border-top: 3px solid var(--row-1); box-shadow: 0 0 15px rgba(255, 0, 127, 0.1), 8px 8px 16px #000; }
        .tile:nth-child(n+6):nth-child(-n+10) { border-top: 3px solid var(--row-2); box-shadow: 0 0 15px rgba(0, 204, 255, 0.1), 8px 8px 16px #000; }
        .tile:nth-child(n+11) { border-top: 3px solid var(--row-3); box-shadow: 0 0 15px rgba(57, 255, 20, 0.1), 8px 8px 16px #000; }

        .tile .t-top { font-size: 24px; font-weight: 700; color: #eee; line-height: 1; z-index: 2; text-shadow: 2px 2px 4px #000; }
        .tile .t-bottom { font-size: 13px; font-weight: 600; color: var(--yellow); margin-top: 6px; text-transform: uppercase; z-index: 2; }

        /* AKTYWNA STACJA */
        .tile.active { 
            border: 2px solid var(--yellow-neon); 
            background: #1a1a1a;
            box-shadow: 0 0 30px rgba(255, 251, 0, 0.3), inset 0 0 15px #000;
        }
        .tile.active .t-top { color: var(--yellow-neon); }

        /* SIDEBAR - INDUSTRIAL GLASS */
        .sidebar { 
            flex: 0.6; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; gap: 4vh;
            border-left: 1px solid #222; padding-left: 3vw;
        }

        .logo-display {
            width: 100%; max-width: 320px; aspect-ratio: 16/10;
            border: 3px solid #333; border-radius: 25px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #111, #000);
            box-shadow: 0 20px 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(252, 227, 0, 0.1);
            position: relative;
        }
        .logo-display::after {
            content: ""; position: absolute; top: 0; width: 100%; height: 50%;
            background: linear-gradient(to bottom, rgba(255,255,255,0.05), transparent);
            border-radius: 25px 25px 0 0;
        }
        .logo-display h2 { font-family: 'Orbitron'; font-size: 50px; color: var(--yellow); text-shadow: 0 0 20px var(--yellow); }

        .controls { display: flex; align-items: center; gap: 3vw; }
        .c-svg { width: 40px; height: 40px; fill: #444; cursor: pointer; transition: 0.2s; }
        .c-svg:hover { fill: var(--yellow); filter: drop-shadow(0 0 8px var(--yellow)); }
        .c-play { width: 85px; height: 85px; fill: var(--yellow); filter: drop-shadow(0 0 20px var(--yellow)); }

        .vol-box { 
            background: #111; padding: 20px; border-radius: 15px; border: 1px solid #222;
            display: flex; align-items: center; gap: 15px; width: 320px;
            box-shadow: 0 10px 20px #000;
        }
        .vol-btn { width: 40px; height: 40px; border: none; border-radius: 10px; background: #222; color: var(--yellow); cursor: pointer; font-size: 20px; font-weight: bold; box-shadow: 3px 3px 6px #000; }
        
        input[type="range"]::-webkit-slider-runnable-track { background: #000; height: 8px; border-radius: 4px; border: 1px solid #333; }
        input[type="range"]::-webkit-slider-thumb { 
            appearance: none; width: 24px; height: 24px; 
            background: radial-gradient(circle, #fff, var(--yellow)); 
            border-radius: 50%; margin-top: -9px; border: 2px solid #111;
            box-shadow: 0 0 10px var(--yellow);
        }

        /* FALE */
        .waves { position: absolute; width: 100%; height: 100%; overflow: hidden; border-radius: 14px; }
        .wave { border: 2px solid var(--blue-wave); box-shadow: 0 0 20px var(--blue-wave); }

        @keyframes ripple {
            0% { width: 0; height: 0; opacity: 1; transform: scale(0.1); }
            100% { width: 400%; height: 400%; opacity: 0; transform: scale(1); }
        }

    </style>
</head>
<body>

<header>
    <div class="header-info" id="playing-now">RMF TERMINAL // FM</div>
    <div class="clock" id="timer">00:00</div>
</header>

<div class="app-content">
    <div class="grid" id="station-grid"></div>

    <aside class="sidebar">
        <div class="logo-display">
            <h2>RMF</h2>
            <p style="font-size: 10px; color: #555; letter-spacing: 4px;">ANALOG PRECISION</p>
        </div>

        <div class="controls">
            <svg class="c-svg" viewBox="0 0 24 24" onclick="skip(-1)"><path d="M6,18V6H8V18H6M9.5,12L18,6V18L9.5,12Z"/></svg>
            <svg class="c-svg c-play" viewBox="0 0 24 24" onclick="toggle()"><path id="p-ico" d="M8,5.14V19.14L19,12.14L8,5.14Z"/></svg>
            <svg class="c-svg" viewBox="0 0 24 24" onclick="skip(1)"><path d="M16,18H18V6H16M6,18L14.5,12L6,6V18Z"/></svg>
        </div>

        <div class="vol-box">
            <button class="vol-btn" onclick="adj(-5)">-</button>
            <div class="vol-bar" style="flex:1; display:flex; align-items:center;">
                <input type="range" id="v-range" class="at-mid" min="0" max="100" value="50" oninput="setV(this.value)">
            </div>
            <button class="vol-btn" onclick="adj(5)">+</button>
        </div>
    </aside>
</div>

<audio id="player"></audio>

<script>
    // Logika Twojego oryginalnego kodu bez zmian
    const STATIONS = [
        { n: 'RMF FM', s: 'RMF FM', u: 'rmf_fm' },
        { n: 'RMF MAXXX', s: 'Maxxx', u: 'RMFMAXXX48' },
        { n: 'RMF 80s', s: '80s', u: 'rmf_80s' },
        { n: 'RMF 90s', s: '90s', u: 'rmf_90s' },
        { n: 'RMF 2000', s: '2000', u: 'rmf_2000' },
        { n: 'RMF CHILLOUT', s: 'Chillout', u: 'rmf_chillout' },
        { n: 'RMF CLASSIC', s: 'Classic', u: 'rmf_classic' },
        { n: 'RMF DANCE', s: 'Dance', u: 'rmf_dance' },
        { n: 'RMF GOLD', s: 'Gold', u: 'rmf_gold' },
        { n: 'RMF LATINO', s: 'Latino', u: 'rmf_latino' },
        { n: 'RMF LOVE', s: 'Love', u: 'rmf_love' },
        { n: 'RMF PARTY', s: 'Party', u: 'rmf_party' },
        { n: 'RMF POLSKI ROCK', s: 'Polski Rock', u: 'rmf_polski_rock' },
        { n: 'RMF ROCK', s: 'Rock', u: 'rmf_rock' },
        { n: 'RMF SMOOTH JAZZ', s: 'Smooth Jazz', u: 'rmf_smooth_jazz' }
    ];

    const player = document.getElementById('player'), ico = document.getElementById('p-ico'), grid = document.getElementById('station-grid'), vRange = document.getElementById('v-range');
    let current = -1;

    function clock() {
        const d = new Date();
        document.getElementById('timer').textContent = d.getHours().toString().padStart(2,'0') + ":" + d.getMinutes().toString().padStart(2,'0');
    }
    setInterval(clock, 1000); clock();

    STATIONS.forEach((s, i) => {
        const t = document.createElement('div');
        t.className = 'tile';
        t.innerHTML = `
            <div class="waves"><div class="wave"></div><div class="wave"></div><div class="wave"></div></div>
            <div class="t-top">RMF</div>
            <div class="t-bottom">${s.s}</div>
        `;
        t.onclick = () => play(i);
        grid.appendChild(t);
    });

    function play(i) {
        current = i;
        document.querySelectorAll('.tile').forEach((t, idx) => t.classList.toggle('active', idx === i));
        document.getElementById('playing-now').textContent = "GRA: " + STATIONS[i].n;
        const streamBase = "https://rs201-krk.rmfstream.pl/";
        player.src = (STATIONS[i].n === 'RMF MAXXX') ? 'https://rs7-krk2-cyfronet.rmfstream.pl/RMFMAXXX48' : streamBase + STATIONS[i].u;
        player.play();
        ico.setAttribute('d', 'M14,19H18V5H14M6,19H10V5H6V19Z');
    }

    function toggle() {
        if(player.paused) { player.play(); ico.setAttribute('d', 'M14,19H18V5H14M6,19H10V5H6V19Z'); }
        else { player.pause(); ico.setAttribute('d', 'M8,5.14V19.14L19,12.14L8,5.14Z'); }
    }

    function skip(d) { let n = current + d; if(n >= 0 && n < STATIONS.length) play(n); }
    
    function setV(v) { 
        player.volume = v / 100;
        if(parseInt(v) === 50) vRange.classList.add('at-mid');
        else vRange.classList.remove('at-mid');
    }
    
    function adj(d) { vRange.value = parseInt(vRange.value) + d; setV(vRange.value); }
</script>
</body>
</html>
