<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RMF MUZE ELEMENTS - ULTRA COLOR</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Roboto:wght@300;700&display=swap');

        :root {
            --bg-dark: #0a0a0c;
            --panel-steel: linear-gradient(145deg, #232526, #414345);
            --neon-cyan: #00f2ff;
            --neon-pink: #ff00ea;
            --neon-lime: #bcff00;
            --gold: #ffcc00;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            height: 100vh; width: 100vw; background: var(--bg-dark); color: #fff; 
            font-family: 'Roboto', sans-serif; overflow: hidden; padding: 15px;
            background-image: radial-gradient(circle at center, #1b1e2a 0%, #050505 100%);
        }

        /* NAGŁÓWEK - Styl Rack Mount */
        header { 
            height: 60px; display: flex; justify-content: space-between; align-items: center;
            background: #111; padding: 0 30px; margin-bottom: 15px;
            border: 2px solid #333; border-radius: 4px;
            box-shadow: inset 0 2px 10px #000;
        }
        .logo-area { font-family: 'Orbitron', sans-serif; font-weight: 900; color: var(--gold); font-size: 20px; letter-spacing: 2px; }
        .vst-label { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 4px; }

        .app-content { display: flex; flex: 1; gap: 20px; height: calc(100vh - 100px); }

        /* SIATKA 5x3 - Fotorealistyczne Przyciski */
        .grid { 
            flex: 1.5; display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            grid-template-rows: repeat(3, 1fr); 
            gap: 15px; 
        }

        .tile {
            background: var(--panel-steel);
            border-radius: 6px; border: 1px solid #111;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; position: relative;
            box-shadow: 4px 4px 8px #000, inset 1px 1px 1px rgba(255,255,255,0.1);
            transition: all 0.1s;
        }

        /* Kolory dla wierszy */
        .grid .tile:nth-child(-n+5) { border-top: 3px solid var(--neon-cyan); }
        .grid .tile:nth-child(n+6):nth-child(-n+10) { border-top: 3px solid var(--neon-pink); }
        .grid .tile:nth-child(n+11) { border-top: 3px solid var(--neon-lime); }

        .tile:active { transform: translateY(2px); box-shadow: 1px 1px 2px #000; }

        .tile .t-top { font-size: 9px; font-weight: 700; color: #aaa; margin-bottom: 5px; text-shadow: 1px 1px #000; }
        .tile .t-bottom { font-family: 'Orbitron', sans-serif; font-size: 13px; color: #fff; text-align: center; }

        /* AKTYWNY PRZYCISK - Neonowy "Glow" */
        .tile.active {
            background: #222;
            border: 1px solid var(--gold);
            box-shadow: 0 0 20px rgba(255, 204, 0, 0.4), inset 0 0 10px #000;
        }
        .tile.active .t-bottom { color: var(--gold); text-shadow: 0 0 8px var(--gold); }

        /* BOCZNY PANEL - Kontroler Master */
        .sidebar { 
            flex: 0.5; background: #151515; border-radius: 10px;
            border: 2px solid #222; padding: 25px;
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            box-shadow: 10px 10px 20px #000;
        }

        /* Duże Pokrętło (Analog Knob) */
        .knob-container {
            width: 120px; height: 120px; border-radius: 50%;
            background: conic-gradient(from 180deg, var(--neon-cyan), var(--neon-pink), var(--neon-lime), var(--neon-cyan));
            padding: 5px; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .knob-inner {
            width: 100%; height: 100%; background: radial-gradient(circle, #444, #111);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            position: relative; border: 2px solid #333;
        }
        .knob-indicator {
            position: absolute; width: 4px; height: 40px; background: var(--gold);
            top: 10px; border-radius: 2px; box-shadow: 0 0 10px var(--gold);
            transform-origin: 50% 50px; transition: transform 0.3s;
        }

        /* VU METER */
        .vu-meter {
            width: 100%; height: 150px; background: #000; border-radius: 5px;
            display: flex; gap: 3px; padding: 10px; align-items: flex-end;
            border: 1px solid #333;
        }
        .vu-bar { flex: 1; background: #1a1a1a; height: 10%; position: relative; }
        .vu-bar::after {
            content: ""; position: absolute; bottom: 0; width: 100%;
            background: linear-gradient(to top, #0f0, #ff0, #f00);
            height: var(--h, 20%);
        }

        .vol-slider { width: 100%; }
        input[type="range"] {
            width: 100%; appearance: none; background: #333; height: 8px; border-radius: 4px;
        }
        input[type="range"]::-webkit-slider-thumb {
            appearance: none; width: 25px; height: 25px; background: var(--panel-steel);
            border: 2px solid #555; border-radius: 4px; cursor: pointer; box-shadow: 2px 2px 5px #000;
        }
    </style>
</head>
<body>

<header>
    <div class="logo-area">BASS ELEMENTS // RMF</div>
    <div class="vst-label">Multi-Channel Digital Streamer</div>
    <div id="clock" style="color: var(--neon-cyan); font-family: monospace; font-size: 20px;">00:00:00</div>
</header>

<div class="app-content">
    <div class="grid" id="main-grid"></div>

    <aside class="sidebar">
        <div style="color: #666; font-size: 10px; text-transform: uppercase;">Master Output Gain</div>
        
        <div class="knob-container">
            <div class="knob-inner">
                <div class="knob-indicator" id="knob"></div>
            </div>
        </div>

        <div class="vu-meter" id="vu">
            <!-- Dynamiczne słupki -->
            <div class="vu-bar" style="--h: 40%"></div>
            <div class="vu-bar" style="--h: 60%"></div>
            <div class="vu-bar" style="--h: 80%"></div>
            <div class="vu-bar" style="--h: 30%"></div>
            <div class="vu-bar" style="--h: 90%"></div>
        </div>

        <div class="vol-slider">
            <input type="range" min="0" max="100" value="70" oninput="updateMaster(this.value)">
        </div>
        
        <div id="station-name" style="color: var(--gold); font-size: 12px; font-weight: bold;">NO SIGNAL</div>
    </aside>
</div>

<audio id="core-player"></audio>

<script>
    const DATA = [
        { n: 'RMF FM', u: 'rmf_fm' }, { n: 'MAXXX', u: 'RMFMAXXX48' }, { n: '80s', u: 'rmf_80s' },
        { n: '90s', u: 'rmf_90s' }, { n: '2000', u: 'rmf_2000' }, { n: 'CHILLOUT', u: 'rmf_chillout' },
        { n: 'CLASSIC', u: 'rmf_classic' }, { n: 'DANCE', u: 'rmf_dance' }, { n: 'GOLD', u: 'rmf_gold' },
        { n: 'LATINO', u: 'rmf_latino' }, { n: 'LOVE', u: 'rmf_love' }, { n: 'PARTY', u: 'rmf_party' },
        { n: 'P-ROCK', u: 'rmf_polski_rock' }, { n: 'ROCK', u: 'rmf_rock' }, { n: 'S-JAZZ', u: 'rmf_smooth_jazz' }
    ];

    const grid = document.getElementById('main-grid');
    const player = document.getElementById('core-player');
    const knob = document.getElementById('knob');

    DATA.forEach((st, i) => {
        const d = document.createElement('div');
        d.className = 'tile';
        d.innerHTML = `<div class="t-top">CH-${(i+1)}</div><div class="t-bottom">${st.n}</div>`;
        d.onclick = () => {
            document.querySelectorAll('.tile').forEach(t => t.classList.remove('active'));
            d.classList.add('active');
            document.getElementById('station-name').textContent = "LOCKED: " + st.n;
            const url = st.n === 'MAXXX' ? 'https://rs7-krk2-cyfronet.rmfstream.pl/RMFMAXXX48' : 'https://rs201-krk.rmfstream.pl/' + st.u;
            player.src = url;
            player.play();
            // Animacja knobu
            knob.style.transform = `rotate(${Math.random() * 360}deg)`;
        };
        grid.appendChild(d);
    });

    function updateMaster(v) {
        player.volume = v / 100;
        // Symulacja skoków VU
        document.querySelectorAll('.vu-bar').forEach(b => {
            b.style.setProperty('--h', (Math.random() * v) + '%');
        });
    }

    setInterval(() => {
        const d = new Date();
        document.getElementById('clock').textContent = d.toLocaleTimeString();
        if(!player.paused) {
            document.querySelectorAll('.vu-bar').forEach(b => {
                b.style.setProperty('--h', (Math.random() * 100) + '%');
            });
        }
    }, 100);
</script>
</body>
</html>
