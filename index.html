<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>GEHIRN TREIBER - TRON SYNTH HUD</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap');

        :root {
            --cyan: #00f2ff;
            --magenta: #ff00e5;
            --bg-black: #0b0e14;
            --panel-bg: #151a24;
            --panel-border: #2a3441;
            --slot-bg: #05070a;
            --neon-glow: 0 0 15px rgba(0, 242, 255, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html { 
            width: 100vw; height: 100vh; 
            overflow: hidden; 
            background-color: #080a0f;
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
        }

        .synth-container {
            width: 100%; height: 100%;
            display: grid;
            grid-template-columns: 450px 1fr 340px;
            gap: 12px;
            padding: 12px;
            background: linear-gradient(180deg, #10141d 0%, #080a0f 100%);
        }

        /* LEWY PANEL - KOLUMNY */
        .osc-sidebar { display: flex; flex-direction: column; gap: 8px; height: 100%; }
        
        .track-info-box {
            border: 2px solid var(--panel-border);
            border-left: 4px solid var(--magenta);
            padding: 15px;
            background: var(--panel-bg);
            min-height: 85px;
            box-shadow: var(--neon-glow);
        }

        .stations-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            flex-grow: 1;
            overflow-y: auto;
            padding-right: 5px;
        }
        .stations-grid::-webkit-scrollbar { width: 4px; }
        .stations-grid::-webkit-scrollbar-thumb { background: var(--panel-border); border-radius: 10px; }

        .category-header {
            font-family: 'Orbitron';
            font-size: 10px;
            color: var(--cyan);
            margin-bottom: 8px;
            letter-spacing: 2px;
            border-bottom: 1px solid var(--panel-border);
            padding-bottom: 3px;
            grid-column: span 1;
        }

        .osc-module {
            border: 1px solid var(--panel-border);
            padding: 6px;
            background: var(--panel-bg);
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 4px;
        }
        .osc-module:hover { border-color: #4a5a71; background: #1c232e; }
        .osc-module.active { border-color: var(--cyan); background: #1c232e; box-shadow: inset 0 0 10px rgba(0, 242, 255, 0.2); }

        .station-slot {
            background: var(--slot-bg);
            height: 34px;
            display: flex;
            align-items: center;
            padding-left: 8px;
            font-family: 'Orbitron';
            font-size: 9px;
            color: #cbd5e1;
            border: 1px solid #1a202a;
        }

        /* ŚRODEK - EQ */
        .main-display {
            border: 2px solid var(--panel-border);
            background: #05070a;
            position: relative;
            overflow: hidden;
        }
        #eq-canvas { width: 100%; height: 100%; display: block; }

        /* PRAWY PANEL */
        .control-sidebar { display: flex; flex-direction: column; gap: 12px; }
        .module-box { border: 2px solid var(--panel-border); padding: 15px; background: var(--panel-bg); }
        .envelope-view { height: 160px; background: #05070a; border: 1px solid var(--panel-border); }

        .playback-frame { border: 2px solid var(--panel-border); padding: 15px; background: var(--panel-bg); }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .synth-btn {
            background: #1c232e; border: 1px solid var(--panel-border); color: #fff;
            padding: 10px; font-family: 'Orbitron'; font-size: 10px; cursor: pointer;
        }
        .synth-btn:hover { border-color: var(--cyan); }
        .btn-stop:hover { border-color: var(--magenta); }

        .vol-slider { -webkit-appearance: none; width: 100%; height: 4px; background: #05070a; outline: none; }
        .vol-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; background: var(--cyan); cursor: pointer; }
    </style>
</head>
<body>

<div class="synth-container">
    <div class="osc-sidebar">
        <div class="track-info-box">
            <div style="font-size: 9px; color: var(--magenta); font-family: 'Orbitron'; margin-bottom: 5px;">CURRENT SIGNAL</div>
            <div id="track-title" style="font-size: 12px; font-family: 'Orbitron'; color: #fff; text-shadow: 0 0 8px var(--magenta);">INITIATING...</div>
        </div>
        
        <div class="stations-grid">
            <div id="techno-col">
                <div class="category-header">TECHNO</div>
                <div id="techno-group"></div>
            </div>
            <div id="house-col">
                <div class="category-header">HOUSE</div>
                <div id="house-group"></div>
            </div>
        </div>
    </div>

    <main class="main-display">
        <canvas id="eq-canvas"></canvas>
    </main>

    <aside class="control-sidebar">
        <div class="module-box">
            <div style="font-size: 9px; color: var(--cyan); font-family: 'Orbitron'; margin-bottom: 10px;">ENVELOPE 1</div>
            <div class="envelope-view">
                <svg width="100%" height="100%" viewBox="0 0 100 100" preserveAspectRatio="none">
                    <path d="M0,100 L20,20 L40,50 L80,50 L100,100" fill="none" stroke="var(--cyan)" stroke-width="2" />
                </svg>
            </div>
        </div>

        <div class="playback-frame">
            <div class="btn-grid">
                <button class="synth-btn" id="playBtn">START</button>
                <button class="synth-btn btn-stop" id="stopBtn">KILL</button>
            </div>
            <input type="range" class="vol-slider" min="0" max="100" value="70" id="volRange">
        </div>
    </aside>
</div>

<audio id="audio-engine" crossorigin="anonymous"></audio>

<script>
    const STATIONS = {
        techno: [
            { slug: 'tech88', n: 'TECH 88' },
            { slug: 'hr3_clubnight', n: 'HR 3 CLUBNIGHT' },
            { slug: '1000techno', n: '1000 TECHNO' },
            { slug: 'best-of-techno', n: 'BEST OF TECHNO' },
            { slug: 'chris_burn', n: 'CHRIS BURN' },
            { slug: 'retroelectronicmusic', n: 'RETRO ELECTRONIC' },
            { slug: 'gehirn-treiber-beat-radio', n: 'GEHIRN TREIBER' }
        ],
        house: [
            { slug: 'deep-house-sounds', n: 'DEEP HOUSE SOUNDS' },
            { slug: 'housebomb-fn', n: 'HOUSEBOMB FN' },
            { slug: 'symbiotic-beats', n: 'SYMBIOTIC BEATS' },
            { slug: 'house', n: 'HOUSE' },
            { slug: 'faf-records-979', n: 'FAF RECORDS 979' },
            { slug: 'tornadofm', n: 'TORNADO FM' }
        ]
    };

    const audio = document.getElementById('audio-engine');
    const trackTitle = document.getElementById('track-title');
    const canvas = document.getElementById('eq-canvas');
    const ctx = canvas.getContext('2d');
    
    let audioCtx, analyser, source, dataArray;
    let currentSlug = "";

    async function updateMetadata() {
        if (!currentSlug) return;
        try {
            const res = await fetch(`https://api.laut.fm/station/${currentSlug}/current_song`);
            const data = await res.json();
            if (data && data.artist) {
                trackTitle.textContent = `${data.artist.name.toUpperCase()} - ${data.title.toUpperCase()}`;
            }
        } catch (e) { trackTitle.textContent = "SIGNAL DECRYPTING..."; }
    }

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 256;
            source = audioCtx.createMediaElementSource(audio);
            source.connect(analyser);
            analyser.connect(audioCtx.destination);
            dataArray = new Uint8Array(analyser.frequencyBinCount);
        }
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function buildUI() {
        Object.keys(STATIONS).forEach(cat => {
            const container = document.getElementById(`${cat}-group`);
            STATIONS[cat].forEach(s => {
                const mod = document.createElement('div');
                mod.className = 'osc-module';
                mod.innerHTML = `<div class="station-slot">${s.n}</div>`;
                mod.onclick = () => {
                    initAudio();
                    document.querySelectorAll('.osc-module').forEach(m => m.classList.remove('active'));
                    mod.classList.add('active');
                    currentSlug = s.slug;
                    audio.src = `https://stream.laut.fm/${s.slug}`;
                    audio.play().catch(console.error);
                    updateMetadata();
                };
                container.appendChild(mod);
            });
        });
    }

    buildUI();

    document.getElementById('playBtn').onclick = () => { initAudio(); audio.play(); };
    document.getElementById('stopBtn').onclick = () => audio.pause();
    document.getElementById('volRange').oninput = (e) => audio.volume = e.target.value / 100;

    function resize() {
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
    }
    window.onresize = resize;
    resize();

    function draw() {
        requestAnimationFrame(draw);
        ctx.fillStyle = '#05070a';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        if (analyser) {
            analyser.getByteFrequencyData(dataArray);
            const layers = 5;
            for (let l = 0; l < layers; l++) {
                ctx.beginPath();
                ctx.strokeStyle = l % 2 === 0 ? `rgba(0, 242, 255, ${0.7 - l*0.12})` : `rgba(255, 0, 229, ${0.4 - l*0.06})`;
                ctx.lineWidth = 2;
                
                for (let i = 0; i < canvas.width; i += 8) {
                    const idx = Math.floor((i / canvas.width) * dataArray.length);
                    const val = (dataArray[idx] / 255) * canvas.height * 0.4;
                    const y = (canvas.height / 2) + Math.sin(i * 0.02 + Date.now() * 0.002 + l) * (val + 2);
                    if (i === 0) ctx.moveTo(i, y);
                    else ctx.lineTo(i, y);
                }
                ctx.stroke();
            }
        }
    }
    draw();
    setInterval(updateMetadata, 15000);
</script>
</body>
</html>
