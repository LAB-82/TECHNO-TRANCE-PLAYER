<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RMF FM SEKTOR - PRO VST EDITION</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Montserrat+Alternates:wght@700;800&display=swap');
        
        :root {
            /* Nowa paleta na podstawie zdjęcia */
            --s-bg: #050a12; 
            --s-panel: rgba(11, 19, 31, 0.85);
            --s-init-blue: #70d8ff; 
            --rmf-neon: #ff9d23; /* Pomarańczowy jak ścieżki na zdjęciu */
            --white-neon: #e0e6ed;
            --s-border: #1a2a3a;
            --path-orange: #ff9d23;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            height: 100vh; 
            background: #000; 
            font-family: 'Rajdhani', sans-serif;
            display: flex; align-items: center; justify-content: center;
            /* Subtelny wzór linii w tle */
            background-image: 
                radial-gradient(circle at 50% 50%, #0a1628 0%, #000 100%);
        }

        .sektor-vst {
            width: 1000px; height: 600px;
            background: var(--s-bg);
            border: 2px solid #111; border-radius: 8px;
            display: flex; flex-direction: column;
            box-shadow: 0 0 100px rgba(0, 212, 255, 0.15);
            position: relative;
            overflow: hidden;
        }

        /* Dekoracyjne linie sygnałowe ze zdjęcia */
        .sektor-vst::before {
            content: "";
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: 
                linear-gradient(90deg, transparent 95%, rgba(255,157,35,0.05) 95%),
                linear-gradient(0deg, transparent 95%, rgba(255,157,35,0.05) 95%);
            background-size: 40px 40px;
            pointer-events: none;
        }

        /* Pomarańczowa ramka/ścieżka jak na zdjęciu */
        .main-frame::after {
            content: "";
            position: absolute;
            top: 80px; right: 30px; bottom: 100px; left: 30px;
            border: 2px solid var(--path-orange);
            border-radius: 4px;
            opacity: 0.3;
            pointer-events: none;
            clip-path: polygon(0 0, 60% 0, 70% 5%, 100% 5%, 100% 100%, 0 100%);
        }

        .top-nav {
            height: 65px; background: rgba(0,0,0,0.4);
            display: flex; align-items: center; justify-content: center;
            border-bottom: 2px solid var(--s-border);
            padding: 0 20px; z-index: 10;
        }

        .patch-display {
            width: 520px; height: 42px; background: #000;
            border: 1px solid var(--s-init-blue); border-radius: 4px;
            display: flex; align-items: center; justify-content: space-between;
            box-shadow: inset 0 0 15px rgba(112, 216, 255, 0.2);
        }

        .p-btn { 
            width: 50px; height: 100%; background: transparent; 
            color: var(--s-init-blue); font-size: 10px; border: none;
            cursor: pointer; text-transform: uppercase; font-weight: 700;
            transition: 0.2s;
        }
        .p-btn:hover { background: rgba(112, 216, 255, 0.1); }

        .p-name { 
            flex: 1; text-align: center; color: #fff; 
            font-weight: 600; letter-spacing: 1px; font-size: 14px;
            font-family: 'Rajdhani', sans-serif;
        }

        .main-frame { display: flex; flex: 1; padding: 25px; gap: 20px; overflow: hidden; position: relative; z-index: 5; }

        .browser-section {
            flex: 1.6; background: var(--s-panel);
            border-radius: 8px; border: 1px solid #2a3a4a;
            padding: 15px; display: flex; flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .grid { flex: 1; display: flex; flex-wrap: wrap; gap: 8px; align-content: stretch; }

        .tile {
            flex: 1 1 calc(25% - 8px);
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(112, 216, 255, 0.1) !important;
            border-radius: 4px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 12px; 
            color: #99aab5;
            transition: all 0.2s ease;
            font-weight: 500;
            text-transform: uppercase;
        }

        .tile:hover { background: rgba(112, 216, 255, 0.08); color: #fff; }

        .tile.active { 
            background: rgba(112, 216, 255, 0.15);
            color: var(--s-init-blue);
            text-shadow: 0 0 10px var(--s-init-blue);
            border: 1px solid var(--s-init-blue) !important;
        }

        .master-section { flex: 0.4; display: flex; flex-direction: column; gap: 20px; }
        
        .control-box { 
            background: var(--s-panel); border: 1px solid #2a3a4a;
            padding: 20px; flex: 1; display: flex; flex-direction: column; align-items: center;
            border-radius: 8px;
        }

        .play-btn {
            width: 70px; height: 70px; background: #000;
            border: 2px solid var(--s-init-blue); border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px rgba(112, 216, 255, 0.3); margin-bottom: 30px;
            transition: 0.3s;
        }
        .play-btn:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(112, 216, 255, 0.5); }
        .play-btn svg { width: 30px; fill: var(--s-init-blue); }

        .vol-container { width: 100%; flex: 1; display: flex; flex-direction: column; align-items: center; }

        .knob-base {
            width: 110px; height: 110px; background: #000; border-radius: 50%;
            margin-bottom: 30px; border: 2px solid #222; position: relative;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        /* Wygląd knoba ze zdjęcia */
        .knob-turner {
            width: 100%; height: 100%; border-radius: 50%;
            background: conic-gradient(from -135deg, var(--s-init-blue) 0%, #111 0%);
            mask: radial-gradient(transparent 55%, black 56%);
            -webkit-mask: radial-gradient(transparent 55%, black 56%);
        }

        .knob-center { 
            position: absolute; inset: 15px; 
            background: radial-gradient(circle, #2a3340, #050a12); 
            border-radius: 50%; border: 1px solid #000; cursor: pointer;
        }
        .knob-center::after {
            content: ""; position: absolute; top: 10%; left: 50%; width: 3px; height: 15px;
            background: var(--s-init-blue); transform: translateX(-50%); border-radius: 2px;
        }

        .fader-track {
            width: 100%; height: 6px; background: #000;
            border-radius: 3px; position: relative;
            border: 1px solid #222; display: flex; align-items: center;
        }

        #fader-glow {
            position: absolute; height: 100%; background: var(--s-init-blue);
            border-radius: 3px; opacity: 0.5; box-shadow: 0 0 10px var(--s-init-blue);
            pointer-events: none;
        }

        .vol-slider { 
            width: 100%; appearance: none; background: transparent; 
            position: absolute; z-index: 5; outline: none;
        }
        .vol-slider::-webkit-slider-thumb {
            appearance: none; width: 14px; height: 24px; 
            background: #fff; border-radius: 2px; cursor: pointer;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        .footer-logo { 
            height: 60px; background: rgba(0,0,0,0.3); display: flex; 
            justify-content: center; align-items: center; border-radius: 8px;
            border: 1px solid #2a3a4a;
        }
        .footer-logo span { 
            font-family: 'Montserrat Alternates', sans-serif;
            font-size: 24px; color: var(--rmf-neon); font-weight: 800; 
            text-shadow: 0 0 15px rgba(255, 157, 35, 0.5);
        }
    </style>
</head>
<body>

<div class="sektor-vst">
    <div class="top-nav">
        <div class="patch-display">
            <button class="p-btn" onclick="skip(-1)">Prev</button>
            <div class="p-name" id="patch-name">OTHERWORLDLY // RMF FM</div>
            <button class="p-btn" onclick="skip(1)">Next</button>
        </div>
    </div>
    
    <div class="main-frame">
        <div class="browser-section">
            <div class="grid" id="grid"></div>
        </div>
        
        <div class="master-section">
            <div class="control-box">
                <button class="play-btn" onclick="toggle()">
                    <svg id="svg-ico" viewBox="0 0 24 24"><path d="M8,5.14V19.14L19,12.14L8,5.14Z"/></svg>
                </button>
                
                <div class="vol-container">
                    <div class="knob-base">
                        <div class="knob-turner" id="v-knob"></div>
                        <div class="knob-center" id="v-center" onclick="resetVol()"></div>
                    </div>
                    <div class="fader-track">
                        <div id="fader-glow"></div>
                        <input type="range" class="vol-slider" id="v-slider" min="0" max="100" value="50" oninput="setV(this.value)">
                    </div>
                </div>
            </div>
            
            <div class="footer-logo">
                <span>RMF FM</span>
            </div>
        </div>
    </div>
</div>

<audio id="player"></audio>

<script>
    const STATIONS = [
        { n: 'RMF FM', u: 'rmf_fm' }, { n: 'RMF MAXXX', u: 'RMFMAXXX48' },
        { n: 'RMF 80s', u: 'rmf_80s' }, { n: 'RMF 90s', u: 'rmf_90s' },
        { n: 'RMF 2000', u: 'rmf_2000' }, { n: 'RMF CHILLOUT', u: 'rmf_chillout' },
        { n: 'RMF CLASSIC', u: 'rmf_classic' }, { n: 'RMF DANCE', u: 'rmf_dance' },
        { n: 'RMF GOLD', u: 'rmf_gold' }, { n: 'RMF PARTY', u: 'rmf_party' },
        { n: 'RMF ROCK', u: 'rmf_rock' }, { n: 'RMF LOVE', u: 'rmf_love' },
        { n: 'RMF POLSKI ROCK', u: 'rmf_polski_rock' }, { n: 'RMF JAZZ', u: 'rmf_smooth_jazz' },
        { n: 'RMF HIP HOP', u: 'rmf_hip_hop' }, { n: 'RMF GROOVE', u: 'rmf_groove' }
    ];

    const player = document.getElementById('player'), 
          svgIco = document.getElementById('svg-ico'),
          grid = document.getElementById('grid'),
          vKnob = document.getElementById('v-knob'),
          vCenter = document.getElementById('v-center'),
          vSlider = document.getElementById('v-slider'),
          fGlow = document.getElementById('fader-glow');

    let current = -1;

    STATIONS.forEach((s, i) => {
        const div = document.createElement('div');
        div.className = 'tile';
        div.textContent = s.n;
        div.onclick = () => play(i);
        grid.appendChild(div);
    });

    function play(i) {
        current = i;
        document.querySelectorAll('.tile').forEach((t, idx) => t.classList.toggle('active', idx === i));
        document.getElementById('patch-name').textContent = "CURRENT PATCH // " + STATIONS[i].n.toUpperCase();
        const streamBase = "https://rs201-krk.rmfstream.pl/";
        player.src = (STATIONS[i].n === 'RMF MAXXX') ? 'https://rs7-krk2-cyfronet.rmfstream.pl/RMFMAXXX48' : streamBase + STATIONS[i].u;
        player.play();
        updateIcon(true);
        resetVol(); 
    }

    function toggle() {
        if(current === -1) { play(0); return; }
        if(player.src && !player.paused) {
            player.pause(); player.src = ""; 
            updateIcon(false);
        } else { play(current); }
    }

    function updateIcon(isPlaying) {
        svgIco.innerHTML = isPlaying ? '<path d="M6,6H18V18H6V6Z"/>' : '<path d="M8,5.14V19.14L19,12.14L8,5.14Z"/>';
    }

    function skip(d) {
        let n = (current + d + STATIONS.length) % STATIONS.length;
        play(n);
    }

    function setV(v) {
        player.volume = v / 100;
        const fill = v * 0.75; 
        vKnob.style.background = `conic-gradient(from -135deg, var(--s-init-blue) ${fill}%, #111 0%)`;
        vCenter.style.transform = `rotate(${(v * 2.7) - 135}deg)`;
        fGlow.style.width = v + "%";
    }

    function resetVol() {
        vSlider.value = 50;
        setV(50);
    }

    setV(50);
</script>

</body>
</html>
