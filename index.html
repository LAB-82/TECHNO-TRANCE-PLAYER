<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TECHNO MINI TERMINAL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat+Alternates:wght@400;600;700&display=swap');

        :root {
            --neon-blue: #00f2ff; 
            --neon-yellow: #fce300; 
            --bg: #000;
            --tile-bg: #050505;
            --border-dim: #1a1a1a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { 
            height: 100vh; width: 100vw; 
            background: var(--bg); color: #fff; 
            font-family: 'Montserrat Alternates', sans-serif;
            overflow: hidden; 
        }

        body { display: flex; flex-direction: column; padding: 2vh; }

        header { 
            height: 50px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border-dim); margin-bottom: 2vh; flex-shrink: 0;
            color: var(--neon-blue);
        }
        .header-info { font-size: 18px; font-weight: 700; text-transform: uppercase; }
        .clock { font-size: 24px; font-weight: 700; }

        .app-content { display: flex; flex: 1; gap: 3vw; min-height: 0; }

        .grid { 
            flex: 1.4; display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            grid-template-rows: repeat(3, 1fr); 
            gap: 15px; 
        }

        .tile {
            background: var(--tile-bg); 
            border: 2px solid var(--border-dim); 
            border-radius: 15px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; position: relative; transition: 0.2s;
            text-align: center; padding: 5px;
        }

        .tile .t-name { font-size: 14px; font-weight: 700; color: var(--neon-blue); z-index: 2; pointer-events: none; }

        .tile.active { 
            border-color: var(--neon-blue);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.5);
        }

        .aura {
            position: absolute; width: 100%; height: 100%;
            border-radius: 15px; pointer-events: none; opacity: 0;
            box-shadow: 0 0 25px var(--neon-blue), inset 0 0 10px var(--neon-blue);
        }
        .tile.active .aura { opacity: 0.7; animation: pulse 2s infinite; }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(1.03); opacity: 0.4; }
            100% { transform: scale(1); opacity: 0.7; }
        }

        .sidebar { 
            flex: 0.6; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; gap: 4vh;
            border-left: 1px solid var(--border-dim); padding-left: 3vw;
        }

        .logo-display {
            width: 100%; max-width: 300px; aspect-ratio: 1/1;
            border: 5px solid var(--neon-yellow); border-radius: 20px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 0 35px rgba(252, 227, 0, 0.25);
            text-align: center;
        }
        .logo-display h2 { font-size: 40px; color: var(--neon-yellow); text-shadow: 0 0 15px var(--neon-yellow); }
        .logo-display p { font-size: 14px; color: var(--neon-yellow); font-weight: 700; margin-top: 5px; letter-spacing: 2px; }

        .controls { display: flex; align-items: center; gap: 2vw; }
        .c-svg { width: 40px; height: 40px; fill: var(--neon-blue); cursor: pointer; }
        .c-play { width: 80px; height: 80px; filter: drop-shadow(0 0 10px var(--neon-blue)); }

        .vol-box { display: flex; align-items: center; gap: 15px; width: 100%; max-width: 300px; }
        input[type="range"] { flex: 1; appearance: none; background: #222; height: 6px; border-radius: 3px; }
        input[type="range"]::-webkit-slider-thumb {
            appearance: none; width: 20px; height: 20px; background: var(--neon-blue); border-radius: 50%;
        }

        @media (max-width: 800px) {
            .grid { grid-template-columns: repeat(3, 1fr); }
            .app-content { flex-direction: column; overflow-y: auto; }
            .sidebar { border-left: none; border-top: 1px solid var(--border-dim); padding: 20px 0; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-info" id="status">TECHNO MINI PL / WYBIERZ STACJĘ</div>
    <div class="clock" id="timer">00:00</div>
</header>

<div class="app-content">
    <div class="grid" id="station-grid"></div>

    <aside class="sidebar">
        <div class="logo-display">
            <h2 id="disp-top">TECHNO</h2>
            <p id="disp-bot">MINI</p>
        </div>

        <div class="controls">
            <svg class="c-svg" viewBox="0 0 24 24" onclick="skip(-1)"><path d="M6,18V6H8V18H6M9.5,12L18,6V18L9.5,12Z"/></svg>
            <svg class="c-svg c-play" viewBox="0 0 24 24" onclick="toggle()"><path id="p-ico" d="M8,5.14V19.14L19,12.14L8,5.14Z"/></svg>
            <svg class="c-svg" viewBox="0 0 24 24" onclick="skip(1)"><path d="M16,18H18V6H16M6,18L14.5,12L6,6V18Z"/></svg>
        </div>

        <div class="vol-box">
            <input type="range" min="0" max="100" value="70" oninput="setV(this.value)">
        </div>
    </aside>
</div>

<audio id="player"></audio>

<script>
    // Zaktualizowana lista z darmowymi, publicznymi strumieniami
    const STATIONS = [
        { n: 'Techno', g: 'TECHNO', u: 'http://listen.technobase.fm/tunein-mp3-pls' },
        { n: 'Detroit Techno', g: 'DETROIT', u: 'http://ice1.somafm.com/missioncontrol-128-mp3' },
        { n: 'Minimal Techno', g: 'MINIMAL', u: 'http://hirschmilch.de:7000/minimal.mp3' },
        { n: 'Hard Techno', g: 'HARD', u: 'http://stream.laut.fm/hard-techno' },
        { n: 'Dark Techno', g: 'DARK', u: 'http://stream.laut.fm/darktechno' },
        { n: 'Techno House', g: 'T-HOUSE', u: 'http://hirschmilch.de:7000/techno.mp3' },
        { n: 'Trance', g: 'TRANCE', u: 'http://hirschmilch.de:7000/trance.mp3' },
        { n: 'Vocal Trance', g: 'VOCAL', u: 'http://p-vocaltrance.radioca.st/stream' },
        { n: 'Uplifting', g: 'UPLIFT', u: 'http://stream.uplifting-trance.com/;stream.mp3' },
        { n: 'Epic Trance', g: 'EPIC', u: 'http://yp.shoutcast.com/sbin/tunein-station.pls?id=9920257' }, // Uwaga: wymaga wsparcia przeglądarki dla PLS lub zmiany na bezpośredni mp3
        { n: 'Progressive', g: 'PROG', u: 'http://hirschmilch.de:7000/prog-house.mp3' },
        { n: 'Psy Trance', g: 'PSY', u: 'http://hirschmilch.de:7000/psytrance.mp3' }
    ];

    const player = document.getElementById('player'), ico = document.getElementById('p-ico'), grid = document.getElementById('station-grid');
    const dTop = document.getElementById('disp-top'), dBot = document.getElementById('disp-bot');
    let current = -1;

    STATIONS.forEach((s, i) => {
        const t = document.createElement('div');
        t.className = 'tile';
        t.innerHTML = `<div class="aura"></div><div class="t-name">${s.n.toUpperCase()}</div>`;
        t.onclick = () => play(i);
        grid.appendChild(t);
    });

    function play(i) {
        current = i;
        document.querySelectorAll('.tile').forEach((t, idx) => t.classList.toggle('active', idx === i));
        dTop.textContent = STATIONS[i].g;
        dBot.textContent = "MINI";
        document.getElementById('status').textContent = "GRA: " + STATIONS[i].n;
        
        player.src = STATIONS[i].u;
        player.play().catch(e => console.log("Błąd odtwarzania - spróbuj kliknąć Play"));
        ico.setAttribute('d', 'M14,19H18V5H14M6,19H10V5H6V19Z');
    }

    function toggle() {
        if(current === -1) { play(0); return; }
        if(player.paused) { player.play(); ico.setAttribute('d', 'M14,19H18V5H14M6,19H10V5H6V19Z'); }
        else { player.pause(); ico.setAttribute('d', 'M8,5.14V19.14L19,12.14L8,5.14Z'); }
    }

    function skip(d) {
        let n = current + d;
        if(n < 0) n = STATIONS.length - 1;
        if(n >= STATIONS.length) n = 0;
        play(n);
    }

    function setV(v) { player.volume = v / 100; }

    function clock() {
        const d = new Date();
        document.getElementById('timer').textContent = d.getHours().toString().padStart(2,'0') + ":" + d.getMinutes().toString().padStart(2,'0');
    }
    setInterval(clock, 1000); clock();
</script>
</body>
</html>
