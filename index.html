<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>L.A.B. AUDIO TB-303 Edition</title>
    <link href="https://fonts.cdnfonts.com/css/ds-digital" rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/digital-numbers" rel="stylesheet">
    <style>
        :root {
            --metal-bg: #c0c0c0;
            --metal-shine: linear-gradient(135deg, #e0e0e0 0%, #999 50%, #888 51%, #bbb 100%);
            --metal-dark: #2a2a2a;
            --accent-red: #ff0000;
            --led-off: #300000;
            --led-on: #ff0000;
            --lcd-green: #a4f000;
            --brushed: url('https://www.transparenttextures.com/patterns/brushed-alum.png');
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #121212;
            font-family: Arial, sans-serif;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }

        /* GŁÓWNA OBUDOWA - STYL PRO TERMINAL */
        .frame {
            width: 95%;
            max-width: 850px;
            background: var(--metal-shine);
            background-image: var(--brushed);
            border: 2px solid #555;
            border-radius: 8px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.8), inset 0 2px 2px #fff;
            padding: 30px;
            display: flex;
            flex-direction: column;
            position: relative;
            box-sizing: border-box;
        }

        /* Śruby montażowe */
        .frame::before, .frame::after {
            content: ""; position: absolute; width: 14px; height: 14px;
            background: radial-gradient(circle, #888, #444); border-radius: 50%;
            box-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }
        .frame::before { top: 12px; left: 12px; }
        .frame::after { top: 12px; right: 12px; }

        /* Sekcja górna - Logo i Parametry */
        .top-section {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-bottom: 2px solid #777;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .title {
            font-size: 32px;
            font-weight: 900;
            color: #111;
            letter-spacing: -1px;
            margin: 0;
            text-transform: uppercase;
        }

        .model-name {
            font-family: 'DS-Digital', sans-serif;
            font-size: 48px;
            color: #222;
            line-height: 0.8;
            text-align: right;
        }

        .model-sub {
            font-size: 11px;
            font-weight: bold;
            color: #333;
            text-align: right;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        /* Wyświetlacz LCD w stylu Green Digital */
        .display-frame {
            background: #0a0c0a;
            border: 4px solid #444;
            border-radius: 4px;
            padding: 15px;
            width: 320px;
            height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 0 20px #000;
            font-family: 'DS-Digital', sans-serif;
            color: #151a15; /* Off state */
            margin: 0 auto 25px auto;
            transition: color 0.3s;
        }

        .frame.powered .display-frame {
            color: var(--lcd-green);
            text-shadow: 0 0 10px rgba(164, 240, 0, 0.5);
        }

        .display-line { line-height: 1.1; text-align: center; }
        .station-name { font-size: 20px; letter-spacing: 2px; text-transform: uppercase; }
        .time-display { font-size: 34px; font-family: 'Digital Numbers', sans-serif; margin: 4px 0; }
        .date-display { font-size: 14px; opacity: 0.8; }

        /* Panel Kontrolny - Ciemny blok PRO TERMINAL */
        .main-content {
            background-color: var(--metal-dark);
            background-image: var(--brushed);
            border: 2px solid #111;
            border-radius: 4px;
            padding: 25px;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .controls-main {
            display: flex;
            gap: 15px;
            align-items: center;
            justify-content: center;
        }

        /* Przyciski metalowe TB-303 */
        .btn-rect, .btn-v {
            width: 65px;
            height: 50px;
            background: linear-gradient(180deg, #eee 0%, #bbb 100%);
            border: 2px solid #000;
            border-radius: 4px;
            cursor: pointer;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 0 #000, 0 8px 15px rgba(0,0,0,0.5);
            transition: all 0.05s;
        }

        .btn-rect::before {
            content: "";
            position: absolute;
            top: -15px;
            width: 8px;
            height: 8px;
            background: var(--led-off);
            border-radius: 50%;
            border: 1px solid #000;
        }

        .btn-rect.active::before, .btn-v.active::before {
            background: var(--led-on);
            box-shadow: 0 0 10px var(--led-on);
        }

        .btn-rect:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #000;
        }

        .btn-rect svg, .btn-v svg { width: 26px; height: 26px; fill: #111; }

        /* Sekcja głośności */
        .vol-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-left: 20px;
        }

        .vol-btns { display: flex; gap: 8px; }
        .btn-v { width: 45px; height: 40px; box-shadow: 0 3px 0 #000; }

        .vol-bar {
            width: 130px;
            height: 12px;
            background: #000;
            border: 1px solid #444;
            border-radius: 6px;
            overflow: hidden;
        }

        .vol-fill {
            height: 100%;
            width: 0%;
            background: var(--accent-red);
            transition: width 0.2s;
        }

        .frame.powered .vol-fill { box-shadow: 0 0 12px var(--accent-red); }

        .lab-logo {
            margin-top: 25px;
            font-weight: bold;
            font-size: 11px;
            letter-spacing: 2px;
            color: #888;
            border: 1px solid #444;
            padding: 3px 12px;
            text-transform: uppercase;
        }

        .link-container { margin-top: 15px; }
        .link-container a {
            color: #666;
            text-decoration: none;
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        @media(max-width:700px) {
            .frame { padding: 15px; }
            .controls-main { flex-wrap: wrap; }
            .vol-wrapper { margin-left: 0; margin-top: 15px; }
        }
    </style>
</head>

<body oncontextmenu="return false;">
    <div class="frame">
        <div class="top-section">
            <div class="brand-area">
                <h1 class="title"> Roland</h1>
                <span style="font-size: 9px; font-weight: bold; color: #444;">L.A.B. AUDIO INTERFACE</span>
            </div>
            <div class="model-area">
                <div class="model-name">TB-303</div>
                <div class="model-sub">Computer Controlled</div>
            </div>
        </div>

        <div class="display-frame" id="display">
            <div class="display-line station-name">MUZYCZNE RADIO</div>
            <div class="display-line time-display" id="clock">00:00:00</div>
            <div class="display-line date-display" id="date">00:00:2026</div>
        </div>

        <div class="main-content">
            <div class="controls-main" id="controls">
                <button id="pwr" class="btn-rect"><svg viewBox="0 0 24 24"><path d="M13,3h-2v10h2V3z M17.8,4.5l-1.4,1.4C18.3,7.4,19,9.6,19,12c0,3.9-3.1,7-7,7s-7-3.1-7-7c0-2.4,0.7-4.6,2.6-6.1L6.2,4.5 C3.6,6.4,2,9.5,2,13c0,5.5,4.5,10,10,10s10-4.5,10-10C22,9.5,20.4,6.4,17.8,4.5z"/></svg></button>
                <button id="play" class="btn-rect"><svg viewBox="0 0 24 24"><path d="M8,5.14V19.14L19,12.14L8,5.14Z"/></svg></button>
                <button id="rec" class="btn-rect"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/></svg></button>
                <button id="stop" class="btn-rect"><svg viewBox="0 0 24 24"><path d="M6,6H18V18H6V6Z"/></svg></button>
                <button id="mute" class="btn-rect"><svg viewBox="0 0 24 24"><path id="mute-path" d="M3,9V15H7L12,20V4L7,9H3M16.5,12C16.5,10.23 15.48,8.71 14,8V16C15.48,15.29 16.5,13.77 16.5,12M14,3.23V5.29C16.89,6.15 19,8.83 19,12C19,15.17 16.89,17.85 14,18.71V20.77C18.01,19.86 21,16.28 21,12C21,7.72 18.01,4.14 14,3.23Z"/></svg></button>
                
                <div class="vol-wrapper" id="vol-container">
                    <div class="vol-btns">
                        <button id="vDown" class="btn-v"><svg viewBox="0 0 24 24"><path d="M19,13H5V11H19V13Z"/></svg></button>
                        <button id="vUp" class="btn-v"><svg viewBox="0 0 24 24"><path d="M19,13H13V19H11V13H5V11H11V5H13V11H19V13Z"/></svg></button>
                    </div>
                    <div class="vol-bar"><div id="vFill" class="vol-fill"></div></div>
                </div>
            </div>

            <div class="lab-logo">L.A.B. AUDIO TB-303</div>
            <div class="link-container"><a href="https://www.muzyczneradio.pl" target="_blank">WWW.MUZYCZNERADIO.PL</a></div>
        </div>
    </div>

    <audio id="stream" crossorigin="anonymous" src="https://stream.rcs.revma.com/gzwc1xcq042vv"></audio>

    <script>
        const audio = document.getElementById('stream');
        const pwrBtn = document.getElementById('pwr');
        const playBtn = document.getElementById('play');
        const recBtn = document.getElementById('rec');
        const stopBtn = document.getElementById('stop');
        const muteBtn = document.getElementById('mute');
        const mutePath = document.getElementById('mute-path');
        const vFill = document.getElementById('vFill');
        const clockEl = document.getElementById('clock');
        const dateEl = document.getElementById('date');
        const displayEl = document.getElementById('display');

        const ICON_MUTE_ON = "M4.33,3L3.05,4.27L7.78,9H3V15H7L12,20V13.22L16.25,17.47C15.58,17.98 14.83,18.4 14,18.64V21.07C15.5,20.78 16.89,20.09 18.05,19.15L20.72,21.82L22,20.55L4.33,3M16.5,12C16.5,10.23 15.5,8.71 14,8V10.18L16.45,12.63C16.5,12.43 16.5,12.22 16.5,12M19,12C19,12.94 18.8,13.82 18.46,14.64L20.28,16.46C20.74,15.11 21,13.6 21,12C21,7.72 18,4.14 14,3.23V5.7C16.89,6.56 19,9.11 19,12Z";
        const ICON_MUTE_OFF = "M3,9V15H7L12,20V4L7,9H3M16.5,12C16.5,10.23 15.48,8.71 14,8V16C15.48,15.29 16.5,13.77 16.5,12M14,3.23V5.29C16.89,6.15 19,8.83 19,12C19,15.17 16.89,17.85 14,18.71V20.77C18.01,19.86 21,16.28 21,12C21,7.72 18.01,4.14 14,3.23Z";

        let audioCtx, analyser, source, isPwr = false;
        let mediaRecorder, chunks = [];

        function updateDateTime() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const mo = String(now.getMonth() + 1).padStart(2, '0');
            const yr = now.getFullYear();
            clockEl.textContent = `${h}:${m}:${s}`;
            dateEl.textContent = `${day}:${mo}:${yr}`;
        }

        setInterval(updateDateTime, 1000);
        updateDateTime();

        const flash = el => {
            el.classList.add('active');
            setTimeout(() => { if(!(el === playBtn && !audio.paused) && !(el === muteBtn && audio.muted) && !(el === recBtn && mediaRecorder && mediaRecorder.state === 'recording')) el.classList.remove('active'); }, 600);
        };

        function updateVol() { vFill.style.width = (audio.volume * 100) + '%'; }

        pwrBtn.onclick = function() {
            isPwr = !isPwr;
            document.querySelector('.frame').classList.toggle('powered');
            this.classList.toggle('active');
            if (!isPwr) {
                if(mediaRecorder && mediaRecorder.state === 'recording') stopRecording();
                audio.pause();
                playBtn.classList.remove('active');
                recBtn.classList.remove('active');
                audio.muted = false;
                muteBtn.classList.remove('active');
                mutePath.setAttribute('d', ICON_MUTE_OFF);
            }
        };

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                source = audioCtx.createMediaElementSource(audio);
                source.connect(analyser);
                source.connect(audioCtx.destination);
            }
        }

        playBtn.onclick = function() {
            if (!isPwr) return;
            initAudio();
            audio.play();
            this.classList.add('active');
        };

        recBtn.onclick = function() {
            if (!isPwr) return;
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                stopRecording();
            } else {
                startRecording();
            }
        };

        function startRecording() {
            initAudio();
            const dest = audioCtx.createMediaStreamDestination();
            source.connect(dest);
            mediaRecorder = new MediaRecorder(dest.stream);
            chunks = [];
            mediaRecorder.ondataavailable = e => chunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'audio/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = 'nagranie.webm'; a.click();
            };
            mediaRecorder.start();
            recBtn.classList.add('active');
        }

        function stopRecording() {
            if(mediaRecorder) mediaRecorder.stop();
            recBtn.classList.remove('active');
            flash(recBtn);
        }

        stopBtn.onclick = function() {
            if (!isPwr) return;
            if(mediaRecorder && mediaRecorder.state === 'recording') stopRecording();
            audio.pause(); 
            audio.currentTime = 0;
            playBtn.classList.remove('active');
            flash(this);
        };

        muteBtn.onclick = function() {
            if (!isPwr) return;
            audio.muted = !audio.muted;
            mutePath.setAttribute('d', audio.muted ? ICON_MUTE_ON : ICON_MUTE_OFF);
            this.classList.toggle('active', audio.muted);
        };

        document.getElementById('vUp').onclick = function() { if(isPwr) { audio.volume = Math.min(1, audio.volume + 0.1); updateVol(); flash(this); }};
        document.getElementById('vDown').onclick = function() { if(isPwr) { audio.volume = Math.max(0, audio.volume - 0.1); updateVol(); flash(this); }};

        window.addEventListener('load', () => {
            audio.volume = 0.5;
            updateVol();
        });
    </script>
</body>
</html>
