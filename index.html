<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Muzyczne Radio PRO ULTRA v2 - MSI Dragon Edition</title>
    <link href="https://fonts.cdnfonts.com/css/ds-digital" rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/digital-numbers" rel="stylesheet">
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0d0d0d;
            font-family: Arial, sans-serif;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }

        /* OBUDOWA - SZCZOTKOWANE ALU Z RETRO GRAFIKI */
        .frame {
            width: 100%;
            max-width: 600px;
            border-radius: 6px;
            padding: 25px 20px;
            background: radial-gradient(ellipse at top left, rgba(255,255,255,0.4) 0%, transparent 80%),
                        linear-gradient(180deg, #d2d2d2 0%, #b2b2b2 100%);
            background-color: #c4c4c4;
            box-shadow: 
                0 30px 70px rgba(0, 0, 0, 0.8), 
                inset 0 1px 1px rgba(255,255,255,0.9),
                inset 0 -2px 3px rgba(0,0,0,0.2);
            position: relative;
            border: 4px solid #8e8e8e;
            border-top-color: #e2e2e2;
            border-bottom-color: #555555;
            box-sizing: border-box;
        }

        .frame::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.03) 0px, rgba(0,0,0,0.03) 1px, transparent 1px, transparent 2px);
            pointer-events: none;
            border-radius: 2px;
        }

        .frame.powered {
            box-shadow: 
                0 0 40px rgba(230, 0, 18, 0.25), 
                0 30px 70px rgba(0, 0, 0, 0.8), 
                inset 0 1px 1px rgba(255,255,255,0.9);
        }

        .header-logos {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
            padding: 0 5px;
        }

        .roland-logo {
            font-size: 30px;
            font-weight: 900;
            color: #1c1a1b;
            font-family: Arial, sans-serif;
            line-height: 1;
            letter-spacing: -1px;
            text-shadow: 0 1px 0 rgba(255,255,255,0.5);
        }

        .lab-sub {
            font-size: 9px;
            color: #333;
            letter-spacing: 0.5px;
            margin-top: 2px;
            font-weight: bold;
        }

        .tb-logo {
            text-align: right;
        }

        .tb-text {
            font-size: 16px;
            font-weight: 900;
            color: #1c1a1b;
            display: flex;
            align-items: center;
            gap: 4px;
            justify-content: flex-end;
            text-shadow: 0 1px 0 rgba(255,255,255,0.5);
        }

        .tb-badge {
            border: 2px solid #1c1a1b;
            background: transparent;
            color: #1c1a1b;
            padding: 0px 4px;
            font-size: 12px;
            font-weight: 900;
            border-radius: 3px;
        }

        .pro-terminal {
            font-size: 9px;
            color: #333;
            letter-spacing: 0.5px;
            margin-top: 2px;
            font-weight: bold;
        }

        /* RETRO ZIELONKAWY LCD Z PODŚWIETLENIEM */
        .display-frame {
            background: #090d08;
            border: 3px solid #2d2d2d;
            border-top-color: #1a1a1a;
            border-bottom-color: #5a5a5a;
            border-radius: 4px;
            margin: 0 auto 20px auto;
            box-sizing: border-box;
            overflow: hidden;
            width: 100%;
            height: 95px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            font-family: 'DS-Digital', 'Digital Numbers', monospace;
            color: #1b2417;
            transition: color 0.3s, text-shadow 0.3s;
            padding: 8px 15px;
            box-shadow: inset 0 5px 15px rgba(0,0,0,0.9);
            position: relative;
        }

        .frame.powered .display-frame {
            color: #8be41c;
            text-shadow: 0 0 8px rgba(139,228,28,0.6), 0 0 15px rgba(139,228,28,0.4);
        }

        .display-top {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            letter-spacing: 1px;
            font-weight: bold;
        }

        .display-middle {
            text-align: center;
            font-size: 44px;
            font-weight: bold;
            letter-spacing: 2px;
            line-height: 1;
        }

        .display-bottom {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            letter-spacing: 1px;
            font-weight: bold;
        }

        .main-content {
            position: relative;
            width: 100%;
        }

        /* WGŁĘBIENIE PANELU KONTROLNEGO */
        .controls-panel {
            background: #a2a2a2;
            border: 2px solid #555;
            border-top-color: #444;
            border-bottom-color: #888;
            border-radius: 4px;
            padding: 20px 15px;
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.4), 0 1px 1px rgba(255,255,255,0.4);
        }

        .controls-main {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
        }

        .top-row {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
        }

        /* RETRO BEŻOWE PLASTIKOWE PRZYCISKI */
        .btn-rect {
            aspect-ratio: 1.15;
            border: 1px solid #4a4a42;
            background: linear-gradient(180deg, #eae9dd 0%, #dbdacc 40%, #c2c1b2 100%);
            color: #2a2a25;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            cursor: pointer;
            transition: transform 0.05s, box-shadow 0.05s;
            border-radius: 3px;
            box-shadow: 
                inset 0 1px 2px #fff,
                inset 0 -3px 4px rgba(0,0,0,0.15),
                0 4px 6px rgba(0,0,0,0.4),
                0 1px 1px rgba(0,0,0,0.2);
            position: relative;
            font-size: 9px;
            font-weight: 900;
            gap: 2px;
            padding: 6px 2px;
        }

        /* FIZYCZNE WGŁĘBIENIE NA LED */
        .btn-rect::before {
            content: '';
            position: absolute;
            top: 6px;
            left: 50%;
            transform: translateX(-50%);
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #1e0505;
            border: 1px solid #5a5a54;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.8);
            transition: background 0.2s, box-shadow 0.2s;
        }

        /* DIODA W TRYBIE GOTOWOŚCI (POWER ON) */
        .frame.powered .btn-rect::before {
            background: #500000;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.9);
        }

        .btn-rect svg { 
            width: 22px; 
            height: 22px; 
            fill: #3a3a30; 
            pointer-events: none; 
            margin-bottom: 2px;
        }

        .btn-rect:active {
            box-shadow: 
                inset 0 3px 6px rgba(0,0,0,0.4),
                inset 0 1px 1px rgba(0,0,0,0.2),
                0 1px 2px rgba(0,0,0,0.2);
            transform: translateY(2px);
        }

        /* DIODA W STANIE AKTYWNYM */
        .frame.powered .btn-rect.active {
            background: linear-gradient(180deg, #eae9dd 0%, #dbdacc 40%, #c2c1b2 100%);
            box-shadow: 
                inset 0 1px 2px #fff,
                inset 0 -2px 3px rgba(0,0,0,0.15),
                0 2px 4px rgba(0,0,0,0.3);
        }

        .frame.powered .btn-rect.active::before {
            background: #ff0000;
            box-shadow: 0 0 8px #ff0000, 0 0 15px rgba(255,0,0,0.8), inset 0 1px 1px rgba(255,255,255,0.4);
            border-color: #ff8888;
        }

        /* SEKCJA GŁOŚNOŚCI (SUWAK + BEŻOWE PRZYCISKI) */
        .vol-wrapper {
            display: grid;
            grid-template-columns: 1fr 2.5fr 1fr;
            gap: 15px;
            height: 50px;
            align-items: center;
        }

        .btn-v {
            height: 100%;
            border: 1px solid #4a4a42;
            background: linear-gradient(180deg, #eae9dd 0%, #dbdacc 40%, #c2c1b2 100%);
            color: #3a3a30;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 3px;
            box-shadow: 
                inset 0 1px 2px #fff,
                inset 0 -3px 4px rgba(0,0,0,0.15),
                0 4px 6px rgba(0,0,0,0.4);
            font-size: 24px;
            font-weight: 900;
        }

        .btn-v:active {
            box-shadow: inset 0 3px 6px rgba(0,0,0,0.4), 0 1px 1px rgba(0,0,0,0.2);
            transform: translateY(2px);
        }

        .btn-v svg { width: 22px; height: 22px; fill: #3a3a30; }

        /* FIZYCZNY ROWEK NA SUWAK GŁOŚNOŚCI */
        .vol-bar {
            height: 22px;
            background: #080808;
            border: 2px solid #555;
            border-top-color: #333;
            border-bottom-color: #777;
            border-radius: 3px;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 3px 8px rgba(0,0,0,0.9);
        }

        .vol-fill {
            height: 100%;
            width: 50%;
            background: #1c1c1c;
            transition: width 0.1s;
        }

        /* CZERWONY WSKAŹNIK LED PO WŁĄCZENIU */
        .frame.powered .vol-fill {
            background: linear-gradient(90deg, #aa0000 0%, #ff0000 100%);
            box-shadow: 0 0 10px rgba(255,0,0,0.8);
        }

        .link-container {
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px solid #8e8e8e;
            text-align: center;
            position: relative;
        }

        .link-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: #fdfdfd;
        }

        .lab-footer {
            font-size: 9px;
            color: #333;
            letter-spacing: 1px;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .link-container a {
            color: #2a2a20;
            text-decoration: none;
            font-family: 'DS-Digital', sans-serif;
            font-weight: bold;
            letter-spacing: 2px;
            font-size: 11px;
            transition: color 0.3s, text-shadow 0.3s;
        }

        .frame.powered .link-container a {
            color: #aa1111;
        }

        @media(max-width:700px) {
            .frame { max-width: 95%; padding: 15px; }
            .top-row { gap: 8px; }
            .btn-rect { font-size: 8px; padding: 5px 2px; }
            .btn-rect svg { width: 16px; height: 16px; }
            .btn-rect::before { width: 6px; height: 6px; top: 4px; }
        }
    </style>
</head>

<body oncontextmenu="return false;">

            <div class="link-container">

    </div>

    <audio id="stream" crossorigin="anonymous" src="https://stream.rcs.
