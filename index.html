<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Muzyczne Radio - MSI Dragon PRO v11</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: black; color: white; text-align: center; font-family: 'Orbitron', sans-serif; overflow: hidden; }
        #title { font-size: 50px; color: #ff2a2a; margin-top: 20px; text-shadow: 0 0 12px red; }
        
        #trackBox {
            margin: 30px auto;
            width: 580px;
            padding: 20px;
            background: #050505;
            border: 2px solid #ff2a2a;
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.4) inset;
            border-radius: 8px;
            position: relative;
            overflow: hidden;
            height: 60px;
            display: flex;
            align-items: center;
        }

        #trackDisplay {
            font-size: 24px;
            color: #ff4444;
            white-space: nowrap;
            display: block;
            position: absolute;
            width: 100%;
            text-align: center;
        }

        /* Klasa dla długich tekstów - włącza się automatycznie w JS */
        .marquee {
            padding-left: 100%;
            animation: scrollText 15s linear infinite;
        }

        @keyframes scrollText {
            0% { transform: translateX(0); }
            100% { transform: translateX(-180%); }
        }

        .label { font-size: 10px; color: #444; letter-spacing: 4px; position: absolute; top: 5px; left: 10px; }
        
        button {
            padding: 15px 40px;
            background: #111;
            border: 1px solid #444;
            color: #888;
            font-family: 'Orbitron';
            cursor: pointer;
            margin: 20px;
            transition: 0.3s;
            font-weight: bold;
        }

        button:hover { border-color: #ff2a2a; color: #ff2a2a; }
        button.active { background: #200; border-color: red; color: white; box-shadow: 0 0 20px red; }

        #clock { position: absolute; top: 20px; right: 20px; color: #555; font-size: 18px; }
        #signature { position: absolute; bottom: 20px; width: 100%; font-size: 10px; color: #222; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div id="clock">00:00:00</div>
    <div id="title">Muzyczne Radio</div>

    <div id="trackBox">
        <div class="label">RDS MULTI-SOURCE ENGINE</div>
        <div id="trackDisplay">ŁĄCZENIE...</div>
    </div>

    <div class="controls">
        <button id="playBtn" onclick="toggleRadio()">PLAY / STOP</button>
    </div>

    <audio id="audio" crossorigin="anonymous"></audio>
    <div id="signature">SYSTEM DESIGN BY ŁUKASZ.B // MULTI-PROXY V11.0</div>

    <script>
        const audio = document.getElementById("audio");
        const trackDisplay = document.getElementById("trackDisplay");
        const playBtn = document.getElementById("playBtn");
        let isPlaying = false;

        function toggleRadio() {
            if (!isPlaying) {
                audio.src = "https://stream.rcs.revma.com/gzwc1xcq042vv";
                audio.play();
                playBtn.classList.add("active");
                isPlaying = true;
            } else {
                audio.pause();
                audio.src = "";
                playBtn.classList.remove("active");
                isPlaying = false;
            }
        }

        async function getRDS() {
            const time = new Date().toLocaleTimeString('pl-PL', {hour: '2-digit', minute:'2-digit'});
            
            // Definiujemy źródła danych (API)
            const sources = [
                "https://stats.revma.com/v1/stats/s/gzwc1xcq042vv",
                "https://onlineradiobox.com/json/pl/muzyczneradio/play"
            ];

            // Próbujemy pobrać dane z kolejnych źródeł
            for (let url of sources) {
                try {
                    const proxy = "https://api.allorigins.win/get?url=";
                    const response = await fetch(`${proxy}${encodeURIComponent(url)}&t=${Date.now()}`);
                    const data = await response.json();
                    const json = JSON.parse(data.contents);

                    let title = "";
                    if (json.current_track) title = json.current_track.title; // Format Revma
                    else if (json.title) title = json.title; // Format OnlineRadioBox

                    if (title && title.length > 3 && !title.toLowerCase().includes("muzyczne radio")) {
                        displayRDS(title.toUpperCase());
                        return; // Udało się, przerywamy pętlę
                    }
                } catch (e) {
                    continue; // Błąd w jednym źródle? Sprawdzamy następne
                }
            }

            // Jeśli nic nie zadziałało - tryb nocny / zegar
            displayRDS(`MUZYCZNE RADIO | JELENIA GÓRA | ${time}`);
        }

        function displayRDS(text) {
            trackDisplay.innerText = "+++ " + text + " +++";
            // Jeśli tekst jest długi, włączamy przewijanie (marquee)
            if (text.length > 30) {
                trackDisplay.classList.add("marquee");
            } else {
                trackDisplay.classList.remove("marquee");
            }
        }

        // Zegar górny
        setInterval(() => {
            document.getElementById("clock").innerText = new Date().toLocaleTimeString();
        }, 1000);

        // Odświeżanie RDS co 20 sekund
        setInterval(getRDS, 20000);
        getRDS();
    </script>
</body>
</html>
