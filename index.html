<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RMF TETRAD EDITION</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700&family=Syncopate:wght@700&display=swap');
        
        :root {
            --tetrad-light: #d1d6dc;
            --tetrad-panel: #e2e6eb;
            --tetrad-dark: #1a1a1a;
            --tetrad-accent: #ff7e33; /* Pomarańczowy akcent z Tetrad */
            --tetrad-border: #aeb5bc;
            --tetrad-text: #2c3136;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            height: 100vh; background: #222; 
            font-family: 'Roboto Condensed', sans-serif;
            display: flex; align-items: center; justify-content: center;
        }

        /* GŁÓWNA OBUDOWA - Układ LA XLIMIT */
        .vst-main-frame {
            width: 1100px; height: 580px;
            background: var(--tetrad-light);
            border: 2px solid #000;
            display: flex; flex-direction: column;
            box-shadow: 0 40px 80px rgba(0,0,0,0.6);
            padding: 2px;
        }

        /* GÓRNY PASEK - Styl Tetrad Header */
        .vst-top-nav {
            height: 35px; background: #000; color: #fff;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 15px; font-size: 11px; letter-spacing: 1px;
        }

        /* UKŁAD TRZYKOLUMNOWY (Zgodnie z Twoim pierwotnym kodem) */
        .vst-content {
            display: flex; flex: 1; gap: 4px; padding: 4px;
            background: #adb4bc;
        }

        .column-box {
            background: var(--tetrad-panel);
            border: 1px solid var(--tetrad-border);
            display: flex; flex-direction: column;
            position: relative;
        }

        .mod-label {
            background: #c6cbd2; color: var(--tetrad-text);
            font-size: 10px; font-weight: 700; padding: 4px 8px;
            text-transform: uppercase; border-bottom: 1px solid var(--tetrad-border);
        }

        /* LEWA KOLUMNA: Funkcje */
        .left-functions { width: 100px; gap: 4px; }
        .t-btn {
            height: 35px; background: #ced3d9; border: 1px solid #b1b7be;
            color: #444; font-size: 9px; font-weight: 700;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; text-transform: uppercase; margin: 0 5px;
        }
        .t-btn:hover { background: #fff; }
        .t-btn.active { background: var(--tetrad-accent); color: #fff; border-color: #d45f1b; }

        /* ŚRODKOWA KOLUMNA: Grid stacji */
        .station-matrix { flex: 2; padding: 10px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
        .cell {
            background: #f0f2f5; border: 1px solid #b1b7be;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.2s; position: relative;
        }
        .cell:hover { background: #fff; }
        .cell.active { border: 2px solid #000; background: #fff; }
        .cell.active::after {
            content: ""; position: absolute; width: 6px; height: 6px; background: var(--tetrad-accent); bottom: 4px;
        }
        .cell-id { font-size: 14px; font-weight: 700; color: #000; }

        /* PRAWA KOLUMNA: Master Volume */
        .master-section { width: 280px; align-items: center; padding-top: 40px; }
        .tetrad-knob-area {
            width: 120px; height: 120px; background: #d1d6dc;
            border-radius: 50%; border: 1px solid #a1a8b0;
            display: flex; align-items: center; justify-content: center;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
            position: relative;
        }
        .knob-inner {
            width: 80px; height: 80px; background: #fff; border: 2px solid #000;
            border-radius: 50%; position: relative; cursor: pointer;
        }
        .knob-line {
            position: absolute; top: 5px; left: 50%; width: 3px; height: 15px;
            background: #000; transform: translateX(-50%);
        }

        /* DOLNY PANEL: Wyświetlacz */
        .vst-bottom {
            height: 180px; background: #000; display: flex;
            border-top: 4px solid var(--tetrad-border);
        }
        .status-display {
            flex: 2; display: flex; flex-direction: column; justify-content: center;
            padding: 0 30px; border-right: 1px solid #333;
        }
        .tetrad-logo {
            font-family: 'Syncopate', sans-serif; font-size: 42px; color: #fff;
            letter-spacing: -2px; line-height: 1; margin-bottom: 5px;
        }
        .patch-name-kafel {
            color: var(--tetrad-accent); font-size: 18px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 2px;
        }
        .brand-info {
            flex: 1; padding: 20px; color: #666; font-size: 10px;
            display: flex; flex-direction: column; justify-content: center; align-items: flex-end;
        }

        input[type="range"] {
            width: 80%; margin-top: 20px; accent-color: #000;
        }
    </style>
</head>
<body>

<div class="vst-main-frame">
    <div class="vst-top-nav">
        <div>MOD MATRIX</div>
        <div>THINK IN FOURS</div>
        <div>INFO</div>
    </div>

    <div class="vst-content">
        <!-- LEWA SEKCOJA (LA Style) -->
        <div class="column-box left-functions">
            <div class="mod-label">Core</div>
            <div style="flex:1; display:flex; flex-direction:column; gap:5px; padding-top:10px;">
                <div class="t-btn active" onclick="toggle()">Play</div>
                <div class="t-btn">Mute</div>
                <div class="t-btn">Solo</div>
                <div class="t-btn">Config</div>
            </div>
        </div>

        <!-- ŚRODKOWA SEKCOJA (Radio Grid) -->
        <div class="column-box" style="flex:2;">
            <div class="mod-label">4x4 Radio Matrix Mixer</div>
            <div class="station-matrix" id="grid"></div>
        </div>

        <!-- PRAWA SEKCOJA (Output) -->
        <div class="column-box master-section">
            <div class="mod-label">Output Gain</div>
            <div class="tetrad-knob-area">
                <div class="knob-inner" id="v-knob" onclick="resetVol()">
                    <div class="knob-line" id="v-ptr"></div>
                </div>
            </div>
            <input type="range" id="v-slider" min="0" max="100" value="50" oninput="setV(this.value)">
            <div style="margin-top: 10px; font-weight: 700; font-size: 12px;">LEVEL: <span id="vol-val">50</span>%</div>
        </div>
    </div>

    <!-- DOLNY PANEL (Nazwa stacji i Logo) -->
    <div class="vst-bottom">
        <div class="status-display">
            <div class="tetrad-logo">TETRAD</div>
            <div class="patch-name-kafel" id="active-station-display">SELECT_STATION_INPUT</div>
        </div>
        <div class="brand-info">
            <div style="color:#fff; font-size: 14px; margin-bottom:5px;">GLITCHMACHINES</div>
            <div>QUAD MULTI-STAGE PROCESSOR</div>
            <div>VERSION 2.0.4 // RMF ENGINE</div>
        </div>
    </div>
</div>

<audio id="player"></audio>

<script>
    const STATIONS = [
        { n: 'RMF FM', u: 'rmf_fm' }, { n: 'RMF MAXXX', u: 'RMFMAXXX48' },
        { n: 'RMF 80s', u: 'rmf_80s' }, { n: 'RMF 90s', u: 'rmf_90s' },
        { n: 'RMF 2000', u: 'rmf_2000' }, { n: 'RMF CHILLOUT', u: 'rmf_chillout' },
        { n: 'RMF CLASSIC', u: 'rmf_classic' }, { n: 'RMF DANCE', u: 'rmf_dance' },
        { n: 'RMF GOLD', u: 'rmf_gold' }, { n: 'RMF PARTY', u: 'rmf_party' },
        { n: 'RMF ROCK', u: 'rmf_rock' }, { n: 'RMF LOVE', u: 'rmf_love' },
        { n: 'RMF POLSKI ROCK', u: 'rmf_polski_rock' }, { n: 'RMF JAZZ', u: 'rmf_smooth_jazz' },
        { n: 'RMF HIP HOP', u: 'rmf_hip_hop' }, { n: 'RMF GROOVE', u: 'rmf_groove' }
    ];

    const player = document.getElementById('player'), 
          grid = document.getElementById('grid'),
          vPtr = document.getElementById('v-ptr'),
          vSlider = document.getElementById('v-slider'),
          volVal = document.getElementById('vol-val'),
          stationDisplay = document.getElementById('active-station-display');

    let current = -1;

    STATIONS.forEach((s, i) => {
        const div = document.createElement('div');
        div.className = 'cell';
        div.innerHTML = `<span class="cell-id">${(i + 1).toString().padStart(2, '0')}</span>`;
        div.onclick = () => play(i);
        grid.appendChild(div);
    });

    function play(i) {
        current = i;
        document.querySelectorAll('.cell').forEach((c, idx) => c.classList.toggle('active', idx === i));
        stationDisplay.textContent = STATIONS[i].n.replace(/\s+/g, '_').toUpperCase();
        
        const streamBase = "https://rs201-krk.rmfstream.pl/";
        player.src = (STATIONS[i].n === 'RMF MAXXX') ? 'https://rs7-krk2-cyfronet.rmfstream.pl/RMFMAXXX48' : streamBase + STATIONS[i].u;
        player.play();
    }

    function toggle() {
        if(current === -1) { play(0); return; }
        if(!player.paused) player.pause(); else player.play();
    }

    function setV(v) {
        player.volume = v / 100;
        volVal.textContent = v;
        const rot = (v * 3) - 150;
        vPtr.parentElement.style.transform = `rotate(${rot}deg)`;
    }

    function resetVol() { vSlider.value = 50; setV(50); }

    setV(50);
</script>

</body>
</html>
