<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TECHNO_TRANCE_PCB_PRO_V7_FINAL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@300;600&display=swap');

        :root {
            --laminat: #010502;
            --miedz: #0a1f11;
            --neon: #00f2ff;
            --gold: #c3a343;
            --chip-body: #0a0a0a;
            --alert: #ff0055;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--laminat); 
            color: var(--neon);
            font-family: 'JetBrains Mono', monospace;
            overflow: hidden; height: 100vh;
        }

        /* BACKGROUND PCB - ANIMOWANE ŚCIEŻKI */
        #pcb-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0; pointer-events: none;
        }

        .main-interface { display: flex; height: 100vh; position: relative; z-index: 2; }

        .motherboard { 
            flex: 2; position: relative; 
            background-image: 
                linear-gradient(var(--miedz) 1px, transparent 1px),
                linear-gradient(90deg, var(--miedz) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        /* UKŁAD SCALONY - ZGODNY Z IMAGE_C8A6D7.PNG */
        .ic-chip {
            position: absolute; width: 150px; height: 150px;
            background: var(--chip-body);
            border: 1px solid #333;
            cursor: pointer; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 20px rgba(0,0,0,1);
        }

        /* PINY Z CZTERECH STRON */
        .ic-chip::before {
            content: ''; position: absolute; top: -15px; bottom: -15px; left: 20px; right: 20px;
            background: repeating-linear-gradient(90deg, #555 0px, #555 2px, transparent 2px, transparent 12px);
        }
        .ic-chip::after {
            content: ''; position: absolute; left: -15px; right: -15px; top: 20px; bottom: 20px;
            background: repeating-linear-gradient(0deg, #555 0px, #555 2px, transparent 2px, transparent 12px);
        }

        .chip-surface {
            position: relative; width: 100%; height: 100%; background: var(--chip-body);
            z-index: 5; display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: 1px solid #222;
        }

        .chip-id { font-family: 'Orbitron'; font-size: 11px; color: var(--gold); text-align: center; }
        .chip-spec { font-size: 7px; color: #444; margin-top: 8px; }

        .ic-chip.active {
            border-color: var(--neon);
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.4);
            transform: scale(1.05) rotate(1deg);
        }

        /* PANEL KONTROLNY - CYBERPUNK HUD STYLE */
        .control-tower { 
            flex: 0.8; background: rgba(0, 8, 5, 0.95); 
            border-left: 2px solid var(--neon);
            display: flex; flex-direction: column;
            backdrop-filter: blur(10px);
        }

        .hud-header { 
            padding: 25px; border-bottom: 2px solid var(--alert); 
            font-family: 'Orbitron'; letter-spacing: 2px;
            background: linear-gradient(90deg, rgba(255,0,85,0.1), transparent);
        }

        .terminal { 
            margin: 20px; padding: 15px; background: rgba(0,0,0,0.8); flex: 1; 
            border: 1px solid #1a1a1a; font-size: 11px; color: #39ff14; 
            overflow-y: auto; box-shadow: inset 0 0 15px rgba(0, 242, 255, 0.05);
        }

        .btn-matrix { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: #222; padding: 1px; }
        .hw-btn {
            background: #000; border: none; color: var(--neon);
            padding: 20px 10px; cursor: pointer; font-family: 'Orbitron'; font-size: 10px;
            transition: 0.3s;
        }
        .hw-btn:hover { background: var(--neon); color: #000; }

        .slider-wrap { padding: 30px; border-top: 1px solid #222; }

        /* PRZEPŁYW PRĄDU (SVG ANIMATION) */
        .power-trace {
            stroke-dasharray: 20;
            animation: flow 5s linear infinite;
        }
        @keyframes flow { to { stroke-dashoffset: -100; } }
    </style>
</head>
<body>

<svg id="pcb-bg"></svg>

<div class="main-interface">
    <div class="motherboard" id="board"></div>

    <aside class="control-tower">
        <div class="hud-header">LINK_INTERFACE_V7</div>
        <div class="terminal" id="term-out">> SYSTEM_READY<br>> STANDBY_FOR_INPUT...</div>
        <div class="btn-matrix">
            <button class="hw-btn" onclick="skip(-1)">PREV</button>
            <button class="hw-btn" onclick="toggle()" style="color:var(--alert)">SYNC</button>
            <button class="hw-btn" onclick="skip(1)">NEXT</button>
        </div>
        <div class="slider-wrap">
            <input type="range" min="0" max="1" step="0.01" value="0.5" style="width:100%; accent-color:var(--neon)" oninput="setV(this.value)">
        </div>
    </aside>
</div>

<audio id="player" crossorigin="anonymous"></audio>

<script>
    const STATIONS = [
        { n: 'TECH 88', u: 'https://laut.fm/tech88', x: 10, y: 15 },
        { n: 'HR3 CLUB', u: 'https://laut.fm/hr3_clubnight', x: 45, y: 10 },
        { n: '1000 TECHNO', u: 'https://laut.fm/1000techno', x: 15, y: 40 },
        { n: 'GEHIRN', u: 'https://laut.fm/gehirn-treiber-beat-radio', x: 48, y: 45 },
        { n: 'B.O. TECHNO', u: 'https://laut.fm/best-of-techno', x: 12, y: 75 },
        { n: 'CHRIS BURN', u: 'https://laut.fm/chris_burn', x: 55, y: 80 },
        { n: 'DEEP HOUSE', u: 'https://laut.fm/deep-house-sounds', x: 78, y: 15 },
        { n: 'HOUSEBOMB', u: 'https://laut.fm/housebomb-fn', x: 75, y: 45 },
        { n: 'SYMBIOTIC', u: 'https://laut.fm/symbiotic-beats', x: 80, y: 78 }
    ];

    const svg = document.getElementById('pcb-bg');
    const board = document.getElementById('board');
    const player = document.getElementById('player');
    const term = document.getElementById('term-out');
    let currentIdx = -1;

    function buildHardware() {
        let traces = "";
        // Gęste tło ścieżek
        for(let i=0; i<150; i++) {
            const x = Math.random()*100;
            const y = Math.random()*100;
            traces += `<path class="power-trace" d="M ${x}% ${y}% L ${x+5}% ${y+2}%" stroke="#0a2211" stroke-width="0.5" fill="none"/>`;
        }
        svg.innerHTML = traces;

        STATIONS.forEach((s, i) => {
            const ic = document.createElement('div');
            ic.className = 'ic-chip';
            ic.style.left = s.x + '%'; ic.style.top = s.y + '%';
            ic.id = `ic-${i}`;
            ic.innerHTML = `<div class="chip-surface">
                <span class="chip-id">${s.n}</span>
                <span class="chip-spec">UART_LOGIC_0x${i}A</span>
            </div>`;
            ic.onclick = () => mount(i);
            board.appendChild(ic);
        });
    }

    function mount(i) {
        currentIdx = i;
        document.querySelectorAll('.ic-chip').forEach((c, idx) => c.classList.toggle('active', idx === i));
        
        term.innerHTML += `<br>> MOUNTING_SOURCE: ${STATIONS[i].n}...`;
        term.scrollTop = term.scrollHeight;

        player.pause();
        player.src = STATIONS[i].u;
        player.load();
        
        player.play()
            .then(() => { term.innerHTML += `<br>> SIGNAL_LOCKED_STABLE.`; })
            .catch(e => { term.innerHTML += `<br>> ERROR: BYPASS_REQUIRED. PRESS SYNC.`; });
    }

    function toggle() { 
        if(currentIdx === -1) mount(0); 
        else player.paused ? player.play() : player.pause(); 
    }
    
    function skip(dir) { 
        let n = currentIdx + dir; 
        if(n >= 0 && n < STATIONS.length) mount(n); 
    }

    function setV(v) { player.volume = v; }

    window.onresize = () => { svg.innerHTML = ''; buildHardware(); };
    buildHardware();
</script>
</body>
</html>
