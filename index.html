<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RMF PURE LOFI</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Noto+Sans+JP:wght@300;500&display=swap');

        :root {
            --lofi-bg: #f4ece4;
            --lofi-panel: #fcf9f6;
            --lofi-accent: #e59a7d;
            --lofi-text: #6d5f5a;
            --lofi-border: #e8ddd3;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            height: 100vh; width: 100vw; 
            background: var(--lofi-bg); color: var(--lofi-text); 
            font-family: 'Outfit', sans-serif;
            display: flex; flex-direction: column;
            padding: 12px; overflow: hidden; 
        }

        /* HEADER - ARTURIA STYLE */
        header { 
            height: 45px; background: #1a1a1a; color: #fff;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; border-radius: 4px 4px 0 0; font-size: 12px;
        }
        .brand { font-weight: 700; letter-spacing: 1px; }
        .preset-display { background: #2a2a2a; padding: 4px 20px; border-radius: 2px; color: #aaa; }

        /* MAIN DASHBOARD */
        .dashboard {
            flex: 1; background: var(--lofi-panel);
            border: 1px solid var(--lofi-border);
            display: flex; flex-direction: column; padding: 20px; gap: 15px;
        }

        /* TOP MODULES */
        .top-row { display: flex; gap: 15px; height: 180px; }
        .module { 
            flex: 1; border: 1px solid var(--lofi-border); border-radius: 6px; 
            padding: 12px; position: relative;
        }
        .mod-title { font-size: 10px; font-weight: 700; text-transform: uppercase; color: var(--lofi-accent); margin-bottom: 10px; }
        
        /* VOLUME KNOB - "AMOUNT" */
        .vol-module { flex: 0.7; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .knob-outer {
            width: 100px; height: 100px; background: #fff; border-radius: 50%;
            border: 1px solid var(--lofi-border); position: relative; cursor: ns-resize;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .knob-line {
            position: absolute; top: 10px; left: 50%; width: 2px; height: 15px;
            background: var(--lofi-accent); transform-origin: bottom;
        }

        /* KEYBOARD SELECTOR (15 STATIONS) */
        .keyboard-container {
            margin-top: auto; display: flex; flex-direction: column; align-items: center;
        }
        .keys { display: flex; gap: 6px; }
        .key {
            width: 50px; height: 90px; background: #fff;
            border: 1px solid var(--lofi-border); border-radius: 0 0 4px 4px;
            cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
            padding-bottom: 10px; transition: 0.2s;
        }
        .key:hover { background: #fdfdfd; transform: translateY(2px); }
        .key.active { border-top: 4px solid var(--lofi-accent); background: #fffdfb; }
        .key .k-label { font-size: 8px; font-weight: 700; color: #ccc; }
        .key .k-jap { font-family: 'Noto Sans JP', sans-serif; font-size: 10px; margin-top: 5px; color: var(--lofi-text); }

        /* WAVE VISUALIZER STYLE */
        .wave-svg { width: 100%; height: 40px; fill: none; stroke: var(--lofi-accent); stroke-width: 1; opacity: 0.5; }

        /* CONTROLS */
        .main-controls { display: flex; gap: 20px; align-items: center; margin-bottom: 15px; }
        .btn-circle {
            width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--lofi-border);
            display: flex; align-items: center; justify-content: center; cursor: pointer; background: #fff;
        }
        .btn-circle svg { width: 18px; fill: var(--lofi-text); }

        @media (max-width: 800px) {
            .top-row { flex-direction: column; height: auto; }
            .keys { flex-wrap: wrap; justify-content: center; }
            .key { width: 45px; height: 70px; }
        }
    </style>
</head>
<body>

<header>
    <div class="brand">PURE LOFI <span>v1.0.4</span></div>
    <div class="preset-display" id="station-name">GOLDEN AGE RMF</div>
    <div style="font-size: 10px; opacity: 0.6;">ADVANCED</div>
</header>

<div class="dashboard">
    <div class="top-row">
        <div class="module">
            <div class="mod-title">realistic instrument</div>
            <div style="font-size: 16px; font-weight: 600;" id="cur-info">Rhodes FM</div>
            <div style="margin-top: 20px;">
                <svg class="wave-svg" viewBox="0 0 100 20"><path d="M0 10 Q 25 0, 50 10 T 100 10" /></svg>
            </div>
            <div style="font-size: 9px; margin-top: 10px; opacity: 0.6;">DETERIORATE [ON]</div>
        </div>

        <div class="module vol-module">
            <div class="mod-title" style="margin-bottom: 5px;">lofi amount</div>
            <div class="knob-outer" id="knob" onmousedown="startRotate(event)" ontouchstart="startRotate(event)">
                <div class="knob-line" id="knob-pointer"></div>
            </div>
            <div style="font-size: 12px; font-weight: 700; margin-top: 10px;" id="vol-txt">50%</div>
        </div>

        <div class="module">
            <div class="mod-title">noise texture</div>
            <div style="font-size: 16px; font-weight: 600;">Light Rain</div>
            <div style="margin-top: 20px;">
                <svg class="wave-svg" viewBox="0 0 100 20"><path d="M0 10 L 5 12 L 10 8 L 15 15 L 20 5 L 100 10" /></svg>
            </div>
            <div style="font-size: 9px; margin-top: 10px; opacity: 0.6;" id="timer">00:00:00</div>
        </div>
    </div>

    <div class="keyboard-container">
        <div class="main-controls">
            <div class="btn-circle" onclick="skip(-1)"><svg viewBox="0 0 24 24"><path d="M6,18V6H8V18H6M9.5,12L18,6V18L9.5,12Z"/></svg></div>
            <div class="btn-circle" onclick="toggle()" style="width: 60px; border-radius: 30px;">
                <svg viewBox="0 0 24 24"><path id="p-ico" d="M8,5.14V19.14L19,12.14L8,5.14Z"/></svg>
            </div>
            <div class="btn-circle" onclick="skip(1)"><svg viewBox="0 0 24 24"><path d="M16,18H18V6H16M6,18L14.5,12L6,6V18Z"/></svg></div>
        </div>

        <div class="keys" id="station-keys"></div>
    </div>
</div>

<audio id="player"></audio>

<script>
    const STATIONS = [
        { n: 'RMF FM', s: 'FM', j: 'ド' }, { n: 'RMF MAXXX', s: 'MAXXX', j: 'レ' },
        { n: 'RMF 80s', s: '80s', j: 'ミ' }, { n: 'RMF 90s', s: '90s', j: 'ファ' },
        { n: 'RMF 2000', s: '2000', j: 'ソ' }, { n: 'RMF CHILLOUT', s: 'CHILL', j: 'ラ' },
        { n: 'RMF CLASSIC', s: 'CLASS', j: 'シ' }, { n: 'RMF DANCE', s: 'DANCE', j: 'ド' },
        { n: 'RMF GOLD', s: 'GOLD', j: 'レ' }, { n: 'RMF LATINO', s: 'LATIN', j: 'ミ' },
        { n: 'RMF LOVE', s: 'LOVE', j: 'ファ' }, { n: 'RMF PARTY', s: 'PARTY', j: 'ソ' },
        { n: 'RMF POLSKI ROCK', s: 'P-ROC', j: 'ラ' }, { n: 'RMF ROCK', s: 'ROCK', j: 'シ' },
        { n: 'RMF SMOOTH JAZZ', s: 'JAZZ', j: 'ド' }
    ];

    const player = document.getElementById('player'), ico = document.getElementById('p-ico'), keysCont = document.getElementById('station-keys');
    let current = -1;
    let volume = 50;

    STATIONS.forEach((s, i) => {
        const k = document.createElement('div');
        k.className = 'key';
        k.innerHTML = `<div class="k-label">${s.s}</div><div class="k-jap">${s.j}</div>`;
        k.onclick = () => play(i);
        keysCont.appendChild(k);
    });

    function play(i) {
        current = i;
        document.querySelectorAll('.key').forEach((k, idx) => k.classList.toggle('active', idx === i));
        document.getElementById('station-name').textContent = STATIONS[i].n.toUpperCase();
        document.getElementById('cur-info').textContent = STATIONS[i].s + " Engine";
        const streamBase = "https://rs201-krk.rmfstream.pl/";
        player.src = (STATIONS[i].n === 'RMF MAXXX') ? 'https://rs7-krk2-cyfronet.rmfstream.pl/RMFMAXXX48' : streamBase + STATIONS[i].u;
        player.play();
        ico.setAttribute('d', 'M14,19H18V5H14M6,19H10V5H6V19Z');
    }

    function toggle() {
        if(player.paused) { player.play(); ico.setAttribute('d', 'M14,19H18V5H14M6,19H10V5H6V19Z'); }
        else { player.pause(); ico.setAttribute('d', 'M8,5.14V19.14L19,12.14L8,5.14Z'); }
    }

    function skip(d) { let n = current + d; if(n >= 0 && n < STATIONS.length) play(n); }

    function clock() {
        const d = new Date();
        document.getElementById('timer').textContent = d.getHours().toString().padStart(2,'0') + ":" + d.getMinutes().toString().padStart(2,'0') + ":" + d.getSeconds().toString().padStart(2,'0');
    }
    setInterval(clock, 1000); clock();

    // VOLUME KNOB
    let isDragging = false, startY = 0;
    function startRotate(e) {
        isDragging = true; startY = e.clientY || e.touches[0].clientY;
        document.addEventListener('mousemove', onRotate); document.addEventListener('mouseup', stopRotate);
        document.addEventListener('touchmove', onRotate); document.addEventListener('touchend', stopRotate);
    }
    function onRotate(e) {
        if (!isDragging) return;
        const currentY = e.clientY || e.touches[0].clientY;
        const diff = startY - currentY;
        volume = Math.min(Math.max(volume + diff * 0.5, 0), 100);
        startY = currentY;
        const rot = (volume * 2.4) - 120;
        document.getElementById('knob-pointer').style.transform = `rotate(${rot}deg)`;
        document.getElementById('vol-txt').textContent = Math.round(volume) + "%";
        player.volume = volume / 100;
    }
    function stopRotate() { isDragging = false; }
</script>
</body>
</html>
