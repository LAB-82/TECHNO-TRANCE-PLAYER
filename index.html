<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RMF TERMINAL - PRO AUDIO</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

        :root {
            --panel-bg: #dcdcdc;
            --panel-shadow: #b8b8b8;
            --panel-light: #f5f5f5;
            --orange-led: #ff6600;
            --text-dark: #333;
            --display-bg: #1a1a1a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            height: 100vh; width: 100vw; 
            background: #1a1a1a; color: var(--text-dark); 
            font-family: 'Inter', sans-serif;
            display: flex; flex-direction: column;
            padding: 2vh; overflow: hidden; 
        }

        /* NAGŁÓWEK - ORYGINALNY UKŁAD */
        header { 
            height: 50px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #999; margin-bottom: 2vh; flex-shrink: 0;
            padding: 0 10px; background: var(--panel-bg); border-radius: 8px 8px 0 0;
        }
        .header-info { font-size: 20px; font-weight: 800; color: #555; text-transform: uppercase; }
        .header-info span { color: var(--orange-led); }
        .clock { color: var(--text-dark); font-size: 24px; font-weight: 700; }

        .app-content { display: flex; flex: 1; gap: 3vw; min-height: 0; }

        /* SIATKA KAFELKÓW - ORYGINALNY ROZMIAR I UKŁAD (5x3) */
        .grid { 
            flex: 1.4; display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            grid-template-rows: repeat(3, 1fr); 
            gap: 12px; 
        }

        .tile {
            background: linear-gradient(145deg, var(--panel-light), var(--panel-shadow));
            border: 1px solid #aaa; border-radius: 12px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; position: relative;
            box-shadow: 4px 4px 8px #bebebe, -2px -2px 5px #ffffff;
            transition: all 0.1s;
        }

        .tile:active {
            box-shadow: inset 2px 2px 5px #bebebe, inset -2px -2px 5px #ffffff;
            transform: translateY(1px);
        }

        .tile .t-top { font-size: 11px; font-weight: 700; color: #888; text-transform: uppercase; }
        .tile .t-bottom { font-size: 14px; font-weight: 600; color: #333; margin-top: 4px; text-align: center; }

        /* AKTYWNA STACJA - POMARAŃCZOWY LED */
        .tile.active { border-color: var(--orange-led); }
        .tile.active::before {
            content: ''; position: absolute; top: 10px; right: 10px;
            width: 8px; height: 8px; background: var(--orange-led);
            border-radius: 50%; box-shadow: 0 0 8px var(--orange-led);
        }

        /* SIDEBAR - ORYGINALNY UKŁAD */
        .sidebar { 
            flex: 0.6; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; gap: 4vh;
            border-left: 1px solid #999; padding-left: 3vw;
        }

        .logo-display {
            width: 100%; max-width: 320px; aspect-ratio: 16/10;
            background: var(--display-bg); border-radius: 15px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: 4px solid var(--panel-shadow);
            box-shadow: inset 0 5px 15px rgba(0,0,0,0.5);
        }
        .logo-display h2 { font-size: 40px; color: var(--orange-led); text-shadow: 0 0 10px var(--orange-glow); }
        .logo-display p { font-size: 10px; color: #666; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; }

        /* PRZYCISKI STEROWANIA - NA WZÓR KAFELKÓW */
        .controls { display: flex; align-items: center; gap: 20px; }
        .btn-ctrl {
            width: 60px; height: 60px;
            background: linear-gradient(145deg, var(--panel-light), var(--panel-shadow));
            border: 1px solid #aaa; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 3px 3px 6px #bebebe;
        }
        .btn-ctrl:active { box-shadow: inset 2px 2px 5px #bebebe; }
        .btn-ctrl svg { width: 25px; height: 25px; fill: #555; }
        .btn-ctrl.main { width: 80px; height: 80px; }
        .btn-ctrl.main svg { width: 35px; height: 35px; fill: var(--orange-led); }

        /* POKRĘTŁO GŁOŚNOŚCI (KNOB) */
        .vol-box { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .knob-wrapper {
            width: 100px; height: 100px;
            background: radial-gradient(circle, #eee 0%, #ccc 100%);
            border-radius: 50%; border: 3px solid #bbb;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2), inset 0 2px 2px #fff;
            position: relative; cursor: ns-resize;
            display: flex; align-items: center; justify-content: center;
        }
        .knob-indicator {
            position: absolute; top: 10px; width: 4px; height: 12px;
            background: var(--orange-led); border-radius: 2px;
            transform-origin: 2px 40px; transform: rotate(0deg);
        }
        .vol-label { font-size: 12px; font-weight: 800; color: #777; }

        @media (max-width: 600px) {
            .app-content { flex-direction: column; overflow-y: auto; }
            .grid { grid-template-columns: repeat(3, 1fr); height: auto; flex: none; }
            .sidebar { border-left: none; border-top: 1px solid #999; padding: 20px 0; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-info" id="playing-now">PRC: <span>RMF FM</span></div>
    <div class="clock" id="timer">00:00</div>
</header>

<div class="app-content">
    <div class="grid" id="station-grid"></div>

    <aside class="sidebar">
        <div class="logo-display">
            <h2 id="current-name">RMF FM</h2>
            <p>Master Output</p>
        </div>

        <div class="controls">
            <div class="btn-ctrl" onclick="skip(-1)">
                <svg viewBox="0 0 24 24"><path d="M6,18V6H8V18H6M9.5,12L18,6V18L9.5,12Z"/></svg>
            </div>
            <div class="btn-ctrl main" onclick="toggle()">
                <svg viewBox="0 0 24 24"><path id="p-ico" d="M8,5.14V19.14L19,12.14L8,5.14Z"/></svg>
            </div>
            <div class="btn-ctrl" onclick="skip(1)">
                <svg viewBox="0 0 24 24"><path d="M16,18H18V6H16M6,18L14.5,12L6,6V18Z"/></svg>
            </div>
        </div>

        <div class="vol-box">
            <div class="vol-label">GAIN</div>
            <div class="knob-wrapper" id="knob" onmousedown="startRotate(event)" ontouchstart="startRotate(event)">
                <div class="knob-indicator" id="knob-pointer"></div>
                <div style="font-weight: 800; color: #444;" id="vol-txt">50%</div>
            </div>
        </div>
    </aside>
</div>

<audio id="player"></audio>

<script>
    const STATIONS = [
        { n: 'RMF FM', s: 'RMF FM', u: 'rmf_fm' },
        { n: 'RMF MAXXX', s: 'Maxxx', u: 'RMFMAXXX48' },
        { n: 'RMF 80s', s: '80s', u: 'rmf_80s' },
        { n: 'RMF 90s', s: '90s', u: 'rmf_90s' },
        { n: 'RMF 2000', s: '2000', u: 'rmf_2000' },
        { n: 'RMF CHILLOUT', s: 'Chillout', u: 'rmf_chillout' },
        { n: 'RMF CLASSIC', s: 'Classic', u: 'rmf_classic' },
        { n: 'RMF DANCE', s: 'Dance', u: 'rmf_dance' },
        { n: 'RMF GOLD', s: 'Gold', u: 'rmf_gold' },
        { n: 'RMF LATINO', s: 'Latino', u: 'rmf_latino' },
        { n: 'RMF LOVE', s: 'Love', u: 'rmf_love' },
        { n: 'RMF PARTY', s: 'Party', u: 'rmf_party' },
        { n: 'RMF POLSKI ROCK', s: 'P-Rock', u: 'rmf_polski_rock' },
        { n: 'RMF ROCK', s: 'Rock', u: 'rmf_rock' },
        { n: 'RMF SMOOTH JAZZ', s: 'Smooth', u: 'rmf_smooth_jazz' }
    ];

    const player = document.getElementById('player'), ico = document.getElementById('p-ico'), grid = document.getElementById('station-grid');
    let current = -1;
    let volume = 50;

    function clock() {
        const d = new Date();
        document.getElementById('timer').textContent = d.getHours().toString().padStart(2,'0') + ":" + d.getMinutes().toString().padStart(2,'0');
    }
    setInterval(clock, 1000); clock();

    STATIONS.forEach((s, i) => {
        const t = document.createElement('div');
        t.className = 'tile';
        t.innerHTML = `<div class="t-top">STATION 0${i+1}</div><div class="t-bottom">${s.s}</div>`;
        t.onclick = () => play(i);
        grid.appendChild(t);
    });

    function play(i) {
        current = i;
        document.querySelectorAll('.tile').forEach((t, idx) => t.classList.toggle('active', idx === i));
        document.getElementById('playing-now').innerHTML = `PRC: <span>${STATIONS[i].n}</span>`;
        document.getElementById('current-name').textContent = STATIONS[i].n;
        const streamBase = "https://rs201-krk.rmfstream.pl/";
        player.src = (STATIONS[i].n === 'RMF MAXXX') ? 'https://rs7-krk2-cyfronet.rmfstream.pl/RMFMAXXX48' : streamBase + STATIONS[i].u;
        player.play();
        ico.setAttribute('d', 'M14,19H18V5H14M6,19H10V5H6V19Z');
    }

    function toggle() {
        if(player.paused) { player.play(); ico.setAttribute('d', 'M14,19H18V5H14M6,19H10V5H6V19Z'); }
        else { player.pause(); ico.setAttribute('d', 'M8,5.14V19.14L19,12.14L8,5.14Z'); }
    }

    function skip(d) { let n = current + d; if(n >= 0 && n < STATIONS.length) play(n); }

    // LOGIKA POKRĘTŁA
    let isDragging = false;
    let startY = 0;

    function startRotate(e) {
        isDragging = true;
        startY = e.clientY || e.touches[0].clientY;
        document.addEventListener('mousemove', onRotate);
        document.addEventListener('mouseup', stopRotate);
        document.addEventListener('touchmove', onRotate);
        document.addEventListener('touchend', stopRotate);
    }

    function onRotate(e) {
        if (!isDragging) return;
        const currentY = e.clientY || e.touches[0].clientY;
        const diff = startY - currentY;
        volume = Math.min(Math.max(volume + diff, 0), 100);
        startY = currentY;
        updateKnob();
    }

    function stopRotate() { isDragging = false; }

    function updateKnob() {
        const rotation = (volume * 2.4) - 120; // -120 to 120 stopni
        document.getElementById('knob-pointer').style.transform = `rotate(${rotation}deg)`;
        document.getElementById('vol-txt').textContent = Math.round(volume) + "%";
        player.volume = volume / 100;
    }
    
    updateKnob(); // Init
</script>
</body>
</html>
