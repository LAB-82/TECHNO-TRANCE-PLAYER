<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RMF TERMINAL - PCB SCHEMATIC</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Megrim&family=Montserrat+Alternates:wght@400;600;700&display=swap');

        :root {
            --yellow: #fce300;
            --bg: #030303;
            --tile: #0a0a0a;
            --trace: rgba(252, 227, 0, 0.2);
            --trace-active: rgba(252, 227, 0, 0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            height: 100vh; width: 100vw; background: var(--bg); color: #fff; 
            font-family: 'Montserrat Alternates', sans-serif; overflow: hidden; 
        }

        /* PCB Background */
        .pcb-board {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0; pointer-events: none;
        }

        .app-container { display: flex; height: 100vh; position: relative; z-index: 1; }

        /* Obszar roboczy dla komponentów */
        .component-area { flex: 1.5; position: relative; overflow: hidden; }

        /* STYLIZACJA KAFELKÓW (UKŁADÓW SCALONYCH) */
        .tile {
            position: absolute; background: var(--tile); border: 1px solid #1a1a1a;
            padding: 8px; width: 80px; height: 50px; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: all 0.3s; z-index: 2;
        }

        /* Nóżki procesora */
        .tile::before {
            content: ""; position: absolute; width: calc(100% + 8px); height: 60%;
            left: -4px; top: 20%;
            background-image: repeating-linear-gradient(to bottom, transparent, transparent 2px, #333 2px, #333 4px);
            z-index: -1;
        }

        .tile .t-top { font-size: 8px; font-weight: 700; color: var(--yellow); text-align: center; text-transform: uppercase; }
        .tile.active { border-color: var(--yellow); box-shadow: 0 0 15px var(--yellow); }

        /* CENTRALNY UKŁAD */
        .central-cpu { width: 120px; height: 80px; border: 2px solid var(--yellow); background: #000; }
        .central-cpu .t-top { font-size: 11px; }

        /* PANEL STEROWANIA */
        .sidebar { 
            flex: 0.5; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; gap: 40px; border-left: 1px solid #1a1a1a;
            background: rgba(0,0,0,0.9); z-index: 3;
        }

        .logo-display {
            width: 90%; max-width: 250px; border: 2px solid var(--yellow);
            padding: 20px; text-align: center; background: #000;
        }
        .logo-display h2 { font-family: 'Megrim'; font-size: 32px; color: var(--yellow); }

        .controls { display: flex; align-items: center; gap: 20px; }
        .c-svg { width: 30px; height: 30px; fill: var(--yellow); cursor: pointer; }
        .c-play { width: 60px; height: 60px; border: 2px solid var(--yellow); border-radius: 50%; padding: 10px; }

        .vol-box { width: 200px; display: flex; align-items: center; gap: 10px; }
        input[type="range"] { flex: 1; accent-color: var(--yellow); }

        @media (max-width: 600px) {
            .app-container { flex-direction: column; }
            .sidebar { width: 100%; height: auto; padding: 20px 0; }
        }
    </style>
</head>
<body>

<svg class="pcb-board" id="pcb-svg"></svg>

<div class="app-container">
    <div class="component-area" id="canvas"></div>

    <aside class="sidebar" id="main-panel">
        <div class="logo-display">
            <h2 id="display-name">READY</h2>
            <p style="font-size: 8px; color: var(--yellow); margin-top: 5px;">SYSTEM BUS CONNECTED</p>
        </div>

        <div class="controls" id="control-hub">
            <svg class="c-svg" viewBox="0 0 24 24" onclick="skip(-1)"><path d="M6,18V6H8V18H6M9.5,12L18,6V18L9.5,12Z"/></svg>
            <svg class="c-svg c-play" viewBox="0 0 24 24" onclick="toggle()"><path id="p-ico" d="M8,5.14V19.14L19,12.14L8,5.14Z"/></svg>
            <svg class="c-svg" viewBox="0 0 24 24" onclick="skip(1)"><path d="M16,18H18V6H16M6,18L14.5,12L6,6V18Z"/></svg>
        </div>

        <div class="vol-box">
            <input type="range" id="v-range" min="0" max="100" value="50" oninput="setV(this.value)">
        </div>
    </aside>
</div>

<audio id="player"></audio>

<script>
    const STATIONS = [
        { n: 'TECH 88', u: 'https://laut.fm/tech88', pos: {t: 10, l: 15} },
        { n: 'HR 3 CLUB', u: 'https://laut.fm/hr3_clubnight', pos: {t: 15, l: 60} },
        { n: '1000 TECH', u: 'https://laut.fm/1000techno', pos: {t: 40, l: 10} },
        { n: 'GEHIRN TREIBER', u: 'https://laut.fm/gehirn-treiber-beat-radio', central: true, pos: {t: 45, l: 40} },
        { n: 'BEST TECH', u: 'https://laut.fm/best-of-techno', pos: {t: 75, l: 15} },
        { n: 'CHRIS BURN', u: 'https://laut.fm/chris_burn', pos: {t: 80, l: 55} },
        { n: 'DEEP HOUSE', u: 'https://laut.fm/deep-house-sounds', pos: {t: 5, l: 40} },
        { n: 'HOUSEBOMB', u: 'https://laut.fm/housebomb-fn', pos: {t: 70, l: 80} },
        { n: 'SYMBIOTIC', u: 'https://laut.fm/symbiotic-beats', pos: {t: 30, l: 80} }
    ];

    const canvas = document.getElementById('canvas');
    const svg = document.getElementById('pcb-svg');
    const panel = document.getElementById('main-panel');
    const hub = document.getElementById('control-hub');
    let current = -1;

    // RENDEROWANIE KAFELKÓW I ŚCIEŻEK
    function initPCB() {
        STATIONS.forEach((s, i) => {
            const t = document.createElement('div');
            t.className = s.central ? 'tile central-cpu' : 'tile';
            t.style.top = s.pos.t + '%';
            t.style.left = s.pos.l + '%';
            t.innerHTML = `<div class="t-top">${s.n}</div>`;
            t.onclick = () => play(i);
            t.id = 'tile-' + i;
            canvas.appendChild(t);
        });
        
        // Czekamy chwilę na wyrenderowanie DOM, by pobrać pozycje
        setTimeout(drawTraces, 100);
    }

    function drawTraces() {
        svg.innerHTML = '';
        const panelRect = panel.getBoundingClientRect();
        const hubRect = hub.getBoundingClientRect();

        STATIONS.forEach((s, i) => {
            const tile = document.getElementById('tile-' + i);
            const rect = tile.getBoundingClientRect();
            
            const startX = rect.left + rect.width / 2;
            const startY = rect.top + rect.height / 2;

            // 1. Ścieżka do panelu (Zasilanie/Dane)
            createTrace(startX, startY, panelRect.left, startY);

            // 2. Ścieżka od Hubu Sterowania do kafelka
            createTrace(hubRect.left, hubRect.top + hubRect.height/2, startX, startY, true);
        });
    }

    function createTrace(x1, y1, x2, y2, isControl = false) {
        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        const midX = x1 + (x2 - x1) / 2;
        
        // Stylizacja ścieżki z załamaniem 45 stopni
        const d = `M ${x1} ${y1} L ${midX} ${y1} L ${x2} ${y2}`;
        
        path.setAttribute("d", d);
        path.setAttribute("stroke", isControl ? "rgba(252,227,0,0.1)" : "rgba(252,227,0,0.2)");
        path.setAttribute("stroke-width", "1.5");
        path.setAttribute("fill", "none");
        svg.appendChild(path);
    }

    // LOGIKA ODTWARZACZA (BEZ ZMIAN)
    const player = document.getElementById('player'), ico = document.getElementById('p-ico'), dispName = document.getElementById('display-name');

    function play(i) {
        current = i;
        document.querySelectorAll('.tile').forEach((t, idx) => t.classList.toggle('active', idx === i));
        dispName.textContent = STATIONS[i].n;
        player.src = STATIONS[i].u;
        player.play();
        ico.setAttribute('d', 'M14,19H18V5H14M6,19H10V5H6V19Z');
    }

    function toggle() {
        if(current === -1) play(3);
        else if(player.paused) { player.play(); ico.setAttribute('d', 'M14,19H18V5H14M6,19H10V5H6V19Z'); }
        else { player.pause(); ico.setAttribute('d', 'M8,5.14V19.14L19,12.14L8,5.14Z'); }
    }

    function skip(d) {
        let n = current + d;
        if(n >= 0 && n < STATIONS.length) play(n);
    }

    function setV(v) { player.volume = v / 100; }

    window.addEventListener('resize', drawTraces);
    initPCB();
</script>
</body>
</html>
