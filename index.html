<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RMF TB-303 PRO TERMINAL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&family=Roboto+Condensed:wght@700&display=swap');

        :root {
            --metal-base: #c0c0c0;
            --metal-shine: linear-gradient(180deg, #e8e8e8 0%, #b0b0b0 45%, #7a7a7a 50%, #a0a0a0 55%, #dcdcdc 100%);
            --led-red: #ff3333;
            --led-bg: #400000;
            --lcd-green: #a4f000;
            --btn-metal: linear-gradient(145deg, #e0e0e0 0%, #a0a0a0 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; cursor: default !important; }
        
        body { 
            height: 100vh; width: 100vw; 
            background: #0a0a0a; 
            display: flex; justify-content: center; align-items: center;
            font-family: 'Roboto Condensed', sans-serif;
            overflow: hidden;
        }

        .vst-chassis {
            width: 98vw; height: 96vh;
            background: var(--metal-shine);
            background-image: url('https://www.transparenttextures.com/patterns/brushed-alum.png');
            border: 4px solid #1a1a1a;
            border-radius: 12px;
            box-shadow: 0 40px 100px rgba(0,0,0,1), inset 0 1px 3px rgba(255,255,255,0.8);
            padding: 35px;
            display: flex; flex-direction: column;
            position: relative;
        }

        .screw {
            position: absolute;
            width: 22px; height: 22px;
            background: radial-gradient(circle, #444 0%, #222 100%);
            border-radius: 50%;
            box-shadow: inset 1px 1px 3px rgba(0,0,0,0.8), 1px 1px 1px rgba(255,255,255,0.3);
            z-index: 20;
            display: flex; align-items: center; justify-content: center;
        }
        .screw::before {
            content: "";
            width: 14px; height: 14px;
            background: radial-gradient(circle at 30% 30%, #bbb, #777);
            border-radius: 50%;
            box-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }
        .screw::after {
            content: "";
            position: absolute;
            width: 8px; height: 8px;
            background: #222;
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
        }

        header { 
            display: flex; justify-content: space-between; align-items: baseline;
            margin-bottom: 25px; border-bottom: 2px solid rgba(0,0,0,0.2); padding-bottom: 15px;
        }
        .logo h1, #clock { 
            font-family: 'Orbitron'; 
            font-size: 38px; 
            color: #111; 
            letter-spacing: -1px; 
            margin: 0; 
            text-shadow: 1px 1px 1px rgba(255,255,255,0.5); 
        }
        .logo span { font-size: 11px; letter-spacing: 4px; color: #333; font-weight: bold; }

        #clock { font-size: 34px; }

        .main-workspace { display: flex; flex: 1; gap: 20px; min-height: 0; }

        .grid-stations, .pro-panel {
            background: var(--metal-shine);
            background-image: url('https://www.transparenttextures.com/patterns/brushed-alum.png');
            border: 1px solid #888;
            border-right: 2px solid #555;
            border-bottom: 2px solid #555;
            box-shadow: inset 1px 1px 1px rgba(255,255,255,0.8), 5px 5px 15px rgba(0,0,0,0.3);
            position: relative;
        }

        .grid-stations { 
            flex: 1.4; display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            grid-template-rows: repeat(3, 1fr); 
            gap: 15px; padding: 35px; border-radius: 4px;
        }

        .pro-panel { 
            flex: 0.6; display: flex; flex-direction: column; 
            padding: 35px 25px; border-radius: 4px; gap: 15px;
        }

        .bt-303, .sq-btn, .btn-run-stop {
            background: var(--btn-metal);
            background-image: url('https://www.transparenttextures.com/patterns/brushed-alum.png');
            border: 2px solid #000;
            border-radius: 4px;
            box-shadow: 
                inset 2px 2px 2px rgba(255,255,255,0.8), 
                inset -2px -2px 2px rgba(0,0,0,0.4),
                4px 4px 8px rgba(0,0,0,0.5);
            display: flex; align-items: center; justify-content: center;
            position: relative;
            transition: 0.1s;
            cursor: pointer !important;
        }

        .bt-303:active, .sq-btn:active, .btn-run-stop:active {
            transform: scale(0.98);
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.5);
        }

        .bt-303::before { 
            content: ""; position: absolute; top: 8px; width: 6px; height: 6px;
            background: var(--led-bg); border-radius: 50%; border: 1px solid #000;
        }
        .bt-303.active::before { background: var(--led-red); box-shadow: 0 0 8px var(--led-red); }
        
        .bt-303 .st-label { font-weight: 800; font-size: 13px; color: #222; text-transform: uppercase; margin-top: 10px; transition: 0.2s;}
        .bt-303.active .st-label { color: #000; text-shadow: 0 0 10px var(--lcd-green), 0 0 20px var(--lcd-green); }

        .lcd-bezel {
            background: #1a1a1a;
            padding: 4px;
            border-radius: 4px;
            box-shadow: inset 0 2px 5px #000, 0 1px 1px rgba(255,255,255,0.4);
        }
        .lcd-display {
            background: #080a08; height: 100px; border-radius: 2px;
            padding: 12px; font-family: 'Share Tech Mono', monospace;
            display: flex; flex-direction: column; justify-content: space-between;
            border: 1px solid #333;
        }
        .lcd-label { color: var(--lcd-green); font-size: 10px; opacity: 0.7; font-weight: bold; }
        #st-name { font-size: 22px; color: #ffffff; text-shadow: 0 0 10px var(--lcd-green); font-weight: bold; }
        .lcd-sub { color: var(--lcd-green); display: flex; justify-content: space-between; font-size: 11px; }

        .step-sequencer { background: #111; border-radius: 3px; padding: 10px; display: flex; flex-direction: column; gap: 5px; box-shadow: inset 0 2px 10px #000; }
        .step-row { display: flex; gap: 3px; height: 15px; }
        .step { flex: 1; background: #222; border-radius: 1px; }
        .step.on { background: #ff4400; box-shadow: 0 0 8px rgba(255,68,0,0.8); }

        .analog-controls { display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .volume-row { display: flex; align-items: center; gap: 10px; width: 100%; justify-content: center; }
        
        .sq-btn { width: 50px; height: 50px; flex-direction: column; }
        .sq-btn .dot { 
            width: 6px; height: 6px; 
            background: var(--led-bg); 
            border-radius: 50%; 
            margin-bottom: 4px; 
            border: 1px solid #000;
            transition: background 0.1s, box-shadow 0.1s;
        }
        .sq-btn.blink .dot {
            background: var(--led-red);
            box-shadow: 0 0 8px var(--led-red);
        }
        .sq-btn span { font-size: 9px; font-weight: bold; color: #111; }

        .fader-track { background: #000; height: 35px; flex: 1; border-radius: 2px; border: 1px solid #444; display: flex; align-items: center; padding: 0 5px; }
        input[type="range"] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 20px; height: 30px; background: #ccc; border: 1px solid #333; border-radius: 2px;
        }

        .btn-run-stop { width: 140px; height: 55px; font-weight: 900; color: #111; font-size: 18px; }
    </style>
</head>
<body>

<div class="vst-chassis">
    <div class="screw" style="top: 10px; left: 10px;"></div>
    <div class="screw" style="top: 10px; right: 10px;"></div>
    <div class="screw" style="top: 10px; left: 50%; transform: translateX(-50%);"></div>
    <div class="screw" style="bottom: 10px; left: 50%; transform: translateX(-50%);"></div>
    <div class="screw" style="bottom: 10px; left: 10px;"></div>
    <div class="screw" style="bottom: 10px; right: 10px;"></div>

    <header>
        <div class="logo">
            <h1>RMF TB-303</h1>
            <span>COMPUTER CONTROLLED // ACID ENGINE</span>
        </div>
        <div id="clock">00:00:00</div>
    </header>

    <div class="main-workspace">
        <div class="grid-stations" id="grid">
            <div class="screw" style="top: 10px; left: 10px;"></div>
            <div class="screw" style="top: 10px; right: 10px;"></div>
            <div class="screw" style="bottom: 10px; left: 10px;"></div>
            <div class="screw" style="bottom: 10px; right: 10px;"></div>
        </div>

        <aside class="pro-panel">
            <div class="screw" style="top: 10px; left: 10px;"></div>
            <div class="screw" style="top: 10px; right: 10px;"></div>
            <div class="screw" style="bottom: 10px; left: 10px;"></div>
            <div class="screw" style="bottom: 10px; right: 10px;"></div>

            <div class="lcd-bezel">
                <div class="lcd-display">
                    <div class="lcd-label">BANK: A1 / PATTERN: 08</div>
                    <div id="st-name">STATION IDLE</div>
                    <div class="lcd-sub">
                        <span>BITRATE: 128KBPS</span>
                        <span id="v-val">VOL: 50%</span>
                    </div>
                </div>
            </div>

            <div class="step-sequencer">
                <div class="step-row" id="r1"></div>
                <div class="step-row" id="r2"></div>
                <div class="step-row" id="r3"></div>
            </div>

            <div class="analog-controls">
                <div class="volume-row">
                    <div class="sq-btn" id="vol-down-btn">
                        <div class="dot"></div>
                        <span>DOWN</span>
                    </div>
                    <div class="fader-track">
                        <input type="range" id="v-range" min="0" max="100" value="50">
                    </div>
                    <div class="sq-btn" id="vol-up-btn">
                        <div class="dot"></div>
                        <span>UP</span>
                    </div>
                </div>
                <div class="btn-run-stop" id="run-stop-btn">STOP</div>
            </div>
        </aside>
    </div>
</div>

<audio id="player" crossorigin="anonymous"></audio>

<script>
    const STATIONS = [
        { n: 'RMF FM', u: 'rmf_fm' }, { n: 'RMF MAXXX', u: 'RMFMAXXX48' },
        { n: 'RMF 80s', u: 'rmf_80s' }, { n: 'RMF 90s', u: 'rmf_90s' },
        { n: 'RMF 2000', u: 'rmf_2000' }, { n: 'RMF CHILL', u: 'rmf_chillout' },
        { n: 'RMF CLASSIC', u: 'rmf_classic' }, { n: 'RMF DANCE', u: 'rmf_dance' },
        { n: 'RMF GOLD', u: 'rmf_gold' }, { n: 'RMF LATIN', u: 'rmf_latino' },
        { n: 'RMF LOVE', u: 'rmf_love' }, { n: 'RMF PARTY', u: 'rmf_party' },
        { n: 'RMF ROCK', u: 'rmf_polski_rock' }, { n: 'RMF ROCK+', u: 'rmf_rock' },
        { n: 'RMF JAZZ', u: 'rmf_smooth_jazz' }
    ];

    const grid = document.getElementById('grid');
    const player = document.getElementById('player');
    const stName = document.getElementById('st-name');
    const vRange = document.getElementById('v-range');

    STATIONS.forEach((s, i) => {
        const b = document.createElement('div');
        b.className = 'bt-303';
        b.innerHTML = `<div class="st-label">${s.n}</div>`;
        b.onclick = () => play(i);
        grid.appendChild(b);
    });

    [1, 2, 3].forEach(r => {
        const row = document.getElementById('r'+r);
        for(let i=0; i<16; i++) {
            const s = document.createElement('div');
            s.className = 'step';
            if(Math.random() > 0.85) s.classList.add('on');
            row.appendChild(s);
        }
    });

    function play(i) {
        document.querySelectorAll('.bt-303').forEach((b, idx) => b.classList.toggle('active', idx === i));
        stName.textContent = STATIONS[i].n;
        player.src = STATIONS[i].n === 'RMF MAXXX' ? 'https://rs7-krk2-cyfronet.rmfstream.pl/RMFMAXXX48' : "https://rs201-krk.rmfstream.pl/" + STATIONS[i].u;
        player.play();
    }

    function adj(d, btnId) { 
        let newVal = parseInt(vRange.value) + d;
        if(newVal > 100) newVal = 100;
        if(newVal < 0) newVal = 0;
        vRange.value = newVal; 
        setV(newVal); 
        
        const btn = document.getElementById(btnId);
        btn.classList.add('blink');
        setTimeout(() => btn.classList.remove('blink'), 150);
    }

    function setV(v) {
        player.volume = v / 100;
        document.getElementById('v-val').textContent = `VOL: ${v}%`;
    }

    document.getElementById('vol-down-btn').onclick = () => adj(-5, 'vol-down-btn');
    document.getElementById('vol-up-btn').onclick = () => adj(5, 'vol-up-btn');
    vRange.oninput = (e) => setV(e.target.value);

    document.getElementById('run-stop-btn').onclick = () => {
        player.pause();
        stName.textContent = "STATION STOPPED";
        document.querySelectorAll('.bt-303').forEach(b => b.classList.remove('active'));
    };

    setInterval(() => {
        document.getElementById('clock').textContent = new Date().toTimeString().split(' ')[0];
        document.querySelectorAll('.step').forEach(s => { if(Math.random()>0.97) s.classList.toggle('on'); });
    }, 1000);
</script>
</body>
</html>
