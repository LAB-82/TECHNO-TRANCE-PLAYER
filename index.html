<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TECHNO_TRANCE_PCB_PRO_V9_FIXED</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@300;600&display=swap');

        :root {
            --laminat: #020503;
            --miedz: #1a3a2a;
            --neon: #00f2ff;
            --gold: #b8a033;
            --chip-body: #111111;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--laminat); 
            color: var(--neon);
            font-family: 'JetBrains Mono', monospace;
            overflow: hidden;
        }

        #pcb-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; pointer-events: none;
        }

        .main-interface { display: flex; height: 100vh; position: relative; z-index: 2; }

        .motherboard { 
            flex: 2; position: relative; 
            background: radial-gradient(circle at 50% 50%, #051008 0%, #020503 100%);
        }

        /* UKŁAD SCALONY - TWOJA ORYGINALNA STRUKTURA V6 */
        .ic-chip {
            position: absolute; width: 160px; height: 80px;
            background: var(--chip-body); border-radius: 2px;
            cursor: pointer; box-shadow: 10px 15px 30px rgba(0,0,0,0.8);
            border-top: 1px solid #333; border-left: 1px solid #222;
            z-index: 10;
        }

        /* DODANE NÓŻKI (PINS) - REALIZM METALU ZGODNIE Z PROŚBĄ */
        .ic-chip::before {
            content: ''; position: absolute; top: -10px; left: 10px; right: 10px; bottom: -10px;
            background: repeating-linear-gradient(90deg, 
                #777 0px, #aaa 3px, #777 6px, 
                transparent 6px, transparent 18px);
            z-index: -1;
        }

        .notch {
            position: absolute; left: 0; top: 50%; transform: translateY(-50%);
            width: 12px; height: 20px; background: var(--laminat);
            border-radius: 0 10px 10px 0; border: 1px solid #222;
        }

        .chip-label {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100%; pointer-events: none;
        }

        .chip-id { font-family: 'Orbitron'; font-size: 11px; color: var(--gold); font-weight: 700; }
        .chip-spec { font-size: 7px; color: #444; margin-top: 5px; text-transform: uppercase; }

        .ic-chip.active {
            border-color: var(--neon);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.4);
        }

        /* PANEL KONTROLNY */
        .control-tower { 
            flex: 0.8; background: rgba(0,0,0,0.9); border-left: 3px solid #111;
            display: flex; flex-direction: column; z-index: 20;
        }

        .hud-header { padding: 25px; border-bottom: 2px solid #ff0055; font-family: 'Orbitron'; letter-spacing: 2px; }
        .terminal { 
            margin: 20px; padding: 15px; background: #000; flex: 1; 
            border: 1px solid #1a1a1a; font-size: 12px; color: #39ff14; 
            box-shadow: inset 0 0 10px rgba(57, 255, 20, 0.1);
        }

        .btn-matrix { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 20px; }
        .hw-btn {
            background: #080808; border: 1px solid #222; color: var(--neon);
            padding: 15px; cursor: pointer; font-family: 'Orbitron'; font-size: 11px;
        }
        .hw-btn:hover { background: var(--neon); color: #000; }

        .slider-wrap { padding: 30px; }
        input[type=range] { -webkit-appearance: none; width: 100%; background: #111; height: 4px; }
        input[type=range]::-webkit-slider-thumb { 
            -webkit-appearance: none; width: 20px; height: 35px; background: #ff0055; cursor: pointer; 
        }

        /* ŚCIEŻKI I ANIMACJA PRZEPŁYWU (ŚWIATEŁKO) */
        .trace-line {
            fill: none; stroke: var(--miedz); stroke-width: 2;
            transition: stroke 0.3s, filter 0.3s;
        }
        .trace-flow {
            fill: none; stroke: var(--neon); stroke-width: 2.5;
            stroke-dasharray: 15, 50;
            stroke-dashoffset: 100;
            filter: drop-shadow(0 0 5px var(--neon));
            visibility: hidden;
        }
        .active-trace { stroke: var(--neon); filter: drop-shadow(0 0 3px var(--neon)); }
        .active-flow { visibility: visible; animation: flowAnim 2s linear infinite; }

        @keyframes flowAnim { to { stroke-dashoffset: 0; } }
    </style>
</head>
<body>

<svg id="pcb-bg"></svg>

<div class="main-interface">
    <div class="motherboard" id="board"></div>

    <aside class="control-tower">
        <div class="hud-header">SYSTEM_AUDIT: OK</div>
        <div class="terminal" id="term-out">> LINK_STABLISHED...<br>> WAITING_FOR_IO</div>
        <div class="btn-matrix">
            <button class="hw-btn" onclick="skip(-1)">PREV</button>
            <button class="hw-btn" onclick="toggle()" style="border-color:#ff0055">SYNC</button>
            <button class="hw-btn" onclick="skip(1)">NEXT</button>
        </div>
        <div class="slider-wrap">
            <input type="range" min="0" max="1" step="0.01" value="0.5" oninput="setV(this.value)">
        </div>
    </aside>
</div>

<audio id="player" crossorigin="anonymous"></audio>

<script>
    const STATIONS = [
        { n: 'TECH 88', u: 'https://laut.fm/tech88', x: 8, y: 12 },
        { n: 'HR3 CLUB', u: 'https://laut.fm/hr3_clubnight', x: 42, y: 10 },
        { n: '1000 TECHNO', u: 'https://laut.fm/1000techno', x: 12, y: 38 },
        { n: 'GEHIRN TREIBER', u: 'https://laut.fm/gehirn-treiber-beat-radio', x: 45, y: 45 },
        { n: 'BEST OF TECHNO', u: 'https://laut.fm/best-of-techno', x: 10, y: 72 },
        { n: 'CHRIS BURN', u: 'https://laut.fm/chris_burn', x: 50, y: 78 },
        { n: 'DEEP HOUSE', u: 'https://laut.fm/deep-house-sounds', x: 75, y: 10 },
        { n: 'HOUSEBOMB', u: 'https://laut.fm/housebomb-fn', x: 72, y: 45 },
        { n: 'SYMBIOTIC', u: 'https://laut.fm/symbiotic-beats', x: 75, y: 75 }
    ];

    const svg = document.getElementById('pcb-bg');
    const board = document.getElementById('board');
    const player = document.getElementById('player');
    const term = document.getElementById('term-out');
    let currentIdx = -1;

    function buildHardware() {
        board.innerHTML = "";
        svg.innerHTML = "";
        
        const towerX = window.innerWidth * 0.72; // Punkt styku z panelem

        STATIONS.forEach((s, i) => {
            const ic = document.createElement('div');
            ic.className = 'ic-chip';
            ic.style.left = s.x + '%'; ic.style.top = s.y + '%';
            ic.id = `ic-${i}`;
            ic.innerHTML = `<div class="notch"></div><div class="chip-label">
                <span class="chip-id">${s.n}</span>
                <span class="chip-spec">BUS_SYNC_0${i}</span>
            </div>`;
            ic.onclick = () => mount(i);
            board.appendChild(ic);

            // RYSOWANIE ŚCIEŻEK (TRACES) ŁĄCZĄCYCH UKŁADY Z PANELEM
            const r = ic.getBoundingClientRect();
            const startX = r.left + r.width;
            const startY = r.top + r.height / 2;
            const endY = (window.innerHeight / STATIONS.length) * i + 50;

            const d = `M ${startX} ${startY} L ${startX + 50} ${startY} L ${startX + 100} ${endY} L ${towerX} ${endY}`;
            
            // Podstawa ścieżki
            const line = document.createElementNS("http://www.w3.org/2000/svg", "path");
            line.setAttribute("d", d);
            line.setAttribute("class", "trace-line");
            line.id = `line-${i}`;
            svg.appendChild(line);

            // Warstwa przepływu prądu (światełko)
            const flow = document.createElementNS("http://www.w3.org/2000/svg", "path");
            flow.setAttribute("d", d);
            flow.setAttribute("class", "trace-flow");
            flow.id = `flow-${i}`;
            svg.appendChild(flow);
        });
    }

    function mount(i) {
        currentIdx = i;
        document.querySelectorAll('.ic-chip').forEach((c, idx) => c.classList.toggle('active', idx === i));
        
        // Reset i aktywacja ścieżek
        document.querySelectorAll('.trace-line').forEach(l => l.classList.remove('active-trace'));
        document.querySelectorAll('.trace-flow').forEach(f => f.classList.remove('active-flow'));

        document.getElementById(`line-${i}`).classList.add('active-trace');
        document.getElementById(`flow-${i}`).classList.add('active-flow');

        term.innerHTML = `> MOUNTING_COMPONENT: ${STATIONS[i].n}<br>> DATA_FLOW: ACTIVE<br>> SYNC: OK`;
        
        player.pause();
        player.src = STATIONS[i].u;
        player.play().catch(e => { term.innerHTML += `<br>> ERROR: PRESS SYNC`; });
    }

    function toggle() { if(currentIdx === -1) mount(0); else player.paused ? player.play() : player.pause(); }
    function skip(dir) { let n = currentIdx + dir; if(n >= 0 && n < STATIONS.length) mount(n); }
    function setV(v) { player.volume = v; }

    window.onresize = buildHardware;
    window.onload = buildHardware;
</script>
</body>
</html>
