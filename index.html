<!DOCTYPE html><html lang="pl"><head>    <meta charset="UTF-8">    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">    <title>RMF NEON HUD</title>    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;600;700&display=swap');
        
        :root {            
            /* Kolorystyka z image_36594b.jpg */
            --cyan: #00f2ff;            
            --bg-dark: #050a0f;
            --glow: 0 0 15px rgba(0, 242, 255, 0.6);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }                
        body { 
            height: 100vh; width: 100vw; background: var(--bg-dark); color: #fff; 
            font-family: 'Rajdhani', sans-serif; overflow: hidden; padding: 2vh;
        }

        header {             
            height: 60px; display: flex; justify-content: space-between; align-items: center;            
            border-bottom: 2px solid var(--cyan); margin-bottom: 2vh;
            box-shadow: 0 5px 15px rgba(0, 242, 255, 0.1);
        }        
        .header-info { font-family: 'Orbitron', sans-serif; font-size: 20px; color: var(--cyan); text-shadow: var(--glow); }        
        .clock { font-family: 'Orbitron', sans-serif; color: var(--cyan); font-size: 22px; }

        .app-content { display: flex; flex: 1; gap: 2vw; height: calc(100vh - 120px); }

        .grid {             
            flex: 1.5; display: grid;             
            grid-template-columns: repeat(5, 1fr);             
            grid-template-rows: repeat(3, 1fr);             
            gap: 15px;         
        }

        /* TILE - STYLIZACJA RAMKI Z PUNKTAMI Z image_36594b.jpg */
        .tile {            
            background: rgba(0, 242, 255, 0.05); 
            border: 2px solid var(--cyan);
            border-radius: 12px;
            position: relative; cursor: pointer; transition: 0.3s;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* Charakterystyczne punkty (nody) na krawędziach kafelka */
        .tile::before, .tile::after {
            content: ''; position: absolute; width: 8px; height: 8px;
            background: var(--bg-dark); border: 2px solid var(--cyan); border-radius: 50%;
            z-index: 5; box-shadow: var(--glow);
        }
        .tile::before { top: -5px; left: 20%; }
        .tile::after { bottom: -5px; right: 20%; }

        .tile .t-top { font-size: 18px; font-weight: 700; color: #fff; text-shadow: 0 0 5px rgba(255,255,255,0.3); }        
        .tile .t-bottom { font-size: 11px; font-weight: 600; color: var(--cyan); text-transform: uppercase; }

        .tile.active { 
            background: rgba(0, 242, 255, 0.2); 
            box-shadow: inset 0 0 20px rgba(0, 242, 255, 0.4), var(--glow);
            transform: translateY(-2px);
        }

        .sidebar {             
            flex: 0.5; display: flex; flex-direction: column;             
            align-items: center; justify-content: space-around;
            background: rgba(0, 242, 255, 0.02); border: 2px solid var(--cyan);
            padding: 20px; border-radius: 20px;
        }

        .logo-display {            
            width: 100%; aspect-ratio: 1; border: 2px solid var(--cyan); border-radius: 50%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative; box-shadow: var(--glow);
        }
        /* Dodatkowy pierścień neonowy */
        .logo-display::after {
            content: ''; position: absolute; inset: 10px; border: 1px dashed var(--cyan); border-radius: 50%; opacity: 0.5;
        }
        
        .logo-display h2 { font-family: 'Orbitron', sans-serif; font-size: 32px; color: var(--cyan); text-shadow: var(--glow); }
        .logo-display p { font-size: 10px; color: var(--cyan); letter-spacing: 2px; }

        .controls { display: flex; gap: 20px; align-items: center; }        
        .c-svg { width: 45px; height: 45px; fill: var(--cyan); cursor: pointer; filter: drop-shadow(0 0 8px var(--cyan)); }
        .c-play { width: 70px; height: 70px; }

        .vol-box { width: 100%; }
        input[type="range"] { 
            width: 100%; appearance: none; background: #0a1a25; height: 8px; border-radius: 4px; border: 1px solid var(--cyan);
        }
        input[type="range"]::-webkit-slider-thumb {
            appearance: none; width: 18px; height: 18px; background: var(--cyan); border-radius: 50%; cursor: pointer; box-shadow: var(--glow);
        }
        /* TWOJA LOGIKA AT-MID - ZMIANA KOLORU NA BIAŁY */
        input[type="range"].at-mid::-webkit-slider-thumb { background: #fff; box-shadow: 0 0 15px #fff; }

        @media (max-width: 800px) {
            .app-content { flex-direction: column; }
            .grid { grid-template-columns: repeat(3, 1fr); }
        }
    </style></head><body>

<header>    <div class="header-info" id="playing-now">RMF FM</div>    <div class="clock" id="timer">00:00</div></header>

<div class="app-content">    <div class="grid" id="station-grid"></div>
    <aside class="sidebar">        <div class="logo-display">            <h2 id="logo-text">RMF</h2>            <p>NEON INTERFACE</p>        </div>
        <div class="controls">            <svg class="c-svg" viewBox="0 0 24 24" onclick="skip(-1)"><path d="M6,18V6H8V18H6M9.5,12L18,6V18L9.5,12Z"/></svg>            <svg class="c-svg c-play" viewBox="0 0 24 24" onclick="toggle()"><path id="p-ico" d="M8,5.14V19.14L19,12.14L8,5.14Z"/></svg>            <svg class="c-svg" viewBox="0 0 24 24" onclick="skip(1)"><path d="M16,18H18V6H16M6,18L14.5,12L6,6V18Z"/></svg>        </div>
        <div class="vol-box">            <input type="range" id="v-range" class="at-mid" min="0" max="100" value="50" oninput="setV(this.value)">        </div>    </aside></div>

<audio id="player"></audio>

<script>    
    const STATIONS = [        
        { n: 'RMF FM', s: 'RMF FM', u: 'rmf_fm' },        
        { n: 'RMF MAXXX', s: 'Maxxx', u: 'RMFMAXXX48' },        
        { n: 'RMF 80s', s: '80s', u: 'rmf_80s' },        
        { n: 'RMF 90s', s: '90s', u: 'rmf_90s' },        
        { n: 'RMF 2000', s: '2000', u: 'rmf_2000' },        
        { n: 'RMF CHILLOUT', s: 'Chillout', u: 'rmf_chillout' },        
        { n: 'RMF CLASSIC', s: 'Classic', u: 'rmf_classic' },        
        { n: 'RMF DANCE', s: 'Dance', u: 'rmf_dance' },        
        { n: 'RMF GOLD', s: 'Gold', u: 'rmf_gold' },        
        { n: 'RMF LATINO', s: 'Latino', u: 'rmf_latino' },        
        { n: 'RMF LOVE', s: 'Love', u: 'rmf_love' },        
        { n: 'RMF PARTY', s: 'Party', u: 'rmf_party' },        
        { n: 'RMF POLSKI ROCK', s: 'Polski Rock', u: 'rmf_polski_rock' },        
        { n: 'RMF ROCK', s: 'Rock', u: 'rmf_rock' },        
        { n: 'RMF SMOOTH JAZZ', s: 'Smooth Jazz', u: 'rmf_smooth_jazz' }    
    ];

    const player = document.getElementById('player'), ico = document.getElementById('p-ico'), grid = document.getElementById('station-grid'), vRange = document.getElementById('v-range');    
    let current = -1;

    function clock() {        
        const d = new Date();        
        document.getElementById('timer').textContent = d.getHours().toString().padStart(2,'0') + ":" + d.getMinutes().toString().padStart(2,'0');    
    }    
    setInterval(clock, 1000); clock();

    STATIONS.forEach((s, i) => {        
        const t = document.createElement('div');        
        t.className = 'tile';        
        t.innerHTML = `            
            <div class="t-top">RMF</div>            
            <div class="t-bottom">${s.s}</div>        `;        
        t.onclick = () => play(i);        
        grid.appendChild(t);    
    });

    function play(i) {        
        current = i;        
        document.querySelectorAll('.tile').forEach((t, idx) => t.classList.toggle('active', idx === i));        
        document.getElementById('playing-now').textContent = STATIONS[i].n;
        document.getElementById('logo-text').textContent = STATIONS[i].s.split(' ')[0];        
        const streamBase = "https://rs201-krk.rmfstream.pl/";        
        player.src = (STATIONS[i].n === 'RMF MAXXX') ? 'https://rs7-krk2-cyfronet.rmfstream.pl/RMFMAXXX48' : streamBase + STATIONS[i].u;        
        player.play();        
        ico.setAttribute('d', 'M14,19H18V5H14M6,19H10V5H6V19Z');    
    }

    function toggle() {        
        if(player.paused) { player.play(); ico.setAttribute('d', 'M14,19H18V5H14M6,19H10V5H6V19Z'); }        
        else { player.pause(); ico.setAttribute('d', 'M8,5.14V19.14L19,12.14L8,5.14Z'); }    
    }

    function skip(d) { let n = current + d; if(n >= 0 && n < STATIONS.length) play(n); }        
    function setV(v) {         
        player.volume = v / 100;        
        if(parseInt(v) === 50) vRange.classList.add('at-mid');        
        else vRange.classList.remove('at-mid');    
    }
</script></body></html>
