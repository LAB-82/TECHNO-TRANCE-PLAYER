<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Professional Studio Radio - Cali Edition</title>
    <style>
        :root {
            --leather: #2b1d1a;
            --panel-metal: #1a1a1a;
            --gold-light: #d4af37;
            --knob-gradient: conic-gradient(#333, #111, #444, #111, #333);
        }

        body {
            background: #0f0f0f;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Georgia', serif;
        }

        /* Główna obudowa - Vintage Leather */
        .amp-case {
            width: 900px;
            height: 520px;
            background: var(--leather);
            background-image: url('https://www.transparenttextures.com/patterns/black-linen.png');
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 50px 100px rgba(0,0,0,0.9), inset 0 0 40px rgba(0,0,0,0.8);
            border: 2px solid #3d2b1f;
            position: relative;
        }

        /* Górny panel sterowania - Szczotkowany Metal */
        .control-panel {
            height: 180px;
            background: #111;
            border-radius: 5px;
            border-bottom: 3px solid #000;
            display: flex;
            align-items: center;
            padding: 0 30px;
            gap: 25px;
            box-shadow: inset 0 2px 10px rgba(255,255,255,0.05);
        }

        /* Pokrętła (Knobs) */
        .knob-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .knob {
            width: 55px;
            height: 55px;
            background: var(--knob-gradient);
            border-radius: 50%;
            border: 3px solid #000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5), inset 0 2px 2px rgba(255,255,255,0.2);
            position: relative;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .knob::after {
            content: '';
            position: absolute;
            top: 5px;
            left: 50%;
            width: 3px;
            height: 12px;
            background: #fff;
            transform: translateX(-50%);
        }

        .knob-label {
            color: #888;
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
        }

        /* Sekcja Maskownicy (Grill Cloth) */
        .grill-section {
            margin-top: 20px;
            height: 280px;
            background: #c4a484; /* Kolor bazy rattanowej */
            background-image: 
                linear-gradient(90deg, rgba(0,0,0,0.1) 1px, transparent 1px),
                linear-gradient(rgba(0,0,0,0.1) 1px, transparent 1px);
            background-size: 15px 15px;
            border-radius: 5px;
            border: 5px solid #1a1a1a;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 60px rgba(0,0,0,0.5);
        }

        /* Logo Cali */
        .logo-plate {
            position: absolute;
            top: 50%;
            left: 100px;
            transform: translateY(-50%);
            background: #111;
            padding: 20px 40px;
            border-radius: 4px;
            border: 2px solid #333;
            box-shadow: 5px 10px 20px rgba(0,0,0,0.6);
        }

        .logo-text {
            color: #eee;
            font-size: 64px;
            font-style: italic;
            font-family: 'Times New Roman', serif;
            letter-spacing: -2px;
        }

        /* Suwaki Equalizera (Faders) */
        .eq-faders {
            margin-left: auto;
            display: flex;
            gap: 15px;
            background: #222;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333;
        }

        .fader-track {
            width: 6px;
            height: 100px;
            background: #000;
            border-radius: 3px;
            position: relative;
        }

        .fader-knob {
            width: 24px;
            height: 12px;
            background: #555;
            border: 1px solid #000;
            position: absolute;
            left: -9px;
            bottom: 40%;
            box-shadow: 0 2px 5px #000;
        }

        /* Status LED */
        .led {
            width: 12px;
            height: 12px;
            background: #300;
            border-radius: 50%;
            box-shadow: inset 0 2px 5px #000;
            transition: 0.3s;
        }

        .powered .led {
            background: #f00;
            box-shadow: 0 0 15px #f00, inset 0 2px 5px rgba(255,255,255,0.5);
        }

    </style>
</head>
<body>

<div class="amp-case" id="unit">
    <div class="control-panel">
        <div class="knob-container">
            <div class="led" id="pwrLed"></div>
            <div class="knob" id="pwrToggle"></div>
            <span class="knob-label">Power</span>
        </div>

        <div class="knob-container">
            <div class="knob" style="transform: rotate(45deg);"></div>
            <span class="knob-label">Volume</span>
        </div>

        <div class="knob-container">
            <div class="knob" style="transform: rotate(-30deg);"></div>
            <span class="knob-label">Tuning</span>
        </div>

        <div class="eq-faders">
            <div class="fader-track"><div class="fader-knob" style="bottom: 70%"></div></div>
            <div class="fader-track"><div class="fader-knob" style="bottom: 50%"></div></div>
            <div class="fader-track"><div class="fader-knob" style="bottom: 30%"></div></div>
            <div class="fader-track"><div class="fader-knob" style="bottom: 60%"></div></div>
        </div>
    </div>

    <div class="grill-section">
        <div class="logo-plate">
            <div class="logo-text">Cali</div>
        </div>
    </div>
</div>

<audio id="stream" src="https://stream.rcs.revma.com/gzwc1xcq042vv"></audio>

<script>
    const audio = document.getElementById('stream');
    const unit = document.getElementById('unit');
    const pwrLed = document.getElementById('pwrLed');
    let isOn = false;

    document.getElementById('pwrToggle').onclick = function() {
        isOn = !isOn;
        if(isOn) {
            audio.play();
            unit.classList.add('powered');
            this.style.transform = "rotate(20deg)";
        } else {
            audio.pause();
            unit.classList.remove('powered');
            this.style.transform = "rotate(0deg)";
        }
    };
</script>
</body>
</html>
