<!DOCTYPE html><html lang="pl"><head>    <meta charset="UTF-8">    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">    <title>RMF MILITARY HUD</title>    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;600;700&display=swap');
        
        :root {            
            /* Kolorystyka z image_a24026.jpg - Tactical Green/Lime */
            --lime: #c2d94c;            
            --bg: #0d1117;
            --hud-dark: rgba(194, 217, 76, 0.05);
            --glow: 0 0 12px rgba(194, 217, 76, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }                
        body { 
            height: 100vh; width: 100vw; background: var(--bg); color: #fff; 
            font-family: 'Rajdhani', sans-serif; overflow: hidden; padding: 2vh;
            /* Tło z siatką i liniami HUD */
            background-image: 
                radial-gradient(circle at center, #1a1f26 0%, #0d1117 100%),
                linear-gradient(rgba(194, 217, 76, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(194, 217, 76, 0.03) 1px, transparent 1px);
            background-size: 100% 100%, 30px 30px, 30px 30px;
        }

        header {             
            height: 60px; display: flex; justify-content: space-between; align-items: center;            
            border: 1px solid var(--lime); margin-bottom: 2vh; padding: 0 20px;
            background: var(--hud-dark); clip-path: polygon(0 0, 98% 0, 100% 30%, 100% 100%, 2% 100%, 0 70%);
        }        
        .header-info { font-family: 'Orbitron', sans-serif; font-size: 18px; color: var(--lime); text-shadow: var(--glow); letter-spacing: 2px; }        
        .clock { font-family: 'Orbitron', sans-serif; color: var(--lime); font-size: 20px; }

        .app-content { display: flex; flex: 1; gap: 2vw; height: calc(100vh - 120px); }

        .grid {             
            flex: 1.5; display: grid;             
            grid-template-columns: repeat(5, 1fr);             
            grid-template-rows: repeat(3, 1fr);             
            gap: 15px;         
        }

        /* KAFELEK - STYLIZACJA Z OBRAZKA */
        .tile {            
            background: var(--hud-dark); 
            border: 1px solid rgba(194, 217, 76, 0.2);
            position: relative; cursor: pointer; transition: 0.2s;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* Narożniki HUD na kafelkach */
        .tile::after {
            content: ''; position: absolute; inset: 0;
            background: 
                linear-gradient(to right, var(--lime) 2px, transparent 2px) 0 0 / 10px 2px no-repeat,
                linear-gradient(to bottom, var(--lime) 2px, transparent 2px) 0 0 / 2px 10px no-repeat,
                linear-gradient(to left, var(--lime) 2px, transparent 2px) 100% 100% / 10px 2px no-repeat,
                linear-gradient(to top, var(--lime) 2px, transparent 2px) 100% 100% / 2px 10px no-repeat;
            opacity: 0.3;
        }

        .tile .t-top { font-size: 16px; font-weight: 700; color: #fff; z-index: 2; }        
        .tile .t-bottom { font-size: 10px; color: var(--lime); text-transform: uppercase; z-index: 2; letter-spacing: 1px; }

        .tile.active { 
            background: rgba(194, 217, 76, 0.15); 
            border-color: var(--lime);
            box-shadow: inset 0 0 15px rgba(194, 217, 76, 0.2);
        }
        .tile.active::after { opacity: 1; }

        .sidebar {             
            flex: 0.5; display: flex; flex-direction: column;             
            align-items: center; justify-content: space-around;
            border: 1px solid rgba(194, 217, 76, 0.1); background: rgba(0, 0, 0, 0.3);
            padding: 20px; position: relative;
        }

        /* LOGO - OKRĄGŁY RADAR Z image_a24026.jpg */
        .logo-display {            
            width: 100%; aspect-ratio: 1; border: 2px solid var(--lime); border-radius: 50%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: 
                radial-gradient(circle, transparent 40%, rgba(194, 217, 76, 0.05) 41%, rgba(194, 217, 76, 0.05) 42%, transparent 43%),
                radial-gradient(circle, var(--hud-dark) 0%, transparent 80%);
            box-shadow: 0 0 20px rgba(194, 217, 76, 0.1);
        }
        
        .logo-display h2 { font-family: 'Orbitron', sans-serif; font-size: 24px; color: var(--lime); text-shadow: var(--glow); }
        .logo-display p { font-size: 9px; color: var(--lime); letter-spacing: 2px; opacity: 0.7; }

        .controls { display: flex; gap: 15px; align-items: center; }        
        .c-svg { width: 40px; height: 40px; fill: var(--lime); cursor: pointer; filter: drop-shadow(0 0 3px var(--lime)); }
        .c-play { width: 60px; height: 60px; }

        .vol-box { width: 100%; }
        input[type="range"] { 
            width: 100%; appearance: none; background: #1a1f26; height: 10px; border: 1px solid rgba(194, 217, 76, 0.3);
        }
        input[type="range"]::-webkit-slider-thumb {
            appearance: none; width: 12px; height: 18px; background: var(--lime); cursor: pointer;
        }
        /* KLASA AT-MID Z TWOJEJ LOGIKI */
        input[type="range"].at-mid::-webkit-slider-thumb { box-shadow: 0 0 15px var(--lime); background: #fff; }

        @media (max-width: 800px) {
            .app-content { flex-direction: column; }
            .grid { grid-template-columns: repeat(3, 1fr); }
        }
    </style></head><body>

<header>    <div class="header-info" id="playing-now">RMF FM</div>    <div class="clock" id="timer">00:00</div></header>

<div class="app-content">    <div class="grid" id="station-grid"></div>
    <aside class="sidebar">        <div class="logo-display">            <h2 id="logo-text">RMF</h2>            <p>TACTICAL AUDIO</p>        </div>
        <div class="controls">            <svg class="c-svg" viewBox="0 0 24 24" onclick="skip(-1)"><path d="M6,18V6H8V18H6M9.5,12L18,6V18L9.5,12Z"/></svg>            <svg class="c-svg c-play" viewBox="0 0 24 24" onclick="toggle()"><path id="p-ico" d="M8,5.14V19.14L19,12.14L8,5.14Z"/></svg>            <svg class="c-svg" viewBox="0 0 24 24" onclick="skip(1)"><path d="M16,18H18V6H16M6,18L14.5,12L6,6V18Z"/></svg>        </div>
        <div class="vol-box">            <input type="range" id="v-range" class="at-mid" min="0" max="100" value="50" oninput="setV(this.value)">        </div>    </aside></div>

<audio id="player"></audio>

<script>    
    const STATIONS = [        
        { n: 'RMF FM', s: 'RMF FM', u: 'rmf_fm' },        
        { n: 'RMF MAXXX', s: 'Maxxx', u: 'RMFMAXXX48' },        
        { n: 'RMF 80s', s: '80s', u: 'rmf_80s' },        
        { n: 'RMF 90s', s: '90s', u: 'rmf_90s' },        
        { n: 'RMF 2000', s: '2000', u: 'rmf_2000' },        
        { n: 'RMF CHILLOUT', s: 'Chillout', u: 'rmf_chillout' },        
        { n: 'RMF CLASSIC', s: 'Classic', u: 'rmf_classic' },        
        { n: 'RMF DANCE', s: 'Dance', u: 'rmf_dance' },        
        { n: 'RMF GOLD', s: 'Gold', u: 'rmf_gold' },        
        { n: 'RMF LATINO', s: 'Latino', u: 'rmf_latino' },        
        { n: 'RMF LOVE', s: 'Love', u: 'rmf_love' },        
        { n: 'RMF PARTY', s: 'Party', u: 'rmf_party' },        
        { n: 'RMF POLSKI ROCK', s: 'Polski Rock', u: 'rmf_polski_rock' },        
        { n: 'RMF ROCK', s: 'Rock', u: 'rmf_rock' },        
        { n: 'RMF SMOOTH JAZZ', s: 'Smooth Jazz', u: 'rmf_smooth_jazz' }    
    ];

    const player = document.getElementById('player'), ico = document.getElementById('p-ico'), grid = document.getElementById('station-grid'), vRange = document.getElementById('v-range');    
    let current = -1;

    function clock() {        
        const d = new Date();        
        document.getElementById('timer').textContent = d.getHours().toString().padStart(2,'0') + ":" + d.getMinutes().toString().padStart(2,'0');    
    }    
    setInterval(clock, 1000); clock();

    STATIONS.forEach((s, i) => {        
        const t = document.createElement('div');        
        t.className = 'tile';        
        t.innerHTML = `            
            <div class="t-top">RMF FM</div>            
            <div class="t-bottom">${s.s}</div>        `;        
        t.onclick = () => play(i);        
        grid.appendChild(t);    
    });

    function play(i) {        
        current = i;        
        document.querySelectorAll('.tile').forEach((t, idx) => t.classList.toggle('active', idx === i));        
        document.getElementById('playing-now').textContent = STATIONS[i].n;        
        document.getElementById('logo-text').textContent = STATIONS[i].s.split(' ')[0];
        const streamBase = "https://rs201-krk.rmfstream.pl/";        
        player.src = (STATIONS[i].n === 'RMF MAXXX') ? 'https://rs7-krk2-cyfronet.rmfstream.pl/RMFMAXXX48' : streamBase + STATIONS[i].u;        
        player.play();        
        ico.setAttribute('d', 'M14,19H18V5H14M6,19H10V5H6V19Z');    
    }

    function toggle() {        
        if(player.paused) { player.play(); ico.setAttribute('d', 'M14,19H18V5H14M6,19H10V5H6V19Z'); }        
        else { player.pause(); ico.setAttribute('d', 'M8,5.14V19.14L19,12.14L8,5.14Z'); }    
    }

    function skip(d) { let n = current + d; if(n >= 0 && n < STATIONS.length) play(n); }        
    function setV(v) {         
        player.volume = v / 100;        
        if(parseInt(v) === 50) vRange.classList.add('at-mid');        
        else vRange.classList.remove('at-mid');    
    }
</script></body></html>
