<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RMF TB-303 PRO TERMINAL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&family=Roboto+Condensed:wght@700&display=swap');

        :root {
            --metal-base: #c0c0c0;
            --metal-shine: linear-gradient(180deg, #e8e8e8 0%, #b0b0b0 45%, #7a7a7a 50%, #a0a0a0 55%, #dcdcdc 100%);
            --led-red: #ff3333;
            --led-bg: #400000;
            --lcd-green: #a4f000;
            --acid-bg: #1a1a1c;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        
        body { 
            height: 100vh; width: 100vw; 
            background: #0a0a0a; 
            display: flex; justify-content: center; align-items: center;
            font-family: 'Roboto Condensed', sans-serif;
            overflow: hidden;
        }

        /* OBUDOWA ANALOGOWA */
        .vst-chassis {
            width: 98vw; height: 96vh;
            background: var(--metal-shine);
            background-image: url('https://www.transparenttextures.com/patterns/brushed-alum.png');
            border: 5px solid #222;
            border-radius: 8px;
            box-shadow: 0 40px 100px rgba(0,0,0,1), inset 0 2px 4px rgba(255,255,255,0.7);
            padding: 25px;
            display: flex; flex-direction: column;
            position: relative;
        }

        header { 
            display: flex; justify-content: space-between; align-items: flex-end;
            margin-bottom: 20px; border-bottom: 2px solid rgba(0,0,0,0.3); padding-bottom: 15px;
        }
        .logo h1 { font-family: 'Orbitron'; font-size: 36px; color: #1a1a1a; letter-spacing: -2px; }
        .logo span { font-size: 11px; letter-spacing: 4px; color: #444; font-weight: bold; }

        .main-workspace { display: flex; flex: 1; gap: 20px; min-height: 0; }

        /* LEWA STRONA - GRID STACJI */
        .grid-stations { 
            flex: 1.4; display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            grid-template-rows: repeat(3, 1fr); 
            gap: 15px; 
            background: rgba(0,0,0,0.1); padding: 20px; border-radius: 10px;
            box-shadow: inset 2px 2px 10px rgba(0,0,0,0.3);
            border: 1px solid rgba(0,0,0,0.15);
        }

        .bt-303 {
            background: linear-gradient(145deg, #eeeeee, #bcbcbc);
            border: 1px solid #888;
            border-radius: 4px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; position: relative;
            box-shadow: 0 5px 0 #777, 0 8px 15px rgba(0,0,0,0.3);
            transition: 0.05s;
        }

        .bt-303::before { 
            content: ""; position: absolute; top: 8px; width: 7px; height: 7px;
            background: var(--led-bg); border-radius: 50%; border: 1px solid #000;
        }

        .bt-303:active { transform: translateY(3px); box-shadow: 0 2px 0 #555; }
        .bt-303.active { background: #fff; }
        .bt-303.active::before { background: var(--led-red); box-shadow: 0 0 10px var(--led-red); }

        .bt-303 .n-top { font-weight: 800; font-size: 20px; margin-top: 10px; color: #111; }
        .bt-303 .n-bot { font-size: 10px; color: #555; text-transform: uppercase; }

        /* PRAWY PANEL - DOPRACOWANY */
        .pro-panel { 
            flex: 0.6; display: flex; flex-direction: column; 
            background: var(--metal-shine);
            background-image: url('https://www.transparenttextures.com/patterns/brushed-alum.png');
            border-radius: 8px; padding: 20px;
            border: 3px solid #666; box-shadow: 10px 10px 30px rgba(0,0,0,0.5);
            gap: 15px;
        }

        .lcd-display {
            background: #0a0c0a; height: 100px; border-radius: 4px; border: 3px solid #444;
            padding: 10px; font-family: 'Share Tech Mono', monospace; color: var(--lcd-green);
            box-shadow: inset 0 0 15px #000; display: flex; flex-direction: column; justify-content: space-between;
        }

        .step-sequencer {
            flex: 1; background: #111; border-radius: 4px; border: 1px solid #444;
            padding: 10px; display: flex; flex-direction: column; gap: 5px;
        }
        .step-row { display: flex; gap: 2px; height: 25px; }
        .step { flex: 1; background: #222; border-radius: 2px; border-bottom: 2px solid #000; }
        .step.on { background: #ff4400; box-shadow: 0 0 8px rgba(255,68,0,0.5); }

        /* NOWE ELEMENTY PANELU */
        .controls-row { display: flex; justify-content: space-around; align-items: center; padding: 10px 0; }
        
        .edit-button {
            width: 35px; height: 50px;
            background: #fdfdfd; border: 1px solid #999;
            border-radius: 2px; cursor: pointer;
            box-shadow: 0 4px 0 #888, 0 6px 10px rgba(0,0,0,0.2);
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            padding: 5px 0; transition: 0.1s;
        }
        .edit-button:active { transform: translateY(3px); box-shadow: 0 1px 0 #888; }
        .edit-button .led-mini { width: 5px; height: 5px; background: var(--led-bg); border-radius: 50%; }
        .edit-button:active .led-mini { background: var(--led-red); box-shadow: 0 0 5px var(--led-red); }
        .edit-label { font-size: 8px; font-weight: bold; color: #333; }

        .knob-volume {
            width: 55px; height: 55px; border-radius: 50%;
            background: radial-gradient(circle, #ddd 0%, #999 100%);
            border: 2px solid #555; position: relative;
            box-shadow: 0 6px 12px rgba(0,0,0,0.4);
            cursor: crosshair; transition: transform 0.2s;
        }
        .knob-volume::before {
            content: ""; position: absolute; top: 5px; left: 50%; width: 4px; height: 15px;
            background: #333; transform: translateX(-50%); border-radius: 2px;
        }

        .run-stop-container { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .btn-run-stop {
            width: 70px; height: 70px;
            background: #e0e0e0; border: 2px solid #777;
            border-radius: 6px; cursor: pointer;
            box-shadow: 0 6px 0 #999, 0 10px 20px rgba(0,0,0,0.3);
            display: flex; align-items: center; justify-content: center;
            font-family: 'Roboto Condensed'; font-weight: 900; font-size: 14px; color: #222;
            transition: 0.1s;
        }
        .btn-run-stop:active { transform: translateY(4px); box-shadow: 0 2px 0 #999; }
        .btn-run-stop span { border: 2px solid #222; padding: 2px 5px; }

        .master-fader { 
            background: #000; height: 40px; border-radius: 4px; border: 1px solid #333; 
            display: flex; align-items: center; padding: 0 10px;
        }
        input[type="range"] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 25px; height: 34px; background: #ccc;
            border: 1px solid #111; border-radius: 2px; box-shadow: inset 0 0 8px #fff;
        }

    </style>
</head>
<body>

<div class="vst-chassis">
    <header>
        <div class="logo">
            <h1>RMF TB-303</h1>
            <span>COMPUTER CONTROLLED // ACID ENGINE</span>
        </div>
        <div id="clock" style="font-family: 'Share Tech Mono'; font-size: 32px; color: #1a1a1a; text-shadow: 1px 1px 0 #fff;">00:00:00</div>
    </header>

    <div class="main-workspace">
        <div class="grid-stations" id="grid"></div>

        <aside class="pro-panel">
            <div class="lcd-display">
                <div style="font-size: 10px; opacity: 0.5;">BANK: A1 / PATTERN: 08</div>
                <div id="st-name" style="font-size: 20px; letter-spacing: 1px; color: #fff; text-shadow: 0 0 10px var(--lcd-green);">STATION IDLE</div>
                <div style="display: flex; justify-content: space-between; font-size: 12px;">
                    <span>BITRATE: 128KBPS</span>
                    <span id="v-val">VOL: 50%</span>
                </div>
            </div>

            <div class="step-sequencer">
                <div style="font-size: 8px; color: #444; margin-bottom: 2px;">STEP SEQUENCER VISUALIZER</div>
                <div class="step-row" id="r1"></div>
                <div class="step-row" id="r2"></div>
                <div class="step-row" id="r3"></div>
            </div>

            <div class="controls-row">
                <div class="edit-button" onclick="adj(-5)">
                    <div class="led-mini"></div>
                    <div class="edit-label">VOL -</div>
                </div>
                <div class="edit-button" onclick="adj(5)">
                    <div class="led-mini"></div>
                    <div class="edit-label">VOL +</div>
                </div>
                <div style="text-align: center;">
                    <div class="knob-volume" id="pan-knob" style="transform: rotate(0deg);"></div>
                    <div style="font-size: 9px; font-weight: bold; margin-top: 5px;">PAN L/R</div>
                </div>
            </div>

            <div class="master-fader">
                <input type="range" id="v-range" min="0" max="100" value="50" oninput="setV(this.value)">
            </div>

            <div class="run-stop-container">
                <div class="btn-run-stop" onclick="stopRadio()">
                    <span>RUN / STOP</span>
                </div>
            </div>
        </aside>
    </div>
</div>

<audio id="player"></audio>

<script>
    const STATIONS = [
        { n: 'RMF FM', s: '01', u: 'rmf_fm' },
        { n: 'RMF MAXXX', s: '02', u: 'RMFMAXXX48' },
        { n: 'RMF 80s', s: '03', u: 'rmf_80s' },
        { n: 'RMF 90s', s: '04', u: 'rmf_90s' },
        { n: 'RMF 2000', s: '05', u: 'rmf_2000' },
        { n: 'RMF CHILL', s: '06', u: 'rmf_chillout' },
        { n: 'RMF CLASS', s: '07', u: 'rmf_classic' },
        { n: 'RMF DANCE', s: '08', u: 'rmf_dance' },
        { n: 'RMF GOLD', s: '09', u: 'rmf_gold' },
        { n: 'RMF LATIN', s: '10', u: 'rmf_latino' },
        { n: 'RMF LOVE', s: '11', u: 'rmf_love' },
        { n: 'RMF PARTY', s: '12', u: 'rmf_party' },
        { n: 'RMF ROCK', s: '13', u: 'rmf_polski_rock' },
        { n: 'RMF ROCK+', s: '14', u: 'rmf_rock' },
        { n: 'RMF JAZZ', s: '15', u: 'rmf_smooth_jazz' }
    ];

    const grid = document.getElementById('grid');
    const player = document.getElementById('player');
    const stName = document.getElementById('st-name');

    STATIONS.forEach((s, i) => {
        const b = document.createElement('div');
        b.className = 'bt-303';
        b.innerHTML = `<div class="n-top">${s.s}</div><div class="n-bot">${s.n.split(' ')[1] || 'FM'}</div>`;
        b.onclick = () => play(i);
        grid.appendChild(b);
    });

    [1, 2, 3].forEach(r => {
        const row = document.getElementById('r'+r);
        for(let i=0; i<16; i++) {
            const s = document.createElement('div');
            s.className = 'step';
            if(Math.random() > 0.8) s.classList.add('on');
            row.appendChild(s);
        }
    });

    function play(i) {
        document.querySelectorAll('.bt-303').forEach((b, idx) => b.classList.toggle('active', idx === i));
        stName.textContent = STATIONS[i].n;
        player.src = STATIONS[i].n === 'RMF MAXXX' ? 'https://rs7-krk2-cyfronet.rmfstream.pl/RMFMAXXX48' : "https://rs201-krk.rmfstream.pl/" + STATIONS[i].u;
        player.play();
    }

    function stopRadio() { 
        player.pause(); 
        player.src = ""; 
        stName.textContent = "STATION STOPPED";
        document.querySelectorAll('.bt-303').forEach(b => b.classList.remove('active'));
    }

    function setV(v) { 
        player.volume = v/100; 
        document.getElementById('v-val').textContent = `VOL: ${v}%`; 
    }

    function adj(d) { 
        const r = document.getElementById('v-range'); 
        let newVal = parseInt(r.value) + d;
        if(newVal > 100) newVal = 100;
        if(newVal < 0) newVal = 0;
        r.value = newVal; 
        setV(newVal); 
    }

    // Obsługa wizualna potencjometru panorama
    let panPos = 0;
    document.getElementById('pan-knob').onclick = function() {
        panPos = (panPos + 45);
        if(panPos > 135) panPos = -135;
        this.style.transform = `rotate(${panPos}deg)`;
    };

    setInterval(() => {
        const d = new Date();
        document.getElementById('clock').textContent = d.toTimeString().split(' ')[0];
        document.querySelectorAll('.step').forEach(s => { if(Math.random()>0.95) s.classList.toggle('on'); });
    }, 1000);
</script>
</body>
</html>
