<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DI.FM AUDYT FINAL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap');
        :root {
            --neon-blue: #00f2ff;
            --neon-yellow: #fce300;
            --bg: #000;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg); color: white;
            font-family: 'Montserrat', sans-serif;
            height: 100vh; display: flex; flex-direction: column; padding: 2vh; overflow: hidden;
        }
        header { display: flex; justify-content: space-between; border-bottom: 1px solid #1a1a1a; padding-bottom: 10px; margin-bottom: 2vh; }
        .h-text { color: var(--neon-blue); font-size: 14px; letter-spacing: 2px; text-transform: uppercase; }

        .app-container { display: flex; flex: 1; gap: 20px; min-height: 0; }
        
        /* GRID KAFELKÓW */
        .grid {
            flex: 1.6; display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 12px;
        }
        .tile {
            background: #0a0a0a; border: 1.5px solid #1a1a1a; border-radius: 12px;
            display: flex; align-items: center; justify-content: center; text-align: center;
            cursor: pointer; position: relative; transition: 0.2s; padding: 8px;
        }
        .tile span { color: var(--neon-blue); font-size: 11px; font-weight: 700; text-transform: uppercase; z-index: 5; }
        
        /* AKTYWNA STACJA - AURA ZE ZDJĘCIA */
        .tile.active { border-color: var(--neon-blue); box-shadow: 0 0 20px rgba(0, 242, 255, 0.5); }
        .tile.active::after {
            content: ''; position: absolute; top: -10px; left: -10px; right: -10px; bottom: -10px;
            background: radial-gradient(circle, rgba(0, 242, 255, 0.3) 0%, transparent 70%);
            animation: pulse 2s infinite; z-index: 1;
        }
        @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.8; } }

        /* PANEL BOCZNY */
        .sidebar { flex: 0.6; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 30px; }
        .display {
            width: 100%; aspect-ratio: 1/1; border: 6px solid var(--neon-yellow); border-radius: 25px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 0 40px rgba(252, 227, 0, 0.3); background: #000; text-align: center;
        }
        .display h2 { color: var(--neon-yellow); font-size: 36px; font-weight: 900; text-shadow: 0 0 15px var(--neon-yellow); text-transform: uppercase; line-height: 1; }

        .controls { display: flex; align-items: center; gap: 30px; }
        .c-btn { cursor: pointer; fill: none; stroke: var(--neon-blue); stroke-width: 2; width: 35px; height: 35px; }
        .play-btn { fill: var(--neon-blue); width: 70px; height: 70px; filter: drop-shadow(0 0 10px var(--neon-blue)); }

        @media (max-width: 800px) { .app-container { flex-direction: column; } .grid { grid-template-columns: repeat(3, 1fr); } }
    </style>
</head>
<body>

<header>
    <div class="h-text" id="status">DI.FM / TERMINAL</div>
    <div class="h-text" id="clock">00:00</div>
</header>

<div class="app-container">
    <div class="grid" id="grid"></div>
    <aside class="sidebar">
        <div class="display">
            <h2 id="d-main">TECHNO</h2>
            <h2 id="d-sub">MINI</h2>
        </div>
        <div class="controls">
            <svg class="c-btn" viewBox="0 0 24 24" onclick="skip(-1)"><path d="M19 20L9 12L19 4V20Z M5 19V5"/></svg>
            <svg class="c-btn play-btn" viewBox="0 0 24 24" onclick="toggle()"><path id="p-ico" d="M8 5v14l11-7z"/></svg>
            <svg class="c-btn" viewBox="0 0 24 24" onclick="skip(1)"><path d="M5 4L15 12L5 20V4Z M19 5V19"/></svg>
        </div>
    </aside>
</div>

<audio id="player"></audio>

<script>
    // PEŁNY AUDYT DANYCH - ZGODNIE Z TWOJĄ LISTĄ
    const STATIONS = [
        // TECHNO (6 stacji)
        { tileName: "Techno", display: "TECHNO", url: "https://hirschmilch.de:7000/techno.mp3" },
        { tileName: "Detroit Techno", display: "DETROIT", url: "https://ice1.somafm.com/missioncontrol-128-mp3" },
        { tileName: "Minimal Techno", display: "MINIMAL", url: "https://hirschmilch.de:7000/minimal.mp3" },
        { tileName: "Hard Techno", display: "HARD", url: "http://stream.laut.fm/hard-techno" },
        { tileName: "Dark Techno", display: "DARK", url: "http://stream.laut.fm/darktechno" },
        { tileName: "Underground Techno", display: "UNDGRND", url: "https://ice6.somafm.com/deepspaceone-128-mp3" },
        
        // TRANCE (6 stacji)
        { tileName: "Trance", display: "TRANCE", url: "https://hirschmilch.de:7000/trance.mp3" },
        { tileName: "Vocal Trance", display: "VOCAL", url: "https://p-vocaltrance.radioca.st/stream" },
        { tileName: "Uplifting Trance", display: "UPLIFT", url: "http://stream.uplifting-trance.com/;stream.mp3" },
        { tileName: "Epic Trance", display: "EPIC", url: "http://tx.clast.pro/8240/stream" },
        { tileName: "Progressive Trance", display: "PROG", url: "https://hirschmilch.de:7000/prog-house.mp3" },
        { tileName: "Psy Trance", display: "PSY", url: "https://hirschmilch.de:7000/psytrance.mp3" }
    ];

    const grid = document.getElementById('grid'), player = document.getElementById('player'), ico = document.getElementById('p-ico');
    const dMain = document.getElementById('d-main'), dStatus = document.getElementById('status');
    let cur = -1;

    // Budowanie kafelków z właściwymi nazwami
    STATIONS.forEach((s, i) => {
        const div = document.createElement('div');
        div.className = 'tile';
        div.innerHTML = `<span>${s.tileName}</span>`;
        div.onclick = () => play(i);
        grid.appendChild(div);
    });

    function play(i) {
        cur = i;
        const s = STATIONS[i];
        player.src = s.url;
        player.play().catch(() => {});
        
        document.querySelectorAll('.tile').forEach((t, idx) => t.classList.toggle('active', idx === i));
        
        // WYNIK AUDYTU:
        dMain.innerText = s.display;      // To idzie na żółty ekran (skrót/gatunek)
        dStatus.innerText = "GRA: " + s.tileName.toUpperCase(); // To idzie na górny status (pełna nazwa)
        ico.setAttribute('d', 'M6 19h4V5H6v14zm8-14v14h4V5h-4z');
    }

    function toggle() {
        if (cur === -1) play(0);
        else if (player.paused) { player.play(); ico.setAttribute('d', 'M6 19h4V5H6v14zm8-14v14h4V5h-4z'); }
        else { player.pause(); ico.setAttribute('d', 'M8 5v14l11-7z'); }
    }

    function skip(dir) {
        let n = cur + dir;
        if (n < 0) n = STATIONS.length - 1;
        if (n >= STATIONS.length) n = 0;
        play(n);
    }

    function updateClock() {
        const n = new Date();
        document.getElementById('clock').innerText = n.getHours().toString().padStart(2,'0')+":"+n.getMinutes().toString().padStart(2,'0');
    }
    setInterval(updateClock, 1000); updateClock();
</script>
</body>
</html>
