<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>GEHIRN TREIBER - ULTIMATE SCI-FI HUD</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap');

        :root {
            --cyan: #00f2ff;
            --magenta: #ff00e5;
            --blue: #0044ff;
            --dark-blue: #001a2e;
            --bg: #010408;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--cyan);
            font-family: 'Rajdhani', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            /* Siatka tła z nowej grafiki */
            background-image: 
                radial-gradient(circle at center, #0a1f35 0%, #010408 100%),
                linear-gradient(rgba(0, 242, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.02) 1px, transparent 1px);
            background-size: 100% 100%, 25px 25px, 25px 25px;
        }

        .hud-container {
            width: 98vw;
            height: 95vh;
            display: grid;
            grid-template-columns: 300px 1fr 300px;
            grid-template-rows: 1fr 250px;
            gap: 20px;
            padding: 20px;
            position: relative;
        }

        /* CENTRALNY RADAR / VISUALIZER */
        .central-core {
            grid-column: 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .radar-ring {
            position: absolute;
            border: 1px solid var(--cyan);
            border-radius: 50%;
            opacity: 0.3;
            box-shadow: 0 0 15px var(--blue);
        }

        .radar-ring.outer { width: 450px; height: 450px; border-style: dashed; animation: rotate 30s linear infinite; }
        .radar-ring.mid { width: 300px; height: 300px; border-width: 4px; border-color: rgba(0, 242, 255, 0.1); }
        .radar-ring.inner { 
            width: 150px; height: 150px; 
            background: radial-gradient(circle, var(--dark-blue) 0%, transparent 80%);
            border: 2px solid var(--cyan);
            box-shadow: 0 0 30px var(--cyan);
            display: flex;
            justify-content: center;
            align-items: center;
            animation: pulse 2s ease-in-out infinite;
        }

        /* LEWY PANEL - LISTA STACJI (Styl kapsuły) */
        .station-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            border-left: 1px solid var(--cyan);
            padding-left: 15px;
        }

        .node-capsule {
            height: 45px;
            background: rgba(0, 242, 255, 0.03);
            border: 1px solid rgba(0, 242, 255, 0.2);
            border-radius: 0 25px 25px 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            padding: 0 20px;
            transition: 0.3s;
            position: relative;
        }

        .node-capsule::before {
            content: ''; position: absolute; left: -2px; width: 4px; height: 100%; background: var(--cyan);
        }

        .node-capsule:hover, .node-capsule.active {
            background: rgba(0, 242, 255, 0.15);
            border-color: var(--cyan);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.3);
            transform: translateX(10px);
        }

        .node-capsule.active { border-color: var(--magenta); color: var(--magenta); }

        /* DOLNY PANEL - ANALITYKA DANYCH */
        .data-footer {
            grid-column: 1 / 4;
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            gap: 20px;
            background: rgba(0, 0, 0, 0.5);
            border-top: 1px solid rgba(0, 242, 255, 0.1);
            padding: 20px;
        }

        .graph-box {
            border: 1px solid rgba(0, 242, 255, 0.1);
            position: relative;
            padding: 10px;
            overflow: hidden;
        }

        .bar-visualizer {
            display: flex;
            align-items: flex-end;
            gap: 2px;
            height: 50px;
        }

        .bar { width: 4px; background: var(--cyan); box-shadow: 0 0 5px var(--cyan); }

        /* KONTROLER VOLUME - STYL SUWAKA Z GRAFIKI */
        .sidebar-right {
            display: flex;
            flex-direction: column;
            gap: 30px;
            border-right: 1px solid var(--cyan);
            padding-right: 15px;
            text-align: right;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            background: var(--dark-blue);
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 15px; height: 30px;
            background: var(--cyan);
            border: 1px solid white;
            box-shadow: 0 0 15px var(--cyan);
            cursor: pointer;
        }

        .label-micro { font-size: 9px; letter-spacing: 2px; opacity: 0.5; text-transform: uppercase; }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.05); opacity: 1; } }

    </style>
</head>
<body>

<div class="hud-container">
    <!-- LEWY PANEL -->
    <div class="station-list">
        <div class="label-micro">Station_Uplink_Node</div>
        <div id="nodes"></div>
    </div>

    <!-- CENTRUM -->
    <div class="central-core">
        <div class="radar-ring outer"></div>
        <div class="radar-ring mid"></div>
        <div class="radar-ring inner">
            <div id="core-text" style="font-family: 'Orbitron'; font-weight: 900;">IDLE</div>
        </div>
        <div style="margin-top: 300px; text-align: center;">
            <h1 style="font-family: 'Orbitron'; letter-spacing: 10px; font-size: 24px;">GEHIRN TREIBER</h1>
            <div class="label-micro" style="margin-top: 5px;">Frequency_Modulation_System</div>
        </div>
    </div>

    <!-- PRAWY PANEL -->
    <div class="sidebar-right">
        <div class="label-micro">System_Master_Volume</div>
        <input type="range" id="vol" min="0" max="100" value="70" oninput="updateVol(this.value)">
        
        <div style="margin-top: 20px;">
            <div class="label-micro">Playback_Control</div>
            <div style="display: flex; gap: 10px; margin-top: 10px; justify-content: flex-end;">
                <button onclick="audio.play()" style="background: none; border: 1px solid var(--cyan); color: var(--cyan); padding: 5px 15px; cursor: pointer; font-family: 'Orbitron';">PLAY</button>
                <button onclick="audio.pause()" style="background: none; border: 1px solid var(--magenta); color: var(--magenta); padding: 5px 15px; cursor: pointer; font-family: 'Orbitron';">STOP</button>
            </div>
        </div>

        <div style="margin-top: auto;">
            <div class="label-micro">Signal_Stability</div>
            <div id="signal-txt" style="font-size: 24px; font-family: 'Orbitron';">88.4%</div>
        </div>
    </div>

    <!-- FOOTER ANALITYCZNY -->
    <footer class="data-footer">
        <div class="graph-box">
            <div class="label-micro">Audio_Spectrum</div>
            <div class="bar-visualizer" id="bars"></div>
        </div>
        <div class="graph-box" style="display: flex; justify-content: center; align-items: center;">
            <svg width="100%" height="60">
                <path d="M0,30 Q50,0 100,30 T200,30 T300,30 T400,30" fill="none" stroke="var(--cyan)" stroke-width="1" />
                <path d="M0,35 Q50,5 100,35 T200,35 T300,35 T400,35" fill="none" stroke="var(--magenta)" stroke-width="1" opacity="0.3" />
            </svg>
        </div>
        <div class="graph-box">
            <div class="label-micro">Gehirn_Data_Log</div>
            <div style="font-size: 10px; opacity: 0.6; line-height: 1.2;">
                > TRACE_SIGNAL_FOUND...<br>
                > DECRYPTING_GEHIRN_STREAM...<br>
                > BUFFER_STATUS_OPTIMAL
            </div>
        </div>
    </footer>
</div>

<audio id="player"></audio>

<script>
    const STATIONS = [
        { n: 'NEON WAVE', u: 'https://stream.laut.fm/tech88' },
        { n: 'CYBER CORE', u: 'https://stream.laut.fm/hr3_clubnight' },
        { n: 'DATA PULSE', u: 'https://stream.laut.fm/1000techno' },
        { n: 'VOID SIGNAL', u: 'https://stream.laut.fm/best-of-techno' },
        { n: 'SYNTH NODE', u: 'https://stream.laut.fm/chris_burn' },
        { n: 'GEHIRN TRB', u: 'https://stream.laut.fm/gehirn-treiber-beat-radio' }
    ];

    const nodes = document.getElementById('nodes');
    const audio = document.getElementById('player');
    const coreText = document.getElementById('core-text');

    STATIONS.forEach(s => {
        const div = document.createElement('div');
        div.className = 'node-capsule';
        div.innerHTML = `<span style="font-size: 11px; font-weight: bold;">${s.n}</span>`;
        div.onclick = () => {
            document.querySelectorAll('.node-capsule').forEach(el => el.classList.remove('active'));
            div.classList.add('active');
            coreText.textContent = 'LINKED';
            audio.src = s.u;
            audio.play();
        };
        nodes.appendChild(div);
    });

    // Prosty wizualizator barowy
    const barsContainer = document.getElementById('bars');
    for(let i=0; i<30; i++) {
        const bar = document.createElement('div');
        bar.className = 'bar';
        bar.style.height = Math.random() * 40 + 10 + 'px';
        barsContainer.appendChild(bar);
    }

    function updateVol(v) { audio.volume = v / 100; }
    setInterval(() => {
        document.getElementById('signal-txt').textContent = (80 + Math.random() * 19).toFixed(1) + '%';
        document.querySelectorAll('.bar').forEach(b => b.style.height = Math.random() * 40 + 10 + 'px');
    }, 150);
</script>

</body>
</html>
