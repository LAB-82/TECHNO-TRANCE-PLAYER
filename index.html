<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Techno Trance Player</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="pcb-layout">
    <div class="header">
        <h1>Techno Trance Player</h1>
    </div>
    <div class="controls">
        <button class="play-button">Play</button>
        <button class="stop-button">Stop</button>
        <button class="settings-button">Settings</button>
    </div>
    <div class="visuals">
        <img src="https://i.pinimg.com/1200x/03/3c/41/033c4160b74306a81ead2e2fbf76238a.jpg" alt="Visual Element 1" class="visual-element">
        <img src="https://i.pinimg.com/1200x/cf/96/bf/cf96bfef1933905e222649771dd47f1c.jpg" alt="Visual Element 2" class="visual-element">
        <img src="https://i.pinimg.com/1200x/b2/45/15/b24515e1ea47e66e9a6a9fb8815d3a06.jpg" alt="Visual Element 3" class="visual-element">
    </div>
</div>

</body>
</html>
