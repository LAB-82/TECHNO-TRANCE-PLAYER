<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="utf-8">
    <title>TECHNO-HOUSE PCB v8.0 | SYNTH EDITION</title>
    <style>
        :root {
            --cyan: #00f2ff;
            --magenta: #bc00ff;
            --bg: #0d0f12;
            --panel: #1a1d23;
            --border: #2a2f3a;
            --display: #002b36;
        }

        body {
            background: var(--bg);
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Tło stylizowane na PCB */
        #board {
            flex-grow: 1;
            position: relative;
            background: 
                radial-gradient(circle at 50% 50%, #1e2229 0%, var(--bg) 100%),
                linear-gradient(rgba(42, 47, 58, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(42, 47, 58, 0.1) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
            border: 10px solid #111;
        }

        /* Nagłówki Sektorów */
        .label {
            position: absolute;
            font-family: 'Courier New', monospace;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 4px;
            text-transform: uppercase;
            padding: 5px 20px;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--border);
            z-index: 1;
        }
        #technoLabel { top: 20px; left: 50px; color: var(--cyan); border-left: 5px solid var(--cyan); }
        #houseLabel { top: 20px; right: 50px; color: var(--magenta); border-right: 5px solid var(--magenta); }

        /* Stylizacja Chipów (Oscylatory) */
        .chip {
            position: absolute;
            width: 85px;
            height: 85px;
            background: var(--panel);
            border: 2px solid var(--border);
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            text-align: center;
            font-weight: bold;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 0 #000;
            padding: 5px;
            z-index: 2;
        }

        .chip::before {
            content: '';
            position: absolute;
            top: -5px; width: 60%; height: 2px; background: var(--border);
        }

        .chip.techno { border-color: var(--cyan); color: var(--cyan); }
        .chip.house { border-color: var(--magenta); color: var(--magenta); }

        .chip:hover {
            transform: translateY(-2px);
            filter: brightness(1.3);
            box-shadow: 0 6px 15px rgba(0,0,0,0.5);
        }

        .chip.active {
            background: #fff;
            color: #000;
            animation: glitch 0.2s infinite;
        }

        @keyframes glitch {
            0% { box-shadow: 0 0 20px var(--cyan); }
            50% { box-shadow: 0 0 40px var(--magenta); }
            100% { box-shadow: 0 0 20px var(--cyan); }
        }

        /* Dolny panel sterowania / Wyświetlacz */
        #control-panel {
            height: 200px;
            background: #111;
            border-top: 4px solid #333;
            display: grid;
            grid-template-columns: 300px 1fr 300px;
            padding: 15px;
            gap: 20px;
        }

        #console {
            background: var(--display);
            border: 2px inset #000;
            color: var(--cyan);
            padding: 10px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            overflow-y: auto;
            box-shadow: inset 0 0 10px #000;
        }

        .synth-display {
            background: #00151a;
            border-radius: 5px;
            border: 2px solid #222;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: var(--cyan);
            text-shadow: 0 0 5px var(--cyan);
        }

        .knob-container {
            display: flex;
            justify-content: space-around;
            align-items: center;
            border: 1px solid #222;
            background: #181818;
        }

        .knob {
            width: 40px; height: 40px;
            border-radius: 50%;
            background: conic-gradient(#111 0%, #333 45%, #eee 50%, #333 55%, #111 100%);
            border: 2px solid #000;
        }

        .knob-label { font-size: 9px; color: #666; margin-top: 5px; text-transform: uppercase; }

    </style>
</head>
<body>

<div id="board">
    <div id="technoLabel" class="label">Oscillator A: Techno</div>
    <div id="houseLabel" class="label">Oscillator B: House</div>
    <audio id="player"></audio>
</div>

<div id="control-panel">
    <!-- Lewy panel: Status -->
    <div class="knob-container">
        <div style="text-align: center;">
            <div class="knob"></div>
            <div class="knob-label">Master Vol</div>
        </div>
        <div style="text-align: center;">
            <div class="knob"></div>
            <div class="knob-label">Resonance</div>
        </div>
        <div style="text-align: center;">
            <div class="knob"></div>
            <div class="knob-label">Cutoff</div>
        </div>
    </div>

    <!-- Środek: Główny Wyświetlacz -->
    <div id="console">
        >> SYSTEM INITIALIZED...<br>
        >> WAITING FOR CHIP SELECTION...
    </div>

    <!-- Prawy panel: Info o stacji -->
    <div class="synth-display">
        <div style="font-size: 10px; opacity: 0.6;">CURRENT PATCH</div>
        <div id="station-name" style="font-size: 18px; font-weight: bold;">-- NONE --</div>
        <div id="bitrate" style="font-size: 9px; margin-top: 5px;">SIGNAL: 0.00ms</div>
    </div>
</div>

<script>
const STATIONS = [
  { n: 'TECH 88', u: 'https://stream.laut.fm/tech88', x: 10, y: 25, cat: 'techno' },
  { n: 'HR3 CLUB', u: 'https://stream.laut.fm/hr3_clubnight', x: 25, y: 15, cat: 'techno' },
  { n: '1000 TECHNO', u: 'https://stream.laut.fm/1000techno', x: 15, y: 55, cat: 'techno' },
  { n: 'BEST TECHNO', u: 'https://stream.laut.fm/best-of-techno', x: 30, y: 45, cat: 'techno' },
  { n: 'CHRIS BURN', u: 'https://stream.laut.fm/chris_burn', x: 10, y: 75, cat: 'techno' },
  { n: 'RETRO', u: 'https://stream.laut.fm/retroelectronicmusic', x: 28, y: 72, cat: 'techno' },
  { n: 'GEHIRN', u: 'https://stream.laut.fm/gehirn-treiber-beat-radio', x: 40, y: 30, cat: 'techno' },

  { n: 'DEEP HOUSE', u: 'https://stream.laut.fm/deep-house-sounds', x: 60, y: 25, cat: 'house' },
  { n: 'HOUSEBOMB', u: 'https://stream.laut.fm/housebomb-fn', x: 75, y: 15, cat: 'house' },
  { n: 'SYMBIOTIC', u: 'https://stream.laut.fm/symbiotic-beats', x: 65, y: 55, cat: 'house' },
  { n: 'HOUSE', u: 'https://stream.laut.fm/house', x: 82, y: 45, cat: 'house' },
  { n: 'FAF 979', u: 'https://stream.laut.fm/faf-records-979', x: 68, y: 78, cat: 'house' },
  { n: 'TORNADO', u: 'https://stream.laut.fm/tornadofm', x: 85, y: 72, cat: 'house' }
];

const player = document.getElementById('player');
const board = document.getElementById('board');
const consoleEl = document.getElementById('console');
const stationDisplay = document.getElementById('station-name');
let currentChip = null;

function log(msg){
  const now = new Date().toLocaleTimeString();
  consoleEl.innerHTML += `<br>[${now}] ${msg}`;
  consoleEl.scrollTop = consoleEl.scrollHeight;
}

STATIONS.forEach((s, i) => {
  const chip = document.createElement('div');
  chip.className = `chip ${s.cat}`;
  chip.style.left = s.x + '%';
  chip.style.top = s.y + '%';
  chip.innerHTML = `<span style="font-size:8px; opacity:0.5">MOD_0${i}</span><br>${s.n}`;
  chip.onclick = () => selectStation(i, chip);
  board.appendChild(chip);
});

async function selectStation(idx, chipEl){
  if(currentChip) currentChip.classList.remove('active');
  currentChip = chipEl;
  chipEl.classList.add('active');

  const s = STATIONS[idx];
  stationDisplay.textContent = s.n;
  
  log(`PATCH_LOAD: ${s.n}`);
  log(`SIGNAL_ROUTING: ${s.u}`);

  player.src = s.u;

  try {
    await player.play();
    log(`OUTPUT_ACTIVE: 100%`);
  } catch(e) {
    log(`ERROR: BUFFER_UNDERFLOW`);
  }
}
</script>
</body>
</html>
