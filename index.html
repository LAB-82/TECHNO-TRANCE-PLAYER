<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TECHNO-TRANCE-PLAYER - Modified Edition</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0a0a0a;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Warstwa tła dla połączeń (ścieżek) */
        #pcb-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        #container {
            position: relative;
            z-index: 1;
            width: 80vw;
            height: 80vh;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            align-items: center;
        }

        /* Wygląd układu scalonego - USUNIĘTO PASKI */
        .chip {
            width: 100px;
            height: 60px;
            background-color: #121212; /* Jednolity ciemny kolor */
            border-radius: 3px;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5), inset 0 0 5px rgba(255,255,255,0.1);
            border: 1px solid #333;
            cursor: pointer;
            transition: transform 0.2s;
            user-select: none;
        }

        .chip:hover {
            transform: scale(1.05);
            border-color: #00ff00;
        }

        .chip-label {
            font-size: 10px;
            color: #555;
            text-transform: uppercase;
            pointer-events: none;
        }

        /* NÓŻKI UKŁADU SCALONEGO */
        .chip::before, .chip::after {
            content: '';
            position: absolute;
            width: 110%; /* Wystają poza obudowę */
            height: 80%;
            /* Generator pinów */
            background: repeating-linear-gradient(
                to bottom,
                #777, /* Kolor cyny/metalu */
                #777 3px,
                transparent 3px,
                transparent 8px
            );
            z-index: -1;
        }

        .chip::before { left: -5%; }
        .chip::after { right: -5%; }

        .status-led {
            width: 6px;
            height: 6px;
            background-color: #300;
            border-radius: 50%;
            margin-top: 5px;
        }

        .active .status-led {
            background-color: #0f0;
            box-shadow: 0 0 10px #0f0;
        }
    </style>
</head>
<body>

    <canvas id="pcb-canvas"></canvas>

    <div id="container">
        <!-- Układy zostaną wygenerowane przez JS -->
    </div>

    <script>
        const container = document.getElementById('container');
        const canvas = document.getElementById('pcb-canvas');
        const ctx = canvas.getContext('2d');
        const chipCount = 12;
        const chips = [];

        // Inicjalizacja Canvas
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            drawConnections();
        }

        // Tworzenie układów scalonych
        for (let i = 0; i < chipCount; i++) {
            const chip = document.createElement('div');
            chip.className = 'chip';
            chip.innerHTML = `
                <div class="chip-label">IC-${1024 + i}</div>
                <div class="status-led"></div>
            `;
            
            chip.onclick = () => {
                chip.classList.toggle('active');
                playTone(i);
            };

            container.appendChild(chip);
            chips.push(chip);
        }

        // Funkcja rysująca połączenia między układami
        function drawConnections() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#1a3a1a'; // Ciemnozielone ścieżki
            ctx.lineWidth = 2;

            for (let i = 0; i < chips.length; i++) {
                const rectA = chips[i].getBoundingClientRect();
                
                // Połącz z następnym układem w tablicy
                if (chips[i+1]) {
                    const rectB = chips[i+1].getBoundingClientRect();
                    
                    const x1 = rectA.left + rectA.width / 2;
                    const y1 = rectA.top + rectA.height / 2;
                    const x2 = rectB.left + rectB.width / 2;
                    const y2 = rectB.top + rectB.height / 2;

                    ctx.beginPath();
                    ctx.moveTo(x1, y1);
                    // Styl prowadzenia ścieżek "pod kątem prostym"
                    ctx.lineTo(x1, y2);
                    ctx.lineTo(x2, y2);
                    ctx.stroke();

                    // Dodanie małych "punktów lutowniczych"
                    ctx.fillStyle = '#2d5a2d';
                    ctx.beginPath();
                    ctx.arc(x1, y1, 3, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        // Prosty silnik audio (Techno-Trance vibe)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playTone(index) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = index % 2 === 0 ? 'sawtooth' : 'square';
            osc.frequency.setValueAtTime(110 * (index % 4 + 1), audioCtx.currentTime);
            
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
        }

        window.addEventListener('resize', resizeCanvas);
        
        // Opóźnienie rysowania, aby boundingBoxy były gotowe
        setTimeout(resizeCanvas, 100);

    </script>
</body>
</html>
