<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TB-303 PRO TERMINAL - Muzyczne Radio</title>
    <link href="https://fonts.cdnfonts.com/css/ds-digital" rel="stylesheet">
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #121212;
            font-family: Arial, sans-serif;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }

        /* GŁÓWNA OBUDOWA - SZCZOTKOWANE ALUMINIUM */
        .frame {
            width: 580px;
            background: #b5b5b5;
            background-image: 
                repeating-linear-gradient(135deg, rgba(255,255,255,0.1) 0px, rgba(255,255,255,0.1) 1px, transparent 1px, transparent 2px),
                linear-gradient(135deg, #cfcfcf 0%, #9e9e9e 100%);
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8), inset 0 2px 2px white;
            border: 1px solid #777;
            position: relative;
            box-sizing: border-box;
        }

        /* ŚRUBY W ROGACH */
        .frame::before, .frame::after, .screw-tl, .screw-tr {
            content: '';
            position: absolute;
            width: 12px;
            height: 12px;
            background: radial-gradient(circle at 30% 30%, #eee, #444);
            border-radius: 50%;
            box-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }
        .screw-tl { top: 10px; left: 10px; }
        .screw-tr { top: 10px; right: 10px; }
        .frame::before { bottom: 10px; left: 10px; }
        .frame::after { bottom: 10px; right: 10px; }

        /* LOGO */
        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }
        .brand { font-weight: 900; font-size: 24px; color: #000; line-height: 0.9; }
        .brand span { border: 2px solid #000; padding: 0 4px; margin-right: 5px; }
        .model-name { font-size: 28px; font-weight: 400; color: #000; }
        .sub-text { font-size: 10px; font-weight: bold; letter-spacing: 1px; }

        /* WYŚWIETLACZE */
        .displays-row { display: flex; gap: 15px; margin-bottom: 20px; }
        
        .lcd-small {
            background: #050505;
            width: 160px;
            height: 50px;
            border: 3px solid #555;
            box-shadow: inset 0 0 10px #000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'DS-Digital', monospace;
            font-size: 38px;
            color: #1a0000;
        }

        .lcd-main {
            flex-grow: 1;
            background: #0a0c0a;
            height: 60px;
            border: 3px solid #444;
            padding: 8px 12px;
            font-family: 'Courier New', monospace;
            color: #1a1a1a;
        }

        .frame.powered .lcd-small { color: #00ff00; text-shadow: 0 0 10px #00ff00; }
        .frame.powered .lcd-main { color: #8ec07c; }

        /* UKŁAD PRZYCISKÓW (LEWA STRONA) */
        .interface-grid { display: flex; gap: 25px; }
        
        .station-buttons {
            display: grid;
            grid-template-columns: repeat(2, 85px);
            grid-template-rows: repeat(6, 50px);
            gap: 10px;
        }

        .btn-station {
            background: linear-gradient(180deg, #eee 0%, #bbb 100%);
            border: 2px solid #666;
            border-radius: 4px;
            font-weight: bold;
            font-size: 11px;
            box-shadow: 0 4px 0 #777, 0 4px 8px rgba(0,0,0,0.3);
            cursor: pointer;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-station.active { background: #90ee90; color: #000; box-shadow: 0 2px 0 #555; transform: translateY(2px); }

        /* WIZUALIZATOR (PRAWA STRONA) */
        .right-panel { flex-grow: 1; display: flex; flex-direction: column; gap: 20px; }

        .sequencer-box {
            background: #111;
            border: 2px solid #444;
            height: 120px;
            padding: 10px;
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 4px;
        }
        .seq-led { background: #222; border-radius: 2px; }
        .seq-led.on { background: #ff4500; box-shadow: 0 0 8px #ff4500; }

        /* POKRĘTŁO I SUWAK */
        .analog-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .knob-container { text-align: center; font-size: 10px; font-weight: bold; }
        .knob {
            width: 60px; height: 60px;
            background: radial-gradient(circle, #ddd 0%, #888 100%);
            border-radius: 50%;
            border: 2px solid #555;
            position: relative;
            margin: 5px auto;
            transform: rotate(0deg);
        }
        .knob::after {
            content: ''; position: absolute; top: 5px; left: 50%;
            width: 4px; height: 15px; background: #333; transform: translateX(-50%);
        }

        .slider-box {
            width: 200px; height: 25px;
            background: #000;
            border-radius: 4px;
            position: relative;
            display: flex; align-items: center;
        }
        .slider-handle {
            width: 25px; height: 35px;
            background: linear-gradient(90deg, #999, #eee, #999);
            border: 1px solid #333;
            position: absolute; left: 50%;
        }

        /* PRZYCISK RUN/STOP */
        .btn-run {
            width: 100px; height: 60px;
            background: linear-gradient(180deg, #ddd 0%, #bbb 100%);
            border: 2px solid #666;
            margin: 0 auto;
            font-weight: bold;
            box-shadow: 0 5px 0 #777;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="frame" id="mainFrame">
    <div class="screw-tl"></div><div class="screw-tr"></div>
    
    <div class="header-section">
        <div class="brand">
            <div><span>TB</span> TB-303</div>
            <div class="sub-text">PRO TERMINAL</div>
        </div>
        <div class="brand" style="text-align: right;">
            <div class="model-name">Roland</div>
            <div class="sub-text">COMPUTER CONTROLLED</div>
        </div>
    </div>

    <div class="displays-row">
        <div class="lcd-small" id="clock">00:00:00</div>
        <div class="lcd-main">
            <div style="font-size: 10px;">BANK: A1 / PATTERN: 08</div>
            <div id="stationName" style="font-size: 20px; font-weight: bold; margin-top: 5px;">OFFLINE</div>
            <div style="font-size: 10px; margin-top: 5px; display: flex; justify-content: space-between;">
                <span>BITRATE: 128KBPS</span>
                <span id="volShow">VOL: 50%</span>
            </div>
        </div>
    </div>

    <div class="interface-grid">
        <div class="station-buttons">
            <button class="btn-station active">RMF MAXXX</button>
            <button class="btn-station">RMF FM</button>
            <button class="btn-station">RMH</button>
            <button class="btn-station">RMC</button>
            <button class="btn-station">RAB</button>
            <button class="btn-station">LEDC</button>
            <button class="btn-station">GWF ST</button>
            <button class="btn-station">GMPW</button>
            <button class="btn-station">RMF RADIO</button>
            <button class="btn-station">XB3 6</button>
            <button class="btn-station"></button>
            <button class="btn-station"></button>
        </div>

        <div class="right-panel">
            <div style="font-size: 9px; font-weight: bold;">STEP SEQUENCER VISUALIZER</div>
            <div class="sequencer-box">
                <script>
                    for(let i=0; i<36; i++) {
                        document.write(`<div class="seq-led ${Math.random() > 0.7 ? 'on' : ''}"></div>`);
                    }
                </script>
            </div>

            <div class="analog-controls">
                <div class="knob-container">
                    <div class="knob"></div>
                    PAN L/R
                </div>
                <div class="slider-box">
                    <div class="slider-handle" id="slider"></div>
                </div>
            </div>

            <button class="btn-run" id="pwrBtn">RUN / STOP</button>
        </div>
    </div>
</div>

<audio id="stream" src="https://stream.rcs.revma.com/gzwc1xcq042vv"></audio>

<script>
    const audio = document.getElementById('stream');
    const pwrBtn = document.getElementById('pwrBtn');
    const frame = document.getElementById('mainFrame');
    const clock = document.getElementById('clock');
    const stationName = document.getElementById('stationName');
    let isPwr = false;

    // Zegar
    setInterval(() => {
        const now = new Date();
        clock.textContent = now.toTimeString().split(' ')[0];
    }, 1000);

    // Obsługa Power (RUN/STOP)
    pwrBtn.onclick = () => {
        isPwr = !isPwr;
        frame.classList.toggle('powered');
        if (isPwr) {
            audio.play();
            stationName.textContent = "MUZYCZNE RADIO";
            pwrBtn.style.boxShadow = "none";
            pwrBtn.style.transform = "translateY(4px)";
        } else {
            audio.pause();
            stationName.textContent = "OFFLINE";
            pwrBtn.style.boxShadow = "0 5px 0 #777";
            pwrBtn.style.transform = "none";
        }
    };

    // Suwak głośności (prosta wizualizacja)
    const slider = document.getElementById('slider');
    let vol = 0.5;
    document.getElementById('volShow').onclick = () => {
        vol = vol === 0.5 ? 1 : 0.5;
        audio.volume = vol;
        slider.style.left = (vol * 80) + "%";
        document.getElementById('volShow').textContent = `VOL: ${vol*100}%`;
    };
</script>

</body>
</html>
