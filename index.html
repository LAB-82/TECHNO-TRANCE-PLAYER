<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muzyczne Radio - Professional Custom Build</title>
    <link href="https://fonts.cdnfonts.com/css/ds-digital" rel="stylesheet">
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #050505;
            font-family: Arial, sans-serif;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }

        /* Obudowa w kolorze ze zdjęcia */
        .case-outer {
            padding: 14px;
            background: #c1884b;
            background-image: linear-gradient(135deg, #d4a36a 0%, #a36d31 100%);
            border-radius: 20px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.9);
            border: 1px solid #8e5f2a;
        }

        /* Panel przedni - jaśniejszy, złocisto-srebrny */
        .radio-front {
            width: 820px;
            height: 480px;
            background: linear-gradient(180deg, #e5c091 0%, #d9ae75 45%, #c1955b 100%);
            border-radius: 15px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid #f2d7b5;
            box-shadow: inset 0 2px 5px rgba(255,255,255,0.5);
        }

        .main-title {
            margin-top: 22px;
            font-family: 'DS-Digital', monospace;
            font-size: 44px;
            color: #4a3521;
            letter-spacing: 6px;
            font-weight: bold;
        }

        .powered .main-title {
            color: #ff0000;
            text-shadow: 0 0 15px rgba(255, 0, 0, 0.7);
        }

        .lcd-display {
            width: 250px;
            height: 110px;
            background: #000;
            border: 3px solid #5d4329;
            border-radius: 4px;
            margin-top: 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'DS-Digital', monospace;
            color: #1a0000;
            transition: color 0.3s;
        }

        .powered .lcd-display { color: #e60012; text-shadow: 0 0 10px #e60012; }
        .lcd-station { font-size: 24px; margin-bottom: 4px; height: 24px; }
        .lcd-time { font-size: 32px; font-weight: bold; }
        .lcd-date { font-size: 14px; margin-top: 4px; }

        /* Głośniki typu Mesh */
        .speaker-mesh {
            width: 210px; height: 320px;
            background: radial-gradient(circle, #222 1px, transparent 1.5px);
            background-size: 4px 4px;
            background-color: #111;
            border-radius: 12px;
            position: absolute;
            top: 70px;
            border: 2px solid #b38856;
            box-shadow: inset 0 0 20px #000, 2px 2px 5px rgba(0,0,0,0.3);
        }
        .spk-l { left: 30px; }
        .spk-r { right: 30px; }

        .controls-area {
            position: absolute;
            bottom: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .btn-rack {
            display: flex;
            gap: 6px;
            padding: 10px;
            border-radius: 4px;
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.8), 0 1px 0 rgba(255,255,255,0.1);
        }

        .btn-pro {
            width: 68px;
            height: 38px;
            border-radius: 3px;
            border: 1px solid #222;
            background: #111;
            color: #444;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-pro svg { width: 22px; height: 22px; fill: currentColor; pointer-events: none; }

        .btn-station-pro { font-family: 'DS-Digital'; font-size: 22px; font-weight: bold; }

        .vol-wrapper { display: flex; flex-direction: column; gap: 4px; width: 100px; }
        .vol-btns { display: flex; gap: 4px; height: 30px; }

        .btn-v {
            flex: 1; height: 100%; border-radius: 2px; border: 1px solid #222;
            background: #111; color: #444; display: flex; align-items: center; justify-content: center; cursor: pointer;
        }
        .btn-v svg { width: 18px; height: 18px; fill: currentColor; }

        .vol-bar { width: 100%; height: 4px; background: #000; border-radius: 2px; position: relative; overflow: hidden; }
        .vol-fill { height: 100%; width: 50%; background: #e60012; opacity: 0; transition: width 0.1s; }

        .powered .btn-pro, .powered .btn-v { color: #888; border-color: #333; }
        
        .powered .btn-pro.active, 
        .powered .btn-v.active,
        .powered .btn-pro:active {
            color: #e60012 !important;
            border-color: #e60012 !important;
            box-shadow: 0 0 10px rgba(230, 0, 18, 0.5);
        }

        .powered .vol-fill { opacity: 1; box-shadow: 0 0 5px #e60012; }
    </style>
</head>
<body>

<div class="case-outer">
    <div class="radio-front" id="mainPanel">
        <div class="main-title">MUZYCZNE RADIO</div>
        
        <div class="lcd-display">
            <div id="lcdStation" class="lcd-station"></div>
            <div id="lcdTime" class="lcd-time">00:00:00</div>
            <div id="lcdDate" class="lcd-date">01.01.2026</div>
        </div>

        <div class="speaker-mesh spk-l"></div>
        <div class="speaker-mesh spk-r"></div>

        <div class="controls-area">
            <div class="btn-rack">
                <button class="btn-pro btn-station-pro" onclick="changeSt(1)">1</button>
                <button class="btn-pro btn-station-pro" onclick="changeSt(2)">2</button>
                <button class="btn-pro btn-station-pro" onclick="changeSt(3)">3</button>
                <button class="btn-pro btn-station-pro" onclick="changeSt(4)">4</button>
                <button class="btn-pro btn-station-pro" onclick="changeSt(5)">5</button>
            </div>

            <div class="btn-rack">
                <button id="pwr" class="btn-pro"><svg viewBox="0 0 24 24"><path d="M13,3h-2v10h2V3z M17.8,4.5l-1.4,1.4C18.3,7.4,19,9.6,19,12c0,3.9-3.1,7-7,7s-7-3.1-7-7c0-2.4,0.7-4.6,2.6-6.1L6.2,4.5 C3.6,6.4,2,9.5,2,13c0,5.5,4.5,10,10,10s10-4.5,10-10C22,9.5,20.4,6.4,17.8,4.5z"/></svg></button>
                <button id="play" class="btn-pro"><svg viewBox="0 0 24 24"><path d="M8,5.14V19.14L19,12.14L8,5.14Z"/></svg></button>
                <button id="stop" class="btn-pro"><svg viewBox="0 0 24 24"><path d="M6,6H18V18H6V6Z"/></svg></button>
                <button id="mute" class="btn-pro"><svg viewBox="0 0 24 24"><path id="mute-icon" d="M3,9v6h4l5,5V4L7,9H3zm13.5,3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73,2.5-2.25,2.5-4.02zM14,3.23v2.06c2.89.86,5,3.54,5,6.71s-2.11,5.85-5,6.71v2.06c4.01-.91,7-4.49,7-8.77s-2.99-7.86-7-8.77z"/></svg></button>
                
                <div class="vol-wrapper">
                    <div class="vol-btns">
                        <button id="vDown" class="btn-v"><svg viewBox="0 0 24 24"><path d="M19,13H5V11H19V13Z"/></svg></button>
                        <button id="vUp" class="btn-v"><svg viewBox="0 0 24 24"><path d="M19,13H13V19H11V13H5V11H11V5H13V11H19V13Z"/></svg></button>
                    </div>
                    <div class="vol-bar"><div id="vFill" class="vol-fill"></div></div>
                </div>
            </div>
        </div>
    </div>
</div>

<audio id="stream" crossorigin="anonymous" src="https://stream.rcs.revma.com/gzwc1xcq042vv"></audio>

<script>
    const audio = document.getElementById('stream');
    const panel = document.getElementById('mainPanel');
    const muteIcon = document.getElementById('mute-icon');
    const vFill = document.getElementById('vFill');
    const lcdStation = document.getElementById('lcdStation');
    const lcdTime = document.getElementById('lcdTime');

    // Poprawione parametry SVG dla MUTE
    const MUTE_OFF = "M3,9v6h4l5,5V4L7,9H3zm13.5,3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73,2.5-2.25,2.5-4.02zM14,3.23v2.06c2.89.86,5,3.54,5,6.71s-2.11,5.85-5,6.71v2.06c4.01-.91,7-4.49,7-8.77s-2.99-7.86-7-8.77z";
    const MUTE_ON = "M16.5,12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45,2.45c.03-.2.05-.41.05-.63zm2.5,0c0,.94-.2,1.82-.54,2.64l1.51,1.51C20.63,14.91,21,13.5,21,12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86,5,3.54,5,6.71zM4.27,3L3,4.27,7.73,9H3v6h4l5,5v-6.73l4.25,4.25c-.67.52-1.42.93-2.25,1.18v2.06c1.38-.31,2.63-.95,3.69-1.81L19.73,21 21,19.73l-9-9L4.27,3zM12,4L9.91,6.09,12,8.18V4z";

    let isPwr = false;

    function clock() {
        const d = new Date();
        lcdTime.textContent = d.toLocaleTimeString('pl-PL', { hour12: false });
        document.getElementById('lcdDate').textContent = d.toLocaleDateString('pl-PL');
    }
    setInterval(clock, 1000); clock();

    const flash = el => {
        el.classList.add('active');
        setTimeout(() => { 
            if(!(el.id === 'play' && !audio.paused) && !(el.id === 'mute' && audio.muted)) el.classList.remove('active'); 
        }, 300);
    };

    document.getElementById('pwr').onclick = function() {
        isPwr = !isPwr;
        panel.classList.toggle('powered');
        this.classList.toggle('active', isPwr);
        if(!isPwr) {
            audio.pause();
            document.getElementById('play').classList.remove('active');
            document.getElementById('mute').classList.remove('active');
            lcdStation.textContent = "";
            muteIcon.setAttribute('d', MUTE_OFF);
        } else {
            lcdStation.textContent = "SYSTEM READY";
        }
    };

    document.getElementById('play').onclick = function() {
        if(!isPwr) return;
        audio.play();
        this.classList.add('active');
    };

    document.getElementById('stop').onclick = function() {
        if(!isPwr) return;
        audio.pause();
        audio.currentTime = 0;
        document.getElementById('play').classList.remove('active');
        flash(this);
        // Głośność zostaje bez zmian (nie zeruje paska)
    };

    document.getElementById('mute').onclick = function() {
        if(!isPwr) return;
        audio.muted = !audio.muted;
        this.classList.toggle('active', audio.muted);
        muteIcon.setAttribute('d', audio.muted ? MUTE_ON : MUTE_OFF);
    };

    function updateVol() { vFill.style.width = (audio.volume * 100) + "%"; }

    document.getElementById('vUp').onclick = function() {
        if(!isPwr) return;
        audio.volume = Math.min(1, audio.volume + 0.1);
        updateVol(); flash(this);
    };

    document.getElementById('vDown').onclick = function() {
        if(!isPwr) return;
        audio.volume = Math.max(0, audio.volume - 0.1);
        updateVol(); flash(this);
    };

    function changeSt(n) {
        if(!isPwr) return;
        lcdStation.textContent = "STACJA " + n;
        flash(event.currentTarget);
    }

    audio.volume = 0.5;
    updateVol();
</script>
</body>
</html>
