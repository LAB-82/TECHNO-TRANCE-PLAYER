<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RMF SUPERNOVA TERMINAL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@300;500;700&display=swap');

        :root {
            --sn-deep: #0a0a12;
            --sn-panel: #161625;
            --sn-purple: #8a2be2;
            --sn-neon: #ff00ff;
            --sn-text: #e0e0ff;
            --sn-glass: rgba(255, 255, 255, 0.03);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            height: 100vh; width: 100vw; 
            background: var(--sn-deep); color: var(--sn-text); 
            font-family: 'Inter', sans-serif;
            display: flex; flex-direction: column;
            padding: 15px; overflow: hidden; 
        }

        /* TOP BAR - STYL SUPERNOVA */
        header { 
            height: 50px; display: flex; justify-content: space-between; align-items: center;
            background: linear-gradient(90deg, #1a1a2e, #0f0f1a);
            border-radius: 8px; margin-bottom: 15px; padding: 0 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .logo { font-family: 'Syncopate', sans-serif; font-weight: 700; letter-spacing: 3px; font-size: 14px; color: #fff; }
        .logo span { color: var(--sn-neon); text-shadow: 0 0 10px var(--sn-neon); }
        .preset-info { font-size: 12px; color: #889; border-left: 1px solid #445; padding-left: 15px; }

        .app-content { display: flex; flex: 1; gap: 15px; min-height: 0; }

        /* GRID 5x3 - ORYGINALNY UKŁAD I ROZMIAR */
        .grid { 
            flex: 1.4; display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            grid-template-rows: repeat(3, 1fr); 
            gap: 10px; 
        }

        .tile {
            background: var(--sn-panel);
            border: 1px solid rgba(138, 43, 226, 0.2);
            border-radius: 6px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; position: relative; transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .tile:hover { border-color: var(--sn-purple); background: #1c1c30; }

        .tile .t-top { font-size: 8px; font-weight: 700; color: #667; text-transform: uppercase; letter-spacing: 1px; }
        .tile .t-bottom { font-size: 13px; font-weight: 600; color: #fff; margin-top: 4px; }

        /* AKTYWNA STACJA */
        .tile.active {
            border-color: var(--sn-neon);
            background: radial-gradient(circle at center, #251a3a, #161625);
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.2);
        }
        .tile.active::after {
            content: ''; position: absolute; top: 5px; right: 5px;
            width: 4px; height: 4px; background: var(--sn-neon); border-radius: 50%;
            box-shadow: 0 0 8px var(--sn-neon);
        }

        /* SIDEBAR - CENTRUM KONTROLI */
        .sidebar { 
            flex: 0.7; background: var(--sn-panel); border-radius: 12px;
            display: flex; flex-direction: column; 
            align-items: center; justify-content: space-around;
            padding: 20px; border: 1px solid rgba(255,255,255,0.05);
        }

        /* POKRĘTŁO GŁOŚNOŚCI - STYL GAŁEK SUPERNOVA */
        .knob-container { text-align: center; }
        .knob-outer {
            width: 120px; height: 120px;
            background: #0d0d16; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            position: relative; cursor: ns-resize;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            border: 2px solid #222;
        }
        
        /* Pierścień postępu */
        .knob-ring {
            position: absolute; inset: 5px; border-radius: 50%;
            border: 3px solid transparent;
            border-top-color: var(--sn-purple);
            transform: rotate(0deg);
        }

        .knob-inner {
            width: 85px; height: 85px; background: #1a1a2e; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Syncopate', sans-serif; font-size: 18px; color: var(--sn-neon);
            text-shadow: 0 0 10px var(--sn-neon);
        }

        .knob-dot {
            position: absolute; top: 12px; width: 6px; height: 6px;
            background: var(--sn-neon); border-radius: 50%;
            box-shadow: 0 0 10px var(--sn-neon);
        }

        /* PRZYCISKI STEROWANIA - JAK KAFELKI */
        .controls { display: flex; gap: 12px; width: 100%; justify-content: center; }
        .btn-tile {
            width: 60px; height: 60px; background: var(--sn-panel);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.2s;
        }
        .btn-tile:hover { border-color: var(--sn-purple); }
        .btn-tile:active { transform: scale(0.95); background: #000; }
        .btn-tile svg { width: 22px; height: 22px; fill: #889; }
        .btn-tile.play-btn { border-color: var(--sn-purple); width: 80px; }
        .btn-tile.play-btn svg { fill: #fff; filter: drop-shadow(0 0 5px var(--sn-purple)); }

        .label { font-size: 10px; font-weight: 700; color: #556; text-transform: uppercase; letter-spacing: 2px; }

        @media (max-width: 600px) {
            .app-content { flex-direction: column; overflow-y: auto; }
            .grid { grid-template-columns: repeat(3, 1fr); height: auto; flex: none; }
            .sidebar { padding: 30px; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">SUPER<span>NOVA</span></div>
    <div class="preset-info" id="playing-now">Classic RMF FM*</div>
    <div style="font-family: monospace; color: var(--sn-neon);" id="timer">00:00</div>
</header>

<div class="app-content">
    <div class="grid" id="station-grid"></div>

    <aside class="sidebar">
        <div class="knob-container">
            <div class="label" style="margin-bottom: 15px;">Master Gain</div>
            <div class="knob-outer" id="knob" onmousedown="startRotate(event)" ontouchstart="startRotate(event)">
                <div class="knob-ring" id="knob-ring"></div>
                <div class="knob-dot" id="knob-pointer"></div>
                <div class="knob-inner" id="vol-txt">50%</div>
            </div>
        </div>

        <div style="text-align: center; width: 100%;">
            <div class="label" style="margin-bottom: 12px;">Transport</div>
            <div class="controls">
                <div class="btn-tile" onclick="skip(-1)">
                    <svg viewBox="0 0 24 24"><path d="M6,18V6H8V18H6M9.5,12L18,6V18L9.5,12Z"/></svg>
                </div>
                <div class="btn-tile play-btn" onclick="toggle()">
                    <svg viewBox="0 0 24 24"><path id="p-ico" d="M8,5.14V19.14L19,12.14L8,5.14Z"/></svg>
                </div>
                <div class="btn-tile" onclick="skip(1)">
                    <svg viewBox="0 0 24 24"><path d="M16,18H18V6H16M6,18L14.5,12L6,6V18Z"/></svg>
                </div>
            </div>
        </div>

        <div style="font-size: 9px; color: #445; letter-spacing: 1px;">NURO AUDIO X RMF</div>
    </aside>
</div>

<audio id="player"></audio>

<script>
    const STATIONS = [
        { n: 'RMF FM', s: 'RMF FM', u: 'rmf_fm' },
        { n: 'RMF MAXXX', s: 'Maxxx', u: 'RMFMAXXX48' },
        { n: 'RMF 80s', s: '80s', u: 'rmf_80s' },
        { n: 'RMF 90s', s: '90s', u: 'rmf_90s' },
        { n: 'RMF 2000', s: '2000', u: 'rmf_2000' },
        { n: 'RMF CHILLOUT', s: 'Chillout', u: 'rmf_chillout' },
        { n: 'RMF CLASSIC', s: 'Classic', u: 'rmf_classic' },
        { n: 'RMF DANCE', s: 'Dance', u: 'rmf_dance' },
        { n: 'RMF GOLD', s: 'Gold', u: 'rmf_gold' },
        { n: 'RMF LATINO', s: 'Latino', u: 'rmf_latino' },
        { n: 'RMF LOVE', s: 'Love', u: 'rmf_love' },
        { n: 'RMF PARTY', s: 'Party', u: 'rmf_party' },
        { n: 'RMF POLSKI ROCK', s: 'P-Rock', u: 'rmf_polski_rock' },
        { n: 'RMF ROCK', s: 'Rock', u: 'rmf_rock' },
        { n: 'RMF SMOOTH JAZZ', s: 'Smooth', u: 'rmf_smooth_jazz' }
    ];

    const player = document.getElementById('player'), ico = document.getElementById('p-ico'), grid = document.getElementById('station-grid');
    let current = -1;
    let volume = 50;

    function clock() {
        const d = new Date();
        document.getElementById('timer').textContent = d.getHours().toString().padStart(2,'0') + ":" + d.getMinutes().toString().padStart(2,'0');
    }
    setInterval(clock, 1000); clock();

    STATIONS.forEach((s, i) => {
        const t = document.createElement('div');
        t.className = 'tile';
        t.innerHTML = `<div class="t-top">MODULE 0${i+1}</div><div class="t-bottom">${s.s}</div>`;
        t.onclick = () => play(i);
        grid.appendChild(t);
    });

    function play(i) {
        current = i;
        document.querySelectorAll('.tile').forEach((t, idx) => t.classList.toggle('active', idx === i));
        document.getElementById('playing-now').textContent = `${STATIONS[i].n}*`;
        const streamBase = "https://rs201-krk.rmfstream.pl/";
        player.src = (STATIONS[i].n === 'RMF MAXXX') ? 'https://rs7-krk2-cyfronet.rmfstream.pl/RMFMAXXX48' : streamBase + STATIONS[i].u;
        player.play();
        ico.setAttribute('d', 'M14,19H18V5H14M6,19H10V5H6V19Z');
    }

    function toggle() {
        if(player.paused) { player.play(); ico.setAttribute('d', 'M14,19H18V5H14M6,19H10V5H6V19Z'); }
        else { player.pause(); ico.setAttribute('d', 'M8,5.14V19.14L19,12.14L8,5.14Z'); }
    }

    function skip(d) { let n = current + d; if(n >= 0 && n < STATIONS.length) play(n); }

    // KNOB LOGIC
    let isDragging = false;
    let startY = 0;

    function startRotate(e) {
        isDragging = true;
        startY = e.clientY || e.touches[0].clientY;
        document.addEventListener('mousemove', onRotate);
        document.addEventListener('mouseup', stopRotate);
        document.addEventListener('touchmove', onRotate);
        document.addEventListener('touchend', stopRotate);
    }

    function onRotate(e) {
        if (!isDragging) return;
        const currentY = e.clientY || e.touches[0].clientY;
        const diff = startY - currentY;
        volume = Math.min(Math.max(volume + diff * 0.5, 0), 100);
        startY = currentY;
        updateKnob();
    }

    function stopRotate() { isDragging = false; }

    function updateKnob() {
        const rotation = (volume * 2.8) - 140;
        document.getElementById('knob-pointer').style.transform = `rotate(${rotation}deg) translateY(-45px)`;
        document.getElementById('knob-ring').style.transform = `rotate(${rotation}deg)`;
        document.getElementById('vol-txt').textContent = Math.round(volume) + "%";
        player.volume = volume / 100;
    }
    
    updateKnob();
</script>
</body>
</html>
