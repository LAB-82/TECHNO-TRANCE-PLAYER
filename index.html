<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="utf-8">
    <title>SERUM WAVEFORM | 3D CRYSTALLINE</title>
    <style>
        :root {
            --cyan: #00f2ff;
            --cyan-glow: rgba(0, 242, 255, 0.8);
            --bg-synth: #e0e0e0;
            --panel-synth: #d2d2d2;
            --border-synth: #a0a0a0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg-synth); font-family: 'Segoe UI', Arial, sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }

        #main {
            width: 98vw; height: 96vh;
            background: var(--panel-synth);
            border: 2px solid var(--border-synth);
            border-radius: 8px; padding: 15px;
            display: grid; grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr 1fr;
            gap: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .genre-panel {
            background: rgba(255,255,255,0.3);
            border: 1px solid var(--border-synth);
            border-radius: 4px; padding: 35px 10px 10px 10px;
            position: relative; display: grid; grid-template-columns: 1fr 1fr; gap: 6px;
            overflow-y: auto;
        }

        .genre-title {
            position: absolute; top: 0; left: 0; right: 0;
            font-size: 11px; font-weight: bold; letter-spacing: 1px;
            text-transform: uppercase; padding: 6px;
            background: #bbb; color: #444;
            text-align: center; border-bottom: 1px solid var(--border-synth);
        }
        
        .powered-on .genre-title { color: var(--cyan); text-shadow: 0 0 8px var(--cyan-glow); }

        .chip {
            background: linear-gradient(180deg, #f9f9f9, #e0e0e0);
            border: 1px solid #bbb; border-radius: 2px;
            height: 32px; display: flex; align-items: center; justify-content: center;
            font-size: 9px; color: #444; font-weight: 600;
            text-align: center; cursor: pointer; text-transform: uppercase; padding: 2px;
        }

        .powered-on .chip.active {
            background: #2c313a; color: var(--cyan);
            border-color: var(--cyan); box-shadow: 0 0 8px var(--cyan-glow);
        }

        #center-area { display: flex; flex-direction: column; justify-content: flex-start; align-items: center; }

        #station-window {
            background: #bbb; border-bottom: 1px solid var(--border-synth);
            border-radius: 4px 4px 0 0; width: 100%; height: 29px;
            display: flex; align-items: center; justify-content: center; margin-bottom: 20px;
        }

        #station-name { font-size: 11px; font-weight: bold; color: #444; text-transform: uppercase; letter-spacing: 1px; }
        .powered-on #station-name { color: var(--cyan); text-shadow: 0 0 8px var(--cyan-glow); }

        .crystalline-frame {
            width: 320px; height: 120px;
            background: linear-gradient(145deg, #ffffff, #d1d1d1);
            padding: 8px; border-radius: 12px;
            border: 2px solid #b0b0b0;
            box-shadow: 4px 4px 10px rgba(0,0,0,0.15), -2px -2px 5px #ffffff;
            margin-bottom: 20px;
        }

        .crystalline-screen {
            width: 100%; height: 100%;
            border-radius: 6px;
            background: linear-gradient(90deg, #f7b84b 0%, #e85d8d 40%, #7d89f0 100%);
            border: 2px solid #333;
            position: relative; overflow: hidden;
            box-shadow: inset 0 0 25px rgba(0,0,0,0.6);
        }

        body:not(.powered-on) .crystalline-screen { filter: grayscale(1) brightness(0.15); }

        .waveform-svg { width: 100%; height: 100%; }
        .lane { fill: none; stroke: rgba(255, 255, 255, 0.8); stroke-width: 1.5; }

        .controls-main { display: flex; gap: 15px; margin-bottom: 20px; }

        .btn-rect {
            width: 55px; height: 55px; background: linear-gradient(145deg, #f0f0f0, #cacaca);
            border: 1px solid #999; border-radius: 50%; cursor: pointer; color: #444;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 3px 3px 6px #bebebe, -3px -3px 6px #ffffff; transition: all 0.1s ease;
        }

        .powered-on .btn-rect.active { 
            color: var(--cyan) !important; 
            background: #222 !important; 
            box-shadow: 0 0 15px var(--cyan-glow) !important; 
            border-color: var(--cyan) !important; 
        }
        
        .btn-rect svg { width: 24px; height: 24px; fill: currentColor; }

        .fader-area { width: 195px; }
        .fader-track-double { width: 100%; height: 14px; position: relative; display: flex; flex-direction: column; justify-content: space-between; }
        .fader-track-double::before, .fader-track-double::after { content: ""; width: 100%; height: 3px; background: #a8a8a8; border-radius: 1px; }
        .powered-on .fader-track-double::before, .powered-on .fader-track-double::after { background: var(--cyan); box-shadow: 0 0 5px var(--cyan-glow); }

        .fader-handle {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 45px; height: 24px; background: linear-gradient(180deg, #e0e0e0 0%, #ffffff 50%, #e0e0e0 100%);
            border: 1px solid #999; border-radius: 4px; cursor: grab; z-index: 10; display: flex; align-items: center; justify-content: center;
        }
        
        .powered-on .fader-handle.center-glow { box-shadow: 0 0 15px var(--cyan), 0px 2px 5px rgba(0,0,0,0.2); }
        .fader-handle-inner { width: 30px; height: 6px; background: #444; border-radius: 1px; }
        
        .powered-on .fader-handle-inner.glow-active { 
            background: var(--cyan) !important; 
            box-shadow: 0 0 12px var(--cyan) !important; 
        }
    </style>
</head>
<body>

<div id="main">
    <div id="techno-panel" class="genre-panel"><div class="genre-title">TECHNO</div></div>
    <div id="center-area">
        <div id="station-window"><div id="station-name">OFF</div></div>
        <div class="crystalline-frame">
            <div class="crystalline-screen">
                <svg class="waveform-svg" viewBox="0 0 200 100" preserveAspectRatio="none">
                    <path class="lane" id="p1" style="opacity: 0.2; stroke-width: 1;" />
                    <path class="lane" id="p2" style="opacity: 0.4; stroke-width: 1.5;" />
                    <path class="lane" id="p3" style="opacity: 0.8; stroke-width: 2.5;" />
                    <path class="lane" id="p4" style="opacity: 0.4; stroke-width: 1.5;" />
                    <path class="lane" id="p5" style="opacity: 0.2; stroke-width: 1;" />
                </svg>
            </div>
        </div>
        <div class="controls-main">
            <button id="pwrBtn" class="btn-rect"><svg viewBox="0 0 24 24"><path d="M16.56,5.44L15.11,6.89C16.84,7.94 18,9.83 18,12A6,6 0 0,1 12,18A6,6 0 0,1 6,12C6,9.83 7.16,7.94 8.88,6.88L7.44,5.44C5.18,7.03 3.75,9.63 3.75,12.58C3.75,17.14 7.44,20.83 12,20.83C16.56,20.83 20.25,17.14 20.25,12.58C20.25,9.63 18.82,7.03 16.56,5.44M11,2.08V11.08H13V2.08H11Z"/></svg></button>
            <button id="muteBtn" class="btn-rect"><svg viewBox="0 0 24 24"><path d="M14,3.23V5.29C16.89,6.15 19,8.83 19,12C19,15.17 16.89,17.85 14,18.71V20.77C18.01,19.86 21,16.28 21,12C21,7.72 18.01,4.14 14,3.23M16.5,12C16.5,10.23 15.5,8.71 14,7.97V16.02C15.5,15.29 16.5,13.77 16.5,12M3,9V15H7L12,20V4L7,9H3Z"/></svg></button>
            <button id="stopBtn" class="btn-rect"><svg viewBox="0 0 24 24"><path d="M18,18H6V6H18V18Z"/></svg></button>
        </div>
        <div class="fader-area">
            <div class="fader-track-double" id="faderTrack">
                <div class="fader-handle" id="faderHandle"><div class="fader-handle-inner" id="faderGlow"></div></div>
            </div>
        </div>
    </div>
    <div id="house-panel" class="genre-panel"><div class="genre-title">HOUSE</div></div>
    <div id="dnb-panel" class="genre-panel"><div class="genre-title">DRUM N BASS</div></div>
    <div id="trance-panel" class="genre-panel"><div class="genre-title">TRANCE</div></div>
    <div id="goa-panel" class="genre-panel"><div class="genre-title">GOA/PSY</div></div>
</div>

<audio id="player" crossorigin="anonymous"></audio>

<script>
    const STATIONS = [
        { n: 'TECH 88 TECHNO', u: 'https://stream.laut.fm/tech88', cat: 'techno' },
        { n: 'HR3 CLUBNIGHT', u: 'https://stream.laut.fm/hr3_clubnight', cat: 'techno' },
        { n: '1000 TECHNO FM', u: 'https://stream.laut.fm/1000techno', cat: 'techno' },
        { n: 'BEST OF TECHNO', u: 'https://stream.laut.fm/best-of-techno', cat: 'techno' },
        { n: 'DEEP HOUSE SOUNDS', u: 'https://stream.laut.fm/deep-house-sounds', cat: 'house' },
        { n: 'HOUSEBOMB FM', u: 'https://stream.laut.fm/housebomb-fn', cat: 'house' },
        { n: 'DRUM AND BASS FM', u: 'https://stream.laut.fm/drumandbass_fm', cat: 'dnb' },
        { n: 'DNBZONE RADIO', u: 'https://stream.laut.fm/dnbzone', cat: 'dnb' },
        { n: 'TRANCEMOTION FM', u: 'https://stream.laut.fm/trancemotionfm', cat: 'trance' },
        { n: 'GOAFM PSYCHEDELIC', u: 'https://stream.laut.fm/goafm', cat: 'goa' }
        // Dodałem tylko przykładowe, możesz dopisać resztę
    ];

    const player = document.getElementById('player'),
          pwrBtn = document.getElementById('pwrBtn'),
          muteBtn = document.getElementById('muteBtn'),
          stopBtn = document.getElementById('stopBtn'),
          stationDisplay = document.getElementById('station-name'),
          faderHandle = document.getElementById('faderHandle'),
          faderTrack = document.getElementById('faderTrack'),
          faderGlow = document.getElementById('faderGlow'),
          paths = [document.getElementById('p1'), document.getElementById('p2'), document.getElementById('p3'), document.getElementById('p4'), document.getElementById('p5')];

    let isPowered = false, dragging = false, audioCtx, analyzer, dataArray, source;
    const proxy = "https://corsproxy.io/?";

    function initAudio() {
        if (audioCtx) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyzer = audioCtx.createAnalyser();
        analyzer.fftSize = 128; 
        source = audioCtx.createMediaElementSource(player);
        source.connect(analyzer);
        analyzer.connect(audioCtx.destination);
        dataArray = new Uint8Array(analyzer.frequencyBinCount);
        draw();
    }

    function draw() {
        requestAnimationFrame(draw);
        if (!isPowered || player.paused) {
            paths.forEach(p => p.setAttribute('d', "M0,50 L200,50"));
            return;
        }
        analyzer.getByteTimeDomainData(dataArray);
        paths.forEach((path, idx) => {
            let offset = (idx - 2) * 5;
            let smoothing = 1 + (idx * 0.15);
            let d = `M0,${50 + offset}`;
            for (let i = 0; i < dataArray.length; i++) {
                let x = (i / dataArray.length) * 200;
                let v = (dataArray[i] / 128.0) - 1.0;
                let y = 50 + offset + (v * 45 * smoothing);
                d += ` L${x},${y}`;
            }
            path.setAttribute('d', d);
        });
    }

    STATIONS.forEach(s => {
        const btn = document.createElement('div');
        btn.className = 'chip'; btn.textContent = s.n;
        btn.onclick = () => {
            if(!isPowered) return;
            initAudio();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            stationDisplay.textContent = s.n;
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            btn.classList.add('active');
            player.src = proxy + encodeURIComponent(s.u);
            player.load();
            player.play().catch(e => console.log("CORS/Load error"));
        };
        document.getElementById(s.cat + '-panel').appendChild(btn);
    });

    pwrBtn.onclick = () => {
        isPowered = !isPowered;
        document.body.classList.toggle('powered-on', isPowered);
        pwrBtn.classList.toggle('active', isPowered);
        faderGlow.classList.toggle('glow-active', isPowered);
        stationDisplay.textContent = isPowered ? "READY" : "OFF";
        if(!isPowered) { player.pause(); player.src = ""; document.querySelectorAll('.chip').forEach(c => c.classList.remove('active')); }
    };

    function moveFader(e) {
        if(!isPowered || !dragging) return;
        const rect = faderTrack.getBoundingClientRect();
        const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
        let pct = Math.max(0, Math.min(1, x / rect.width));
        player.volume = pct;
        faderHandle.style.left = (pct * 100) + '%';
    }

    faderHandle.onmousedown = faderHandle.ontouchstart = () => dragging = true;
    window.onmousemove = window.ontouchmove = moveFader;
    window.onmouseup = window.ontouchend = () => dragging = false;

    muteBtn.onclick = () => { if(isPowered) { player.muted = !player.muted; muteBtn.classList.toggle('active', player.muted); } };
    stopBtn.onclick = () => { if(isPowered) { player.pause(); player.src = ""; document.querySelectorAll('.chip').forEach(c => c.classList.remove('active')); } };
    player.volume = 0.5;
</script>
</body>
</html>
