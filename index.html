<style>
/* 1. Import czcionki (pamiętaj o poprawnej ścieżce do pliku .ttf) */
@font-face {
    font-family: 'Seeds';
    src: url('Seeds.ttf'); 
}

/* 2. Zmniejszona ramka i tekst */
.display-box {
    width: 50%; /* Zmniejszenie o 50% */
    aspect-ratio: 1/1;
    border: 4px solid #fce300;
    display: flex;
    align-items: center;
    justify-content: center;
}

.display-box h2 {
    font-family: 'Seeds', sans-serif;
    color: #fce300;
    font-size: 1.2rem;
}

/* 3. Aura wystająca poza kafelki */
.tile.active {
    border-color: #00f2ff;
    box-shadow: 0 0 20px rgba(0, 242, 255, 0.6);
    position: relative;
}

.tile.active::after {
    content: '';
    position: absolute;
    top: -15px; left: -15px; right: -15px; bottom: -15px;
    background: radial-gradient(circle, rgba(0, 242, 255, 0.3) 0%, transparent 75%);
    z-index: -1;
    pointer-events: none;
}
</style>

<div class="controls">
    <svg class="c-btn play-btn" viewBox="0 0 24 24" onclick="togglePlay()">
        <path d="M8 5v14l11-7z"/>
    </svg>

    <svg class="c-btn stop-btn" viewBox="0 0 24 24" onclick="stopAudio()" style="width: 40px; height: 40px; fill: #00f2ff;">
        <rect x="6" y="6" width="12" height="12"/>
    </svg>
</div>
