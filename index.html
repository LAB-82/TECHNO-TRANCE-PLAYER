<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TECHNO_TRANCE_PCB_PRO_V6</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@300;600&display=swap');

        :root {
            --laminat: #030b0d;
            --miedz: #6b5e62;
            --neon: #00f2ff;
            --gold: #b8a033;
            --chip-body: #1c1e1f;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--laminat); 
            color: var(--neon);
            font-family: 'JetBrains Mono', monospace;
            overflow: hidden;
        }

        /* TŁO PCB - GĘSTE ŚCIEŻKI */
        #pcb-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0; opacity: 0.4; pointer-events: none;
        }

        .main-interface { display: flex; height: 100vh; position: relative; z-index: 2; }

        /* OBSZAR UKŁADÓW */
        .motherboard { 
            flex: 2; position: relative; 
            background: radial-gradient(circle at center, var(--laminat) 0%, #020503 100%);
            border: 2px solid var(--miedz);
            box-shadow: inset 0 0 30px rgba(0,0,0,0.3);
        }

        /* REALISTYCZNY UKŁAD SCALONY (IC) */
        .ic-chip {
            position: absolute; width: 160px; height: 80px;
            background: var(--chip-body); border-radius: 5px;
            cursor: pointer; box-shadow: 10px 15px 30px rgba(0,0,0,0.8);
            border-top: 2px solid #333; border-left: 2px solid var(--gold);
        }

        /* Nóżki układu (Pins) - realizm metalu */
        .ic-chip::before {
            content: ''; position: absolute; top: -10px; left: 10px; right: 10px; bottom: -10px;
            background: repeating-linear-gradient(90deg, 
                #777 0px, #aaa 3px, #777 6px, 
                transparent 6px, transparent 18px);
            z-index: -1;
        }

        /* Wycięcie techniczne (Notch) */
        .notch {
            position: absolute; left: 0; top: 50%; transform: translateY(-50%);
            width: 12px; height: 20px; background: var(--laminat);
            border-radius: 0 10px 10px 0; border: 1px solid #222;
        }

        .chip-label {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100%; pointer-events: none;
        }

        .chip-id { font-family: 'Orbitron'; font-size: 11px; color: var(--gold); font-weight: 700; }
        .chip-spec { font-size: 7px; color: #444; margin-top: 5px; text-transform: uppercase; }

        .ic-chip.active {
            border-color: var(--neon);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.4);
        }

        /* PANEL KONTROLNY */
        .control-tower { 
            flex: 0.8; background: rgba(0,0,0,0.9); border-left: 3px solid #111;
            display: flex; flex-direction: column; 
        }
