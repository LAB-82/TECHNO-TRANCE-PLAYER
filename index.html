<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RMF NITHONAT 2 EDITION</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Narrow:wght@400;700&display=swap');

        :root {
            /* KOLORYSTYKA NITHONAT 2 */
            --nit-bg: #e6e4e0;
            --nit-panel: #f2f1ee;
            --nit-border: #b8b6b2;
            --nit-accent: #ff8a00; /* Pomarańczowe LEDy/przyciski */
            --nit-dark: #333333;
            --blue-wave: #00ccff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body { 
            height: 100vh; width: 100vw; 
            background: #d4d2ce; color: var(--nit-dark); 
            font-family: 'Archivo Narrow', sans-serif;
            overflow: hidden; 
        }

        body { display: flex; flex-direction: column; padding: 1.5vh; }

        /* GÓRNY PASEK - Styl Preset Browser z Nithonat */
        header { 
            height: 50px; display: flex; justify-content: space-between; align-items: center;
            background: var(--nit-bg); padding: 0 20px; margin-bottom: 1.5vh; flex-shrink: 0;
            border: 1px solid var(--nit-border); border-radius: 4px;
            box-shadow: inset 0 1px 3px rgba(255,255,255,0.8);
        }
        .header-info { 
            background: #cbd0d1; border: 1px solid #9ea3a4; padding: 4px 15px;
            font-size: 14px; font-weight: 700; color: #111; border-radius: 2px;
            min-width: 250px; text-transform: uppercase;
        }
        .clock { color: #555; font-size: 18px; font-weight: 700; letter-spacing: 1px; }

        .app-content { display: flex; flex: 1; gap: 20px; min-height: 0; }

        /* SIATKA 5x3 - ORYGINALNY SZKIELET */
        .grid { 
            flex: 1.4; display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            grid-template-rows: repeat(3, 1fr); 
            gap: 10px; 
            padding: 15px;
            background: var(--nit-panel);
            border: 1px solid var(--nit-border);
            border-radius: 4px;
        }

        .tile {
            background: #e6e4e0; border: 1px solid #c8c6c2;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; position: relative; overflow: visible;
            border-radius: 3px;
            box-shadow: 1px 1px 0px #fff;
        }

        .tile .t-top { font-size: 10px; font-weight: 700; color: #888; text-transform: uppercase; z-index: 2; }
        .tile .t-bottom { font-size: 15px; font-weight: 700; color: #333; margin-top: 2px; text-align: center; z-index: 2; }

        /* LED INDYKATOR STYLU NITHONAT */
        .tile::before {
            content: ""; position: absolute; top: 6px; left: 6px;
            width: 6px; height: 6px; background: #555; border-radius: 50%;
        }

        /* AKTYWNA STACJA */
        .tile.active { 
            background: #fff;
            border-color: #999;
        }
        .tile.active::before {
            background: var(--nit-accent);
            box-shadow: 0 0 5px var(--nit-accent);
        }
        .tile.active .t-bottom { color: #000; }

        /* FALE BŁĘKITNE - ZACHOWANE */
        .waves {
            position: absolute; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            pointer-events: none; opacity: 0; z-index: 1;
        }
        .tile.active .waves { opacity: 0.5; }
        .wave {
            position: absolute; border: 2px solid var(--blue-wave); border-radius: 50%;
            width: 10px; height: 10px; opacity: 0;
            animation: ripple 3s infinite linear;
        }
        .wave:nth-child(2) { animation-delay: 1s; }
        .wave:nth-child(3) { animation-delay: 2s; }

        @keyframes ripple {
            0% { width: 0; height: 0; opacity: 0.9; }
            100% { width: 280%; height: 280%; opacity: 0; }
        }

        /* SIDEBAR - ORYGINALNY UKŁAD */
        .sidebar { 
            flex: 0.6; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; gap: 4vh;
            border-left: 1px solid var(--nit-border); padding-left: 3vw;
        }

        /* LOGO DISPLAY - Styl Nithonat */
        .logo-display {
            width: 100%; max-width: 320px; aspect-ratio: 16/9;
            background: var(--nit-bg);
            border: 1px solid var(--nit-border);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative;
        }
        .logo-display h2 { font-size: 32px; color: #222; font-weight: 700; letter-spacing: -1px; }
        .logo-display p { font-size: 11px; color: #666; font-weight: 700; text-transform: uppercase; margin-top: -5px; }
        
        /* Pomarańczowy przełącznik w logo */
        .nit-switch {
            width: 12px; height: 18px; background: var(--nit-accent);
            border: 1px solid #cc6e00; position: absolute; top: 10px; left: 10px;
        }

        .controls { display: flex; align-items: center; gap: 3vw; }
        .c-svg { 
            width: 35px; height: 35px; fill: #444; cursor: pointer; 
        }
        .c-play { 
            width: 60px; height: 60px; fill: #222; 
            background: #fff; padding: 12px; border-radius: 4px;
            border: 1px solid var(--nit-border);
            box-shadow: 0 2px 0px #bbb;
        }

        /* VOLUME BOX */
        .vol-box { display: flex; align-items: center; gap: 15px; width: 320px; }
        .vol-btn { 
            width: 35px; height: 35px; border: 1px solid var(--nit-border); 
            background: var(--nit-panel); color: #333; cursor: pointer; font-weight: bold; 
        }
        .vol-bar { 
            flex: 1; height: 35px; border: 1px solid var(--nit-border); 
            background: #cbd0d1; border-radius: 2px; padding: 0 10px; display: flex; align-items: center; 
        }
        
        input[type="range"] { flex: 1; appearance: none; background: #9ea3a4; height: 4px; }
        input[type="range"]::-webkit-slider-thumb { 
            appearance: none; width: 14px; height: 24px; 
            background: #fff; border: 1px solid #666; cursor: pointer;
        }

        @media (max-width: 600px) {
            .app-content { flex-direction: column; }
            .grid { grid-template-columns: repeat(3, 1fr); height: 50vh; flex: none; }
            .sidebar { width: 100%; height: 40vh; border-left: none; border-top: 1px solid var(--nit-border); }
        }
    </style>
</head>
<body>

<header>
    <div class="header-info" id="playing-now">PRESET: RMF FM</div>
    <div class="clock" id="timer">00:00</div>
</header>

<div class="app-content">
    <div class="grid" id="station-grid"></div>

    <aside class="sidebar">
        <div class="logo-display">
            <div class="nit-switch"></div>
            <h2>NITHONAT<span>2</span></h2>
            <p>Drum Machine / RMF Radio</p>
        </div>

        <div class="controls">
            <svg class="c-svg" viewBox="0 0 24 24" onclick="skip(-1)"><path d="M6,18V6H8V18H6M9.5,12L18,6V18L9.5,12Z"/></svg>
            <svg class="c-svg c-play" viewBox="0 0 24 24" onclick="toggle()"><path id="p-ico" d="M8,5.14V19.14L19,12.14L8,5.14Z"/></svg>
            <svg class="c-svg" viewBox="0 0 24 24" onclick="skip(1)"><path d="M16,18H18V6H16M6,18L14.5,12L6,6V18Z"/></svg>
        </div>

        <div class="vol-box">
            <button class="vol-btn" onclick="adj(-5)">-</button>
            <div class="vol-bar">
                <input type="range" id="v-range" min="0" max="100" value="50" oninput="setV(this.value)">
            </div>
            <button class="vol-btn" onclick="adj(5)">+</button>
        </div>
    </aside>
</div>

<audio id="player"></audio>

<script>
    const STATIONS = [
        { n: 'RMF FM', s: 'RMF FM', u: 'rmf_fm' },
        { n: 'RMF MAXXX', s: 'Maxxx', u: 'RMFMAXXX48' },
        { n: 'RMF 80s', s: '80s', u: 'rmf_80s' },
        { n: 'RMF 90s', s: '90s', u: 'rmf_90s' },
        { n: 'RMF 2000', s: '2000', u: 'rmf_2000' },
        { n: 'RMF CHILLOUT', s: 'Chillout', u: 'rmf_chillout' },
        { n: 'RMF CLASSIC', s: 'Classic', u: 'rmf_classic' },
        { n: 'RMF DANCE', s: 'Dance', u: 'rmf_dance' },
        { n: 'RMF GOLD', s: 'Gold', u: 'rmf_gold' },
        { n: 'RMF LATINO', s: 'Latino', u: 'rmf_latino' },
        { n: 'RMF LOVE', s: 'Love', u: 'rmf_love' },
        { n: 'RMF PARTY', s: 'Party', u: 'rmf_party' },
        { n: 'RMF POLSKI ROCK', s: 'Polski Rock', u: 'rmf_polski_rock' },
        { n: 'RMF ROCK', s: 'Rock', u: 'rmf_rock' },
        { n: 'RMF SMOOTH JAZZ', s: 'Smooth Jazz', u: 'rmf_smooth_jazz' }
    ];

    const player = document.getElementById('player'), ico = document.getElementById('p-ico'), grid = document.getElementById('station-grid'), vRange = document.getElementById('v-range');
    let current = -1;

    function clock() {
        const d = new Date();
        document.getElementById('timer').textContent = d.getHours().toString().padStart(2,'0') + ":" + d.getMinutes().toString().padStart(2,'0');
    }
    setInterval(clock, 1000); clock();

    STATIONS.forEach((s, i) => {
        const t = document.createElement('div');
        t.className = 'tile';
        t.innerHTML = `
            <div class="waves"><div class="wave"></div><div class="wave"></div><div class="wave"></div></div>
            <div class="t-top">INST ${(i + 1).toString().padStart(2, '0')}</div>
            <div class="t-bottom">${s.s.toUpperCase()}</div>
        `;
        t.onclick = () => play(i);
        grid.appendChild(t);
    });

    function play(i) {
        current = i;
        document.querySelectorAll('.tile').forEach((t, idx) => t.classList.toggle('active', idx === i));
        document.getElementById('playing-now').textContent = "PRESET: " + STATIONS[i].n;
        const streamBase = "https://rs201-krk.rmfstream.pl/";
        player.src = (STATIONS[i].n === 'RMF MAXXX') ? 'https://rs7-krk2-cyfronet.rmfstream.pl/RMFMAXXX48' : streamBase + STATIONS[i].u;
        player.play();
        ico.setAttribute('d', 'M14,19H18V5H14M6,19H10V5H6V19Z');
    }

    function toggle() {
        if(player.paused) { player.play(); ico.setAttribute('d', 'M14,19H18V5H14M6,19H10V5H6V19Z'); }
        else { player.pause(); ico.setAttribute('d', 'M8,5.14V19.14L19,12.14L8,5.14Z'); }
    }

    function skip(d) { let n = current + d; if(n >= 0 && n < STATIONS.length) play(n); }
    function setV(v) { player.volume = v / 100; }
    function adj(d) { vRange.value = parseInt(vRange.value) + d; setV(vRange.value); }
</script>
</body>
</html>
