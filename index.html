<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>GEHIRN TREIBER - INFOGRAPHIC HUD FINAL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;600;700&display=swap');

        :root {
            --neon-cyan: #00f2ff;
            --neon-magenta: #ff00e5;
            --neon-blue: #0066ff;
            --bg-black: #010407;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-black);
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            /* Subtelna siatka w tle z obrazka */
            background-image: radial-gradient(circle at center, #0a121d 0%, #010407 100%),
                              linear-gradient(rgba(0, 242, 255, 0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 242, 255, 0.03) 1px, transparent 1px);
            background-size: 100% 100%, 30px 30px, 30px 30px;
        }

        .terminal-interface {
            width: 95vw;
            height: 85vh;
            display: flex;
            gap: 40px;
            padding: 30px;
            border: 1px solid rgba(0, 242, 255, 0.1);
            position: relative;
        }

        /* LEWA STRONA - PIONOWE KAPSUŁY (STACJE) */
        .station-nodes {
            flex: 2;
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            padding-bottom: 50px;
            gap: 15px;
        }

        .pill-node {
            width: 60px;
            height: 80%;
            background: rgba(0, 242, 255, 0.03);
            border: 2px solid rgba(0, 242, 255, 0.2);
            border-radius: 50px; /* Styl kapsuły z image_a240c4.jpg */
            position: relative;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 10px;
        }

        .pill-node:hover, .pill-node.active {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.4), inset 0 0 15px rgba(0, 242, 255, 0.2);
            height: 85%;
        }

        .pill-node.active {
            border-color: var(--neon-magenta);
            box-shadow: 0 0 40px rgba(255, 0, 229, 0.4);
        }

        /* Wypełnienie wewnątrz kapsuły */
        .pill-fill {
            width: 100%;
            height: 30%;
            background: linear-gradient(to top, var(--neon-blue), var(--neon-cyan));
            border-radius: 50px;
            filter: blur(2px);
            opacity: 0.5;
            transition: 0.5s;
        }
        .pill-node.active .pill-fill { height: 60%; opacity: 1; background: var(--neon-magenta); }

        .pill-label {
            position: absolute;
            bottom: -40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            font-weight: 700;
            white-space: nowrap;
            color: var(--neon-cyan);
        }

        /* PRAWA STRONA - ANALITYKA I VOLUME */
        .sidebar {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 40px;
            border-left: 1px solid rgba(255, 255, 255, 0.05);
            padding-left: 30px;
        }

        /* KOŁOWE WYKRESY */
        .infographic-rings {
            display: flex;
            justify-content: space-between;
        }

        .ring {
            width: 80px;
            height: 80px;
            border: 3px solid #111;
            border-top-color: var(--neon-cyan);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 12px;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
        }

        /* NEONOWY SUWAK (RURA) */
        .volume-module {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .tube-slider {
            width: 100%;
            height: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            border: 1px solid rgba(0, 242, 255, 0.2);
            position: relative;
            display: flex;
            align-items: center;
            padding: 0 5px;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
            z-index: 10;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 25px;
            height: 25px;
            background: #fff;
            border: 4px solid var(--neon-cyan);
            border-radius: 50%;
            box-shadow: 0 0 20px var(--neon-cyan);
            cursor: pointer;
        }

        .hud-button {
            background: transparent;
            border: 2px solid var(--neon-cyan);
            border-radius: 50px;
            color: var(--neon-cyan);
            padding: 15px;
            font-family: inherit;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .hud-button:hover {
            background: var(--neon-cyan);
            color: #000;
            box-shadow: 0 0 30px var(--neon-cyan);
        }

        .title-unit {
            border-bottom: 2px solid var(--neon-magenta);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

    </style>
</head>
<body>

<div class="terminal-interface">
    <!-- Grid stacji jako kapsuły -->
    <div class="station-nodes" id="node-container"></div>

    <!-- Panel Analityczny -->
    <aside class="sidebar">
        <div class="title-unit">
            <h1 id="active-name" style="font-size: 32px; letter-spacing: 5px;">SELECT_NODE</h1>
            <p style="font-size: 12px; color: var(--neon-magenta);">INFOGRAPHIC_STATION_ANALYSIS</p>
        </div>

        <div class="infographic-rings">
            <div class="ring">100%</div>
            <div class="ring" style="border-top-color: var(--neon-magenta);">75%</div>
            <div class="ring">50%</div>
        </div>

        <div class="volume-module">
            <label style="font-size: 12px; opacity: 0.5;">AMPLITUDE_CONTROL</label>
            <div class="tube-slider">
                <input type="range" min="0" max="100" value="70" oninput="updateVol(this.value)">
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="hud-button" style="flex: 2;" onclick="audio.play()">Engage</button>
                <button class="hud-button" style="flex: 1; border-color: var(--neon-magenta); color: var(--neon-magenta);" onclick="audio.pause()">Abort</button>
            </div>
        </div>

        <div style="margin-top: auto;">
            <svg width="100%" height="60">
                <polyline points="0,50 50,20 100,45 150,10 200,40 300,30" 
                fill="none" stroke="var(--neon-cyan)" stroke-width="2" />
            </svg>
            <p style="font-size: 10px; opacity: 0.3;">DATA_LOG_STREAM: ACTIVE_ENCRYPTION_v8.4</p>
        </div>
    </aside>
</div>

<audio id="main-audio"></audio>

<script>
    const STATIONS = [
        { n: 'NODE_A', u: 'https://stream.laut.fm/tech88' },
        { n: 'NODE_B', u: 'https://stream.laut.fm/hr3_clubnight' },
        { n: 'NODE_C', u: 'https://stream.laut.fm/1000techno' },
        { n: 'NODE_D', u: 'https://stream.laut.fm/best-of-techno' },
        { n: 'NODE_E', u: 'https://stream.laut.fm/chris_burn' },
        { n: 'GEHIRN', u: 'https://stream.laut.fm/gehirn-treiber-beat-radio' }
    ];

    const container = document.getElementById('node-container');
    const audio = document.getElementById('main-audio');
    const title = document.getElementById('active-name');

    STATIONS.forEach((s, i) => {
        const node = document.createElement('div');
        node.className = 'pill-node';
        node.innerHTML = `
            <div class="pill-fill"></div>
            <div class="pill-label">${s.n}</div>
        `;
        node.onclick = () => {
            document.querySelectorAll('.pill-node').forEach(n => n.classList.remove('active'));
            node.classList.add('active');
            title.textContent = s.n;
            audio.src = s.u;
            audio.play();
        };
        container.appendChild(node);
    });

    function updateVol(v) { audio.volume = v / 100; }
</script>

</body>
</html>
