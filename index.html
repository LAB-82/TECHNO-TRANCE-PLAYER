<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Muzyczne Radio PRO ULTRA v2 - MSI Dragon Edition</title>
    <link href="https://fonts.cdnfonts.com/css/ds-digital" rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/digital-numbers" rel="stylesheet">
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            font-family: Arial, sans-serif;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }

        .frame {
            width: 100%;
            max-width: 600px;
            border-radius: 8px;
            padding: 20px;
            background: #c8c8c8;
            background-image: 
                repeating-linear-gradient(135deg, 
                    rgba(255,255,255,0.15) 0px, 
                    rgba(255,255,255,0.15) 1px, 
                    transparent 1px, 
                    transparent 2px,
                    rgba(0,0,0,0.08) 2px,
                    rgba(0,0,0,0.08) 3px,
                    transparent 3px,
                    transparent 5px),
                linear-gradient(180deg, #d5d5d5 0%, #b5b5b5 100%);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 1), inset 0 2px 3px rgba(255,255,255,0.7);
            position: relative;
            border: 2px solid #888;
            box-sizing: border-box;
        }

        .frame.powered {
            box-shadow: 0 0 60px rgba(230, 0, 18, 0.4), 0 8px 30px rgba(0, 0, 0, 0.9), inset 0 2px 3px rgba(255,255,255,0.7);
        }

        .header-logos {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
            padding: 0 5px;
        }

        .roland-logo {
            font-size: 32px;
            font-weight: 900;
            color: #1a1a1a;
            font-family: Arial, sans-serif;
            line-height: 1;
        }

        .lab-sub {
            font-size: 9px;
            color: #333;
            letter-spacing: 0.5px;
            margin-top: 2px;
        }

        .tb-logo {
            text-align: right;
        }

        .tb-text {
            font-size: 18px;
            font-weight: 900;
            color: #1a1a1a;
            display: flex;
            align-items: center;
            gap: 4px;
            justify-content: flex-end;
        }

        .tb-badge {
            background: #1a1a1a;
            color: #d4d4d4;
            padding: 1px 6px;
            font-size: 14px;
            border-radius: 2px;
        }

        .pro-terminal {
            font-size: 9px;
            color: #333;
            letter-spacing: 0.5px;
            margin-top: 2px;
        }

        .display-frame {
            background: #000;
            border: 3px solid #555;
            border-top-color: #222;
            border-bottom-color: #777;
            border-radius: 4px;
            margin: 0 auto 20px auto;
            box-sizing: border-box;
            overflow: hidden;
            width: 100%;
            height: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Digital Numbers', sans-serif;
            color: #120000;
            transition: color 0.3s;
            padding: 0 20px;
            box-shadow: inset 0 3px 10px rgba(0,0,0,0.9);
        }

        .frame.powered .display-frame {
            color: #e60012;
            text-shadow: 0 0 10px #e60012;
        }

        .display-line {
            line-height: 1.2;
            text-align: center;
            white-space: nowrap;
        }

        .station-name { font-size: 14px; margin-bottom: 5px; letter-spacing: 2px; }
        .time-display { font-size: 38px; font-weight: bold; }
        .date-display { font-size: 13px; margin-top: 5px; }

        .main-content {
            position: relative;
            width: 100%;
        }

        .controls-panel {
            background: #b8b8b8;
            border: 2px solid #666;
            border-radius: 6px;
            padding: 20px 15px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
        }

        .controls-main {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
        }

        .top-row {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
        }

        .btn-rect {
            aspect-ratio: 1;
            border: 3px solid #1a1a1a;
            background: linear-gradient(135deg, #e8e8e8 0%, #c5c5c5 25%, #d8d8d8 50%, #bebebe 75%, #d0d0d0 100%);
            background-image: 
                repeating-linear-gradient(135deg,
                    rgba(255,255,255,0.3) 0px,
                    rgba(255,255,255,0.3) 1px,
                    transparent 1px,
                    transparent 2px),
                linear-gradient(135deg, #e8e8e8 0%, #c5c5c5 100%);
            color: #222;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.1s;
            border-radius: 4px;
            box-shadow: 
                inset 0 2px 2px rgba(255,255,255,0.9),
                inset 0 -2px 2px rgba(0,0,0,0.3),
                0 3px 6px rgba(0,0,0,0.5);
            position: relative;
            font-size: 9px;
            font-weight: bold;
            gap: 5px;
            padding: 8px 4px;
        }

        .btn-rect::before {
            content: '';
            position: absolute;
            top: 6px;
            left: 6px;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: #2a0000;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.9);
        }

        .frame.powered .btn-rect::before {
            background: #ff0000;
            box-shadow: 0 0 8px #ff0000, inset 0 1px 2px rgba(0,0,0,0.5);
        }

        .btn-rect svg { 
            width: 22px; 
            height: 22px; 
            fill: currentColor; 
            pointer-events: none; 
        }

        .btn-rect:active {
            box-shadow: 
                inset 0 3px 6px rgba(0,0,0,0.5),
                0 1px 2px rgba(0,0,0,0.3);
            transform: translateY(2px);
        }

        .frame.powered .btn-rect.active {
            background: linear-gradient(135deg, #f0f0f0 0%, #d5d5d5 100%);
            border-color: #e60012;
            box-shadow: 
                0 0 15px rgba(230,0,18,0.7),
                inset 0 2px 2px rgba(255,255,255,0.9);
        }

        .frame.powered .btn-rect.active::before {
            background: #e60012;
            box-shadow: 0 0 12px #e60012;
        }

        .vol-wrapper {
            display: grid;
            grid-template-columns: 1fr 2.5fr 1fr;
            gap: 15px;
            height: 55px;
            align-items: center;
        }

        .btn-v {
            height: 100%;
            border: 3px solid #1a1a1a;
            background: linear-gradient(135deg, #e8e8e8 0%, #c5c5c5 100%);
            background-image: 
                repeating-linear-gradient(135deg,
                    rgba(255,255,255,0.3) 0px,
                    rgba(255,255,255,0.3) 1px,
                    transparent 1px,
                    transparent 2px),
                linear-gradient(135deg, #e8e8e8 0%, #c5c5c5 100%);
            color: #222;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 4px;
            box-shadow: 
                inset 0 2px 2px rgba(255,255,255,0.9),
                0 3px 6px rgba(0,0,0,0.5);
            font-size: 28px;
            font-weight: bold;
        }

        .btn-v:active {
            box-shadow: inset 0 3px 6px rgba(0,0,0,0.5);
            transform: translateY(2px);
        }

        .btn-v svg { width: 22px; height: 22px; fill: currentColor; }

        .vol-bar {
            height: 100%;
            background: #0a0a0a;
            border: 2px solid #444;
            border-radius: 4px;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 3px 8px rgba(0,0,0,0.95);
        }

        .vol-fill {
            height: 100%;
            width: 50%;
            background: #1a1a1a;
            transition: width 0.1s;
        }

        .frame.powered .vol-fill {
            background: linear-gradient(90deg, #e60012 0%, #ff0033 100%);
            box-shadow: 0 0 15px #e60012;
        }

        .link-container {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #888;
            text-align: center;
        }

        .lab-footer {
            font-size: 9px;
            color: #444;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .link-container a {
            color: #2a0000;
            text-decoration: none;
            font-family: 'DS-Digital';
            letter-spacing: 2px;
            font-size: 11px;
        }

        .frame.powered .link-container a {
            color: #e60012;
            text-shadow: 0 0 10px #e60012;
        }

        @media(max-width:700px) {
            .frame { max-width: 95%; padding: 15px; }
            .top-row { gap: 8px; }
            .btn-rect { font-size: 8px; padding: 6px 2px; }
            .btn-rect svg { width: 18px; height: 18px; }
        }
    </style>
</head>

<body oncontextmenu="return false;">
    <div class="frame">
        <div class="header-logos">
            <div>
                <div class="roland-logo">Roland</div>
                <div class="lab-sub">L.A.B. AUDIO INTERF</div>
            </div>
            <div class="tb-logo">
                <div class="tb-text"><span class="tb-badge">TB</span> TB-303</div>
                <div class="pro-terminal">PRO TERMINAL</div>
            </div>
        </div>

        <div class="display-frame" id="display">
            <div class="display-line station-name">Muzyczne Radio</div>
            <div class="display-line time-display" id="clock">00:00:00</div>
            <div class="display-line date-display" id="date">00:00:0000</div>
        </div>

        <div class="main-content">
            <div class="controls-panel">
                <div class="controls-main" id="controls">
                    <div class="top-row">
                        <button id="pwr" class="btn-rect">
                            <svg viewBox="0 0 24 24"><path d="M13,3h-2v10h2V3z M17.8,4.5l-1.4,1.4C18.3,7.4,19,9.6,19,12c0,3.9-3.1,7-7,7s-7-3.1-7-7c0-2.4,0.7-4.6,2.6-6.1L6.2,4.5 C3.6,6.4,2,9.5,2,13c0,5.5,4.5,10,10,10s10-4.5,10-10C22,9.5,20.4,6.4,17.8,4.5z"/></svg>
                            POWER
                        </button>
                        <button id="play" class="btn-rect">
                            <svg viewBox="0 0 24 24"><path d="M8,5.14V19.14L19,12.14L8,5.14Z"/></svg>
                            PLAY
                        </button>
                        <button id="rec" class="btn-rect">
                            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/></svg>
                            REC
                        </button>
                        <button id="stop" class="btn-rect">
                            <svg viewBox="0 0 24 24"><path d="M6,6H18V18H6V6Z"/></svg>
                            STOP
                        </button>
                        <button id="mute" class="btn-rect">
                            <svg viewBox="0 0 24 24"><path id="mute-path" d="M3,9V15H7L12,20V4L7,9H3M16.5,12C16.5,10.23 15.48,8.71 14,8V16C15.48,15.29 16.5,13.77 16.5,12M14,3.23V5.29C16.89,6.15 19,8.83 19,12C19,15.17 16.89,17.85 14,18.71V20.77C18.01,19.86 21,16.28 21,12C21,7.72 18.01,4.14 14,3.23Z"/></svg>
                            MUTE
                        </button>
                    </div>
                    
                    <div class="vol-wrapper" id="vol-container">
                        <button id="vDown" class="btn-v">
                            <svg viewBox="0 0 24 24"><path d="M19,13H5V11H19V13Z"/></svg>
                        </button>
                        <div class="vol-bar"><div id="vFill" class="vol-fill"></div></div>
                        <button id="vUp" class="btn-v">
                            <svg viewBox="0 0 24 24"><path d="M19,13H13V19H11V13H5V11H11V5H13V11H19V13Z"/></svg>
                        </button>
                    </div>
                </div>
            </div>

            <div class="link-container">
                <div class="lab-footer">L.A.B. AUDIO TB-303</div>
                <a href="https://www.muzyczneradio.pl" target="_blank">WWW.MUZYCZNERADIO.PL</a>
            </div>
        </div>
    </div>

    <audio id="stream" crossorigin="anonymous" src="https://stream.rcs.revma.com/gzwc1xcq042vv"></audio>

    <script>
        const audio = document.getElementById('stream');
        const pwrBtn = document.getElementById('pwr');
        const playBtn = document.getElementById('play');
        const recBtn = document.getElementById('rec');
        const stopBtn = document.getElementById('stop');
        const muteBtn = document.getElementById('mute');
        const mutePath = document.getElementById('mute-path');
        const vFill = document.getElementById('vFill');
        const clockEl = document.getElementById('clock');
        const dateEl = document.getElementById('date');
        const displayEl = document.getElementById('display');

        const ICON_MUTE_ON = "M4.33,3L3.05,4.27L7.78,9H3V15H7L12,20V13.22L16.25,17.47C15.58,17.98 14.83,18.4 14,18.64V21.07C15.5,20.78 16.89,20.09 18.05,19.15L20.72,21.82L22,20.55L4.33,3M16.5,12C16.5,10.23 15.5,8.71 14,8V10.18L16.45,12.63C16.5,12.43 16.5,12.22 16.5,12M19,12C19,12.94 18.8,13.82 18.46,14.64L20.28,16.46C20.74,15.11 21,13.6 21,12C21,7.72 18,4.14 14,3.23V5.7C16.89,6.56 19,9.11 19,12Z";
        const ICON_MUTE_OFF = "M3,9V15H7L12,20V4L7,9H3M16.5,12C16.5,10.23 15.48,8.71 14,8V16C15.48,15.29 16.5,13.77 16.5,12M14,3.23V5.29C16.89,6.15 19,8.83 19,12C19,15.17 16.89,17.85 14,18.71V20.77C18.01,19.86 21,16.28 21,12C21,7.72 18.01,4.14 14,3.23Z";

        let audioCtx, analyser, source, isPwr = false;
        let mediaRecorder, chunks = [];

        function updateDateTime() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const mo = String(now.getMonth() + 1).padStart(2, '0');
            const yr = now.getFullYear();
            
            clockEl.textContent = `${h}:${m}:${s}`;
            dateEl.textContent = `${day}:${mo}:${yr}`;
        }

        setInterval(updateDateTime, 1000);
        updateDateTime();

        const flash = el => {
            el.classList.add('active');
            setTimeout(() => { if(!(el === playBtn && !audio.paused) && !(el === muteBtn && audio.muted) && !(el === recBtn && mediaRecorder && mediaRecorder.state === 'recording')) el.classList.remove('active'); }, 600);
        };

        function updateVol() { vFill.style.width = (audio.volume * 100) + '%'; }

        pwrBtn.onclick = function() {
            isPwr = !isPwr;
            document.querySelector('.frame').classList.toggle('powered');
            this.classList.toggle('active');
            if (!isPwr) {
                if(mediaRecorder && mediaRecorder.state === 'recording') stopRecording();
                audio.pause();
                playBtn.classList.remove('active');
                recBtn.classList.remove('active');
                audio.muted = false;
                muteBtn.classList.remove('active');
                mutePath.setAttribute('d', ICON_MUTE_OFF);
            }
        };

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                source = audioCtx.createMediaElementSource(audio);
                source.connect(analyser);
                source.connect(audioCtx.destination);
            }
        }

        playBtn.onclick = function() {
            if (!isPwr) return;
            initAudio();
            audio.play();
            this.classList.add('active');
        };

        recBtn.onclick = function() {
            if (!isPwr) return;
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                stopRecording();
            } else {
                startRecording();
            }
        };

        function startRecording() {
            initAudio();
            const dest = audioCtx.createMediaStreamDestination();
            source.connect(dest);
            mediaRecorder = new MediaRecorder(dest.stream);
            chunks = [];
            mediaRecorder.ondataavailable = e => chunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'audio/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = 'nagranie.webm'; a.click();
            };
            mediaRecorder.start();
            recBtn.classList.add('active');
        }

        function stopRecording() {
            if(mediaRecorder) mediaRecorder.stop();
            recBtn.classList.remove('active');
            flash(recBtn);
        }

        stopBtn.onclick = function() {
            if (!isPwr) return;
            if(mediaRecorder && mediaRecorder.state === 'recording') stopRecording();
            audio.pause(); 
            audio.currentTime = 0;
            audio.volume = 0.5;
            updateVol();
            playBtn.classList.remove('active');
            flash(this);
        };

        muteBtn.onclick = function() {
            if (!isPwr) return;
            audio.muted = !audio.muted;
            mutePath.setAttribute('d', audio.muted ? ICON_MUTE_ON : ICON_MUTE_OFF);
            this.classList.toggle('active', audio.muted);
        };

        document.getElementById('vUp').onclick = function() { if(isPwr) { audio.volume = Math.min(1, audio.volume + 0.1); updateVol(); flash(this); }};
        document.getElementById('vDown').onclick = function() { if(isPwr) { audio.volume = Math.max(0, audio.volume - 0.1); updateVol(); flash(this); }};

        window.addEventListener('load', () => {
            audio.volume = 0.5;
            updateVol();
        });
    </script>
</body>
</html>
