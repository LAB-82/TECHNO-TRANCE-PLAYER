<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>GEHIRN TREIBER - INDUSTRIAL AUDIT</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&display=swap');

        :root {
            --orange: #e08a1e;
            --orange-dim: #2a1a05;
            --bg: #030303;
        }

        body {
            background-color: var(--bg);
            color: var(--orange);
            font-family: 'Rajdhani', sans-serif;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; height: 100vh;
        }

        /* Układ RMF - Siatka 5x3 dla Techno */
        .app-content { display: flex; gap: 30px; flex: 1; margin-top: 20px; }

        .grid {
            flex: 1.8;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 25px;
        }

        /* KAFELEK PO AUDYCIE */
        .tile {
            background: var(--orange-dim);
            border: 1px solid #443322;
            position: relative;
            cursor: pointer;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            clip-path: polygon(10% 0, 90% 0, 100% 15%, 100% 85%, 90% 100%, 100% 100%, 10% 100%, 0 85%, 0 15%);
        }

        /* NÓŻKI (PINY) - METALICZNE */
        .tile::before {
            content: ''; position: absolute; left: -10px; height: 70%; width: 6px;
            background: repeating-linear-gradient(to bottom, #555, #222 5px, transparent 5px, transparent 10px);
        }
        .tile::after {
            content: ''; position: absolute; right: -10px; height: 70%; width: 6px;
            background: repeating-linear-gradient(to bottom, #555, #222 5px, transparent 5px, transparent 10px);
        }

        /* NAROŻNIKI HUD */
        .bracket {
            position: absolute; width: 15px; height: 15px;
            border: 2px solid var(--orange);
        }
        .tl { top: 0; left: 0; border-right: 0; border-bottom: 0; }
        .br { bottom: 0; right: 0; border-left: 0; border-top: 0; }

        .tile.active {
            background: var(--orange);
            color: #000;
        }

        .sidebar {
            flex: 0.7; border: 2px solid var(--orange);
            padding: 20px; display: flex; flex-direction: column;
            background: linear-gradient(180deg, rgba(224, 138, 30, 0.1) 0%, transparent 100%);
        }

        h2 { text-transform: uppercase; letter-spacing: 3px; border-bottom: 2px solid var(--orange); }

    </style>
</head>
<body>

<header style="border-bottom: 4px double var(--orange); padding-bottom: 10px;">
    <h1 style="margin:0; font-size: 40px;">GEHIRN TREIBER // TERMINAL</h1>
</header>

<div class="app-content">
    <div class="grid" id="grid"></div>
    
    <aside class="sidebar">
        <h2>STATUS: CONNECTED</h2>
        <div id="display" style="font-size: 30px; margin: 40px 0;">SELECT MODULE...</div>
        <div style="margin-top:auto;">
            <p>> VOL: 88%</p>
            <p>> FREQ: 128.00 Hz</p>
            <p>> SIG: HIGH</p>
        </div>
    </aside>
</div>

<script>
    const STATIONS = ["TECH 88", "HR 3 CLUB", "1000 TECHNO", "BEST OF", "CHRIS BURN", "RETRO ELEC", "GEHIRN TREIBER"];
    const grid = document.getElementById('grid');

    STATIONS.forEach((name, i) => {
        const t = document.createElement('div');
        t.className = 'tile';
        t.innerHTML = `
            <div class="bracket tl"></div>
            <div class="bracket br"></div>
            <span style="font-size: 10px; opacity: 0.7;">MODULE-0${i}</span>
            <span style="font-weight: 700; font-size: 18px;">${name}</span>
        `;
        t.onclick = () => {
            document.querySelectorAll('.tile').forEach(x => x.classList.remove('active'));
            t.classList.add('active');
            document.getElementById('display').innerText = name;
        };
        grid.appendChild(t);
    });
</script>
</body>
</html>
