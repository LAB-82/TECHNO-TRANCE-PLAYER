<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>GEHIRN TREIBER - AUDIO SYNTH PRO</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap');

        :root {
            --cyan: #00f2ff;
            --magenta: #ff00e5;
            --bg-black: #010408;
            --panel-border: #1a2a3a;
            --slot-bg: #000000;
        }

        /* Fix dla braku pasków przewijania */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            width: 100%; height: 100%; 
            overflow: hidden; 
            background-color: var(--bg-black);
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
        }

        .synth-container {
            width: 100vw;
            height: 100vh;
            display: grid;
            grid-template-columns: 300px 1fr 340px;
            gap: 10px;
            padding: 10px;
        }

        /* LEWY PANEL */
        .osc-sidebar { display: flex; flex-direction: column; gap: 8px; overflow-y: auto; }
        .osc-sidebar::-webkit-scrollbar { width: 0; }

        /* Pole Tytułu Utworu (z oryginału) */
        .track-info-box {
            border: 1px solid var(--magenta);
            padding: 10px;
            margin-bottom: 5px;
            background: rgba(255, 0, 229, 0.05);
        }

        .osc-module {
            border: 1px solid var(--panel-border);
            padding: 8px;
            background: rgba(255, 255, 255, 0.01);
            border-radius: 2px;
            cursor: pointer;
        }
        .osc-module.active { border-color: var(--cyan); box-shadow: 0 0 10px rgba(0, 242, 255, 0.2); }

        .osc-header { font-size: 9px; color: var(--cyan); letter-spacing: 1px; font-family: 'Orbitron'; margin-bottom: 4px; }
        .station-slot {
            background: var(--slot-bg);
            height: 40px;
            display: flex;
            align-items: center;
            padding-left: 10px;
            font-family: 'Orbitron';
            font-size: 12px;
            border: 1px solid rgba(255,255,255,0.03);
        }

        /* ŚRODEK */
        .main-display {
            border: 1px solid var(--panel-border);
            display: flex;
            flex-direction: column;
            background: radial-gradient(circle at center, #0a0a1a 0%, #010408 100%);
        }

        .visualizer-core { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; }
        #eq-canvas { width: 100%; height: 100%; }

        /* PRAWY PANEL */
        .control-sidebar { display: flex; flex-direction: column; gap: 10px; }
        .module-box { border: 1px solid var(--panel-border); padding: 15px; }
        .envelope-view { height: 150px; width: 100%; background: rgba(0,0,0,0.5); }

        .playback-frame { border: 1px solid var(--panel-border); padding: 15px; background: rgba(0,0,0,0.3); }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .synth-btn {
            background: transparent; border: 1px solid var(--cyan); color: var(--cyan);
            padding: 8px; font-family: 'Orbitron'; font-size: 10px; cursor: pointer;
        }
        .btn-stop { border-color: var(--magenta); color: var(--magenta); }
        .vol-slider { -webkit-appearance: none; width: 100%; height: 2px; background: var(--panel-border); }
        .vol-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; background: var(--cyan); border-radius: 50%; }
    </style>
</head>
<body>

<div class="synth-container">
    <div class="osc-sidebar">
        <div class="track-info-box">
            <div class="osc-header" style="color: var(--magenta);">CURRENT TRACK</div>
            <div id="track-title" style="font-size: 13px; font-family: 'Orbitron'; overflow: hidden; white-space: nowrap;">WAITING FOR SIGNAL...</div>
        </div>
        <div id="station-list"></div>
    </div>

    <main class="main-display">
        <div class="visualizer-core">
            <canvas id="eq-canvas"></canvas>
        </div>
    </main>

    <aside class="control-sidebar">
        <div class="module-box">
            <div class="osc-header">ENVELOPE 1 [AMP]</div>
            <div class="envelope-view">
                <svg width="100%" height="100%" viewBox="0 0 100 100" preserveAspectRatio="none">
                    <path d="M0,100 L20,20 L40,50 L80,50 L100,100" fill="none" stroke="var(--cyan)" stroke-width="2" />
                </svg>
            </div>
        </div>

        <div class="playback-frame">
            <div class="osc-header">TRANSPORT</div>
            <div class="btn-grid">
                <button class="synth-btn" id="playBtn">PLAY</button>
                <button class="synth-btn btn-stop" id="stopBtn">STOP</button>
            </div>
            <div style="font-size: 10px; margin-bottom: 5px; color: var(--cyan);">MASTER VOLUME</div>
            <input type="range" class="vol-slider" min="0" max="100" value="70" id="volRange">
        </div>
    </aside>
</div>

<audio id="audio-engine" crossorigin="anonymous"></audio>

<script>
    const STATIONS = [
        { id: '01', n: 'TECHNO-RADIO.pl', u: 'https://stream.laut.fm/tech88' },
        { id: '02', n: 'CLUB-NIGHT', u: 'https://stream.laut.fm/hr3_clubnight' },
        { id: '03', n: '1000 TECHNOHITS', u: 'https://stream.laut.fm/1000techno' },
        { id: '04', n: 'BEST OF TECHNO', u: 'https://stream.laut.fm/best-of-techno' },
        { id: '05', n: 'CHRIS BURN', u: 'https://stream.laut.fm/chris_burn' },
        { id: '06', n: 'GEHIRN TREIBER', u: 'https://stream.laut.fm/gehirn-treiber-beat-radio' }
    ];

    const audio = document.getElementById('audio-engine');
    const trackTitle = document.getElementById('track-title');
    const canvas = document.getElementById('eq-canvas');
    const ctx = canvas.getContext('2d');
    
    let audioCtx, analyser, dataArray;

    // Inicjalizacja Audio API dla precyzyjnego EQ
    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            const source = audioCtx.createMediaElementSource(audio);
            source.connect(analyser);
            analyser.connect(audioCtx.destination);
            analyser.fftSize = 256;
            dataArray = new Uint8Array(analyser.frequencyBinCount);
        }
    }

    STATIONS.forEach((s) => {
        const mod = document.createElement('div');
        mod.className = 'osc-module';
        mod.innerHTML = `<div class="osc-header">OSC ${s.id}</div><div class="station-slot">${s.n}</div>`;
        mod.onclick = () => {
            initAudio();
            document.querySelectorAll('.osc-module').forEach(m => m.classList.remove('active'));
            mod.classList.add('active');
            trackTitle.textContent = s.n;
            audio.src = s.u;
            audio.play();
        };
        document.getElementById('station-list').appendChild(mod);
    });

    document.getElementById('playBtn').onclick = () => { initAudio(); audio.play(); };
    document.getElementById('stopBtn').onclick = () => audio.pause();
    document.getElementById('volRange').oninput = (e) => audio.volume = e.target.value / 100;

    canvas.width = 1200; canvas.height = 600;

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (analyser) analyser.getByteFrequencyData(dataArray);
        
        const layers = 6;
        for (let l = 0; l < layers; l++) {
            ctx.beginPath();
            ctx.strokeStyle = l % 2 === 0 ? `rgba(0, 242, 255, ${0.8 - l*0.1})` : `rgba(255, 0, 229, ${0.4 - l*0.05})`;
            ctx.lineWidth = 2;
            
            for (let i = 0; i < canvas.width; i += 5) {
                const index = Math.floor((i / canvas.width) * (dataArray ? dataArray.length : 1));
                const val = dataArray ? dataArray[index] : 10;
                const phase = l * 15;
                const y = (canvas.height / 2) + Math.sin(i * 0.01 + phase) * (val * 0.8);
                
                if (i === 0) ctx.moveTo(i, y);
                else ctx.lineTo(i, y);
            }
            ctx.stroke();
        }
        requestAnimationFrame(draw);
    }
    draw();
</script>
</body>
</html>
