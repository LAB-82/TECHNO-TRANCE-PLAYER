<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RMF SUBLAB XL EDITION</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600&family=Lexend:wght@400;700&display=swap');

        :root {
            --xl-bg: #111216;
            --xl-panel: #1a1b21;
            --xl-border: #2a2c35;
            --xl-accent-yellow: #f5c518;
            --xl-accent-purple: #8e44ad;
            --xl-accent-green: #a2ff00;
            --xl-text: #8a8d9b;
            --blue-wave: #a2ff00; /* Zielony "Retrig" z SubLab */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body { 
            height: 100vh; width: 100vw; 
            background: var(--xl-bg); color: #fff; 
            font-family: 'Outfit', sans-serif;
            overflow: hidden; 
        }

        body { 
            display: flex; flex-direction: column; padding: 1.2vh;
        }

        /* GÓRNY PASEK - SubLab XL Top Bar */
        header { 
            height: 55px; display: flex; justify-content: space-between; align-items: center;
            background: var(--xl-panel); padding: 0 20px; margin-bottom: 1.5vh; flex-shrink: 0;
            border-radius: 8px; border: 1px solid var(--xl-border);
        }
        .xl-logo { 
            font-family: 'Lexend', sans-serif; font-weight: 800; color: var(--xl-accent-yellow); 
            font-size: 24px; font-style: italic;
        }
        .header-info { 
            background: #25262e; border-radius: 4px; padding: 6px 20px;
            font-size: 13px; color: #fff; letter-spacing: 0.5px;
        }
        .clock { color: var(--xl-text); font-weight: 300; }

        .app-content { display: flex; flex: 1; gap: 15px; min-height: 0; }

        /* SIATKA 5x3 - ORYGINALNY SZKIELET */
        .grid { 
            flex: 1.4; display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            grid-template-rows: repeat(3, 1fr); 
            gap: 10px; 
        }

        .tile {
            background: var(--xl-panel); border: 1px solid var(--xl-border);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; position: relative; overflow: visible;
            border-radius: 10px; transition: 0.2s ease;
        }

        .tile .t-top { font-size: 9px; font-weight: 600; color: var(--xl-text); text-transform: uppercase; z-index: 2; margin-bottom: 3px; }
        .tile .t-bottom { font-size: 14px; font-weight: 600; color: #ececec; text-align: center; z-index: 2; }

        /* AKTYWNA STACJA - Styl SubLab "Active Pad" */
        .tile.active { 
            border-color: var(--xl-accent-purple);
            background: #1f1a26;
            box-shadow: inset 0 0 15px rgba(142, 68, 173, 0.15);
        }
        .tile.active .t-bottom { color: var(--xl-accent-green); }

        /* RIPPLE EFFECT - Neonowy Zielony */
        .waves {
            position: absolute; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            pointer-events: none; opacity: 0; z-index: 1;
        }
        .tile.active .waves { opacity: 0.5; }
        .wave {
            position: absolute; border: 2px solid var(--xl-accent-green); border-radius: 4px;
            width: 10px; height: 10px; opacity: 0;
            animation: ripple 3s infinite cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        @keyframes ripple {
            0% { width: 0; height: 0; opacity: 1; }
            100% { width: 250%; height: 250%; opacity: 0; }
        }

        /* SIDEBAR - SubLab Controls Panel */
        .sidebar { 
            flex: 0.6; display: flex; flex-direction: column; 
            align-items: center; justify-content: space-between; padding: 25px;
            background: var(--xl-panel); border: 1px solid var(--xl-border);
            border-radius: 12px;
        }

        .logo-display {
            width: 100%; padding: 20px; border-radius: 8px;
            background: linear-gradient(180deg, #25262e 0%, #1a1b21 100%);
            text-align: center; border: 1px solid #333;
        }
        .logo-display h2 { font-family: 'Lexend', sans-serif; font-size: 32px; color: #fff; margin-bottom: 5px; }
        .logo-display p { font-size: 11px; color: var(--xl-accent-purple); font-weight: 700; text-transform: uppercase; letter-spacing: 2px; }

        .controls { display: flex; align-items: center; gap: 2vw; }
        .c-svg { width: 32px; height: 32px; fill: var(--xl-text); cursor: pointer; transition: 0.2s; }
        .c-svg:hover { fill: #fff; }
        .c-play { 
            width: 65px; height: 65px; fill: #000; background: var(--xl-accent-yellow); 
            padding: 18px; border-radius: 50%; box-shadow: 0 0 20px rgba(245, 197, 24, 0.3);
        }

        /* VOLUME / MIXER BOX */
        .vol-box { width: 100%; }
        .vol-label { font-size: 10px; color: var(--xl-text); text-transform: uppercase; margin-bottom: 12px; display: flex; justify-content: space-between; }
        .vol-bar { 
            height: 45px; background: #25262e; border-radius: 6px; 
            display: flex; align-items: center; padding: 0 15px; border: 1px solid #333;
        }
        
        input[type="range"] { 
            flex: 1; appearance: none; background: #3d3f4a; height: 4px; border-radius: 2px;
        }
        input[type="range"]::-webkit-slider-thumb { 
            appearance: none; width: 16px; height: 16px; 
            background: #fff; border: 3px solid var(--xl-accent-purple); border-radius: 50%; cursor: pointer;
        }

        @media (max-width: 600px) {
            .app-content { flex-direction: column; }
            .grid { grid-template-columns: repeat(3, 1fr); height: 45vh; }
            .sidebar { width: 100%; height: auto; }
        }
    </style>
</head>
<body>

<header>
    <div class="xl-logo">XL</div>
    <div class="header-info" id="playing-now">PRESET: HAUNTED RMF</div>
    <div class="clock" id="timer">00:00</div>
</header>

<div class="app-content">
    <div class="grid" id="station-grid"></div>

    <aside class="sidebar">
        <div class="logo-display">
            <h2>SubLab</h2>
            <p>X-SUB™ ENGINE</p>
        </div>

        <div class="controls">
            <svg class="c-svg" viewBox="0 0 24 24" onclick="skip(-1)"><path d="M6,18V6H8V18H6M9.5,12L18,6V18L9.5,12Z"/></svg>
            <svg class="c-svg c-play" viewBox="0 0 24 24" onclick="toggle()"><path id="p-ico" d="M8,5.14V19.14L19,12.14L8,5.14Z"/></svg>
            <svg class="c-svg" viewBox="0 0 24 24" onclick="skip(1)"><path d="M16,18H18V6H16M6,18L14.5,12L6,6V18Z"/></svg>
        </div>

        <div class="vol-box">
            <div class="vol-label"><span>Master Out</span><span id="v-val">50%</span></div>
            <div class="vol-bar">
                <input type="range" id="v-range" min="0" max="100" value="50" oninput="setV(this.value)">
            </div>
        </div>
    </aside>
</div>

<audio id="player"></audio>

<script>
    const STATIONS = [
        { n: 'RMF FM', s: 'RMF FM', u: 'rmf_fm' },
        { n: 'RMF MAXXX', s: 'Maxxx', u: 'RMFMAXXX48' },
        { n: 'RMF 80s', s: '80s', u: 'rmf_80s' },
        { n: 'RMF 90s', s: '90s', u: 'rmf_90s' },
        { n: 'RMF 2000', s: '2000', u: 'rmf_2000' },
        { n: 'RMF CHILLOUT', s: 'Chillout', u: 'rmf_chillout' },
        { n: 'RMF CLASSIC', s: 'Classic', u: 'rmf_classic' },
        { n: 'RMF DANCE', s: 'Dance', u: 'rmf_dance' },
        { n: 'RMF GOLD', s: 'Gold', u: 'rmf_gold' },
        { n: 'RMF LATINO', s: 'Latino', u: 'rmf_latino' },
        { n: 'RMF LOVE', s: 'Love', u: 'rmf_love' },
        { n: 'RMF PARTY', s: 'Party', u: 'rmf_party' },
        { n: 'RMF POLSKI ROCK', s: 'Polski Rock', u: 'rmf_polski_rock' },
        { n: 'RMF ROCK', s: 'Rock', u: 'rmf_rock' },
        { n: 'RMF SMOOTH JAZZ', s: 'Smooth Jazz', u: 'rmf_smooth_jazz' }
    ];

    const player = document.getElementById('player'), ico = document.getElementById('p-ico'), grid = document.getElementById('station-grid'), vRange = document.getElementById('v-range'), vVal = document.getElementById('v-val');
    let current = -1;

    function clock() {
        const d = new Date();
        document.getElementById('timer').textContent = d.getHours().toString().padStart(2,'0') + ":" + d.getMinutes().toString().padStart(2,'0');
    }
    setInterval(clock, 1000); clock();

    STATIONS.forEach((s, i) => {
        const t = document.createElement('div');
        t.className = 'tile';
        t.innerHTML = `
            <div class="waves"><div class="wave"></div><div class="wave"></div></div>
            <div class="t-top">SUB OSC ${(i + 1).toString().padStart(2, '0')}</div>
            <div class="t-bottom">${s.s.toUpperCase()}</div>
        `;
        t.onclick = () => play(i);
        grid.appendChild(t);
    });

    function play(i) {
        current = i;
        document.querySelectorAll('.tile').forEach((t, idx) => t.classList.toggle('active', idx === i));
        document.getElementById('playing-now').textContent = "PATCH: " + STATIONS[i].n;
        const streamBase = "https://rs201-krk.rmfstream.pl/";
        player.src = (STATIONS[i].n === 'RMF MAXXX') ? 'https://rs7-krk2-cyfronet.rmfstream.pl/RMFMAXXX48' : streamBase + STATIONS[i].u;
        player.play();
        ico.setAttribute('d', 'M14,19H18V5H14M6,19H10V5H6V19Z');
    }

    function toggle() {
        if(player.paused) { player.play(); ico.setAttribute('d', 'M14,19H18V5H14M6,19H10V5H6V19Z'); }
        else { player.pause(); ico.setAttribute('d', 'M8,5.14V19.14L19,12.14L8,5.14Z'); }
    }

    function skip(d) { let n = current + d; if(n >= 0 && n < STATIONS.length) play(n); }
    function setV(v) { player.volume = v / 100; vVal.textContent = v + "%"; }
</script>
</body>
</html>
