<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TECHNO-TRANCE-PLAYER</title>
    <link href="https://fonts.cdnfonts.com/css/ds-digital" rel="stylesheet">
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        /* Profesjonalna obudowa wzorowana na zdjęciu - bez pokręteł */
        .case-external {
            width: 850px;
            height: 480px;
            background: #1a1a1a;
            border-radius: 60px; /* Zaokrąglenie krawędzi zewnętrznej */
            padding: 15px;
            box-shadow: 0 50px 100px rgba(0,0,0,0.9), inset 0 2px 5px rgba(255,255,255,0.1);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .case-internal {
            width: 100%;
            height: 100%;
            background: #111;
            border-radius: 45px; /* Zaokrąglenie panelu frontowego */
            border: 1px solid #222;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Twoje oryginalne MUZYCZNE RADIO */
        #title-container {
            font-family: 'DS-Digital', monospace;
            font-size: 48px;
            color: #1a0000;
            letter-spacing: 5px;
            margin-bottom: 20px;
            transition: 0.3s;
        }
        .powered #title-container {
            color: #e60012;
            text-shadow: 0 0 20px #e60012;
        }

        /* Twoje głośniki - pozycja ze zdjęcia */
        .speaker {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle, #1a1a1a 0%, #080808 100%);
            border: 4px solid #181818;
            position: absolute;
            top: 110px;
            box-shadow: inset 0 0 30px #000;
        }
        .speaker.left { left: 40px; }
        .speaker.right { right: 40px; }

        /* TWÓJ WYŚWIETLACZ - NIETKNIĘTY */
        .display-frame {
            width: 280px;
            height: 140px;
            background: #000;
            border: 2px solid #333;
            margin-bottom: 25px;
            z-index: 5;
        }
        canvas { width: 100%; height: 100%; display: block; }

        /* TWOJE PRZYCISKI - IDENTYCZNE JAK W KODZIE */
        .controls {
            display: flex;
            gap: 8px;
            z-index: 10;
        }
        .btn {
            width: 62px;
            height: 42px;
            background: linear-gradient(180deg, #2a2a2a 0%, #1a1a1a 100%);
            border: 1px solid #333;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 3px;
        }
        .btn svg { width: 22px; height: 22px; fill: #444; }
        .powered .btn:active { background: #333; }
        .powered .btn.active svg { fill: #e60012; filter: drop-shadow(0 0 5px #e60012); }

        /* Napis L.A.B. i Link - Działający link */
        .lab-info {
            margin-top: 35px;
            text-align: center;
        }
        .lab-circle {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 1px solid #222;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: #222;
        }
        .powered .lab-circle { color: #e60012; border-color: #e60012; }

        .footer-link {
            display: block;
            margin-top: 15px;
            font-size: 11px;
            color: #1a0000;
            text-decoration: none;
            letter-spacing: 1px;
        }
        .powered .footer-link { color: #400; }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="case-external" id="mainCase">
    <div class="case-internal">
        <div id="title-container">MUZYCZNE RADIO</div>
        
        <div class="speaker left"></div>
        <div class="speaker right"></div>

        <div class="display-frame">
            <canvas id="viz"></canvas>
        </div>

        <div class="controls">
            <button id="pwr" class="btn"><svg viewBox="0 0 24 24"><path d="M13,3h-2v10h2V3z M17.8,4.5l-1.4,1.4C18.3,7.4,19,9.6,19,12c0,3.9-3.1,7-7,7s-7-3.1-7-7c0-2.4,0.7-4.6,2.6-6.1L6.2,4.5 C3.6,6.4,2,9.5,2,13c0,5.5,4.5,10,10,10s10-4.5,10-10C22,9.5,20.4,6.4,17.8,4.5z"/></svg></button>
            <button id="play" class="btn"><svg viewBox="0 0 24 24"><path d="M8,5.14V19.14L19,12.14L8,5.14Z"/></svg></button>
            <button id="stop" class="btn"><svg viewBox="0 0 24 24"><path d="M6,6H18V18H6V6Z"/></svg></button>
            <button id="vDn" class="btn"><svg viewBox="0 0 24 24"><path d="M19,13H5V11H19V13Z"/></svg></button>
            <button id="vUp" class="btn"><svg viewBox="0 0 24 24"><path d="M19,13H13V19H11V13H5V11H11V5H13V11H19V13Z"/></svg></button>
        </div>

        <div class="lab-info">
            <div class="lab-circle">L.A.B.</div>
            <a href="https://www.muzyczneradio.pl" target="_blank" class="footer-link">WWW.MUZYCZNERADIO.PL</a>
        </div>
    </div>
</div>

<audio id="stream" crossorigin="anonymous" src="https://stream.rcs.revma.com/gzwc1xcq042vv"></audio>

<script>
    const audio = document.getElementById('stream');
    const canvas = document.getElementById('viz');
    const ctx = canvas.getContext('2d');
    const mainCase = document.getElementById('mainCase');
    const pwrBtn = document.getElementById('pwr');

    let audioCtx, analyser, source, dataArray, isOn = false;

    pwrBtn.onclick = () => {
        isOn = !isOn;
        mainCase.classList.toggle('powered');
        pwrBtn.classList.toggle('active');
        if(!isOn) { 
            audio.pause(); 
            renderBars(null); 
        }
    };

    document.getElementById('play').onclick = function() {
        if(!isOn) return;
        if(!audioCtx) {
            audioCtx = new(window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            source = audioCtx.createMediaElementSource(audio);
            source.connect(analyser);
            analyser.fftSize = 64;
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            source.connect(audioCtx.destination);
        }
        audio.play();
        this.classList.add('active');
        loop();
    };

    document.getElementById('stop').onclick = () => {
        audio.pause(); audio.currentTime = 0;
        document.getElementById('play').classList.remove('active');
    };

    document.getElementById('vUp').onclick = () => { audio.volume = Math.min(1, audio.volume + 0.1); };
    document.getElementById('vDn').onclick = () => { audio.volume = Math.max(0, audio.volume - 0.1); };

    function renderBars(data) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const bars = 32;
        const w = canvas.width / bars;
        for (let i = 0; i < bars; i++) {
            const h = data ? (data[i] / 255) * canvas.height : 0;
            ctx.fillStyle = isOn ? '#e60012' : '#111';
            // Oryginalne parametry wyświetlacza segmentowego
            for(let j=0; j<10; j++) {
                if(j < (h/10)) {
                    ctx.fillRect(i*w + 1, canvas.height - (j*14) - 12, w-2, 10);
                }
            }
        }
    }

    function loop() {
        if(!isOn || audio.paused) return;
        requestAnimationFrame(loop);
        analyser.getByteFrequencyData(dataArray);
        renderBars(dataArray);
    }

    window.onload = () => {
        canvas.width = canvas.clientWidth;
        canvas.height = canvas.clientHeight;
        renderBars(null);
    };
</script>

</body>
</html>
