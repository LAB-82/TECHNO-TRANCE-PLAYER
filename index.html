<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RMF DISCOVERY PRO - VIRTUAL ANALOG INTERFACE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;600;700&display=swap');
        
        :root {
            --synth-red: #a81d1d;
            --panel-dark: #2a2a2a;
            --led-red: #ff0000;
            --led-dim: #440000;
            --label-white: #d1d1d1;
            --knob-bg: #1a1a1a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            height: 100vh; background: #0a0a0a; 
            font-family: 'Rajdhani', sans-serif;
            display: flex; align-items: center; justify-content: center;
        }

        /* Obudowa syntezatora */
        .synth-chassis {
            width: 1100px; height: 550px;
            background: var(--synth-red);
            border-radius: 4px; padding: 15px;
            box-shadow: inset 0 2px 10px rgba(255,255,255,0.2), 0 30px 60px rgba(0,0,0,0.8);
            display: flex; flex-direction: column;
            border-bottom: 8px solid #6b1212;
            position: relative;
        }

        /* Sekcje paneli */
        .top-row { display: flex; gap: 10px; flex: 1.2; margin-bottom: 10px; }
        .bottom-row { display: flex; gap: 10px; flex: 0.8; }

        .section-box {
            background: var(--panel-dark);
            border-radius: 3px; border: 1px solid #000;
            padding: 10px; position: relative;
        }

        .section-label {
            position: absolute; top: 5px; left: 10px;
            font-size: 10px; font-weight: 700; color: var(--synth-red);
            text-transform: uppercase; letter-spacing: 1px;
        }

        /* Wyświetlacz LED (Program/Bank) */
        .led-display {
            background: #150000; border: 2px solid #333;
            padding: 5px 15px; border-radius: 2px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: inset 0 0 10px #000;
        }
        .led-text {
            font-family: 'Orbitron', sans-serif;
            color: var(--led-red); font-size: 18px;
            text-shadow: 0 0 8px var(--led-red);
        }

        /* Siatka stacji jako przyciski wyboru Patchy */
        .patch-grid {
            flex: 2; display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 6px; padding-top: 15px;
        }
        .patch-btn {
            background: #1f1f1f; border: 1px solid #000;
            border-radius: 2px; color: #888; font-size: 11px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-weight: 600; text-transform: uppercase;
            box-shadow: 0 2px 0 #000;
        }
        .patch-btn.active {
            background: #333; color: #fff; border-color: var(--led-red);
            box-shadow: 0 0 5px var(--led-red);
        }

        /* Master Control Section */
        .master-section { flex: 1; display: flex; flex-direction: column; gap: 10px; }
        
        /* Pokrętła (Knobs) */
        .knob-container {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            flex: 1;
        }
        .knob-outer {
            width: 80px; height: 80px; background: var(--knob-bg);
            border-radius: 50%; border: 3px solid #000;
            position: relative; cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .knob-indicator {
            position: absolute; top: 10px; left: 50%; width: 4px; height: 20px;
            background: var(--led-red); transform: translateX(-50%);
            border-radius: 2px; transform-origin: center 30px;
        }

        /* Przyciski funkcyjne (jak te po lewej na obrazku) */
        .func-column { display: flex; flex-direction: column; gap: 8px; width: 60px; }
        .func-btn {
            height: 25px; background: #222; border: 1px solid #000;
            border-radius: 2px; color: #fff; font-size: 9px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-weight: 700; box-shadow: 0 2px 0 #000;
        }
        .func-btn.red { background: #600; color: #ff9999; }

        /* Dolny główny wyświetlacz Programu */
        .main-status {
            flex: 2; background: #1a0000; border: 2px solid #444;
            display: flex; flex-direction: column; justify-content: center;
            padding: 0 20px; border-radius: 3px;
        }
        .status-line { color: var(--led-red); font-family: 'Orbitron', sans-serif; font-size: 12px; }
        .status-big { color: var(--led-red); font-family: 'Orbitron', sans-serif; font-size: 22px; text-shadow: 0 0 10px var(--led-red); }

        /* Logo Discovery Pro */
        .brand-logo {
            flex: 1; display: flex; flex-direction: column; align-items: flex-end; justify-content: center;
            color: #fff; text-align: right;
        }
        .brand-logo h1 { font-size: 28px; font-weight: 700; font-style: italic; letter-spacing: -1px; }
        .brand-logo p { font-size: 9px; color: #ffaa00; font-weight: 600; text-transform: uppercase; }

    </style>
</head>
<body>

<div class="synth-chassis">
    <div class="top-row">
        <div class="section-box func-column" style="background: transparent; border: none;">
            <div class="func-btn">ASSIGN</div>
            <div class="func-btn red">PANIC</div>
            <div class="func-btn">MENU</div>
            <div class="func-btn" style="margin-top: 20px;" onclick="toggle()">PLAY</div>
        </div>

        <div class="section-box" style="flex: 2.5;">
            <div class="section-label">Oscillators / Station Select</div>
            <div class="patch-grid" id="grid"></div>
        </div>

        <div class="section-box master-section">
            <div class="section-label">Master Volume</div>
            <div class="knob-container">
                <div class="knob-outer" id="v-knob" onclick="resetVol()">
                    <div class="knob-indicator" id="v-ptr"></div>
                </div>
                <div style="color: #fff; font-size: 10px; margin-top: 10px; font-weight: 700;">GAIN: <span id="vol-val">50</span>%</div>
            </div>
            <input type="range" id="v-slider" min="0" max="100" value="50" oninput="setV(this.value)" style="width: 100%; accent-color: var(--led-red);">
        </div>
    </div>

    <div class="bottom-row">
        <div class="section-box led-display" style="flex: 0.5;">
            <div class="led-text" id="bank-num">01</div>
        </div>

        <div class="section-box main-status">
            <div class="status-line">PROGRAM NAME / BANK</div>
            <div class="status-big" id="patch-name">RMF FM - INITIAL</div>
        </div>

        <div class="brand-logo">
            <h1>DISCOVERY <span>PRO</span></h1>
            <p>128 Voice Multilayer Virtual Analog Radio Engine</p>
        </div>
    </div>
</div>

<audio id="player"></audio>

<script>
    const STATIONS = [
        { n: 'RMF FM', u: 'rmf_fm' }, { n: 'RMF MAXXX', u: 'RMFMAXXX48' },
        { n: 'RMF 80s', u: 'rmf_80s' }, { n: 'RMF 90s', u: 'rmf_90s' },
        { n: 'RMF 2000', u: 'rmf_2000' }, { n: 'RMF CHILLOUT', u: 'rmf_chillout' },
        { n: 'RMF CLASSIC', u: 'rmf_classic' }, { n: 'RMF DANCE', u: 'rmf_dance' },
        { n: 'RMF GOLD', u: 'rmf_gold' }, { n: 'RMF PARTY', u: 'rmf_party' },
        { n: 'RMF ROCK', u: 'rmf_rock' }, { n: 'RMF LOVE', u: 'rmf_love' },
        { n: 'RMF POLSKI ROCK', u: 'rmf_polski_rock' }, { n: 'RMF JAZZ', u: 'rmf_smooth_jazz' },
        { n: 'RMF HIP HOP', u: 'rmf_hip_hop' }, { n: 'RMF GROOVE', u: 'rmf_groove' }
    ];

    const player = document.getElementById('player'), 
          grid = document.getElementById('grid'),
          vPtr = document.getElementById('v-ptr'),
          vSlider = document.getElementById('v-slider'),
          volVal = document.getElementById('vol-val'),
          patchName = document.getElementById('patch-name'),
          bankNum = document.getElementById('bank-num');

    let current = -1;

    STATIONS.forEach((s, i) => {
        const btn = document.createElement('div');
        btn.className = 'patch-btn';
        btn.textContent = `P-${(i+1).toString().padStart(2,'0')}`;
        btn.onclick = () => play(i);
        grid.appendChild(btn);
    });

    function play(i) {
        current = i;
        document.querySelectorAll('.patch-btn').forEach((b, idx) => b.classList.toggle('active', idx === i));
        patchName.textContent = STATIONS[i].n;
        bankNum.textContent = (i + 1).toString().padStart(2, '0');
        
        const streamBase = "https://rs201-krk.rmfstream.pl/";
        player.src = (STATIONS[i].n === 'RMF MAXXX') ? 'https://rs7-krk2-cyfronet.rmfstream.pl/RMFMAXXX48' : streamBase + STATIONS[i].u;
        player.play();
    }

    function toggle() {
        if(current === -1) { play(0); return; }
        if(!player.paused) player.pause(); else player.play();
    }

    function setV(v) {
        player.volume = v / 100;
        volVal.textContent = v;
        // Obrót wskaźnika pokrętła (od -150 do +150 stopni)
        const rot = (v * 3) - 150;
        vPtr.style.transform = `translateX(-50%) rotate(${rot}deg)`;
    }

    function resetVol() { vSlider.value = 50; setV(50); }

    // Init
    setV(50);
</script>

</body>
</html>
