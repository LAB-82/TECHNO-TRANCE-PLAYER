<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RMF DUNE 3 - VST INTERFACE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Saira:wght@400;500;600;700&display=swap');
        
        :root {
            --dune-main: #2b2b2b;
            --dune-panel: #3a3a3a;
            --dune-border: #1a1a1a;
            --dune-accent: #ff453a; /* Czerwone akcenty Dune */
            --dune-screen: #e6e6e6; /* Jasny ekran centralny */
            --wood-trim: #5d3a24;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            height: 100vh; background: #121212; 
            font-family: 'Saira', sans-serif;
            display: flex; align-items: center; justify-content: center;
        }

        /* Główna obudowa z drewnianymi bokami */
        .vst-chassis {
            width: 1050px; height: 720px;
            background: var(--dune-main);
            border-left: 15px solid var(--wood-trim);
            border-right: 15px solid var(--wood-trim);
            border-top: 2px solid #444;
            border-bottom: 5px solid #111;
            box-shadow: 0 50px 100px rgba(0,0,0,0.9);
            display: flex; flex-direction: column;
            padding: 10px; position: relative;
        }

        /* Ekran centralny */
        .central-display {
            background: var(--dune-screen);
            border: 4px solid var(--dune-border);
            height: 220px; width: 420px;
            margin: 0 auto 15px;
            padding: 15px;
            display: flex; flex-direction: column;
            color: #333; box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
        }
        .screen-header { font-weight: 700; border-bottom: 1px solid #ccc; padding-bottom: 5px; margin-bottom: 10px; font-size: 14px; text-transform: uppercase; color: #666; text-align: center; }
        .patch-info { flex: 1; font-weight: 600; font-size: 22px; color: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .patch-desc { font-size: 11px; color: #666; text-align: center; margin-top: 5px; line-height: 1.4; }

        .vst-grid { display: grid; grid-template-columns: 280px 1fr 280px; gap: 10px; flex: 1; }

        .side-panel { display: flex; flex-direction: column; gap: 10px; }
        
        .module-box {
            background: var(--dune-panel);
            border: 1px solid var(--dune-border);
            border-radius: 2px; padding: 10px;
            position: relative; box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
        }
        .module-label { font-size: 10px; font-weight: 700; color: #aaa; text-transform: uppercase; border-bottom: 1px solid #222; margin-bottom: 8px; }

        /* Przyciski stacji - Matrix Style */
        .station-matrix { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; }
        .matrix-btn {
            height: 35px; background: #222; border: 1px solid #111;
            color: #888; font-size: 10px; font-weight: 700;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.2s;
        }
        .matrix-btn:hover { background: #333; }
        .matrix-btn.active {
            background: #2a2a2a; border-color: var(--dune-accent);
            color: var(--dune-accent); box-shadow: 0 0 8px rgba(255, 69, 58, 0.3);
        }

        /* Pokrętła DUNE (Knobs) */
        .knob-group { display: flex; justify-content: space-around; padding: 10px 0; }
        .knob-wrap { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .knob-cap {
            width: 45px; height: 45px; background: #1a1a1a;
            border-radius: 50%; border: 2px solid #000;
            position: relative; box-shadow: 0 4px 5px rgba(0,0,0,0.4);
            cursor: pointer;
        }
        .knob-cap::after {
            content: ""; position: absolute; top: 5px; left: 50%; width: 2px; height: 10px;
            background: var(--dune-accent); transform: translateX(-50%);
        }
        .knob-val { font-size: 9px; color: #ccc; font-weight: 600; text-transform: uppercase; }

        /* Klawiatura na dole */
        .keyboard {
            height: 140px; background: #fff;
            margin-top: 15px; display: flex;
            border-top: 5px solid #000; position: relative;
        }
        .white-key { flex: 1; border: 1px solid #ccc; background: #fff; border-bottom-left-radius: 3px; border-bottom-right-radius: 3px; }
        .black-key { 
            position: absolute; width: 2.5%; height: 60%; background: #222; 
            z-index: 2; border-bottom-left-radius: 2px; border-bottom-right-radius: 2px;
        }

        /* Logo Synapse/Dune */
        .vst-brand { text-align: center; padding: 10px; }
        .vst-brand h2 { font-size: 18px; letter-spacing: 4px; color: #fff; font-weight: 600; text-transform: uppercase; }
        .vst-brand h2 span { color: var(--dune-accent); }

    </style>
</head>
<body>

<div class="vst-chassis">
    <div class="vst-brand">
        <h2>SYNAPSE <span>RMF RADIO 3</span></h2>
    </div>

    <div class="central-display">
        <div class="screen-header">Differential Radio Engine</div>
        <div class="patch-info">
            <div id="patch-num">001</div>
            <div id="patch-name">Adrenaline FM</div>
            <div class="patch-desc">
                Source: 48kHz Digital Stream<br>
                Mode: Stereo HQ / No Latency
            </div>
        </div>
    </div>

    <div class="vst-grid">
        <div class="side-panel">
            <div class="module-box" style="flex: 1;">
                <div class="module-label">Oscillator / Station</div>
                <div class="station-matrix" id="grid"></div>
            </div>
            <div class="module-box">
                <div class="module-label">Master Controls</div>
                <div class="knob-group">
                    <div class="knob-wrap">
                        <div class="knob-cap" id="v-knob" style="transform: rotate(0deg);"></div>
                        <div class="knob-val">Volume</div>
                    </div>
                    <div class="knob-wrap">
                        <div class="knob-cap" style="transform: rotate(-45deg);"></div>
                        <div class="knob-val">Limit</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="main-panel">
            <div class="module-box" style="height: 100%;">
                <div class="module-label">Filter & Amp Envelope</div>
                <div class="knob-group">
                    <div class="knob-wrap"><div class="knob-cap"></div><div class="knob-val">Attack</div></div>
                    <div class="knob-wrap"><div class="knob-cap"></div><div class="knob-val">Decay</div></div>
                    <div class="knob-wrap"><div class="knob-cap"></div><div class="knob-val">Sustain</div></div>
                    <div class="knob-wrap"><div class="knob-cap"></div><div class="knob-val">Release</div></div>
                </div>
                <div style="margin-top: 20px; text-align: center;">
                    <button id="p-btn" onclick="toggle()" style="background: #222; border: 1px solid var(--dune-accent); color: #fff; padding: 10px 30px; cursor: pointer; font-family: inherit; font-weight: 700; text-transform: uppercase;">Power / Play</button>
                </div>
            </div>
        </div>

        <div class="side-panel">
            <div class="module-box" style="flex: 1;">
                <div class="module-label">Output Level</div>
                <div style="height: 180px; width: 100%; background: #111; position: relative; border-radius: 2px; overflow: hidden;">
                    <div id="v-meter" style="position: absolute; bottom: 0; width: 100%; height: 50%; background: linear-gradient(to top, var(--dune-accent), #ffcc00); transition: 0.1s;"></div>
                </div>
                <input type="range" id="v-slider" min="0" max="100" value="50" oninput="setV(this.value)" style="width: 100%; margin-top: 10px; accent-color: var(--dune-accent);">
            </div>
        </div>
    </div>

    <div class="keyboard">
        <!-- Generowane klawisze -->
        <div class="white-key"></div><div class="white-key"></div><div class="white-key"></div><div class="white-key"></div><div class="white-key"></div><div class="white-key"></div><div class="white-key"></div><div class="white-key"></div><div class="white-key"></div><div class="white-key"></div><div class="white-key"></div><div class="white-key"></div><div class="white-key"></div><div class="white-key"></div><div class="white-key"></div><div class="white-key"></div>
        <div class="black-key" style="left: 4.5%;"></div><div class="black-key" style="left: 10.5%;"></div><div class="black-key" style="left: 23%;"></div><div class="black-key" style="left: 29.5%;"></div><div class="black-key" style="left: 36%;"></div>
    </div>
</div>

<audio id="player"></audio>

<script>
    const STATIONS = [
        { n: 'RMF FM', u: 'rmf_fm' }, { n: 'RMF MAXXX', u: 'RMFMAXXX48' },
        { n: 'RMF 80s', u: 'rmf_80s' }, { n: 'RMF 90s', u: 'rmf_90s' },
        { n: 'RMF 2000', u: 'rmf_2000' }, { n: 'RMF CHILLOUT', u: 'rmf_chillout' },
        { n: 'RMF CLASSIC', u: 'rmf_classic' }, { n: 'RMF DANCE', u: 'rmf_dance' },
        { n: 'RMF GOLD', u: 'rmf_gold' }, { n: 'RMF PARTY', u: 'rmf_party' },
        { n: 'RMF ROCK', u: 'rmf_rock' }, { n: 'RMF LOVE', u: 'rmf_love' },
        { n: 'RMF POLSKI ROCK', u: 'rmf_polski_rock' }, { n: 'RMF JAZZ', u: 'rmf_smooth_jazz' },
        { n: 'RMF HIP HOP', u: 'rmf_hip_hop' }, { n: 'RMF GROOVE', u: 'rmf_groove' }
    ];

    const player = document.getElementById('player'), 
          grid = document.getElementById('grid'),
          vKnob = document.getElementById('v-knob'),
          vMeter = document.getElementById('v-meter'),
          patchName = document.getElementById('patch-name'),
          patchNum = document.getElementById('patch-num');

    let current = -1;

    STATIONS.forEach((s, i) => {
        const btn = document.createElement('div');
        btn.className = 'matrix-btn';
        btn.textContent = (i + 1).toString().padStart(3, '0');
        btn.onclick = () => play(i);
        grid.appendChild(btn);
    });

    function play(i) {
        current = i;
        document.querySelectorAll('.matrix-btn').forEach((b, idx) => b.classList.toggle('active', idx === i));
        patchName.textContent = STATIONS[i].n;
        patchNum.textContent = (i + 1).toString().padStart(3, '0');
        
        const streamBase = "https://rs201-krk.rmfstream.pl/";
        player.src = (STATIONS[i].n === 'RMF MAXXX') ? 'https://rs7-krk2-cyfronet.rmfstream.pl/RMFMAXXX48' : streamBase + STATIONS[i].u;
        player.play();
        document.getElementById('p-btn').style.borderColor = "var(--dune-accent)";
    }

    function toggle() {
        if(current === -1) { play(0); return; }
        if(!player.paused) {
            player.pause();
            document.getElementById('p-btn').style.borderColor = "#444";
        } else {
            player.play();
            document.getElementById('p-btn').style.borderColor = "var(--dune-accent)";
        }
    }

    function setV(v) {
        player.volume = v / 100;
        vMeter.style.height = v + "%";
        // Obrót pokrętła od -150 do 150 stopni
        vKnob.style.transform = `rotate(${(v * 3) - 150}deg)`;
    }

    // Prosta wizualizacja mrugania miernika
    setInterval(() => {
        if(!player.paused) {
            let flicker = (Math.random() * 10) - 5;
            vMeter.style.opacity = 0.8 + (Math.random() * 0.2);
        }
    }, 100);

    setV(50);
</script>

</body>
</html>
