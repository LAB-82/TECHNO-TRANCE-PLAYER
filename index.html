<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>GEHIRN TREIBER - ULTRA NEON HUD</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');

        :root {
            --cyan: #00f2ff;
            --magenta: #ff00e5;
            --blue: #0044ff;
            --bg: #020b10;
            --glass-border: rgba(0, 242, 255, 0.2);
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(0, 68, 255, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(255, 0, 229, 0.05) 0%, transparent 40%);
            color: var(--cyan);
            font-family: 'Orbitron', sans-serif;
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* GŁÓWNY PANEL Z EFEKTEM SZKŁA */
        .main-terminal {
            width: 96vw;
            height: 90vh;
            background: rgba(10, 25, 33, 0.6);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            display: flex;
            padding: 30px;
            gap: 40px;
            box-shadow: 0 0 50px rgba(0,0,0,1);
            position: relative;
        }

        /* SIATKA KAFELKÓW (RMF FM STYLE) */
        .grid {
            flex: 2;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
        }

        /* KAFELEK - FULL NEON AUDIT */
        .tile {
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(0,242,255,0.02) 100%);
            border: 1px solid rgba(0, 242, 255, 0.15);
            border-radius: 4px;
            position: relative;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase;
        }

        /* Efekt świecących narożników z obrazka */
        .tile::after {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 4px;
            padding: 1px;
            background: linear-gradient(45deg, var(--cyan), transparent, var(--blue));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0.3;
        }

        .tile:hover {
            background: rgba(0, 242, 255, 0.1);
            filter: drop-shadow(0 0 15px var(--cyan));
            transform: translateY(-5px);
        }

        .tile.active {
            background: rgba(255, 0, 229, 0.15);
            border-color: var(--magenta);
            filter: drop-shadow(0 0 20px var(--magenta));
        }

        .tile .name { font-weight: 900; font-size: 16px; letter-spacing: 2px; }
        .tile .meta { font-size: 9px; opacity: 0.5; margin-top: 10px; }

        /* PANEL KONTROLNY (SIDEBAR) */
        .sidebar {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        /* OKRĄGŁY GAUGE Z OBRAZKA */
        .gauge-wrap {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto;
            background: radial-gradient(circle, rgba(0,242,255,0.1) 0%, transparent 70%);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid rgba(0, 242, 255, 0.05);
        }

        .gauge-value { font-size: 40px; font-weight: 900; color: #fff; text-shadow: 0 0 20px var(--cyan); }

        /* PRZYCISKI - GRADIENT & GLOW */
        .control-btns { display: flex; gap: 15px; }
        
        .btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 4px;
            background: linear-gradient(180deg, #111 0%, #000 100%);
            color: var(--cyan);
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            border: 1px solid var(--cyan);
            transition: 0.3s;
            text-shadow: 0 0 5px var(--cyan);
        }

        .btn:hover {
            background: var(--cyan);
            color: #000;
            box-shadow: 0 0 30px var(--cyan);
        }

        .btn-stop { border-color: var(--magenta); color: var(--magenta); text-shadow: 0 0 5px var(--magenta); }
        .btn-stop:hover { background: var(--magenta); box-shadow: 0 0 30px var(--magenta); }

        /* PASKI OBJĘTOŚCI (VOLUME) - GRADIENTOWE */
        .vol-container {
            background: rgba(0,0,0,0.3);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid rgba(0,242,255,0.1);
        }

        input[type="range"] {
            width: 100%;
            height: 10px;
            appearance: none;
            background: #111;
            border-radius: 5px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            appearance: none;
            width: 25px;
            height: 25px;
            background: var(--cyan);
            border-radius: 4px;
            cursor: pointer;
            box-shadow: 0 0 15px var(--cyan);
        }

        .status-text {
            font-size: 10px;
            color: var(--magenta);
            letter-spacing: 4px;
            text-align: center;
            margin-top: auto;
            animation: pulse 2s infinite;
        }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    </style>
</head>
<body>

<div class="main-terminal">
    <div class="grid" id="station-grid"></div>

    <aside class="sidebar">
        <div class="gauge-wrap">
            <div class="gauge-value" id="signal-percent">88%</div>
            <!-- Dekoracyjny pierścień -->
            <div style="position: absolute; width: 100%; height: 100%; border: 1px dashed var(--cyan); border-radius: 50%; animation: rotate 20s linear infinite; opacity: 0.3;"></div>
        </div>

        <div style="text-align: center;">
            <div style="font-size: 10px; opacity: 0.5;">DECODING_SIGNAL...</div>
            <h2 id="now-playing" style="color: #fff; text-shadow: 0 0 15px var(--cyan);">READY</h2>
        </div>

        <div class="control-btns">
            <button class="btn" onclick="audio.play()">PLAY</button>
            <button class="btn btn-stop" onclick="audio.pause()">STOP</button>
        </div>

        <div class="vol-container">
            <div style="display:flex; justify-content: space-between; margin-bottom: 10px; font-size: 12px;">
                <span>OUTPUT_GAIN</span>
                <span id="vol-val">70%</span>
            </div>
            <input type="range" id="volume" min="0" max="100" value="70" oninput="setVolume(this.value)">
        </div>

        <div class="status-text">CRITICAL_SYSTEM_LINK_ACTIVE</div>
    </aside>
</div>

<audio id="player"></audio>

<script>
    const STATIONS = [
        { n: 'NEON CORE', u: 'https://stream.laut.fm/tech88' },
        { n: 'CYBER DRIVE', u: 'https://stream.laut.fm/hr3_clubnight' },
        { n: 'DATA PULSE', u: 'https://stream.laut.fm/1000techno' },
        { n: 'VOID SIGNAL', u: 'https://stream.laut.fm/best-of-techno' },
        { n: 'SYNTH NODE', u: 'https://stream.laut.fm/chris_burn' },
        { n: 'UPLINK 06', u: 'https://stream.laut.fm/retroelectronicmusic' },
        { n: 'GEHIRN TRB', u: 'https://stream.laut.fm/gehirn-treiber-beat-radio' },
        { n: 'EMPTY_SLOT', u: '' },
        { n: 'EMPTY_SLOT', u: '' }
    ];

    const grid = document.getElementById('station-grid');
    const audio = document.getElementById('player');
    const display = document.getElementById('now-playing');
    const signal = document.getElementById('signal-percent');

    STATIONS.forEach((s, i) => {
        const t = document.createElement('div');
        t.className = 'tile';
        t.innerHTML = `<div class="name">${s.n}</div><div class="meta">BANK_0${i} // 44.1kHz</div>`;
        t.onclick = () => {
            if(!s.u) return;
            document.querySelectorAll('.tile').forEach(x => x.classList.remove('active'));
            t.classList.add('active');
            display.textContent = s.n;
            signal.textContent = Math.floor(Math.random() * 20 + 80) + '%';
            audio.src = s.u;
            audio.play();
        };
        grid.appendChild(t);
    });

    function setVolume(v) {
        audio.volume = v / 100;
        document.getElementById('vol-val').textContent = v + '%';
    }
</script>

<style>
    @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
</style>

</body>
</html>
