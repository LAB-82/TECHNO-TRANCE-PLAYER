<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio - L.A.B. Audio</title>
    <link href="https://fonts.cdnfonts.com/css/ds-digital" rel="stylesheet">
    <style>
        body { margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center; background: #222; font-family: 'Segoe UI', Arial, sans-serif; -webkit-user-select: none; user-select: none; }
        .case-outer { padding: 18px; background: #4e342e; background-image: repeating-linear-gradient(45deg, rgba(0,0,0,0.05) 0px, rgba(0,0,0,0.05) 2px, transparent 2px, transparent 4px), linear-gradient(135deg, #5d4037 0%, #2b1d1a 100%); border-radius: 40px; box-shadow: 0 50px 100px rgba(0,0,0,0.7), inset 0 0 30px rgba(0,0,0,0.5); position: relative; clip-path: polygon(6% 0%, 94% 0%, 100% 10%, 100% 90%, 94% 100%, 6% 100%, 0% 90%, 0% 10%); }
        .radio-front { width: 820px; height: 480px; background: #fdfdfd; position: relative; display: flex; flex-direction: column; align-items: center; border: 1px solid #ccc; clip-path: polygon(6% 0%, 94% 0%, 100% 10%, 100% 90%, 94% 100%, 6% 100%, 0% 90%, 0% 10%); }

        /* PRZYWRÓCONY NEON Z KODU POGLĄDOWEGO */
        .main-title { 
            margin-top: 35px; 
            font-size: 26px; 
            color: #444; 
            letter-spacing: 5px; 
            font-weight: 900; 
            text-transform: uppercase; 
            transition: all 0.4s ease;
        }

        .powered .main-title { 
            color: #000; 
            /* Dokładny efekt neonu z Twojego kodu */
            text-shadow: 1px 1px 1px #fff, 0 0 10px rgba(0,0,0,0.2); 
        } 

        .lcd-display { width: 220px; height: 135px; background: #0a0a0a; border: 6px solid #1a1a1a; border-radius: 4px; margin-top: 20px; display: flex; flex-direction: column; justify-content: center; align-items: center; font-family: 'DS-Digital', monospace; color: #111; transition: 0.4s; box-shadow: inset 0 0 20px #000; }
        .powered .lcd-display { color: #000; background: #e0e0e0; box-shadow: inset 0 0 20px rgba(0,0,0,0.15); }
        .lcd-station { font-size: 18px; margin-bottom: 5px; height: 20px; text-align: center; }
        .lcd-time { font-size: 40px; font-weight: bold; }
        .lcd-date { font-size: 18px; margin-top: 5px; opacity: 0.8; }

        .speaker-mesh { width: 200px; height: 200px; background: radial-gradient(circle, #222 1.2px, transparent 1.8px); background-size: 5px 5px; background-color: #111; border-radius: 50%; position: absolute; top: 105px; border: 8px solid #dcdcdc; box-shadow: 0 10px 25px rgba(0,0,0,0.3), inset 0 0 30px #000; }
        .spk-l { left: 40px; } .spk-r { right: 40px; }

        .controls-area { position: absolute; bottom: 40px; display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .btn-rack { display: flex; gap: 10px; padding: 15px 25px; border-radius: 12px; background: #111; border: 1px solid #333; }
        .btn-pro { width: 58px; height: 42px; border-radius: 6px; border: 1px solid #333; background: #1a1a1a; color: #555; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .btn-pro svg { width: 24px; height: 24px; fill: currentColor; }
        
        /* PODŚWIETLENIE PRZYCISKÓW - CZARNE */
        .powered .btn-pro.active { color: #000 !important; background: #fff !important; border-color: #000; box-shadow: 0 0 10px rgba(0,0,0,0.2); }

        .station-rack { display: flex; gap: 12px; }
        .btn-station-pro { width: 70px; height: 26px; background: linear-gradient(180deg, #fff 0%, #d1d1d1 100%); border: 1px solid #aaa; border-radius: 4px; font-size: 11px; font-weight: 900; color: #333; cursor: pointer; text-transform: uppercase; }
        
        .vol-wrapper { display: flex; flex-direction: column; gap: 6px; width: 110px; }
        .vol-bar { width: 100%; height: 6px; background: #000; border-radius: 3px; overflow: hidden; }
        .vol-fill { height: 100%; width: 50%; background: #000; opacity: 0; transition: 0.3s; }
        .powered .vol-fill { opacity: 1; }
    </style>
</head>
<body>
<div class="case-outer">
    <div class="radio-front" id="mainPanel">
        <div class="main-title">L.A.B. Audio</div>
        <div class="lcd-display">
            <div id="lcdStation" class="lcd-station"></div>
            <div id="lcdTime" class="lcd-time">00:00:00</div>
            <div id="lcdDate" class="lcd-date">00:00:0000</div>
        </div>
        <div class="speaker-mesh spk-l"></div>
        <div class="speaker-mesh spk-r"></div>
        <div class="controls-area">
            <div class="btn-rack">
                <button id="pwr" class="btn-pro"><svg viewBox="0 0 24 24"><path d="M13,3h-2v10h2V3z M17.8,4.5l-1.4,1.4C18.3,7.4,19,9.6,19,12c0,3.9-3.1,7-7,7s-7-3.1-7-7c0-2.4,0.7-4.6,2.6-6.1L6.2,4.5 C3.6,6.4,2,9.5,2,13c0,5.5,4.5,10,10,10s10-4.5,10-10C22,9.5,20.4,6.4,17.8,4.5z"/></svg></button>
                <button id="play" class="btn-pro"><svg viewBox="0 0 24 24"><path d="M8,5.14V19.14L19,12.14L8,5.14Z"/></svg></button>
                <button id="stop" class="btn-pro"><svg viewBox="0 0 24 24"><path d="M6,6H18V18H6V6Z"/></svg></button>
                <button id="mute" class="btn-pro"><svg viewBox="0 0 24 24"><path id="mute-path" d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg></button>
                <div class="vol-wrapper">
                    <div style="display:flex; gap:5px; height:26px;">
                        <button id="vDown" class="btn-pro" style="width:100%"><svg viewBox="0 0 24 24"><path d="M19,13H5V11H19V13Z"/></svg></button>
                        <button id="vUp" class="btn-pro" style="width:100%"><svg viewBox="0 0 24 24"><path d="M19,13H13V19H11V13H5V11H11V5H13V11H19V13Z"/></svg></button>
                    </div>
                    <div class="vol-bar"><div id="vFill" class="vol-fill"></div></div>
                </div>
            </div>
            <div class="station-rack">
                <button class="btn-station-pro" onclick="changeSt(1)">MR</button>
                <button class="btn-station-pro" onclick="changeSt(2)">RMF FM</button>
                <button class="btn-station-pro" onclick="changeSt(3)">Plus</button>
                <button class="btn-station-pro" onclick="changeSt(4)">Złote P.</button>
                <button class="btn-station-pro" onclick="changeSt(5)">Plus</button>
                <button class="btn-station-pro" onclick="changeSt(6)">Złote P.</button>
            </div>
        </div>
    </div>
</div>
<audio id="stream" crossorigin="anonymous"></audio>
<script>
    const audio = document.getElementById('stream');
    const panel = document.getElementById('mainPanel');
    const vFill = document.getElementById('vFill');
    const lcdStation = document.getElementById('lcdStation');
    const lcdTime = document.getElementById('lcdTime');
    const lcdDate = document.getElementById('lcdDate');
    const mutePath = document.getElementById('mute-path');
    let isPwr = false;
    const stations = { 
        1: { name: "Muzyczne Radio", url: "https://stream.rcs.revma.com/gzwc1xcq042vv" }, 
        2: { name: "RMF FM", url: "https://rs101-krk.rmfstream.pl/RMFFM48" }, 
        3: { name: "Radio Plus", url: "https://ext03.polsatmedia.pl/PLUS_WAW" }, 
        4: { name: "Złote Przeboje", url: "https://an06.cdn.eurozet.pl/zlo-kra.mp3" }, 
        5: { name: "Radio Plus", url: "https://ext03.polsatmedia.pl/PLUS_WAW" }, 
        6: { name: "Złote Przeboje", url: "https://an06.cdn.eurozet.pl/zlo-kra.mp3" } 
    };
    function clock() { const d = new Date(); lcdTime.textContent = d.toLocaleTimeString('pl-PL', { hour12: false }); const day = String(d.getDate()).padStart(2, '0'); const month = String(d.getMonth() + 1).padStart(2, '0'); lcdDate.textContent = `${day}:${month}:${d.getFullYear()}`; }
    setInterval(clock, 1000); clock();
    document.getElementById('pwr').onclick = function() { isPwr = !isPwr; panel.classList.toggle('powered'); this.classList.toggle('active', isPwr); if(!isPwr) { audio.pause(); lcdStation.textContent = ""; } else { changeSt(1); } };
    document.getElementById('play').onclick = function() { if(!isPwr) return; audio.play(); this.classList.add('active'); };
    document.getElementById('stop').onclick = function() { if(!isPwr) return; audio.pause(); document.getElementById('play').classList.remove('active'); lcdStation.textContent = "STOPPED"; };
    document.getElementById('mute').onclick = function() { if(!isPwr) return; audio.muted = !audio.muted; this.classList.toggle('active', audio.muted); };
    document.getElementById('vUp').onclick = function() { if(!isPwr) return; audio.volume = Math.min(1, audio.volume + 0.1); vFill.style.width = (audio.volume * 100) + "%"; };
    document.getElementById('vDown').onclick = function() { if(!isPwr) return; audio.volume = Math.max(0, audio.volume - 0.1); vFill.style.width = (audio.volume * 100) + "%"; };
    function changeSt(n) { if(!isPwr) return; const s = stations[n]; lcdStation.textContent = s.name; audio.src = s.url; audio.play(); document.getElementById('play').classList.add('active'); }
    audio.volume = 0.5;
</script>
</body>
</html>
