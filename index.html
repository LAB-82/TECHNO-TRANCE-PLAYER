<!DOCTYPE html><html lang="pl"><head>    <meta charset="UTF-8">    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">    <title>RMF NEON TERMINAL</title>    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;600&display=swap');
        
        :root {            
            --neon-blue: #00d2ff;            
            --neon-purple: #9d50bb;            
            --yellow: #fce300;            
            --bg: #000205;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }                
        body { 
            height: 100vh; width: 100vw; background: var(--bg); color: #fff; 
            font-family: 'Rajdhani', sans-serif; overflow: hidden; padding: 20px;
            background-image: radial-gradient(circle at center, #001a2e 0%, #000 100%);
        }

        header {             
            height: 60px; display: flex; justify-content: space-between; align-items: center;            
            border-bottom: 1px solid rgba(0, 210, 255, 0.3); margin-bottom: 20px;
        }        
        .header-info { font-family: 'Orbitron', sans-serif; font-size: 20px; color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); text-transform: uppercase; }        
        .clock { font-family: 'Orbitron', sans-serif; color: var(--neon-purple); font-size: 22px; text-shadow: 0 0 10px var(--neon-purple); }

        .app-content { display: flex; flex: 1; gap: 30px; height: calc(100vh - 120px); }

        /* GRID 5x3 */
        .grid {             
            flex: 1.5; display: grid;             
            grid-template-columns: repeat(5, 1fr);             
            grid-template-rows: repeat(3, 1fr);             
            gap: 15px;         
        }

        /* KAFELEK - STYLIZACJA Z OBRAZKA (Zaokrąglone, Neonowe) */
        .tile {            
            background: rgba(0, 210, 255, 0.03); 
            border: 1px solid rgba(0, 210, 255, 0.2);
            border-radius: 15px;
            position: relative; cursor: pointer; transition: 0.3s;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .tile::before {
            content: ''; position: absolute; inset: -1px; border-radius: 15px;
            padding: 1px; background: linear-gradient(180deg, var(--neon-blue), transparent, var(--neon-purple));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor; mask-composite: exclude;
            opacity: 0.2;
        }

        .tile .t-top { font-size: 20px; font-weight: 700; color: #fff; z-index: 2; letter-spacing: 1px; }        
        .tile .t-bottom { font-size: 12px; color: var(--neon-blue); text-transform: uppercase; opacity: 0.8; z-index: 2; }

        /* ACTIVE STATE */
        .tile.active { 
            background: rgba(0, 210, 255, 0.1); 
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.2), inset 0 0 15px rgba(0, 210, 255, 0.1);
            border-color: var(--neon-blue);
        }
        .tile.active .t-top { color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); }

        /* FALE (WAVE) Z OBRAZKA */
        .waves { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; opacity: 0; }        
        .tile.active .waves { opacity: 1; }        
        .wave { 
            position: absolute; border: 2px solid var(--neon-blue); border-radius: 50%; 
            animation: ripple 3s infinite ease-out; opacity: 0; 
            filter: blur(1px);
        }        
        @keyframes ripple { 
            0% { width: 0%; height: 0%; opacity: 0.8; } 
            100% { width: 200%; height: 200%; opacity: 0; } 
        }

        .sidebar { flex: 0.5; display: flex; flex-direction: column; gap: 20px; }

        /* CIRCLE LOGO - Z góry obrazka */
        .logo-display {            
            width: 100%; aspect-ratio: 1; border-radius: 50%;
            border: 4px double var(--neon-blue);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: radial-gradient(circle, rgba(0, 210, 255, 0.1) 0%, transparent 70%);
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.2);
            position: relative;
        }
        .logo-display h2 { font-family: 'Orbitron', sans-serif; font-size: 36px; color: #fff; text-shadow: 0 0 15px var(--neon-blue); }
        .logo-display p { font-size: 14px; color: var(--neon-purple); letter-spacing: 3px; }

        .controls { display: flex; justify-content: center; align-items: center; gap: 20px; }        
        .c-svg { width: 40px; height: 40px; fill: var(--neon-blue); cursor: pointer; filter: drop-shadow(0 0 5px var(--neon-blue)); transition: 0.2s; }
        .c-svg:hover { transform: scale(1.1); fill: #fff; }
        .c-play { width: 70px; height: 70px; }

        /* VOLUME SLIDER - Styl "Pigułka" z obrazka */
        .vol-box { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        input[type="range"] { 
            width: 100%; appearance: none; background: #111; height: 8px; border-radius: 4px; outline: none;
        }
        input[type="range"]::-webkit-slider-runnable-track {
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
            height: 8px; border-radius: 4px;
        }
        input[type="range"]::-webkit-slider-thumb {
            appearance: none; width: 20px; height: 20px; background: #fff; 
            border-radius: 50%; cursor: pointer; margin-top: -6px;
            box-shadow: 0 0 10px #fff;
        }

        @media (max-width: 800px) {
            .grid { grid-template-columns: repeat(3, 1fr); }
            .sidebar { display: none; }
        }
    </style></head><body>

<header>    <div class="header-info" id="playing-now">INFOGRAPHIC TERMINAL</div>    <div class="clock" id="timer">00:00</div></header>

<div class="app-content">    <div class="grid" id="station-grid"></div>
    <aside class="sidebar">        <div class="logo-display">            <h2 id="logo-text">RMF</h2>            <p>ACTIVE</p>        </div>
        <div class="controls">            <svg class="c-svg" viewBox="0 0 24 24" onclick="skip(-1)"><path d="M6,18V6H8V18H6M9.5,12L18,6V18L9.5,12Z"/></svg>            <svg class="c-svg c-play" viewBox="0 0 24 24" onclick="toggle()"><path id="p-ico" d="M8,5.14V19.14L19,12.14L8,5.14Z"/></svg>            <svg class="c-svg" viewBox="0 0 24 24" onclick="skip(1)"><path d="M16,18H18V6H16M6,18L14.5,12L6,6V18Z"/></svg>        </div>
        <div class="vol-box">            <input type="range" id="v-range" min="0" max="100" value="50" oninput="setV(this.value)">        </div>    </aside></div>

<audio id="player"></audio>

<script>    
    const STATIONS = [        
        { n: 'RMF FM', s: 'RMF FM', u: 'rmf_fm' },        
        { n: 'RMF MAXXX', s: 'Maxxx', u: 'RMFMAXXX48' },        
        { n: 'RMF 80s', s: '80s', u: 'rmf_80s' },        
        { n: 'RMF 90s', s: '90s', u: 'rmf_90s' },        
        { n: 'RMF 2000', s: '2000', u: 'rmf_2000' },        
        { n: 'RMF CHILLOUT', s: 'Chillout', u: 'rmf_chillout' },        
        { n: 'RMF CLASSIC', s: 'Classic', u: 'rmf_classic' },        
        { n: 'RMF DANCE', s: 'Dance', u: 'rmf_dance' },        
        { n: 'RMF GOLD', s: 'Gold', u: 'rmf_gold' },        
        { n: 'RMF LATINO', s: 'Latino', u: 'rmf_latino' },        
        { n: 'RMF LOVE', s: 'Love', u: 'rmf_love' },        
        { n: 'RMF PARTY', s: 'Party', u: 'rmf_party' },        
        { n: 'RMF POLSKI ROCK', s: 'Polski Rock', u: 'rmf_polski_rock' },        
        { n: 'RMF ROCK', s: 'Rock', u: 'rmf_rock' },        
        { n: 'RMF SMOOTH JAZZ', s: 'Smooth Jazz', u: 'rmf_smooth_jazz' }    
    ];

    const player = document.getElementById('player'), ico = document.getElementById('p-ico'), grid = document.getElementById('station-grid'), vRange = document.getElementById('v-range');    
    let current = -1;

    function clock() {        
        const d = new Date();        
        document.getElementById('timer').textContent = d.getHours().toString().padStart(2,'0') + ":" + d.getMinutes().toString().padStart(2,'0');    
    }    
    setInterval(clock, 1000); clock();

    STATIONS.forEach((s, i) => {        
        const t = document.createElement('div');        
        t.className = 'tile';        
        t.innerHTML = `            
            <div class="waves"><div class="wave"></div><div class="wave"></div></div>            
            <div class="t-top">RMF</div>            
            <div class="t-bottom">${s.s}</div>        `;        
        t.onclick = () => play(i);        
        grid.appendChild(t);    
    });

    function play(i) {        
        current = i;        
        document.querySelectorAll('.tile').forEach((t, idx) => t.classList.toggle('active', idx === i));        
        document.getElementById('playing-now').textContent = STATIONS[i].n;
        document.getElementById('logo-text').textContent = STATIONS[i].s.split(' ')[0];
        const streamBase = "https://rs201-krk.rmfstream.pl/";        
        player.src = (STATIONS[i].n === 'RMF MAXXX') ? 'https://rs7-krk2-cyfronet.rmfstream.pl/RMFMAXXX48' : streamBase + STATIONS[i].u;        
        player.play();        
        ico.setAttribute('d', 'M14,19H18V5H14M6,19H10V5H6V19Z');    
    }

    function toggle() {        
        if(player.paused) { player.play(); ico.setAttribute('d', 'M14,19H18V5H14M6,19H10V5H6V19Z'); }        
        else { player.pause(); ico.setAttribute('d', 'M8,5.14V19.14L19,12.14L8,5.14Z'); }    
    }

    function skip(d) { let n = current + d; if(n >= 0 && n < STATIONS.length) play(n); }        
    function setV(v) { player.volume = v / 100; }        
    function adj(d) { vRange.value = parseInt(vRange.value) + d; setV(vRange.value); }
</script></body></html>
