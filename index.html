<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>GEHIRN TREIBER - VITAL TRON PRO</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap');
        :root { --cyan: #00f2ff; --magenta: #bc00ff; --bg: #05070a; --p-bg: #0d1117; --p-brd: #1e2633; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { width: 100vw; height: 100vh; overflow: hidden; background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; }
        
        .synth-container { display: grid; grid-template-columns: 480px 1fr 320px; gap: 10px; padding: 10px; height: 100%; }
        
        /* LEWY PANEL - KOLUMNY OBOK SIEBIE */
        .osc-sidebar { display: flex; flex-direction: column; gap: 8px; height: 100%; }
        .track-info-box { border: 1px solid var(--magenta); background: rgba(188, 0, 255, 0.05); padding: 15px; min-height: 85px; box-shadow: inset 0 0 15px rgba(188, 0, 255, 0.1); }
        .stations-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; overflow-y: auto; flex-grow: 1; padding-right: 5px; }
        
        .category-header { font-family: 'Orbitron'; font-size: 10px; color: var(--cyan); border-bottom: 1px solid var(--p-brd); padding: 5px 0; margin-bottom: 8px; letter-spacing: 2px; }
        .osc-module { border: 1px solid var(--p-brd); padding: 5px; background: var(--p-bg); cursor: pointer; transition: 0.2s; margin-bottom: 5px; }
        .osc-module:hover { border-color: var(--cyan); }
        .osc-module.active { border-color: var(--cyan); box-shadow: 0 0 10px rgba(0, 242, 255, 0.3); }
        .station-slot { background: #000; height: 32px; display: flex; align-items: center; padding: 0 10px; font-family: 'Orbitron'; font-size: 9px; color: #a0aec0; }
        .active .station-slot { color: var(--cyan); }

        /* ŚRODEK - EQ */
        .main-display { border: 1px solid var(--p-brd); background: #000; position: relative; }
        #eq-canvas { width: 100%; height: 100%; display: block; }

        /* PRAWY PANEL */
        .control-sidebar { display: flex; flex-direction: column; gap: 10px; }
        .module-box { border: 1px solid var(--p-brd); padding: 15px; background: var(--p-bg); }
        .env-visual { height: 140px; background: #000; border: 1px solid #111; }
        .playback-frame { border: 1px solid var(--p-brd); padding: 15px; background: var(--p-bg); }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
        .synth-btn { background: #1a222d; border: 1px solid var(--p-brd); color: #fff; padding: 10px; font-family: 'Orbitron'; font-size: 10px; cursor: pointer; text-align: center; }
        .vol-slider { -webkit-appearance: none; width: 100%; height: 3px; background: #000; outline: none; }
        .vol-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; background: var(--cyan); cursor: pointer; }
    </style>
</head>
<body>

<div class="synth-container">
    <div class="osc-sidebar">
        <div class="track-info-box">
            <div style="font-size: 9px; color: var(--magenta); font-family: 'Orbitron'; margin-bottom: 5px;">CURRENT SIGNAL</div>
            <div id="track-title" style="font-size: 11px; font-family: 'Orbitron'; color: #fff; text-shadow: 0 0 5px var(--magenta);">SYSTEM ONLINE...</div>
        </div>
        <div class="stations-grid">
            <div id="tech-col"><div class="category-header">TECHNO</div><div id="techno-group"></div></div>
            <div id="house-col"><div class="category-header">HOUSE</div><div id="house-group"></div></div>
        </div>
    </div>
    <main class="main-display"><canvas id="eq-canvas"></canvas></main>
    <aside class="control-sidebar">
        <div class="module-box">
            <div style="font-size: 9px; color: var(--cyan); font-family: 'Orbitron'; margin-bottom: 8px;">VCA ENVELOPE</div>
            <div class="env-visual">
                <svg width="100%" height="100%" viewBox="0 0 100 100" preserveAspectRatio="none">
                    <path d="M0,100 L20,10 L50,40 L80,40 L100,100" fill="none" stroke="var(--magenta)" stroke-width="2" />
                </svg>
            </div>
        </div>
        <div class="playback-frame">
            <div class="btn-grid">
                <div class="synth-btn" id="playBtn">BOOT</div>
                <div class="synth-btn" id="stopBtn" style="color:var(--magenta)">KILL</div>
            </div>
            <input type="range" class="vol-slider" min="0" max="100" value="70" id="volRange">
        </div>
    </aside>
</div>

<audio id="audio-engine" crossorigin="anonymous"></audio>

<script>
    const STATIONS = {
        techno: [
            { slug: 'tech88', n: 'TECH 88' }, { slug: 'hr3_clubnight', n: 'HR 3 CLUBNIGHT' },
            { slug: '1000techno', n: '1000 TECHNO' }, { slug: 'best-of-techno', n: 'BEST OF TECHNO' },
            { slug: 'chris_burn', n: 'CHRIS BURN' }, { slug: 'retroelectronicmusic', n: 'RETRO ELECTRONIC' },
            { slug: 'gehirn-treiber-beat-radio', n: 'GEHIRN TREIBER' }
        ],
        house: [
            { slug: 'deep-house-sounds', n: 'DEEP HOUSE SOUNDS' }, { slug: 'housebomb-fn', n: 'HOUSEBOMB FN' },
            { slug: 'symbiotic-beats', n: 'SYMBIOTIC BEATS' }, { slug: 'house', n: 'HOUSE' },
            { slug: 'faf-records-979', n: 'FAF RECORDS 979' }, { slug: 'tornadofm', n: 'TORNADO FM' }
        ]
    };

    const audio = document.getElementById('audio-engine');
    const trackTitle = document.getElementById('track-title');
    const canvas = document.getElementById('eq-canvas');
    const ctx = canvas.getContext('2d');
    
    let audioCtx, analyser, source, dataArray;
    let initialized = false;

    // KRYTYCZNA POPRAWKA: Inicjalizacja węzłów tylko RAZ
    function initAudio() {
        if (initialized) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            return;
        }
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 256;
        source = audioCtx.createMediaElementSource(audio);
        source.connect(analyser);
        analyser.connect(audioCtx.destination);
        dataArray = new Uint8Array(analyser.frequencyBinCount);
        initialized = true;
    }

    async function updateMeta(slug) {
        try {
            const r = await fetch(`https://api.laut.fm/station/${slug}/current_song`);
            const d = await r.json();
            trackTitle.textContent = `${d.artist.name.toUpperCase()} - ${d.title.toUpperCase()}`;
        } catch(e) { trackTitle.textContent = "SIGNAL DECODED"; }
    }

    // Budowanie listy stacji
    Object.keys(STATIONS).forEach(cat => {
        const group = document.getElementById(`${cat}-group`);
        STATIONS[cat].forEach(s => {
            const div = document.createElement('div');
            div.className = 'osc-module';
            div.innerHTML = `<div class="station-slot">${s.n}</div>`;
            div.onclick = () => {
                initAudio();
                document.querySelectorAll('.osc-module').forEach(m => m.classList.remove('active'));
                div.classList.add('active');
                audio.src = `https://stream.laut.fm/${s.slug}`;
                audio.play();
                updateMeta(s.slug);
            };
            group.appendChild(div);
        });
    });

    document.getElementById('playBtn').onclick = () => { initAudio(); audio.play(); };
    document.getElementById('stopBtn').onclick = () => audio.pause();
    document.getElementById('volRange').oninput = (e) => audio.volume = e.target.value / 100;

    function draw() {
        requestAnimationFrame(draw);
        if (canvas.width !== canvas.clientWidth) {
            canvas.width = canvas.clientWidth;
            canvas.height = canvas.clientHeight;
        }
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        if (initialized && dataArray) {
            analyser.getByteFrequencyData(dataArray);
            
            // Neon Wave (VITAL Style)
            ctx.beginPath();
            ctx.lineWidth = 2;
            ctx.strokeStyle = '#00f2ff';
            let slice = canvas.width / dataArray.length;
            let x = 0;
            for(let i=0; i<dataArray.length; i++) {
                let v = dataArray[i] / 128.0;
                let y = (v * canvas.height / 4) + (canvas.height/3);
                if(i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                x += slice;
            }
            ctx.stroke();

            // Magenta Shadow
            ctx.beginPath();
            ctx.strokeStyle = '#bc00ff';
            ctx.globalAlpha = 0.5;
            x = 0;
            for(let i=0; i<dataArray.length; i++) {
                let v = dataArray[i] / 128.0;
                let y = (v * canvas.height / 4) + (canvas.height/3) + 15;
                if(i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                x += slice;
            }
            ctx.stroke();
            ctx.globalAlpha = 1.0;
        }
    }
    draw();
    setInterval(() => {
        const active = document.querySelector('.osc-module.active');
        if(active) {
            const slug = STATIONS.techno.concat(STATIONS.house).find(s => s.n === active.innerText)?.slug;
            if(slug) updateMeta(slug);
        }
    }, 20000);
</script>
</body>
</html>
