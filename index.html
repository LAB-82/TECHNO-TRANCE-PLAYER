<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RMF ADVANCED HUD CORE</title>
    <style>
        /* --- NOWOCZESNA ARCHITEKTURA WIZUALNA "SUPER-HUD" --- */
        @import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;700&display=swap');

        :root {            
            --rmf-yellow: #fce300;            
            --hud-cyan: #00f2ff;
            --hud-magenta: #bc00ff;
            --bg-deep: #020205;
            --glass-bg: rgba(5, 10, 20, 0.7);
            --border-tech: rgba(0, 242, 255, 0.2);
            --neon-glow: 0 0 15px rgba(0, 242, 255, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; overflow: hidden; outline: none; }                
        
        body { 
            height: 100vh; width: 100vw; 
            background: var(--bg-deep); 
            color: #fff; 
            font-family: 'Chakra Petch', sans-serif;
            display: flex; flex-direction: column; padding: 10px;
            position: relative;
        }

        /* Tło - zaawansowana siatka CRT/skanowania */
        body::before {
            content: ""; position: absolute; inset: 0;
            background: 
                radial-gradient(circle at 50% 50%, rgba(188, 0, 255, 0.05), transparent 70%),
                linear-gradient(transparent 50%, rgba(0, 242, 255, 0.02) 50%);
            background-size: 100% 100%, 100% 4px;
            pointer-events: none; z-index: -1;
        }

        header { 
            height: 50px; display: flex; justify-content: space-between; align-items: center; 
            padding: 0 20px; margin-bottom: 10px; flex-shrink: 0;
            background: var(--glass-bg); backdrop-filter: blur(10px);
            border-bottom: 3px solid var(--rmf-yellow); border-radius: 4px;
            box-shadow: 0 0 20px rgba(252, 227, 0, 0.2), inset 0 0 10px rgba(188, 0, 255, 0.1);
            position: relative;
        }

        /* Element dekoracyjny nagłówka - PURE CSS HUD */
        header::after {
            content: ""; position: absolute; right: 20%; top: 0; width: 80px; height: 8px;
            background: linear-gradient(90deg, transparent, var(--hud-magenta), transparent);
            box-shadow: 0 0 10px var(--hud-magenta);
        }

        #playing-now { 
            font-size: 14px; font-weight: 700; color: var(--rmf-yellow); 
            text-shadow: 0 0 10px var(--rmf-yellow); text-transform: uppercase; letter-spacing: 2px;
        }
        
        .clock { 
            font-size: 18px; color: var(--hud-cyan); font-weight: 700; 
            text-shadow: 0 0 15px var(--hud-cyan); 
            border: 1px solid var(--border-tech); padding: 2px 10px; border-radius: 2px;
        }

        .app-content { display: flex; flex: 1; gap: 10px; min-height: 0; }
        
        /* GRID - DOKŁADNE DOPASOWANIE DO EKRANU BEZ SCROLLA */
        .grid { 
            flex: 1.6; display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            grid-template-rows: repeat(3, 1fr); 
            gap: 8px; 
            height: 100%; /* Wymuszenie braku scrolla przy zachowaniu nienaruszonej logiki */
        }

        .tile { 
            background: rgba(0, 242, 255, 0.03); 
            border: 1px solid rgba(0, 242, 255, 0.1); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            cursor: pointer; position: relative; overflow: hidden; 
            transition: all 0.2s cubic-bezier(0.19, 1, 0.22, 1);
            border-radius: 2px;
        }

        /* Narożniki techniczne kafelków z image_94921f.png */
        .tile::after {
            content: ""; position: absolute; inset: 0;
            background: linear-gradient(135deg, var(--hud-cyan) 3px, transparent 3px) 0 0,
                        linear-gradient(225deg, var(--hud-cyan) 3px, transparent 3px) 100% 0,
                        linear-gradient(45deg, var(--hud-cyan) 3px, transparent 3px) 0 100%,
                        linear-gradient(315deg, var(--hud-cyan) 3px, transparent 3px) 100% 100%;
            background-size: 8px 8px; background-repeat: no-repeat; opacity: 0.3;
        }

        .tile:hover { background: rgba(0, 242, 255, 0.1); border-color: var(--hud-cyan); }
        .tile.active { 
            border-color: var(--rmf-yellow); 
            background: rgba(252, 227, 0, 0.05); 
            box-shadow: inset 0 0 15px rgba(252, 227, 0, 0.1);
        }

        .tile .t-top { font-size: 9px; font-weight: 700; color: var(--hud-cyan); text-shadow: 0 0 5px var(--hud-cyan); z-index: 2; opacity: 0.7; }
        .tile .t-bottom { font-size: 11px; color: #fff; margin-top: 2px; z-index: 2; text-align: center; }
        .tile.active .t-bottom { color: var(--rmf-yellow); text-shadow: 0 0 10px var(--rmf-yellow); }

        /* POTRÓJNE FALE SYSTEMOWE */
        .waves { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; }
        .tile.active .waves { opacity: 1; }
        .wave { position: absolute; border: 1.5px solid var(--rmf-yellow); border-radius: 50%; width: 10px; height: 10px; opacity: 0; box-shadow: 0 0 15px var(--rmf-yellow); animation: ripple 2s infinite ease-out; }
        .wave:nth-child(2) { border-color: var(--hud-cyan); animation-delay: 0.6s; }
        .wave:nth-child(3) { border-color: var(--hud-magenta); animation-delay: 1.2s; }
        
        @keyframes ripple { 0% { width: 0; height: 0; opacity: 1; } 100% { width: 150%; height: 150%; opacity: 0; } }

        .sidebar { 
            flex: 0.8; display: flex; flex-direction: column; 
            background: rgba(5, 5, 10, 0.9); border: 2px solid var(--hud-magenta); 
            border-radius: 8px; padding: 20px; justify-content: space-around; align-items: center;
            box-shadow: 0 0 40px rgba(188, 0, 255, 0.1), inset 0 0 20px rgba(0,0,0,0.5);
            min-width: 0;
        }

        /* DISPLAY - PURE CSS AWATAR MEDYCZNY (Bio_Link) */
        .logo-display { 
            width: 160px; height: 160px; border: 4px solid var(--rmf-yellow); border-radius: 50%;
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            background: radial-gradient(circle, rgba(188, 0, 255, 0.1) 0%, #000 100%); 
            box-shadow: 0 0 30px rgba(252, 227, 0, 0.3), inset 0 0 20px rgba(252, 227, 0, 0.2);
            position: relative; overflow: hidden;
        }
        
        /* Wirujący ring wewątrz awatara */
        .logo-display::before {
            content: ""; position: absolute; inset: 10px;
            border: 2px dashed var(--hud-cyan); border-radius: 50%;
            animation: rotate-slow 10s linear infinite; opacity: 0.3;
        }

        .logo-display h2 { font-size: 3rem; color: var(--rmf-yellow); text-shadow: 0 0 20px var(--rmf-yellow); z-index: 2; letter-spacing: 5px; }
        .logo-display p { font-size: 0.7rem; color: var(--hud-cyan); font-weight: bold; letter-spacing: 3px; z-index: 2; text-transform: uppercase; }

        .controls { display: flex; gap: 15px; align-items: center; }
        .c-svg { width: 40px; height: 40px; fill: var(--hud-cyan); cursor: pointer; filter: drop-shadow(0 0 5px var(--hud-cyan)); transition: 0.2s; }
        .c-svg:hover { transform: scale(1.1); fill: var(--rmf-yellow); }
        .c-play { width: 70px; height: 70px; fill: var(--rmf-yellow); filter: drop-shadow(0 0 10px var(--rmf-yellow)); }

        .vol-box { display: flex; align-items: center; gap: 10px; width: 100%; }
        .vol-bar { 
            flex: 1; height: 20px; background: #000; border-radius: 10px;
            border: 2px solid var(--hud-magenta); position: relative; overflow: hidden; 
            box-shadow: inset 0 0 10px rgba(188, 0, 255, 0.3);
        }
        
        input[type="range"] { width: 100%; appearance: none; background: transparent; cursor: pointer; outline: none; }
        input[type="range"]::-webkit-slider-thumb { 
            appearance: none; width: 16px; height: 16px; background: var(--rmf-yellow); 
            border-radius: 50%; box-shadow: 0 0 10px var(--rmf-yellow);
        }

        @keyframes rotate-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        @media (max-width: 600px) {
            .grid { grid-template-columns: repeat(3, 1fr); flex: none; height: 50vh; }
            .sidebar { width: 100%; padding: 15px; border-top: 2px solid var(--rmf-yellow); border-radius: 0; }
            header { padding: 0 15px; }
            .logo-display h2 { font-size: 32px; }
        }
    </style>
</head>
<body>

<header>    
    <div id="playing-now">UNIT: RMF FM FM</div>    
    <div class="clock" id="timer">00:00</div>
</header>

<div class="app-content">    
    <div class="grid" id="station-grid"></div>
    <aside class="sidebar">        
        <div class="logo-display">            
            <h2>RMF</h2>            
            <p>ADV_HUD CORE</p>        
        </div>
        <div class="controls">            
            <svg class="c-svg" viewBox="0 0 24 24" onclick="skip(-1)"><path d="M6,18V6H8V18H6M9.5,12L18,6V18L9.5,12Z"/></svg>            
            <svg class="c-svg c-play" viewBox="0 0 24 24" onclick="toggle()"><path id="p-ico" d="M8,5.14V19.14L19,12.14L8,5.14Z"/></svg>            
            <svg class="c-svg" viewBox="0 0 24 24" onclick="skip(1)"><path d="M16,18H18V6H16M6,18L14.5,12L6,6V18Z"/></svg>        
        </div>
        <div class="vol-box">            
            <div class="vol-bar">                
                <input type="range" id="v-range" min="0" max="100" value="50" oninput="setV(this.value)">            
            </div>            
        </div>    
    </aside>
</div>

<audio id="player"></audio>

<script>    
    /* [STARY KOD - NIENARUSZONY BAZOWY JS] */
    const STATIONS = [        
        { n: 'RMF FM', s: 'RMF FM', u: 'rmf_fm' },        
        { n: 'RMF MAXXX', s: 'Maxxx', u: 'RMFMAXXX48' },        
        { n: 'RMF 80s', s: '80s', u: 'rmf_80s' },        
        { n: 'RMF 90s', s: '90s', u: 'rmf_90s' },        
        { n: 'RMF 2000', s: '2000', u: 'rmf_2000' },        
        { n: 'RMF CHILLOUT', s: 'Chillout', u: 'rmf_chillout' },        
        { n: 'RMF CLASSIC', s: 'Classic', u: 'rmf_classic' },        
        { n: 'RMF DANCE', s: 'Dance', u: 'rmf_dance' },        
        { n: 'RMF GOLD', s: 'Gold', u: 'rmf_gold' },        
        { n: 'RMF LATINO', s: 'Latino', u: 'rmf_latino' },        
        { n: 'RMF LOVE', s: 'Love', u: 'rmf_love' },        
        { n: 'RMF PARTY', s: 'Party', u: 'rmf_party' },        
        { n: 'RMF POLSKI ROCK', s: 'Polski Rock', u: 'rmf_polski_rock' },        
        { n: 'RMF ROCK', s: 'Rock', u: 'rmf_rock' },        
        { n: 'RMF SMOOTH JAZZ', s: 'Smooth Jazz', u: 'rmf_smooth_jazz' }    
    ];

    const player = document.getElementById('player'), ico = document.getElementById('p-ico'), grid = document.getElementById('station-grid'), vRange = document.getElementById('v-range');    
    let current = -1;

    function clock() {        
        const d = new Date();        
        document.getElementById('timer').textContent = d.getHours().toString().padStart(2,'0') + ":" + d.getMinutes().toString().padStart(2,'0');    
    }    
    setInterval(clock, 1000); clock();

    STATIONS.forEach((s, i) => {        
        const t = document.createElement('div');        
        t.className = 'tile';        
        t.innerHTML = `            
            <div class="waves"><div class="wave"></div><div class="wave"></div><div class="wave"></div></div>            
            <div class="t-top">UNIT_ID: 0${i+1}</div>            
            <div class="t-bottom">${s.n}</div>        `;        
        t.onclick = () => play(i);        
        grid.appendChild(t);    
    });

    function play(i) {        
        current = i;        
        document.querySelectorAll('.tile').forEach((t, idx) => t.classList.toggle('active', idx === i));        
        document.getElementById('playing-now').textContent = "UNIT ACTIVE: " + STATIONS[i].n;        
        const streamBase = "https://rs201-krk.rmfstream.pl/";        
        player.src = (STATIONS[i].n === 'RMF MAXXX') ? 'https://rs7-krk2-cyfronet.rmfstream.pl/RMFMAXXX48' : streamBase + STATIONS[i].u;        
        player.play();        
        ico.setAttribute('d', 'M14,19H18V5H14M6,19H10V5H6V19Z');    
    }

    function toggle() {        
        if(player.paused) { player.play(); ico.setAttribute('d', 'M14,19H18V5H14M6,19H10V5H6V19Z'); }        
        else { player.pause(); ico.setAttribute('d', 'M8,5.14V19.14L19,12.14L8,5.14Z'); }    
    }

    function skip(d) { let n = current + d; if(n >= 0 && n < STATIONS.length) play(n); }        
    function setV(v) { player.volume = v / 100; }        
</script>
</body>
</html>
