<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RMF VCM EDITION</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;600&display=swap');

        :root {
            --vcm-black: #0d0d0f;
            --vcm-panel: #1a1a1c;
            --vcm-neon: #39ff14; /* Neonowa zieleń z foto */
            --vcm-silver: #d1d1d1;
            --vcm-wood: #a67c52; /* Drewniany bok obudowy */
            --blue-wave: #39ff14; /* Zmienione na zielone dla spójności */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body { 
            height: 100vh; width: 100vw; 
            background: #050505; color: #fff; 
            font-family: 'Inter', sans-serif;
            overflow: hidden; 
            border-left: 8px solid var(--vcm-wood); /* Akcent drewna */
            border-right: 8px solid var(--vcm-wood);
        }

        body { display: flex; flex-direction: column; padding: 1.5vh; }

        /* GÓRNY WYŚWIETLACZ - Styl Wireframe */
        header { 
            height: 60px; display: flex; justify-content: space-between; align-items: center;
            background: var(--vcm-black); padding: 0 25px; margin-bottom: 2vh; flex-shrink: 0;
            border: 1px solid #333; border-bottom: 2px solid var(--vcm-neon);
        }
        .header-info { 
            font-family: 'Space Mono', monospace; font-size: 18px; 
            color: var(--vcm-neon); text-transform: uppercase; letter-spacing: 2px;
        }
        .clock { color: #555; font-size: 20px; font-weight: 300; font-family: 'Space Mono'; }

        .app-content { display: flex; flex: 1; gap: 20px; min-height: 0; }

        /* SIATKA 5x3 - ORYGINALNY SZKIELET */
        .grid { 
            flex: 1.4; display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            grid-template-rows: repeat(3, 1fr); 
            gap: 12px; 
        }

        .tile {
            background: var(--vcm-panel); border: 1px solid #2a2a2e;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; position: relative; overflow: visible;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .tile .t-top { font-size: 9px; color: #666; letter-spacing: 1px; z-index: 2; margin-bottom: 4px; }
        .tile .t-bottom { font-size: 14px; font-weight: 600; color: #aaa; text-align: center; z-index: 2; }

        /* AKTYWNA STACJA - Styl VCM */
        .tile.active { 
            border-color: var(--vcm-neon);
            background: #121214;
            box-shadow: inset 0 0 15px rgba(57, 255, 20, 0.1);
        }
        .tile.active .t-bottom { color: var(--vcm-neon); }

        /* FALE (RIPPLE) - Zielone jak na foto */
        .waves {
            position: absolute; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            pointer-events: none; opacity: 0; z-index: 1;
        }
        .tile.active .waves { opacity: 0.4; }
        .wave {
            position: absolute; border: 1px solid var(--vcm-neon); border-radius: 50%;
            width: 10px; height: 10px; opacity: 0;
            animation: ripple 4s infinite ease-out;
        }
        .wave:nth-child(2) { animation-delay: 1.3s; }
        .wave:nth-child(3) { animation-delay: 2.6s; }

        @keyframes ripple {
            0% { width: 0; height: 0; opacity: 0.8; border-width: 2px; }
            100% { width: 350%; height: 350%; opacity: 0; border-width: 0.5px; }
        }

        /* SIDEBAR - Jasny panel dolny/boczny z foto */
        .sidebar { 
            flex: 0.6; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; gap: 4vh;
            background: var(--vcm-silver); padding: 20px;
            border-radius: 4px; color: #111;
        }

        .logo-display {
            width: 100%; text-align: center; padding: 20px;
            border-bottom: 2px solid #999;
        }
        .logo-display h2 { font-family: 'Space Mono', monospace; font-size: 32px; color: #000; letter-spacing: -2px; }
        .logo-display p { font-size: 10px; font-weight: 700; text-transform: uppercase; color: #444; }

        .controls { display: flex; align-items: center; gap: 3vw; }
        .c-svg { 
            width: 32px; height: 32px; fill: #222; cursor: pointer; 
        }
        .c-play { 
            width: 60px; height: 60px; fill: #000; border: 2px solid #000; border-radius: 50%;
            padding: 12px;
        }

        /* VOLUME */
        .vol-box { display: flex; align-items: center; gap: 10px; width: 100%; }
        .vol-btn { width: 35px; height: 35px; border: 1px solid #999; background: #eee; color: #000; font-weight: bold; cursor: pointer; }
        .vol-bar { flex: 1; height: 30px; border: 1px solid #999; background: #bbb; display: flex; align-items: center; padding: 0 5px; }
        
        input[type="range"] { flex: 1; appearance: none; background: #444; height: 2px; }
        input[type="range"]::-webkit-slider-thumb { 
            appearance: none; width: 12px; height: 20px; 
            background: #000; border-radius: 2px; cursor: pointer;
        }

        @media (max-width: 600px) {
            body { border: none; }
            .app-content { flex-direction: column; }
            .grid { grid-template-columns: repeat(3, 1fr); height: 45vh; flex: none; }
            .sidebar { width: 100%; height: 45vh; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-info" id="playing-now">CORE_SYSTEM: RMF FM</div>
    <div class="clock" id="timer">00:00</div>
</header>

<div class="app-content">
    <div class="grid" id="station-grid"></div>

    <aside class="sidebar">
        <div class="logo-display">
            <h2>VCM-R1</h2>
            <p>RMF Radio Hybrid Controller</p>
        </div>

        <div class="controls">
            <svg class="c-svg" viewBox="0 0 24 24" onclick="skip(-1)"><path d="M6,18V6H8V18H6M9.5,12L18,6V18L9.5,12Z"/></svg>
            <svg class="c-svg c-play" viewBox="0 0 24 24" onclick="toggle()"><path id="p-ico" d="M8,5.14V19.14L19,12.14L8,5.14Z"/></svg>
            <svg class="c-svg" viewBox="0 0 24 24" onclick="skip(1)"><path d="M16,18H18V6H16M6,18L14.5,12L6,6V18Z"/></svg>
        </div>

        <div class="vol-box">
            <button class="vol-btn" onclick="adj(-5)">-</button>
            <div class="vol-bar">
                <input type="range" id="v-range" min="0" max="100" value="50" oninput="setV(this.value)">
            </div>
            <button class="vol-btn" onclick="adj(5)">+</button>
        </div>
    </aside>
</div>

<audio id="player"></audio>

<script>
    const STATIONS = [
        { n: 'RMF FM', s: 'RMF FM', u: 'rmf_fm' },
        { n: 'RMF MAXXX', s: 'Maxxx', u: 'RMFMAXXX48' },
        { n: 'RMF 80s', s: '80s', u: 'rmf_80s' },
        { n: 'RMF 90s', s: '90s', u: 'rmf_90s' },
        { n: 'RMF 2000', s: '2000', u: 'rmf_2000' },
        { n: 'RMF CHILLOUT', s: 'Chillout', u: 'rmf_chillout' },
        { n: 'RMF CLASSIC', s: 'Classic', u: 'rmf_classic' },
        { n: 'RMF DANCE', s: 'Dance', u: 'rmf_dance' },
        { n: 'RMF GOLD', s: 'Gold', u: 'rmf_gold' },
        { n: 'RMF LATINO', s: 'Latino', u: 'rmf_latino' },
        { n: 'RMF LOVE', s: 'Love', u: 'rmf_love' },
        { n: 'RMF PARTY', s: 'Party', u: 'rmf_party' },
        { n: 'RMF POLSKI ROCK', s: 'Polski Rock', u: 'rmf_polski_rock' },
        { n: 'RMF ROCK', s: 'Rock', u: 'rmf_rock' },
        { n: 'RMF SMOOTH JAZZ', s: 'Smooth Jazz', u: 'rmf_smooth_jazz' }
    ];

    const player = document.getElementById('player'), ico = document.getElementById('p-ico'), grid = document.getElementById('station-grid'), vRange = document.getElementById('v-range');
    let current = -1;

    function clock() {
        const d = new Date();
        document.getElementById('timer').textContent = d.getHours().toString().padStart(2,'0') + ":" + d.getMinutes().toString().padStart(2,'0');
    }
    setInterval(clock, 1000); clock();

    STATIONS.forEach((s, i) => {
        const t = document.createElement('div');
        t.className = 'tile';
        t.innerHTML = `
            <div class="waves"><div class="wave"></div><div class="wave"></div><div class="wave"></div></div>
            <div class="t-top">PATCH ${(i + 1).toString().padStart(2, '0')}</div>
            <div class="t-bottom">${s.s.toUpperCase()}</div>
        `;
        t.onclick = () => play(i);
        grid.appendChild(t);
    });

    function play(i) {
        current = i;
        document.querySelectorAll('.tile').forEach((t, idx) => t.classList.toggle('active', idx === i));
        document.getElementById('playing-now').textContent = "CORE_SYSTEM: " + STATIONS[i].n;
        const streamBase = "https://rs201-krk.rmfstream.pl/";
        player.src = (STATIONS[i].n === 'RMF MAXXX') ? 'https://rs7-krk2-cyfronet.rmfstream.pl/RMFMAXXX48' : streamBase + STATIONS[i].u;
        player.play();
        ico.setAttribute('d', 'M14,19H18V5H14M6,19H10V5H6V19Z');
    }

    function toggle() {
        if(player.paused) { player.play(); ico.setAttribute('d', 'M14,19H18V5H14M6,19H10V5H6V19Z'); }
        else { player.pause(); ico.setAttribute('d', 'M8,5.14V19.14L19,12.14L8,5.14Z'); }
    }

    function skip(d) { let n = current + d; if(n >= 0 && n < STATIONS.length) play(n); }
    function setV(v) { player.volume = v / 100; }
    function adj(d) { vRange.value = parseInt(vRange.value) + d; setV(vRange.value); }
</script>
</body>
</html>
