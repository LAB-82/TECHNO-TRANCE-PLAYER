<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RMF MODELER EDITION</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Exo+2:wght@300;600&family=Orbitron:wght@400;700&display=swap');

        :root {
            /* KOLORYSTYKA MODELER */
            --mod-bg: #0a0b10;
            --mod-panel: #131621;
            --mod-border: #232a3d;
            --mod-accent-purple: #9d50bb;
            --mod-accent-cyan: #40e0d0;
            --mod-text: #a0a8c0;
            --blue-wave: #40e0d0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body { 
            height: 100vh; width: 100vw; 
            background: var(--mod-bg); color: var(--mod-text); 
            font-family: 'Exo 2', sans-serif;
            overflow: hidden; 
        }

        body { 
            display: flex; flex-direction: column; padding: 1.5vh;
            background: radial-gradient(circle at center, #1a1e2e 0%, #0a0b10 100%);
        }

        /* GÓRNY PASEK - Styl Modeler */
        header { 
            height: 50px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(19, 22, 33, 0.8); padding: 0 25px; margin-bottom: 1.5vh; flex-shrink: 0;
            border: 1px solid var(--mod-border); border-radius: 8px;
            backdrop-filter: blur(10px);
        }
        .header-info { 
            font-family: 'Orbitron', sans-serif; font-size: 14px; color: var(--mod-accent-cyan);
            text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 10px rgba(64, 224, 208, 0.5);
        }
        .clock { color: var(--mod-accent-purple); font-size: 18px; font-weight: 700; font-family: 'Orbitron'; }

        .app-content { display: flex; flex: 1; gap: 15px; min-height: 0; }

        /* SIATKA 5x3 - ORYGINALNY SZKIELET */
        .grid { 
            flex: 1.4; display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            grid-template-rows: repeat(3, 1fr); 
            gap: 10px; 
        }

        .tile {
            background: var(--mod-panel); border: 1px solid var(--mod-border);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; position: relative; overflow: visible;
            border-radius: 12px; transition: all 0.3s ease;
        }

        .tile .t-top { font-size: 9px; font-weight: 600; color: #505870; text-transform: uppercase; z-index: 2; }
        .tile .t-bottom { font-size: 14px; font-weight: 600; color: #fff; margin-top: 4px; text-align: center; z-index: 2; letter-spacing: 0.5px; }

        /* AKTYWNA STACJA */
        .tile.active { 
            border-color: var(--mod-accent-cyan);
            background: linear-gradient(145deg, #1a1e2e, #131621);
            box-shadow: 0 0 20px rgba(64, 224, 208, 0.2), inset 0 0 10px rgba(64, 224, 208, 0.1);
        }
        .tile.active .t-bottom { color: var(--mod-accent-cyan); }

        /* FALE - MODELER CYAN */
        .waves {
            position: absolute; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            pointer-events: none; opacity: 0; z-index: 1;
        }
        .tile.active .waves { opacity: 0.6; }
        .wave {
            position: absolute; border: 1px solid var(--mod-accent-cyan); border-radius: 50%;
            width: 10px; height: 10px; opacity: 0;
            animation: ripple 3.5s infinite ease-out;
        }
        .wave:nth-child(2) { animation-delay: 1.1s; }
        .wave:nth-child(3) { animation-delay: 2.2s; }

        @keyframes ripple {
            0% { width: 0; height: 0; opacity: 0.8; }
            100% { width: 300%; height: 300%; opacity: 0; }
        }

        /* SIDEBAR - Panel boczny Modeler */
        .sidebar { 
            flex: 0.6; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; gap: 4vh;
            background: rgba(19, 22, 33, 0.9); border: 1px solid var(--mod-border);
            border-radius: 12px; padding: 20px;
        }

        /* LOGO DISPLAY - Styl Modeler */
        .logo-display {
            width: 100%; max-width: 280px; aspect-ratio: 1/1;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: 2px solid var(--mod-border); border-radius: 50%;
            background: radial-gradient(circle, #1a1e2e 0%, transparent 70%);
            position: relative;
        }
        /* Dekoracyjny pierścień jak na obrazku Modeler */
        .logo-display::after {
            content: ""; position: absolute; width: 110%; height: 110%;
            border: 1px dashed rgba(157, 80, 187, 0.3); border-radius: 50%;
            animation: rotate 20s linear infinite;
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .logo-display h2 { font-family: 'Orbitron', sans-serif; font-size: 28px; color: #fff; margin-bottom: 5px; }
        .logo-display p { font-size: 11px; color: var(--mod-accent-purple); font-weight: 700; text-transform: uppercase; letter-spacing: 3px; }

        .controls { display: flex; align-items: center; gap: 2vw; }
        .c-svg { 
            width: 35px; height: 35px; fill: var(--mod-text); cursor: pointer; transition: 0.2s;
        }
        .c-svg:hover { fill: var(--mod-accent-cyan); }
        .c-play { 
            width: 65px; height: 65px; fill: #fff; background: var(--mod-accent-purple); 
            padding: 15px; border-radius: 50%; box-shadow: 0 0 20px rgba(157, 80, 187, 0.4);
        }

        /* VOLUME BOX */
        .vol-box { display: flex; align-items: center; gap: 15px; width: 100%; max-width: 300px; }
        .vol-btn { 
            width: 32px; height: 32px; border: 1px solid var(--mod-border); 
            background: transparent; color: #fff; cursor: pointer; border-radius: 50%;
        }
        .vol-bar { flex: 1; height: 4px; background: var(--mod-border); border-radius: 2px; position: relative; }
        
        input[type="range"] { 
            width: 100%; appearance: none; background: transparent; cursor: pointer; 
        }
        input[type="range"]::-webkit-slider-runnable-track { height: 4px; border-radius: 2px; background: var(--mod-border); }
        input[type="range"]::-webkit-slider-thumb { 
            appearance: none; width: 16px; height: 16px; background: var(--mod-accent-cyan); 
            border-radius: 50%; margin-top: -6px; box-shadow: 0 0 10px var(--mod-accent-cyan);
        }

        @media (max-width: 600px) {
            .app-content { flex-direction: column; }
            .grid { grid-template-columns: repeat(3, 1fr); height: 45vh; }
            .sidebar { width: 100%; height: auto; padding: 30px 10px; }
            .logo-display { width: 150px; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-info" id="playing-now">SYSTEM: IDLE</div>
    <div class="clock" id="timer">00:00</div>
</header>

<div class="app-content">
    <div class="grid" id="station-grid"></div>

    <aside class="sidebar">
        <div class="logo-display">
            <h2>MODELER</h2>
            <p>RMF RESONATOR</p>
        </div>

        <div class="controls">
            <svg class="c-svg" viewBox="0 0 24 24" onclick="skip(-1)"><path d="M6,18V6H8V18H6M9.5,12L18,6V18L9.5,12Z"/></svg>
            <svg class="c-svg c-play" viewBox="0 0 24 24" onclick="toggle()"><path id="p-ico" d="M8,5.14V19.14L19,12.14L8,5.14Z"/></svg>
            <svg class="c-svg" viewBox="0 0 24 24" onclick="skip(1)"><path d="M16,18H18V6H16M6,18L14.5,12L6,6V18Z"/></svg>
        </div>

        <div class="vol-box">
            <button class="vol-btn" onclick="adj(-5)">-</button>
            <div class="vol-bar">
                <input type="range" id="v-range" min="0" max="100" value="50" oninput="setV(this.value)">
            </div>
            <button class="vol-btn" onclick="adj(5)">+</button>
        </div>
    </aside>
</div>

<audio id="player"></audio>

<script>
    const STATIONS = [
        { n: 'RMF FM', s: 'RMF FM', u: 'rmf_fm' },
        { n: 'RMF MAXXX', s: 'Maxxx', u: 'RMFMAXXX48' },
        { n: 'RMF 80s', s: '80s', u: 'rmf_80s' },
        { n: 'RMF 90s', s: '90s', u: 'rmf_90s' },
        { n: 'RMF 2000', s: '2000', u: 'rmf_2000' },
        { n: 'RMF CHILLOUT', s: 'Chillout', u: 'rmf_chillout' },
        { n: 'RMF CLASSIC', s: 'Classic', u: 'rmf_classic' },
        { n: 'RMF DANCE', s: 'Dance', u: 'rmf_dance' },
        { n: 'RMF GOLD', s: 'Gold', u: 'rmf_gold' },
        { n: 'RMF LATINO', s: 'Latino', u: 'rmf_latino' },
        { n: 'RMF LOVE', s: 'Love', u: 'rmf_love' },
        { n: 'RMF PARTY', s: 'Party', u: 'rmf_party' },
        { n: 'RMF POLSKI ROCK', s: 'Polski Rock', u: 'rmf_polski_rock' },
        { n: 'RMF ROCK', s: 'Rock', u: 'rmf_rock' },
        { n: 'RMF SMOOTH JAZZ', s: 'Smooth Jazz', u: 'rmf_smooth_jazz' }
    ];

    const player = document.getElementById('player'), ico = document.getElementById('p-ico'), grid = document.getElementById('station-grid'), vRange = document.getElementById('v-range');
    let current = -1;

    function clock() {
        const d = new Date();
        document.getElementById('timer').textContent = d.getHours().toString().padStart(2,'0') + ":" + d.getMinutes().toString().padStart(2,'0');
    }
    setInterval(clock, 1000); clock();

    STATIONS.forEach((s, i) => {
        const t = document.createElement('div');
        t.className = 'tile';
        t.innerHTML = `
            <div class="waves"><div class="wave"></div><div class="wave"></div><div class="wave"></div></div>
            <div class="t-top">NODE ${(i + 1).toString().padStart(2, '0')}</div>
            <div class="t-bottom">${s.s.toUpperCase()}</div>
        `;
        t.onclick = () => play(i);
        grid.appendChild(t);
    });

    function play(i) {
        current = i;
        document.querySelectorAll('.tile').forEach((t, idx) => t.classList.toggle('active', idx === i));
        document.getElementById('playing-now').textContent = "RESONATING: " + STATIONS[i].n;
        const streamBase = "https://rs201-krk.rmfstream.pl/";
        player.src = (STATIONS[i].n === 'RMF MAXXX') ? 'https://rs7-krk2-cyfronet.rmfstream.pl/RMFMAXXX48' : streamBase + STATIONS[i].u;
        player.play();
        ico.setAttribute('d', 'M14,19H18V5H14M6,19H10V5H6V19Z');
    }

    function toggle() {
        if(player.paused) { player.play(); ico.setAttribute('d', 'M14,19H18V5H14M6,19H10V5H6V19Z'); }
        else { player.pause(); ico.setAttribute('d', 'M8,5.14V19.14L19,12.14L8,5.14Z'); }
    }

    function skip(d) { let n = current + d; if(n >= 0 && n < STATIONS.length) play(n); }
    function setV(v) { player.volume = v / 100; }
    function adj(d) { vRange.value = parseInt(vRange.value) + d; setV(vRange.value); }
</script>
</body>
</html>
