<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>GEHIRN TREIBER - ULTIMATE SYNTH INTERFACE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap');

        :root {
            --cyan: #00f2ff;
            --magenta: #ff00e5;
            --bg-black: #010408;
            --panel-border: #1a2a3a;
            --slot-bg: #000000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-black);
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .synth-container {
            width: 98vw;
            height: 94vh;
            display: grid;
            grid-template-columns: 320px 1fr 380px;
            gap: 15px;
            padding: 15px;
        }

        /* LEWY PANEL - OSCILLATORS (Zgodnie z image_88cb1f.png) */
        .osc-sidebar {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .osc-module {
            border: 1px solid var(--panel-border);
            padding: 12px;
            background: rgba(255, 255, 255, 0.01);
            border-radius: 4px;
            cursor: pointer;
            transition: 0.3s;
        }

        .osc-module:hover { border-color: rgba(0, 242, 255, 0.5); }
        .osc-module.active { border-color: var(--magenta); box-shadow: inset 0 0 15px rgba(255, 0, 229, 0.1); }

        .osc-header {
            font-size: 10px;
            color: var(--cyan);
            letter-spacing: 2px;
            margin-bottom: 8px;
            font-family: 'Orbitron';
            font-weight: 400;
        }

        .station-slot {
            background: var(--slot-bg);
            height: 55px;
            display: flex;
            align-items: center;
            padding-left: 20px;
            font-family: 'Orbitron';
            font-weight: 700;
            font-size: 15px;
            color: #fff;
            border: 1px solid rgba(255,255,255,0.03);
            text-transform: uppercase;
        }

        /* ŚRODEK - MASTER VISUALIZER */
        .main-display {
            border: 1px solid var(--panel-border);
            display: flex;
            flex-direction: column;
            position: relative;
            background: radial-gradient(circle at center, #050f1a 0%, #010408 100%);
        }

        .display-header {
            text-align: center;
            font-size: 11px;
            padding: 15px;
            letter-spacing: 4px;
            color: var(--cyan);
            font-family: 'Orbitron';
            border-bottom: 1px solid rgba(26, 42, 58, 0.5);
        }

        .visualizer-core {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        #wave-canvas { width: 100%; height: 100%; }

        .station-label {
            position: absolute;
            bottom: 50px;
            font-family: 'Orbitron';
            font-size: 36px;
            font-weight: 700;
            letter-spacing: 12px;
            text-transform: uppercase;
            color: #fff;
            opacity: 0.3;
            pointer-events: none;
        }

        /* PRAWY PANEL - CONTROLS */
        .control-sidebar {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .module-box {
            border: 1px solid var(--panel-border);
            padding: 20px;
        }

        .envelope-view {
            height: 220px;
            width: 100%;
            background: rgba(0,0,0,0.5);
            margin-bottom: 20px;
            position: relative;
        }

        .knob-row {
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
        }

        .knob-container { text-align: center; }
        .knob {
            width: 55px; height: 55px;
            border-radius: 50%;
            border: 3px solid var(--panel-border);
            border-top-color: var(--cyan);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.1);
            margin-bottom: 8px;
        }

        .knob-label { font-size: 10px; font-weight: 700; opacity: 0.8; letter-spacing: 1px; }

        /* PLAYBACK CONTROL FRAME (Zgodnie z Twoją prośbą) */
        .playback-frame {
            border: 1px solid var(--panel-border);
            padding: 20px;
            background: rgba(0,0,0,0.3);
        }

        .btn-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 25px;
        }

        .synth-btn {
            background: transparent;
            border: 1px solid var(--cyan);
            color: var(--cyan);
            padding: 12px;
            font-family: 'Orbitron';
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .synth-btn:hover { background: var(--cyan); color: #000; box-shadow: 0 0 20px var(--cyan); }
        .btn-stop { border-color: var(--magenta); color: var(--magenta); }
        .btn-stop:hover { background: var(--magenta); box-shadow: 0 0 20px var(--magenta); }

        .volume-section { display: flex; flex-direction: column; gap: 12px; }

        .vol-slider {
            -webkit-appearance: none;
            width: 100%;
            height: 3px;
            background: var(--panel-border);
            outline: none;
        }

        .vol-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px; height: 18px;
            background: var(--cyan);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 15px var(--cyan);
        }

        .footer-data {
            margin-top: auto;
            padding: 10px;
            font-size: 11px;
            font-family: monospace;
            opacity: 0.5;
            border-top: 1px solid var(--panel-border);
        }

    </style>
</head>
<body>

<div class="synth-container">
    <!-- LEWY PANEL: LISTA STACJI (OSC) -->
    <div class="osc-sidebar" id="station-list"></div>

    <!-- ŚRODEK: GENERATOR FALI -->
    <main class="main-display">
        <div class="display-header">MASTER OUTPUT VISUALIZER</div>
        <div class="visualizer-core">
            <canvas id="wave-canvas"></canvas>
            <div class="station-label" id="current-station-name">GEHIRN TRB</div>
        </div>
    </main>

    <!-- PRAWY PANEL: MODULATORY I TRANSPORT -->
    <aside class="control-sidebar">
        <div class="module-box">
            <div class="osc-header">ENVELOPE 1 [AMP]</div>
            <div class="envelope-view">
                <svg width="100%" height="100%" viewBox="0 0 100 100" preserveAspectRatio="none">
                    <path d="M0,100 L20,15 L45,40 L85,40 L100,100" fill="none" stroke="var(--cyan)" stroke-width="3" />
                </svg>
            </div>
            
            <div class="osc-header">MACRO CONTROLS</div>
            <div class="knob-row">
                <div class="knob-container"><div class="knob"></div><div class="knob-label">DRIVE</div></div>
                <div class="knob-container"><div class="knob" style="border-top-color: var(--magenta);"></div><div class="knob-label">FILTER</div></div>
                <div class="knob-container"><div class="knob"></div><div class="knob-label">REVERB</div></div>
            </div>
        </div>

        <div class="playback-frame">
            <div class="osc-header" style="margin-bottom:15px">TRANSPORT CONTROL</div>
            <div class="btn-grid">
                <button class="synth-btn" onclick="audioPlayer.play()">PLAY</button>
                <button class="synth-btn btn-stop" onclick="audioPlayer.pause()">STOP</button>
            </div>
            <div class="volume-section">
                <div style="display:flex; justify-content: space-between; font-size: 11px; font-weight: bold; color: var(--cyan);">
                    <span>MASTER VOLUME</span>
                    <span id="vol-display">70%</span>
                </div>
                <input type="range" class="vol-slider" min="0" max="100" value="70" oninput="changeVolume(this.value)">
            </div>
        </div>

        <div class="footer-data">
            SYSTEM_NODE: STABLE [ID: 88CB1F]<br>
            SIGNAL_STRENGTH: 98.4%<br>
            BUFFER_SIZE: 1024_SAMP
        </div>
    </aside>
</div>

<audio id="audio-engine"></audio>

<script>
    const STATIONS = [
        { id: '01', name: 'NEON WAVE', url: 'https://stream.laut.fm/tech88' },
        { id: '02', name: 'CYBER CORE', url: 'https://stream.laut.fm/hr3_clubnight' },
        { id: '03', name: 'DATA PULSE', url: 'https://stream.laut.fm/1000techno' },
        { id: '04', name: 'VOID SIGNAL', url: 'https://stream.laut.fm/best-of-techno' },
        { id: '05', name: 'SYNTH NODE', url: 'https://stream.laut.fm/chris_burn' },
        { id: '06', name: 'GEHIRN TRB', url: 'https://stream.laut.fm/gehirn-treiber-beat-radio' }
    ];

    const listElement = document.getElementById('station-list');
    const audioPlayer = document.getElementById('audio-engine');
    const nameLabel = document.getElementById('current-station-name');
    const canvas = document.getElementById('wave-canvas');
    const ctx = canvas.getContext('2d');

    // Budowanie modułów OSC
    STATIONS.forEach((st) => {
        const mod = document.createElement('div');
        mod.className = 'osc-module';
        if(st.name === 'GEHIRN TRB') mod.classList.add('active');
        
        mod.innerHTML = `
            <div class="osc-header">OSC ${st.id} // ${st.name}</div>
            <div class="station-slot">${st.name}</div>
        `;
        
        mod.onclick = () => {
            document.querySelectorAll('.osc-module').forEach(m => m.classList.remove('active'));
            mod.classList.add('active');
            nameLabel.textContent = st.name;
            audioPlayer.src = st.url;
            audioPlayer.play();
        };
        listElement.appendChild(mod);
    });

    // Generator fali (Oscyloskop / EQ)
    canvas.width = 1000;
    canvas.height = 400;

    function renderWave() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.beginPath();
        ctx.lineWidth = 4;
        ctx.strokeStyle = '#00f2ff';
        ctx.shadowBlur = 20;
        ctx.shadowColor = '#00f2ff';

        const speed = Date.now() * 0.004;
        const baseAmp = audioPlayer.paused ? 5 : 60;

        for (let x = 0; x < canvas.width; x++) {
            // Kombinacja kilku fal dla efektu "generatora syntezy"
            const y = canvas.height / 2 
                      + Math.sin(x * 0.015 + speed) * baseAmp 
                      + Math.sin(x * 0.008 - speed * 0.5) * (baseAmp / 2)
                      + (Math.random() * (audioPlayer.paused ? 0 : 5)); // Szum sygnału

            if (x === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        }
        ctx.stroke();
        requestAnimationFrame(renderWave);
    }
    renderWave();

    function changeVolume(v) {
        audioPlayer.volume = v / 100;
        document.getElementById('vol-display').textContent = v + "%";
    }
</script>

</body>
</html>
