<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL_PCB_STATION_v2.5</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@300;500&display=swap');

        :root {
            --pcb-deep: #020408;
            --trace-cyan: #00f2ff;
            --trace-dim: #0a1b2b;
            --accent: #ff0055;
            --hacker-green: #39ff14;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--pcb-deep); color: var(--trace-cyan); 
            font-family: 'JetBrains Mono', monospace; overflow: hidden; height: 100vh;
        }

        #pcb-master-svg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0; pointer-events: none; opacity: 0.8;
        }

        .main-frame { display: flex; height: 100vh; position: relative; z-index: 1; }

        /* BREADBOARD AREA */
        .chipset-area { flex: 1.8; position: relative; overflow: hidden; }

        .tech-label {
            position: absolute; font-size: 10px; color: #1a3a4a; pointer-events: none;
            text-transform: uppercase; letter-spacing: 1px;
        }

        /* POWIĘKSZONE KAFELKI O 25% */
        .chip {
            position: absolute; background: #050a0f; border: 1px solid #1a3a4a;
            padding: 10px; min-width: 125px; min-height: 56px; cursor: pointer; z-index: 10;
            box-shadow: inset 0 0 10px rgba(0,0,0,1), 4px 4px 0px #000;
            transition: 0.2s ease-in-out;
        }

        .chip:hover { border-color: var(--trace-cyan); transform: translateY(-2px); }
        .chip.active { border-color: #fff; background: #0a1a2a; box-shadow: 0 0 25px var(--trace-cyan); }
        
        .chip-n { font-family: 'Orbitron'; font-size: 12px; color: #fff; display: block; margin-bottom: 4px; }
        .chip-u { font-size: 9px; color: #3a5a7a; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }

        /* PANEL PO PRAWEJ - HACKER MODULE */
        .hacker-panel { 
            flex: 0.7; background: rgba(5, 10, 15, 0.98); 
            border-left: 2px solid #111; display: flex; flex-direction: column;
            box-shadow: -10px 0 30px rgba(0,0,0,0.8);
        }

        .hud-top {
            padding: 18px; border-bottom: 2px solid var(--accent);
            background: linear-gradient(to right, #100, #000);
            display: flex; justify-content: space-between; font-size: 14px;
            font-family: 'Orbitron';
        }

        .vfd-screen {
            margin: 15px; padding: 15px; background: #000; border: 1px solid #1a1a1a;
            height: 200px; position: relative; overflow: hidden;
            box-shadow: inset 0 0 20px #000;
        }

        .vfd-screen::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, transparent 0, rgba(0, 242, 255, 0.03) 1px, transparent 2px);
            pointer-events: none;
        }

        .matrix-btn-grid { 
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 15px; 
        }

        .hacker-btn {
            background: #0a0a0a; border: 1px solid #222; color: var(--trace-cyan);
            padding: 15px; cursor: pointer; font-family: 'Orbitron'; font-size: 12px;
            text-shadow: 0 0 5px var(--trace-cyan); transition: 0.1s;
        }

        .hacker-btn:hover { background: var(--trace-cyan); color: #000; }

        .fader-box { padding: 20px; flex: 1; display: flex; flex-direction: column; gap: 15px; }
        
        input[type=range] {
            -webkit-appearance: none; width: 100%; background: #111; height: 6px; border: 1px solid #222;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 35px; width: 18px; background: var(--accent); border: 1px solid #fff; cursor: pointer;
        }
    </style>
</head>
<body>

<svg id="pcb-master-svg"></svg>

<div class="main-frame">
    <div class="chipset-area" id="board"></div>

    <aside class="hacker-panel">
        <div class="hud-top">
            <span style="color:var(--accent)">SIGNAL_PROCESSOR</span>
            <span id="clock">00:00:00</span>
        </div>

        <div class="vfd-screen">
            <div id="log-console" style="font-size: 12px; color: var(--hacker-green); line-height: 1.5;">
                > SYSTEM READY<br>
                > SELECT NODE TO MOUNT...<br>
                > WAITING FOR INPUT_
            </div>
        </div>

        <div class="matrix-btn-grid">
            <button class="hacker-btn" onclick="skip(-1)">PREV</button>
            <button class="hacker-btn" onclick="toggle()" style="border-color:var(--accent)">SYNC</button>
            <button class="hacker-btn" onclick="skip(1)">NEXT</button>
        </div>

        <div class="fader-box">
            <label style="font-size:11px; color:#555; letter-spacing: 2px;">OUTPUT_LEVEL</label>
            <input type="range" min="0" max="1" step="0.01" value="0.5" oninput="setV(this.value)">
            <div id="signal-meter" style="height:8px; background:#111; margin-top:20px; border: 1px solid #222;">
                <div id="bar" style="width:50%; height:100%; background:var(--trace-cyan); transition: width 0.1s;"></div>
            </div>
        </div>
    </aside>
</div>

<!-- AUDYT AUDIO: Dodano parametry stabilizujące strumień -->
<audio id="player" crossorigin="anonymous" preload="auto"></audio>

<script>
    const STATIONS = [
        { n: 'TECH 88', u: 'https://laut.fm/tech88', x: 10, y: 15 },
        { n: 'HR3 CLUB', u: 'https://laut.fm/hr3_clubnight', x: 45, y: 12 },
        { n: '1000 TECHNO', u: 'https://laut.fm/1000techno', x: 15, y: 40 },
        { n: 'GEHIRN TREIBER', u: 'https://laut.fm/gehirn-treiber-beat-radio', x: 42, y: 48 },
        { n: 'BEST OF TECHNO', u: 'https://laut.fm/best-of-techno', x: 12, y: 75 },
        { n: 'CHRIS BURN', u: 'https://laut.fm/chris_burn', x: 55, y: 80 },
        { n: 'DEEP HOUSE', u: 'https://laut.fm/deep-house-sounds', x: 30, y: 5 },
        { n: 'HOUSEBOMB', u: 'https://laut.fm/housebomb-fn', x: 75, y: 72 },
        { n: 'SYMBIOTIC', u: 'https://laut.fm/symbiotic-beats', x: 78, y: 35 }
    ];

    const board = document.getElementById('board');
    const svg = document.getElementById('pcb-master-svg');
    const player = document.getElementById('player');
    const consoleLog = document.getElementById('log-console');
    let currentIdx = -1;

    function init() {
        STATIONS.forEach((s, i) => {
            const chip = document.createElement('div');
            chip.className = 'chip';
            chip.style.left = s.x + '%'; chip.style.top = s.y + '%';
            chip.innerHTML = `<span class="chip-n">${s.n}</span><span class="chip-u">${s.u}</span>`;
            chip.onclick = () => mount(i);
            chip.id = `chip-${i}`;
            board.appendChild(chip);
        });

        drawConnections();
        setInterval(() => {
            document.getElementById('clock').textContent = new Date().toLocaleTimeString('pl-PL');
        }, 1000);
    }

    function drawConnections() {
        svg.innerHTML = '';
        const w = window.innerWidth;
        const panelX = w * 0.72;

        STATIONS.forEach((s, i) => {
            const el = document.getElementById(`chip-${i}`);
            const r = el.getBoundingClientRect();
            const x = r.left + r.width;
            const y = r.top + r.height/2;

            // Główna magistrala danych ( kąty 90 stopni )
            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            const d = `M ${x} ${y} L ${x + 30} ${y} L ${x + 30} ${y + (i*18 - 80)} L ${panelX} ${y + (i*18 - 80)}`;
            path.setAttribute("d", d);
            path.setAttribute("stroke", "#0a1b2b");
            path.setAttribute("fill", "none");
            path.setAttribute("stroke-width", "1.5");
            path.id = `path-${i}`;
            svg.appendChild(path);

            // Dodatkowe ścieżki dekoracyjne (Cross-linking)
            if(i < STATIONS.length - 1) {
                const p2 = document.createElementNS("http://www.w3.org/2000/svg", "path");
                p2.setAttribute("d", `M ${r.left} ${r.top} L ${r.left - 20} ${r.top} L ${r.left - 20} ${r.top + 40}`);
                p2.setAttribute("stroke", "#05101a");
                p2.setAttribute("fill", "none");
                svg.appendChild(p2);
            }
        });
    }

    function mount(i) {
        currentIdx = i;
        document.querySelectorAll('.chip').forEach((c, idx) => c.classList.toggle('active', idx === i));
        document.querySelectorAll('path').forEach(p => {
            if(p.id.startsWith('path-')) p.setAttribute('stroke', '#0a1b2b');
        });
        
        const activePath = document.getElementById(`path-${i}`);
        if(activePath) {
            activePath.setAttribute('stroke', 'var(--trace-cyan)');
            activePath.setAttribute('stroke-width', '2.5');
        }

        consoleLog.innerHTML = `> MOUNTING NODE_${i}...<br>> ID: ${STATIONS[i].n}<br>> LINK: ESTABLISHED<br>> PROTOCOL: HTTPS/STREAM<br>> STATUS: BUFFERING...`;
        
        // POPRAWKA DZIAŁANIA STACJI:
        player.pause();
        player.src = STATIONS[i].u;
        player.load(); // Wymuszone przeładowanie bufora
        player.play()
            .then(() => { consoleLog.innerHTML += `<br>> SIGNAL_LOCKED: OK`; })
            .catch(e => { consoleLog.innerHTML += `<br>> ERROR: INTERACTION REQUIRED`; });
    }

    function toggle() {
        if(currentIdx === -1) mount(3);
        else player.paused ? player.play() : player.pause();
    }

    function skip(dir) {
        let n = currentIdx + dir;
        if(n >= 0 && n < STATIONS.length) mount(n);
    }

    function setV(v) { 
        player.volume = v; 
        document.getElementById('bar').style.width = (v*100)+'%';
    }

    window.onresize = drawConnections;
    init();
</script>
</body>
</html>
