<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>GEHIRN TREIBER - AUDIO SYNTH PRO V6</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap');

        :root {
            --cyan: #00f2ff;
            --magenta: #ff00e5;
            --bg-black: #010408;
            --panel-border: #1a2a3a;
            --slot-bg: #000000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html { 
            width: 100vw; 
            height: 100vh; 
            overflow: hidden; 
            background-color: var(--bg-black);
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
        }

        .synth-container {
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: 300px 1fr 340px;
            gap: 10px;
            padding: 10px;
        }

        /* LEWY PANEL */
        .osc-sidebar { display: flex; flex-direction: column; gap: 8px; height: 100%; }
        
        .track-info-box {
            border: 1px solid var(--magenta);
            padding: 12px;
            background: rgba(255, 0, 229, 0.05);
            margin-bottom: 5px;
            min-height: 70px;
        }

        #station-list {
            flex-grow: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        #station-list::-webkit-scrollbar { width: 0; }

        .osc-module {
            border: 1px solid var(--panel-border);
            padding: 8px;
            background: rgba(255, 255, 255, 0.01);
            cursor: pointer;
            transition: 0.2s;
        }
        .osc-module.active { border-color: var(--cyan); background: rgba(0, 242, 255, 0.05); }

        .osc-header { font-size: 9px; color: var(--cyan); letter-spacing: 1px; font-family: 'Orbitron'; margin-bottom: 4px; }
        .station-slot {
            background: var(--slot-bg);
            height: 42px;
            display: flex;
            align-items: center;
            padding-left: 12px;
            font-family: 'Orbitron';
            font-size: 11px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* ŚRODEK */
        .main-display {
            border: 1px solid var(--panel-border);
            position: relative;
            background: radial-gradient(circle at center, #0a1018 0%, #010408 100%);
        }
        #eq-canvas { width: 100%; height: 100%; display: block; }

        /* PRAWY PANEL */
        .control-sidebar { display: flex; flex-direction: column; gap: 10px; }
        .module-box { border: 1px solid var(--panel-border); padding: 20px; }
        .envelope-view { height: 160px; width: 100%; background: rgba(0,0,0,0.5); border: 1px solid #111; }

        .playback-frame { border: 1px solid var(--panel-border); padding: 20px; background: rgba(0,0,0,0.3); }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .synth-btn {
            background: transparent; border: 1px solid var(--cyan); color: var(--cyan);
            padding: 10px; font-family: 'Orbitron'; font-size: 10px; cursor: pointer;
        }
        .btn-stop { border-color: var(--magenta); color: var(--magenta); }

        .vol-slider { -webkit-appearance: none; width: 100%; height: 2px; background: var(--panel-border); outline: none; }
        .vol-slider::-webkit-slider-thumb { 
            -webkit-appearance: none; width: 16px; height: 16px; 
            background: var(--cyan); border-radius: 50%; cursor: pointer; 
            box-shadow: 0 0 10px var(--cyan);
        }
    </style>
</head>
<body>

<div class="synth-container">
    <div class="osc-sidebar">
        <div class="track-info-box">
            <div class="osc-header" style="color: var(--magenta);">CURRENT SIGNAL</div>
            <div id="track-title" style="font-size: 13px; font-family: 'Orbitron'; color: #fff; text-shadow: 0 0 8px var(--magenta); line-height: 1.4;">IDLE...</div>
        </div>
        <div id="station-list"></div>
    </div>

    <main class="main-display">
        <canvas id="eq-canvas"></canvas>
    </main>

    <aside class="control-sidebar">
        <div class="module-box">
            <div class="osc-header">ENVELOPE 1 [AMP]</div>
            <div class="envelope-view">
                <svg width="100%" height="100%" viewBox="0 0 100 100" preserveAspectRatio="none">
                    <path d="M0,100 L20,20 L40,50 L80,50 L100,100" fill="none" stroke="var(--cyan)" stroke-width="2" />
                </svg>
            </div>
        </div>

        <div class="playback-frame">
            <div class="osc-header" style="margin-bottom:10px">TRANSPORT CONTROL</div>
            <div class="btn-grid">
                <button class="synth-btn" id="playBtn">PLAY</button>
                <button class="synth-btn btn-stop" id="stopBtn">STOP</button>
            </div>
            <div style="font-size: 10px; margin-bottom: 8px; color: var(--cyan); letter-spacing: 1px;">MASTER VOLUME</div>
            <input type="range" class="vol-slider" min="0" max="100" value="70" id="volRange">
        </div>
    </aside>
</div>

<audio id="audio-engine" crossorigin="anonymous"></audio>

<script>
    const STATIONS = [
        { id: '01', slug: 'tech88', n: 'TECHNO-RADIO.pl' },
        { id: '02', slug: 'hr3_clubnight', n: 'CLUB-NIGHT' },
        { id: '03', slug: '1000techno', n: '1000 TECHNOHITS' },
        { id: '04', slug: 'best-of-techno', n: 'BEST OF TECHNO' },
        { id: '05', slug: 'chris_burn', n: 'CHRIS BURN' },
        { id: '06', slug: 'gehirn-treiber-beat-radio', n: 'GEHIRN TREIBER' }
    ];

    const audio = document.getElementById('audio-engine');
    const trackTitle = document.getElementById('track-title');
    const canvas = document.getElementById('eq-canvas');
    const ctx = canvas.getContext('2d');
    
    let audioCtx, analyser, source, dataArray;
    let currentSlug = "";

    // Funkcja pobierająca metadane (Aktualny utwór)
    async function updateMetadata() {
        if (!currentSlug) return;
        try {
            const response = await fetch(`https://api.laut.fm/station/${currentSlug}/current_song`);
            const data = await response.json();
            if (data && data.artist && data.title) {
                trackTitle.textContent = `${data.artist.name.toUpperCase()} - ${data.title.toUpperCase()}`;
            } else {
                trackTitle.textContent = "SIGNAL RECOVERING...";
            }
        } catch (e) {
            trackTitle.textContent = "METADATA ERROR";
        }
    }

    // Interwał sprawdzania utworu co 30 sekund
    setInterval(updateMetadata, 30000);

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            source = audioCtx.createMediaElementSource(audio);
            source.connect(analyser);
            analyser.connect(audioCtx.destination);
            analyser.fftSize = 512;
            dataArray = new Uint8Array(analyser.frequencyBinCount);
        }
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    STATIONS.forEach((s) => {
        const mod = document.createElement('div');
        mod.className = 'osc-module';
        mod.innerHTML = `<div class="osc-header">OSC ${s.id}</div><div class="station-slot">${s.n}</div>`;
        mod.onclick = () => {
            initAudio();
            document.querySelectorAll('.osc-module').forEach(m => m.classList.remove('active'));
            mod.classList.add('active');
            
            currentSlug = s.slug;
            audio.src = `https://stream.laut.fm/${s.slug}`;
            audio.play();
            updateMetadata(); // Natychmiastowe pobranie tytułu
        };
        document.getElementById('station-list').appendChild(mod);
    });

    document.getElementById('playBtn').onclick = () => { if(audio.src) { initAudio(); audio.play(); }};
    document.getElementById('stopBtn').onclick = () => audio.pause();
    document.getElementById('volRange').oninput = (e) => audio.volume = e.target.value / 100;

    function resize() {
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
    }
    window.onresize = resize;
    resize();

    function draw() {
        requestAnimationFrame(draw);
        ctx.fillStyle = 'rgba(1, 4, 8, 0.2)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        if (analyser) analyser.getByteFrequencyData(dataArray);

        const layers = 5;
        for (let l = 0; l < layers; l++) {
            ctx.beginPath();
            ctx.lineWidth = 2;
            ctx.strokeStyle = l % 2 === 0 ? `rgba(0, 242, 255, ${0.7 - l*0.1})` : `rgba(255, 0, 229, ${0.4 - l*0.05})`;
            
            for (let i = 0; i < canvas.width; i += 5) {
                const index = Math.floor((i / canvas.width) * (dataArray ? dataArray.length / 2 : 1));
                const val = dataArray ? (dataArray[index] / 255) * canvas.height * 0.4 : 0;
                const offset = l * 15;
                const y = (canvas.height / 2) + Math.sin(i * 0.01 + Date.now()*0.002 + offset) * (val + 5);
                
                if (i === 0) ctx.moveTo(i, y);
                else ctx.lineTo(i, y);
            }
            ctx.stroke();
        }
    }
    draw();
</script>
</body>
</html>
