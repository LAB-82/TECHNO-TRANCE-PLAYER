<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RMF FM SEKTOR - PRO VST EDITION</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Montserrat+Alternates:wght@700;800&display=swap');

        :root {
            --s-bg: #13161a;
            --s-panel: #20252b;
            --s-init-blue: #00d4ff; 
            --rmf-neon: #ffcc00; 
            --white-neon: #e0e6ed;
            --s-border: #0a0c0e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            height: 100vh; background: #000; 
            font-family: 'Rajdhani', sans-serif;
            display: flex; align-items: center; justify-content: center;
        }

        .sektor-vst {
            width: 1000px; height: 600px;
            background: var(--s-bg);
            border: 2px solid #333; border-radius: 4px;
            display: flex; flex-direction: column;
            box-shadow: 0 30px 60px rgba(0,0,0,0.9);
        }

        .top-nav {
            height: 65px; background: #1a1e24;
            display: flex; align-items: center; justify-content: center;
            border-bottom: 2px solid var(--s-border);
            padding: 0 20px;
        }

        .patch-display {
            width: 520px; height: 40px; background: #0b0d0f;
            border: 1px solid #3d444d; border-radius: 2px;
            display: flex; align-items: center; justify-content: space-between;
        }

        .p-btn { 
            width: 45px; height: 100%; background: #262b32; 
            color: #fff; font-size: 10px; border: none;
            cursor: pointer; text-transform: uppercase; font-weight: 700;
        }

        .p-name { 
            flex: 1; text-align: center; color: var(--s-init-blue); 
            font-weight: 700; letter-spacing: 2px; font-size: 16px;
            text-shadow: 0 0 12px rgba(0, 212, 255, 0.6);
        }

        .main-frame { display: flex; flex: 1; padding: 15px; gap: 15px; overflow: hidden; }

        .browser-section {
            flex: 1.6; background: var(--s-panel);
            border-radius: 3px; border: 1px solid var(--s-border);
            padding: 12px; display: flex; flex-direction: column;
        }

        .grid { flex: 1; display: flex; flex-wrap: wrap; gap: 6px; align-content: stretch; }

        /* KAFELKI - PROFESJONALNE PRZYCISKI BEZ RAMEK */
        .tile {
            flex: 1 1 calc(25% - 6px);
            background: linear-gradient(180deg, #2d333b 0%, #1d2127 100%);
            border: none !important;
            border-radius: 2px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 13px; 
            color: var(--white-neon);
            text-shadow: 0 0 5px rgba(224, 230, 237, 0.4);
            transition: all 0.2s ease;
            font-weight: 600;
            position: relative;
            overflow: hidden;
        }

        /* EFEKT FALI RADIOWEJ (NADAJNIK) */
        .tile.active::before {
            content: '';
            position: absolute;
            width: 10px; height: 10px;
            background: var(--rmf-neon);
            border-radius: 50%;
            animation: radio-wave 1.5s infinite linear;
            opacity: 0;
            z-index: 0;
        }

        @keyframes radio-wave {
            0% { transform: scale(1); opacity: 0.6; }
            100% { transform: scale(15); opacity: 0; }
        }

        .tile.active { 
            background: radial-gradient(circle, #2a313a 0%, #161a1f 100%);
            color: var(--rmf-neon);
            text-shadow: 0 0 15px var(--rmf-neon);
            border: none !important;
        }

        .master-section { flex: 0.4; display: flex; flex-direction: column; gap: 15px; }
        
        .control-box { 
            background: var(--s-panel); border: 1px solid var(--s-border); 
            padding: 20px; flex: 1; display: flex; flex-direction: column; align-items: center;
        }

        .play-btn {
            width: 100%; height: 55px; background: linear-gradient(to bottom, #3a414a, #1a1e23);
            border: 1px solid #000; border-radius: 3px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 0 #000; margin-bottom: 25px;
        }
        .play-btn svg { width: 28px; fill: var(--s-init-blue); filter: drop-shadow(0 0 8px var(--s-init-blue)); }

        /* PROFESJONALNY TOR I SUWAK INITIAL AUDIO */
        .vol-container { width: 100%; flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        .knob-base {
            width: 100px; height: 100px; background: #0a0c0e; border-radius: 50%;
            margin-bottom: 30px; border: 4px solid #111; position: relative;
        }
        .knob-turner {
            width: 100%; height: 100%; border-radius: 50%;
            background: conic-gradient(from -135deg, var(--s-init-blue) 0%, #1a1e23 0%);
        }
        .knob-center { 
            position: absolute; inset: 12px; 
            background: linear-gradient(135deg, #3d444d, #111); 
            border-radius: 50%; border: 1px solid #000; cursor: pointer;
        }

        /* TOR SUWAKA (FADER TRACK) */
        .fader-track {
            width: 100%; height: 12px; background: #080a0c;
            border-radius: 10px; position: relative;
            border: 1px solid #222; box-shadow: inset 0 2px 5px #000;
            display: flex; align-items: center;
        }

        /* DYNAMICZNE PODŚWIETLENIE TORU */
        #fader-glow {
            position: absolute; height: 100%; background: var(--s-init-blue);
            border-radius: 10px; opacity: 0.3; filter: blur(4px);
            pointer-events: none;
        }

        .vol-slider { 
            width: 100%; appearance: none; background: transparent; 
            position: absolute; z-index: 5; outline: none;
        }

        .vol-slider::-webkit-slider-thumb {
            appearance: none; width: 24px; height: 16px; 
            background: linear-gradient(to bottom, #5d646d, #1a1e24);
            border: 1px solid #000; border-radius: 2px; cursor: pointer;
            box-shadow: 0 0 12px var(--s-init-blue);
        }

        .footer-logo { 
            flex: 0.25; background: #0b0d0f; display: flex; 
            justify-content: center; align-items: center; border: 1px solid #000; 
        }
        .footer-logo span { 
            font-family: 'Montserrat Alternates', sans-serif;
            font-size: 32px; color: var(--rmf-neon); font-weight: 800; 
            letter-spacing: -1px; text-shadow: 0 0 15px rgba(255, 204, 0, 0.7);
        }

    </style>
</head>
<body>

<div class="sektor-vst">
    <div class="top-nav">
        <div class="patch-display">
            <button class="p-btn" onclick="skip(-1)">Prev</button>
            <div class="p-name" id="patch-name">TERAZ GRA // SELECT STATION</div>
            <button class="p-btn" onclick="skip(1)">Next</button>
        </div>
    </div>

    <div class="main-frame">
        <div class="browser-section">
            <div class="grid" id="grid"></div>
        </div>

        <div class="master-section">
            <div class="control-box">
                <button class="play-btn" onclick="toggle()">
                    <svg id="svg-ico" viewBox="0 0 24 24"><path d="M8,5.14V19.14L19,12.14L8,5.14Z"/></svg>
                </button>
                
                <div class="vol-container">
                    <div class="knob-base">
                        <div class="knob-turner" id="v-knob"></div>
                        <div class="knob-center" id="v-center" onclick="resetVol()"></div>
                    </div>
                    <div class="fader-track">
                        <div id="fader-glow"></div>
                        <input type="range" class="vol-slider" id="v-slider" min="0" max="100" value="50" oninput="setV(this.value)">
                    </div>
                </div>
            </div>
            
            <div class="footer-logo">
                <span>RMF FM</span>
            </div>
        </div>
    </div>
</div>

<audio id="player"></audio>

<script>
    const STATIONS = [
        { n: 'RMF FM', u: 'rmf_fm' }, { n: 'RMF MAXXX', u: 'RMFMAXXX48' },
        { n: 'RMF 80s', u: 'rmf_80s' }, { n: 'RMF 90s', u: 'rmf_90s' },
        { n: 'RMF 2000', u: 'rmf_2000' }, { n: 'RMF CHILLOUT', u: 'rmf_chillout' },
        { n: 'RMF CLASSIC', u: 'rmf_classic' }, { n: 'RMF DANCE', u: 'rmf_dance' },
        { n: 'RMF GOLD', u: 'rmf_gold' }, { n: 'RMF PARTY', u: 'rmf_party' },
        { n: 'RMF ROCK', u: 'rmf_rock' }, { n: 'RMF LOVE', u: 'rmf_love' },
        { n: 'RMF POLSKI ROCK', u: 'rmf_polski_rock' }, { n: 'RMF JAZZ', u: 'rmf_smooth_jazz' },
        { n: 'RMF HIP HOP', u: 'rmf_hip_hop' }, { n: 'RMF GROOVE', u: 'rmf_groove' }
    ];

    const player = document.getElementById('player'), 
          svgIco = document.getElementById('svg-ico'),
          grid = document.getElementById('grid'),
          vKnob = document.getElementById('v-knob'),
          vCenter = document.getElementById('v-center'),
          vSlider = document.getElementById('v-slider'),
          fGlow = document.getElementById('fader-glow');

    let current = -1;

    STATIONS.forEach((s, i) => {
        const div = document.createElement('div');
        div.className = 'tile';
        div.textContent = s.n;
        div.onclick = () => play(i);
        grid.appendChild(div);
    });

    function play(i) {
        current = i;
        document.querySelectorAll('.tile').forEach((t, idx) => t.classList.toggle('active', idx === i));
        document.getElementById('patch-name').textContent = "TERAZ GRA // " + STATIONS[i].n.toUpperCase();
        const streamBase = "https://rs201-krk.rmfstream.pl/";
        player.src = (STATIONS[i].n === 'RMF MAXXX') ? 'https://rs7-krk2-cyfronet.rmfstream.pl/RMFMAXXX48' : streamBase + STATIONS[i].u;
        player.play();
        updateIcon(true);
        resetVol(); 
    }

    function toggle() {
        if(current === -1) { play(0); return; }
        if(player.src && !player.paused) {
            player.pause(); player.src = ""; 
            updateIcon(false);
        } else { play(current); }
    }

    function updateIcon(isPlaying) {
        svgIco.innerHTML = isPlaying ? '<path d="M6,6H18V18H6V6Z"/>' : '<path d="M8,5.14V19.14L19,12.14L8,5.14Z"/>';
    }

    function skip(d) {
        let n = (current + d + STATIONS.length) % STATIONS.length;
        play(n);
    }

    function setV(v) {
        player.volume = v / 100;
        const fill = v * 0.75; 
        vKnob.style.background = `conic-gradient(from -135deg, var(--s-init-blue) ${fill}%, #1a1e23 0%)`;
        vCenter.style.transform = `rotate(${(v * 2.7) - 135}deg)`;
        
        // Aktualizacja podświetlenia toru suwaka
        fGlow.style.width = v + "%";
    }

    function resetVol() {
        vSlider.value = 50;
        setV(50);
    }

    setV(50);
</script>
</body>
</html>
