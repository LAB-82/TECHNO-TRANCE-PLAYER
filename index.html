<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RMF ICON DRUM EDITION</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@300;500&family=Playfair+Display:ital,wght@0,700;1,700&display=swap');

        :root {
            --icon-bg: #1a1a1a;
            --icon-panel: #111111;
            --icon-accent: #ff8400; /* Charakterystyczny pomarańcz IconDrum */
            --icon-text-gold: #c5a47e; /* Złoty kolor logotypu */
            --blue-wave: #ff8400; /* Zmiana fal na pomarańczowe dla spójności */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body { 
            height: 100vh; width: 100vw; 
            background: #000; color: #fff; 
            font-family: 'Oswald', sans-serif;
            overflow: hidden; 
        }

        body { 
            display: flex; flex-direction: column; padding: 1vh;
            border: 4px solid #222;
        }

        /* GÓRNY PASEK - Styl IconDrum Header */
        header { 
            height: 45px; display: flex; justify-content: space-between; align-items: center;
            background: #111; padding: 0 20px; margin-bottom: 1vh; flex-shrink: 0;
            border-bottom: 1px solid #333;
        }
        .header-info { font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 2px; }
        .clock { color: var(--icon-accent); font-size: 16px; font-weight: 500; }

        .app-content { 
            display: flex; flex: 1; gap: 10px; min-height: 0; 
            padding: 10px; background: var(--icon-bg);
            border: 1px solid #333;
        }

        /* SIATKA 5x3 - ORYGINALNY SZKIELET */
        .grid { 
            flex: 1.4; display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            grid-template-rows: repeat(3, 1fr); 
            gap: 8px; 
            padding: 10px;
            border: 1px solid var(--icon-accent);
        }

        .tile {
            background: #0a0a0a; border: 1px solid #333;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; position: relative; overflow: visible;
            transition: 0.2s;
        }

        .tile .t-top { font-size: 9px; color: var(--icon-accent); opacity: 0.7; text-transform: uppercase; z-index: 2; }
        .tile .t-bottom { font-size: 14px; font-weight: 300; color: #eee; margin-top: 2px; text-align: center; z-index: 2; }

        /* AKTYWNA STACJA - Styl IconDrum Pad */
        .tile.active { 
            border: 1px solid var(--icon-accent);
            background: #1a1a1a;
            box-shadow: inset 0 0 15px rgba(255, 132, 0, 0.2);
        }
        .tile.active::after {
            content: ""; position: absolute; top: 4px; right: 4px;
            width: 4px; height: 4px; background: var(--icon-accent);
            box-shadow: 0 0 5px var(--icon-accent);
        }

        /* RIPPLE EFFECT */
        .waves {
            position: absolute; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            pointer-events: none; opacity: 0; z-index: 1;
        }
        .tile.active .waves { opacity: 0.5; }
        .wave {
            position: absolute; border: 1px solid var(--icon-accent);
            width: 10px; height: 10px; opacity: 0;
            animation: ripple 3s infinite linear;
        }

        @keyframes ripple {
            0% { width: 0; height: 0; opacity: 1; }
            100% { width: 300%; height: 300%; opacity: 0; }
        }

        /* SIDEBAR - Panel sterowania */
        .sidebar { 
            flex: 0.6; display: flex; flex-direction: column; 
            align-items: center; justify-content: space-between; padding: 20px 0;
            background: var(--icon-panel); border: 1px solid var(--icon-accent);
        }

        .logo-display { text-align: center; width: 100%; }
        .logo-display h2 { 
            font-family: 'Playfair Display', serif; font-size: 42px; 
            color: var(--icon-text-gold); font-style: italic;
            line-height: 1; margin-bottom: 5px;
        }
        .logo-display .sub { 
            font-size: 10px; color: var(--icon-accent); 
            text-transform: uppercase; letter-spacing: 5px; border-top: 1px solid var(--icon-accent);
            display: inline-block; padding-top: 5px;
        }

        .controls { display: flex; align-items: center; gap: 2vw; }
        .c-svg { width: 30px; height: 30px; fill: #555; cursor: pointer; }
        .c-play { 
            width: 70px; height: 70px; fill: var(--icon-accent); 
            border: 1px solid var(--icon-accent); padding: 15px; 
            background: #000;
        }

        .vol-box { width: 80%; text-align: center; }
        .vol-label { font-size: 10px; color: #666; text-transform: uppercase; margin-bottom: 10px; }
        .vol-bar { 
            height: 40px; border: 1px solid #333; background: #050505; 
            display: flex; align-items: center; padding: 0 10px; 
        }
        
        input[type="range"] { 
            flex: 1; appearance: none; background: #222; height: 2px; 
        }
        input[type="range"]::-webkit-slider-thumb { 
            appearance: none; width: 12px; height: 20px; 
            background: var(--icon-accent); border-radius: 0; cursor: pointer;
        }

        @media (max-width: 600px) {
            .app-content { flex-direction: column; }
            .grid { grid-template-columns: repeat(3, 1fr); height: 50vh; }
            .sidebar { width: 100%; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-info" id="playing-now">MASTER SELECTION: NONE</div>
    <div class="clock" id="timer">00:00</div>
</header>

<div class="app-content">
    <div class="grid" id="station-grid"></div>

    <aside class="sidebar">
        <div class="logo-display">
            <h2>IconDrum</h2>
            <div class="sub">SOUND SELECTION</div>
        </div>

        <div class="controls">
            <svg class="c-svg" viewBox="0 0 24 24" onclick="skip(-1)"><path d="M6,18V6H8V18H6M9.5,12L18,6V18L9.5,12Z"/></svg>
            <svg class="c-svg c-play" viewBox="0 0 24 24" onclick="toggle()"><path id="p-ico" d="M8,5.14V19.14L19,12.14L8,5.14Z"/></svg>
            <svg class="c-svg" viewBox="0 0 24 24" onclick="skip(1)"><path d="M16,18H18V6H16M6,18L14.5,12L6,6V18Z"/></svg>
        </div>

        <div class="vol-box">
            <div class="vol-label">Output Volume</div>
            <div class="vol-bar">
                <input type="range" id="v-range" min="0" max="100" value="50" oninput="setV(this.value)">
            </div>
        </div>
    </aside>
</div>

<audio id="player"></audio>

<script>
    const STATIONS = [
        { n: 'RMF FM', s: 'RMF FM', u: 'rmf_fm' },
        { n: 'RMF MAXXX', s: 'Maxxx', u: 'RMFMAXXX48' },
        { n: 'RMF 80s', s: '80s', u: 'rmf_80s' },
        { n: 'RMF 90s', s: '90s', u: 'rmf_90s' },
        { n: 'RMF 2000', s: '2000', u: 'rmf_2000' },
        { n: 'RMF CHILLOUT', s: 'Chillout', u: 'rmf_chillout' },
        { n: 'RMF CLASSIC', s: 'Classic', u: 'rmf_classic' },
        { n: 'RMF DANCE', s: 'Dance', u: 'rmf_dance' },
        { n: 'RMF GOLD', s: 'Gold', u: 'rmf_gold' },
        { n: 'RMF LATINO', s: 'Latino', u: 'rmf_latino' },
        { n: 'RMF LOVE', s: 'Love', u: 'rmf_love' },
        { n: 'RMF PARTY', s: 'Party', u: 'rmf_party' },
        { n: 'RMF POLSKI ROCK', s: 'Polski Rock', u: 'rmf_polski_rock' },
        { n: 'RMF ROCK', s: 'Rock', u: 'rmf_rock' },
        { n: 'RMF SMOOTH JAZZ', s: 'Smooth Jazz', u: 'rmf_smooth_jazz' }
    ];

    const player = document.getElementById('player'), ico = document.getElementById('p-ico'), grid = document.getElementById('station-grid'), vRange = document.getElementById('v-range');
    let current = -1;

    function clock() {
        const d = new Date();
        document.getElementById('timer').textContent = d.getHours().toString().padStart(2,'0') + ":" + d.getMinutes().toString().padStart(2,'0');
    }
    setInterval(clock, 1000); clock();

    STATIONS.forEach((s, i) => {
        const t = document.createElement('div');
        t.className = 'tile';
        t.innerHTML = `
            <div class="waves"><div class="wave"></div><div class="wave"></div></div>
            <div class="t-top">BANK ${(i + 1).toString().padStart(2, '0')}</div>
            <div class="t-bottom">${s.s.toUpperCase()}</div>
        `;
        t.onclick = () => play(i);
        grid.appendChild(t);
    });

    function play(i) {
        current = i;
        document.querySelectorAll('.tile').forEach((t, idx) => t.classList.toggle('active', idx === i));
        document.getElementById('playing-now').textContent = "MASTER SELECTION: " + STATIONS[i].n;
        const streamBase = "https://rs201-krk.rmfstream.pl/";
        player.src = (STATIONS[i].n === 'RMF MAXXX') ? 'https://rs7-krk2-cyfronet.rmfstream.pl/RMFMAXXX48' : streamBase + STATIONS[i].u;
        player.play();
        ico.setAttribute('d', 'M14,19H18V5H14M6,19H10V5H6V19Z');
    }

    function toggle() {
        if(player.paused) { player.play(); ico.setAttribute('d', 'M14,19H18V5H14M6,19H10V5H6V19Z'); }
        else { player.pause(); ico.setAttribute('d', 'M8,5.14V19.14L19,12.14L8,5.14Z'); }
    }

    function skip(d) { let n = current + d; if(n >= 0 && n < STATIONS.length) play(n); }
    function setV(v) { player.volume = v / 100; }
</script>
</body>
</html>
