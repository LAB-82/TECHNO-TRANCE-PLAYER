<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muzyczne Radio - Gemini Vision Project</title>
    <link href="https://fonts.cdnfonts.com/css/ds-digital" rel="stylesheet">
    <style>
        :root {
            --wood-dark: #3d2b1f;
            --wood-light: #5d4037;
            --panel-white: #f8f9fa;
            --vfd-glow: #00f2ff;
            --vfd-dim: #00444d;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle, #2c3e50 0%, #000 100%);
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        /* Obudowa Premium Wood */
        .case-external {
            padding: 22px;
            background: var(--wood-dark);
            background-image: 
                url('https://www.transparenttextures.com/patterns/black-orchard.png'),
                linear-gradient(135deg, var(--wood-light) 0%, var(--wood-dark) 100%);
            border-radius: 50px;
            box-shadow: 0 60px 120px rgba(0,0,0,0.9), inset 0 0 40px rgba(0,0,0,0.7);
            position: relative;
            transition: transform 0.5s ease;
        }

        /* Biały Panel Przedni */
        .front-panel {
            width: 840px;
            height: 480px;
            background: var(--panel-white);
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            border-radius: 35px;
            border-bottom: 4px solid #ddd;
            overflow: hidden;
        }

        /* Branding */
        .branding-title {
            margin-top: 40px;
            font-size: 22px;
            font-weight: 800;
            color: #444;
            letter-spacing: 4px;
            text-transform: uppercase;
            transition: 0.8s ease;
        }

        .powered .branding-title {
            color: #000;
            text-shadow: 0 0 15px rgba(0, 242, 255, 0.4);
        }

        /* Wyświetlacz VFD */
        .display-vfd {
            width: 280px;
            height: 140px;
            background: #050505;
            border: 8px solid #1a1a1a;
            border-radius: 12px;
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'DS-Digital', monospace;
            color: var(--vfd-dim);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: inset 0 0 30px #000;
            z-index: 2;
        }

        .powered .display-vfd { 
            color: var(--vfd-glow); 
            text-shadow: 0 0 15px var(--vfd-glow);
            border-color: #222;
        }

        .vfd-clock { font-size: 52px; font-variant-numeric: tabular-nums; }
        .vfd-status { font-size: 14px; letter-spacing: 2px; height: 16px; margin-bottom: 5px; opacity: 0.8; }

        /* Głośniki Neumorficzne */
        .speaker-grill {
            width: 210px;
            height: 210px;
            background: radial-gradient(circle, #222 1px, transparent 1.5px), #111;
            background-size: 6px 6px;
            border-radius: 50%;
            position: absolute;
            top: 110px;
            border: 10px solid #ececec;
            box-shadow: 
                10px 10px 20px rgba(0,0,0,0.1),
                inset 5px 5px 15px #000;
        }
        .spk-left { left: 45px; }
        .spk-right { right: 45px; }

        /* Sekcja Sterowania */
        .controls-hub {
            position: absolute;
            bottom: 45px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
        }

        .soft-buttons {
            display: flex;
            gap: 15px;
            padding: 18px 30px;
            background: var(--wood-light);
            border-radius: 20px;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.4), 0 10px 20px rgba(0,0,0,0.2);
        }

        /* Miękkie Przyciski */
        .btn-soft {
            width: 55px;
            height: 55px;
            border-radius: 14px;
            border: none;
            background: linear-gradient(145deg, #333, #1a1a1a);
            color: #666;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 4px 4px 8px rgba(0,0,0,0.4), -1px -1px 2px rgba(255,255,255,0.05);
            transition: 0.15s ease;
        }

        .btn-soft:active {
            transform: scale(0.92);
            background: #111;
            box-shadow: inset 4px 4px 8px #000;
        }

        .btn-soft.active {
            color: var(--vfd-glow);
            text-shadow: 0 0 10px var(--vfd-glow);
        }

        .btn-soft svg { width: 24px; height: 24px; fill: currentColor; }

        /* Pasek Głośności */
        .vol-container { display: flex; flex-direction: column; gap: 8px; width: 140px; }
        .vol-label { display: flex; justify-content: space-between; font-size: 10px; color: #fff; font-weight: bold; }
        .vol-track { width: 100%; height: 8px; background: #000; border-radius: 4px; overflow: hidden; position: relative; }
        .vol-fill { height: 100%; width: 50%; background: var(--vfd-glow); opacity: 0; transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .powered .vol-fill { opacity: 1; box-shadow: 0 0 15px var(--vfd-glow); }

    </style>
</head>
<body>

<div class="case-external">
    <div class="front-panel" id="radioUI">
        <div class="branding-title">MUZYCZNE RADIO</div>
        
        <div class="display-vfd">
            <div id="statusText" class="vfd-status">STANDBY</div>
            <div id="vfdClock" class="vfd-clock">00:00:00</div>
            <div class="vfd-status" style="font-size: 9px; opacity: 0.5;">HI-RESOLUTION AUDIO</div>
        </div>

        <div class="speaker-grill spk-left"></div>
        <div class="speaker-grill spk-right"></div>

        <div class="controls-hub">
            <div class="soft-buttons">
                <!-- POWER -->
                <button id="pwrBtn" class="btn-soft"><svg viewBox="0 0 24 24"><path d="M13,3h-2v10h2V3z M17.8,4.5l-1.4,1.4C18.3,7.4,19,9.6,19,12c0,3.9-3.1,7-7,7s-7-3.1-7-7c0-2.4,0.7-4.6,2.6-6.1L6.2,4.5 C3.6,6.4,2,9.5,2,13c0,5.5,4.5,10,10,10s10-4.5,10-10C22,9.5,20.4,6.4,17.8,4.5z"/></svg></button>
                <!-- PLAY -->
                <button id="playBtn" class="btn-soft"><svg viewBox="0 0 24 24"><path d="M8,5V19L19,12L8,5Z"/></svg></button>
                <!-- STOP -->
                <button id="stopBtn" class="btn-soft"><svg viewBox="0 0 24 24"><path d="M6,6H18V18H6V6Z"/></svg></button>
                <!-- MUTE -->
                <button id="muteBtn" class="btn-soft"><svg viewBox="0 0 24 24"><path id="muteIcon" d="M3,9v6h4l5,5V4L7,9H3zm13.5,3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73,2.5-2.25,2.5-4.02z"/></svg></button>
                
                <!-- VOLUME UNIT -->
                <div class="vol-container">
                    <div class="vol-label"><span>VOL</span><span id="volNum">50%</span></div>
                    <div class="vol-track"><div id="volFill" class="vol-fill"></div></div>
                    <div style="display:flex; gap:10px;">
                        <button id="volDown" class="btn-soft" style="width:100%; height:30px;"><svg viewBox="0 0 24 24"><path d="M19,13H5V11H19V13Z"/></svg></button>
                        <button id="volUp" class="btn-soft" style="width:100%; height:30px;"><svg viewBox="0 0 24 24"><path d="M19,13H13V19H11V13H5V11H11V5H13V11H19V13Z"/></svg></button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<audio id="audioEngine" crossorigin="anonymous" src="https://stream.rcs.revma.com/gzwc1xcq042vv"></audio>

<script>
    const audio = document.getElementById('audioEngine');
    const ui = document.getElementById('radioUI');
    const vfdClock = document.getElementById('vfdClock');
    const statusText = document.getElementById('statusText');
    const volFill = document.getElementById('volFill');
    const volNum = document.getElementById('volNum');
    const muteIcon = document.getElementById('muteIcon');

    const M_OFF = "M3,9v6h4l5,5V4L7,9H3zm13.5,3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73,2.5-2.25,2.5-4.02z";
    const M_ON = "M4.27,3L3,4.27,7.73,9H3v6h4l5,5v-6.73l4.25,4.25c-.67.52-1.42.93-2.25,1.18v2.06c1.38-.31,2.63-.95,3.69-1.81L19.73,21 21,19.73l-9-9L4.27,3z";

    let powered = false;

    // Clock Logic
    function tick() {
        const now = new Date();
        vfdClock.textContent = now.toLocaleTimeString('pl-PL', { hour12: false });
    }
    setInterval(tick, 1000); tick();

    // Volume UI Sync
    function syncVol() {
        volFill.style.width = (audio.volume * 100) + "%";
        volNum.textContent = Math.round(audio.volume * 100) + "%";
    }

    // POWER
    document.getElementById('pwrBtn').onclick = function() {
        powered = !powered;
        ui.classList.toggle('powered');
        this.classList.toggle('active', powered);
        statusText.textContent = powered ? "WELCOME" : "STANDBY";
        if(!powered) {
            audio.pause();
            document.getElementById('playBtn').classList.remove('active');
        }
    };

    // PLAY
    document.getElementById('playBtn').onclick = function() {
        if(!powered) return;
        audio.play();
        this.classList.add('active');
        statusText.textContent = "PLAYING...";
    };

    // STOP (Reset logic per audit)
    document.getElementById('stopBtn').onclick = function() {
        if(!powered) return;
        audio.pause();
        audio.currentTime = 0;
        audio.volume = 0.5;
        syncVol();
        document.getElementById('playBtn').classList.remove('active');
        statusText.textContent = "STOPPED";
    };

    // MUTE
    document.getElementById('muteBtn').onclick = function() {
        if(!powered) return;
        audio.muted = !audio.muted;
        this.classList.toggle('active', audio.muted);
        muteIcon.setAttribute('d', audio.muted ? M_ON : M_OFF);
        statusText.textContent = audio.muted ? "MUTED" : "PLAYING...";
    };

    // VOL UP/DOWN
    document.getElementById('volUp').onclick = function() {
        if(!powered) return;
        audio.volume = Math.min(1, audio.volume + 0.05);
        syncVol();
    };
    document.getElementById('volDown').onclick = function() {
        if(!powered) return;
        audio.volume = Math.max(0, audio.volume - 0.05);
        syncVol();
    };

    // Init
    audio.volume = 0.5;
    syncVol();
</script>
</body>
</html>
