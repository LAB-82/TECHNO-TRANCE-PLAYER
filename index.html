<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEHIRN TREIBER - INDUSTRIAL TERMINAL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        :root {
            --green: #00ff41;
            --dark-green: #003b00;
            --bg: #050505;
            --chip-body: #111;
            --trace-color: #004400;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: var(--bg);
            color: var(--green);
            font-family: 'Share+Tech+Mono', monospace;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            /* Efekt CRT Scanlines */
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
        }

        #pcb-canvas {
            position: fixed;
            top: 0; left: 0;
            z-index: 0;
            opacity: 0.6;
        }

        header {
            padding: 20px;
            border-bottom: 2px solid var(--green);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.8);
            z-index: 10;
            text-shadow: 0 0 10px var(--green);
        }

        .main-title { font-size: 32px; font-weight: bold; letter-spacing: 4px; }
        .system-status { font-size: 14px; text-align: right; }

        .app-container {
            display: flex;
            flex: 1;
            padding: 20px;
            gap: 20px;
            z-index: 5;
        }

        .grid {
            flex: 2;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 40px;
            padding: 20px;
        }

        /* UKŁAD SCALONY */
        .chip {
            background: var(--chip-body);
            border: 1px solid var(--dark-green);
            border-radius: 2px;
            position: relative;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: 0.2s;
            box-shadow: 0 5px 15px rgba(0,0,0,1);
        }

        /* NÓŻKI UKŁADU */
        .chip::before, .chip::after {
            content: '';
            position: absolute;
            width: 12px;
            height: 70%;
            background: repeating-linear-gradient(
                to bottom,
                #888, #888 3px,
                transparent 3px, transparent 10px
            );
        }
        .chip::before { left: -12px; }
        .chip::after { right: -12px; }

        .chip:hover {
            border-color: var(--green);
            box-shadow: 0 0 15px var(--green);
        }

        .chip.active {
            background: var(--dark-green);
            border-color: var(--green);
        }

        .chip-id { font-size: 10px; color: #555; position: absolute; top: 5px; left: 5px; }
        .chip-name { font-size: 14px; text-align: center; padding: 0 5px; text-transform: uppercase; }

        /* SIDEBAR / LOGO DISPLAY */
        .sidebar {
            flex: 1;
            border: 2px solid var(--green);
            background: rgba(0, 15, 0, 0.2);
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            box-shadow: inset 0 0 20px var(--dark-green);
        }

        .visualizer {
            width: 100%;
            height: 100px;
            border-bottom: 1px solid var(--green);
            display: flex;
            align-items: flex-end;
            gap: 2px;
        }

        .bar { flex: 1; background: var(--green); height: 10%; }

        .controls { text-align: center; width: 100%; }
        .btn {
            background: none; border: 1px solid var(--green);
            color: var(--green); padding: 10px 20px; cursor: pointer;
            font-family: inherit; margin: 10px; text-transform: uppercase;
        }
        .btn:hover { background: var(--green); color: black; }

        .vol-slider { width: 100%; margin: 20px 0; -webkit-appearance: none; background: var(--dark-green); height: 5px; }
        .vol-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 15px; height: 15px; background: var(--green); cursor: pointer; }

    </style>
</head>
<body>

<canvas id="pcb-canvas"></canvas>

<header>
    <div class="main-title">GEHIRN TREIBER</div>
    <div class="system-status">
        [ SYSTEM: ONLINE ]<br>
        [ FREQ: 144.00 MHz ]<br>
        <span id="clock">00:00:00</span>
    </div>
</header>

<div class="app-container">
    <div class="grid" id="chip-grid">
        <!-- Układy scalone generowane przez JS -->
    </div>

    <aside class="sidebar">
        <div style="text-align: center;">
            <p>CURRENT SOURCE:</p>
            <h2 id="now-playing" style="margin: 10px 0;">-- STANDBY --</h2>
        </div>

        <div class="visualizer" id="visualizer">
            <!-- Bary wizualizera -->
        </div>

        <div class="controls">
            <button class="btn" onclick="toggle()">PLAY / STOP</button>
            <input type="range" class="vol-slider" min="0" max="100" value="50" oninput="setVolume(this.value)">
            <p>VOLUME</p>
        </div>
    </aside>
</div>

<audio id="audio-engine"></audio>

<script>
    const STATIONS = [
        { n: 'TECH 88', u: 'https://stream.laut.fm/tech88' },
        { n: 'HR 3 CLUBNIGHT', u: 'https://stream.laut.fm/hr3_clubnight' },
        { n: '1000 TECHNO', u: 'https://stream.laut.fm/1000techno' },
        { n: 'BEST OF TECHNO', u: 'https://stream.laut.fm/best-of-techno' },
        { n: 'CHRIS BURN', u: 'https://stream.laut.fm/chris_burn' },
        { n: 'RETROELECTRONIC', u: 'https://stream.laut.fm/retroelectronicmusic' },
        { n: 'GEHIRN TREIBER', u: 'https://stream.laut.fm/gehirn-treiber-beat-radio' }
    ];

    const grid = document.getElementById('chip-grid');
    const audio = document.getElementById('audio-engine');
    const canvas = document.getElementById('pcb-canvas');
    const ctx = canvas.getContext('2d');
    let activeIndex = -1;

    // Inicjalizacja Gridu
    STATIONS.forEach((s, i) => {
        const chip = document.createElement('div');
        chip.className = 'chip';
        chip.innerHTML = `
            <div class="chip-id">GT-0${i+1}</div>
            <div class="chip-name">${s.n}</div>
        `;
        chip.onclick = () => playStation(i);
        grid.appendChild(chip);
    });

    function playStation(i) {
        activeIndex = i;
        document.querySelectorAll('.chip').forEach((c, idx) => c.classList.toggle('active', idx === i));
        document.getElementById('now-playing').textContent = STATIONS[i].n;
        audio.src = STATIONS[i].u;
        audio.play();
        animateVisualizer();
    }

    function toggle() {
        if(audio.paused) audio.play(); else audio.pause();
    }

    function setVolume(v) {
        audio.volume = v / 100;
    }

    // Zegar systemowy
    setInterval(() => {
        const d = new Date();
        document.getElementById('clock').textContent = d.toTimeString().split(' ')[0];
    }, 1000);

    // Rysowanie połączeń (PCB Traces)
    function drawPCB() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        ctx.strokeStyle = '#003300';
        ctx.lineWidth = 2;
        
        const chips = document.querySelectorAll('.chip');
        chips.forEach((chip, i) => {
            if (i < chips.length - 1) {
                const r1 = chip.getBoundingClientRect();
                const r2 = chips[i+1].getBoundingClientRect();
                ctx.beginPath();
                ctx.moveTo(r1.left + r1.width/2, r1.top + r1.height/2);
                ctx.lineTo(r1.left + r1.width/2, r2.top + r2.height/2);
                ctx.lineTo(r2.left + r2.width/2, r2.top + r2.height/2);
                ctx.stroke();
            }
        });
    }

    // Prosta animacja wizualizera
    const viz = document.getElementById('visualizer');
    for(let i=0; i<30; i++) {
        const bar = document.createElement('div');
        bar.className = 'bar';
        viz.appendChild(bar);
    }

    function animateVisualizer() {
        if(audio.paused) return;
        const bars = document.querySelectorAll('.bar');
        bars.forEach(b => {
            const h = Math.random() * 100;
            b.style.height = h + '%';
            b.style.opacity = h / 100;
        });
        requestAnimationFrame(animateVisualizer);
    }

    window.addEventListener('resize', drawPCB);
    setTimeout(drawPCB, 500);

</script>
</body>
</html>
