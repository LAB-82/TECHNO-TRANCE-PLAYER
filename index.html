<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>GEHIRN TREIBER - SYNTH HUD V4</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap');

        :root {
            --cyan: #00f2ff;
            --magenta: #ff00e5;
            --bg-black: #010408;
            --panel-border: #1a2a3a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-black);
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .synth-container {
            width: 98vw;
            height: 92vh;
            display: grid;
            grid-template-columns: 320px 1fr 380px;
            gap: 15px;
            padding: 15px;
        }

        /* LEWY PANEL - OSCILLATORS */
        .osc-sidebar {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .osc-module {
            border: 1px solid var(--panel-border);
            padding: 10px;
            background: rgba(255, 255, 255, 0.01);
            border-radius: 4px;
            cursor: pointer;
            transition: 0.2s;
        }

        .osc-module:hover, .osc-module.active {
            border-color: var(--cyan);
            background: rgba(0, 242, 255, 0.05);
        }

        .osc-module.active { border-color: var(--magenta); box-shadow: inset 0 0 10px rgba(255, 0, 229, 0.2); }

        .osc-header {
            font-size: 10px;
            color: var(--cyan);
            letter-spacing: 2px;
            margin-bottom: 5px;
            font-family: 'Orbitron';
        }

        .station-slot {
            background: #000;
            height: 50px;
            display: flex;
            align-items: center;
            padding-left: 15px;
            font-family: 'Orbitron';
            font-weight: 700;
            font-size: 14px;
            color: #fff;
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* ŚRODEK - MASTER VISUALIZER */
        .main-display {
            border: 1px solid var(--panel-border);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .display-header {
            text-align: center;
            font-size: 10px;
            padding: 10px;
            letter-spacing: 3px;
            color: var(--cyan);
            font-family: 'Orbitron';
        }

        .visualizer-core {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        #wave-canvas {
            width: 100%;
            height: 300px;
        }

        .station-label {
            position: absolute;
            bottom: 40px;
            font-family: 'Orbitron';
            font-size: 32px;
            letter-spacing: 10px;
            text-transform: uppercase;
            opacity: 0.6;
        }

        /* PRAWY PANEL - CONTROLS */
        .control-sidebar {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .module-box {
            border: 1px solid var(--panel-border);
            padding: 15px;
        }

        .envelope-view {
            height: 200px;
            width: 100%;
            background: rgba(0,0,0,0.4);
            margin-bottom: 15px;
        }

        .knob-row {
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
        }

        .knob {
            width: 50px; height: 50px;
            border-radius: 50%;
            border: 2px solid var(--panel-border);
            border-top-color: var(--cyan);
            position: relative;
        }

        .knob-label { font-size: 9px; text-align: center; margin-top: 5px; opacity: 0.7; }

        /* RAMKA STEROWANIA Z PRZYCISKAMI I VOLUME */
        .playback-frame {
            border: 1px solid var(--panel-border);
            padding: 15px;
            background: rgba(0,0,0,0.2);
        }

        .btn-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .synth-btn {
            background: transparent;
            border: 1px solid var(--cyan);
            color: var(--cyan);
            padding: 10px;
            font-family: 'Orbitron';
            font-size: 11px;
            cursor: pointer;
            transition: 0.2s;
        }

        .synth-btn:hover { background: var(--cyan); color: #000; box-shadow: 0 0 15px var(--cyan); }
        .btn-stop { border-color: var(--magenta); color: var(--magenta); }
        .btn-stop:hover { background: var(--magenta); box-shadow: 0 0 15px var(--magenta); }

        .volume-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .vol-slider {
            -webkit-appearance: none;
            width: 100%;
            height: 2px;
            background: var(--panel-border);
            outline: none;
        }

        .vol-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px; height: 16px;
            background: var(--cyan);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px var(--cyan);
        }

        .footer-info {
            margin-top: auto;
            font-size: 10px;
            opacity: 0.4;
            line-height: 1.5;
        }

    </style>
</head>
<body>

<div class="synth-container">
    <!-- LEWY PANEL -->
    <div class="osc-sidebar" id="osc-list"></div>

    <!-- ŚRODEK -->
    <main class="main-display">
        <div class="display-header">MASTER OUTPUT VISUALIZER</div>
        <div class="visualizer-core">
            <canvas id="wave-canvas"></canvas>
            <div class="station-label" id="current-name">VOID SIGNAL</div>
        </div>
    </main>

    <!-- PRAWY PANEL -->
    <aside class="control-sidebar">
        <div class="module-box">
            <div class="osc-header">ENVELOPE 1 [AMP]</div>
            <div class="envelope-view">
                <svg width="100%" height="100%" viewBox="0 0 100 100" preserveAspectRatio="none">
                    <path d="M0,100 L25,20 L50,45 L85,45 L100,100" fill="none" stroke="var(--cyan)" stroke-width="2" />
                </svg>
            </div>
            
            <div class="osc-header">MACRO CONTROLS</div>
            <div class="knob-row">
                <div><div class="knob"></div><div class="knob-label">DRIVE</div></div>
                <div><div class="knob" style="border-top-color: var(--magenta);"></div><div class="knob-label">FILTER</div></div>
                <div><div class="knob"></div><div class="knob-label">REVERB</div></div>
            </div>
        </div>

        <div class="playback-frame">
            <div class="osc-header" style="margin-bottom:10px">TRANSPORT</div>
            <div class="btn-grid">
                <button class="synth-btn" onclick="audio.play()">PLAY</button>
                <button class="synth-btn btn-stop" onclick="audio.pause()">STOP</button>
            </div>
            <div class="volume-section">
                <div style="display:flex; justify-content: space-between; font-size: 10px; opacity: 0.6;">
                    <span>VOLUME</span>
                    <span id="vol-val">70%</span>
                </div>
                <input type="range" class="vol-slider" min="0" max="100" value="70" oninput="updateVol(this.value)">
            </div>
        </div>

        <div class="footer-info">
            NODE_LINK: STABLE<br>
            BITRATE: 320kbps<br>
            CORE: GEHIRN_v4.2
        </div>
    </aside>
</div>

<audio id="main-audio"></audio>

<script>
    const STATIONS = [
        { id: '01', n: 'NEON WAVE', u: 'https://stream.laut.fm/tech88' },
        { id: '02', n: 'CYBER CORE', u: 'https://stream.laut.fm/hr3_clubnight' },
        { id: '03', n: 'DATA PULSE', u: 'https://stream.laut.fm/1000techno' },
        { id: '04', n: 'VOID SIGNAL', u: 'https://stream.laut.fm/best-of-techno' },
        { id: '05', n: 'SYNTH NODE', u: 'https://stream.laut.fm/chris_burn' },
        { id: '06', n: 'GEHIRN TRB', u: 'https://stream.laut.fm/gehirn-treiber-beat-radio' }
    ];

    const list = document.getElementById('osc-list');
    const audio = document.getElementById('main-audio');
    const nameDisplay = document.getElementById('current-name');
    const canvas = document.getElementById('wave-canvas');
    const ctx = canvas.getContext('2d');

    STATIONS.forEach((s) => {
        const mod = document.createElement('div');
        mod.className = 'osc-module';
        if(s.n === 'VOID SIGNAL') mod.classList.add('active');
        mod.innerHTML = `
            <div class="osc-header">OSC ${s.id} // ${s.n}</div>
            <div class="station-slot">${s.n}</div>
        `;
        mod.onclick = () => {
            document.querySelectorAll('.osc-module').forEach(m => m.classList.remove('active'));
            mod.classList.add('active');
            nameDisplay.textContent = s.n;
            audio.src = s.u;
            audio.play();
        };
        list.appendChild(mod);
    });

    // Generator fali (Oscyloskop)
    canvas.width = 800;
    canvas.height = 300;

    function drawWave() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.beginPath();
        ctx.lineWidth = 3;
        ctx.strokeStyle = '#00f2ff';
        ctx.shadowBlur = 15;
        ctx.shadowColor = '#00f2ff';

        const time = Date.now() * 0.005;
        const amplitude = audio.paused ? 5 : 40;

        for (let x = 0; x < canvas.width; x++) {
            const y = canvas.height / 2 + Math.sin(x * 0.02 + time) * amplitude 
                      + Math.sin(x * 0.01 + time * 0.5) * (amplitude/2);
            if (x === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        }
        ctx.stroke();
        requestAnimationFrame(drawWave);
    }
    drawWave();

    function updateVol(v) {
        audio.volume = v / 100;
        document.getElementById('vol-val').textContent = v + "%";
    }
</script>

</body>
</html>
