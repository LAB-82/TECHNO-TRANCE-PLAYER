<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RMF HALOGEN FM</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap');

        :root {
            --h-bg: #0d0d12;
            --h-panel: #14141c;
            --h-green: #00ffaa;
            --h-pink: #ff00ff;
            --h-blue: #00d4ff;
            --h-text: #808090;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            height: 100vh; width: 100vw; 
            background: var(--h-bg); color: #fff; 
            font-family: 'Outfit', sans-serif;
            display: flex; flex-direction: column;
            padding: 10px; overflow: hidden; 
        }

        /* GÓRNY PASEK - STYL DAW/VST */
        header { 
            height: 40px; background: #1a1a24; border-radius: 4px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; margin-bottom: 10px; border: 1px solid #2a2a35;
        }
        .preset-name { font-size: 11px; letter-spacing: 2px; color: #fff; font-weight: 500; text-transform: uppercase; }
        .top-icons { display: flex; gap: 15px; }
        .top-icons svg { width: 14px; height: 14px; fill: var(--h-text); cursor: pointer; }
        .top-icons svg:hover { fill: #fff; }

        .main-layout { display: flex; flex: 1; gap: 10px; position: relative; }

        /* SEKCJE OPERATORÓW (STACJE) */
        .operator-side { 
            flex: 1; display: flex; flex-direction: column; gap: 10px; 
            background: rgba(20, 20, 28, 0.5); padding: 15px; border-radius: 8px;
        }
        .op-title { font-size: 18px; font-weight: 700; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .op-1 { color: var(--h-green); }
        .op-2 { color: var(--h-pink); }

        /* SIATKA STACJI - ADAPTACJA DO 5x3 */
        .grid-half { 
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; flex: 1;
        }

        .tile {
            background: #1a1a24; border: 1px solid #2a2a35;
            border-radius: 4px; padding: 10px; cursor: pointer;
            transition: 0.2s; position: relative; overflow: hidden;
        }
        .tile:hover { background: #222230; border-color: #444; }
        
        .tile.active-g { border-color: var(--h-green); box-shadow: inset 0 0 10px rgba(0, 255, 170, 0.1); }
        .tile.active-p { border-color: var(--h-pink); box-shadow: inset 0 0 10px rgba(255, 0, 255, 0.1); }

        .tile .t-num { font-size: 8px; color: var(--h-text); }
        .tile .t-name { font-size: 11px; font-weight: 500; margin-top: 4px; }

        /* CENTRUM - WIZUALIZER OKRĄG */
        .center-core {
            width: 300px; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .visual-circle {
            width: 220px; height: 220px; border-radius: 50%;
            border: 2px solid var(--h-pink);
            box-shadow: 0 0 30px rgba(255, 0, 255, 0.2), inset 0 0 30px rgba(255, 0, 255, 0.1);
            display: flex; align-items: center; justify-content: center;
            position: relative; transition: 0.3s;
        }
        .visual-circle.playing { animation: pulse 1.5s infinite; }
        @keyframes pulse {
            0% { transform: scale(1); border-color: var(--h-pink); box-shadow: 0 0 30px rgba(255, 0, 255, 0.2); }
            50% { transform: scale(1.02); border-color: var(--h-green); box-shadow: 0 0 40px rgba(0, 255, 170, 0.3); }
            100% { transform: scale(1); border-color: var(--h-pink); box-shadow: 0 0 30px rgba(255, 0, 255, 0.2); }
        }
        .core-text { font-family: 'Outfit', sans-serif; font-size: 24px; font-weight: 300; letter-spacing: 4px; color: #fff; }

        /* DOLNY PANEL STEROWANIA */
        footer {
            height: 100px; background: #14141c; border-radius: 12px 12px 0 0;
            margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 40px;
            border: 1px solid #2a2a35; border-bottom: none;
        }

        .knob-group { text-align: center; }
        .knob-label { font-size: 9px; text-transform: uppercase; color: var(--h-text); margin-bottom: 8px; letter-spacing: 1px; }
        
        .knob {
            width: 45px; height: 45px; background: #0d0d12; border-radius: 50%;
            border: 2px solid #2a2a35; position: relative; cursor: ns-resize;
            display: flex; align-items: center; justify-content: center;
        }
        .knob-indicator {
            position: absolute; top: 5px; width: 2px; height: 8px;
            background: var(--h-blue); border-radius: 1px;
            transform-origin: center 17px;
        }
        .knob-val { font-size: 10px; color: #fff; font-weight: 700; margin-top: 5px; display: block; }

        @media (max-width: 900px) {
            .center-core { display: none; }
            .main-layout { flex-direction: column; }
            footer { gap: 15px; }
        }
    </style>
</head>
<body>

<header>
    <div class="top-icons">
        <svg viewBox="0 0 24 24"><path d="M3,6H21V8H3V6M3,11H21V13H3V11M3,16H21V18H3V16Z"/></svg>
        <span style="font-size: 10px; color: var(--h-text);">HALOGEN FM V2</span>
    </div>
    <div class="preset-name" id="current-station">DUB STATION RMF</div>
    <div class="top-icons">
        <svg onclick="toggle()" viewBox="0 0 24 24"><path d="M8,5.14V19.14L19,12.14L8,5.14Z"/></svg>
        <svg onclick="skip(1)" viewBox="0 0 24 24"><path d="M16,18H18V6H16M6,18L14.5,12L6,6V18Z"/></svg>
    </div>
</header>

<div class="main-layout">
    <!-- OPERATOR 1 (Zielony) -->
    <div class="operator-side">
        <div class="op-title op-1">OPR 1 <span style="font-size: 10px; font-weight: 400; opacity: 0.5;">RADIO BANK A</span></div>
        <div class="grid-half" id="grid-a"></div>
    </div>

    <!-- CENTRUM -->
    <div class="center-core">
        <div class="visual-circle" id="viz">
            <div class="core-text">RMF</div>
        </div>
        <div id="timer" style="margin-top: 20px; font-family: monospace; color: var(--h-blue);">00:00:00</div>
    </div>

    <!-- OPERATOR 2 (Różowy) -->
    <div class="operator-side">
        <div class="op-title op-2">OPR 2 <span style="font-size: 10px; font-weight: 400; opacity: 0.5;">RADIO BANK B</span></div>
        <div class="grid-half" id="grid-b"></div>
    </div>
</div>

<footer>
    <div class="knob-group">
        <div class="knob-label">Mix</div>
        <div class="knob" onmousedown="startRotate(event)" ontouchstart="startRotate(event)">
            <div class="knob-indicator" id="knob-pointer"></div>
        </div>
        <span class="knob-val" id="vol-txt">50%</span>
    </div>
    <div class="knob-group">
        <div class="knob-label">Timbre</div>
        <div class="knob"><div class="knob-indicator" style="transform: rotate(45deg)"></div></div>
        <span class="knob-val">Poly</span>
    </div>
    <div class="knob-group">
        <div class="knob-label">Mod</div>
        <div class="knob"><div class="knob-indicator" style="transform: rotate(-30deg)"></div></div>
        <span class="knob-val">Sync</span>
    </div>
    <div class="knob-group">
        <div class="knob-label">FX</div>
        <div class="knob"><div class="knob-indicator" style="transform: rotate(90deg)"></div></div>
        <span class="knob-val">Reverb</span>
    </div>
</footer>

<audio id="player"></audio>

<script>
    const STATIONS = [
        { n: 'RMF FM', s: 'RMF FM', u: 'rmf_fm' },
        { n: 'RMF MAXXX', s: 'Maxxx', u: 'RMFMAXXX48' },
        { n: 'RMF 80s', s: '80s', u: 'rmf_80s' },
        { n: 'RMF 90s', s: '90s', u: 'rmf_90s' },
        { n: 'RMF 2000', s: '2000', u: 'rmf_2000' },
        { n: 'RMF CHILLOUT', s: 'Chillout', u: 'rmf_chillout' },
        { n: 'RMF CLASSIC', s: 'Classic', u: 'rmf_classic' },
        { n: 'RMF DANCE', s: 'Dance', u: 'rmf_dance' },
        { n: 'RMF GOLD', s: 'Gold', u: 'rmf_gold' },
        { n: 'RMF LATINO', s: 'Latino', u: 'rmf_latino' },
        { n: 'RMF LOVE', s: 'Love', u: 'rmf_love' },
        { n: 'RMF PARTY', s: 'Party', u: 'rmf_party' },
        { n: 'RMF POLSKI ROCK', s: 'P-Rock', u: 'rmf_polski_rock' },
        { n: 'RMF ROCK', s: 'Rock', u: 'rmf_rock' },
        { n: 'RMF SMOOTH JAZZ', s: 'Smooth', u: 'rmf_smooth_jazz' }
    ];

    const player = document.getElementById('player'), gridA = document.getElementById('grid-a'), gridB = document.getElementById('grid-b'), viz = document.getElementById('viz');
    let current = -1;
    let volume = 50;

    STATIONS.forEach((s, i) => {
        const t = document.createElement('div');
        t.className = 'tile';
        t.innerHTML = `<div class="t-num">STATION ${i+1}</div><div class="t-name">${s.s}</div>`;
        t.onclick = () => play(i);
        if(i < 8) gridA.appendChild(t); else gridB.appendChild(t);
    });

    function play(i) {
        current = i;
        document.querySelectorAll('.tile').forEach((t, idx) => {
            t.classList.remove('active-g', 'active-p');
            if(idx === i) t.classList.add(i < 8 ? 'active-g' : 'active-p');
        });
        document.getElementById('current-station').textContent = STATIONS[i].n;
        const streamBase = "https://rs201-krk.rmfstream.pl/";
        player.src = (STATIONS[i].n === 'RMF MAXXX') ? 'https://rs7-krk2-cyfronet.rmfstream.pl/RMFMAXXX48' : streamBase + STATIONS[i].u;
        player.play();
        viz.classList.add('playing');
    }

    function toggle() {
        if(player.paused) { player.play(); viz.classList.add('playing'); }
        else { player.pause(); viz.classList.remove('playing'); }
    }

    function skip(d) { let n = current + d; if(n >= 0 && n < STATIONS.length) play(n); }

    function clock() {
        const d = new Date();
        document.getElementById('timer').textContent = d.getHours().toString().padStart(2,'0') + ":" + d.getMinutes().toString().padStart(2,'0') + ":" + d.getSeconds().toString().padStart(2,'0');
    }
    setInterval(clock, 1000); clock();

    // VOLUME KNOB
    let isDragging = false, startY = 0;
    function startRotate(e) {
        isDragging = true; startY = e.clientY || e.touches[0].clientY;
        document.addEventListener('mousemove', onRotate); document.addEventListener('mouseup', stopRotate);
        document.addEventListener('touchmove', onRotate); document.addEventListener('touchend', stopRotate);
    }
    function onRotate(e) {
        if (!isDragging) return;
        const currentY = e.clientY || e.touches[0].clientY;
        const diff = startY - currentY;
        volume = Math.min(Math.max(volume + diff * 0.5, 0), 100);
        startY = currentY;
        const rot = (volume * 2.4) - 120;
        document.getElementById('knob-pointer').style.transform = `rotate(${rot}deg)`;
        document.getElementById('vol-txt').textContent = Math.round(volume) + "%";
        player.volume = volume / 100;
    }
    function stopRotate() { isDragging = false; }
</script>
</body>
</html>
