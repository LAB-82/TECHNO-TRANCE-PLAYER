<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RMF TERMINAL - ULTIMATE REALISM</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Share+Tech+Mono&family=Montserrat:wght@800&display=swap');

        :root {
            --panel-gradient: linear-gradient(180deg, #d8d8d8 0%, #b0b0b0 48%, #8a8a8a 52%, #b5b5b5 100%);
            --btn-plastic: linear-gradient(145deg, #f0f0f0, #bebebe);
            --led-on: #ff1a1a;
            --led-glow: 0 0 12px 2px rgba(255, 26, 26, 0.7);
            --industrial-border: #222;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            height: 100vh; width: 100vw; 
            background: #080808; 
            display: flex; justify-content: center; align-items: center;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
        }

        /* GŁÓWNA OBUDOWA VST */
        .vst-container {
            width: 98vw; height: 96vh;
            background: var(--panel-gradient);
            border: 6px solid #1a1a1a;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 50px 100px -20px rgba(0,0,0,0.9), inset 0 2px 2px rgba(255,255,255,0.6);
            display: flex; flex-direction: column;
            background-image: url('https://www.transparenttextures.com/patterns/brushed-alum.png');
        }

        header { 
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 30px; border-bottom: 3px solid rgba(0,0,0,0.2); padding-bottom: 15px;
        }
        .logo-section h2 { font-family: 'Orbitron'; font-size: 38px; color: #1a1a1a; letter-spacing: -2px; }
        .logo-section span { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 5px; color: #444; }

        .app-body { display: flex; flex: 1; gap: 30px; min-height: 0; }

        /* GRID - TWOJA STRUKTURA */
        .grid { 
            flex: 1.6; display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            grid-template-rows: repeat(3, 1fr); 
            gap: 20px; 
            background: rgba(0,0,0,0.08); padding: 25px; border-radius: 6px;
            box-shadow: inset 5px 5px 15px rgba(0,0,0,0.2);
            border: 2px solid rgba(0,0,0,0.1);
        }

        /* PRZYCISK FIZYCZNY */
        .tile {
            background: var(--btn-plastic);
            border: 1px solid #999;
            border-radius: 4px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; position: relative;
            box-shadow: 
                0 6px 0 #777, 
                0 8px 15px rgba(0,0,0,0.4),
                inset 0 1px 1px rgba(255,255,255,0.8);
            transition: all 0.05s ease;
        }

        /* DIODA LED */
        .tile::after {
            content: ""; position: absolute; top: 8px; width: 8px; height: 8px;
            background: #300; border-radius: 50%; border: 1px solid #000;
        }

        .tile:active { 
            transform: translateY(4px); 
            box-shadow: 0 2px 0 #555, 0 4px 8px rgba(0,0,0,0.3);
        }

        .tile.active { background: #fff; border-color: #222; }
        .tile.active::after { background: var(--led-on); box-shadow: var(--led-glow); }

        .tile .t-top { font-weight: 900; font-size: 20px; margin-top: 10px; color: #222; }
        .tile .t-bottom { font-size: 11px; font-weight: 700; color: #555; text-transform: uppercase; }

        /* SIDEBAR - INDUSTRIALNY PANEL */
        .sidebar { 
            flex: 0.5; display: flex; flex-direction: column; 
            background: #151518; border-radius: 8px; padding: 25px;
            border: 2px solid #282828; box-shadow: 10px 10px 20px rgba(0,0,0,0.5);
        }

        .lcd-display {
            background: #050805; flex: 0.8; border-radius: 4px; border: 4px solid #222;
            padding: 15px; font-family: 'Share Tech Mono', monospace; color: #00ff41;
            text-shadow: 0 0 5px rgba(0,255,65,0.5);
            box-shadow: inset 0 0 20px #000;
            display: flex; flex-direction: column; justify-content: space-around;
        }

        .knob-row { display: flex; justify-content: space-around; margin: 25px 0; }
        .knob-outer {
            width: 65px; height: 65px; background: #000; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.8);
        }
        .knob-inner {
            width: 50px; height: 50px; border-radius: 50%;
            background: conic-gradient(from 0deg, #444, #eee, #444, #eee, #444);
            border: 2px solid #222; position: relative;
        }
        .knob-inner::before {
            content: ""; position: absolute; top: 4px; left: 50%; width: 4px; height: 12px;
            background: #ff0000; transform: translateX(-50%); border-radius: 2px;
        }

        .master-vol { width: 100%; margin-top: auto; }
        .master-vol label { font-size: 10px; color: #888; display: block; text-align: center; margin-bottom: 10px; font-family: 'Orbitron'; }

        input[type="range"] { -webkit-appearance: none; background: #000; height: 10px; border-radius: 5px; border: 1px solid #333; }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 30px; height: 40px; 
            background: linear-gradient(180deg, #ccc, #888); 
            border: 1px solid #222; border-radius: 3px; cursor: pointer;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

    </style>
</head>
<body>

<div class="vst-container">
    <header>
        <div class="logo-section">
            <h2>RMF<span>SYSTEM-303</span></h2>
        </div>
        <div id="timer" style="font-family: 'Share Tech Mono'; font-size: 32px; color: #222;">00:00</div>
    </header>

    <div class="app-body">
        <div class="grid" id="station-grid"></div>

        <aside class="sidebar">
            <div class="lcd-display">
                <div style="font-size: 12px; color: #00661a;">STATUS: OPERATIONAL</div>
                <div id="playing-now" style="font-size: 22px; color: #fff;">READY...</div>
                <div style="height: 2px; background: #00330d; width: 100%;"></div>
                <div style="font-size: 14px;">SIGNAL: 100% DIGITAL</div>
            </div>

            <div class="knob-row">
                <div class="knob-outer"><div class="knob-inner" onclick="adj(-5)" style="transform: rotate(-45deg)"></div></div>
                <div class="knob-outer"><div class="knob-inner" onclick="adj(5)" style="transform: rotate(45deg)"></div></div>
            </div>

            <div class="master-vol">
                <label>MASTER OUTPUT</label>
                <input type="range" id="v-range" min="0" max="100" value="50" oninput="setV(this.value)">
            </div>

            <button onclick="toggle()" style="margin-top: 25px; height: 50px; background: #333; color: #fff; border: 1px solid #000; border-radius: 4px; font-weight: 800; cursor: pointer; box-shadow: 0 4px 0 #000;">START / STOP</button>
        </aside>
    </div>
</div>

<audio id="player"></audio>

<script>
    const STATIONS = [
        { n: 'RMF FM', s: '01', u: 'rmf_fm' },
        { n: 'RMF MAXXX', s: '02', u: 'RMFMAXXX48' },
        { n: 'RMF 80s', s: '03', u: 'rmf_80s' },
        { n: 'RMF 90s', s: '04', u: 'rmf_90s' },
        { n: 'RMF 2000', s: '05', u: 'rmf_2000' },
        { n: 'RMF CHILLOUT', s: '06', u: 'rmf_chillout' },
        { n: 'RMF CLASSIC', s: '07', u: 'rmf_classic' },
        { n: 'RMF DANCE', s: '08', u: 'rmf_dance' },
        { n: 'RMF GOLD', s: '09', u: 'rmf_gold' },
        { n: 'RMF LATINO', s: '10', u: 'rmf_latino' },
        { n: 'RMF LOVE', s: '11', u: 'rmf_love' },
        { n: 'RMF PARTY', s: '12', u: 'rmf_party' },
        { n: 'RMF POLSKI ROCK', s: '13', u: 'rmf_polski_rock' },
        { n: 'RMF ROCK', s: '14', u: 'rmf_rock' },
        { n: 'RMF SMOOTH JAZZ', s: '15', u: 'rmf_smooth_jazz' }
    ];

    const player = document.getElementById('player'), grid = document.getElementById('station-grid'), vRange = document.getElementById('v-range');
    let current = -1;

    function clock() {
        const d = new Date();
        document.getElementById('timer').textContent = d.getHours().toString().padStart(2,'0') + ":" + d.getMinutes().toString().padStart(2,'0');
    }
    setInterval(clock, 1000); clock();

    STATIONS.forEach((s, i) => {
        const t = document.createElement('div');
        t.className = 'tile';
        t.innerHTML = `<div class="t-top">${s.s}</div><div class="t-bottom">${s.n.split(' ')[1] || 'FM'}</div>`;
        t.onclick = () => play(i);
        grid.appendChild(t);
    });

    function play(i) {
        current = i;
        document.querySelectorAll('.tile').forEach((t, idx) => t.classList.toggle('active', idx === i));
        document.getElementById('playing-now').textContent = STATIONS[i].n;
        const streamBase = "https://rs201-krk.rmfstream.pl/";
        player.src = (STATIONS[i].n === 'RMF MAXXX') ? 'https://rs7-krk2-cyfronet.rmfstream.pl/RMFMAXXX48' : streamBase + STATIONS[i].u;
        player.play();
    }

    function toggle() {
        if(player.paused) player.play();
        else player.pause();
    }

    function setV(v) { player.volume = v / 100; }
    function adj(d) { vRange.value = parseInt(vRange.value) + d; setV(vRange.value); }
</script>
</body>
</html>
