<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEHIRN TREIBER - HUD CONTROL CENTER</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap');

        :root {
            --cyan: #00f2ff;
            --cyan-glow: rgba(0, 242, 255, 0.5);
            --red: #ff003c;
            --bg-dark: #02080a;
            --module-bg: rgba(0, 20, 30, 0.8);
            --trace: rgba(0, 242, 255, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }

        body {
            background-color: var(--bg-dark);
            color: var(--cyan);
            font-family: 'Rajdhani', sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            /* Efekt siatki HUD */
            background-image: 
                linear-gradient(var(--trace) 1px, transparent 1px),
                linear-gradient(90deg, var(--trace) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        /* Nakładka CRT/Vignette */
        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 20%, black 150%);
            pointer-events: none;
            z-index: 10;
        }

        #pcb-canvas {
            position: fixed;
            top: 0; left: 0;
            z-index: 0;
        }

        /* Nagłówek HUD */
        header {
            height: 60px;
            border-bottom: 2px solid var(--cyan);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            background: rgba(0, 0, 0, 0.9);
            position: relative;
            z-index: 5;
            box-shadow: 0 0 20px var(--cyan-glow);
        }

        .system-id { font-family: 'Orbitron', sans-serif; font-size: 20px; letter-spacing: 5px; }
        .telemetry { font-size: 12px; text-transform: uppercase; text-align: right; line-height: 1.2; }

        .main-layout {
            display: grid;
            grid-template-columns: 350px 1fr 350px;
            height: calc(100vh - 60px);
            padding: 20px;
            gap: 20px;
            position: relative;
            z-index: 2;
        }

        /* MODUŁY / CHIPY */
        .module-grid {
            display: grid;
            grid-template-rows: repeat(7, 1fr);
            gap: 15px;
        }

        .chip {
            background: var(--module-bg);
            border-left: 4px solid var(--cyan);
            padding: 10px 20px;
            position: relative;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        /* METALOWE NÓŻKI */
        .chip::before {
            content: '';
            position: absolute;
            left: -12px; height: 60%; width: 8px;
            background: repeating-linear-gradient(to bottom, #444, #444 2px, transparent 2px, transparent 6px);
        }

        .chip:hover, .chip.active {
            background: rgba(0, 242, 255, 0.1);
            box-shadow: -10px 0 20px var(--cyan-glow);
            transform: translateX(10px);
        }

        .chip.active { border-left: 4px solid var(--red); color: var(--red); }

        .chip-info h3 { font-size: 16px; letter-spacing: 1px; }
        .chip-info p { font-size: 10px; opacity: 0.7; }

        /* CENTRUM - MAPA / TRACKER */
        .center-display {
            border: 1px solid var(--trace);
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .map-circle {
            width: 400px; height: 400px;
            border: 2px solid var(--cyan);
            border-radius: 50%;
            position: relative;
            animation: rotate 20s linear infinite;
        }

        .map-circle::after {
            content: ''; position: absolute; top: 0; left: 50%; width: 2px; height: 50%;
            background: var(--cyan); transform-origin: bottom;
        }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* PRAWA STRONA - DANE */
        .data-panel {
            display: flex; flex-direction: column; gap: 20px;
        }

        .visualizer-box {
            height: 150px; border: 1px solid var(--cyan);
            padding: 10px; display: flex; align-items: flex-end; gap: 2px;
        }

        .v-bar { flex: 1; background: var(--cyan); height: 10%; transition: 0.1s; }

        .scanline {
            width: 100%; height: 2px; background: rgba(0, 242, 255, 0.3);
            position: absolute; top: 0; left: 0;
            animation: scan 4s linear infinite;
        }

        @keyframes scan { from { top: 0; } to { top: 100%; } }

    </style>
</head>
<body>

<canvas id="pcb-canvas"></canvas>
<div class="scanline"></div>

<header>
    <div class="system-id">G.T.R COMMAND CENTER v4.0</div>
    <div class="telemetry">
        STATUS: <span id="sys-status" style="color:var(--red)">SCANNING...</span><br>
        COORD: 52.2297° N, 21.0122° E<br>
        TIME: <span id="clock">00:00:00</span>
    </div>
</header>

<div class="main-layout">
    <!-- Lewy panel: Wybór stacji (Chipy) -->
    <div class="module-grid" id="station-list"></div>

    <!-- Centrum: HUD/Tracker -->
    <div class="center-display">
        <div class="map-circle"></div>
        <div style="position:absolute; text-align:center;">
            <h1 id="active-title" style="font-size:40px; text-shadow: 0 0 20px var(--cyan);">AWAITING LINK</h1>
            <p id="signal-strength">SIGNAL: 0.00%</p>
        </div>
    </div>

    <!-- Prawy panel: Wizualizacja i Sterowanie -->
    <div class="data-panel">
        <div class="visualizer-box" id="viz"></div>
        
        <div style="border:1px solid var(--red); padding:15px;">
            <p style="color:var(--red)">[ WARNING: HIGH FREQUENCY ]</p>
            <input type="range" style="width:100%; margin-top:10px;" oninput="setVol(this.value)">
            <p style="font-size:10px; margin-top:5px;">GAIN CONTROL / MASTER VOL</p>
        </div>

        <div style="font-size:11px; color:var(--trace); overflow:hidden; height:150px;" id="logs">
            > INITIALIZING...<br>
            > LINKING NEURAL INTERFACE...<br>
        </div>
    </div>
</div>

<audio id="audio"></audio>

<script>
    const STATIONS = [
        { n: 'TECH 88', u: 'https://stream.laut.fm/tech88', id: 'GT-X1' },
        { n: 'HR3 CLUBNIGHT', u: 'https://stream.laut.fm/hr3_clubnight', id: 'GT-X2' },
        { n: '1000 TECHNO', u: 'https://stream.laut.fm/1000techno', id: 'GT-X3' },
        { n: 'BEST OF TECHNO', u: 'https://stream.laut.fm/best-of-techno', id: 'GT-X4' },
        { n: 'CHRIS BURN', u: 'https://stream.laut.fm/chris_burn', id: 'GT-X5' },
        { n: 'RETRO ELEC', u: 'https://stream.laut.fm/retroelectronicmusic', id: 'GT-X6' },
        { n: 'GEHIRN TREIBER', u: 'https://stream.laut.fm/gehirn-treiber-beat-radio', id: 'GT-MASTER' }
    ];

    const list = document.getElementById('station-list');
    const audio = document.getElementById('audio');
    const logs = document.getElementById('logs');

    // Generowanie modułów (Chipów)
    STATIONS.forEach((s, i) => {
        const div = document.createElement('div');
        div.className = 'chip';
        div.innerHTML = `
            <div class="chip-info">
                <h3>${s.n}</h3>
                <p>SECTOR: ${s.id}</p>
            </div>
            <div style="font-size:10px; border:1px solid var(--cyan); padding:2px;">LINK</div>
        `;
        div.onclick = () => connect(i);
        list.appendChild(div);
    });

    function connect(i) {
        document.querySelectorAll('.chip').forEach((c, idx) => c.classList.toggle('active', idx === i));
        document.getElementById('active-title').textContent = STATIONS[i].n;
        document.getElementById('sys-status').textContent = "CONNECTED";
        document.getElementById('sys-status').style.color = "var(--cyan)";
        
        audio.src = STATIONS[i].u;
        audio.play();
        
        addLog(`ESTABLISHING LINK WITH ${STATIONS[i].id}...`);
        addLog(`SIGNAL STRENGTH: ${(Math.random() * 20 + 80).toFixed(2)}%`);
    }

    function addLog(msg) {
        logs.innerHTML = `> ${msg}<br>${logs.innerHTML}`;
    }

    function setVol(v) { audio.volume = v / 100; }

    // Zegar i telemetryka
    setInterval(() => {
        document.getElementById('clock').textContent = new Date().toTimeString().split(' ')[0];
        document.getElementById('signal-strength').textContent = `SIGNAL: ${(Math.random() * 100).toFixed(2)}%`;
    }, 1000);

    // Wizualizacja
    const viz = document.getElementById('viz');
    for(let i=0; i<20; i++) {
        const b = document.createElement('div');
        b.className = 'v-bar';
        viz.appendChild(b);
    }

    function animate() {
        document.querySelectorAll('.v-bar').forEach(b => {
            const h = audio.paused ? 5 : Math.random() * 100;
            b.style.height = h + '%';
        });
        requestAnimationFrame(animate);
    }
    animate();

    // Rysowanie połączeń PCB
    const canvas = document.getElementById('pcb-canvas');
    const ctx = canvas.getContext('2d');
    function drawPCB() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        ctx.strokeStyle = "rgba(0, 242, 255, 0.1)";
        ctx.lineWidth = 1;
        // Rysowanie kilku losowych ścieżek "technicznych"
        for(let i=0; i<15; i++) {
            ctx.beginPath();
            ctx.moveTo(Math.random()*canvas.width, 0);
            ctx.lineTo(Math.random()*canvas.width, canvas.height);
            ctx.stroke();
        }
    }
    window.onresize = drawPCB;
    drawPCB();

</script>
</body>
</html>
