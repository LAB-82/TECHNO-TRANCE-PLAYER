<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Techno Trance Player - Original Style</title>
    <link href="https://fonts.cdnfonts.com/css/ds-digital" rel="stylesheet">
    <style>
        body {
            margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center;
            background: #0a0a0a; font-family: Arial, sans-serif; overflow: hidden;
            -webkit-user-select: none; user-select: none;
        }

        /* OBUDOWA - CZARNA, ZAOKRĄGLONA */
        .frame {
            width: 100%; max-width: 900px; border-radius: 60px; padding: 20px;
            background: #111; /* Oryginalna czerń */
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), inset 0 2px 10px rgba(255,255,255,0.05);
            border: 1px solid #222; box-sizing: border-box; position: relative;
        }

        .title {
            text-align: center; font-size: 48px; font-weight: bold; letter-spacing: 10px;
            color: #1a1a1a; font-family: 'DS-Digital', monospace; margin-bottom: 16px;
            transition: 0.3s;
        }
        .frame.powered .title { color: #00FF00; text-shadow: 0 0 15px rgba(0, 255, 0, 0.6); }

        .display-frame {
            background: #000; border: 4px solid #1a1a1a; border-radius: 10px;
            margin: 0 auto; overflow: hidden; width: 600px;
            box-shadow: inset 0 0 20px #000;
        }
        canvas { width: 100%; height: 120px; display: block; }

        .main-content {
            position: relative; width: 100%; min-height: 300px;
            display: flex; flex-direction: column; align-items: center; padding-top: 20px;
        }

        /* PRZYCISKI - STYL Z TWOJEGO SCREENA */
        .controls-main {
            display: flex; gap: 8px; padding: 15px; border-radius: 8px;
            background: #080808; border: 1px solid #1a1a1a;
            box-shadow: inset 0 0 10px #000; z-index: 10;
        }

        .btn-rect {
            width: 70px; height: 45px; border-radius: 4px;
            background: #111; border: 1px solid #222; color: #444;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
        .btn-rect svg { width: 22px; height: 22px; fill: currentColor; }

        /* PODŚWIETLENIA */
        .frame.powered .btn-rect { color: #666; border-color: #333; }
        .frame.powered .btn-rect.active { 
            color: #00FF00 !important; border-color: #00FF00;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.3), inset 0 0 5px rgba(0, 255, 0, 0.2);
        }

        /* VOLUME SECTION */
        .vol-wrapper { display: flex; flex-direction: column; width: 140px; justify-content: center; padding-left: 10px; }
        .vol-btns { display: flex; gap: 5px; margin-bottom: 8px; }
        .btn-v { 
            flex: 1; height: 35px; background: #111; border: 1px solid #222; 
            color: #444; border-radius: 4px; cursor: pointer;
        }
        .vol-bar { width: 100%; height: 4px; background: #1a1a1a; border-radius: 2px; overflow: hidden; }
        .vol-fill { height: 100%; width: 50%; background: #00FF00; opacity: 0; box-shadow: 0 0 10px #00FF00; }
        .frame.powered .vol-fill { opacity: 1; }
        .frame.powered .btn-v { color: #666; }

        /* LOGO I LINK */
        .lab-logo { margin-top: 40px; color: #222; font-weight: bold; font-size: 14px; letter-spacing: 2px; }
        .frame.powered .lab-logo { color: #00FF00; opacity: 0.7; }
        .link-container { margin-top: 20px; }
        .link-container a { color: #222; text-decoration: none; font-family: 'DS-Digital'; font-size: 16px; }
        .frame.powered .link-container a { color: #00FF00; opacity: 0.5; }

        /* GŁOŚNIKI */
        .speaker {
            width: 160px; height: 160px; border-radius: 50%; position: absolute; bottom: 60px;
            background: radial-gradient(circle, #1a1a1a 1px, transparent 1px) 0 0 / 4px 4px, #0d0d0d;
            border: 2px solid #1a1a1a; box-shadow: inset 0 0 20px #000;
        }
        .speaker.left { left: 40px; } .speaker.right { right: 40px; }

        @media(max-width:700px) {
            .speaker { display: none; }
            .display-frame { width: 90%; }
            .controls-main { scale: 0.9; }
        }
    </style>
</head>
<body>

<div class="frame" id="mainFrame">
    <div class="title">TECHNO PLAYER</div>
    <div class="display-frame"><canvas id="eq"></canvas></div>
    <div class="main-content">
        <div class="speaker left"></div>
        <div class="speaker right"></div>

        <div class="controls-main">
            <button id="pwr" class="btn-rect"><svg viewBox="0 0 24 24"><path d="M13,3h-2v10h2V3z M17.8,4.5l-1.4,1.4C18.3,7.4,19,9.6,19,12c0,3.9-3.1,7-7,7s-7-3.1-7-7c0-2.4,0.7-4.6,2.6-6.1L6.2,4.5 C3.6,6.4,2,9.5,2,13c0,5.5,4.5,10,10,10s10-4.5,10-10C22,9.5,20.4,6.4,17.8,4.5z"/></svg></button>
            <button id="play" class="btn-rect"><svg viewBox="0 0 24 24"><path d="M8,5.14V19.14L19,12.14L8,5.14Z"/></svg></button>
            <button id="stop" class="btn-rect"><svg viewBox="0 0 24 24"><path d="M6,6H18V18H6V6Z"/></svg></button>
            <button id="mute" class="btn-rect"><svg viewBox="0 0 24 24"><path id="mute-path" d="M3,9V15H7L12,20V4L7,9H3M16.5,12C16.5,10.23 15.48,8.71 14,8V16C15.48,15.29 16.5,13.77 16.5,12M14,3.23V5.29C16.89,6.15 19,8.83 19,12C19,15.17 16.89,17.85 14,18.71V20.77C18.01,19.86 21,16.28 21,12C21,7.72 18.01,4.14 14,3.23Z"/></svg></button>
            
            <div class="vol-wrapper">
                <div class="vol-btns">
                    <button id="vDown" class="btn-v">-</button>
                    <button id="vUp" class="btn-v">+</button>
                </div>
                <div class="vol-bar"><div id="vFill" class="vol-fill"></div></div>
            </div>
        </div>

        <div class="lab-logo">L.A.B. SYSTEM</div>
        <div class="link-container"><a href="#">WWW.TECHNO-TRANCE.PL</a></div>
    </div>
</div>

<audio id="stream" crossorigin="anonymous" src="https://stream.rcs.revma.com/gzwc1xcq042vv"></audio>

<script>
    const audio = document.getElementById('stream');
    const canvas = document.getElementById('eq');
    const ctx = canvas.getContext('2d');
    const pwrBtn = document.getElementById('pwr');
    const playBtn = document.getElementById('play');
    const stopBtn = document.getElementById('stop');
    const muteBtn = document.getElementById('mute');
    const vFill = document.getElementById('vFill');
    const frame = document.getElementById('mainFrame');

    let audioCtx, analyser, source, dataArray, isPwr = false;

    function drawBars(data) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const bars = 32;
        const barW = canvas.width / bars;
        for (let i = 0; i < bars; i++) {
            let h = data ? (data[i] / 255) * canvas.height : 2;
            ctx.fillStyle = isPwr ? "#00FF00" : "#111";
            ctx.fillRect(i * barW, canvas.height - h, barW - 2, h);
        }
    }

    pwrBtn.onclick = function() {
        isPwr = !isPwr;
        frame.classList.toggle('powered');
        this.classList.toggle('active');
        if (!isPwr) { audio.pause(); playBtn.classList.remove('active'); drawBars(null); }
    };

    playBtn.onclick = function() {
        if (!isPwr) return;
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            source = audioCtx.createMediaElementSource(audio);
            source.connect(analyser);
            source.connect(audioCtx.destination);
            analyser.fftSize = 64;
            dataArray = new Uint8Array(analyser.frequencyBinCount);
        }
        audio.play();
        this.classList.add('active');
        render();
    };

    stopBtn.onclick = function() {
        audio.pause(); audio.currentTime = 0;
        playBtn.classList.remove('active');
        drawBars(null);
    };

    function render() {
        if (!isPwr || audio.paused) return;
        requestAnimationFrame(render);
        analyser.getByteFrequencyData(dataArray);
        drawBars(dataArray);
    }

    function updateVol() { vFill.style.width = (audio.volume * 100) + '%'; }
    document.getElementById('vUp').onclick = () => { audio.volume = Math.min(1, audio.volume + 0.1); updateVol(); };
    document.getElementById('vDown').onclick = () => { audio.volume = Math.max(0, audio.volume - 0.1); updateVol(); };

    window.onload = () => {
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
        drawBars(null);
        updateVol();
    };
</script>
</body>
</html>
