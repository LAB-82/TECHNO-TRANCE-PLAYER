<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RMF TB-303 PRO TERMINAL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&family=Roboto+Condensed:wght@700&display=swap');

        :root {
            --metal-base: #c0c0c0;
            --metal-shine: linear-gradient(180deg, #e8e8e8 0%, #b0b0b0 45%, #7a7a7a 50%, #a0a0a0 55%, #dcdcdc 100%);
            --led-red: #ff3333;
            --led-bg: #400000;
            --lcd-green: #a4f000; /* Acid Green glow */
            --acid-bg: #1a1a1c;
            --btn-metal: linear-gradient(145deg, #d1d1d1, #a1a1a1);
            --main-brand-color: #1a1a1a;
        }

        /* Twarde ustawienie kursora domyślnego dla wszystkiego */
        * { 
            margin: 0; padding: 0; box-sizing: border-box; outline: none; 
            cursor: default !important; 
        }
        
        body { 
            height: 100vh; width: 100vw; 
            background: #0a0a0a; 
            display: flex; justify-content: center; align-items: center;
            font-family: 'Roboto Condensed', sans-serif;
            overflow: hidden;
        }

        .vst-chassis {
            width: 98vw; height: 96vh;
            background: var(--metal-shine);
            background-image: url('https://www.transparenttextures.com/patterns/brushed-alum.png');
            border: 5px solid #222;
            border-radius: 8px;
            box-shadow: 0 40px 100px rgba(0,0,0,1), inset 0 2px 4px rgba(255,255,255,0.7);
            padding: 25px;
            display: flex; flex-direction: column;
            position: relative;
        }

        header { 
            display: flex; justify-content: space-between; align-items: baseline;
            margin-bottom: 20px; border-bottom: 2px solid rgba(0,0,0,0.3); padding-bottom: 15px;
        }
        .logo h1 { font-family: 'Orbitron'; font-size: 36px; color: var(--main-brand-color); letter-spacing: -2px; margin: 0; }
        
        /* ZADANIE: Kolor COMPUTER CONTROLLED taki sam jak RMF TB-303 */
        .logo span { font-size: 11px; letter-spacing: 4px; color: var(--main-brand-color); font-weight: bold; }

        /* ZEGAR - BIAŁY RDZEŃ + ZIELONA POŚWIATA */
        #clock {
            font-family: 'Share Tech Mono';
            font-size: 32px;
            color: #ffffff;
            text-shadow: 0 0 15px var(--lcd-green);
        }

        .main-workspace { display: flex; flex: 1; gap: 20px; min-height: 0; }

        .grid-stations { 
            flex: 1.4; display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            grid-template-rows: repeat(3, 1fr); 
            gap: 15px; 
            background: rgba(0,0,0,0.15); padding: 20px; border-radius: 10px;
            box-shadow: inset 2px 2px 10px rgba(0,0,0,0.4);
            border: 1px solid rgba(0,0,0,0.2);
        }

        /* KAFELKI STACJI - SZARY METALIK */
        .bt-303 {
            background: var(--btn-metal);
            border: 1px solid #777;
            border-radius: 4px;
            display: flex; align-items: center; justify-content: center;
            padding: 10px;
            position: relative;
            box-shadow: 0 4px 0 #555, 0 6px 10px rgba(0,0,0,0.4);
            transition: 0.05s;
            text-align: center;
        }

        .bt-303::before { 
            content: ""; position: absolute; top: 6px; width: 6px; height: 6px;
            background: var(--led-bg); border-radius: 50%; border: 1px solid #000;
        }

        .bt-303:active { transform: translateY(2px); box-shadow: 0 2px 0 #333; }
        
        /* ZADANIE: Aktywna stacja świeci tak samo jak zegarek (Biały rdzeń + Zielona poświata) */
        .bt-303.active { 
            background: var(--btn-metal); 
            border-color: var(--lcd-green);
        }
        .bt-303.active::before { background: var(--led-red); box-shadow: 0 0 8px var(--led-red); }

        .bt-303 .st-label { 
            font-weight: 800; font-size: 14px; color: #222; 
            text-transform: uppercase; pointer-events: none;
        }
        .bt-303.active .st-label { 
            color: #ffffff; 
            text-shadow: 0 0 12px var(--lcd-green);
        }

        .pro-panel { 
            flex: 0.6; display: flex; flex-direction: column; 
            background: var(--metal-shine);
            background-image: url('https://www.transparenttextures.com/patterns/brushed-alum.png');
            border-radius: 8px; padding: 20px;
            border: 3px solid #888; box-shadow: 10px 10px 30px rgba(0,0,0,0.5);
            gap: 15px;
        }

        .lcd-display {
            background: #0a0c0a; height: 100px; border-radius: 4px; border: 3px solid #333;
            padding: 10px; font-family: 'Share Tech Mono', monospace;
            box-shadow: inset 0 0 15px #000; display: flex; flex-direction: column; justify-content: space-between;
        }
        .lcd-label { color: var(--lcd-green); font-size: 10px; opacity: 0.8; font-weight: bold; }
        #st-name { font-size: 24px; color: #ffffff; text-shadow: 0 0 12px var(--lcd-green); font-weight: bold; }
        .lcd-sub { color: var(--lcd-green); display: flex; justify-content: space-between; font-size: 11px; font-weight: bold; }

        .step-sequencer {
            background: #111; border-radius: 4px; border: 1px solid #333;
            padding: 8px; display: flex; flex-direction: column; gap: 4px;
        }
        .step-row { display: flex; gap: 2px; height: 18px; }
        .step { flex: 1; background: #222; border-radius: 1px; }
        .step.on { background: #ff4400; box-shadow: 0 0 8px rgba(255,68,0,0.8); }

        .analog-controls {
            display: flex; flex-direction: column; align-items: center; gap: 10px;
        }

        .pan-section { text-align: center; }
        .pan-leds { display: flex; gap: 5px; justify-content: center; margin-bottom: 5px; }
        
        /* ZADANIE: Diody wskazują aktywny kanał */
        .pan-led { width: 8px; height: 8px; background: var(--led-bg); border-radius: 50%; border: 1px solid #000; transition: background 0.2s; }
        .pan-led.active { background: var(--led-red); box-shadow: 0 0 5px var(--led-red); }

        .knob-volume {
            width: 75px; height: 75px; border-radius: 50%;
            background: radial-gradient(circle, #eee 0%, #aaa 100%);
            border: 2px solid #666; position: relative; margin: 0 auto;
            box-shadow: 0 6px 12px rgba(0,0,0,0.4);
            transition: transform 0.2s;
        }
        .knob-volume::before {
            content: ""; position: absolute; top: 4px; left: 50%; width: 4px; height: 18px;
            background: #222; transform: translateX(-50%); border-radius: 2px;
        }

        .volume-row {
            display: flex; align-items: center; gap: 10px; width: 100%; justify-content: center;
        }

        /* ZADANIE: Kolor przycisków Up, Down, Run/Stop taki jak kafelków (Szary metalik) */
        .sq-btn {
            width: 45px; height: 45px; 
            background: var(--btn-metal); 
            border: 1px solid #777;
            box-shadow: 0 4px 0 #555; display: flex; flex-direction: column;
            align-items: center; justify-content: center; border-radius: 2px;
        }
        .sq-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #555; }
        .sq-btn .dot { width: 4px; height: 4px; background: #400; border-radius: 50%; margin-bottom: 4px; }
        .sq-btn span { font-size: 8px; font-weight: bold; color: #111; }

        .fader-track { 
            background: #000; height: 40px; flex: 1; border-radius: 2px; border: 1px solid #444;
            display: flex; align-items: center; padding: 0 5px;
        }
        input[type="range"] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 22px; height: 34px; background: #ccc;
            border: 1px solid #333; border-radius: 2px; box-shadow: inset 0 0 5px #fff;
        }

        .btn-run-stop {
            width: 110px; height: 55px;
            background: var(--btn-metal); 
            border: 1px solid #777;
            border-radius: 4px;
            box-shadow: 0 5px 0 #555, 0 8px 15px rgba(0,0,0,0.3);
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 13px; color: #111; text-transform: uppercase;
        }
        .btn-run-stop:active { transform: translateY(3px); box-shadow: 0 2px 0 #555; }

    </style>
</head>
<body>

<div class="vst-chassis">
    <header>
        <div class="logo">
            <h1>RMF TB-303</h1>
            <span>COMPUTER CONTROLLED // ACID ENGINE</span>
        </div>
        <div id="clock">00:00:00</div>
    </header>

    <div class="main-workspace">
        <div class="grid-stations" id="grid"></div>

        <aside class="pro-panel">
            <div class="lcd-display">
                <div class="lcd-label">BANK: A1 / PATTERN: 08</div>
                <div id="st-name">STATION IDLE</div>
                <div class="lcd-sub">
                    <span>BITRATE: 128KBPS</span>
                    <span id="v-val">VOL: 50%</span>
                </div>
            </div>

            <div class="step-sequencer">
                <div class="step-row" id="r1"></div>
                <div class="step-row" id="r2"></div>
                <div class="step-row" id="r3"></div>
            </div>

            <div class="analog-controls">
                <div class="pan-section">
                    <div class="pan-leds">
                        <div class="pan-led" id="led-l"></div>
                        <div class="pan-led active" id="led-c"></div>
                        <div class="pan-led" id="led-r"></div>
                    </div>
                    <!-- Potencjometr do zmiany kanału Prawy/Lewy (Pan) -->
                    <div class="knob-volume" id="pan-knob"></div>
                    <div style="font-size: 9px; font-weight: bold; margin-top: 5px; color: #222;">PAN L/R</div>
                </div>

                <div class="volume-row">
                    <div class="sq-btn" id="vol-down-btn">
                        <div class="dot"></div>
                        <span>DOWN</span>
                    </div>
                    <div class="fader-track">
                        <input type="range" id="v-range" min="0" max="100" value="50">
                    </div>
                    <div class="sq-btn" id="vol-up-btn">
                        <div class="dot"></div>
                        <span>UP</span>
                    </div>
                </div>

                <div class="btn-run-stop" id="run-stop-btn">
                    RUN / STOP
                </div>
            </div>
        </aside>
    </div>
</div>

<audio id="player"></audio>

<script>
    const STATIONS = [
        { n: 'RMF FM', u: 'rmf_fm' },
        { n: 'RMF MAXXX', u: 'RMFMAXXX48' },
        { n: 'RMF 80s', u: 'rmf_80s' },
        { n: 'RMF 90s', u: 'rmf_90s' },
        { n: 'RMF 2000', u: 'rmf_2000' },
        { n: 'RMF CHILL', u: 'rmf_chillout' },
        { n: 'RMF CLASSIC', u: 'rmf_classic' },
        { n: 'RMF DANCE', u: 'rmf_dance' },
        { n: 'RMF GOLD', u: 'rmf_gold' },
        { n: 'RMF LATIN', u: 'rmf_latino' },
        { n: 'RMF LOVE', u: 'rmf_love' },
        { n: 'RMF PARTY', u: 'rmf_party' },
        { n: 'RMF ROCK', u: 'rmf_polski_rock' },
        { n: 'RMF ROCK+', u: 'rmf_rock' },
        { n: 'RMF JAZZ', u: 'rmf_smooth_jazz' }
    ];

    const grid = document.getElementById('grid');
    const player = document.getElementById('player');
    const stName = document.getElementById('st-name');
    const vRange = document.getElementById('v-range');
    const panKnob = document.getElementById('pan-knob');
    
    // Web Audio API do zmiany kanałów
    let audioCtx, source, gainL, gainR, merger;

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            source = audioCtx.createMediaElementSource(player);
            
            gainL = audioCtx.createGain();
            gainR = audioCtx.createGain();
            merger = audioCtx.createChannelMerger(2);

            // Łączenie grafu
            source.connect(gainL, 0); // Kanał 0 (L) źródła do gainL
            source.connect(gainR, 0); // Kanał 0 (L) źródła do gainR

            gainL.connect(merger, 0, 0); // GainL do wejścia 0 mergera
            gainR.connect(merger, 0, 1); // GainR do wejścia 1 mergera

            merger.connect(audioCtx.destination);
            applyPan(panState);
        }
    }

    STATIONS.forEach((s, i) => {
        const b = document.createElement('div');
        b.className = 'bt-303';
        b.innerHTML = `<div class="st-label">${s.n}</div>`;
        b.addEventListener('click', () => play(i));
        grid.appendChild(b);
    });

    [1, 2, 3].forEach(r => {
        const row = document.getElementById('r'+r);
        for(let i=0; i<16; i++) {
            const s = document.createElement('div');
            s.className = 'step';
            if(Math.random() > 0.8) s.classList.add('on');
            row.appendChild(s);
        }
    });

    function play(i) {
        initAudio(); // Inicjalizacja przy pierwszym kliknięciu
        if (audioCtx.state === 'suspended') audioCtx.resume();
        
        document.querySelectorAll('.bt-303').forEach((b, idx) => b.classList.toggle('active', idx === i));
        stName.textContent = STATIONS[i].n;
        
        // Unikalna wartość src do twardego restartu
        player.src = (STATIONS[i].n === 'RMF MAXXX' ? 'https://rs7-krk2-cyfronet.rmfstream.pl/RMFMAXXX48' : "https://rs201-krk.rmfstream.pl/" + STATIONS[i].u) + "?t=" + new Date().getTime();
        player.play();
    }

    function stopRadio() { 
        player.pause(); 
        player.src = ""; // Wyłącza radio całkowicie
        stName.textContent = "STATION STOPPED";
        document.querySelectorAll('.bt-303').forEach(b => b.classList.remove('active'));
    }

    function setV(v) { 
        player.volume = v/100; 
        document.getElementById('v-val').textContent = `VOL: ${v}%`; 
    }

    function adj(d) { 
        let newVal = parseInt(vRange.value) + d;
        if(newVal > 100) newVal = 100;
        if(newVal < 0) newVal = 0;
        vRange.value = newVal; 
        setV(newVal); 
    }

    document.getElementById('vol-down-btn').addEventListener('click', () => adj(-5));
    document.getElementById('vol-up-btn').addEventListener('click', () => adj(5));
    document.getElementById('run-stop-btn').addEventListener('click', stopRadio);
    vRange.addEventListener('input', (e) => setV(e.target.value));

    // LOGIKA PAN L/R
    let panState = 0; // -1: Left, 0: Center, 1: Right
    const panAngles = { "-1": -45, "0": 0, "1": 45 };

    function applyPan(state) {
        if (!audioCtx) return;
        if (state === -1) { gainL.gain.value = 1; gainR.gain.value = 0; }
        else if (state === 0) { gainL.gain.value = 1; gainR.gain.value = 1; }
        else if (state === 1) { gainL.gain.value = 0; gainR.gain.value = 1; }
    }

    panKnob.addEventListener('click', function() {
        initAudio(); // Wznów/Zainicjalizuj przy kliknięciu
        panState++;
        if (panState > 1) panState = -1;
        
        applyPan(panState);
        this.style.transform = `rotate(${panAngles[panState]}deg)`;
        
        document.getElementById('led-l').classList.toggle('active', panState === -1);
        document.getElementById('led-c').classList.toggle('active', panState === 0);
        document.getElementById('led-r').classList.toggle('active', panState === 1);
    });

    setInterval(() => {
        const d = new Date();
        document.getElementById('clock').textContent = d.toTimeString().split(' ')[0];
        document.querySelectorAll('.step').forEach(s => { if(Math.random()>0.95) s.classList.toggle('on'); });
    }, 1000);
</script>
</body>
</html>
