<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Techno Radio v2.0 - 15 Stations</title>
    <style>
        :root { --neon: #00ff41; --bg: #050505; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .player { border: 2px solid var(--neon); padding: 30px; border-radius: 5px; width: 400px; box-shadow: 0 0 15px var(--neon); }
        h1 { font-size: 1.5rem; text-align: center; border-bottom: 1px solid var(--neon); padding-bottom: 10px; }
        .station-list { height: 250px; overflow-y: auto; margin: 20px 0; border: 1px solid #222; }
        .station-item { padding: 8px; cursor: pointer; border-bottom: 1px solid #111; transition: 0.2s; }
        .station-item:hover { background: #00ff4133; }
        .station-item.active { background: var(--neon); color: black; font-weight: bold; }
        .controls { display: flex; gap: 10px; justify-content: center; }
        button { background: transparent; border: 1px solid var(--neon); color: var(--neon); padding: 10px 20px; cursor: pointer; text-transform: uppercase; }
        button:hover { background: var(--neon); color: black; }
        .status-bar { font-size: 0.7rem; margin-top: 15px; text-transform: uppercase; overflow: hidden; white-space: nowrap; }
    </style>
</head>
<body>

<div class="player">
    <h1>TECHNO_COMMAND_CENTER</h1>
    <div id="list" class="station-list"></div>
    
    <div class="controls">
        <button id="playBtn">Play</button>
        <button id="stopBtn">Stop</button>
    </div>
    
    <div class="status-bar" id="statusText">System Ready...</div>
</div>

<script>
    const stations = [
        { name: "01. TechnoBase.FM", url: "https://listen.technobase.fm/tunein-mp3-pls" },
        { name: "02. Hirschmilch Techno", url: "https://hirschmilch.de:8000/techno.mp3" },
        { name: "03. Deep Techno (SCA)", url: "https://shoutcast.scahw.com.au/live/sc-deeptechno/mp3" },
        { name: "04. Sunshine Live Techno", url: "https://sunshinelive.hoerradar.de/sunshinelive-techno-mp3-hq" },
        { name: "05. Techno Paradize", url: "http://login.technoparadize.de:8000/stream" },
        { name: "06. In-Prog Berlin", url: "http://shoutcast.in-prog.com:8034/stream" },
        { name: "07. Die Neue Welle Techno", url: "https://icecast.die-neue-welle.de/dnw-techno-128-mp3" },
        { name: "08. Hard Techno - Hardbase", url: "https://listen.hardbase.fm/tunein-mp3-pls" },
        { name: "09. Minimal Mix Techno", url: "http://minimalmix.com:8000/live" },
        { name: "10. Techno Vibe (UK)", url: "http://uk2.internet-radio.com:8024/stream" },
        { name: "11. Schizoid Dub Techno", url: "http://64.150.176.42:8242/stream" },
        { name: "12. Corvinus Techno", url: "http://stream.corvinus.hu:8000/techno.mp3" },
        { name: "13. Digitally Imported Techno", url: "http://pub1.di.fm/di_techno" },
        { name: "14. Dark Techno - Darkroom", url: "http://darkroom.stream.live:8000/techno" },
        { name: "15. Industrial Strength", url: "http://stream.industrial.me:8056/live" }
    ];

    const audio = new Audio();
    const listContainer = document.getElementById('list');
    const statusText = document.getElementById('statusText');
    let activeIndex = -1;

    // Renderowanie listy
    stations.forEach((s, index) => {
        const div = document.createElement('div');
        div.className = 'station-item';
        div.innerText = s.name;
        div.onclick = () => playStation(index);
        listContainer.appendChild(div);
    });

    function playStation(index) {
        activeIndex = index;
        const items = document.querySelectorAll('.station-item');
        items.forEach(it => it.classList.remove('active'));
        items[index].classList.add('active');

        audio.src = stations[index].url;
        audio.play().catch(e => {
            statusText.innerText = "Error: Strumień wygasł lub zablokowany";
        });
        statusText.innerText = "Streaming: " + stations[index].name;
    }

    document.getElementById('playBtn').onclick = () => {
        if (activeIndex === -1) playStation(0);
        else audio.play();
    };

    document.getElementById('stopBtn').onclick = () => {
        audio.pause();
        statusText.innerText = "System Paused";
    };
</script>

</body>
</html>
