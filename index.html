<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RMF TERMINAL - DENSE CIRCUIT PCB</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Megrim&family=Montserrat+Alternates:wght@400;600;700&display=swap');

        :root {
            --yellow: #fce300;
            --yellow-neon: #fffb00;
            --bg: #000;
            --tile: #0a0a0a;
            --border: #1a1a1a;
            --circuit-dim: #151515;
            --circuit-mid: #222;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { 
            height: 100vh; width: 100vw; 
            background: var(--bg); color: #fff; 
            font-family: 'Montserrat Alternates', sans-serif;
            overflow: hidden; 
        }

        /* Tło z teksturą miedzi */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(var(--circuit-dim) 1px, transparent 1px),
                linear-gradient(90deg, var(--circuit-dim) 1px, transparent 1px);
            background-size: 20px 20px;
            z-index: -2;
        }

        body { display: flex; flex-direction: column; padding: 2vh; }

        header { 
            height: 50px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border); margin-bottom: 2vh; flex-shrink: 0;
        }
        .header-info { font-size: 24px; font-weight: 700; color: var(--yellow); text-transform: uppercase; }
        .clock { color: var(--yellow); font-size: 24px; font-weight: 700; }

        .app-content { display: flex; flex: 1; gap: 3vw; min-height: 0; position: relative; }

        /* DEKORACYJNE ŚCIEŻKI SVG (TŁO) */
        .pcb-lines {
            position: absolute;
            top: 0; left: 0; width: 70%; height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.4;
        }

        .grid { 
            flex: 1.4; display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            grid-auto-rows: 1fr;
            gap: 12px; 
            overflow-y: auto;
            padding: 10px;
            z-index: 1;
        }

        .grid::-webkit-scrollbar { width: 4px; }
        .grid::-webkit-scrollbar-thumb { background: var(--circuit-mid); border-radius: 10px; }

        /* KAFELKI - PRZYWRÓCONY ROZMIAR I STYL */
        .tile {
            background: var(--tile); border: 1px solid var(--border); border-radius: 4px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; position: relative; min-height: 80px;
            transition: all 0.2s ease;
        }

        /* Nóżki procesora - detal PCB */
        .tile::before {
            content: ""; position: absolute;
            width: calc(100% + 16px); height: 60%;
            left: -8px; top: 20%;
            background-image: repeating-linear-gradient(to bottom, transparent, transparent 4px, var(--circuit-mid) 4px, var(--circuit-mid) 6px);
            z-index: -1;
        }

        .tile .t-top { font-size: 14px; font-weight: 700; color: var(--yellow); text-align: center; text-transform: uppercase; z-index: 2; }
        .tile .t-bottom { font-size: 10px; font-weight: 600; color: var(--yellow); margin-top: 4px; opacity: 0.7; z-index: 2; }

        .tile.active { 
            border: 1px solid var(--yellow-neon); 
            background: #111;
            box-shadow: 0 0 15px rgba(252, 227, 0, 0.3);
            transform: scale(1.02);
        }

        /* PANEL BOCZNY */
        .sidebar { 
            flex: 0.6; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; gap: 4vh;
            border-left: 1px solid var(--border); padding-left: 3vw;
            z-index: 1;
        }

        .logo-display {
            width: 100%; max-width: 320px; aspect-ratio: 16/10;
            border: 2px solid var(--yellow); border-radius: 10px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #000;
            box-shadow: inset 0 0 20px rgba(252, 227, 0, 0.1);
        }

        .logo-display h2 { 
            font-family: 'Megrim', cursive; 
            font-size: 52px; 
            color: var(--yellow); 
            text-shadow: 0 0 10px var(--yellow); 
        }

        .controls { display: flex; align-items: center; gap: 30px; }
        .c-svg { width: 35px; height: 35px; fill: var(--yellow); cursor: pointer; transition: transform 0.1s; }
        .c-svg:active { transform: scale(0.9); }
        .c-play { width: 70px; height: 70px; border: 2px solid var(--yellow); border-radius: 50%; padding: 12px; }

        .vol-box { display: flex; align-items: center; gap: 15px; width: 320px; }
        .vol-btn { width: 35px; height: 35px; border: 1.5px solid var(--yellow); background: none; color: var(--yellow); cursor: pointer; font-weight: bold; }
        .vol-bar { flex: 1; height: 30px; border: 1px solid var(--circuit-mid); display: flex; align-items: center; padding: 0 10px; }
        
        input[type="range"] { flex: 1; appearance: none; background: transparent; cursor: pointer; }
        input[type="range"]::-webkit-slider-runnable-track { background: var(--yellow); height: 2px; }
        input[type="range"]::-webkit-slider-thumb { appearance: none; width: 14px; height: 14px; background: var(--yellow); border-radius: 0; margin-top: -6px; border: 2px solid #000; }

        @media (max-width: 600px) {
            .app-content { flex-direction: column; }
            .grid { grid-template-columns: repeat(3, 1fr); height: 50vh; flex: none; gap: 8px; }
            .sidebar { border-left: none; border-top: 1px solid var(--border); padding: 20px 0; gap: 20px; }
            .pcb-lines { display: none; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-info" id="playing-now">TECHNO TERMINAL V2</div>
    <div class="clock" id="timer">00:00</div>
</header>

<div class="app-content">
    <!-- SVG ze skomplikowanymi ścieżkami jak na zdjęciu d6afb6 -->
    <svg class="pcb-lines" viewBox="0 0 600 800" xmlns="http://www.w3.org/2000/svg">
        <g stroke="#222" stroke-width="2" fill="none">
            <!-- Pionowe i poziome magistrale -->
            <path d="M50,0 V800 M150,0 V800 M250,0 V800 M350,0 V800 M450,0 V800" />
            <path d="M0,100 H600 M0,300 H600 M0,500 H600 M0,700 H600" />
            
            <!-- Skośne połączenia (styl PCB) -->
            <path d="M50,100 L100,150 H200 L250,200" stroke="#333" />
            <path d="M450,300 L400,350 H300 L250,400" stroke="#333" />
            <path d="M150,500 L200,550 H400 L450,600" stroke="#333" />
            
            <!-- Punkty lutownicze -->
            <circle cx="50" cy="100" r="4" fill="#222" />
            <circle cx="250" cy="200" r="4" fill="#222" />
            <circle cx="450" cy="300" r="4" fill="#222" />
            <circle cx="150" cy="500" r="4" fill="#222" />
        </g>
    </svg>

    <div class="grid" id="station-grid"></div>

    <aside class="sidebar">
        <div class="logo-display">
            <h2 id="display-name">TECHNO</h2>
            <p id="display-cat" style="font-size: 10px; color: var(--yellow); margin-top: 5px; letter-spacing: 2px;">CIRCUIT MODULE</p>
        </div>

        <div class="controls">
            <svg class="c-svg" viewBox="0 0 24 24" onclick="skip(-1)"><path d="M6,18V6H8V18H6M9.5,12L18,6V18L9.5,12Z"/></svg>
            <svg class="c-svg c-play" viewBox="0 0 24 24" onclick="toggle()"><path id="p-ico" d="M8,5.14V19.14L19,12.14L8,5.14Z"/></svg>
            <svg class="c-svg" viewBox="0 0 24 24" onclick="skip(1)"><path d="M16,18H18V6H16M6,18L14.5,12L6,6V18Z"/></svg>
        </div>

        <div class="vol-box">
            <button class="vol-btn" onclick="adj(-5)">-</button>
            <div class="vol-bar">
                <input type="range" id="v-range" min="0" max="100" value="50" oninput="setV(this.value)">
            </div>
            <button class="vol-btn" onclick="adj(5)">+</button>
        </div>
    </aside>
</div>

<audio id="player"></audio>

<script>
    const STATIONS = [
        { n: 'TECH 88', c: 'TECHNO', u: 'https://laut.fm/tech88' },
        { n: 'HR 3 CLUBNIGHT', c: 'TECHNO', u: 'https://laut.fm/hr3_clubnight' },
        { n: '1000 TECHNO', c: 'TECHNO', u: 'https://laut.fm/1000techno' },
        { n: 'BEST OF TECHNO', c: 'TECHNO', u: 'https://laut.fm/best-of-techno' },
        { n: 'CHRIS BURN', c: 'TECHNO', u: 'https://laut.fm/chris_burn' },
        { n: 'RETROELECTRONIC', c: 'TECHNO', u: 'https://laut.fm/retroelectronicmusic' }
    ];

    const player = document.getElementById('player'), 
          ico = document.getElementById('p-ico'), 
          grid = document.getElementById('station-grid'),
          dispName = document.getElementById('display-name'),
          nowPlaying = document.getElementById('playing-now');

    let current = -1;

    function clock() {
        const d = new Date();
        document.getElementById('timer').textContent = d.getHours().toString().padStart(2,'0') + ":" + d.getMinutes().toString().padStart(2,'0');
    }
    setInterval(clock, 1000); clock();

    STATIONS.forEach((s, i) => {
        const t = document.createElement('div');
        t.className = 'tile';
        t.innerHTML = `<div class="t-top">${s.n}</div><div class="t-bottom">${s.c}</div>`;
        t.onclick = () => play(i);
        grid.appendChild(t);
    });

    function play(i) {
        current = i;
        document.querySelectorAll('.tile').forEach((t, idx) => t.classList.toggle('active', idx === i));
        dispName.textContent = STATIONS[i].n;
        nowPlaying.textContent = "GRA: " + STATIONS[i].n;
        player.src = STATIONS[i].u;
        player.play();
        ico.setAttribute('d', 'M14,19H18V5H14M6,19H10V5H6V19Z');
    }

    function toggle() {
        if(current === -1) play(0);
        else if(player.paused) { player.play(); ico.setAttribute('d', 'M14,19H18V5H14M6,19H10V5H6V19Z'); }
        else { player.pause(); ico.setAttribute('d', 'M8,5.14V19.14L19,12.14L8,5.14Z'); }
    }

    function skip(d) {
        let n = current + d;
        if(n < 0) n = STATIONS.length - 1;
        if(n >= STATIONS.length) n = 0;
        play(n);
    }

    function setV(v) { player.volume = v / 100; }
    function adj(d) { 
        const r = document.getElementById('v-range');
        r.value = parseInt(r.value) + d;
        setV(r.value);
    }
</script>
</body>
</html>
