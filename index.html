<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>TECHNO_PCB_V8_FINAL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=JetBrains+Mono:wght@100;400;800&display=swap');

        :root {
            --pcb-base: #010804;
            --trace-bg: #061a0d;
            --neon-cyan: #00f2ff;
            --neon-green: #39ff14;
            --gold: #ffcc00;
            --circuit-glow: rgba(0, 242, 255, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--pcb-base); 
            color: var(--neon-cyan);
            font-family: 'JetBrains Mono', monospace;
            overflow: hidden; height: 100vh;
            /* Efekt ziarnistości laminatu */
            background-image: url('https://www.transparenttextures.com/patterns/dark-matter.png');
        }

        /* SVG BACKGROUND - HIGH DENSITY TRACES */
        #pcb-svg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; pointer-events: none; opacity: 0.6;
        }

        .interface-grid {
            display: grid; grid-template-columns: 1fr 350px;
            height: 100vh; position: relative; z-index: 10;
        }

        /* MOTHERBOARD AREA */
        .board {
            position: relative; overflow: hidden;
            border: 20px solid #000;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.8);
        }

        /* REALISTYCZNY UKŁAD SCALONY (ZGODNY Z ZDJĘCIEM) */
        .chip {
            position: absolute; width: 130px; height: 130px;
            background: linear-gradient(145deg, #111, #000);
            border: 1px solid #333; cursor: pointer;
            transition: all 0.3s; z-index: 20;
        }

        /* Piny ze wszystkich 4 stron (Referencja: image_c8a6d7.png) */
        .chip::before {
            content: ''; position: absolute; top: -12px; left: 15px; right: 15px; bottom: -12px;
            background: repeating-linear-gradient(90deg, #444 0px, #444 2px, transparent 2px, transparent 8px);
        }
        .chip::after {
            content: ''; position: absolute; left: -12px; top: 15px; bottom: 15px; right: -12px;
            background: repeating-linear-gradient(0deg, #444 0px, #444 2px, transparent 2px, transparent 8px);
        }

        .chip-top {
            position: relative; width: 100%; height: 100%; background: #0a0a0a;
            z-index: 5; border: 1px solid #222; display: flex; flex-direction: column;
            padding: 10px; text-align: left;
        }

        .chip-label { font-family: 'Orbitron'; font-size: 9px; color: var(--gold); font-weight: 900; }
        .chip-serial { font-size: 6px; color: #444; margin-top: auto; }

        .chip.active {
            box-shadow: 0 0 30px var(--neon-cyan), inset 0 0 10px var(--neon-cyan);
            border-color: var(--neon-cyan);
        }

        /* PANEL KONTROLNY - STYLE PINTEREST (HACKER HUD) */
        .sidebar {
            background: rgba(0, 10, 5, 0.9);
            border-left: 2px solid var(--neon-cyan);
            backdrop-filter: blur(10px);
            display: flex; flex-direction: column;
            box-shadow: -10px 0 50px rgba(0,0,0,1);
        }

        .terminal-header {
            padding: 20px; font-family: 'Orbitron'; background: rgba(0, 242, 255, 0.1);
            border-bottom: 1px solid var(--neon-cyan); font-size: 12px;
        }

        .terminal-log {
            flex: 1; padding: 15px; font-size: 10px; color: var(--neon-green);
            overflow-y: auto; line-height: 1.4;
            background-image: linear-gradient(rgba(0, 255, 0, 0.05) 50%, transparent 50%);
            background-size: 100% 4px;
        }

        .controls {
            display: grid; grid-template-columns: repeat(3, 1fr);
            border-top: 1px solid #333;
        }

        .btn {
            background: #000; border: 1px solid #111; color: var(--neon-cyan);
            padding: 20px; cursor: pointer; font-family: 'Orbitron'; font-size: 10px;
        }
        .btn:hover { background: var(--neon-cyan); color: #000; box-shadow: 0 0 20px var(--neon-cyan); }

        .volume-area { padding: 30px; background: #050505; }
        input[type=range] { width: 100%; accent-color: var(--neon-cyan); }

        /* ANIMACJA PRZEPŁYWU PRĄDU */
        .trace { stroke: var(--trace-bg); stroke-width: 1.5; fill: none; }
        .trace-active { 
            stroke: var(--neon-cyan); stroke-width: 2; 
            stroke-dasharray: 100; animation: dash 2s linear infinite; 
            filter: drop-shadow(0 0 5px var(--neon-cyan));
        }
        @keyframes dash { from { stroke-dashoffset: 200; } to { stroke-dashoffset: 0; } }

    </style>
</head>
<body>

<svg id="pcb-svg"></svg>

<div class="interface-grid">
    <div class="board" id="board-area"></div>

    <aside class="sidebar">
        <div class="terminal-header">NODE_STATUS: ONLINE</div>
        <div class="terminal-log" id="log">> INITIALIZING_PCB_BIOS...<br>> SCANNING_I/O_CHIPS...</div>
        
        <div class="controls">
            <button class="btn" onclick="skip(-1)">[ PREV ]</button>
            <button class="btn" onclick="toggle()">[ SYNC ]</button>
            <button class="btn" onclick="skip(1)">[ NEXT ]</button>
        </div>

        <div class="volume-area">
            <input type="range" min="0" max="1" step="0.01" oninput="setVol(this.value)">
        </div>
    </aside>
</div>

<audio id="core-audio" crossorigin="anonymous"></audio>

<script>
    const STATIONS = [
        { n: 'TECH 88', u: 'https://laut.fm/tech88', x: 10, y: 10 },
        { n: 'HR3 CLUB', u: 'https://laut.fm/hr3_clubnight', x: 45, y: 15 },
        { n: '1000 TECHNO', u: 'https://laut.fm/1000techno', x: 12, y: 45 },
        { n: 'GEHIRN', u: 'https://laut.fm/gehirn-treiber-beat-radio', x: 50, y: 50 },
        { n: 'B.O. TECHNO', u: 'https://laut.fm/best-of-techno', x: 15, y: 75 },
        { n: 'CHRIS BURN', u: 'https://laut.fm/chris_burn', x: 60, y: 80 },
        { n: 'DEEP HOUSE', u: 'https://laut.fm/deep-house-sounds', x: 80, y: 10 },
        { n: 'HOUSEBOMB', u: 'https://laut.fm/housebomb-fn', x: 75, y: 45 },
        { n: 'SYMBIOTIC', u: 'https://laut.fm/symbiotic-beats', x: 82, y: 80 }
    ];

    const log = document.getElementById('log');
    const board = document.getElementById('board-area');
    const audio = document.getElementById('core-audio');
    const svg = document.getElementById('pcb-svg');
    let currentIdx = -1;

    function buildPCB() {
        // Gęste ścieżki tła
        let traces = "";
        for(let i=0; i<60; i++) {
            let x = Math.random()*100, y = Math.random()*100;
            traces += `<path class="trace" d="M ${x}% ${y}% L ${x+10}% ${y+5}% L ${x+15}% ${y}%" />`;
        }
        svg.innerHTML = traces;

        STATIONS.forEach((s, i) => {
            const chip = document.createElement('div');
            chip.className = 'chip';
            chip.style.left = s.x + '%'; chip.style.top = s.y + '%';
            chip.onclick = () => mount(i);
            chip.innerHTML = `<div class="chip-top">
                <div class="chip-label">${s.n}</div>
                <div class="chip-serial">ID: 0x${i}FF_${Math.random().toString(16).slice(2,6)}</div>
            </div>`;
            board.appendChild(chip);
        });
    }

    function mount(i) {
        currentIdx = i;
        document.querySelectorAll('.chip').forEach((c, idx) => c.classList.toggle('active', idx === i));
        
        // Animacja ścieżki (uproszczona dla wydajności)
        svg.innerHTML += `<line x1="100%" y1="50%" x2="${STATIONS[i].x}%" y2="${STATIONS[i].y}%" class="trace-active" />`;

        log.innerHTML += `<br>> MOUNTING_SOURCE: ${STATIONS[i].n}...`;
        log.scrollTop = log.scrollHeight;

        // AUDIO ENGINE FIX
        audio.pause();
        audio.src = STATIONS[i].u;
        audio.load();
        
        // Próba odtworzenia - jeśli przeglądarka blokuje, prosimy o SYNC
        audio.play().catch(() => {
            log.innerHTML += `<br><span style="color:red">> ERROR: BYPASS_REQUIRED. PRESS SYNC.</span>`;
        });
    }

    function toggle() { 
        if(currentIdx === -1) mount(0); 
        else audio.paused ? audio.play() : audio.pause(); 
    }

    function skip(dir) { 
        let n = currentIdx + dir; 
        if(n >= 0 && n < STATIONS.length) mount(n); 
    }

    function setVol(v) { audio.volume = v; }

    buildPCB();
</script>
</body>
</html>
