<!DOCTYPE html><html lang="pl"><head>    <meta charset="UTF-8">    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">    <title>RMF TERMINAL - FINAL AUDIT</title>    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat+Alternates:wght@400;600;700&display=swap');
        
        :root {            
            --yellow: #fce300;            
            --yellow-neon: #fffb00;            
            --bg: #000;            
            --tile: #0a0a0a;            
            --border: #1a1a1a;            
            --blue-wave: #00ccff; /* BŁĘKITNY DLA FAL ZGODNIE Z KODEM */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }                
        html, body {             
            height: 100vh; width: 100vw;             
            background: var(--bg); color: #fff;             
            font-family: 'Montserrat Alternates', sans-serif;            
            overflow: hidden;         
        }

        body { 
            display: flex; flex-direction: column; padding: 2vh; 
            /* Delikatna tekstura tła inspirowana zdjęciem */
            background-image: linear-gradient(rgba(252, 227, 0, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(252, 227, 0, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        header {             
            height: 50px; display: flex; justify-content: space-between; align-items: center;            
            border-bottom: 1px solid var(--yellow); margin-bottom: 2vh; flex-shrink: 0;
            box-shadow: 0 0 15px rgba(252, 227, 0, 0.3);
        }        
        .header-info { font-size: 24px; font-weight: 700; color: var(--yellow); text-transform: uppercase; }        
        .clock { color: var(--yellow); font-size: 24px; font-weight: 700; text-shadow: 0 0 10px var(--yellow); }

        .app-content { display: flex; flex: 1; gap: 3vw; min-height: 0; }

        /* UKŁAD 5x3 - BEZ ZMIAN */
        .grid {             
            flex: 1.4; display: grid;             
            grid-template-columns: repeat(5, 1fr);             
            grid-template-rows: repeat(3, 1fr);             
            gap: 12px;         
        }

        /* STYLIZACJA KAFELKA - INSPIRACJA ZDJĘCIEM */
        .tile {            
            background: var(--tile); border: 1px solid var(--yellow); border-radius: 4px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;            
            cursor: pointer; position: relative; overflow: visible;
            box-shadow: inset 0 0 8px rgba(252, 227, 0, 0.1);
            transition: transform 0.2s;
        }

        .tile .t-top { font-size: 22px; font-weight: 700; color: var(--yellow); line-height: 1; z-index: 2; }        
        .tile .t-bottom { font-size: 14px; font-weight: 600; color: var(--yellow); margin-top: 4px; text-align: center; z-index: 2; opacity: 0.8; }

        /* AKTYWNA STACJA - MOCNY NEON */
        .tile.active {             
            border: 2px solid var(--yellow-neon);             
            background: rgba(252, 227, 0, 0.1);
            box-shadow: 0 0 20px var(--yellow-neon), inset 0 0 15px var(--yellow-neon);
        }        
        .tile.active .t-top, .tile.active .t-bottom { color: var(--yellow-neon); text-shadow: 0 0 5px #000; }

        /* FALE BŁĘKITNE - ZGODNIE Z ORYGINAŁEM */
        .waves {            
            position: absolute; width: 100%; height: 100%;            
            display: flex; align-items: center; justify-content: center;            
            pointer-events: none; opacity: 0; z-index: 1;        
        }        
        .tile.active .waves { opacity: 1; }        
        .wave {            
            position: absolute; border: 2px solid var(--blue-wave); border-radius: 50%;            
            width: 10px; height: 10px; opacity: 0;            
            box-shadow: 0 0 15px var(--blue-wave);            
            animation: ripple 3s infinite linear;        
        }        
        .wave:nth-child(2) { animation-delay: 1s; }        
        .wave:nth-child(3) { animation-delay: 2s; }

        @keyframes ripple {            
            0% { width: 0; height: 0; opacity: 0.9; }            
            100% { width: 320%; height: 320%; opacity: 0; }        
        }

        .sidebar {             
            flex: 0.6; display: flex; flex-direction: column;             
            align-items: center; justify-content: center; gap: 4vh;            
            border-left: 1px solid var(--border); padding-left: 3vw;        
        }

        /* LOGO DISPLAY - RAMKA JAK NA ZDJĘCIU */
        .logo-display {            
            width: 100%; max-width: 320px; aspect-ratio: 16/10;            
            border: 2px solid var(--yellow); border-radius: 4px;            
            display: flex; flex-direction: column; align-items: center; justify-content: center;            
            background: rgba(0, 0, 0, 0.8);            
            box-shadow: 0 0 25px rgba(252, 227, 0, 0.2);
            position: relative;
        }        
        /* Dodatkowe linie narożne w stylu tech */
        .logo-display::before {
            content: ''; position: absolute; top: -5px; left: -5px; width: 20px; height: 20px;
            border-top: 3px solid var(--blue-wave); border-left: 3px solid var(--blue-wave);
        }

        .logo-display h2 { font-size: 46px; color: var(--yellow); text-shadow: 0 0 15px var(--yellow); }        
        .logo-display p { font-size: 11px; color: var(--yellow); font-weight: 700; text-transform: uppercase; letter-spacing: 2px; }

        .controls { display: flex; align-items: center; gap: 3vw; }        
        .c-svg {             
            width: 35px; height: 35px; fill: var(--yellow); cursor: pointer;             
            filter: drop-shadow(0 0 8px rgba(252, 227, 0, 0.6));
        }        
        .c-play { width: 70px; height: 70px; fill: var(--yellow); filter: drop-shadow(0 0 15px var(--yellow)); }

        .vol-box { display: flex; align-items: center; gap: 15px; width: 320px; }        
        .vol-btn { width: 35px; height: 35px; border: 1.5px solid var(--yellow); border-radius: 4px; background: none; color: var(--yellow); cursor: pointer; font-weight: bold; }        
        .vol-bar { flex: 1; height: 35px; border: 1px solid var(--yellow); border-radius: 4px; padding: 0 12px; display: flex; align-items: center; background: rgba(252,227,0,0.05); }                
        
        input[type="range"] { flex: 1; appearance: none; background: transparent; cursor: pointer; }        
        input[type="range"]::-webkit-slider-runnable-track { background: var(--yellow); height: 2px; }                
        input[type="range"]::-webkit-slider-thumb {             
            appearance: none; width: 18px; height: 18px;             
            background: var(--yellow); border-radius: 0;             
            margin-top: -8px; border: 1px solid #000; box-shadow: 0 0 10px var(--yellow);
        }

        @media (max-width: 600px) {
            .header-info, .clock { font-size: 20px; }
            .app-content { flex-direction: column; }
            .grid { grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(5, 1fr); height: 50vh; flex: none; }
            .sidebar { width: 100%; height: 40vh; border-left: none; border-top: 1px solid var(--border); padding: 5px 0; gap: 10px; }
            .logo-display { width: 95%; height: 65px; aspect-ratio: auto; }
            .logo-display h2 { font-size: 26px; }
            .vol-box { width: 95%; }
        }
    </style></head><body>

<header>    <div class="header-info" id="playing-now">GRA: RMF FM</div>    <div class="clock" id="timer">00:00</div></header>

<div class="app-content">    <div class="grid" id="station-grid"></div>
    <aside class="sidebar">        <div class="logo-display">            <h2>RMF FM</h2>            <p>Najlepsza muzyka</p>        </div>
        <div class="controls">            <svg class="c-svg" viewBox="0 0 24 24" onclick="skip(-1)"><path d="M6,18V6H8V18H6M9.5,12L18,6V18L9.5,12Z"/></svg>            <svg class="c-svg c-play" viewBox="0 0 24 24" onclick="toggle()"><path id="p-ico" d="M8,5.14V19.14L19,12.14L8,5.14Z"/></svg>            <svg class="c-svg" viewBox="0 0 24 24" onclick="skip(1)"><path d="M16,18H18V6H16M6,18L14.5,12L6,6V18Z"/></svg>        </div>
        <div class="vol-box">            <button class="vol-btn" onclick="adj(-5)">-</button>            <div class="vol-bar">                <input type="range" id="v-range" class="at-mid" min="0" max="100" value="50" oninput="setV(this.value)">            </div>            <button class="vol-btn" onclick="adj(5)">+</button>        </div>    </aside></div>

<audio id="player"></audio>

<script>    
    /* LOGIKA - BEZ ZMIAN */
    const STATIONS = [        
        { n: 'RMF FM', s: 'RMF FM', u: 'rmf_fm' },        
        { n: 'RMF MAXXX', s: 'Maxxx', u: 'RMFMAXXX48' },        
        { n: 'RMF 80s', s: '80s', u: 'rmf_80s' },        
        { n: 'RMF 90s', s: '90s', u: 'rmf_90s' },        
        { n: 'RMF 2000', s: '2000', u: 'rmf_2000' },        
        { n: 'RMF CHILLOUT', s: 'Chillout', u: 'rmf_chillout' },        
        { n: 'RMF CLASSIC', s: 'Classic', u: 'rmf_classic' },        
        { n: 'RMF DANCE', s: 'Dance', u: 'rmf_dance' },        
        { n: 'RMF GOLD', s: 'Gold', u: 'rmf_gold' },        
        { n: 'RMF LATINO', s: 'Latino', u: 'rmf_latino' },        
        { n: 'RMF LOVE', s: 'Love', u: 'rmf_love' },        
        { n: 'RMF PARTY', s: 'Party', u: 'rmf_party' },        
        { n: 'RMF POLSKI ROCK', s: 'Polski Rock', u: 'rmf_polski_rock' },        
        { n: 'RMF ROCK', s: 'Rock', u: 'rmf_rock' },        
        { n: 'RMF SMOOTH JAZZ', s: 'Smooth Jazz', u: 'rmf_smooth_jazz' }    
    ];

    const player = document.getElementById('player'), ico = document.getElementById('p-ico'), grid = document.getElementById('station-grid'), vRange = document.getElementById('v-range');    
    let current = -1;

    function clock() {        
        const d = new Date();        
        document.getElementById('timer').textContent = d.getHours().toString().padStart(2,'0') + ":" + d.getMinutes().toString().padStart(2,'0');    
    }    
    setInterval(clock, 1000); clock();

    STATIONS.forEach((s, i) => {        
        const t = document.createElement('div');        
        t.className = 'tile';        
        t.innerHTML = `            
            <div class="waves"><div class="wave"></div><div class="wave"></div><div class="wave"></div></div>            
            <div class="t-top">RMF FM</div>            
            <div class="t-bottom">${s.s}</div>        `;        
        t.onclick = () => play(i);        
        grid.appendChild(t);    
    });

    function play(i) {        
        current = i;        
        document.querySelectorAll('.tile').forEach((t, idx) => t.classList.toggle('active', idx === i));        
        document.getElementById('playing-now').textContent = "GRA: " + STATIONS[i].n;        
        const streamBase = "https://rs201-krk.rmfstream.pl/";        
        player.src = (STATIONS[i].n === 'RMF MAXXX') ? 'https://rs7-krk2-cyfronet.rmfstream.pl/RMFMAXXX48' : streamBase + STATIONS[i].u;        
        player.play();        
        ico.setAttribute('d', 'M14,19H18V5H14M6,19H10V5H6V19Z');    
    }

    function toggle() {        
        if(player.paused) { player.play(); ico.setAttribute('d', 'M14,19H18V5H14M6,19H10V5H6V19Z'); }        
        else { player.pause(); ico.setAttribute('d', 'M8,5.14V19.14L19,12.14L8,5.14Z'); }    
    }

    function skip(d) { let n = current + d; if(n >= 0 && n < STATIONS.length) play(n); }        
    function setV(v) {         
        player.volume = v / 100;        
        if(parseInt(v) === 50) vRange.classList.add('at-mid');        
        else vRange.classList.remove('at-mid');    
    }        
    function adj(d) { vRange.value = parseInt(vRange.value) + d; setV(vRange.value); }
</script></body></html>
