<!DOCTYPE html><html lang="pl"><head>    <meta charset="UTF-8">    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">    <title>RMF TERMINAL - CYBER HUD EDITION</title>    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat+Alternates:wght@400;600;700&family=Rajdhani:wght@600;700&display=swap');
        
        :root {            
            --yellow: #fce300;            
            --yellow-neon: #fffb00;            
            --bg: #020202;            
            --tile: #050505;            
            --border: #1a1a1a;            
            --blue-wave: #00ccff; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }                
        html, body {             
            height: 100vh; width: 100vw;             
            background: var(--bg); color: #fff;             
            font-family: 'Montserrat Alternates', sans-serif;            
            overflow: hidden;         
        }

        body { 
            display: flex; flex-direction: column; padding: 2vh; 
            /* Tekstura tła ze zdjęcia - siatka i poświata */
            background-image: 
                linear-gradient(rgba(252, 227, 0, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(252, 227, 0, 0.05) 1px, transparent 1px),
                radial-gradient(circle at 50% 50%, #111 0%, #000 100%);
            background-size: 30px 30px, 30px 30px, 100% 100%;
        }

        header {             
            height: 60px; display: flex; justify-content: space-between; align-items: center;            
            border-bottom: 2px solid var(--yellow); margin-bottom: 2vh; flex-shrink: 0;
            position: relative; box-shadow: 0 0 20px rgba(252, 227, 0, 0.2);
        }        
        header::after { content: ''; position: absolute; bottom: -5px; left: 0; width: 100%; height: 1px; background: var(--blue-wave); opacity: 0.5; }

        .header-info { font-family: 'Rajdhani', sans-serif; font-size: 26px; font-weight: 700; color: var(--yellow); text-transform: uppercase; text-shadow: 0 0 10px var(--yellow); }        
        .clock { font-family: 'Rajdhani', sans-serif; color: var(--blue-wave); font-size: 28px; font-weight: 700; text-shadow: 0 0 10px var(--blue-wave); }

        .app-content { display: flex; flex: 1; gap: 3vw; min-height: 0; }

        .grid {             
            flex: 1.4; display: grid;             
            grid-template-columns: repeat(5, 1fr);             
            grid-template-rows: repeat(3, 1fr);             
            gap: 12px;         
        }

        /* KAFELEK - STYLIZACJA HUD */
        .tile {            
            background: var(--tile); 
            border: 1px solid var(--border);
            position: relative; overflow: visible; transition: 0.3s;
            display: flex; flex-direction: column; align-items: center; justify-content: center;            
            cursor: pointer;
        }
        
        /* Rogi ramki jak na zdjęciu */
        .tile::before {
            content: ''; position: absolute; inset: -1px;
            border: 1px solid var(--yellow);
            clip-path: polygon(0 0, 15% 0, 15% 2px, 2px 2px, 2px 15%, 0 15%, 0 0, 100% 0, 100% 15%, calc(100% - 2px) 15%, calc(100% - 2px) 2px, 85% 2px, 85% 0, 100% 0, 100% 100%, 85% 100%, 85% calc(100% - 2px), calc(100% - 2px) calc(100% - 2px), calc(100% - 2px) 85%, 100% 85%, 100% 100%, 0 100%, 0 85%, 2px 85%, 2px calc(100% - 2px), 15% calc(100% - 2px), 15% 100%, 0 100%);
            opacity: 0.3;
        }

        .tile .t-top { font-family: 'Rajdhani', sans-serif; font-size: 22px; font-weight: 700; color: #fff; z-index: 2; }        
        .tile .t-bottom { font-size: 11px; font-weight: 600; color: var(--yellow); margin-top: 4px; text-align: center; z-index: 2; text-transform: uppercase; letter-spacing: 1px; }

        /* AKTYWNY KAFELEK */
        .tile.active {             
            border-color: var(--yellow-neon);
            background: rgba(252, 227, 0, 0.08);
            box-shadow: 0 0 20px rgba(252, 227, 0, 0.2), inset 0 0 10px rgba(252, 227, 0, 0.1);
        }        
        .tile.active::before { opacity: 1; filter: drop-shadow(0 0 5px var(--yellow-neon)); }
        .tile.active .t-top { color: var(--yellow-neon); text-shadow: 0 0 10px var(--yellow-neon); }

        .waves {            
            position: absolute; width: 100%; height: 100%;            
            display: flex; align-items: center; justify-content: center;            
            pointer-events: none; opacity: 0; z-index: 1;        
        }        
        .tile.active .waves { opacity: 1; }        
        .wave {            
            position: absolute; border: 2px solid var(--blue-wave); border-radius: 50%;            
            width: 10px; height: 10px; opacity: 0;            
            box-shadow: 0 0 15px var(--blue-wave);            
            animation: ripple 3s infinite linear;        
        }        
        .wave:nth-child(2) { animation-delay: 1s; }        
        .wave:nth-child(3) { animation-delay: 2s; }

        @keyframes ripple {            
            0% { width: 0; height: 0; opacity: 0.9; }            
            100% { width: 320%; height: 320%; opacity: 0; }        
        }

        .sidebar {             
            flex: 0.6; display: flex; flex-direction: column;             
            align-items: center; justify-content: center; gap: 4vh;            
            border-left: 1px solid var(--border); padding-left: 3vw;        
        }

        /* LOGO DISPLAY - STYL BOX ZE ZDJĘCIA */
        .logo-display {            
            width: 100%; max-width: 320px; aspect-ratio: 16/10;            
            border: 2px solid var(--yellow); 
            display: flex; flex-direction: column; align-items: center; justify-content: center;            
            background: rgba(0, 0, 0, 0.9);            
            box-shadow: 0 0 30px rgba(252, 227, 0, 0.2);
            position: relative;
        }        
        .logo-display::before {
            content: 'DATA DECODER'; position: absolute; top: -10px; left: 10px; background: var(--bg);
            padding: 0 5px; font-size: 10px; color: var(--blue-wave); font-family: 'Rajdhani';
        }

        .logo-display h2 { font-family: 'Rajdhani', sans-serif; font-size: 50px; color: var(--yellow); text-shadow: 0 0 20px var(--yellow); }        
        .logo-display p { font-size: 12px; color: var(--blue-wave); font-weight: 700; text-transform: uppercase; letter-spacing: 4px; }

        .controls { display: flex; align-items: center; gap: 3vw; }        
        .c-svg {             
            width: 40px; height: 40px; fill: var(--yellow); cursor: pointer;             
            filter: drop-shadow(0 0 8px var(--yellow));
        }        
        .c-play { width: 80px; height: 80px; fill: var(--yellow-neon); filter: drop-shadow(0 0 15px var(--yellow-neon)); }

        .vol-box { display: flex; align-items: center; gap: 15px; width: 320px; }        
        .vol-btn { width: 40px; height: 40px; border: 2px solid var(--yellow); background: none; color: var(--yellow); cursor: pointer; font-family: 'Rajdhani'; font-weight: bold; font-size: 20px; }        
        .vol-bar { flex: 1; height: 40px; border: 1px solid var(--yellow); display: flex; align-items: center; padding: 0 10px; background: rgba(252, 227, 0, 0.05); position: relative; }                
        
        input[type="range"] { flex: 1; appearance: none; background: transparent; cursor: pointer; }        
        input[type="range"]::-webkit-slider-runnable-track { background: var(--border); height: 4px; }                
        input[type="range"]::-webkit-slider-thumb {             
            appearance: none; width: 12px; height: 24px;             
            background: var(--yellow-neon); border-radius: 0;             
            margin-top: -10px; box-shadow: 0 0 10px var(--yellow-neon);
        }

        @media (max-width: 600px) {
            .grid { grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(5, 1fr); height: 50vh; flex: none; }
            .sidebar { width: 100%; border-left: none; border-top: 1px solid var(--border); padding-top: 20px; }
            .logo-display { height: 100px; }
        }
    </style></head><body>

<header>    <div class="header-info" id="playing-now">SYSTEM: RMF FM</div>    <div class="clock" id="timer">00:00</div></header>

<div class="app-content">    <div class="grid" id="station-grid"></div>
    <aside class="sidebar">        <div class="logo-display">            <h2>RMF FM</h2>            <p>BROADCASTING</p>        </div>
        <div class="controls">            <svg class="c-svg" viewBox="0 0 24 24" onclick="skip(-1)"><path d="M6,18V6H8V18H6M9.5,12L18,6V18L9.5,12Z"/></svg>            <svg class="c-svg c-play" viewBox="0 0 24 24" onclick="toggle()"><path id="p-ico" d="M8,5.14V19.14L19,12.14L8,5.14Z"/></svg>            <svg class="c-svg" viewBox="0 0 24 24" onclick="skip(1)"><path d="M16,18H18V6H16M6,18L14.5,12L6,6V18Z"/></svg>        </div>
        <div class="vol-box">            <button class="vol-btn" onclick="adj(-5)">-</button>            <div class="vol-bar">                <input type="range" id="v-range" min="0" max="100" value="50" oninput="setV(this.value)">            </div>            <button class="vol-btn" onclick="adj(5)">+</button>        </div>    </aside></div>

<audio id="player"></audio>

<script>    
    const STATIONS = [        
        { n: 'RMF FM', s: 'RMF FM', u: 'rmf_fm' },        
        { n: 'RMF MAXXX', s: 'Maxxx', u: 'RMFMAXXX48' },        
        { n: 'RMF 80s', s: '80s', u: 'rmf_80s' },        
        { n: 'RMF 90s', s: '90s', u: 'rmf_90s' },        
        { n: 'RMF 2000', s: '2000', u: 'rmf_2000' },        
        { n: 'RMF CHILLOUT', s: 'Chillout', u: 'rmf_chillout' },        
        { n: 'RMF CLASSIC', s: 'Classic', u: 'rmf_classic' },        
        { n: 'RMF DANCE', s: 'Dance', u: 'rmf_dance' },        
        { n: 'RMF GOLD', s: 'Gold', u: 'rmf_gold' },        
        { n: 'RMF LATINO', s: 'Latino', u: 'rmf_latino' },        
        { n: 'RMF LOVE', s: 'Love', u: 'rmf_love' },        
        { n: 'RMF PARTY', s: 'Party', u: 'rmf_party' },        
        { n: 'RMF POLSKI ROCK', s: 'Polski Rock', u: 'rmf_polski_rock' },        
        { n: 'RMF ROCK', s: 'Rock', u: 'rmf_rock' },        
        { n: 'RMF SMOOTH JAZZ', s: 'Smooth Jazz', u: 'rmf_smooth_jazz' }    
    ];

    const player = document.getElementById('player'), ico = document.getElementById('p-ico'), grid = document.getElementById('station-grid'), vRange = document.getElementById('v-range');    
    let current = -1;

    function clock() {        
        const d = new Date();        
        document.getElementById('timer').textContent = d.getHours().toString().padStart(2,'0') + ":" + d.getMinutes().toString().padStart(2,'0');    
    }    
    setInterval(clock, 1000); clock();

    STATIONS.forEach((s, i) => {        
        const t = document.createElement('div');        
        t.className = 'tile';        
        t.innerHTML = `            
            <div class="waves"><div class="wave"></div><div class="wave"></div><div class="wave"></div></div>            
            <div class="t-top">RMF</div>            
            <div class="t-bottom">${s.s}</div>        `;        
        t.onclick = () => play(i);        
        grid.appendChild(t);    
    });

    function play(i) {        
        current = i;        
        document.querySelectorAll('.tile').forEach((t, idx) => t.classList.toggle('active', idx === i));        
        document.getElementById('playing-now').textContent = "SYSTEM: " + STATIONS[i].n;        
        const streamBase = "https://rs201-krk.rmfstream.pl/";        
        player.src = (STATIONS[i].n === 'RMF MAXXX') ? 'https://rs7-krk2-cyfronet.rmfstream.pl/RMFMAXXX48' : streamBase + STATIONS[i].u;        
        player.play();        
        ico.setAttribute('d', 'M14,19H18V5H14M6,19H10V5H6V19Z');    
    }

    function toggle() {        
        if(player.paused) { player.play(); ico.setAttribute('d', 'M14,19H18V5H14M6,19H10V5H6V19Z'); }        
        else { player.pause(); ico.setAttribute('d', 'M8,5.14V19.14L19,12.14L8,5.14Z'); }    
    }

    function skip(d) { let n = current + d; if(n >= 0 && n < STATIONS.length) play(n); }        
    function setV(v) { player.volume = v / 100; }        
    function adj(d) { vRange.value = parseInt(vRange.value) + d; setV(vRange.value); }
</script></body></html>
