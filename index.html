<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RMF TERMINAL - PRO AUDIO EDITION</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

        :root {
            --panel-bg: #dcdcdc;
            --panel-shadow: #b8b8b8;
            --panel-light: #f5f5f5;
            --orange-led: #ff6600;
            --orange-glow: rgba(255, 102, 0, 0.4);
            --text-dark: #333;
            --display-bg: #1a1a1a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            height: 100vh; width: 100vw; 
            background: #222; color: var(--text-dark); 
            font-family: 'Inter', sans-serif;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; 
        }

        /* GŁÓWNA OBUDOWA WTYCZKI */
        .plugin-container {
            width: 95vw; height: 90vh;
            background: var(--panel-bg);
            border-radius: 8px;
            border: 1px solid #999;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 1px 0 var(--panel-light);
            display: flex; flex-direction: column;
            padding: 15px;
        }

        /* TOP BAR */
        header { 
            height: 40px; display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 15px; padding: 0 10px;
        }
        .brand { font-weight: 800; font-size: 14px; letter-spacing: 1px; color: #555; }
        .preset-display {
            background: var(--display-bg); color: #eee;
            padding: 5px 30px; border-radius: 20px; font-size: 12px;
            border: 1px solid #444; box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
        }

        .app-content { display: flex; flex: 1; gap: 10px; min-height: 0; }

        /* SEKCJE PANELU */
        .section {
            background: var(--panel-bg);
            border-left: 1px solid var(--panel-shadow);
            border-right: 1px solid var(--panel-light);
            padding: 15px; flex: 1;
            display: flex; flex-direction: column; align-items: center;
        }

        /* GRID STACJI JAKO PRZYCISKI HARDWARE */
        .grid { 
            flex: 2; display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            grid-template-rows: repeat(5, 1fr); 
            gap: 10px; padding: 10px;
            background: rgba(0,0,0,0.05); border-radius: 10px;
        }

        .tile {
            background: linear-gradient(145deg, var(--panel-light), var(--panel-shadow));
            border: 1px solid #aaa; border-radius: 6px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 3px 3px 6px #bebebe, -2px -2px 5px #ffffff;
            transition: all 0.1s; position: relative;
        }

        .tile:active {
            box-shadow: inset 2px 2px 5px #bebebe, inset -2px -2px 5px #ffffff;
            transform: translateY(1px);
        }

        .tile .t-top { font-size: 10px; font-weight: 700; color: #888; text-transform: uppercase; margin-bottom: 2px; }
        .tile .t-bottom { font-size: 11px; font-weight: 600; color: #444; text-align: center; }

        /* AKTYWNA STACJA - POMARAŃCZOWA DIODA LED */
        .tile.active {
            border: 1px solid var(--orange-led);
        }
        .tile.active::after {
            content: ''; position: absolute; top: 6px; right: 6px;
            width: 6px; height: 6px; background: var(--orange-led);
            border-radius: 50%; box-shadow: 0 0 8px var(--orange-led);
        }

        /* PRAWA SEKCJA - KONTROLKI */
        .sidebar { flex: 1; gap: 20px; }

        .knob-container {
            display: flex; flex-direction: column; align-items: center; gap: 8px;
        }

        /* WYGLĄD GAŁKI (KNOB) */
        .knob {
            width: 80px; height: 80px;
            background: radial-gradient(circle, #eee 0%, #ccc 100%);
            border-radius: 50%;
            border: 2px solid #bbb;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2), inset 0 2px 2px #fff;
            position: relative;
            display: flex; align-items: center; justify-content: center;
        }
        .knob::before { /* Wskaźnik na gałce */
            content: ''; position: absolute; top: 10px; width: 4px; height: 10px;
            background: var(--orange-led); border-radius: 2px;
        }

        .knob-value {
            font-size: 16px; font-weight: 700; color: #444;
        }

        /* SUWAKI GAIN */
        .fader-container {
            display: flex; gap: 20px; height: 150px; align-items: center;
            background: #c5c5c5; padding: 15px; border-radius: 4px;
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.1);
        }
        .fader-track {
            width: 12px; height: 100%; background: #111; border-radius: 6px;
            position: relative; display: flex; justify-content: center;
        }
        .fader-cap {
            width: 24px; height: 40px; background: #eee; border-radius: 3px;
            border: 1px solid #999; position: absolute; bottom: 50%;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        /* FOOTER */
        footer {
            height: 30px; border-top: 1px solid #bbb;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 10px; font-size: 10px; color: #888; font-weight: 700;
        }

        .waves { display: none; } /* Usuwamy fale dla czystości stylu PRO */
    </style>
</head>
<body>

<div class="plugin-container">
    <header>
        <div class="brand">RMF ● TERMINAL</div>
        <div class="preset-display" id="playing-now">DEFAULT PRESET *</div>
        <div style="display:flex; gap:10px;">
            <div style="width:12px; height:12px; background:var(--orange-led); border-radius:50%; box-shadow:0 0 5px var(--orange-led);"></div>
            <div id="timer" style="font-size:12px; font-weight:700;">00:00</div>
        </div>
    </header>

    <div class="app-content">
        <!-- LEWA SEKCJA: WYBÓR STACJI -->
        <div class="section">
            <div style="font-size:10px; font-weight:800; margin-bottom:10px; color:#999; letter-spacing:2px;">STATION SELECTOR</div>
            <div class="grid" id="station-grid"></div>
        </div>

        <!-- PRAWA SEKCJA: MASTER CONTROLS -->
        <div class="section sidebar">
            <div class="knob-container">
                <div style="font-size:10px; font-weight:800; color:#999;">MAIN VOLUME</div>
                <div class="knob">
                    <div class="knob-value" id="v-val">50%</div>
                </div>
                <input type="range" id="v-range" min="0" max="100" value="50" oninput="setV(this.value)" style="width:100px;">
            </div>

            <div style="font-size:10px; font-weight:800; color:#999;">GAIN STAGING</div>
            <div class="fader-container">
                <div class="fader-track"><div class="fader-cap"></div></div>
                <div class="fader-track"><div class="fader-cap" style="bottom: 30%; border-color: var(--orange-led);"></div></div>
            </div>

            <button onclick="toggle()" style="padding:10px 30px; border-radius:4px; border:1px solid #999; background:linear-gradient(#eee, #ccc); font-weight:800; cursor:pointer;">
                POWER / BYPASS
            </button>
        </div>
    </div>

    <footer>
        <div>PROCESS.AUDIO BY RMF</div>
        <div>TRIM: 100.0% | MS MODE: ENCODE</div>
    </footer>
</div>

<audio id="player"></audio>

<script>
    const STATIONS = [
        { n: 'RMF FM', s: 'RMF FM', u: 'rmf_fm' },
        { n: 'RMF MAXXX', s: 'Maxxx', u: 'RMFMAXXX48' },
        { n: 'RMF 80s', s: '80s', u: 'rmf_80s' },
        { n: 'RMF 90s', s: '90s', u: 'rmf_90s' },
        { n: 'RMF 2000', s: '2000', u: 'rmf_2000' },
        { n: 'RMF CHILLOUT', s: 'Chill', u: 'rmf_chillout' },
        { n: 'RMF CLASSIC', s: 'Classic', u: 'rmf_classic' },
        { n: 'RMF DANCE', s: 'Dance', u: 'rmf_dance' },
        { n: 'RMF GOLD', s: 'Gold', u: 'rmf_gold' },
        { n: 'RMF LATINO', s: 'Latino', u: 'rmf_latino' },
        { n: 'RMF LOVE', s: 'Love', u: 'rmf_love' },
        { n: 'RMF PARTY', s: 'Party', u: 'rmf_party' },
        { n: 'RMF POLSKI ROCK', s: 'P-Rock', u: 'rmf_polski_rock' },
        { n: 'RMF ROCK', s: 'Rock', u: 'rmf_rock' },
        { n: 'RMF SMOOTH JAZZ', s: 'Jazz', u: 'rmf_smooth_jazz' }
    ];

    const player = document.getElementById('player'), grid = document.getElementById('station-grid');
    let current = -1;

    function clock() {
        const d = new Date();
        document.getElementById('timer').textContent = d.getHours().toString().padStart(2,'0') + ":" + d.getMinutes().toString().padStart(2,'0');
    }
    setInterval(clock, 1000); clock();

    STATIONS.forEach((s, i) => {
        const t = document.createElement('div');
        t.className = 'tile';
        t.innerHTML = `
            <div class="t-top">STATION ${i+1}</div>
            <div class="t-bottom">${s.s}</div>
        `;
        t.onclick = () => play(i);
        grid.appendChild(t);
    });

    function play(i) {
        current = i;
        document.querySelectorAll('.tile').forEach((t, idx) => t.classList.toggle('active', idx === i));
        document.getElementById('playing-now').textContent = STATIONS[i].n + " [ONLINE]";
        
        const streamBase = "https://rs201-krk.rmfstream.pl/";
        player.src = (STATIONS[i].n === 'RMF MAXXX') ? 'https://rs7-krk2-cyfronet.rmfstream.pl/RMFMAXXX48' : streamBase + STATIONS[i].u;
        player.play();
    }

    function toggle() {
        player.paused ? player.play() : player.pause();
    }

    function setV(v) { 
        player.volume = v / 100;
        document.getElementById('v-val').textContent = v + "%";
        document.querySelector('.knob').style.transform = `rotate(${(v*2.4)-120}deg)`;
    }
</script>
</body>
</html>
