<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>L.A.B. RADIO - AUDIZIO STYLE</title>
    <link href="https://fonts.cdnfonts.com/css/ds-digital" rel="stylesheet">
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow: hidden;
        }

        /* Obudowa - Proporcje Audizio ze zdjęcia */
        .radio-body {
            width: 850px;
            height: 380px;
            background: #111;
            border-radius: 45px;
            padding: 15px;
            box-shadow: 0 50px 100px rgba(0,0,0,0.9), inset 0 0 40px #000;
            position: relative;
            border: 2px solid #222;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Głośniki - Duże, dominujące po bokach */
        .speaker {
            width: 260px;
            height: 260px;
            border-radius: 50%;
            background: radial-gradient(circle, #1a1a1a 0%, #050505 80%);
            border: 8px solid #181818;
            box-shadow: inset 0 0 50px #000, 0 10px 20px rgba(0,0,0,0.5);
            position: relative;
        }
        .speaker::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 50%;
            background-image: radial-gradient(#222 1px, transparent 1px);
            background-size: 4px 4px;
            opacity: 0.4;
        }

        /* Panel środkowy */
        .center-panel {
            width: 280px;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        /* Wyświetlacz - Kolor tła jak podświetlenie LAB */
        .display-unit {
            width: 220px;
            height: 90px;
            background: #1a0000; /* Ciemnoczerwone tło */
            border: 3px solid #222;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }
        .powered .display-unit {
            background: #e60012; /* Jasnoczerwone tło po włączeniu */
            box-shadow: 0 0 20px rgba(230, 0, 18, 0.4);
        }

        .info-text {
            font-family: 'DS-Digital', monospace;
            color: #300;
            text-align: center;
            line-height: 1.1;
        }
        .powered .info-text { color: #fff; text-shadow: 1px 1px 2px #000; }
        
        .st-name { font-size: 20px; font-weight: bold; }
        .st-date { font-size: 14px; margin-top: 5px; }
        .st-time { font-size: 24px; margin-top: 2px; }

        /* Przyciski - Układ prostokątny Audizio */
        .btn-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 5px;
            margin-bottom: 15px;
        }
        .btn-rect {
            width: 42px;
            height: 18px;
            background: #222;
            border: 1px solid #333;
            border-radius: 2px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-rect svg { width: 12px; fill: #444; }
        .powered .btn-rect.active svg { fill: #fff; filter: drop-shadow(0 0 5px #fff); }

        /* Sekcja Głośności - Zdjęcie nr 1 */
        .vol-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }
        .vol-btns { display: flex; gap: 10px; }
        .vol-btn {
            width: 50px;
            height: 35px;
            background: #181818;
            border: 1px solid #333;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .vol-btn svg { width: 16px; fill: #666; }

        .vol-indicator-bar {
            width: 110px;
            height: 6px;
            background: #080808;
            border-radius: 3px;
            overflow: hidden;
            border: 1px solid #222;
        }
        .vol-fill {
            width: 50%;
            height: 100%;
            background: #e60012;
            box-shadow: 0 0 10px #e60012;
            transition: width 0.2s;
            opacity: 0;
        }
        .powered .vol-fill { opacity: 1; }

        /* Branding */
        .lab-brand {
            font-family: 'DS-Digital', monospace;
            font-size: 28px;
            color: #222;
            margin-top: 15px;
        }
        .powered .lab-brand { color: #e60012; text-shadow: 0 0 10px #e60012; }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="radio-body" id="shell">
    <div class="speaker"></div>

    <div class="center-panel">
        <div class="lab-brand">L.A.B. RADIO</div>
        
        <div class="display-unit">
            <div class="info-text">
                <div class="st-name" id="stationName">STATION OFF</div>
                <div class="st-time" id="clock">00:00</div>
                <div class="st-date" id="date">01-01-2026</div>
            </div>
        </div>

        <div class="btn-grid">
            <div id="pwr" class="btn-rect"><svg viewBox="0 0 24 24"><path d="M13,3h-2v10h2V3z M17.8,4.5l-1.4,1.4C18.3,7.4,19,9.6,19,12c0,3.9-3.1,7-7,7s-7-3.1-7-7c0-2.4,0.7-4.6,2.6-6.1L6.2,4.5 C3.6,6.4,2,9.5,2,13c0,5.5,4.5,10,10,10s10-4.5,10-10C22,9.5,20.4,6.4,17.8,4.5z"/></svg></div>
            <div id="play" class="btn-rect"><svg viewBox="0 0 24 24"><path d="M8,5.14V19.14L19,12.14L8,5.14Z"/></svg></div>
            <div id="stop" class="btn-rect"><svg viewBox="0 0 24 24"><path d="M6,6H18V18H6V6Z"/></svg></div>
            <div id="mute" class="btn-rect"><svg viewBox="0 0 24 24"><path d="M3,9V15H7L12,20V4L7,9H3M16.5,12C16.5,10.23 15.48,8.71 14,8V16C15.48,15.29 16.5,13.77 16.5,12M14,3.23V5.29C16.89,6.15 19,8.83 19,12C19,15.17 16.89,17.85 14,18.71V20.77C18.01,19.86 21,16.28 21,12C21,7.72 18.01,4.14 14,3.23Z"/></svg></div>
            <div class="btn-rect"><svg viewBox="0 0 24 24"><path d="M12,8L10.59,9.41L13.17,12L10.59,14.59L12,16L16,12L12,8Z"/></svg></div>
        </div>

        <div class="vol-section">
            <div class="vol-btns">
                <div id="vDn" class="vol-btn"><svg viewBox="0 0 24 24"><path d="M19,13H5V11H19V13Z"/></svg></div>
                <div id="vUp" class="vol-btn"><svg viewBox="0 0 24 24"><path d="M19,13H13V19H11V13H5V11H11V5H13V11H19V13Z"/></svg></button>
            </div>
            <div class="vol-indicator-bar"><div id="vFill" class="vol-fill"></div></div>
        </div>
    </div>

    <div class="speaker"></div>
</div>

<audio id="stream" crossorigin="anonymous" src="https://stream.rcs.revma.com/gzwc1xcq042vv"></audio>

<script>
    const audio = document.getElementById('stream');
    const shell = document.getElementById('shell');
    const pwrBtn = document.getElementById('pwr');
    const vFill = document.getElementById('vFill');
    const stationName = document.getElementById('stationName');
    
    let isOn = false;

    // Funkcja aktualizacji czasu i daty
    function updateDateTime() {
        const now = new Date();
        document.getElementById('clock').textContent = now.toLocaleTimeString('pl-PL', {hour: '2-digit', minute:'2-digit'});
        document.getElementById('date').textContent = now.toLocaleDateString('pl-PL');
    }
    setInterval(updateDateTime, 1000);
    updateDateTime();

    // ORYGINALNE FUNKCJE PRZYCISKÓW
    pwrBtn.onclick = () => {
        isOn = !isOn;
        shell.classList.toggle('powered');
        pwrBtn.classList.toggle('active');
        stationName.textContent = isOn ? "MUZYCZNE RADIO" : "STATION OFF";
        if(!isOn) { audio.pause(); document.getElementById('play').classList.remove('active'); }
    };

    document.getElementById('play').onclick = function() {
        if(!isOn) return;
        audio.play();
        this.classList.add('active');
    };

    document.getElementById('stop').onclick = () => {
        audio.pause(); audio.currentTime = 0;
        document.getElementById('play').classList.remove('active');
    };

    document.getElementById('mute').onclick = function() {
        audio.muted = !audio.muted;
        this.classList.toggle('active');
    };

    document.getElementById('vUp').onclick = () => { 
        audio.volume = Math.min(1, audio.volume + 0.1); 
        vFill.style.width = (audio.volume * 100) + '%';
    };
    
    document.getElementById('vDn').onclick = () => { 
        audio.volume = Math.max(0, audio.volume - 0.1); 
        vFill.style.width = (audio.volume * 100) + '%';
    };

    // Inicjalizacja głośności
    vFill.style.width = (audio.volume * 100) + '%';
</script>

</body>
</html>
