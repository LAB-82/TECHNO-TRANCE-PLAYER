<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RMF TERMINAL - CRYSTALLINE STYLE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat+Alternates:wght@400;600;700&display=swap');

        :root {
            --bg: #e0e0e0;
            --tile: #e0e0e0;
            --text-main: #333;
            --text-sub: #666;
            --shadow-out: 6px 6px 12px #bebebe, -6px -6px 12px #ffffff;
            --shadow-in: inset 6px 6px 12px #bebebe, inset -6px -6px 12px #ffffff;
            --border-light: 1px solid rgba(255,255,255,0.5);
            --color-active: #ff4081;
            --color-wave: #00e5ff;
            --accent-green: #00e676;
            --accent-orange: #ff9100;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        
        html, body { 
            height: 100vh; width: 100vw; 
            background: var(--bg); color: var(--text-main); 
            font-family: 'Montserrat Alternates', sans-serif;
            overflow: hidden; 
        }

        body { display: flex; flex-direction: column; padding: 2vh; }

        header { 
            height: 50px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(0,0,0,0.05); margin-bottom: 2vh; flex-shrink: 0;
            background: rgba(255,255,255,0.3); border-radius: 10px; padding: 0 15px;
            box-shadow: var(--shadow-out);
        }
        
        /* PODŚWIETLANY NAPIS */
        .header-info { 
            font-size: 20px; font-weight: 700; color: var(--text-sub); 
            text-transform: uppercase; letter-spacing: 1px;
            transition: all 0.3s;
        }
        .powered .header-info {
            color: var(--color-active);
            text-shadow: 0 0 10px var(--color-active);
        }

        .clock { color: var(--text-sub); font-size: 20px; font-weight: 600; }

        .app-content { display: flex; flex: 1; gap: 3vw; min-height: 0; padding: 10px 0; }
        .grid { 
            flex: 1.4; display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            grid-template-rows: repeat(3, 1fr); 
            gap: 15px; 
        }

        .tile {
            background: var(--tile); border-radius: 15px;
            border: var(--border-light);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; position: relative; overflow: visible;
            box-shadow: var(--shadow-out);
            transition: all 0.2s ease;
            opacity: 0.6; pointer-events: none; /* Blokada przed Power On */
        }
        .powered .tile { opacity: 1; pointer-events: auto; }
        
        .tile:hover { box-shadow: 4px 4px 8px #bebebe, -4px -4px 8px #ffffff; }
        .tile .t-top { font-size: 20px; font-weight: 700; color: var(--text-main); line-height: 1; z-index: 2; transition: color 0.2s; }
        .tile .t-bottom { font-size: 13px; font-weight: 600; color: var(--text-sub); margin-top: 5px; text-align: center; z-index: 2; }

        .tile.active { 
            box-shadow: var(--shadow-in);
            background: #dcdcdc;
        }
        .tile.active .t-top { color: var(--color-active); }

        .waves {
            position: absolute; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            pointer-events: none; opacity: 0; z-index: 1;
        }
        .tile.active .waves { opacity: 0.6; }
        .wave {
            position: absolute; border: 2px solid var(--color-wave); border-radius: 50%;
            width: 10px; height: 10px; opacity: 0;
            box-shadow: 0 0 10px var(--color-wave);
            animation: ripple 3s infinite linear;
        }
        @keyframes ripple {
            0% { width: 0; height: 0; opacity: 0.8; }
            100% { width: 250%; height: 250%; opacity: 0; }
        }

        .sidebar { 
            flex: 0.6; display: flex; flex-direction: column; 
            align-items: center; justify-content: flex-start; gap: 3vh;
            padding: 20px;
            background: rgba(255,255,255,0.3);
            border-radius: 20px;
            box-shadow: var(--shadow-out);
            border: var(--border-light);
        }

        .logo-display {
            width: 100%; max-width: 320px; aspect-ratio: 16/9;
            border-radius: 15px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #ccc; /* Wyłączony display */
            box-shadow: var(--shadow-in);
            position: relative; overflow: hidden; border: 2px solid #fff;
            transition: all 0.5s;
        }
        .powered .logo-display {
            background: linear-gradient(135deg, #ff9100 0%, #ff4081 50%, #00e5ff 100%);
        }

        .logo-display h2 { font-size: 40px; color: #999; z-index: 2; position: relative; }
        .powered .logo-display h2 { color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.2); }

        .controls { display: flex; align-items: center; gap: 1vw; background: rgba(255,255,255,0.3); padding: 10px 15px; border-radius: 50px; box-shadow: var(--shadow-in); }
        .c-svg { width: 24px; height: 24px; fill: #999; cursor: pointer; transition: all 0.2s; }
        .powered .c-svg { fill: var(--text-sub); }
        .c-svg:hover { transform: scale(1.1); }
        
        .btn-active { fill: var(--color-active) !important; filter: drop-shadow(0 0 5px var(--color-active)); }

        .c-play { 
            width: 50px; height: 50px; fill: #999; 
            background: var(--tile); border-radius: 50%; padding: 12px;
            box-shadow: var(--shadow-out); border: var(--border-light);
        }

        .vol-box { display: flex; align-items: center; gap: 10px; width: 100%; max-width: 320px; }
        .vol-btn { 
            width: 35px; height: 35px; border: var(--border-light); border-radius: 10px; 
            background: var(--tile); color: #999; cursor: pointer; 
            font-family: inherit; font-weight: bold; font-size: 18px;
            box-shadow: var(--shadow-out); transition: all 0.2s;
        }
        .powered .vol-btn { color: var(--text-main); }
        .vol-bar { flex: 1; height: 35px; border: var(--border-light); border-radius: 10px; padding: 0 10px; display: flex; align-items: center; background: var(--tile); box-shadow: var(--shadow-in); }
        input[type="range"] { flex: 1; appearance: none; background: transparent; cursor: pointer; opacity: 0.3; }
        .powered input[type="range"] { opacity: 1; }
        input[type="range"]::-webkit-slider-thumb { appearance: none; width: 20px; height: 20px; background: var(--tile); border-radius: 50%; border: var(--border-light); box-shadow: 2px 2px 5px #bebebe; }

        @media (max-width: 600px) {
            .grid { grid-template-columns: repeat(3, 1fr); height: 50vh; }
            .sidebar { width: 100%; }
            .controls { gap: 15px; }
        }
    </style>
</head>
<body>

<header id="main-header">
    <div class="header-info" id="playing-now">SYSTEM READY</div>
    <div class="clock" id="timer">00:00</div>
</header>

<div class="app-content">
    <div class="grid" id="station-grid"></div>

    <aside class="sidebar">
        <div class="logo-display">
            <h2 id="side-n">OFF</h2>
            <p id="side-s">Power to start</p>
        </div>

        <div class="controls">
            <!-- POWER -->
            <svg class="c-svg" id="btn-pwr" viewBox="0 0 24 24" onclick="togglePower()"><path d="M13,3h-2v10h2V3z M17.8,4.5l-1.4,1.4C18.3,7.4,19,9.6,19,12c0,3.9-3.1,7-7,7s-7-3.1-7-7c0-2.4,0.7-4.6,2.6-6.1L6.2,4.5 C3.6,6.4,2,9.5,2,13c0,5.5,4.5,10,10,10s10-4.5,10-10C22,9.5,20.4,6.4,17.8,4.5z"/></svg>
            <!-- STOP -->
            <svg class="c-svg" viewBox="0 0 24 24" onclick="stopAudio()"><path d="M6,6H18V18H6V6Z"/></svg>
            <!-- PLAY/PAUSE -->
            <svg class="c-svg c-play" viewBox="0 0 24 24" onclick="toggle()"><path id="p-ico" d="M8,5.14V19.14L19,12.14L8,5.14Z"/></svg>
            <!-- MUTE -->
            <svg class="c-svg" id="btn-mute" viewBox="0 0 24 24" onclick="toggleMute()"><path id="mute-path" d="M3,9V15H7L12,20V4L7,9H3M16.5,12C16.5,10.23 15.48,8.71 14,8V16C15.48,15.29 16.5,13.77 16.5,12M14,3.23V5.29C16.89,6.15 19,8.83 19,12C19,15.17 16.89,17.85 14,18.71V20.77C18.01,19.86 21,16.28 21,12C21,7.72 18.01,4.14 14,3.23Z"/></svg>
        </div>

        <div class="vol-box">
            <button class="vol-btn" onclick="adj(-5)">-</button>
            <div class="vol-bar">
                <input type="range" id="v-range" min="0" max="100" value="50" oninput="setV(this.value)">
            </div>
            <button class="vol-btn" onclick="adj(5)">+</button>
        </div>
    </aside>
</div>

<audio id="player"></audio>

<script>
    const STATIONS = [
        { n: 'RMF FM', s: 'RMF FM', u: 'rmf_fm' },
        { n: 'RMF MAXXX', s: 'Maxxx', u: 'RMFMAXXX48' },
        { n: 'RMF 80s', s: '80s', u: 'rmf_80s' },
        { n: 'RMF 90s', s: '90s', u: 'rmf_90s' },
        { n: 'RMF 2000', s: '2000', u: 'rmf_2000' },
        { n: 'RMF CHILLOUT', s: 'Chillout', u: 'rmf_chillout' },
        { n: 'RMF CLASSIC', s: 'Classic', u: 'rmf_classic' },
        { n: 'RMF DANCE', s: 'Dance', u: 'rmf_dance' },
        { n: 'RMF GOLD', s: 'Gold', u: 'rmf_gold' },
        { n: 'RMF LATINO', s: 'Latino', u: 'rmf_latino' },
        { n: 'RMF LOVE', s: 'Love', u: 'rmf_love' },
        { n: 'RMF PARTY', s: 'Party', u: 'rmf_party' },
        { n: 'RMF POLSKI ROCK', s: 'Polski Rock', u: 'rmf_polski_rock' },
        { n: 'RMF ROCK', s: 'Rock', u: 'rmf_rock' },
        { n: 'RMF SMOOTH JAZZ', s: 'Smooth Jazz', u: 'rmf_smooth_jazz' }
    ];

    const ICON_MUTE_ON = "M4.33,3L3.05,4.27L7.78,9H3V15H7L12,20V13.22L16.25,17.47C15.58,17.98 14.83,18.4 14,18.64V21.07C15.5,20.78 16.89,20.09 18.05,19.15L20.72,21.82L22,20.55L4.33,3M16.5,12C16.5,10.23 15.5,8.71 14,8V10.18L16.45,12.63C16.5,12.43 16.5,12.22 16.5,12M19,12C19,12.94 18.8,13.82 18.46,14.64L20.28,16.46C20.74,15.11 21,13.6 21,12C21,7.72 18,4.14 14,3.23V5.7C16.89,6.56 19,9.11 19,12Z";
    const ICON_MUTE_OFF = "M3,9V15H7L12,20V4L7,9H3M16.5,12C16.5,10.23 15.48,8.71 14,8V16C15.48,15.29 16.5,13.77 16.5,12M14,3.23V5.29C16.89,6.15 19,8.83 19,12C19,15.17 16.89,17.85 14,18.71V20.77C18.01,19.86 21,16.28 21,12C21,7.72 18.01,4.14 14,3.23Z";

    const player = document.getElementById('player'), ico = document.getElementById('p-ico'), grid = document.getElementById('station-grid'), vRange = document.getElementById('v-range');
    let current = -1, isPwr = false;

    function clock() {
        const d = new Date();
        document.getElementById('timer').textContent = d.getHours().toString().padStart(2,'0') + ":" + d.getMinutes().toString().padStart(2,'0');
    }
    setInterval(clock, 1000); clock();

    STATIONS.forEach((s, i) => {
        const t = document.createElement('div');
        t.className = 'tile';
        t.innerHTML = `<div class="waves"><div class="wave"></div><div class="wave"></div></div><div class="t-top">RMF FM</div><div class="t-bottom">${s.s}</div>`;
        t.onclick = () => { if(isPwr) play(i); };
        grid.appendChild(t);
    });

    function togglePower() {
        isPwr = !isPwr;
        document.body.classList.toggle('powered');
        document.getElementById('btn-pwr').classList.toggle('btn-active');
        if(!isPwr) {
            stopAudio();
            document.getElementById('playing-now').textContent = "SYSTEM READY";
            document.getElementById('side-n').textContent = "OFF";
        } else {
            document.getElementById('playing-now').textContent = "SELECT STATION";
        }
    }

    function play(i) {
        if(!isPwr) return;
        current = i;
        document.querySelectorAll('.tile').forEach((t, idx) => t.classList.toggle('active', idx === i));
        document.getElementById('playing-now').textContent = "GRA: " + STATIONS[i].n;
        document.getElementById('side-n').textContent = STATIONS[i].s;
        
        const streamBase = "https://rs201-krk.rmfstream.pl/";
        player.src = (STATIONS[i].n === 'RMF MAXXX') ? 'https://rs7-krk2-cyfronet.rmfstream.pl/RMFMAXXX48' : streamBase + STATIONS[i].u;
        player.play();
        ico.setAttribute('d', 'M14,19H18V5H14M6,19H10V5H6V19Z');
    }

    function toggle() {
        if(!isPwr) return;
        if(player.paused) { 
            if(current === -1) play(0); else player.play(); 
            ico.setAttribute('d', 'M14,19H18V5H14M6,19H10V5H6V19Z'); 
        } else { 
            player.pause(); 
            ico.setAttribute('d', 'M8,5.14V19.14L19,12.14L8,5.14Z'); 
        }
    }

    function stopAudio() {
        player.pause(); player.currentTime = 0;
        ico.setAttribute('d', 'M8,5.14V19.14L19,12.14L8,5.14Z');
        document.querySelectorAll('.tile').forEach(t => t.classList.remove('active'));
    }

    function toggleMute() {
        if(!isPwr) return;
        player.muted = !player.muted;
        document.getElementById('mute-path').setAttribute('d', player.muted ? ICON_MUTE_ON : ICON_MUTE_OFF);
        document.getElementById('btn-mute').classList.toggle('btn-active', player.muted);
    }

    function setV(v) { player.volume = v / 100; }
    function adj(d) { vRange.value = parseInt(vRange.value) + d; setV(vRange.value); }
    setV(vRange.value);
</script>
</body>
</html>
