<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TECHNO_TRANCE_PCB_PRO_V6_FIXED</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@300;600&display=swap');

        :root {
            --laminat: #020503;
            --miedz: #1a3a2a;
            --neon: #00f2ff;
            --gold: #b8a033;
            --chip-body: #111111;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--laminat); 
            color: var(--neon);
            font-family: 'JetBrains Mono', monospace;
            overflow: hidden;
        }

        /* TŁO PCB - GĘSTE ŚCIEŻKI */
        #pcb-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0; opacity: 0.4; pointer-events: none;
        }

        .main-interface { display: flex; height: 100vh; position: relative; z-index: 2; }

        /* OBSZAR UKŁADÓW */
        .motherboard { 
            flex: 2; position: relative; 
            background: radial-gradient(circle at 50% 50%, #051008 0%, #020503 100%);
        }

        /* REALISTYCZNY UKŁAD SCALONY (IC) */
        .ic-chip {
            position: absolute; width: 160px; height: 80px;
            background: var(--chip-body); border-radius: 2px;
            cursor: pointer; box-shadow: 10px 15px 30px rgba(0,0,0,0.8);
            border-top: 1px solid #333; border-left: 1px solid #222;
        }

        /* Nóżki układu (Pins) - poprawione na gęstsze zgodnie z foto */
        .ic-chip::before {
            content: ''; position: absolute; top: -12px; left: 8px; right: 8px; bottom: -12px;
            background: repeating-linear-gradient(90deg, 
                #444 0px, #888 2px, #444 4px, 
                transparent 4px, transparent 10px);
            z-index: -1;
        }

        /* Wycięcie techniczne (Notch) */
        .notch {
            position: absolute; left: 0; top: 50%; transform: translateY(-50%);
            width: 12px; height: 20px; background: var(--laminat);
            border-radius: 0 10px 10px 0; border: 1px solid #222;
        }

        .chip-label {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100%; pointer-events: none;
        }

        .chip-id { font-family: 'Orbitron'; font-size: 11px; color: var(--gold); font-weight: 700; }
        .chip-spec { font-size: 7px; color: #444; margin-top: 5px; text-transform: uppercase; }

        .ic-chip.active {
            border-color: var(--neon);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.4);
        }

        /* PANEL KONTROLNY */
        .control-tower { 
            flex: 0.8; background: rgba(0,0,0,0.9); border-left: 3px solid #111;
            display: flex; flex-direction: column; 
        }

        .hud-header { padding: 25px; border-bottom: 2px solid #ff0055; font-family: 'Orbitron'; letter-spacing: 2px; }
        .terminal { 
            margin: 20px; padding: 15px; background: #000; flex: 1; 
            border: 1px solid #1a1a1a; font-size: 12px; color: #39ff14; 
            box-shadow: inset 0 0 10px rgba(57, 255, 20, 0.1);
        }

        .btn-matrix { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 20px; }
        .hw-btn {
            background: #080808; border: 1px solid #222; color: var(--neon);
            padding: 15px; cursor: pointer; font-family: 'Orbitron'; font-size: 11px;
            transition: 0.2s;
        }
        .hw-btn:hover { background: var(--neon); color: #000; box-shadow: 0 0 15px var(--neon); }

        .slider-wrap { padding: 30px; }
        input[type=range] { -webkit-appearance: none; width: 100%; background: #111; height: 4px; }
        input[type=range]::-webkit-slider-thumb { 
            -webkit-appearance: none; width: 20px; height: 35px; background: #ff0055; cursor: pointer; 
            border: 1px solid #000; box-shadow: 0 0 10px rgba(255, 0, 85, 0.5);
        }

        /* ANIMACJA PRZEPŁYWU PRĄDU PO ŚCIEŻCE */
        .flow-effect {
            stroke-dasharray: 10, 30;
            stroke: #fff;
            stroke-width: 3;
            filter: blur(1px) drop-shadow(0 0 5px var(--neon));
            animation: flow 1.5s linear infinite;
            display: none;
        }

        @keyframes flow {
            from { stroke-dashoffset: 100; }
            to { stroke-dashoffset: 0; }
        }
    </style>
</head>
<body>

<svg id="pcb-bg"></svg>

<div class="main-interface">
    <div class="motherboard" id="board">
        <!-- Generowane przez JS -->
    </div>

    <aside class="control-tower">
        <div class="hud-header">SYSTEM_AUDIT: OK</div>
        <div class="terminal" id="term-out">> LINK_STABLISHED...<br>> WAITING_FOR_IO</div>
        <div class="btn-matrix">
            <button class="hw-btn" onclick="skip(-1)">PREV</button>
            <button class="hw-btn" onclick="toggle()" style="border-color:#ff0055">SYNC</button>
            <button class="hw-btn" onclick="skip(1)">NEXT</button>
        </div>
        <div class="slider-wrap">
            <input type="range" min="0" max="1" step="0.01" value="0.5" oninput="setV(this.value)">
        </div>
    </aside>
</div>

<audio id="player" crossorigin="anonymous"></audio>

<script>
    const STATIONS = [
        { n: 'TECH 88', u: 'https://laut.fm/tech88', x: 8, y: 12 },
        { n: 'HR3 CLUB', u: 'https://laut.fm/hr3_clubnight', x: 42, y: 10 },
        { n: '1000 TECHNO', u: 'https://laut.fm/1000techno', x: 12, y: 38 },
        { n: 'GEHIRN TREIBER', u: 'https://laut.fm/gehirn-treiber-beat-radio', x: 45, y: 45 },
        { n: 'BEST OF TECHNO', u: 'https://laut.fm/best-of-techno', x: 10, y: 72 },
        { n: 'CHRIS BURN', u: 'https://laut.fm/chris_burn', x: 50, y: 78 },
        { n: 'DEEP HOUSE', u: 'https://laut.fm/deep-house-sounds', x: 75, y: 10 },
        { n: 'HOUSEBOMB', u: 'https://laut.fm/housebomb-fn', x: 72, y: 45 },
        { n: 'SYMBIOTIC', u: 'https://laut.fm/symbiotic-beats', x: 75, y: 75 }
    ];

    const svg = document.getElementById('pcb-bg');
    const board = document.getElementById('board');
    const player = document.getElementById('player');
    const term = document.getElementById('term-out');
    let currentIdx = -1;

    function buildHardware() {
        let traceHTML = "";
        for(let i=0; i<300; i++) {
            const x1 = Math.random()*100;
            const y1 = Math.random()*100;
            traceHTML += `<path d="M ${x1} ${y1} L ${x1+2} ${y1+2}" stroke="#0a1a10" stroke-width="0.1" fill="none"/>`;
            if(i % 5 === 0) traceHTML += `<circle cx="${x1}" cy="${y1}" r="0.2" fill="#11331a"/>`;
        }
        svg.innerHTML = traceHTML;

        STATIONS.forEach((s, i) => {
            const ic = document.createElement('div');
            ic.className = 'ic-chip';
            ic.style.left = s.x + '%'; ic.style.top = s.y + '%';
            ic.id = `ic-${i}`;
            ic.innerHTML = `<div class="notch"></div><div class="chip-label">
                <span class="chip-id">${s.n}</span>
                <span class="chip-spec">VOLTAGE_BUS_0${i} / 74HC${100+i}</span>
            </div>`;
            ic.onclick = () => mount(i);
            board.appendChild(ic);
        });
        drawActiveTraces();
    }

    function drawActiveTraces() {
        const panelX = window.innerWidth * 0.7;
        STATIONS.forEach((s, i) => {
            const el = document.getElementById(`ic-${i}`);
            const r = el.getBoundingClientRect();
            const x = r.left + r.width;
            const y = r.top + r.height/2;

            const dPath = `M ${x} ${y} L ${x+40} ${y} L ${x+60} ${y+(i*12-50)} L ${panelX} ${y+(i*12-50)}`;
            
            // Podstawowa ścieżka miedziana
            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            path.setAttribute("d", dPath);
            path.setAttribute("stroke", "var(--miedz)");
            path.setAttribute("stroke-width", "2");
            path.setAttribute("fill", "none");
            path.id = `line-${i}`;
            svg.appendChild(path);

            // Dodatkowa warstwa animowanego "światełka"
            const flow = document.createElementNS("http://www.w3.org/2000/svg", "path");
            flow.setAttribute("d", dPath);
            flow.setAttribute("class", "flow-effect");
            flow.id = `flow-${i}`;
            flow.setAttribute("fill", "none");
            svg.appendChild(flow);
        });
    }

    function mount(i) {
        currentIdx = i;
        document.querySelectorAll('.ic-chip').forEach((c, idx) => c.classList.toggle('active', idx === i));
        
        // Resetowanie wszystkich ścieżek
        document.querySelectorAll('path').forEach(p => {
            if(p.id.startsWith('line-')) {
                p.setAttribute('stroke', 'var(--miedz)');
                p.style.filter = 'none';
            }
            if(p.id.startsWith('flow-')) {
                p.style.display = 'none';
            }
        });

        // Aktywacja konkretnej ścieżki i światełka
        const activeLine = document.getElementById(`line-${i}`);
        const activeFlow = document.getElementById(`flow-${i}`);
        if(activeLine && activeFlow) {
            activeLine.setAttribute('stroke', 'var(--neon)');
            activeLine.style.filter = 'drop-shadow(0 0 8px var(--neon))';
            activeFlow.style.display = 'block';
        }

        term.innerHTML = `> ACCESSING_CHIP: 0x${i.toString(16).toUpperCase()}<br>> NAME: ${STATIONS[i].n}<br>> DATA_FLOW: STABLE<br>> STREAM: CONNECTING...`;
        
        player.pause();
        player.src = ""; 
        player.src = STATIONS[i].u;
        player.load();
        player.play().then(() => {
            term.innerHTML += `<br>> STATUS: SYNC_LOCKED`;
        }).catch(e => {
            term.innerHTML += `<br>> ERROR: USER_GATING_ACTIVE`;
        });
    }

    function toggle() { if(currentIdx === -1) mount(0); else player.paused ? player.play() : player.pause(); }
    function skip(dir) { let n = currentIdx + dir; if(n >= 0 && n < STATIONS.length) mount(n); }
    function setV(v) { player.volume = v; }

    window.onresize = () => { svg.innerHTML = ''; buildHardware(); };
    buildHardware();
</script>
</body>
</html>
