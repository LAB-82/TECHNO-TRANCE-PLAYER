<!DOCTYPE html><html lang="pl"><head>    <meta charset="UTF-8">    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">    <title>RMF NEON INFOGRAPHIC</title>    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;600;700&display=swap');
        
        :root {            
            --yellow: #fce300;            
            --blue-wave: #00ccff;            
            --bg: #020408;
            --neon-shadow: rgba(252, 227, 0, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }                
        body { 
            height: 100vh; width: 100vw; background: var(--bg); color: #fff; 
            font-family: 'Rajdhani', sans-serif; overflow: hidden; padding: 2vh;
            /* Tekstura tła ze zdjęcia */
            background-image: 
                radial-gradient(circle at 50% 50%, #001a2e 0%, #000 100%),
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%),
                linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 100%, 100% 4px, 3px 100%;
        }

        header {             
            height: 60px; display: flex; justify-content: space-between; align-items: center;            
            border-bottom: 1px solid var(--yellow); margin-bottom: 2vh;
            box-shadow: 0 0 15px var(--neon-shadow);
        }        
        .header-info { font-family: 'Orbitron', sans-serif; font-size: 20px; color: var(--yellow); text-shadow: 0 0 10px var(--yellow); }        
        .clock { font-family: 'Orbitron', sans-serif; color: var(--blue-wave); font-size: 22px; text-shadow: 0 0 10px var(--blue-wave); }

        .app-content { display: flex; flex: 1; gap: 2vw; height: calc(100vh - 120px); }

        /* GRID 5x3 */
        .grid {             
            flex: 1.5; display: grid;             
            grid-template-columns: repeat(5, 1fr);             
            grid-template-rows: repeat(3, 1fr);             
            gap: 15px;         
        }

        /* KAFELEK - INSPIRACJA image_a24026.jpg */
        .tile {            
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(252, 227, 0, 0.2);
            border-radius: 12px;
            position: relative; cursor: pointer; transition: 0.3s;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            backdrop-filter: blur(4px);
            overflow: hidden;
        }

        /* Dekoracyjne ramki wewnątrz kafelka */
        .tile::after {
            content: ''; position: absolute; inset: 4px; border: 1px solid rgba(252, 227, 0, 0.05); border-radius: 10px; pointer-events: none;
        }

        .tile .t-top { font-size: 18px; font-weight: 700; color: #fff; z-index: 2; letter-spacing: 1px; }        
        .tile .t-bottom { font-size: 11px; font-weight: 600; color: var(--yellow); text-transform: uppercase; z-index: 2; opacity: 0.8; }

        /* ACTIVE - NEON GLOW EFFECT */
        .tile.active { 
            background: rgba(252, 227, 0, 0.1); 
            border-color: var(--yellow);
            box-shadow: 0 0 25px var(--neon-shadow), inset 0 0 15px var(--neon-shadow);
            transform: translateY(-2px);
        }
        .tile.active .t-top { color: var(--yellow); text-shadow: 0 0 8px var(--yellow); }

        /* TWOJE FALE - ZMODYFIKOWANE POD STYL NEONOWY */
        .waves { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; opacity: 0; }        
        .tile.active .waves { opacity: 1; }        
        .wave { 
            position: absolute; border: 2px solid var(--blue-wave); border-radius: 50%; 
            animation: ripple 3s infinite ease-out; opacity: 0; 
            box-shadow: 0 0 10px var(--blue-wave), inset 0 0 10px var(--blue-wave);
        }        
        .wave:nth-child(2) { animation-delay: 1s; }        
        .wave:nth-child(3) { animation-delay: 2s; }
        @keyframes ripple { 
            0% { width: 0%; height: 0%; opacity: 1; } 
            100% { width: 300%; height: 300%; opacity: 0; } 
        }

        .sidebar {             
            flex: 0.5; display: flex; flex-direction: column;             
            align-items: center; justify-content: space-around;
            background: rgba(0, 0, 0, 0.4); border-radius: 20px; padding: 20px;
            border: 1px solid rgba(252, 227, 0, 0.1);
        }

        /* LOGO - OKRĄGŁY WYŚWIETLACZ Z OBRAZKA */
        .logo-display {            
            width: 100%; aspect-ratio: 1; border-radius: 50%;
            border: 5px double var(--yellow);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: radial-gradient(circle, rgba(252, 227, 0, 0.1) 0%, transparent 80%);
            box-shadow: 0 0 40px rgba(252, 227, 0, 0.2);
        }
        .logo-display h2 { font-family: 'Orbitron', sans-serif; font-size: 32px; color: #fff; text-shadow: 0 0 15px var(--yellow); }
        .logo-display p { font-size: 10px; color: var(--blue-wave); letter-spacing: 4px; font-weight: 700; }

        .controls { display: flex; gap: 20px; align-items: center; }        
        .c-svg { width: 45px; height: 45px; fill: var(--yellow); cursor: pointer; filter: drop-shadow(0 0 5px var(--yellow)); transition: 0.2s; }
        .c-svg:hover { transform: scale(1.1); filter: drop-shadow(0 0 15px var(--yellow)); }
        .c-play { width: 75px; height: 75px; }

        /* VOLUME - STYL CAPSULE (PIGUŁKA) */
        .vol-box { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        input[type="range"] { 
            width: 100%; appearance: none; background: #111; height: 12px; border-radius: 6px; 
            border: 1px solid rgba(252, 227, 0, 0.3); overflow: hidden;
        }
        input[type="range"]::-webkit-slider-runnable-track { height: 12px; background: #000; }
        input[type="range"]::-webkit-slider-thumb {
            appearance: none; width: 15px; height: 12px; background: var(--yellow);
            box-shadow: -400px 0 0 400px var(--yellow); cursor: pointer;
        }
        input[type="range"].at-mid::-webkit-slider-thumb { background: var(--blue-wave); box-shadow: -400px 0 0 400px var(--blue-wave); }

        @media (max-width: 800px) {
            .app-content { flex-direction: column; overflow-y: auto; }
            .grid { grid-template-columns: repeat(3, 1fr); height: auto; flex: none; }
            .sidebar { width: 100%; height: auto; }
        }
    </style></head><body>

<header>    <div class="header-info" id="playing-now">GRA: RMF FM</div>    <div class="clock" id="timer">00:00</div></header>

<div class="app-content">    <div class="grid" id="station-grid"></div>
    <aside class="sidebar">        <div class="logo-display">            <h2 id="logo-text">RMF</h2>            <p>ACTIVE SYSTEM</p>        </div>
        <div class="controls">            <svg class="c-svg" viewBox="0 0 24 24" onclick="skip(-1)"><path d="M6,18V6H8V18H6M9.5,12L18,6V18L9.5,12Z"/></svg>            <svg class="c-svg c-play" viewBox="0 0 24 24" onclick="toggle()"><path id="p-ico" d="M8,5.14V19.14L19,12.14L8,5.14Z"/></svg>            <svg class="c-svg" viewBox="0 0 24 24" onclick="skip(1)"><path d="M16,18H18V6H16M6,18L14.5,12L6,6V18Z"/></svg>        </div>
        <div class="vol-box">            <input type="range" id="v-range" class="at-mid" min="0" max="100" value="50" oninput="setV(this.value)">        </div>    </aside></div>

<audio id="player"></audio>

<script>    
    const STATIONS = [        
        { n: 'RMF FM', s: 'RMF FM', u: 'rmf_fm' },        
        { n: 'RMF MAXXX', s: 'Maxxx', u: 'RMFMAXXX48' },        
        { n: 'RMF 80s', s: '80s', u: 'rmf_80s' },        
        { n: 'RMF 90s', s: '90s', u: 'rmf_90s' },        
        { n: 'RMF 2000', s: '2000', u: 'rmf_2000' },        
        { n: 'RMF CHILLOUT', s: 'Chillout', u: 'rmf_chillout' },        
        { n: 'RMF CLASSIC', s: 'Classic', u: 'rmf_classic' },        
        { n: 'RMF DANCE', s: 'Dance', u: 'rmf_dance' },        
        { n: 'RMF GOLD', s: 'Gold', u: 'rmf_gold' },        
        { n: 'RMF LATINO', s: 'Latino', u: 'rmf_latino' },        
        { n: 'RMF LOVE', s: 'Love', u: 'rmf_love' },        
        { n: 'RMF PARTY', s: 'Party', u: 'rmf_party' },        
        { n: 'RMF POLSKI ROCK', s: 'Polski Rock', u: 'rmf_polski_rock' },        
        { n: 'RMF ROCK', s: 'Rock', u: 'rmf_rock' },        
        { n: 'RMF SMOOTH JAZZ', s: 'Smooth Jazz', u: 'rmf_smooth_jazz' }    
    ];

    const player = document.getElementById('player'), ico = document.getElementById('p-ico'), grid = document.getElementById('station-grid'), vRange = document.getElementById('v-range');    
    let current = -1;

    function clock() {        
        const d = new Date();        
        document.getElementById('timer').textContent = d.getHours().toString().padStart(2,'0') + ":" + d.getMinutes().toString().padStart(2,'0');    
    }    
    setInterval(clock, 1000); clock();

    STATIONS.forEach((s, i) => {        
        const t = document.createElement('div');        
        t.className = 'tile';        
        t.innerHTML = `            
            <div class="waves"><div class="wave"></div><div class="wave"></div><div class="wave"></div></div>            
            <div class="t-top">RMF FM</div>            
            <div class="t-bottom">${s.s}</div>        `;        
        t.onclick = () => play(i);        
        grid.appendChild(t);    
    });

    function play(i) {        
        current = i;        
        document.querySelectorAll('.tile').forEach((t, idx) => t.classList.toggle('active', idx === i));        
        document.getElementById('playing-now').textContent = "GRA: " + STATIONS[i].n;
        document.getElementById('logo-text').textContent = STATIONS[i].s.split(' ')[0];        
        const streamBase = "https://rs201-krk.rmfstream.pl/";        
        player.src = (STATIONS[i].n === 'RMF MAXXX') ? 'https://rs7-krk2-cyfronet.rmfstream.pl/RMFMAXXX48' : streamBase + STATIONS[i].u;        
        player.play();        
        ico.setAttribute('d', 'M14,19H18V5H14M6,19H10V5H6V19Z');    
    }

    function toggle() {        
        if(player.paused) { player.play(); ico.setAttribute('d', 'M14,19H18V5H14M6,19H10V5H6V19Z'); }        
        else { player.pause(); ico.setAttribute('d', 'M8,5.14V19.14L19,12.14L8,5.14Z'); }    
    }

    function skip(d) { let n = current + d; if(n >= 0 && n < STATIONS.length) play(n); }        
    function setV(v) {         
        player.volume = v / 100;        
        if(parseInt(v) === 50) vRange.classList.add('at-mid');        
        else vRange.classList.remove('at-mid');    
    }
</script></body></html>
