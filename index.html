<!DOCTYPE html><html lang="pl"><head>    <meta charset="UTF-8">    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">    <title>TECHNO TRANCE PLAYER - HUD EDITION</title>    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;600&display=swap');
        
        :root {            
            --yellow: #fce300;            
            --blue-wave: #00ccff;            
            --hud-border: rgba(0, 204, 255, 0.4);
            --bg-dark: #020508;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }                
        body { 
            height: 100vh; width: 100vw; background: var(--bg-dark); color: #fff; 
            font-family: 'Rajdhani', sans-serif; overflow: hidden; padding: 20px;
            background-image: 
                radial-gradient(circle at center, #001520 0%, #000 100%),
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 204, 255, 0.02) 2px, rgba(0, 204, 255, 0.02) 4px);
        }

        header {             
            height: 50px; display: flex; justify-content: space-between; align-items: flex-end;            
            border-bottom: 2px solid var(--yellow); margin-bottom: 20px; padding-bottom: 5px;
            box-shadow: 0 4px 20px -5px var(--yellow);
        }        
        .header-info { font-family: 'Orbitron', sans-serif; font-size: 24px; font-weight: 700; color: var(--yellow); text-shadow: 0 0 10px var(--yellow); }        
        .clock { font-family: 'Orbitron', sans-serif; color: var(--blue-wave); font-size: 24px; text-shadow: 0 0 10px var(--blue-wave); }

        .app-content { display: flex; flex: 1; gap: 20px; height: calc(100vh - 110px); }

        /* GRID 5x3 - TWOJA STRUKTURA */
        .grid {             
            flex: 1.5; display: grid;             
            grid-template-columns: repeat(5, 1fr);             
            grid-template-rows: repeat(3, 1fr);             
            gap: 15px;         
        }

        /* KAFELEK - STYL HUD TRON */
        .tile {            
            background: rgba(0, 204, 255, 0.03); 
            border: 1px solid var(--hud-border);
            position: relative; cursor: pointer; transition: 0.2s;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            clip-path: polygon(10% 0, 90% 0, 100% 20%, 100% 80%, 90% 100%, 10% 100%, 0 80%, 0 20%);
        }

        .tile::before {
            content: ''; position: absolute; inset: 0;
            border: 1px solid rgba(252, 227, 0, 0.1);
            pointer-events: none;
        }

        .tile .t-top { font-size: 22px; font-weight: 700; color: #fff; opacity: 0.5; transition: 0.3s; }        
        .tile .t-bottom { font-size: 13px; font-weight: 600; color: var(--yellow); text-transform: uppercase; }

        /* ACTIVE - Z TWOIM BŁĘKITEM I ŻÓŁCIĄ */
        .tile.active { 
            background: rgba(0, 204, 255, 0.1); 
            border-color: var(--yellow);
            box-shadow: 0 0 20px rgba(252, 227, 0, 0.2), inset 0 0 15px rgba(0, 204, 255, 0.1);
        }
        .tile.active .t-top { opacity: 1; text-shadow: 0 0 10px #fff; }

        /* TWOJE FALE - ZACHOWANA LOGIKA I KLASY */
        .waves { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; opacity: 0; }        
        .tile.active .waves { opacity: 1; }        
        .wave { 
            position: absolute; border: 1.5px solid var(--blue-wave); border-radius: 50%; 
            animation: ripple 3s infinite linear; opacity: 0; 
            box-shadow: 0 0 10px var(--blue-wave);
        }        
        .wave:nth-child(2) { animation-delay: 1s; }        
        .wave:nth-child(3) { animation-delay: 2s; }
        @keyframes ripple { 0% { width: 0; height: 0; opacity: 0.8; } 100% { width: 250%; height: 250%; opacity: 0; } }

        .sidebar {             
            flex: 0.5; display: flex; flex-direction: column; gap: 30px;
            border-left: 1px solid rgba(0, 204, 255, 0.2); padding-left: 20px;
        }

        /* LOGO BOX - KSZTAŁT Z NOWEGO ZDJĘCIA */
        .logo-display {            
            width: 100%; aspect-ratio: 1.2; border: 2px solid var(--blue-wave);
            clip-path: polygon(15% 0, 85% 0, 100% 20%, 100% 80%, 85% 100%, 15% 100%, 0 80%, 0 20%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(0, 204, 255, 0.05);
            box-shadow: inset 0 0 30px rgba(0, 204, 255, 0.1);
        }
        .logo-display h2 { font-family: 'Orbitron', sans-serif; font-size: 40px; color: var(--yellow); text-shadow: 0 0 15px var(--yellow); }
        .logo-display p { font-size: 14px; color: var(--blue-wave); letter-spacing: 5px; }

        .controls { display: flex; justify-content: center; align-items: center; gap: 20px; }        
        .c-svg { width: 40px; height: 40px; fill: var(--yellow); cursor: pointer; opacity: 0.8; filter: drop-shadow(0 0 5px var(--yellow)); }
        .c-play { width: 80px; height: 80px; opacity: 1; }

        /* VOLUME - TWOJA LOGIKA AT-MID */
        .vol-box { display: flex; flex-direction: column; gap: 10px; }
        input[type="range"] { 
            width: 100%; appearance: none; background: rgba(0, 204, 255, 0.1); height: 6px; border-radius: 3px; 
        }
        input[type="range"]::-webkit-slider-thumb { 
            appearance: none; width: 18px; height: 18px; background: var(--yellow); 
            border: 2px solid #fff; border-radius: 2px; cursor: pointer; box-shadow: 0 0 10px var(--yellow);
        }
        input[type="range"].at-mid::-webkit-slider-thumb { 
            background: var(--blue-wave); border-color: #fff; box-shadow: 0 0 10px var(--blue-wave);
        }

        @media (max-width: 800px) {
            .app-content { flex-direction: column; overflow-y: auto; }
            .grid { grid-template-columns: repeat(3, 1fr); height: auto; }
            .sidebar { border: none; padding: 0; }
        }
    </style></head><body>

<header>    <div class="header-info" id="playing-now">RMF SYSTEM</div>    <div class="clock" id="timer">00:00</div></header>

<div class="app-content">    <div class="grid" id="station-grid"></div>
    <aside class="sidebar">        <div class="logo-display">            <h2>RMF FM</h2>            <p>CORE_ACTIVE</p>        </div>
        <div class="controls">            <svg class="c-svg" viewBox="0 0 24 24" onclick="skip(-1)"><path d="M6,18V6H8V18H6M9.5,12L18,6V18L9.5,12Z"/></svg>            <svg class="c-svg c-play" viewBox="0 0 24 24" onclick="toggle()"><path id="p-ico" d="M8,5.14V19.14L19,12.14L8,5.14Z"/></svg>            <svg class="c-svg" viewBox="0 0 24 24" onclick="skip(1)"><path d="M16,18H18V6H16M6,18L14.5,12L6,6V18Z"/></svg>        </div>
        <div class="vol-box">            <input type="range" id="v-range" class="at-mid" min="0" max="100" value="50" oninput="setV(this.value)">        </div>    </aside></div>

<audio id="player"></audio>

<script>    
    // TWOJA LOGIKA - NIENARUSZONA
    const STATIONS = [        
        { n: 'RMF FM', s: 'RMF FM', u: 'rmf_fm' },        
        { n: 'RMF MAXXX', s: 'Maxxx', u: 'RMFMAXXX48' },        
        { n: 'RMF 80s', s: '80s', u: 'rmf_80s' },        
        { n: 'RMF 90s', s: '90s', u: 'rmf_90s' },        
        { n: 'RMF 2000', s: '2000', u: 'rmf_2000' },        
        { n: 'RMF CHILLOUT', s: 'Chillout', u: 'rmf_chillout' },        
        { n: 'RMF CLASSIC', s: 'Classic', u: 'rmf_classic' },        
        { n: 'RMF DANCE', s: 'Dance', u: 'rmf_dance' },        
        { n: 'RMF GOLD', s: 'Gold', u: 'rmf_gold' },        
        { n: 'RMF LATINO', s: 'Latino', u: 'rmf_latino' },        
        { n: 'RMF LOVE', s: 'Love', u: 'rmf_love' },        
        { n: 'RMF PARTY', s: 'Party', u: 'rmf_party' },        
        { n: 'RMF POLSKI ROCK', s: 'Polski Rock', u: 'rmf_polski_rock' },        
        { n: 'RMF ROCK', s: 'Rock', u: 'rmf_rock' },        
        { n: 'RMF SMOOTH JAZZ', s: 'Smooth Jazz', u: 'rmf_smooth_jazz' }    
    ];

    const player = document.getElementById('player'), ico = document.getElementById('p-ico'), grid = document.getElementById('station-grid'), vRange = document.getElementById('v-range');    
    let current = -1;

    function clock() {        
        const d = new Date();        
        document.getElementById('timer').textContent = d.getHours().toString().padStart(2,'0') + ":" + d.getMinutes().toString().padStart(2,'0');    
    }    
    setInterval(clock, 1000); clock();

    STATIONS.forEach((s, i) => {        
        const t = document.createElement('div');        
        t.className = 'tile';        
        t.innerHTML = `            
            <div class="waves"><div class="wave"></div><div class="wave"></div><div class="wave"></div></div>            
            <div class="t-top">RMF FM</div>            
            <div class="t-bottom">${s.s}</div>        `;        
        t.onclick = () => play(i);        
        grid.appendChild(t);    
    });

    function play(i) {        
        current = i;        
        document.querySelectorAll('.tile').forEach((t, idx) => t.classList.toggle('active', idx === i));        
        document.getElementById('playing-now').textContent = "SYSTEM: " + STATIONS[i].n;        
        const streamBase = "https://rs201-krk.rmfstream.pl/";        
        player.src = (STATIONS[i].n === 'RMF MAXXX') ? 'https://rs7-krk2-cyfronet.rmfstream.pl/RMFMAXXX48' : streamBase + STATIONS[i].u;        
        player.play();        
        ico.setAttribute('d', 'M14,19H18V5H14M6,19H10V5H6V19Z');    
    }

    function toggle() {        
        if(player.paused) { player.play(); ico.setAttribute('d', 'M14,19H18V5H14M6,19H10V5H6V19Z'); }        
        else { player.pause(); ico.setAttribute('d', 'M8,5.14V19.14L19,12.14L8,5.14Z'); }    
    }

    function skip(d) { let n = current + d; if(n >= 0 && n < STATIONS.length) play(n); }        
    function setV(v) {         
        player.volume = v / 100;        
        if(parseInt(v) === 50) vRange.classList.add('at-mid');        
        else vRange.classList.remove('at-mid');    
    }
</script></body></html>
