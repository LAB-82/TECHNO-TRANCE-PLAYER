<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>RMF CYCLOP - MAXIMUM COLOR</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@600;700&display=swap');

        :root {
            --bg-carbon: #0f0f11;
            --btn-base: linear-gradient(145deg, #32363d, #1a1c20);
            --neon-pink: #ff007f;
            --neon-blue: #00e5ff;
            --neon-lime: #a2ff00;
            --gold: #ffcc00;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            height: 100vh; width: 100vw; background: var(--bg-carbon); 
            display: flex; align-items: center; justify-content: center;
            font-family: 'Rajdhani', sans-serif;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(50, 50, 70, 0.5) 0%, rgba(0,0,0,1) 100%),
                repeating-linear-gradient(45deg, #111 0px, #111 2px, #0a0a0a 2px, #0a0a0a 4px);
        }

        /* GŁÓWNA RAMA VST */
        #vst-rack {
            width: 900px; height: 550px;
            background: #25282e;
            border: 10px solid #111;
            border-radius: 15px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.9), inset 0 2px 5px rgba(255,255,255,0.2);
            padding: 40px; position: relative;
            display: flex; flex-direction: column;
        }

        /* ŚRUBY MONTAŻOWE */
        .screw {
            position: absolute; width: 15px; height: 15px; 
            background: radial-gradient(circle, #555, #111);
            border-radius: 50%; box-shadow: 1px 1px 3px #000;
        }
        .s1 { top: 10px; left: 10px; } .s2 { top: 10px; right: 10px; }
        .s3 { bottom: 10px; left: 10px; } .s4 { bottom: 10px; right: 10px; }

        /* WYŚWIETLACZ GÓRNY */
        header {
            height: 70px; background: #000; border: 3px solid #333;
            border-radius: 8px; margin-bottom: 30px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 25px; box-shadow: inset 0 0 20px rgba(0, 229, 255, 0.2);
        }
        .brand { font-family: 'Orbitron'; font-weight: 900; font-size: 28px; color: #fff; letter-spacing: 3px; }
        .brand span { background: linear-gradient(to right, var(--neon-pink), var(--neon-blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        #status { color: var(--neon-lime); font-family: monospace; font-size: 14px; text-shadow: 0 0 5px var(--neon-lime); }

        /* ORYGINALNY UKŁAD 5x3 */
        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 20px; flex: 1;
        }

        .btn {
            background: var(--btn-base);
            border-radius: 10px;
            border: 2px solid #111;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; position: relative; transition: all 0.1s;
            box-shadow: 6px 6px 12px #000, inset 1px 1px 2px rgba(255,255,255,0.1);
        }

        .btn:active { transform: scale(0.96); box-shadow: 2px 2px 4px #000; }

        /* KOLOROWE PASY I WIERSZE */
        .grid .btn:nth-child(-n+5) { border-top: 4px solid var(--neon-pink); }
        .grid .btn:nth-child(n+6):nth-child(-n+10) { border-top: 4px solid var(--neon-blue); }
        .grid .btn:nth-child(n+11) { border-top: 4px solid var(--neon-lime); }

        /* TEKSTY NA PRZYCISKACH */
        .btn-id { font-size: 10px; color: #666; position: absolute; top: 8px; left: 10px; font-weight: 700; }
        .btn-name { font-size: 18px; font-weight: 700; color: #eee; text-shadow: 2px 2px 4px #000; }

        /* STAN AKTYWNY - TOTALNE PODŚWIETLENIE */
        .btn.active {
            background: #2a2d35;
            border: 2px solid #fff;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.2), inset 0 0 15px #000;
        }
        .btn.active .btn-name {
            background: linear-gradient(45deg, #fff, var(--neon-blue), var(--neon-pink));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: none;
        }

        /* ANALIZATOR NA DOLE */
        .footer-leds {
            height: 15px; margin-top: 25px; display: flex; gap: 5px;
        }
        .led { flex: 1; height: 100%; background: #1a1a1a; border-radius: 2px; }
        .led.on { background: var(--neon-blue); box-shadow: 0 0 10px var(--neon-blue); }

    </style>
</head>
<body>

<div id="vst-rack">
    <div class="screw s1"></div><div class="screw s2"></div>
    <div class="screw s3"></div><div class="screw s4"></div>

    <header>
        <div class="brand">RMF <span>ULTRA</span></div>
        <div id="status">SYS READY // 44100HZ</div>
        <div style="width: 100px; height: 10px; background: #222; border-radius: 5px; overflow: hidden;">
            <div id="vol-bar" style="width: 70%; height: 100%; background: var(--neon-pink);"></div>
        </div>
    </header>

    <div class="grid" id="main-grid"></div>

    <div class="footer-leds" id="analyzer">
        <!-- LEDy generowane przez JS -->
    </div>
</div>

<audio id="player"></audio>

<script>
    const STATIONS = [
        { n: 'RMF FM', u: 'rmf_fm' }, { n: 'MAXXX', u: 'RMFMAXXX48' }, { n: '80s', u: 'rmf_80s' },
        { n: '90s', u: 'rmf_90s' }, { n: '2000', u: 'rmf_2000' }, { n: 'DANCE', u: 'rmf_dance' },
        { n: 'ROCK', u: 'rmf_rock' }, { n: 'GOLD', u: 'rmf_gold' }, { n: 'LOVE', u: 'rmf_love' },
        { n: 'PARTY', u: 'rmf_party' }, { n: 'LATINO', u: 'rmf_latino' }, { n: 'P-ROCK', u: 'rmf_polski_rock' },
        { n: 'CHILL', u: 'rmf_chillout' }, { n: 'CLASSIC', u: 'rmf_classic' }, { n: 'S-JAZZ', u: 'rmf_smooth_jazz' }
    ];

    const grid = document.getElementById('main-grid');
    const player = document.getElementById('player');
    const analyzer = document.getElementById('analyzer');

    // Tworzenie LEDów w stopce
    for(let i=0; i<30; i++) {
        const l = document.createElement('div');
        l.className = 'led';
        analyzer.appendChild(l);
    }

    // Budowa siatki 5x3
    STATIONS.forEach((st, i) => {
        const b = document.createElement('div');
        b.className = 'btn';
        b.innerHTML = `<span class="btn-id">BANK ${Math.floor(i/5)+1}</span><span class="btn-name">${st.n}</span>`;
        
        b.onclick = () => {
            document.querySelectorAll('.btn').forEach(x => x.classList.remove('active'));
            b.classList.add('active');
            document.getElementById('status').textContent = "PLAYING: " + st.n;
            
            const url = st.n === 'MAXXX' ? 'https://rs7-krk2-cyfronet.rmfstream.pl/RMFMAXXX48' : 'https://rs201-krk.rmfstream.pl/' + st.u;
            player.src = url;
            player.play();
        };
        grid.appendChild(b);
    });

    // Symulacja "żywego" urządzenia
    setInterval(() => {
        const leds = document.querySelectorAll('.led');
        leds.forEach(l => {
            if(!player.paused) {
                l.classList.toggle('on', Math.random() > 0.5);
                // Mix kolorów w analizatorze
                const colors = [ 'var(--neon-pink)', 'var(--neon-blue)', 'var(--neon-lime)' ];
                l.style.backgroundColor = colors[Math.floor(Math.random()*3)];
            } else {
                l.classList.remove('on');
            }
        });
    }, 100);
</script>
</body>
</html>
