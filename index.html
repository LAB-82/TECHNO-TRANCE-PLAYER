<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>GEHIRN TREIBER - SIMPLE PRO</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron&family=Rajdhani:wght@500&display=swap');
        body { background: #05070a; color: #fff; font-family: 'Rajdhani', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        
        .vst-box { background: #0d1117; border: 2px solid #1e2633; padding: 20px; display: flex; gap: 20px; box-shadow: 0 0 30px #000; }
        
        /* Grid 2 kolumny */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { background: #1a222d; border: 1px solid #333; color: #aaa; padding: 10px; cursor: pointer; font-family: 'Orbitron'; font-size: 10px; text-align: center; transition: 0.2s; }
        .btn:hover { border-color: #00f2ff; color: #fff; }
        .btn.active { border-color: #00f2ff; box-shadow: 0 0 10px #00f2ff; color: #00f2ff; }

        .display { background: #000; border: 1px solid #bc00ff; padding: 15px; width: 300px; display: flex; flex-direction: column; justify-content: center; }
        #track-name { font-family: 'Orbitron'; color: #bc00ff; font-size: 14px; text-shadow: 0 0 5px #bc00ff; }
        canvas { background: #000; height: 80px; margin-top: 10px; border-top: 1px solid #111; }
    </style>
</head>
<body>

<div class="vst-box">
    <div class="grid" id="menu"></div>
    
    <div class="display">
        <div style="font-size: 10px; color: #555;">NOW PLAYING</div>
        <div id="track-name">STANDBY</div>
        <canvas id="canvas"></canvas>
        <input type="range" style="width:100%; margin-top:15px;" oninput="audio.volume = this.value/100">
    </div>
</div>

<audio id="audio" crossorigin="anonymous"></audio>

<script>
    const audio = document.getElementById('audio');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const stations = [
        { n: 'TECH 88', s: 'tech88' }, { n: '1000 TECHNO', s: '1000techno' },
        { n: 'CHRIS BURN', s: 'chris_burn' }, { n: 'GEHIRN', s: 'gehirn-treiber-beat-radio' },
        { n: 'DEEP HOUSE', s: 'deep-house-sounds' }, { n: 'TORNADO', s: 'tornadofm' }
    ];

    let audioCtx, analyser, dataArray, source;

    stations.forEach(st => {
        const b = document.createElement('div');
        b.className = 'btn';
        b.innerHTML = st.n;
        b.onclick = () => {
            // Inicjalizacja wizualizacji tylko przy pierwszym kliknięciu
            if (!audioCtx) {
                audioCtx = new AudioContext();
                analyser = audioCtx.createAnalyser();
                source = audioCtx.createMediaElementSource(audio);
                source.connect(analyser);
                analyser.connect(audioCtx.destination);
                dataArray = new Uint8Array(analyser.frequencyBinCount);
                draw();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();

            document.querySelectorAll('.btn').forEach(x => x.classList.remove('active'));
            b.classList.add('active');
            document.getElementById('track-name').innerHTML = st.n;
            
            audio.src = "https://stream.laut.fm/" + st.s;
            audio.play();
        };
        document.getElementById('menu').appendChild(b);
    });

    function draw() {
        requestAnimationFrame(draw);
        analyser.getByteFrequencyData(dataArray);
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = '#00f2ff';
        ctx.beginPath();
        let x = 0;
        for(let i=0; i<dataArray.length; i++) {
            let y = canvas.height - (dataArray[i]/255 * canvas.height);
            if(i===0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            x += canvas.width / dataArray.length;
        }
        ctx.stroke();
    }
</script>
</body>
</html>
